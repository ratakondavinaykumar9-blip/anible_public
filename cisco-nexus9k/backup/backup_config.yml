---
# ==============================================================================
# Playbook: Backup Nexus 9000 Configuration
# ==============================================================================
# Author: Analyst (OpenClaw) / Architect:# Version: 1.1.0
# Last Updated: 2026-03-08
# Description: Improved Nexus 9000 backup with validation, idempotency, and FQCN.
# ==============================================================================

- name: Backup Nexus 9000 Configuration
  hosts: nexus9k
  gather_facts: false
  connection: network_cli

  vars:
    backup_path: "/tmp/nexus_backups"
    # Relying on facts gathered from localhost for accurate timestamping
    backup_name: "{{ inventory_hostname }}_{{ hostvars['localhost']['ansible_date_time']['iso8601_basic'] }}"
    retention_days: 30
    include_vlans: true
    compare_startup: true
    max_config_size_mb: 5

  tasks:
    - name: Gather local facts for timestamping
      # Documentation: Required to populate ansible_date_time for unique backup naming.
      ansible.builtin.setup:
      delegate_to: localhost
      run_once: true

    - name: Ensure backup directory exists
      # Idempotency: 'state: directory' only reports change if the folder is created.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Configuration Backup Process
      block:
        - name: Retrieve running configuration
          # Best Practice: Using Fully Qualified Collection Name (FQCN).
          cisco.nxos.nxos_command:
            commands: show running-config
          register: running_config
          changed_when: false
          # Error Handling: Fail if command fails or returns empty data.
          failed_when: 
            - running_config is failed or running_config.stdout[0] | length == 0

        - name: Retrieve startup configuration
          cisco.nxos.nxos_command:
            commands: show startup-config
          register: startup_config
          changed_when: false
          # Error Handling: Startup config might be empty; don't fail the playbook execution.
          failed_when: false

        - name: Retrieve VLAN database
          cisco.nxos.nxos_command:
            commands: show vlan brief
          register: vlan_database
          when: include_vlans | bool
          changed_when: false
          failed_when: false

        - name: Validate configuration size
          # Observability: Assert configuration is within acceptable size limits.
          ansible.builtin.assert:
            that:
              - running_config.stdout[0] | length < (max_config_size_mb | int * 1024 * 1024)
            fail_msg: "Running configuration for {{ inventory_hostname }} exceeds the {{ max_config_size_mb }}MB limit."
            success_msg: "Configuration size for {{ inventory_hostname }} validated."

        - name: Analyze configuration drift
          # Observability: Check for differences between running and startup.
          ansible.builtin.set_fact:
            config_drift: "{{ running_config.stdout[0] != startup_config.stdout[0] }}"
          when:
            - compare_startup | bool
            - startup_config.stdout is defined
            - startup_config.stdout[0] | length > 0

        - name: Save configurations to backup files
          # Idempotency: 'copy' module handles file creation and content verification.
          ansible.builtin.copy:
            content: "{{ item.content }}"
            dest: "{{ backup_path }}/{{ backup_name }}_{{ item.suffix }}.cfg"
            mode: '0640'
          delegate_to: localhost
          loop:
            - { content: "{{ running_config.stdout[0] }}", suffix: "running" }
            - { content: "{{ startup_config.stdout[0] | default('') }}", suffix: "startup" }
          when: item.content | length > 0
          register: config_save_results

        - name: Save VLAN state
          ansible.builtin.copy:
            content: "{{ vlan_database.stdout[0] }}"
            dest: "{{ backup_path }}/{{ backup_name }}_vlans.txt"
            mode: '0640'
          delegate_to: localhost
          when: 
            - include_vlans | bool 
            - vlan_database.stdout is defined
            - vlan_database.stdout[0] | length > 0

        - name: Create drift warning marker
          ansible.builtin.copy:
            content: |
              WARNING: Configuration drift detected on {{ inventory_hostname }}
              Timestamp: {{ hostvars['localhost']['ansible_date_time']['iso8601'] }}
            dest: "{{ backup_path }}/{{ backup_name }}_DRIFT_WARNING.txt"
            mode: '0640'
          delegate_to: localhost
          when: config_drift | default(false)

        - name: Generate backup metadata
          ansible.builtin.copy:
            content: |
              # Nexus 9000 Backup Metadata
              hostname: {{ inventory_hostname }}
              timestamp: {{ hostvars['localhost']['ansible_date_time']['iso8601'] }}
              running_config_size: {{ running_config.stdout[0] | length }}
              config_drift: {{ config_drift | default(false) }}
              vlan_count: {{ vlan_database.stdout[0] | default('') | regex_findall('VLAN\\d+') | length }}
            dest: "{{ backup_path }}/{{ backup_name }}_metadata.yml"
            mode: '0640'
          delegate_to: localhost

      rescue:
        - name: Log backup failure
          # Error Handling: Provide visibility into failure reasons.
          ansible.builtin.debug:
            msg: "CRITICAL: Backup failed for {{ inventory_hostname }}. Error: {{ ansible_failed_result.msg | default('Check logs') }}"

        - name: Create failure log file
          ansible.builtin.copy:
            content: "Backup failed at {{ hostvars['localhost']['ansible_date_time']['iso8601'] }}: {{ ansible_failed_result.msg | default('Unknown error') }}"
            dest: "{{ backup_path }}/{{ inventory_hostname }}_FAILURE.log"
          delegate_to: localhost

      always:
        - name: Display backup summary
          # Observability: Summary for the automation operator.
          ansible.builtin.debug:
            msg:
              - "Host: {{ inventory_hostname }}"
              - "Location: {{ backup_path }}"
              - "Result: {{ 'SUCCESS' if config_save_results is not failed else 'FAILED' }}"
              - "Drift: {{ 'DETECTED' if config_drift | default(false) else 'None' }}"

    - name: Manage retention policy
      block:
        - name: Find expired backup files
          # Documentation: Identify files older than the defined retention period.
          ansible.builtin.find:
            paths: "{{ backup_path }}"
            patterns: "{{ inventory_hostname }}_*"
            age: "{{ retention_days }}d"
          delegate_to: localhost
          register: expired_files

        - name: Purge expired backups
          # Idempotency: 'state: absent' is safe to run repeatedly.
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ expired_files.files }}"
          delegate_to: localhost
          when: expired_files.matched > 0