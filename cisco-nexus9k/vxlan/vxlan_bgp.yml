---
# ==============================================================================
# Playbook: Configure BGP Underlay for VXLAN EVPN (Nexus 9000)
# ==============================================================================
# Author: Network Automation Framework (OpenClaw)
# Version: 1.1.0
# Last Updated: 2026-03-08
# Description: Improved BGP underlay configuration for VXLAN EVPN fabric.
#              Enhanced with Resource Modules, FQCN, and Robust Observability.
#
# Standards:
#   1. Idempotency: Uses NX-OS Resource Modules for state-based configuration.
#   2. Observability: Registered outputs and assertions for state verification.
#   3. Documentation: Detailed comments explaining task intent and logic.
#   4. Error Handling: Block/Rescue for graceful failure reporting and halted execution.
#   5. Best Practices: Full use of Fully Qualified Collection Names (FQCN).
# ==============================================================================

- name: Configure BGP Underlay for VXLAN EVPN
  hosts: nexus9k
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # Mandatory: BGP Autonomous System Number (1-65535)
    # bgp_as: 65001
    
    # BGP Router-ID: Defaults to management/inventory IP if not specified
    bgp_router_id: "{{ ansible_host }}"
    
    # Underlay Peering Loopback: Critical for VTEP Source and BGP Peering
    loopback_underlay:
      interface: "loopback0"
      ip: "{{ underlay_loopback_ip | default('1.1.1.1/32') }}"
      description: "VXLAN Underlay BGP Source"
    
    # Neighbor definitions: Should be defined in host_vars or group_vars
    bgp_neighbors: []

    # DC Optimized Timers (3/10) to ensure sub-second failure detection
    bgp_timers:
      keepalive: 3
      hold: 10

  tasks:
    - name: "VALIDATION | Verify required input variables"
      ansible.builtin.assert:
        that:
          - bgp_as is defined
          - bgp_as | int > 0
          - bgp_as | int < 65536
        fail_msg: "FATAL: 'bgp_as' must be a valid ASN (1-65535). Specify with -e 'bgp_as=XXXX'."
        success_msg: "BGP ASN validated: {{ bgp_as }}"

    - name: "DEPLOYMENT | Configure BGP Underlay Infrastructure"
      block:
        - name: "INTERFACE | Configure Loopback and OSPF Underlay"
          cisco.nxos.nxos_config:
            lines:
              - description {{ loopback_underlay.description }}
              - ip address {{ loopback_underlay.ip }}
              - ip router ospf 1 area 0.0.0.0
            parents: interface {{ loopback_underlay.interface }}
          register: loopback_config
          # nxos_config used here to maintain atomic parent-child context for OSPF activation.

        - name: "BGP | Configure Global BGP Process and Router-ID"
          cisco.nxos.nxos_bgp_global:
            config:
              as_number: "{{ bgp_as }}"
              router_id: "{{ bgp_router_id }}"
            state: merged
          register: bgp_global_res

        - name: "BGP | Configure L2VPN EVPN Address Family Settings"
          cisco.nxos.nxos_bgp_address_family:
            config:
              as_number: "{{ bgp_as }}"
              address_family:
                - afi: l2vpn
                  safi: evpn
                  retain:
                    route_target: all
            state: merged
          register: bgp_af_res

        - name: "BGP | Configure Underlay Peering Neighbors"
          cisco.nxos.nxos_bgp_neighbor:
            config:
              as_number: "{{ bgp_as }}"
              neighbors:
                - neighbor_address: "{{ item.ip }}"
                  remote_as: "{{ item.remote_as }}"
                  description: "{{ item.description | default('BGP Neighbor') }}"
                  timers:
                    keepalive: "{{ bgp_timers.keepalive }}"
                    holdtime: "{{ bgp_timers.hold }}"
            state: merged
          loop: "{{ bgp_neighbors }}"
          when: bgp_neighbors | length > 0
          register: neighbor_res

        - name: "BGP | Activate L2VPN EVPN Address Family for Neighbors"
          cisco.nxos.nxos_bgp_neighbor_address_family:
            config:
              as_number: "{{ bgp_as }}"
              neighbors:
                - neighbor_address: "{{ item.ip }}"
                  address_family:
                    - afi: l2vpn
                      safi: evpn
                      activate: true
            state: merged
          loop: "{{ bgp_neighbors }}"
          when: bgp_neighbors | length > 0
          register: neighbor_af_res

      rescue:
        - name: "ERROR HANDLING | Capture failure details"
          ansible.builtin.debug:
            msg: |
              BGP Configuration failed on {{ inventory_hostname }}
              Task: {{ ansible_failed_task.name }}
              Error: {{ ansible_failed_result.msg | default('Unknown error encountered during execution') }}

        - name: "ERROR HANDLING | Halt execution on configuration failure"
          ansible.builtin.fail:
            msg: "Configuration failure detected. Manual review required for {{ inventory_hostname }}."

    - name: "VERIFICATION | Retrieve Operational BGP EVPN Status"
      cisco.nxos.nxos_command:
        commands:
          - show bgp l2vpn evpn summary
      register: bgp_verify
      changed_when: false
      failed_when: bgp_verify.failed

    - name: "VERIFICATION | Assert BGP Underlay Integrity"
      ansible.builtin.assert:
        that:
          - bgp_verify.stdout is defined
          - "'Neighbor' in bgp_verify.stdout[0] or bgp_neighbors | length == 0"
        fail_msg: "BGP L2VPN EVPN verification failed: Neighbor table not initialized."
        success_msg: "BGP Underlay successfully configured and verified on {{ inventory_hostname }}."

  always:
    - name: "PERSISTENCE | Save running configuration to startup-config"
      cisco.nxos.nxos_config:
        save_when: modified
      # Idempotent save: only writes to NVRAM if changes were detected in the running-config.