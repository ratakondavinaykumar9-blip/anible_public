---
- name: "Cisco Nexus 9000 VXLAN EVPN Fabric Deployment"
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  connection: network_cli
  vars:
    # --- Global Fabric Parameters ---
    fabric_as: 65001
    anycast_gateway_mac: "0000.beef.cafe"
    mtu_size: 9216
    
    # --- Underlay Routing (OSPF) ---
    ospf_process_id: 1
    ospf_area: "0.0.0.0"
    router_id: "{{ ansible_host }}"
    loopback0_ip: "10.0.0.1/32"
    vtep_loopback_ip: "10.0.0.11/32"
    
    # --- BGP Peerings (Spine/Leaf) ---
    bgp_neighbors:
      - address: "10.0.0.254"
        remote_as: 65001
        description: "Spine-01"
      - address: "10.0.0.253"
        remote_as: 65001
        description: "Spine-02"

    # --- Tenant/Segmentation Logic ---
    vrf_mappings:
      - name: "PRODUCTION"
        vni: 50001
        rd: "auto"
        rt: "both auto"
    
    vni_mappings:
      - vlan_id: 100
        vni_id: 10100
        vrf_name: "PRODUCTION"
        anycast_ip: "192.168.100.1/24"
        description: "Web_Tier"
      - vlan_id: 200
        vni_id: 10200
        vrf_name: "PRODUCTION"
        anycast_ip: "192.168.200.1/24"
        description: "App_Tier"

  tasks:
    - name: "VXLAN EVPN CONFIGURATION BLOCK"
      block:
        # --- PHASE 0: PRE-FLIGHT & SYSTEM DEFAULTS ---
        - name: "Enable Required NX-OS Features"
          cisco.nxos.nxos_feature:
            feature: "{{ item }}"
            state: enabled
          loop:
            - ospf
            - bgp
            - interface-vlan
            - nv overlay
            - vn-segment-vlan-based
          register: feature_activation
          # Why: Features must be enabled before any dependent configuration (like OSPF or BGP) can be parsed.

        - name: "Verify Feature Activation Success"
          ansible.builtin.assert:
            that: "not item.failed"
            fail_msg: "Failed to enable feature: {{ item.item }}"
          loop: "{{ feature_activation.results }}"
          quiet: true

        - name: "Configure Global System Parameters (MTU & Anycast MAC)"
          cisco.nxos.nxos_config:
            lines:
              - "system jumbomtu {{ mtu_size }}"
              - "fabric forwarding anycast-gateway-mac {{ anycast_gateway_mac }}"
          register: global_params
          # Why: Jumbo MTU (9216) accounts for VXLAN encapsulation overhead; Anycast MAC provides a unified gateway identity.

        # --- PHASE 1: UNDERLAY NETWORK (Loopbacks & OSPF) ---
        - name: "Configure Infrastructure Loopbacks"
          cisco.nxos.nxos_l3_interfaces:
            config:
              - name: Loopback0
                ipv4:
                  - address: "{{ loopback0_ip }}"
              - name: Loopback1
                ipv4:
                  - address: "{{ vtep_loopback_ip }}"
          register: loopback_config
          # Why: Loopback0 is the stable BGP Router-ID; Loopback1 is the VTEP Source (NVE IP).

        - name: "Initialize OSPF Process"
          cisco.nxos.nxos_ospf_vrf:
            config:
              processes:
                - process_id: "{{ ospf_process_id }}"
                  router_id: "{{ router_id | regex_replace('/.*', '') }}"
            state: merged
          register: ospf_proc
          # Why: Underlay routing establishes connectivity between all VTEP Loopbacks.

        - name: "Enable OSPF on Fabric Interfaces"
          cisco.nxos.nxos_ospfv2:
            config:
              processes:
                - process_id: "{{ ospf_process_id }}"
                  address_family:
                    - afi: ipv4
                      interfaces:
                        - name: "{{ item }}"
                          area: "{{ ospf_area }}"
                          network_type: point_to_point
          loop: "{{ fabric_interfaces | default([]) }}"
          when: fabric_interfaces is defined and fabric_interfaces | length > 0
          register: ospf_if_config

        # --- PHASE 2: BGP OVERLAY (EVPN CONTROL PLANE) ---
        - name: "Configure Global BGP and EVPN Address Family"
          cisco.nxos.nxos_bgp_global:
            config:
              as_number: "{{ fabric_as }}"
              router_id: "{{ router_id | regex_replace('/.*', '') }}"
              neighbor_log_neighbor_changes: true
              address_family:
                - afi: l2vpn
                  safi: evpn
            state: merged
          register: bgp_global_cfg
          # Why: BGP EVPN distributes MAC/IP reachability; router-id must be a stable Loopback.

        - name: "Configure iBGP EVPN Peering with Spines"
          cisco.nxos.nxos_bgp_neighbor_address_family:
            config:
              as_number: "{{ fabric_as }}"
              neighbor: "{{ item.address }}"
              address_family:
                - afi: l2vpn
                  safi: evpn
                  send_community:
                    both: true
            state: merged
          loop: "{{ bgp_neighbors }}"
          register: bgp_neighbor_cfg
          # Why: Communities are essential for EVPN Route-Target filtering across the fabric.

        # --- PHASE 3: TENANT SEGMENTATION (VRF & L3 VNI) ---
        - name: "Define Tenant VRFs and L3 VNIs"
          cisco.nxos.nxos_vrf:
            config:
              - name: "{{ item.name }}"
                vni: "{{ item.vni }}"
                rd: "{{ item.rd }}"
                address_family:
                  - afi: ipv4
                    route_target:
                      - rt: "{{ item.rt }}"
                        direction: both
          loop: "{{ vrf_mappings }}"
          register: vrf_setup
          # Why: L3 VNIs provide inter-subnet routing within the specific VRF container.

        - name: "Map VLANs to VNIs"
          cisco.nxos.nxos_vlan:
            config:
              - vlan_id: "{{ item.vlan_id }}"
                mapped_vni: "{{ item.vni_id }}"
                name: "{{ item.description }}"
                state: active
          loop: "{{ vni_mappings }}"
          register: vlan_vni_map
          # Why: Bridges traditional access-layer VLANs to the VXLAN overlay.

        # --- PHASE 4: NVE INTERFACE (DATA PLANE) ---
        - name: "Configure NVE1 Interface and VNI Membership"
          cisco.nxos.nxos_vxlan_vtep:
            config:
              interface: nve1
              source_interface: Loopback1
              host_reachability_protocol: bgp
              vni_members:
                - vni: "{{ item.vni_id }}"
                  mcast_group: "239.1.1.1"
                - vni: "{{ vrf_mappings[0].vni }}"
                  associate_vrf: true
          loop: "{{ vni_mappings }}"
          register: nve_interface
          # Why: NVE1 is the logical VTEP; member VNIs define which traffic is encapsulated.

        # --- PHASE 5: ANYCAST GATEWAYS (SVI) ---
        - name: "Configure Distributed Anycast Gateways"
          cisco.nxos.nxos_l3_interfaces:
            config:
              - name: "Vlan{{ item.vlan_id }}"
                ipv4:
                  - address: "{{ item.anycast_ip }}"
                vrf: "{{ item.vrf_name }}"
          loop: "{{ vni_mappings }}"
          register: svi_anycast
          # Why: SVI provides the first-hop gateway; VRF association ensures correct routing context.

        - name: "Enable Fabric Forwarding on SVIs"
          cisco.nxos.nxos_config:
            lines:
              - "interface Vlan{{ item.vlan_id }}"
              - "  fabric forwarding mode anycast-gateway"
          loop: "{{ vni_mappings }}"
          register: fabric_fwd_status
          # Why: Enables the "anycast-gateway" behavior allowing the same IP/MAC on all Leafs.

        - name: "Configure EVPN VNI Logic"
          cisco.nxos.nxos_evpn_vni:
            config:
              - vni: "{{ item.vni_id }}"
                route_distinguisher: "auto"
                route_target:
                  - rt: "auto"
                    direction: both
          loop: "{{ vni_mappings }}"
          register: evpn_vni_status
          # Why: Ties the L2 VNI to the BGP EVPN control plane for endpoint learning.

      rescue:
        - name: "FAILURE DETECTED: Capture State for Troubleshooting"
          cisco.nxos.nxos_command:
            commands:
              - "show bgp l2vpn evpn summary"
              - "show nve vni"
              - "show nve interface nve1 detail"
          register: failure_diagnostics
          ignore_errors: true

        - name: "Report Failure Reason"
          ansible.builtin.fail:
            msg: >
              VXLAN EVPN deployment failed on {{ inventory_hostname }}. 
              Diagnostic output: {{ failure_diagnostics.stdout_lines | default('No diagnostic data captured') }}

      always:
        - name: "Operational State Check"
          cisco.nxos.nxos_command:
            commands:
              - "show nve vni"
          register: nve_status
          ignore_errors: true
          # Why: Provides a final snapshot of the operational data plane state.

        - name: "Log Completion Status"
          ansible.builtin.debug:
            msg: "Playbook execution completed. Check NVE status: {{ nve_status.stdout | default('N/A') }}"