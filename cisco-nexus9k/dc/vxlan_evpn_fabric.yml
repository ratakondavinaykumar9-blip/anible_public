---
- name: "Cisco Nexus 9000 VXLAN EVPN Fabric Deployment"
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  connection: cisco.nxos.network_cli
  vars:
    # --- Global Fabric Parameters ---
    fabric_as: 65001
    anycast_gateway_mac: "0000.beef.cafe"
    mtu_size: 9216
    
    # --- Underlay Routing (OSPF) ---
    ospf_process_id: 1
    ospf_area: "0.0.0.0"
    router_id: "{{ ansible_host }}"
    loopback0_ip: "10.0.0.1/32"
    vtep_loopback_ip: "10.0.0.11/32"
    
    # --- BGP Peerings (Spine/Leaf) ---
    bgp_neighbors:
      - address: "10.0.0.254"
        remote_as: 65001
        description: "Spine-01"
      - address: "10.0.0.253"
        remote_as: 65001
        description: "Spine-02"

    # --- Tenant/Segmentation Logic ---
    vrf_mappings:
      - name: "PRODUCTION"
        vni: 50001
        rd: "auto"
        rt: "both auto"
    
    vni_mappings:
      - vlan_id: 100
        vni_id: 10100
        vrf_name: "PRODUCTION"
        anycast_ip: "192.168.100.1/24"
        description: "Web_Tier"
      - vlan_id: 200
        vni_id: 10200
        vrf_name: "PRODUCTION"
        anycast_ip: "192.168.200.1/24"
        description: "App_Tier"

  tasks:
    - name: "VXLAN EVPN CONFIGURATION BLOCK"
      block:
        # --- PHASE 0: PRE-FLIGHT & SYSTEM DEFAULTS ---
        # Features must be enabled before any dependent configuration can be applied.
        - name: "Enable Required NX-OS Features"
          cisco.nxos.nxos_feature:
            feature: "{{ item }}"
            state: enabled
          loop:
            - ospf
            - bgp
            - interface-vlan
            - nv overlay
            - vn-segment-vlan-based
          register: features_status

        - name: "Verify Feature Activation"
          ansible.builtin.assert:
            that:
              - not features_status.failed
            fail_msg: "Critical failure: Required NX-OS features could not be enabled."
            quiet: true

        # Global parameters like MTU and Anycast MAC are foundational for fabric forwarding.
        - name: "Configure Global System Parameters"
          cisco.nxos.nxos_config:
            lines:
              - "system jumbomtu {{ mtu_size }}"
              - "fabric forwarding anycast-gateway-mac {{ anycast_gateway_mac }}"
          register: system_config

        # --- PHASE 1: UNDERLAY NETWORK (Loopbacks & OSPF) ---
        # Loopback interfaces serve as stable endpoints for BGP and VTEP sourcing.
        - name: "Configure Infrastructure Loopbacks"
          cisco.nxos.nxos_l3_interfaces:
            config:
              - name: Loopback0
                ipv4:
                  - address: "{{ loopback0_ip }}"
              - name: Loopback1
                ipv4:
                  - address: "{{ vtep_loopback_ip }}"
          register: l3_int_status

        - name: "Initialize OSPF Process"
          cisco.nxos.nxos_ospf_vrf:
            config:
              processes:
                - process_id: "{{ ospf_process_id }}"
                  router_id: "{{ router_id | regex_replace('/.*', '') }}"
            state: merged
          register: ospf_vrf_status

        - name: "Enable OSPF on Fabric Interfaces"
          cisco.nxos.nxos_ospfv2:
            config:
              processes:
                - process_id: "{{ ospf_process_id }}"
                  address_family:
                    - afi: ipv4
                      interfaces:
                        - name: "{{ item }}"
                          area: "{{ ospf_area }}"
                          network_type: point_to_point
          loop: "{{ fabric_interfaces | default([]) }}"
          when: fabric_interfaces is defined
          register: ospf_if_status

        - name: "Verify Underlay Routing Stability"
          ansible.builtin.assert:
            that:
              - not l3_int_status.failed
              - not ospf_vrf_status.failed
            quiet: true

        # --- PHASE 2: BGP OVERLAY (EVPN CONTROL PLANE) ---
        # BGP EVPN handles the exchange of MAC and IP reachability information.
        - name: "Configure Global BGP and EVPN Address Family"
          cisco.nxos.nxos_bgp_global:
            config:
              as_number: "{{ fabric_as }}"
              router_id: "{{ router_id | regex_replace('/.*', '') }}"
              neighbor_log_neighbor_changes: true
              address_family:
                - afi: l2vpn
                  safi: evpn
            state: merged
          register: bgp_global_status

        - name: "Configure iBGP EVPN Peering with Spines"
          cisco.nxos.nxos_bgp_neighbor_address_family:
            config:
              as_number: "{{ fabric_as }}"
              neighbor: "{{ item.address }}"
              address_family:
                - afi: l2vpn
                  safi: evpn
                  send_community:
                    both: true
            state: merged
          loop: "{{ bgp_neighbors }}"
          register: bgp_neighbor_status

        # --- PHASE 3: TENANT SEGMENTATION (VRF & L3 VNI) ---
        # VRFs provide isolation, while L3 VNIs enable routing between different L2 segments.
        - name: "Define Tenant VRFs and L3 VNIs"
          cisco.nxos.nxos_vrf:
            config:
              - name: "{{ item.name }}"
                vni: "{{ item.vni }}"
                rd: "{{ item.rd }}"
                address_family:
                  - afi: ipv4
                    route_target:
                      - rt: "{{ item.rt }}"
                        direction: both
          loop: "{{ vrf_mappings }}"
          register: vrf_status

        - name: "Map VLANs to VNIs"
          cisco.nxos.nxos_vlan:
            config:
              - vlan_id: "{{ item.vlan_id }}"
                mapped_vni: "{{ item.vni_id }}"
                name: "{{ item.description }}"
                state: active
          loop: "{{ vni_mappings }}"
          register: vlan_status

        # --- PHASE 4: NVE INTERFACE (DATA PLANE) ---
        # The NVE interface is the logical encapsulation point for the VXLAN tunnel.
        - name: "Configure NVE1 Interface and VNI Membership"
          cisco.nxos.nxos_vxlan_vtep:
            config:
              interface: nve1
              source_interface: Loopback1
              host_reachability_protocol: bgp
              vni_members: "{{ nve_vni_list }}"
          vars:
            # Construct a unified list of L2 and L3 VNI members for idempotency.
            nve_vni_list: >-
              {% set members = [] %}
              {% for mapping in vni_mappings %}
              {%   set _ = members.append({'vni': mapping.vni_id, 'mcast_group': '239.1.1.1'}) %}
              {% endfor %}
              {% for vrf in vrf_mappings %}
              {%   set _ = members.append({'vni': vrf.vni, 'associate_vrf': true}) %}
              {% endfor %}
              {{ members }}
          register: nve_status

        # --- PHASE 5: ANYCAST GATEWAYS (SVI) ---
        # Distributed Anycast Gateway allows the same IP/MAC to exist on all leaves for seamless mobility.
        - name: "Configure Distributed Anycast Gateways"
          cisco.nxos.nxos_l3_interfaces:
            config:
              - name: "Vlan{{ item.vlan_id }}"
                ipv4:
                  - address: "{{ item.anycast_ip }}"
                vrf: "{{ item.vrf_name }}"
          loop: "{{ vni_mappings }}"
          register: svi_status

        - name: "Enable Fabric Forwarding on SVIs"
          cisco.nxos.nxos_config:
            lines:
              - "interface Vlan{{ item.vlan_id }}"
              - "  fabric forwarding mode anycast-gateway"
          loop: "{{ vni_mappings }}"
          register: fabric_fwd_status

        - name: "Configure EVPN VNI Logic"
          cisco.nxos.nxos_evpn_vni:
            config:
              - vni: "{{ item.vni_id }}"
                route_distinguisher: "auto"
                route_target:
                  - rt: "auto"
                    direction: both
          loop: "{{ vni_mappings }}"
          register: evpn_vni_status

        - name: "Final Operational State Verification"
          cisco.nxos.nxos_command:
            commands:
              - "show nve interface nve1"
              - "show nve vni"
          register: final_verification

        - name: "Assert NVE Interface is Up and Functional"
          ansible.builtin.assert:
            that:
              - "'nve1' in final_verification.stdout[0]"
              - "'Up' in final_verification.stdout[0]"
            fail_msg: "Data plane verification failed: NVE1 interface is not in Up state."
            quiet: true

      rescue:
        - name: "FAILURE DETECTED: Capture Diagnostics"
          cisco.nxos.nxos_command:
            commands:
              - "show bgp l2vpn evpn summary"
              - "show nve vni"
              - "show nve interface nve1 detail"
              - "show logging last 20"
          register: diagnostics

        - name: "Report Detailed Failure"
          ansible.builtin.fail:
            msg: >
              VXLAN EVPN deployment failed on {{ inventory_hostname }}. 
              Diagnostic output summary: {{ diagnostics.stdout_lines }}

      always:
        - name: "Operational State Check"
          cisco.nxos.nxos_command:
            commands:
              - "show nve vni"
          register: final_nve_summary
          ignore_errors: true

        - name: "Log Completion Status"
          ansible.builtin.debug:
            msg: >
              Deployment execution finished for {{ inventory_hostname }}. 
              Final NVE Summary: {{ final_nve_summary.stdout[0] | default('No status available') }}