MCP issues detected. Run /mcp list for status.---
- name: Production Deployment of Cisco Nexus 9k vPC Domain
  hosts: nexus_spine_agg
  gather_facts: false
  vars:
    # Global vPC Domain Settings
    vpc_domain_id: 10
    vpc_system_priority: 4096
    # Recommended: 10 for Primary, 20 for Secondary.
    # Lower priority wins the 'Primary' role in vPC election.
    vpc_role_priority: 10 
    vpc_pkl_vrf: "PKL-VRF"
    
    # Peer Keepalive (PKL) Networking
    # Must be unique per member and reachable via the designated VRF.
    vpc_pkl_src: ""   # Local PKL IP
    vpc_pkl_dest: ""  # Remote PKL IP
    vpc_pkl_intf: "Management0" 
    
    # Best Practice vPC Flags
    # peer-gateway: Allows local forwarding for packets destined to peer MAC.
    vpc_peer_gateway: true
    # peer-switch: Allows both switches to appear as a single STP root.
    vpc_peer_switch: true
    # auto-recovery: Restores vPC locally if peer stays down after reload.
    vpc_auto_recovery: true
    vpc_delay_restore: 150
    vpc_ipv6_nd_sync: true
    
    # Peer-Link Configuration
    vpc_peer_link_pc_id: 100
    vpc_peer_link_interfaces:
      - "Ethernet1/1"
      - "Ethernet1/2"
    # MTU 9216: Required for vPC control traffic and to avoid fragmentation.
    vpc_peer_link_mtu: 9216

  tasks:
    - name: "Pre-Flight: Validate Required Variables"
      ansible.builtin.assert:
        that:
          - vpc_pkl_src | length > 0
          - vpc_pkl_dest | length > 0
        fail_msg: "Variable Validation Failed: vpc_pkl_src and vpc_pkl_dest must be defined."

    - name: Execute vPC Domain Configuration Block
      block:
        - name: "Phase 0: Enable Required Features (Idempotent)"
          cisco.nxos.nxos_feature:
            feature: "{{ item }}"
            state: enabled
          loop:
            - vpc
            - lacp
          register: features_status

        - name: "Phase 1.1: Configure PKL VRF"
          cisco.nxos.nxos_vrf:
            name: "{{ vpc_pkl_vrf }}"
            description: "Dedicated VRF for vPC Peer-Keepalive"
            state: present
          register: vrf_status

        - name: "Phase 1.2: Configure PKL L3 Interface"
          # Ensures the L3 interface is correctly mapped to the VRF before IP assignment.
          cisco.nxos.nxos_l3_interfaces:
            config:
              - name: "{{ vpc_pkl_intf }}"
                ipv4:
                  - address: "{{ vpc_pkl_src }}/30"
                vrf: "{{ vpc_pkl_vrf }}"
            state: merged
          register: l3_intf_status

        - name: "Phase 2: Configure vPC Domain Parameters"
          # merged state ensures only required changes are pushed, maintaining idempotency.
          cisco.nxos.nxos_vpc_domain:
            domain: "{{ vpc_domain_id }}"
            peer_keepalive:
              dest: "{{ vpc_pkl_dest }}"
              src: "{{ vpc_pkl_src }}"
              vrf: "{{ vpc_pkl_vrf }}"
            role_priority: "{{ vpc_role_priority }}"
            system_priority: "{{ vpc_system_priority }}"
            peer_gateway: "{{ vpc_peer_gateway }}"
            peer_switch: "{{ vpc_peer_switch }}"
            auto_recovery: "{{ vpc_auto_recovery }}"
            delay_restore: "{{ vpc_delay_restore }}"
            ipv6_nd_sync: "{{ vpc_ipv6_nd_sync }}"
            state: merged
          register: vpc_domain_status

        - name: "Phase 3.1: Initialize Peer-Link Port-Channel"
          cisco.nxos.nxos_lag_interfaces:
            config:
              - name: "Port-channel{{ vpc_peer_link_pc_id }}"
                mode: active
            state: merged
          register: lag_init_status

        - name: "Phase 3.2: Configure Peer-Link Physical Interfaces"
          # Configuring MTU and description before bundling into Port-Channel.
          cisco.nxos.nxos_ethernet_interfaces:
            config:
              - name: "{{ item }}"
                mtu: "{{ vpc_peer_link_mtu }}"
                description: "vPC Peer-Link Member"
            state: merged
          loop: "{{ vpc_peer_link_interfaces }}"
          register: phys_intf_status

        - name: "Phase 3.3: Assign Physical Interfaces to Peer-Link Port-Channel"
          cisco.nxos.nxos_lag_interfaces:
            config:
              - name: "Port-channel{{ vpc_peer_link_pc_id }}"
                members:
                  - member: "{{ item }}"
                    mode: active
            state: merged
          loop: "{{ vpc_peer_link_interfaces }}"

        - name: "Phase 4: Designate Port-Channel as vPC Peer-Link"
          cisco.nxos.nxos_vpc_interface:
            config:
              - name: "Port-channel{{ vpc_peer_link_pc_id }}"
                peer_link: true
            state: merged
          register: vpc_intf_status

        - name: "Phase 5: Collect vPC Operational State"
          cisco.nxos.nxos_command:
            commands:
              - "show vpc brief"
              - "show vpc peer-keepalive"
          register: vpc_verify

        - name: "Phase 6: Observability - Assert Peer-Keepalive Status"
          ansible.builtin.assert:
            that:
              - "'peer is alive' in vpc_verify.stdout[1]"
            fail_msg: "Validation Failed: vPC Peer-Keepalive status is NOT 'alive'. Check PKL VRF and L3 connectivity."
            success_msg: "Validation Success: vPC Peer-Keepalive is active and reaching the neighbor."

      rescue:
        - name: "Phase 7: Diagnostic Collection on Failure"
          cisco.nxos.nxos_command:
            commands:
              - "show vpc brief"
              - "show vpc consistency-parameters global"
          register: vpc_diag
          ignore_errors: true

        - name: "Phase 8: Report Failure Diagnostics"
          ansible.builtin.debug:
            msg: 
              - "ERROR: vPC Deployment failed on {{ inventory_hostname }}"
              - "Diagnostics Output: {{ vpc_diag.stdout_lines | default('No diagnostics available') }}"
          
        - name: "Phase 9: Explicit Playbook Failure"
          ansible.builtin.fail:
            msg: "vPC Domain setup failed. Consult diagnostics in Phase 8 for vPC Type-1 inconsistencies."

      always:
        - name: "Phase 10: State Persistence and Backup"
          # 'save_when: modified' ensures we only write to startup-config if actual changes occurred.
          cisco.nxos.nxos_config:
            backup: true
            save_when: modified
          register: config_save_status
          ignore_errors: true