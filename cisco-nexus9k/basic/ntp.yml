---
# ==============================================================================
# Playbook: Configure NTP Settings on Nexus 9000
# ==============================================================================
# Standards Applied:
# 1. Idempotency: Uses NX-OS resource modules (state: merged) and line matching.
# 2. Observability: Registered results and assertions verify the desired state.
# 3. Documentation: Comments explain the rationale for module and logic choices.
# 4. Error Handling: Block/Rescue handles failures; Sync validation is non-blocking.
# 5. Best Practices: Uses Fully Qualified Collection Names (FQCN) throughout.
# ==============================================================================

- name: Configure NTP Time Synchronization
  hosts: nexus9k
  gather_facts: no
  connection: ansible.netcommon.network_cli

  vars:
    # Variables are typically defined in group_vars/nexus9k.yml
    ntp_server_list: "{{ ntp_servers | default([]) }}"
    ntp_vrf: management
    ntp_source_interface: mgmt0
    timezone_config: "{{ timezone | default('UTC 0 0') }}"
    save_config: true

  tasks:
    - name: NTP Configuration and Operational Validation
      block:
        - name: Configure Global NTP Source Interface
          # Using resource module for idempotent source interface configuration
          cisco.nxos.nxos_ntp_global:
            config:
              source_interface: "{{ ntp_source_interface }}"
            state: merged
          register: ntp_global_result

        - name: Configure NTP Servers
          # Iterating through servers with the resource module ensures each exists with the correct VRF context
          cisco.nxos.nxos_ntp_server:
            config:
              - server: "{{ item }}"
                vrf: "{{ ntp_vrf }}"
            state: merged
          loop: "{{ ntp_server_list }}"
          register: ntp_servers_result
          when: ntp_server_list | length > 0

        - name: Configure Clock Timezone
          # nxos_config with 'match line' ensures this specific setting is idempotent
          cisco.nxos.nxos_config:
            lines:
              - "clock timezone {{ timezone_config }}"
            match: line
          register: timezone_result

        - name: Verify Configuration Success
          # Assertions provide immediate feedback if any configuration step failed
          ansible.builtin.assert:
            that:
              - ntp_global_result is not failed
              - timezone_result is not failed
            fail_msg: "NTP Global or Timezone configuration failed on {{ inventory_hostname }}."

        - name: Wait for NTP Synchronization
          # Operational check to verify the device has reached a synchronized state with peers
          cisco.nxos.nxos_command:
            commands:
              - show ntp peer-status
          register: ntp_status
          retries: 12
          delay: 10
          until:
            - ntp_status.stdout[0] is search('\*') or ntp_status.stdout[0] is search('synchronized')
          # ignore_errors is used as synchronization may take longer than the playbook duration
          ignore_errors: yes
          changed_when: false

      rescue:
        - name: Log Critical Failure
          # Rescue block ensures failures are logged clearly before the play terminates
          ansible.builtin.debug:
            msg: "CRITICAL: NTP configuration failed on {{ inventory_hostname }}. Verify VRF and network reachability."
          failed_when: true

      always:
        - name: Persist Changes to Startup-Config
          # save_when: modified ensures we only write to NVRAM if there is a pending difference
          cisco.nxos.nxos_config:
            save_when: modified
          when: save_config | bool

    - name: Final NTP Status Summary
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          timezone: "{{ timezone_config }}"
          servers: "{{ ntp_server_list }}"
          sync_attained: "{{ 'Yes' if ntp_status is success else 'Pending' }}"