---
# DNS Configuration for Cisco Nexus 9000 Switches
# Improved by NetLearner Architect
# This playbook ensures consistent DNS and domain-name settings using idempotent resource modules.

- name: Configure DNS Settings
  hosts: nexus9k
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # VRF context for DNS, typically 'management' or 'default'
    dns_vrf: management
    # Using the variable names from the original playbook for compatibility
    dns_domain_name: "{{ dns_domain }}"
    # Constructing a list of server dictionaries for the nxos_dns resource module
    target_servers:
      - server: "{{ dns_servers.primary }}"
        vrf: "{{ dns_vrf }}"
      - server: "{{ dns_servers.secondary }}"
        vrf: "{{ dns_vrf }}"

  tasks:
    - name: Manage DNS servers and domain name
      # cisco.nxos.nxos_dns is used for idempotency (Resource Module approach)
      # It ensures the state of the device matches the defined parameters
      cisco.nxos.nxos_dns:
        domain_name: "{{ dns_domain_name }}"
        servers: "{{ target_servers }}"
        state: merged
      register: dns_config_result
      # Observability: Notify the handler to save only when changes are detected
      notify: Save NX-OS Configuration

    - name: Audit DNS operational configuration
      # Retrieve the running configuration to verify the changes were applied correctly
      cisco.nxos.nxos_command:
        commands:
          - show run | include "ip name-server|ip domain-name"
      register: operational_dns
      changed_when: false

    - name: Validate DNS configuration integrity
      # Assert ensures that the intended configuration is reflected in the device output
      ansible.builtin.assert:
        that:
          - "dns_domain_name in operational_dns.stdout[0]"
          - "dns_servers.primary in operational_dns.stdout[0]"
          - "dns_servers.secondary in operational_dns.stdout[0]"
        fail_msg: "DNS Validation Failed: Configuration missing from running-config on {{ inventory_hostname }}"
        success_msg: "DNS Validation Succeeded: All settings verified on {{ inventory_hostname }}"
      # Error Handling: Validation is critical for network reachability
      ignore_errors: false

  handlers:
    - name: Save NX-OS Configuration
      # Persists the running-config to startup-config using FQCN
      cisco.nxos.nxos_config:
        save: true
...