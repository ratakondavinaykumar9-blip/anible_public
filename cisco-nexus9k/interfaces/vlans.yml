# VLAN Configuration for Nexus 9000
# Production-ready playbook with rigorous validation and idempotent state management.
# Improved by: NetLearner Architect
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Configure and Validate Cisco Nexus VLANs
  hosts: nexus9k
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # Centralized VLAN definitions to ensure source-of-truth consistency across the network.
    vlans:
      - { vlan_id: 10, name: 'WEB_SERVERS', state: 'present' }
      - { vlan_id: 20, name: 'APP_SERVERS', state: 'present' }
      - { vlan_id: 30, name: 'DB_SERVERS', state: 'present' }
      - { vlan_id: 40, name: 'MGMT', state: 'present' }
      - { vlan_id: 50, name: 'STORAGE', state: 'present' }
      - { vlan_id: 60, name: 'DMZ', state: 'present' }
      - { vlan_id: 99, name: 'QUARANTINE', state: 'present' }

  tasks:
    - name: "NXOS VLAN | Apply Desired VLAN State"
      # Why: Uses Fully Qualified Collection Names (FQCN) and idempotent module logic.
      # Idempotency: The module compares running-config vs intent and only pushes required changes.
      cisco.nxos.nxos_vlan:
        vlan_id: "{{ item.vlan_id }}"
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop: "{{ vlans }}"
      register: vlan_config
      # Error Handling: Module fails natively on connectivity or syntax errors; register captures results for persistence check.

    - name: "NXOS VLAN | Gather Operational Verification"
      # Why: Independent control-plane interrogation to verify hardware/software synchronization.
      cisco.nxos.nxos_command:
        commands:
          - show vlan brief
      register: vlan_verify
      changed_when: false
      # Error Handling: Explicitly fail if the device fails to return the operational VLAN database.
      failed_when: vlan_verify is failed

    - name: "NXOS VLAN | Assert Operational Integrity"
      # Why: Observability - Uses regex to confirm both VLAN ID and Name are correctly applied and active.
      # Verification: Ensures the automation isn't just "passing" but actually achieved the intended state on the box.
      ansible.builtin.assert:
        that:
          - "vlan_verify.stdout[0] | regex_search('\\b' ~ item.vlan_id ~ '\\b.*' ~ item.name)"
        fail_msg: "CRITICAL: VLAN {{ item.vlan_id }} ({{ item.name }}) validation failed on {{ inventory_hostname }}!"
        success_msg: "VERIFIED: VLAN {{ item.vlan_id }} ({{ item.name }}) is operational."
      loop: "{{ vlans | selectattr('state', 'equalto', 'present') | list }}"
      loop_control:
        label: "VLAN_{{ item.vlan_id }}"

    - name: "NXOS CONFIG | Persist Changes to Startup"
      # Why: Idempotency - Only executes 'copy running-config startup-config' if a state change was detected.
      cisco.nxos.nxos_config:
        save_when: changed
      when: vlan_config.changed
      register: save_status

    - name: "NXOS VLAN | Execution Summary"
      # Why: Observability - Provides a clear audit-ready summary of the configuration outcome for logs.
      ansible.builtin.debug:
        msg:
          - "VLAN Automation Summary for {{ inventory_hostname }}"
          - "Total VLANs Processed: {{ vlans | length }}"
          - "State Change Detected: {{ vlan_config.changed }}"
          - "Persistence Status: {{ 'Configuration Saved' if (save_status.changed | default(false)) else 'No Save Required' }}"