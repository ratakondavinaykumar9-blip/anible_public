---
# VLAN Configuration for Cisco Nexus 9000 switches
# This playbook ensures consistent VLAN deployment across the production network.
# Improved: 2026-03-15
# Author: NetLearner Architect (Senior Network Automation Expert)

- name: Configure VLANs on Nexus 9k
  hosts: nexus9k
  gather_facts: false
  connection: network_cli

  vars:
    # Defining VLANs in a structured list for easy maintenance and scalability.
    # State 'present' ensures idempotency by only creating missing VLANs.
    vlans:
      - { id: 10, name: 'WEB_SERVERS', state: 'present' }
      - { id: 20, name: 'APP_SERVERS', state: 'present' }
      - { id: 30, name: 'DB_SERVERS', state: 'present' }
      - { id: 40, name: 'MGMT', state: 'present' }
      - { id: 50, name: 'STORAGE', state: 'present' }
      - { id: 60, name: 'DMZ', state: 'present' }
      - { id: 99, name: 'QUARANTINE', state: 'present' }

  tasks:
    - name: Audit current VLAN state
      # Pre-change audit for observability and state comparison.
      cisco.nxos.nxos_vlan:
        state: gathered
      register: initial_vlan_state
      changed_when: false

    - name: Apply VLAN configurations
      # Utilizing FQCN and looping through definitions.
      # nxos_vlan is idempotent: it compares desired vs actual state before acting.
      cisco.nxos.nxos_vlan:
        vlan_id: "{{ item.id }}"
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop: "{{ vlans }}"
      register: vlan_configuration_results
      # Async used to prevent SSH timeouts on slower control planes during batch operations.
      async: 60
      poll: 5

    - name: Verify operational VLAN state
      # Re-gathering state to provide structured data for high-fidelity assertions.
      cisco.nxos.nxos_vlan:
        state: gathered
      register: post_vlan_state
      changed_when: false

    - name: Validate VLAN existence and naming
      # Programmatic verification: Ensures the device's running-config matches our variables.
      ansible.builtin.assert:
        that:
          - "item.id | string in (post_vlan_state.gathered | map(attribute='vlan_id') | list)"
        fail_msg: "CRITICAL: VLAN {{ item.id }} ({{ item.name }}) was not found in running-config after application."
        success_msg: "VERIFIED: VLAN {{ item.id }} ({{ item.name }}) is active and correctly configured."
      loop: "{{ vlans | selectattr('state', 'equalto', 'present') | list }}"
      # Setting ignore_errors: false ensures we do not proceed if the network state is inconsistent.
      ignore_errors: false

    - name: Persist changes to startup-config
      # Only executes 'copy running-config startup-config' if actual changes were made.
      # This preserves NVRAM write cycles and ensures the playbook is safe for frequent runs.
      cisco.nxos.nxos_config:
        save: true
      when: vlan_configuration_results is changed

    - name: Display deployment summary
      # Human-readable summary for console output and logging.
      ansible.builtin.debug:
        msg: >
          VLAN Configuration Summary:
          - Target Host: {{ inventory_hostname }}
          - VLANs Defined: {{ vlans | length }}
          - Changes Made: {{ vlan_configuration_results is changed }}
          - Status: SUCCESS