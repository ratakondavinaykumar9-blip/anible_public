---
# Trunk Port Configuration for Cisco Nexus 9000 Series
# Standards: Idempotency, Observability, and FQCN Compliance
# Author: NetLearner Architect

- name: Configure Trunk Ports
  hosts: nexus9k
  gather_facts: no
  connection: ansible.netcommon.network_cli

  vars:
    # Centralized interface data structure for scalability and readability
    trunk_interfaces:
      - { name: 'Ethernet1/1', description: 'Trunk to Spine-01', vlans: '10,20,30,40,50', native: 99 }
      - { name: 'Ethernet1/2', description: 'Trunk to Spine-02', vlans: '10,20,30,40,50', native: 99 }
      - { name: 'Ethernet1/3', description: 'Trunk to Core-Router', vlans: '10,20,30', native: 99 }
    interface_enabled: true
    # Speed/Duplex parameters preserved for future requirements
    speed: 'auto'
    duplex: 'auto'

  tasks:
    - name: "L1/L2 CONFIGURATION | Apply Interface Attributes"
      block:
        - name: "CONFIG | Set Description and Admin State"
          cisco.nxos.nxos_interface:
            name: "{{ item.name }}"
            description: "{{ item.description }}"
            enabled: "{{ interface_enabled }}"
            state: present
          loop: "{{ trunk_interfaces }}"
          register: reg_interface_config
          # Ensures physical port settings are idempotent and documented

        - name: "CONFIG | Configure Switchport Trunk Mode"
          cisco.nxos.nxos_l2_interface:
            name: "{{ item.name }}"
            mode: trunk
            trunk_allowed_vlans: "{{ item.vlans }}"
            trunk_native_vlan: "{{ item.native }}"
            state: present
          loop: "{{ trunk_interfaces }}"
          register: reg_l2_config
          # Idempotently ensures trunking parameters match the source of truth

      rescue:
        - name: "ERROR | Handle Configuration Failure"
          ansible.builtin.fail:
            msg: "Playbook failed during configuration phase. Check network connectivity or credentials."

    - name: "VERIFICATION | Gather Operational State"
      cisco.nxos.nxos_command:
        commands:
          - command: "show interface {{ item.name }} switchport"
            output: text
      loop: "{{ trunk_interfaces }}"
      register: reg_trunk_verify
      changed_when: false
      # Observability: Pulling real-time state to verify intent vs reality

    - name: "ASSERT | Validate Trunk Operational Status"
      ansible.builtin.assert:
        that:
          - "'Operational Mode: trunk' in reg_trunk_verify.results[ansible_loop_index].stdout[0]"
          - "'Trunking Native Mode VLAN: {{ item.native }}' in reg_trunk_verify.results[ansible_loop_index].stdout[0]"
        fail_msg: "Validation FAILED for {{ item.name }}: Operational state does not match configuration."
        success_msg: "Validation PASSED for {{ item.name }}."
      loop: "{{ trunk_interfaces }}"
      loop_control:
        index_var: ansible_loop_index
      # Observability: Automated check to ensure the switch accepted the configuration correctly

    - name: "PERSIST | Save Running Configuration"
      cisco.nxos.nxos_config:
        save_when: changed
      when: 
        - not ansible_check_mode
        - (reg_interface_config is changed) or (reg_l2_config is changed)
      # Best Practice: Only trigger a write-memory if a change was actually performed

    - name: "SUMMARY | Display Deployment Results"
      ansible.builtin.debug:
        msg:
          - "Deployment Summary for {{ inventory_hostname }}:"
          - "Interfaces Processed: {{ trunk_interfaces | length }}"
          - "Configuration Change Detected: {{ (reg_interface_config is changed) or (reg_l2_config is changed) }}"
      when: not ansible_check_mode
---