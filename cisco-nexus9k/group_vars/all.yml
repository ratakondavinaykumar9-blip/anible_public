MCP issues detected. Run /mcp list for status.---
- name: Nexus 9000 Global Configuration Compliance
  hosts: nexus_switches
  gather_facts: false
  vars:
    # NTP Servers
    ntp_servers:
      - 10.1.1.1
      - 10.1.1.2

    # DNS Configuration
    dns_servers:
      primary: 10.1.1.10
      secondary: 10.1.1.11
    dns_domain: corp.local

    # SNMP Configuration
    snmp:
      contact: "Network Operations - noc@corp.local"
      location: "Data Center - Site 01"
      community_ro: "public-ro"
      community_rw: "private-rw"
      traps:
        - 10.1.1.100
        - 10.1.1.101

    # Syslog Configuration
    syslog_servers:
      - 10.1.1.50
      - 10.1.1.51

    # Management VLAN
    mgmt_vlan: 999
    mgmt_interface: mgmt0

    # Default Gateway
    default_gateway: 10.1.1.254

    # AAA Configuration
    aaa_servers:
      tacacs:
        - host: 10.1.1.20
          key: "{{ vault_tacacs_key }}"
          timeout: 10
      radius:
        - host: 10.1.1.21
          key: "{{ vault_radius_key }}"
          timeout: 10

    # Standard Users (remove default admin in production)
    default_users:
      - name: netadmin
        role: network-admin
        sshkey: "{{ vault_netadmin_sshkey }}"
      - name: netops
        role: network-operator
        sshkey: "{{ vault_netops_sshkey }}"

    # Banner Configuration
    banners:
      motd: |
        ** AUTHORIZED ACCESS ONLY **
        This system is for authorized users only.
        All activities are logged and monitored.
        Unauthorized access is prohibited.
      login: |
        ** Nexus 9000 Switch - Corp Network **
        Unauthorized access is prohibited.

    # Backup Settings
    backup:
      path: /opt/backup/nexus9k
      retention_days: 90
      pre_change: true

    # Timezone
    timezone: UTC

  tasks:
    - name: Ensure DNS Configuration is Present
      cisco.nxos.nxos_dns:
        domain: "{{ dns_domain }}"
        servers:
          - "{{ dns_servers.primary }}"
          - "{{ dns_servers.secondary }}"
        state: present
      register: dns_config
      # Why: Critical for resolving central services like NTP and Syslog by FQDN.

    - name: Verify DNS Configuration
      ansible.builtin.assert:
        that:
          - dns_config is not failed
        msg: "DNS configuration failed. Verify connectivity to name servers."

    - name: Configure NTP Servers for Time Synchronization
      cisco.nxos.nxos_ntp_servers:
        server: "{{ item }}"
        state: present
      loop: "{{ ntp_servers }}"
      register: ntp_config
      # Why: Ensures consistent timestamps across the fleet for security audit trails.

    - name: Configure Global SNMP Properties
      cisco.nxos.nxos_snmp:
        contact: "{{ snmp.contact }}"
        location: "{{ snmp.location }}"
      register: snmp_global
      # Why: Essential for asset tracking and incident response metadata.

    - name: Configure External Syslog Servers
      cisco.nxos.nxos_logging:
        dest: server
        name: "{{ item }}"
        state: present
      loop: "{{ syslog_servers }}"
      register: syslog_config
      # Why: Externalizing logs is a production requirement for security compliance.

    - name: Provision Standard Administrative Users
      cisco.nxos.nxos_user:
        name: "{{ item.name }}"
        role: "{{ item.role }}"
        sshkey: "{{ item.sshkey }}"
        state: present
      loop: "{{ default_users }}"
      register: user_provisioning
      # Why: Enforces RBAC and uses SSH keys to eliminate password-based vulnerabilities.

    - name: Verify User Creation
      ansible.builtin.assert:
        that:
          - user_provisioning is successful
        msg: "User creation failed. Ensure SSH keys are correctly vaulted."

    - name: Configure Legal Banners (MOTD/Login)
      cisco.nxos.nxos_banner:
        banner: "{{ item.key }}"
        text: "{{ item.value }}"
        state: present
      loop: "{{ banners | dict2items }}"
      register: banner_config
      # Why: Notifies unauthorized users of monitoring policies for legal protection.

    - name: Configure AAA TACACS+ Servers
      cisco.nxos.nxos_aaa_server:
        server_type: tacacs
        address: "{{ item.host }}"
        key: "{{ item.key }}"
        timeout: "{{ item.timeout }}"
        state: present
      loop: "{{ aaa_servers.tacacs }}"
      register: aaa_config
      # Why: Centralized authentication ensures unified access control across the network.

    - name: Configure Global Timezone
      cisco.nxos.nxos_config:
        lines:
          - "clock timezone {{ timezone }} 0 0"
      register: timezone_config
      # Why: Synchronizes local time display with global operations standards.

    - name: Perform Final Configuration Backup
      cisco.nxos.nxos_config:
        backup: "{{ backup.pre_change }}"
        backup_options:
          filename: "{{ inventory_hostname }}_prod_global.txt"
          dir_path: "{{ backup.path }}"
      when: backup.pre_change | bool
      register: backup_status
      # Why: Provides a known-good recovery point immediately after applying changes.

    - name: Validate Deployment Success
      ansible.builtin.assert:
        that:
          - not backup_status.failed | default(false)
        msg: "Deployment completed but backup failed. Verify write permissions on {{ backup.path }}."