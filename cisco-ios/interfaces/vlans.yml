# VLAN Configuration for Cisco IOS/IOS-XE
# This playbook ensures consistent VLAN states across the network infrastructure.
# Adheres to NetLearner standards for Idempotency, Observability, and Error Handling.

- name: Configure VLANs on IOS Switches
  hosts: cisco_ios
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # Define the desired state for VLANs. 
    # Using a list of dictionaries allows for easy expansion and lifecycle management.
    vlans:
      - { id: 10, name: 'WEB_SERVERS', state: 'present' }
      - { id: 20, name: 'APP_SERVERS', state: 'present' }
      - { id: 30, name: 'DB_SERVERS', state: 'present' }
      - { id: 40, name: 'MGMT_NETWORK', state: 'present' }
      - { id: 50, name: 'STORAGE', state: 'present' }
      - { id: 60, name: 'DMZ', state: 'present' }
      - { id: 100, name: 'USER_DATA', state: 'present' }
      - { id: 200, name: 'VOICE', state: 'present' }
      - { id: 999, name: 'NATIVE_VLAN', state: 'present' }

    # VLAN pruning - defined for audit and potential interface-level tasks
    trunk_vlans: "10,20,30,40,50,60,100,200"
    secure_trunk: true

  tasks:
    - name: Pre-change Backup
      # Always perform a backup before modification to ensure a reliable recovery path.
      cisco.ios.ios_config:
        backup: true
        backup_path: "./backups/ios/{{ inventory_hostname }}/"
      register: backup_result
      # ignore_errors is used as backup directory issues should not block network configuration
      # in environments where local storage is non-critical for the deployment flow.
      ignore_errors: true

    - name: Collect Current VLAN State
      # Gather existing device state for pre-check validation and observability.
      cisco.ios.ios_command:
        commands: show vlan brief
      register: current_vlans
      changed_when: false

    - name: Execute VLAN Configuration
      # Grouping configuration within a block allows for centralized error handling and rollback logic.
      block:
        - name: Configure Desired VLANs
          # cisco.ios.ios_vlan is inherently idempotent; it only pushes commands if the state differs.
          cisco.ios.ios_vlan:
            vlan_id: "{{ item.id }}"
            name: "{{ item.name }}"
            state: "{{ item.state }}"
          loop: "{{ vlans }}"
          register: vlan_config

      rescue:
        - name: Configuration Failure Detected
          ansible.builtin.debug:
            msg: "Critical error encountered during VLAN configuration on {{ inventory_hostname }}. Initiating rollback."

        - name: Rollback Configuration
          # Automatically attempt to restore the device to its known-good state using the pre-change backup.
          cisco.ios.ios_config:
            src: "{{ backup_result.backup_path }}"
          when: backup_result.backup_path is defined
          register: rollback_status

        - name: Fail Playbook After Rescue
          ansible.builtin.fail:
            msg: "Playbook execution failed on {{ inventory_hostname }}. Rollback was attempted."

    - name: Verify Post-Configuration State
      # Post-change validation ensures the device control plane reflects the intended architecture.
      cisco.ios.ios_command:
        commands: show vlan brief
      register: verify_vlans
      changed_when: false

    - name: Validate VLAN Existence
      # Observability: verify that each 'present' VLAN is actually active on the hardware.
      ansible.builtin.assert:
        that:
          - "item.id | string in verify_vlans.stdout[0]"
        fail_msg: "VLAN {{ item.id }} ({{ item.name }}) was not found in the running configuration."
        success_msg: "VLAN {{ item.id }} ({{ item.name }}) verified successfully."
      loop: "{{ vlans | selectattr('state', 'equalto', 'present') | list }}"
      when: not ansible_check_mode

    - name: Persist Changes to Startup Config
      # Idempotency: only trigger a write-memory operation if actual changes were applied.
      cisco.ios.ios_config:
        save: true
      when: vlan_config is changed

    - name: Final Configuration Summary
      # Human-readable summary for audit logs and observability during automated execution.
      ansible.builtin.debug:
        msg:
          - "Summary for Host: {{ inventory_hostname }}"
          - "Total VLANs Managed: {{ vlans | length }}"
          - "Configuration Changed: {{ vlan_config is changed }}"
          - "Policy Compliance: {{ 'Secure Trunking Active' if secure_trunk else 'Default Trunking' }}"