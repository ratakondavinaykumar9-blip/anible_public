---
# VLAN Configuration for Cisco IOS/IOS-XE
# Improved by Architect:# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN

- name: Configure VLANs on Cisco IOS Switches
  hosts: cisco_ios
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    vlans:
      - { id: 10, name: 'WEB_SERVERS', state: 'present' }
      - { id: 20, name: 'APP_SERVERS', state: 'present' }
      - { id: 30, name: 'DB_SERVERS', state: 'present' }
      - { id: 40, name: 'MGMT_NETWORK', state: 'present' }
      - { id: 50, name: 'STORAGE', state: 'present' }
      - { id: 60, name: 'DMZ', state: 'present' }
      - { id: 100, name: 'USER_DATA', state: 'present' }
      - { id: 200, name: 'VOICE', state: 'present' }
      - { id: 999, name: 'NATIVE_VLAN', state: 'present' }

    # VLAN pruning - which VLANs to allow on trunks
    trunk_vlans: "10,20,30,40,50,60,100,200"

    # Security: Remove default VLAN 1 from trunks if requested
    secure_trunk: true

  tasks:
    - name: 1. Backup current configuration
      # Why: Ensures a recovery point exists before any configuration changes are applied.
      # Idempotency: Always runs if not in check mode to ensure fresh backup for each run.
      cisco.ios.ios_config:
        backup: yes
        backup_path: "/opt/backup/ios/{{ inventory_hostname }}/"
      register: backup_result
      when: not ansible_check_mode

    - name: 2. Get current VLAN state
      # Why: Establishes baseline state for logging and validation purposes.
      # Observability: Result registered for pre-change comparison.
      cisco.ios.ios_command:
        commands: "show vlan brief"
      register: current_vlans
      changed_when: false

    - name: 3. Configure VLANs with Error Handling
      # Why: Block/Rescue pattern ensures that if configuration fails, we can attempt automated recovery.
      block:
        - name: Create or update VLANs
          # Why: cisco.ios.ios_vlan is idempotent and ensures the desired state of each VLAN.
          # Best Practice: Using FQCN and registered output for observability.
          cisco.ios.ios_vlan:
            vlan_id: "{{ item.id }}"
            name: "{{ item.name }}"
            state: "{{ item.state }}"
          loop: "{{ vlans }}"
          register: vlan_config_results

      rescue:
        - name: 4. Report VLAN configuration failure
          # Why: Provide immediate visibility into failure during the playbook execution.
          ansible.builtin.debug:
            msg: "VLAN configuration failed on {{ inventory_hostname }}. Initiating rollback."

        - name: 5. Attempt rollback to previous configuration
          # Why: Automate recovery by pushing the backup config if the implementation block fails.
          cisco.ios.ios_config:
            src: "{{ backup_result.backup_path }}"
          when: backup_result.backup_path is defined
          register: rollback_result

        - name: 6. Halt execution
          # Why: Ensure the playbook stops and marks the host as failed after a rescue operation.
          ansible.builtin.fail:
            msg: "Critical failure during VLAN configuration. Rollback was attempted using {{ backup_result.backup_path | default('unknown') }}."

    - name: 7. Post-Configuration Verification
      # Why: Confirm the device's actual state after the configuration block completes.
      cisco.ios.ios_command:
        commands: "show vlan brief"
      register: verify_vlans
      changed_when: false

    - name: 8. Validate VLAN compliance
      # Why: Programmatic assertion that the requested state was actually reached on the device.
      # Observability: Uses registered command output for truth-checking.
      ansible.builtin.assert:
        that:
          - "item.id | string in verify_vlans.stdout[0]"
        fail_msg: "VLAN {{ item.id }} ({{ item.name }}) was not found in the running configuration."
        success_msg: "VLAN {{ item.id }} verified on {{ inventory_hostname }}."
      loop: "{{ vlans }}"
      when: 
        - item.state == 'present'
        - not ansible_check_mode

    - name: 9. Save running configuration
      # Why: Best Practice: Only save to NVRAM if changes were successfully made to the device.
      # Idempotency: save_when: changed ensures we don't write to flash unnecessarily.
      cisco.ios.ios_config:
        save_when: changed
      register: save_status

    - name: 10. Display execution summary
      # Why: Provides a human-readable end-of-run report for the automation engineer.
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "VLAN Changes: {{ 'Applied' if vlan_config_results is changed else 'None' }}"
          - "Backup: {{ backup_result.backup_path | default('Skipped/Check Mode') }}"
          - "Status: Success/Verified"