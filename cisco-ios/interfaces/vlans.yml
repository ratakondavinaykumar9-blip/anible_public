---
# VLAN Configuration for Cisco IOS/IOS-XE
# This playbook ensures that defined VLANs exist on the target devices,
# provides pre-change backups for rollback capability, and validates state post-execution.

- name: Configure VLANs on IOS Switches
  hosts: cisco_ios
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # Defining VLANs in a structured list for easy maintenance and iteration.
    # We use 'state' to allow for easy decommissioning of VLANs in the future.
    vlans:
      - { id: 10, name: 'WEB_SERVERS', state: 'present' }
      - { id: 20, name: 'APP_SERVERS', state: 'present' }
      - { id: 30, name: 'DB_SERVERS', state: 'present' }
      - { id: 40, name: 'MGMT_NETWORK', state: 'present' }
      - { id: 50, name: 'STORAGE', state: 'present' }
      - { id: 60, name: 'DMZ', state: 'present' }
      - { id: 100, name: 'USER_DATA', state: 'present' }
      - { id: 200, name: 'VOICE', state: 'present' }
      - { id: 999, name: 'NATIVE_VLAN', state: 'present' }

    # VLAN pruning - intended for interface trunk configuration (Reserved)
    trunk_vlans: "10,20,30,40,50,60,100,200"

    # Security best practice: Prepare to remove default VLAN 1 from trunks (Reserved)
    secure_trunk: true

  tasks:
    - name: "[PRE-CHECK] Backup current configuration"
      # Create a recovery point before making any modifications to the production state.
      cisco.ios.ios_config:
        backup: true
        backup_path: "./backups/ios/{{ inventory_hostname }}/"
      register: backup_result
      # Backup is skipped in check mode to avoid creating empty/misleading backup artifacts.
      when: not ansible_check_mode

    - name: "[PRE-CHECK] Gather current VLAN state"
      # Capturing initial state for visibility and potential logic branching.
      cisco.ios.ios_command:
        commands: show vlan brief
      register: pre_vlan_state
      changed_when: false

    - name: "[CONFIG] Apply VLAN configuration"
      # Block/Rescue provides a robust error handling and rollback mechanism.
      block:
        - name: "Ensure VLANs are configured as defined"
          # ios_vlan is idempotent; it only sends commands if the device state differs.
          cisco.ios.ios_vlan:
            vlan_id: "{{ item.id }}"
            name: "{{ item.name }}"
            state: "{{ item.state | default('present') }}"
          loop: "{{ vlans }}"
          register: vlan_config

      rescue:
        - name: "[RECOVERY] Report configuration failure"
          ansible.builtin.debug:
            msg: "VLAN configuration failed on {{ inventory_hostname }}. Initiating rollback..."

        - name: "[RECOVERY] Restore configuration from backup"
          # Rollback to the pre-change state captured in the first task.
          cisco.ios.ios_config:
            src: "{{ backup_result.shortname }}"
          when: backup_result is defined and backup_result.shortname is defined
          
        - name: "[RECOVERY] Terminate playbook with failure"
          # Ensure the failure is correctly reported to the orchestrator after rollback.
          ansible.builtin.fail:
            msg: "Configuration failed and rollback was attempted. Check logs for details."

    - name: "[POST-CHECK] Verify VLAN existence"
      # Operational verification to ensure the data plane matches the control plane intent.
      cisco.ios.ios_command:
        commands: show vlan brief
      register: verify_vlans
      changed_when: false

    - name: "[POST-CHECK] Validate all VLANs exist"
      # Use assertions to enforce the 'present' state requirement.
      ansible.builtin.assert:
        that:
          - "item.id | string in verify_vlans.stdout[0]"
        fail_msg: "VLAN {{ item.id }} ({{ item.name }}) was not found in the database!"
        success_msg: "VLAN {{ item.id }} ({{ item.name }}) verification successful."
      loop: "{{ vlans | selectattr('state', 'equalto', 'present') | list }}"
      # Skip validation in check mode as no changes were actually applied.
      when: not ansible_check_mode

    - name: "[PERSISTENCE] Save running configuration"
      # Only save to startup-config if actual changes were detected.
      cisco.ios.ios_config:
        save_when: changed
      # Using 'is changed' correctly handles the registered loop result dictionary.
      when: vlan_config is changed and not ansible_check_mode

    - name: "[SUMMARY] Display VLAN deployment results"
      ansible.builtin.debug:
        msg: |
          ====== VLAN Configuration Summary ======
          Host: {{ inventory_hostname }}
          VLANs Processed: {{ vlans | length }}
          Configuration Changed: {{ vlan_config is changed }}
          Backup File: {{ backup_result.shortname | default('Not Created') }}
          ========================================
---