---
- name: End-to-End Enterprise Deployment for Cisco Nexus 9k
  hosts: nexus9k
  gather_facts: no
  vars:
    mgmt_ip: "10.255.0.10"
    vlan_id: 100
    vlan_name: "Web_Tier"
    svi_ip: "10.0.100.1/24"
    ospf_process: 1
    ospf_router_id: "10.255.0.10"

  tasks:
    - name: Enable Required Features
      cisco.nxos.nxos_feature:
        feature: "{{ item }}"
        state: enabled
      loop:
        - ospf
        - bgp
        - hsrp
        - interface-vlan
        - vpc
        - lacp
      tags: [base, features]

    - name: Configure VLANs
      cisco.nxos.nxos_vlans:
        config:
          - vlan_id: "{{ vlan_id }}"
            name: "{{ vlan_name }}"
            state: active
      tags: [l2, vlans]

    - name: Configure Access Interface
      cisco.nxos.nxos_l2_interfaces:
        config:
          - name: Ethernet1/1
            mode: access
            access:
              vlan: "{{ vlan_id }}"
      tags: [l2, interfaces]

    - name: Configure SVI (Interface VLAN)
      cisco.nxos.nxos_l3_interfaces:
        config:
          - name: Vlan{{ vlan_id }}
            ipv4:
              - address: "{{ svi_ip }}"
      tags: [l3, interfaces]

    - name: Configure HSRP on SVI
      cisco.nxos.nxos_hsrp:
        config:
          - interface: Vlan{{ vlan_id }}
            version: 2
            address_family:
              - afi: ipv4
                groups:
                  - group: 10
                    vip: 10.0.100.254
                    priority: 110
                    preempt: true
      tags: [l3, hsrp]

    - name: Configure OSPF Routing Process
      cisco.nxos.nxos_ospf:
        config:
          vrf: default
          processes:
            - process_id: "{{ ospf_process }}"
              router_id: "{{ ospf_router_id }}"
      tags: [routing, ospf]

    - name: Assign SVI to OSPF
      cisco.nxos.nxos_ospf_interfaces:
        config:
          - name: Vlan{{ vlan_id }}
            address_family:
              - afi: ipv4
                processes:
                  - process_id: "{{ ospf_process }}"
                    area: "0.0.0.0"
      tags: [routing, ospf]

    - name: Configure BGP ASN and Router ID
      cisco.nxos.nxos_bgp_global:
        config:
          as_number: "65001"
          router_id: "{{ ospf_router_id }}"
      tags: [routing, bgp]

    - name: Configure BGP Neighbor with RPKI
      cisco.nxos.nxos_bgp_neighbor:
        config:
          as_number: "65001"
          neighbors:
            - neighbor_address: 10.255.0.20
              remote_as: "65002"
              description: "E2E Peer"
              address_family:
                - afi: ipv4
                  safi: unicast
                  route_map_in: "RPKI_VALIDATION"
      tags: [routing, bgp, security]

    - name: Configure BGP RPKI Server
      cisco.nxos.nxos_command:
        commands:
          - conf t
          - router bgp 65001
          - rpki server 10.10.10.100
          - transport tcp port 3323
      tags: [routing, bgp, security]

    - name: Configure ACL for Data Center Protection
      cisco.nxos.nxos_acls:
        config:
          - name: DC_PROTECT
            afi: ipv4
            aces:
              - sequence: 10
                action: permit
                protocol: tcp
                source:
                  any: true
                destination:
                  any: true
                  port_protocol:
                    eq: 443
              - sequence: 20
                action: deny
                protocol: ip
                source:
                  any: true
                destination:
                  any: true
      tags: [security, acl]

    - name: Apply ACL to Interface
      cisco.nxos.nxos_acl_interfaces:
        config:
          - name: Vlan{{ vlan_id }}
            access_groups:
              - afi: ipv4
                acls:
                  - name: DC_PROTECT
                    direction: in
      tags: [security, acl]

    - name: Save Configuration
      cisco.nxos.nxos_config:
        backup: yes
        save_when: modified
      tags: [save]

    # --- v12.0 SECURITY PROVING (POST-DEPLOYMENT) ---
    - name: Security Validation - Remote Port Scan
      delegate_to: localhost
      ansible.builtin.shell: "nmap -sV -p 443,80,22,179 --open {{ inventory_hostname }}"
      register: scan_results
      tags: [validation, security_proving]
      ignore_errors: true

    - name: Verify Web Access Rule Enforcement
      ansible.builtin.assert:
        that:
          - "'443/tcp open' in scan_results.stdout"
        fail_msg: "SECURITY VIOLATION: HTTPS port 443 is not open or ACL failed!"
      tags: [validation, security_proving]
