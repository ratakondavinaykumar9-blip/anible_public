---
- name: Cisco ASA Advanced - Dynamic Routing BGP over VTI
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Configure Virtual Tunnel Interface (VTI)
      cisco.asa.asa_config:
        lines:
          - nameif vti-aws
          - security-level 50
          - ip address 169.254.100.1 255.255.255.252
          - tunnel source interface outside
          - tunnel destination 203.0.113.10
          - tunnel mode ipsec ipv4
          - tunnel protection ipsec profile IPSEC_PROF_AWS
        parents: interface Tunnel1

    - name: Configure Route Map for BGP
      cisco.asa.asa_config:
        lines:
          - match ip address prefix-list BGP_EXPORT
        parents: route-map RM_BGP_OUT permit 10

    - name: Configure BGP Process
      cisco.asa.asa_config:
        lines:
          - bgp log-neighbor-changes
          - address-family ipv4 unicast
          - neighbor 169.254.100.2 remote-as 64512
          - neighbor 169.254.100.2 activate
          - neighbor 169.254.100.2 route-map RM_BGP_OUT out
          - network 10.0.0.0 mask 255.255.255.0
        parents: router bgp 65000
