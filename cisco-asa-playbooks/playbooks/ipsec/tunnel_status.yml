---
# IPSec Tunnel Status Overview - Improved for Idempotency, Observability, and Error Handling
- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: no
  vars:
    output_format: text
    report_dest: "/tmp/asa_ipsec_status_{{ inventory_hostname }}.json"

  tasks:
    - name: Gather minimal facts for timestamping
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"
      tags: [always]

    - name: Get L2L VPN session database status
      cisco.asa.asa_command:
        commands:
          - show vpn-sessiondb l2l
      register: tunnel_output
      failed_when: tunnel_output.failed
      # Registering output for observability and subsequent assertions

    - name: Verify VPN session database command success
      ansible.builtin.assert:
        that:
          - "tunnel_output.stdout is defined"
        fail_msg: "Failed to retrieve VPN session database status"
        quiet: true

    - name: Get IPSec Security Association (SA) details
      cisco.asa.asa_command:
        commands:
          - show crypto ipsec sa
      register: ipsec_sa_output

    - name: Get IKEv1 SA status
      cisco.asa.asa_command:
        commands:
          - show crypto isakmp sa
      register: ikev1_sa_output
      # Ignore errors as IKEv1 might not be configured/active on all devices
      ignore_errors: yes

    - name: Get IKEv2 SA status
      cisco.asa.asa_command:
        commands:
          - show crypto ikev2 sa
      register: ikev2_sa_output
      ignore_errors: yes

    - name: Generate JSON status report
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 | default('N/A') }}",
            "tunnel_summary": {{ (tunnel_output.stdout | first) | to_json }},
            "ipsec_sa": {{ (ipsec_sa_output.stdout | first) | to_json }},
            "ikev1_sa": {{ (ikev1_sa_output.stdout | default(['N/A']) | first) | to_json }},
            "ikev2_sa": {{ (ikev2_sa_output.stdout | default(['N/A']) | first) | to_json }}
          }
        dest: "{{ report_dest }}"
        mode: '0644'