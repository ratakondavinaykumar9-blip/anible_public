---
# Detailed IPSec Tunnel Information
# This playbook retrieves comprehensive VPN status from Cisco ASA/Firepower devices.
# It supports filtering by peer IP and provides output in both text and JSON formats.
- name: Get Detailed IPSec Tunnel Info
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: "text"
    tunnel_peer: ""  # Set specific peer IP to get details (e.g., "1.2.3.4")

  tasks:
    - name: Gather local facts for timestamping
      # We gather facts from localhost to ensure we have a reliable timestamp for reports
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"
      delegate_to: localhost
      run_once: true

    - name: Validate input parameters
      ansible.builtin.assert:
        that:
          - output_format in ['text', 'json']
        fail_msg: "The variable 'output_format' must be either 'text' or 'json'."

    - name: Get detailed tunnel info by peer
      # Using FQCN for platform-specific command execution
      cisco.asa.asa_command:
        commands:
          - "show vpn-sessiondb l2l filter-ipaddress {{ tunnel_peer }}"
      register: tunnel_detail_peer
      when: tunnel_peer | length > 0
      # ignore_errors is used because ASA returns an error if no session exists for the filtered IP
      ignore_errors: true

    - name: Get all tunnel details
      cisco.asa.asa_command:
        commands:
          - "show vpn-sessiondb l2l"
      register: tunnel_detail_all
      when: tunnel_peer | length == 0

    - name: Get crypto stats for specific peer
      cisco.asa.asa_command:
        commands:
          - "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: crypto_detail_peer
      when: tunnel_peer | length > 0
      ignore_errors: true

    - name: Get IKEv1 session details
      cisco.asa.asa_command:
        commands:
          - "show crypto isakmp sa detail"
      register: ikev1_detail

    - name: Get IKEv2 session details
      cisco.asa.asa_command:
        commands:
          - "show crypto ikev2 sa detail"
      register: ikev2_detail

    - name: Verify command execution success
      # Ensure that core crypto commands succeeded before proceeding to reporting
      ansible.builtin.assert:
        that:
          - ikev1_detail.stdout is defined
          - ikev2_detail.stdout is defined
        fail_msg: "Failed to retrieve crypto session details from the device."

    - name: Consolidate tunnel results
      # Creating facts ensures consistent data structure regardless of which tasks were skipped
      ansible.builtin.set_fact:
        tunnel_info: "{{ tunnel_detail_peer.stdout[0] if (tunnel_peer | length > 0 and tunnel_detail_peer.stdout is defined) else (tunnel_detail_all.stdout[0] if (tunnel_detail_all.stdout is defined) else 'No data') }}"
        crypto_info: "{{ crypto_detail_peer.stdout[0] if (tunnel_peer | length > 0 and crypto_detail_peer.stdout is defined) else 'N/A' }}"

    - name: Save tunnel details to JSON report
      # Idempotent file creation on the control node for auditability
      ansible.builtin.copy:
        content: "{{ report_content | to_nice_json }}"
        dest: "/tmp/asa_ipsec_detail_{{ inventory_hostname }}_{{ tunnel_peer if tunnel_peer | length > 0 else 'all' }}.json"
        mode: '0644'
      vars:
        report_content:
          device: "{{ inventory_hostname }}"
          timestamp: "{{ hostvars['localhost']['ansible_date_time']['iso8601'] }}"
          tunnel_peer: "{{ tunnel_peer if tunnel_peer | length > 0 else 'all' }}"
          tunnel_details: "{{ tunnel_info }}"
          crypto_details: "{{ crypto_info }}"
          ikev1_details: "{{ ikev1_detail.stdout[0] | default('') }}"
          ikev2_details: "{{ ikev2_detail.stdout[0] | default('') }}"
      when: output_format == 'json'
      delegate_to: localhost

    - name: Display human-readable tunnel status summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSec Tunnel Details for {{ inventory_hostname }}
          Timestamp: {{ hostvars['localhost']['ansible_date_time']['iso8601'] }}
          Target Peer: {{ tunnel_peer if tunnel_peer | length > 0 else 'ALL' }}
          ============================================================
          
          VPN SESSION DATABASE:
          {{ tunnel_info }}

          CRYPTO IPSEC SA DETAILS:
          {{ crypto_info }}
      when: output_format == 'text'