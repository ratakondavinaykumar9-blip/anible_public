---
# IPSec Tunnel Troubleshooting - NetLearner Architect Enhanced Version
# This playbook performs non-disruptive troubleshooting of IPSec tunnels on Cisco ASA/Firepower.
- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format is text; can be overridden via extra_vars to 'json'
    output_format: text
    # Required - peer IP to troubleshoot
    tunnel_peer: ""

  tasks:
    - name: "VALIDATION: Ensure tunnel_peer is provided"
      # Why: Prevents execution without a target peer, avoiding broad 'show' command output.
      ansible.builtin.fail:
        msg: "tunnel_peer variable is required. Usage: -e 'tunnel_peer=203.0.113.1'"
      when: tunnel_peer | length == 0

    - name: "SETUP: Gather current timestamp for reporting"
      # Why: Necessary for observability and timestamping JSON output files when gather_facts is disabled.
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - "date_time"

    - name: "DIAGNOSTIC: Get peer IKEv1 status"
      # Why: Check Phase 1 SA for legacy IKEv1 tunnels.
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1_sa
      ignore_errors: true

    - name: "DIAGNOSTIC: Get peer IKEv2 status"
      # Why: Check Phase 1 SA for modern IKEv2 tunnels.
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2_sa
      ignore_errors: true

    - name: "DIAGNOSTIC: Get IPsec SA for peer"
      # Why: Verifies Phase 2 (Data Plane) status and encapsulation/decapsulation counters.
      ansible.netcommon.cli_command:
        command: "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec_sa
      failed_when: 
        - ipsec_sa.failed
        - "'invalid' in ipsec_sa.stdout | lower"

    - name: "DIAGNOSTIC: Get tunnel session details"
      # Why: Validates the session exists in the VPN Session Database (L2L context).
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l filter-ipaddress={{ tunnel_peer }}"
      register: tunnel_session

    - name: "DIAGNOSTIC: Check interface status"
      # Why: Ensures the physical/logical interface used for the tunnel is UP.
      ansible.netcommon.cli_command:
        command: "show interface ip brief"
      register: interface_brief

    - name: "OBSERVABILITY: Verify interface command success"
      # Why: Ensures the device is responding correctly to CLI queries before reporting.
      ansible.builtin.assert:
        that:
          - "interface_brief.stdout is defined"
          - "interface_brief.stdout | length > 0"
        fail_msg: "Failed to retrieve interface status from {{ inventory_hostname }}"

    - name: "DIAGNOSTIC: Get syslog errors"
      # Why: Retrieves recent errors related to crypto or routing that may explain failures.
      ansible.netcommon.cli_command:
        command: "show logging | include errors | last 50"
      register: error_logs

    - name: "REPORTING: Output JSON for External Monitoring"
      # Why: Provides a machine-readable format for SolarWinds or other SIEM integrations.
      # Idempotency: Overwrites the specific peer-related file to ensure latest data is present.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "troubleshooting_peer": "{{ tunnel_peer }}",
            "ikev1_sa": {{ ikev1_sa.stdout | default('') | to_json }},
            "ikev2_sa": {{ ikev2_sa.stdout | default('') | to_json }},
            "ipsec_sa": {{ ipsec_sa.stdout | to_json }},
            "tunnel_session": {{ tunnel_session.stdout | to_json }},
            "interfaces": {{ interface_brief.stdout | to_json }},
            "error_logs": {{ error_logs.stdout | to_json }}
          }
        dest: "/tmp/asa_ipsec_troubleshoot_{{ inventory_hostname }}_{{ tunnel_peer | replace('.', '_') }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: "REPORTING: Human Readable Troubleshooting Output"
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSec Troubleshooting Report: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Target Peer: {{ tunnel_peer }}
          ============================================================

          [ IKE Phase 1 (ISAKMP/IKEv2) ]
          V1 Status: {{ ikev1_sa.stdout | default('N/A') }}
          V2 Status: {{ ikev2_sa.stdout | default('N/A') }}

          [ IPsec Phase 2 (Data Plane) ]
          {{ ipsec_sa.stdout }}

          [ VPN Session DB ]
          {{ tunnel_session.stdout }}

          [ Recent Syslog Errors ]
          {{ error_logs.stdout }}
      when: output_format == 'text'

    - name: "SUMMARY: Tunnel Operational Status"
      # Why: Quick visual indicator for the operator.
      ansible.builtin.debug:
        msg: |
          =======================
          TUNNEL STATUS SUMMARY
          =======================
          Peer: {{ tunnel_peer }}
          {% if 'AM_ACTIVE' in ikev1_sa.stdout or 'UP-ACTIVE' in ikev2_sa.stdout %}
          ✅ IKE Phase 1: UP
          {% else %}
          ❌ IKE Phase 1: DOWN (Check Phase 1 credentials/connectivity)
          {% endif %}

          {% if 'peer' in ipsec_sa.stdout.lower() and 'pkts' in ipsec_sa.stdout.lower() %}
          ✅ IPsec Phase 2: UP
          {% else %}
          ❌ IPsec Phase 2: DOWN (Check Crypto Map / ACLs)
          {% endif %}
      when: output_format == 'text'
