---
# IPSec Tunnel Troubleshooting
# Standardized diagnostic playbook for Cisco ASA/Firepower VPN monitoring.
# This playbook is idempotent (read-only) and includes observability assertions.

- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format; can be overridden via -e 'output_format=json'
    output_format: text
    # The remote public IP address of the VPN tunnel peer (required)
    tunnel_peer: ""

  tasks:
    - name: Validation | Ensure tunnel_peer is provided
      # Prevents execution errors by asserting that the required input variable is present.
      ansible.builtin.assert:
        that:
          - tunnel_peer | length > 0
        fail_msg: "The 'tunnel_peer' variable is mandatory. Usage: ansible-playbook ... -e 'tunnel_peer=203.0.113.1'"
        success_msg: "Peer IP provided: {{ tunnel_peer }}"

    - name: Validation | Gather minimal system facts
      # Required to populate 'ansible_date_time' for reporting and audit trails.
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Diagnostics | Collect IKEv1 Security Associations
      # failed_when: false allows the playbook to capture 'not found' states without terminating execution.
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1_sa
      failed_when: false

    - name: Diagnostics | Collect IKEv2 Security Associations
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2_sa
      failed_when: false

    - name: Diagnostics | Collect IPsec Phase 2 Security Associations
      ansible.netcommon.cli_command:
        command: "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec_sa
      failed_when: false

    - name: Diagnostics | Collect Tunnel Session Details
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l filter-ipaddress={{ tunnel_peer }}"
      register: tunnel_session
      failed_when: false

    - name: Diagnostics | Check Interface Status
      # Provides context on whether the local egress interface is operational to rule out Layer 3 issues.
      ansible.netcommon.cli_command:
        command: "show interface ip brief"
      register: interface_brief
      failed_when: false

    - name: Diagnostics | Retrieve recent syslog errors
      # Isolates error messages from the buffer to identify Phase 1/2 negotiation or encryption failures.
      ansible.netcommon.cli_command:
        command: "show logging | include errors | last 50"
      register: error_logs
      failed_when: false

    - name: Observability | Assert device connectivity
      # Verifies that we received a valid response structure from the diagnostic commands.
      ansible.builtin.assert:
        that:
          - ikev1_sa.stdout is defined
          - ipsec_sa.stdout is defined
        fail_msg: "Communication failure with {{ inventory_hostname }}. Verify SSH accessibility and credentials."

    - name: Reporting | Generate JSON Diagnostic File
      # Creates an idempotent artifact for integration with monitoring systems (e.g., SolarWinds).
      # The file is overwritten on each run, ensuring fresh data.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "troubleshooting_peer": "{{ tunnel_peer }}",
            "ikev1_sa": {{ ikev1_sa.stdout | default('') | to_json }},
            "ikev2_sa": {{ ikev2_sa.stdout | default('') | to_json }},
            "ipsec_sa": {{ ipsec_sa.stdout | default('') | to_json }},
            "tunnel_session": {{ tunnel_session.stdout | default('') | to_json }},
            "interfaces": {{ interface_brief.stdout | default('') | to_json }},
            "error_logs": {{ error_logs.stdout | default('') | to_json }}
          }
        dest: "/tmp/asa_ipsec_troubleshoot_{{ inventory_hostname }}_{{ tunnel_peer }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Reporting | Display Human Readable Troubleshooting Data
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSEC TROUBLESHOOTING REPORT: {{ inventory_hostname }}
          Peer: {{ tunnel_peer }} | Time: {{ ansible_date_time.iso8601 }}
          ============================================================

          IKEv1 (PHASE 1) SA STATUS:
          {{ ikev1_sa.stdout | default('No IKEv1 data returned') }}

          IKEv2 (PHASE 1) SA STATUS:
          {{ ikev2_sa.stdout | default('No IKEv2 data returned') }}

          IPSEC (PHASE 2) SA STATUS:
          {{ ipsec_sa.stdout | default('No IPsec Phase 2 data returned') }}

          VPN SESSION DATABASE:
          {{ tunnel_session.stdout | default('No active session found') }}

          RECENT LOG ERRORS:
          {{ error_logs.stdout | default('No recent error logs found') }}
      when: output_format == 'text'

    - name: Reporting | Tunnel Status Summary
      # Logic-based summary to provide an at-a-glance pass/fail status for the VPN tunnel.
      ansible.builtin.debug:
        msg: |
          ============================================================
          TUNNEL HEALTH SUMMARY
          ============================================================
          Peer Address: {{ tunnel_peer }}

          IKE Phase 1: {% if 'ACTIVE' in ikev1_sa.stdout or 'READY' in ikev2_sa.stdout or 'UP-ACTIVE' in ikev2_sa.stdout %}✅ UP{% else %}❌ DOWN{% endif %}

          IPsec Phase 2: {% if '#pkts encaps' in ipsec_sa.stdout %}✅ UP (Traffic Observed){% elif 'peer' in ipsec_sa.stdout.lower() %}⚠️ UP (No Traffic Observed){% else %}❌ DOWN{% endif %}

          Session Status: {% if 'Session Type: L2L' in tunnel_session.stdout %}✅ ACTIVE IN DB{% else %}❌ NOT IN DB{% endif %}
          ============================================================
      when: output_format == 'text'