# Backup ASA Configuration
- name: Backup ASA Configuration
  hosts: asa_firepower
  # We gather facts to obtain ansible_date_time for unique backup naming
  gather_facts: yes
  vars:
    output_format: text
    backup_path: "/tmp/asa_backups"
    # ISO8601 format with colons removed for filesystem compatibility
    backup_name: "{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}"

  tasks:
    - name: Ensure backup directory exists
      # Idempotency: Creates directory if missing, does nothing if it exists
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true

    - name: Get running configuration
      # FQCN: Using netcommon for generic CLI execution
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config
      # Error Handling: Fail if 'Invalid' or 'Error' is in output (standard ASA error markers)
      failed_when: 
        - running_config.stdout is not defined
        - "'Invalid' in running_config.stdout or 'Error' in running_config.stdout"

    - name: Verify running configuration content
      # Observability: Ensure we actually received data before attempting to save
      ansible.builtin.assert:
        that:
          - running_config.stdout | length > 0
        fail_msg: "Running configuration retrieved from {{ inventory_hostname }} is empty."

    - name: Get startup configuration
      ansible.netcommon.cli_command:
        command: show startup-config
      register: startup_config
      failed_when:
        - startup_config.stdout is not defined
        - "'Invalid' in startup_config.stdout or 'Error' in startup_config.stdout"

    - name: Verify startup configuration content
      ansible.builtin.assert:
        that:
          - startup_config.stdout | length > 0
        fail_msg: "Startup configuration retrieved from {{ inventory_hostname }} is empty."

    - name: Save running configuration to local file
      # Why: Persists the captured state to the backup path
      ansible.builtin.copy:
        content: "{{ running_config.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0644'

    - name: Save startup configuration to local file
      ansible.builtin.copy:
        content: "{{ startup_config.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0644'

    - name: Create backup manifest (JSON)
      # Why: Provides structured metadata for automation/auditing
      ansible.builtin.copy:
        content: "{{ manifest_data | to_nice_json }}"
        dest: "{{ backup_path }}/{{ backup_name }}_manifest.json"
        mode: '0644'
      vars:
        manifest_data:
          device: "{{ inventory_hostname }}"
          backup_timestamp: "{{ ansible_date_time.iso8601 }}"
          files:
            running_config: "{{ backup_name }}_running.cfg"
            startup_config: "{{ backup_name }}_startup.cfg"

    - name: Display backup summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Backup Complete for {{ inventory_hostname }}"
          - "Directory: {{ backup_path }}"
          - "Manifest: {{ backup_name }}_manifest.json"
          - "Status: Verified & Saved"
          - "========================================"