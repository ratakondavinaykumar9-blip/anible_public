---
# Backup ASA Configuration
# This playbook automates the archival of Cisco ASA configurations to a central controller.
# Standards: FQCN usage, Idempotency, Observability via assertions, and robust Error Handling.
- name: Backup ASA Configuration
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text
    backup_path: "/tmp/asa_backups"
    # Lazy evaluation: This variable resolves after facts are gathered from the control node.
    backup_name: "{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}"

  tasks:
    - name: Gather facts from controller for timestamping
      # Documentation: Synchronize timestamps across the fleet using the control node's clock.
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      run_once: true

    - name: Ensure backup directory exists on control node
      # Idempotency: The 'directory' state ensures the path exists without modifying it if it already does.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost

    - name: Retrieve running configuration
      # Best Practice: Using FQCN and device-specific module for Cisco ASA communication.
      cisco.asa.asa_command:
        commands:
          - show running-config
      register: running_config_raw
      # Error Handling: Fail early if the device returns an empty or invalid response.
      failed_when: 
        - running_config_raw.stdout is not defined
        - running_config_raw.stdout[0] | length == 0

    - name: Verify running configuration integrity
      # Observability: Assert that the received data contains expected configuration headers.
      ansible.builtin.assert:
        that:
          - "'running-config' in running_config_raw.stdout[0]"
          - "running_config_raw.stdout[0] | length > 200"
        fail_msg: "Running configuration for {{ inventory_hostname }} appears truncated or invalid."

    - name: Retrieve startup configuration
      cisco.asa.asa_command:
        commands:
          - show startup-config
      register: startup_config_raw
      # Error Handling: Startup config may be unavailable; ignore to ensure running-config backup persists.
      ignore_errors: true

    - name: Save running configuration to disk
      # Documentation: Delegate to localhost as network devices lack Python interpreters for the 'copy' module.
      ansible.builtin.copy:
        content: "{{ running_config_raw.stdout[0] }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0640'
      delegate_to: localhost
      register: running_file_save

    - name: Save startup configuration to disk
      ansible.builtin.copy:
        content: "{{ startup_config_raw.stdout[0] | default('! Startup configuration retrieval failed') }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0640'
      delegate_to: localhost
      when: startup_config_raw is succeeded
      register: startup_file_save

    - name: Create backup manifest for audit trail
      # Observability: Generate a JSON metadata file for programmatic verification of the backup set.
      ansible.builtin.copy:
        content: |
          {
            "inventory_hostname": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "files": {
              "running": "{{ backup_name }}_running.cfg",
              "startup": "{{ backup_name }}_startup.cfg"
            },
            "status": "complete"
          }
        dest: "{{ backup_path }}/{{ backup_name }}_manifest.json"
        mode: '0644'
      delegate_to: localhost
      register: manifest_file_save

    - name: Assert backup persistence success
      # Observability: Final validation that the manifest and running-config were successfully written.
      ansible.builtin.assert:
        that:
          - running_file_save.dest is defined
          - manifest_file_save.dest is defined
        fail_msg: "Backup failed to persist artifacts for {{ inventory_hostname }} to {{ backup_path }}."

    - name: Display backup summary
      ansible.builtin.debug:
        msg:
          - "Backup successful for: {{ inventory_hostname }}"
          - "Destination path: {{ backup_path }}"
          - "Manifest file: {{ backup_name }}_manifest.json"