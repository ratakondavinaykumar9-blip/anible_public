---
# ASA Health Check - CPU, Memory, Connections
# This playbook performs comprehensive health monitoring on Cisco ASA/Firepower devices.
# It captures resource usage, connection counts, CPU, and memory statistics for observability.
- name: ASA Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Get system resources
      # Captures resource usage limits and current consumption (XLATE, Conn, etc.)
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_output
      failed_when: 
        - resource_output.failed or "Invalid input" in resource_output.stdout

    - name: Verify resource usage capture
      ansible.builtin.assert:
        that:
          - resource_output.stdout is defined
          - resource_output.stdout | length > 0
        fail_msg: "Failed to retrieve valid resource usage from {{ inventory_hostname }}"

    - name: Get connection stats
      # Captures current, maximum, and peak connection counts
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_output
      failed_when: 
        - conn_output.failed or "Invalid input" in conn_output.stdout

    - name: Verify connection stats capture
      ansible.builtin.assert:
        that:
          - conn_output.stdout is defined
        fail_msg: "Failed to retrieve valid connection stats from {{ inventory_hostname }}"

    - name: Get CPU usage
      # Captures CPU utilization averages for 5-second, 1-minute, and 5-minute intervals
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_output
      failed_when: 
        - cpu_output.failed or "Invalid input" in cpu_output.stdout

    - name: Verify CPU usage capture
      ansible.builtin.assert:
        that:
          - cpu_output.stdout is defined
        fail_msg: "Failed to retrieve valid CPU usage from {{ inventory_hostname }}"

    - name: Get memory info
      # Captures allocated, free, and total system memory
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_output
      failed_when: 
        - mem_output.failed or "Invalid input" in mem_output.stdout

    - name: Verify memory info capture
      ansible.builtin.assert:
        that:
          - mem_output.stdout is defined
        fail_msg: "Failed to retrieve valid memory info from {{ inventory_hostname }}"

    - name: Output JSON for SolarWinds
      # Generates a machine-readable JSON report for external monitoring ingestion.
      # Idempotency: Overwrites the destination file with the latest state, ensuring consistent reporting.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ now(fmt='%Y-%m-%dT%H:%M:%SZ', utc=true) }}",
            "resources": {{ resource_output.stdout | to_json }},
            "connections": {{ conn_output.stdout | to_json }},
            "cpu": {{ cpu_output.stdout | to_json }},
            "memory": {{ mem_output.stdout | to_json }}
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'

    - name: Human readable summary
      # Provides a formatted summary in the terminal for real-time administrator review.
      ansible.builtin.debug:
        msg: |
          =======================
          Health Check: {{ inventory_hostname }}
          Timestamp: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          =======================
          CPU Usage:
          {{ cpu_output.stdout }}

          Memory:
          {{ mem_output.stdout }}

          Connections:
          {{ conn_output.stdout }}

          Resource Usage:
          {{ resource_output.stdout }}
      when: output_format | default('text') == 'text'