---
- name: Cisco ASA Failover Status Retrieval
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format is text. Can be overridden to 'json' for automated parsing.
    output_format: text

  tasks:
    - name: Retrieve failover information from Cisco ASA
      # Using Fully Qualified Collection Name (FQCN) for consistency and portability.
      cisco.asa.asa_failover:
      register: failover_output
      # ignore_errors allows the subsequent assert task to handle the failure gracefully with a clear message.
      ignore_errors: true

    - name: Verify failover data retrieval success
      # Observability: Explicitly check that the module didn't fail before proceeding.
      ansible.builtin.assert:
        that:
          - failover_output is not failed
          - failover_output.ansible_facts is defined
        fail_msg: "Failed to retrieve failover status from {{ inventory_hostname }}. Please check device connectivity."
        quiet: true

    - name: Debug raw failover output
      # Provides detailed visibility for troubleshooting (visible with -v).
      ansible.builtin.debug:
        var: failover_output
        verbosity: 1

    - name: Persist failover status as JSON
      # Idempotency: ansible.builtin.copy only updates the file if content changes.
      ansible.builtin.copy:
        content: "{{ failover_output | to_nice_json }}"
        dest: "/tmp/asa_failover_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'

    - name: Display formatted failover summary
      # Documentation: Provides a human-readable summary for operational monitoring.
      ansible.builtin.debug: