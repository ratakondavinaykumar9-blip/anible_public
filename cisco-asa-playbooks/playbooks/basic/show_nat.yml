---
# Playbook: ASA NAT Rules Collection and Reporting
# Purpose: This playbook retrieves NAT rules from Cisco ASA devices, validates the response, 
#          and provides both JSON file output and a human-readable console summary.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get and Report NAT Rules from ASA/Firepower
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format is text; can be overridden via extra-vars (-e "output_format=json")
    output_format: "text"

  tasks:
    - name: Retrieve current NAT configuration from device
      # Using FQCN cisco.asa.asa_nat to ensure consistent module resolution.
      # This task is inherently idempotent as it only gathers state without making changes.
      cisco.asa.asa_nat:
        state: gathered
      register: nat_output
      # Error Handling: Catching issues at the task level to allow for graceful assertion later.
      ignore_errors: true

    - name: Verify NAT configuration retrieval success
      # Observability: Asserting that the module did not fail and returned expected data structures.
      ansible.builtin.assert:
        that:
          - nat_output is defined
          - nat_output.failed is false
        fail_msg: "Failed to retrieve NAT configuration from {{ inventory_hostname }}. Verify connectivity, credentials, and module requirements."
        success_msg: "Successfully retrieved NAT configuration from {{ inventory_hostname }}."

    - name: Persist NAT rules as JSON for audit and integration
      # Idempotency: ansible.builtin.copy only writes to the destination if the content has changed.
      # Documentation: Ensures a structured data artifact exists for external processing.
      ansible.builtin.copy:
        content: "{{ nat_output.gathered | default([]) | to_nice_json }}"
        dest: "/tmp/asa_nat_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Generate human-readable summary of NAT rules
      # Documentation: Providing a clear, formatted summary for operational visibility.
      # Observability: Iterates through gathered facts to display key NAT translation parameters.
      ansible.builtin.debug:
        msg: |
          ============================================================
          NAT Rules Summary for: {{ inventory_hostname }}
          ============================================================
          {% if nat_output.gathered is defined and nat_output.gathered | length > 0 %}
          {% for rule in nat_output.gathered %}
          Rule ID: {{ rule.rule_id | default('N/A') }}
          Source: {{ rule.source_address | default('any') }} -> {{ rule.translated_source | default('original') }}
          Destination: {{ rule.destination_address | default('any') }} -> {{ rule.translated_destination | default('original') }}
          ------------------------------------------------------------
          {% endfor %}
          {% else %}
          INFO: No NAT rules configured or found on this device.
          {% endif %}
      when: output_format == 'text'