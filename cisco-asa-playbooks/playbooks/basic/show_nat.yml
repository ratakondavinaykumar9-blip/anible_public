---
# Cisco ASA NAT Configuration Visibility and Audit Playbook
# Purpose: Provides structured visibility into NAT rules for compliance and troubleshooting.
# Standards: Adheres to FQCN, Idempotency (Read-only), and robust Observability patterns.

- name: Show NAT Rules Table
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Defaulting output_format for robust variable handling via extra_vars
    output_format: "{{ output_format | default('text') }}"

  tasks:
    - name: Get NAT configuration from ASA
      # Using FQCN 'cisco.asa.asa_nat' with 'state: gathered' for idempotent state retrieval.
      # This ensures the playbook can be run repeatedly without altering device state.
      cisco.asa.asa_nat:
        state: gathered
      register: nat_output
      # Error Handling: Ensure we fail early if the connection or command execution fails.
      failed_when: nat_output.failed | default(false)

    - name: Verify NAT configuration retrieval success
      # Observability: Use assert to validate that structured data was successfully returned.
      ansible.builtin.assert:
        that:
          - "nat_output.gathered is defined"
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}. Check network reachability."
        success_msg: "NAT configuration successfully retrieved."

    - name: Output NAT configuration as JSON file
      # Persisting state to disk allows for easy integration with external auditing tools.
      # Explicit mode '0644' ensures file permission idempotency across environments.
      ansible.builtin.copy:
        content: "{{ nat_output.gathered | ansible.builtin.to_nice_json }}"
        dest: "/tmp/asa_nat_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Display human-readable NAT summary
      # Summary provides immediate observability for network engineers during execution.
      # Logic handles cases where specific address fields might be omitted (any).
      ansible.builtin.debug:
        msg: |
          ===========================================================
          NAT Rules: {{ inventory_hostname }}
          ===========================================================
          {% if nat_output.gathered | default([]) | length > 0 %}
          {% for rule in nat_output.gathered %}
          {% set src = rule.source_address | default({}) %}
          {% set dst = rule.destination_address | default({}) %}
          Interface Path: {{ rule.source_interface | default('any') }} -> {{ rule.destination_interface | default('any') }}
          Source Translation: {{ src.real | default('any') }} -> {{ src.mapped | default('any') }}
          Dest Translation:   {{ dst.real | default('any') }} -> {{ dst.mapped | default('any') }}
          -----------------------------------------------------------
          {% endfor %}
          {% else %}
          No NAT rules configured on this device.
          {% endif %}
      when: output_format == 'text'
