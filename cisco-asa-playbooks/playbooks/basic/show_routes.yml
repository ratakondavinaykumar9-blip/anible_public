MCP issues detected. Run /mcp list for status.```yaml
---
- name: Get ASA Routing Table with Enhanced Observability
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text
    backup_path: "/tmp/asa_routes_{{ inventory_hostname }}.json"

  tasks:
    - name: Execute 'show route' on ASA device
      # Use FQCN for reliable network command execution and cross-collection compatibility
      ansible.netcommon.cli_command:
        command: show route
      register: route_output
      # Error Handling: Fail if the command returns no data, indicating a possible session failure
      failed_when: route_output.stdout | length == 0

    - name: Validate routing table integrity
      # Observability: Assert that the output contains expected ASA routing table markers
      ansible.builtin.assert:
        that:
          - "'Gateway of last resort' in route_output.stdout"
        fail_msg: "The retrieved routing table is invalid or missing standard headers."
        success_msg: "Routing table retrieved and validated successfully."

    - name: Generate execution timestamp
      # Idempotency: Local fact generation is a safe, non-mutating operation
      ansible.builtin.set_fact:
        run_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Persist routing table as JSON
      # Idempotency: 'copy' module ensures the destination file is updated only if content differs
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ run_timestamp }}",
            "routes": {{ route_output.stdout | to_json }}
          }
        dest: "{{ backup_path }}"
        mode: '0644'
      # Documentation: Only save to filesystem if JSON output is explicitly requested via variables
      when: output_format == 'json'

    - name: Display routing table summary
      ansible.builtin.debug:
        msg: "{{ route_output.stdout_lines }}"
      when: output_format == 'text'
