---
# Playbook: Get ASA Routing Table
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get Routing Table
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format; can be overridden at runtime
    output_format: text

  tasks:
    - name: Retrieve routing table via CLI command (FQCN)
      ansible.netcommon.cli_command:
        command: show route
      register: route_output
      # Error Handling: Ensure the command was accepted and returned data
      failed_when: 
        - route_output.stdout is not defined
        - "'Invalid input' in route_output.stdout"
      ignore_errors: false

    - name: Validate routing table content (Observability)
      ansible.builtin.assert:
        that:
          - route_output.stdout | length > 0
          - "'Codes:' in route_output.stdout"
        fail_msg: "Routing table output is empty or does not contain expected header 'Codes:'"
        success_msg: "Routing table successfully retrieved and validated."

    - name: Display raw routing table output
      ansible.builtin.debug:
        var: route_output.stdout

    - name: Capture ISO8601 timestamp (Observability)
      # Manual timestamp generation since gather_facts is disabled for network devices
      ansible.builtin.set_fact:
        audit_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      when: output_format == 'json'

    - name: Parse and save routing data to JSON (Idempotency)
      # Uses copy module to ensure file state is managed idempotently
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ audit_timestamp }}",
            "routes": {{ route_output.stdout | to_json }}
          }
        dest: "/tmp/asa_routes_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'
      register: file_creation

    - name: Confirm JSON file creation (Observability)
      ansible.builtin.assert:
        that:
          - file_creation is not failed
        fail_msg: "Failed to write JSON output to /tmp/"
      when: output_format == 'json'