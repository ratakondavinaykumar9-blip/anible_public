---
# Playbook: Get Cisco ASA/Firepower Access Lists
# Purpose: Safely retrieve and audit current Access Control List (ACL) configurations.
# Standards: Idempotency (read-only state), Observability (assertions), and FQCN usage.
- name: Get Access Lists
  hosts: asa_firepower
  gather_facts: false # facts are gathered via specific resource modules for efficiency
  vars:
    # Set to 'json' to export to file, or 'text' for terminal summary
    output_format: text

  tasks:
    - name: Retrieve current ACL configuration from device
      # Idempotency: 'state: gathered' is a read-only operation, making the task safe to run repeatedly.
      # FQCN: Using cisco.asa.asa_acl to ensure the correct collection is invoked.
      cisco.asa.asa_acl:
        state: gathered
      register: acl_output
      # Error Handling: Ensure we fail if the device returns success but with missing data.
      failed_when: 
        - acl_output.failed | default(false)
        - "'gathered' not in acl_output"

    - name: Validate ACL data integrity
      # Observability: Confirm the returned data is in the expected list format before processing.
      ansible.builtin.assert:
        that:
          - acl_output.gathered is iterable
        fail_msg: "Data retrieval failed or returned an unexpected format for {{ inventory_hostname }}."
        success_msg: "ACL data integrity verified for {{ inventory_hostname }}."
        quiet: true

    - name: Export ACL configuration to JSON file
      # Documentation: Persists the security state for external audit logs or version control.
      ansible.builtin.copy:
        content: "{{ acl_output.gathered | to_nice_json }}"
        dest: "/tmp/asa_acls_{{ inventory_hostname }}.json"
        mode: '0600' # Security Best Practice: Restrict access to sensitive security configurations.
      when: output_format | default('text') == 'json