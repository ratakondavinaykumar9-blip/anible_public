---
# NetLearner Architect: Improved ASA Interface Status Playbook
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, FQCN

- name: Get ASA Interface Status and Details
  hosts: asa_firepower
  gather_facts: false # Facts are gathered specifically via the resource module
  vars:
    output_format: text

  tasks:
    - name: Gather current interface configuration facts
      # Using FQCN and state: gathered ensures an idempotent read-only operation
      cisco.asa.asa_interfaces:
        state: gathered
      register: interfaces_output
      # Error Handling: Ensure the playbook fails immediately if the device is unreachable or the command fails
      failed_when: interfaces_output.failed | default(false)

    - name: Validate interface data retrieval
      # Observability: Assert that the expected facts were returned and are not empty
      ansible.builtin.assert:
        that:
          - interfaces_output.ansible_facts.asa_interfaces is defined
          - interfaces_output.ansible_facts.asa_interfaces | length > 0
        fail_msg: "Data retrieval failed: No interface facts were found for {{ inventory_hostname }}."
        success_msg: "Successfully gathered facts for {{ interfaces_output.ansible_facts.asa_interfaces | length }} interfaces."
        quiet: true

    - name: Archive interface state as JSON
      # Idempotency: ansible.builtin.copy ensures the file is only updated if content changes
      # Documentation: Persisting the state allows for external auditing and post-run analysis
      ansible.builtin.copy:
        content: "{{ interfaces_output.ansible_facts.asa_interfaces | to_nice_json }}"
        dest: "/tmp/asa_interfaces_{{ inventory_hostname }}.json"
        mode: '0640' # Best practice: Restricted permissions for security-sensitive data