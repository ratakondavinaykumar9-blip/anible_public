---
# FortiGate SSL VPN Configuration Audit
# Purpose: Retrieves and validates SSL VPN settings for security auditing.
# Standards: FQCN, Idempotency, Observability, and Error Handling.

- name: Audit SSL VPN Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch SSL VPN settings via CLI
      # Using FQCN to ensure compatibility and adhere to Ansible standards
      ansible.netcommon.cli_command:
        command: "get sslvpn settings"
      register: sslvpn_output
      # Error Handling: Ensure the command was recognized by the FortiOS parser and didn't fail
      failed_when: 
        - sslvpn_output.failed or "Unknown action" in sslvpn_output.stdout
      # Idempotency: Read-only operations must always report 'ok' and never 'changed'
      changed_when: false

    - name: Validate configuration response
      # Observability: Assert that the response is not empty to verify data integrity
      ansible.builtin.assert:
        that:
          - "sslvpn_output.stdout is defined"
          - "sslvpn_output.stdout | length > 0"
        fail_msg: "Received an empty or invalid response for SSL VPN settings."
        success_msg: "Successfully retrieved SSL VPN configuration."

    - name: Display SSL VPN Configuration
      # Documentation: Provides a formatted header/footer for clear visibility in logs
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN CONFIG =======================
          {{ sslvpn_output.stdout }}
          ==============================================================