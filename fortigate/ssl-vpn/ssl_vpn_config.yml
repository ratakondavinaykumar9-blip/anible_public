---
# FortiGate SSL VPN Configuration Retrieval
# Improved by Architect:# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN

- name: Get SSL VPN Config
  hosts: fortigate
  gather_facts: false # Performance: Fact gathering is disabled as it is not required for CLI command execution

  tasks:
    - name: Retrieve SSL VPN settings from device
      # FQCN: Using fully qualified collection name for the network CLI module
      # Idempotency: This operation is read-only and safe to execute multiple times without state change
      ansible.netcommon.cli_command:
        command: "get sslvpn settings"
      register: vpn_config
      # Error Handling: Explicitly check for command failures or parse errors in the device response
      failed_when: 
        - vpn_config.failed or "command parse error" in vpn_config.stdout.lower()
        - "'unknown command' in vpn_config.stdout.lower()"

    - name: Validate configuration capture success
      # Observability: Use assert to verify that the retrieved configuration data is not empty
      ansible.builtin.assert:
        that:
          - vpn_config.stdout is defined
          - vpn_config.stdout | length > 0
        fail_msg: "Failed to capture SSL VPN settings. The device output was empty or undefined."
        quiet: true # Reduces verbosity for successful validation runs

    - name: Display SSL VPN Configuration
      # Documentation: Providing a clear, formatted view of the current operational state
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN CONFIG =======================
          {{ vpn_config.stdout }}