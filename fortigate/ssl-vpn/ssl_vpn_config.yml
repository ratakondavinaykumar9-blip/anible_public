---
# FortiGate SSL VPN Configuration Audit
# Improved by: NetLearner Architect
# Purpose: Retrieves and validates SSL VPN settings using industry best practices.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
- name: Audit FortiGate SSL VPN Settings
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN settings via CLI
      # Using FQCN for reliability. Read-only commands are inherently idempotent.
      # 'get vpn ssl settings' is the standard command for modern FortiOS versions.
      ansible.netcommon.cli_command:
        command: "get vpn ssl settings"
      register: vpn_settings
      # Ensure the task runs even in --check mode to allow for pre-flight validation.
      check_mode: false
      # Error Handling: FortiOS CLI may return 'Unknown action' with a 0 exit code.
      failed_when:
        - "Unknown action" in vpn_settings.stdout
        - "Command fail" in vpn_settings.stdout
        - vpn_settings.stdout | length == 0

    - name: Verify configuration integrity
      # Observability: Assert that critical SSL VPN parameters are present in the output.
      ansible.builtin.assert:
        that:
          - vpn_settings.stdout is defined
          - "'status' in vpn_settings.stdout"
          - "'servercert' in vpn_settings.stdout"
        fail_msg: "The SSL VPN configuration output is incomplete or invalid. Raw output: {{ vpn_settings.stdout }}"
        success_msg: "SSL VPN configuration successfully retrieved and validated."
        quiet: true

    - name: Display formatted SSL VPN configuration
      # Documentation: Provide a structured view of the configuration for audit logs.
      ansible.builtin.debug:
        msg: |
          ============================================================
          FORTIGATE SSL VPN CONFIGURATION AUDIT: {{ inventory_hostname }}
          ============================================================
          {{ vpn_settings.stdout }}
          ============================================================
