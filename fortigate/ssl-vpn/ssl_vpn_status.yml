---
# Architect:Improved Playbook
# Purpose: Securely retrieve and validate SSL VPN status from FortiGate devices.
# Standards: Idempotency (read-only), Observability (assertions), and FQCN.
---
- name: FortiGate SSL VPN Status Inquiry
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN status from device
      # Using FQCN (Fully Qualified Collection Name) for consistency and portability
      ansible.netcommon.cli_command:
        command: "get sslvpn status"
      register: ssl_vpn_raw
      # Idempotency: 'get' commands are read-only; changed_when: false ensures no false 'changed' states
      changed_when: false
      # Error Handling: Detect if the command was rejected or failed by the device shell
      failed_when: 
        - ssl_vpn_raw.stdout is not defined or "Command fail" in ssl_vpn_raw.stdout or "Unknown action" in ssl_vpn_raw.stdout

    - name: Validate SSL VPN data integrity
      # Observability: Assert that we received a valid, non-empty response
      ansible.builtin.assert:
        that:
          - ssl_vpn_raw.stdout | length > 0
        fail_msg: "Retrieved SSL VPN status is empty or invalid. Check device connectivity and VDOM context."
        success_msg: "SSL VPN status data successfully captured."

    - name: Display SSL VPN status report
      # Observability: Formatted output for easy human verification in logs
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN STATUS =======================
          {{ ssl_vpn_raw.stdout }}
          ==============================================================