---
# Playbook: FortiGate SSL VPN Status
# Purpose: This playbook retrieves and validates the SSL VPN operational status.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, Error Handling.

- name: Get SSL VPN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get sslvpn status' on FortiGate
      # Why: Fetches the current status of SSL VPN tunnels and statistics from the device.
      ansible.netcommon.cli_command:
        command: get sslvpn status
      register: ssl_vpn_output
      # Error Handling: Catch cases where the command might be unsupported or fail on the device.
      failed_when:
        - ssl_vpn_output.stdout is not defined
        - "'Command fail' in ssl_vpn_output.stdout"
        - "'Unknown action' in ssl_vpn_output.stdout"

    - name: Verify SSL VPN status data integrity
      # Observability: Ensure the response is non-empty and contains expected SSL VPN identifiers.
      ansible.builtin.assert:
        that:
          - ssl_vpn_output.stdout | length > 0
          - "'SSL VPN' in ssl_vpn_output.stdout"
        fail_msg: "Data validation failed: The command output was either empty or did not contain expected SSL VPN info."
        quiet: true

    - name: Display SSL VPN Status report
      # Why: Provides a formatted, human-readable view of the VPN status for monitoring.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN STATUS REPORT =======================
          {{ ssl_vpn_output.stdout }}