---
# FortiGate SSL VPN Tunnel Status
# Improved for Production-Grade Automation by NetLearner Architect
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Monitor SSL VPN Tunnels
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch active SSL VPN tunnel statistics
      # Why: Retrieves live tunnel data for monitoring. 
      # Idempotency: Read-only 'get' commands do not modify state, making them safe for repeated runs.
      # FQCN: Using fully qualified collection name for portability and clarity.
      ansible.netcommon.cli_command:
        command: "get sslvpn tunnel"
      register: tunnel_output
      # Error Handling: Explicitly catch FortiOS "Command fail" or "Unknown action" messages 
      # that might not trigger a standard shell non-zero exit code.
      failed_when:
        - tunnel_output.failed or "Command fail" in tunnel_output.stdout or "Unknown action" in tunnel_output.stdout

    - name: Verify successful data capture
      # Observability: Assert that the command returned a valid response object.
      # This ensures downstream tasks don't fail on undefined variables.
      ansible.builtin.assert:
        that:
          - "tunnel_output.stdout is defined"
        fail_msg: "The SSL VPN tunnel command failed to return valid data from {{ inventory_hostname }}."
        quiet: true

    - name: Display formatted SSL VPN tunnel report
      # Documentation: Provides a structured view of the tunnel state for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN TUNNEL SUMMARY =======================
          Host: {{ inventory_hostname }}
          Status: {{ 'Active Tunnels Found' if tunnel_output.stdout | length > 0 else 'No Active Tunnels' }}
          
          Raw Output:
          {{ tunnel_output.stdout if tunnel_output.stdout | length > 0 else 'N/A' }}
          ======================================================================

    - name: Register tunnel status for external reporting
      # Observability: Storing state for potential use in multi-play orchestration.
      ansible.builtin.set_fact:
        ssl_vpn_active: "{{ tunnel_output.stdout | length > 0 }}"