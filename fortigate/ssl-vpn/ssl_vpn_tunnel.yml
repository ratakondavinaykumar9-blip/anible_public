# FortiGate SSL VPN Tunnel Status Retrieval
# Purpose: This playbook retrieves and validates the operational state of SSL VPN tunnels.
# Standards Compliance: Idempotency, Observability, and Error Handling (NetLearner Staging 2026).

- name: Retrieve and Verify SSL VPN Tunnel Status
  hosts: fortigate
  gather_facts: false
  # connection: network_cli is assumed for cli_command usage

  tasks:
    - name: "FETCH: Execute 'get sslvpn tunnel' command"
      # Use FQCN for consistent plugin resolution across different environments.
      # This task captures the raw CLI output for parsing and validation.
      ansible.netcommon.cli_command:
        command: get sslvpn tunnel
      register: tunnel_status
      # Error Handling: Ensure we fail explicitly if the command is unrecognized or the device is unreachable.
      failed_when: 
        - tunnel_status.failed 
        - "unknown command" in tunnel_status.stdout | lower
      # Idempotency: 'get' commands are safe to run repeatedly as they do not change the system state.

    - name: "ASSERT: Validate retrieval success and data integrity"
      # Observability: Confirm the output is not null and contains expected metadata.
      # This prevents silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - "tunnel_status.stdout is defined"
          - "tunnel_status.rc == 0"
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}. Check connectivity or credentials."
        success_msg: "Successfully validated SSL VPN tunnel data for {{ inventory_hostname }}."

    - name: "DISPLAY: Format and present tunnel information"
      # Observability: Provides human-readable output for troubleshooting logs.
      ansible.builtin.debug:
        msg: |
          ==============================================================
          SSL VPN TUNNEL REPORT
          DEVICE: {{ inventory_hostname }}
          STATUS: {{ 'DATA_FOUND' if tunnel_status.stdout | length > 0 else 'NO_ACTIVE_TUNNELS' }}
          --------------------------------------------------------------
          {{ tunnel_status.stdout }}
          ==============================================================
