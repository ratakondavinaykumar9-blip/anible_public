---
# FortiGate SSL VPN Sessions Retrieval
# Purpose: Retrieve and validate active SSL VPN sessions from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, and Error Handling.
- name: FortiGate SSL VPN Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve active SSL VPN session information
      # FQCN: Using ansible.netcommon.cli_command for standardized network device interaction.
      # Idempotency: 'get' commands are inherently idempotent as they do not modify device configuration.
      ansible.netcommon.cli_command:
        command: get sslvpn session
      register: sessions_result
      # Error Handling: Prevent failure if no sessions exist, but catch actual command syntax or connection errors.
      failed_when:
        - sessions_result.failed or "command parse error" in sessions_result.stdout

    - name: Validate that session data was successfully retrieved
      # Observability: Assert that the command execution returned the expected output structure.
      ansible.builtin.assert:
        that:
          - "sessions_result.stdout is defined"
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}. Check device status and credentials."
        success_msg: "Successfully retrieved SSL VPN session data for {{ inventory_hostname }}."

    - name: Display formatted SSL VPN session details
      # Documentation: Providing a clearly labeled view of the operational state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSIONS =======================
          Target Device: {{ inventory_hostname }}
          Session Details:
          {{ sessions_result.stdout | default('No active sessions found.') }}