---
# FortiGate HA Status Audit
# Optimized for NetLearner Staging Standards
# Standards: Idempotency, Observability, Documentation, Error Handling, Best Practices
- name: Get HA Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system HA status from FortiGate
      # Why: Capturing the raw status is the baseline for HA health monitoring.
      # FQCN: Using fully qualified names ensures compatibility across Ansible versions.
      ansible.netcommon.cli_command:
        command: get system ha status
      register: ha_result
      # Error Handling: Fail explicitly if the command returns an error or is invalid.
      failed_when: 
        - ha_result.failed or "Unknown command" in ha_result.stdout
      # Idempotency: Mark as 'changed: false' since this is a read-only operation.
      changed_when: false

    - name: Validate HA output integrity
      # Observability: Assert that the retrieved data is not empty and contains HA signatures.
      # This prevents false positives where a command "succeeds" but returns unusable data.
      ansible.builtin.assert:
        that:
          - "ha_result.stdout | length > 0"
          - "'HA Health Status' in ha_result.stdout or 'Mode:' in ha_result.stdout"
        fail_msg: "HA Status retrieval failed or returned unexpected data structure."
        quiet: true

    - name: Display formatted HA Status report
      # Documentation: Providing clear visibility into the cluster state for the network operator.
      ansible.builtin.debug:
        msg: |
          ======================= HA STATUS: {{ inventory_hostname }} =======================
          {{ ha_result.stdout }}
