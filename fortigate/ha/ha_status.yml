---
# FortiGate HA Status Verification Playbook
# This playbook retrieves and validates the High Availability (HA) status.
# Improved for: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Retrieve and Verify FortiGate HA Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system ha status' command
      # Using FQCN for network CLI operations.
      # Idempotency: changed_when is set to false as this is a read-only state check.
      ansible.netcommon.cli_command:
        command: get system ha status
      register: ha_output
      changed_when: false
      # Error Handling: Fail if the command itself fails or if the output indicates a CLI error.
      failed_when:
        - ha_output.failed or "Command fail" in ha_output.stdout

    - name: Validate HA Health Status
      # Observability: Assert that the cluster is in a healthy state.
      # This ensures the playbook does more than just fetch text; it validates operational status.
      ansible.builtin.assert:
        that:
          - "'HA Health Status: OK' in ha_output.stdout"
          - "'Mode: ' in ha_output.stdout"
        fail_msg: "HA Status check failed! The cluster may be out of sync or HA is not configured on {{ inventory_hostname }}."
        success_msg: "HA Health Status is confirmed as OK on {{ inventory_hostname }}."

    - name: Display Formatted HA Status
      # Provides clear visibility for operators during playbook execution.
      ansible.builtin.debug:
        msg: |
          ======================= HA STATUS SUMMARY =======================
          Device: {{ inventory_hostname }}
          Status: Verified
          -----------------------------------------------------------------
          {{ ha_output.stdout }}
          =================================================================