---
# FortiGate High Availability (HA) Configuration Audit
# NetLearner Standard: Idempotency, Observability, Documentation, Error Handling, FQCN
# Refined by: NetLearner Architect
---
- name: Audit FortiGate HA State
  hosts: fortigate
  gather_facts: false
  # any_errors_fatal ensures we don't proceed with automated changes if cluster health is compromised
  any_errors_fatal: true

  tasks:
    - name: Retrieve system HA configuration state
      # Best Practices: Using Fully Qualified Collection Name (FQCN) for CLI interaction
      ansible.netcommon.cli_command:
        command: get system ha
      register: ha_config
      # Idempotency: Read-only operations must report 'changed: false' to ensure consistent state tracking
      changed_when: false
      # Error Handling: Explicitly fail if the command is unrecognized or the underlying transport fails
      failed_when: 
        - ha_config.failed
        - "'Unknown' in ha_config.stdout"

    - name: Validate operational HA participation
      # Observability: Use 'assert' to verify that the node is not in 'standalone' mode
      ansible.builtin.assert:
        that:
          - "'mode: standalone' not in ha_config.stdout"
        fail_msg: "CRITICAL: {{ inventory_hostname }} is in STANDALONE mode. Cluster failure or sync loss detected."
        success_msg: "SUCCESS: {{ inventory_hostname }} HA participation verified."
      # Documentation: This assertion enforces the architectural requirement for clustered operations

    - name: Display formatted HA configuration telemetry
      # Observability/Documentation: Provides structured visibility into the device's operational state
      ansible.builtin.debug:
        msg: |
          ======================= HA CONFIG AUDIT: {{ inventory_hostname }} =======================
          {{ ha_config.stdout }}
      # Ensure task only runs if telemetry data was successfully registered
      when: ha_config.stdout is defined
