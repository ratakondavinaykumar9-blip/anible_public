# FortiGate Web Filter Profile Retrieval
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
- name: Get Web Filter Profile
  hosts: fortigate
  gather_facts: no

  tasks:
    - name: Retrieve web filter profile configuration
      # Using FQCN for portability and clarity.
      # The 'get' command is read-only, ensuring idempotency by not modifying device state.
      # Note: Use 'show' for configuration and 'get' for operational status in FortiOS.
      ansible.netcommon.cli_command:
        command: get firewall webfilter-profile
      register: wf
      # Error Handling: Explicitly fail if FortiOS returns common CLI error patterns.
      failed_when:
        - wf.failed or "Unknown action" in wf.stdout or "Command fail" in wf.stdout

    - name: Verify web filter profile data integrity
      # Observability: Assert that data was successfully captured.
      # This prevents subsequent tasks from processing empty strings silently.
      ansible.builtin.assert:
        that:
          - wf.stdout is defined
          - wf.stdout | length > 0
        fail_msg: "Web filter profile retrieval failed: Output is empty or undefined."
        success_msg: "Successfully validated web filter profile data."
        quiet: true

    - name: Display Web Filter Profile details
      # Observability: Provide structured visual feedback for audit logs and operators.
      ansible.builtin.debug:
        msg: |
          ======================= WEB FILTER PROFILE =======================
          {{ wf.stdout }}