---
# FortiGate Web Filter Profile Retrieval Playbook
#
# This playbook adheres to the NetLearner Architect standards:
# 1. Idempotency: Uses read-only CLI commands.
# 2. Observability: Utilizes 'register' and 'assert' for verification.
# 3. Documentation: Includes descriptive comments for maintainability.
# 4. Error Handling: Implements 'failed_when' to catch command execution errors.
# 5. Best Practices: Employs Fully Qualified Collection Names (FQCN).

- name: Retrieve and Verify Web Filter Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get Web Filter Profile Configuration
      # FQCN: Using ansible.netcommon.cli_command for device interaction
      # This task is idempotent as it does not modify the device state.
      ansible.netcommon.cli_command:
        command: "get webfilter profile"
      register: wf_output
      # Error Handling: Ensure the command was understood by the FortiOS parser
      failed_when: 
        - wf_output.rc != 0 
        - "'command parse error' in wf_output.stdout | lower"

    - name: Assert Web Filter Profile Retrieval Success
      # Observability: Verify that the command returned non-empty configuration data
      ansible.builtin.assert:
        that:
          - "wf_output.stdout is defined"
          - "wf_output.stdout | length > 0"
        fail_msg: "Failed to retrieve web filter profile: Output is empty or undefined."
        success_msg: "Web filter profile configuration successfully retrieved."

    - name: Display Web Filter Profile Configuration
      # Observability: Formatted output for administrative audit and logging
      ansible.builtin.debug:
        msg: |
          ==================================================================
          FORTIGATE WEB FILTER PROFILE CONFIGURATION
          ==================================================================
          {{ wf_output.stdout }}