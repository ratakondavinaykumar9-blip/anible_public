# FortiGate IPS Signatures Retrieval
# Purpose: Gathers active IPS signature metadata for security auditing and compliance.
# Standards: Idempotency, Observability, FQCN, Error Handling.
- name: Get IPS Signatures
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute FortiOS diagnose command for IPS signatures
      # Why: The 'diagnose' command is used to inspect the internal state of the IPS engine.
      # Idempotency: Read-only command marked with changed_when: false to prevent false 'changed' status.
      # Best Practice: Using FQCN (ansible.netcommon.cli_command).
      ansible.netcommon.cli_command:
        command: diagnose ips signature
      register: sig
      changed_when: false
      check_mode: false # Ensures data is fetched even during dry-runs
      failed_when:
        - sig.stdout is not defined
        - "sig.stdout == ''"
        - "'Command fail' in sig.stdout"
        - "'Unknown action' in sig.stdout"

    - name: Verify IPS signature data integrity
      # Observability: Assert that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - sig.stdout is defined
          - sig.stdout | length > 0
        fail_msg: "Failed to retrieve IPS signatures. Output was empty or command failed."
        quiet: true

    - name: Display retrieved IPS signatures
      # Documentation: Providing clear visibility into the captured state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPS SIGNATURES =======================
          {{ sig.stdout }}