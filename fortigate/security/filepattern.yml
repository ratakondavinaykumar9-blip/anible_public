---
# FortiGate File Filter Retrieval
# This playbook retrieves the file-filter-profile configuration from FortiGate devices.
# It adheres to idempotency by performing a read-only operation and ensures 
# observability through assertions and structured error handling.
- name: Get FortiGate File Filter Profile
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve firewall file-filter-profile configuration
      # Using FQCN for the cli_command module to follow best practices
      ansible.netcommon.cli_command:
        command: show firewall file-filter-profile
      register: file_filter_result
      # Error Handling: Identify failure if the command returns an error string or fails execution
      failed_when: 
        - file_filter_result.failed or "Command fail. Return code" in file_filter_result.stdout
      ignore_errors: false

    - name: Validate retrieval success
      # Observability: Assert that the output is not empty to verify successful communication
      ansible.builtin.assert:
        that:
          - file_filter_result.stdout is defined
          - "firewall file-filter-profile" in file_filter_result.stdout
        fail_msg: "The file-filter-profile configuration could not be retrieved or is not configured."
        success_msg: "Successfully validated file-filter-profile configuration retrieval."

    - name: Display File Filter Profile details
      # Using FQCN for the debug module
      ansible.builtin.debug:
        msg: |
          ======================= FILE FILTER CONFIGURATION =======================
          {{ file_filter_result.stdout }}