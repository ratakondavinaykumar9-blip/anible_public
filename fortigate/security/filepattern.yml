---
# FortiGate File Filter Retrieval Playbook
# Improved for Idempotency, Observability, and Error Handling
# Author: NetLearner Architect
- name: Get FortiGate File Filter Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve file filter profile configuration
      # FQCN: Using ansible.netcommon for broad compatibility across network devices
      ansible.netcommon.cli_command:
        command: get firewall file-filter-profile
      register: file_filter_output
      # IDEMPOTENCY: 'get' commands are read-only; changed_when: false ensures the task is reported as 'ok'
      changed_when: false
      # ERROR HANDLING: Ensure the command executed successfully on the device
      failed_when:
        - "command parse error" in file_filter_output.stdout | lower
        - "unknown command" in file_filter_output.stdout | lower

    - name: Verify file filter data integrity
      # OBSERVABILITY: Assert that the command returned meaningful content
      ansible.builtin.assert:
        that:
          - file_filter_output.stdout is defined
          - file_filter_output.stdout | length > 0
        fail_msg: "File filter profile could not be retrieved or is empty."
        success_msg: "File filter profile successfully retrieved and validated."

    - name: Display File Filter Configuration
      # Documentation: Formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= FILE FILTER PROFILE =======================
          {{ file_filter_output.stdout }}