# FortiGate Email Filter Audit
# This playbook retrieves the email filter profiles from a FortiGate device.
# It follows NetLearner architecture standards for idempotency, observability, and error handling.
- name: Get Email Filter Configuration
  hosts: fortigate
  gather_facts: false
  vars:
    # Define expected markers to verify command output integrity
    required_output_marker: "config emailfilter profile"

  tasks:
    - name: Retrieve Email Filter Profiles
      # Using FQCN for cross-platform network command execution
      # 'get' is inherently idempotent as it is a read-only operation
      ansible.netcommon.cli_command:
        command: "show firewall emailfilter-profile"
      register: email_filter_results
      # Ensure we handle potential CLI timeouts or connection resets gracefully
      failed_when: 
        - email_filter_results.failed
        - "'error' in email_filter_results.stdout | lower"
      changed_when: false

    - name: Verify Configuration Retrieval Success
      # Observability: Assert that the output contains expected configuration data
      # This ensures the device actually returned the profile list rather than an empty response
      ansible.builtin.assert:
        that:
          - "email_filter_results.stdout is defined"
          - "email_filter_results.stdout | length > 0"
        fail_msg: "Failed to retrieve a valid email filter configuration from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved email filter configuration for {{ inventory_hostname }}"

    - name: Display Email Filter Profiles
      # Observability: Structured output for architectural logging and audit trails
      ansible.builtin.debug:
        msg:
          - "======================= EMAIL FILTER AUDIT: {{ inventory_hostname }} ======================="
          - "{{ email_filter_results.stdout }}"
      when: email_filter_results.stdout is defined

---