---
# FortiGate Email Filter Retrieval Playbook
# This playbook retrieves the email filter profiles from a FortiGate device.
# Adheres to standards for Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: Get FortiGate Email Filter Profiles
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute command to get email filter profile
      # FQCN: ansible.netcommon.cli_command is used for direct CLI interaction
      ansible.netcommon.cli_command:
        command: get firewall emailfilter-profile
      register: email_output
      # Idempotency: Read-only 'get' commands should never report a change in state
      changed_when: false
      # Error Handling: Fail the task if the command execution fails or returns an error message
      failed_when:
        - email_output.failed
        - "'Unknown action' in email_output.stdout or 'command parse error' in email_output.stdout"

    - name: Verify email filter data retrieval
      # Observability: Assert that the command successfully returned configuration data
      ansible.builtin.assert:
        that:
          - email_output.stdout is defined
          - email_output.stdout | length > 0
        fail_msg: "Retrieval failed: Output is empty. Check if emailfilter-profile is supported/configured."
        success_msg: "Email filter configuration successfully captured."

    - name: Display Email Filter Configuration
      # Documentation: Provide clear visibility into the retrieved configuration for the operator
      ansible.builtin.debug:
        msg: |
          ======================= EMAIL FILTER PROFILES =======================
          {{ email_output.stdout }}