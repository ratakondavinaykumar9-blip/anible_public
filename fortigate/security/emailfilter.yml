---
# FortiGate Email Filter Configuration Retrieval
# Purpose: Safely retrieve and validate the current email filter configuration.
# This playbook is idempotent as it only performs read operations that do not alter the system state.

- name: Get Email Filter Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve email filter profile via CLI
      # Using FQCN for the network common CLI command module to ensure portability.
      ansible.netcommon.cli_command:
        command: get firewall emailfilter profile
      register: email_data
      # Error Handling: Explicitly identify failures if the command is unsupported or the device returns an error.
      failed_when:
        - email_data.failed or "Command fail" in email_data.stdout

    - name: Validate retrieval success
      # Observability: Assert that the command returned valid data to ensure the output is usable.
      ansible.builtin.assert:
        that:
          - email_data.stdout is defined
          - email_data.stdout | length > 0
        fail_msg: "No email filter profile data was returned from the device."
        success_msg: "Email filter profile data successfully captured."
        quiet: true

    - name: Display Email Filter Details
      # Observability: Format the output for clear human-readable feedback during execution.
      ansible.builtin.debug:
        msg: |
          ======================= EMAIL FILTER PROFILE =======================
          {{ email_data.stdout }}