---
# FortiGate IPS Profile Retrieval and Validation
# This playbook retrieves IPS profile information from FortiGate devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: FortiGate IPS Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPS Profile information via CLI
      # Using FQCN for network command execution. 
      # This operation is idempotent as it is a read-only 'get' command.
      ansible.netcommon.cli_command:
        command: get firewall ipsprofile
      register: ips_output
      # Error Handling: Ensure the task fails explicitly if the command execution fails.
      failed_when: ips_output.failed or "Unknown action" in ips_output.stdout

    - name: Validate IPS Profile data retrieval
      # Observability: Verifying that the command returned non-empty content.
      ansible.builtin.assert:
        that:
          - ips_output.stdout is defined
          - ips_output.stdout | length > 0
        fail_msg: "Failed to retrieve IPS profile data or the device returned an empty response."
        success_msg: "IPS profile data successfully retrieved and validated."

    - name: Display IPS Profile details
      # Documentation: Providing clear visibility of the operational state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPS PROFILE =======================
          {{ ips_output.stdout }}