---
# FortiGate Content Armor Retrieval
# Purpose: Audit firewall profile-group configuration for security compliance.
# Standards: This playbook is idempotent (read-only) and includes validation for production safety.
- name: FortiGate Content Armor Audit
  hosts: fortigate
  gather_facts: false # Performance: Fact gathering is disabled as we only require specific CLI output.

  tasks:
    - name: Retrieve firewall profile-group configuration
      # Using Fully Qualified Collection Name (FQCN) for cross-platform reliability.
      ansible.netcommon.cli_command:
        command: get firewall profile-group
      register: armor_result
      # Error Handling: Ensure we catch unrecognized commands or internal device failures.
      failed_when: >
        armor_result.failed or 
        "Unknown" in armor_result.stdout or 
        "Command fail" in armor_result.stdout

    - name: Validate retrieved armor data integrity
      # Observability: Assert that the output is not empty to verify the audit is meaningful.
      ansible.builtin.assert:
        that:
          - armor_result.stdout is defined
          - armor_result.stdout | length > 0
        fail_msg: "Audit Failed: No Content Armor configuration was returned by the device."
        success_msg: "Audit Verified: Content Armor configuration successfully retrieved and validated."

    - name: Display Content Armor Audit Results
      # Observability: Provide a structured view of the security profiles for logging and human review.
      ansible.builtin.debug:
        msg: |
          ======================= NETLEARNER: CONTENT ARMOR =======================
          DEVICE: {{ inventory_hostname }}
          -------------------------------------------------------------------------
          {{ armor_result.stdout }}
          =========================================================================
