---
# Playbook: FortiGate Content Armor Retrieval
# Auto-improved: 2026-03-15 (NetLearner Architect)
# Purpose: Safely retrieves and validates firewall profile-group configuration.
# Standards: FQCN, Idempotency (Read-only), Observability (Register/Assert), Error Handling.
---
- name: Get Content Armor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall profile-group configuration
      # Using FQCN for network CLI operations. 
      # Read-only 'get' operations are idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: "get firewall profile-group"
      register: armor_result
      # Error Handling: Identify failure if the command fails or returns an empty string.
      failed_when: 
        - armor_result.failed 
        - armor_result.stdout == ""

    - name: Validate configuration retrieval
      # Observability: Assert that the command output contains expected FortiOS structural patterns.
      ansible.builtin.assert:
        that:
          - armor_result.stdout is defined
          - "'profile-group' in armor_result.stdout or '==' in armor_result.stdout"
        fail_msg: "The retrieved Content Armor configuration is invalid or the output is empty."
        success_msg: "Content Armor configuration successfully retrieved and verified."

    - name: Display Content Armor details
      # Formatted output for human-readable verification.
      ansible.builtin.debug:
        msg: |
          ======================= CONTENT ARMOR =======================
          {{ armor_result.stdout }}