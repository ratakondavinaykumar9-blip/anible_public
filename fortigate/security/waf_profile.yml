---
# Waf Profile
# Improved: 2026-03-15
# Author: NetLearner Architect
# Purpose: Securely retrieve and validate FortiGate WAF profile configuration.
---
- name: Get FortiGate WAF Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve WAF profile details via CLI
      # Why: CLI command is used for direct read-only access to operational status.
      # Idempotency: 'changed_when: false' ensures this task is safe for repeated runs without affecting state.
      # Best Practice: Using Fully Qualified Collection Name (FQCN).
      ansible.netcommon.cli_command:
        command: get firewall waf-profile
      register: waf_output
      changed_when: false
      failed_when: 
        - waf_output.rc != 0
        - "'command parse error' in waf_output.stdout | lower"

    - name: Validate WAF profile data integrity
      # Why: Ensures that the command returned valid data and identifies connectivity or permission issues.
      # Observability: Provides an explicit checkpoint for success.
      ansible.builtin.assert:
        that:
          - waf_output.stdout is defined
          - waf_output.stdout | length > 0
        fail_msg: "WAF profile retrieval failed: Output is empty or undefined."
        success_msg: "WAF profile data successfully captured and verified."

    - name: Display WAF profile configuration
      # Why: Provides human-readable visibility for auditing and troubleshooting during playbook execution.
      ansible.builtin.debug:
        msg: |
          ======================= WAF PROFILE =======================
          {{ waf_output.stdout }}