# FortiGate WAF Profile Retrieval
# Auto-improved: 2026-04-12
# Architect: NetLearner Architect
#
# PURPOSE: Retrieves Web Application Firewall (WAF) profiles from FortiGate devices.
# STANDARDS: Idempotency (read-only), Observability (assertions), 
# Documentation (in-line logic), and FQCN usage.
---
- name: Get WAF Profile
  hosts: fortigate
  gather_facts: false # facts not required for CLI-based configuration retrieval

  tasks:
    - name: Retrieve WAF profile via CLI command
      # FQCN: Using ansible.netcommon.cli_command for consistent network interaction
      ansible.netcommon.cli_command:
        command: get firewall waf-profile
      register: waf_output
      # IDEMPOTENCY: Retrieval operations must not report a 'changed' state
      changed_when: false
      # ERROR HANDLING: Ensure the command executed successfully and returned valid output
      failed_when: >
        waf_output.failed or 
        "command parse error" in (waf_output.stdout | lower) or
        "unknown action" in (waf_output.stdout | lower)

    - name: Validate WAF profile data integrity
      # OBSERVABILITY: Assert that expected configuration signatures exist in the output
      ansible.builtin.assert:
        that:
          - waf_output.stdout is defined
          - waf_output.stdout | length > 0
          - "'waf-profile' in waf_output.stdout"
        fail_msg: "Data Integrity Error: WAF profile output is missing or malformed."
        success_msg: "Data Integrity Verified: WAF profile retrieved successfully."

    - name: Display formatted WAF profile
      # OBSERVABILITY: Present the configuration for auditability and operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= WAF PROFILE =======================
          {{ waf_output.stdout }}