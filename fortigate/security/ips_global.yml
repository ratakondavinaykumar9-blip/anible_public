---
# FortiGate IPS Global Configuration Retrieval
# This playbook retrieves the global IPS settings from FortiGate devices.
# Standards: Idempotent (Read-only), Observable, Documented, Robust Error Handling, FQCN.

- name: FortiGate IPS Global
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPS global settings via CLI
      # Why: Extracting the operational state of IPS global configuration for audit/visibility.
      # Using FQCN for cross-platform network command execution.
      ansible.netcommon.cli_command:
        command: get global firewall ipsglobal
      register: ips_global_output
      # Error Handling: Fail if the command returns an empty string or a known error pattern.
      failed_when: 
        - ips_global_output.stdout == ""
        - "'error' in ips_global_output.stdout | lower"

    - name: Verify IPS global settings retrieval
      # Observability: Ensure the output contains data to prevent downstream failures.
      ansible.builtin.assert:
        that:
          - ips_global_output.stdout is defined
          - ips_global_output.stdout | length > 0
        fail_msg: "Failed to retrieve valid IPS global configuration from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved IPS global configuration."

    - name: Display IPS global configuration
      # Documentation: Formats the output for clear visibility during execution.
      ansible.builtin.debug:
        msg: |
          ======================= IPS GLOBAL ({{ inventory_hostname }}) =======================
          {{ ips_global_output.stdout }}