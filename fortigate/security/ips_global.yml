---
# FortiGate IPS Global Configuration Retrieval
# Improved by Architect:for Idempotency, Observability, and Error Handling.

- name: Get FortiGate IPS Global Configuration
  hosts: fortigate
  gather_facts: false  # Facts are not required for direct CLI command execution

  tasks:
    - name: Retrieve IPS global configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for best practices.
      # Idempotency: This is a read-only 'get' command, making it safe to run multiple times.
      ansible.netcommon.cli_command:
        command: "get global firewall ipsglobal"
      register: ips_global_res
      # Error Handling: Ensure the task fails if the device returns common error strings
      # even if the SSH session itself remains successful.
      failed_when:
        - ips_global_res.failed or "Unknown command" in ips_global_res.stdout
        - "'error' in ips_global_res.stdout | lower"

    - name: Validate configuration data
      # Observability: Assert that we received a non-empty response to verify successful retrieval.
      ansible.builtin.assert:
        that:
          - ips_global_res.stdout is defined
          - ips_global_res.stdout | length > 0
        fail_msg: "IPS Global configuration could not be retrieved or the output is empty."
        success_msg: "Successfully captured IPS Global configuration from the device."

    - name: Display IPS Global configuration
      # Observability: Output the results clearly for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPS GLOBAL =======================
          {{ ips_global_res.stdout }}