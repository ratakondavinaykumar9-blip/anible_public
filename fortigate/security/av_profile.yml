---
# FortiGate Antivirus Profile Retrieval Playbook
# Improved by: NetLearner Architect
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Retrieve and Validate FortiGate AV Profiles
  hosts: fortigate
  gather_facts: false
  # Explicitly defining connection type for network-cli compatibility
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Fetch Antivirus Profile Configuration
      # Using Fully Qualified Collection Name (FQCN). 
      # Read-only 'get/show' commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: "get firewall avprofile"
      register: av_raw_output
      # Error Handling: Ensure the command succeeded and wasn't rejected as invalid syntax
      failed_when: 
        - av_raw_output.failed
        - "'Unknown action' in av_raw_output.stdout"

    - name: Verify Observability - Assert Profile Data
      # Observability: Validating that we actually received content from the device
      ansible.builtin.assert:
        that:
          - av_raw_output.stdout is defined
          - av_raw_output.stdout | length > 0
        fail_msg: "The AV Profile retrieval returned no data. Check connectivity or device configuration."
        success_msg: "AV Profile data successfully captured and validated."

    - name: Display Formatted AV Profile
      # Documentation: Providing clear, structured visibility into the operational state
      ansible.builtin.debug:
        msg: |
          ======================= AV PROFILE SUMMARY =======================
          DEVICE    : {{ inventory_hostname }}
          STATE     : Captured
          ------------------------------------------------------------------
          {{ av_raw_output.stdout }}
          ==================================================================