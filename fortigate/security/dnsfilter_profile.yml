---
# FortiGate DNS Filter Profile Audit
# Improved: 2026-03-15
# Standards: NetLearner Architect v2.0
- name: Retrieve and Validate DNS Filter Profiles
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch DNS filter profile configuration
      # Using FQCN (Fully Qualified Collection Name) for consistent execution
      ansible.netcommon.cli_command:
        command: "get firewall dnsfilter-profile"
      register: dns_output
      # Error Handling: Identify CLI-specific failures that don't trigger standard return codes
      # Idempotency: This is a read-only operation and is inherently safe to run multiple times
      failed_when:
        - dns_output.failed or "Unknown action" in dns_output.stdout or "Command fail" in dns_output.stdout

    - name: Verify DNS profile retrieval success
      # Observability: Assert that the command returned meaningful configuration data
      ansible.builtin.assert:
        that:
          - dns_output.stdout is defined
          - dns_output.stdout | length > 0
        fail_msg: "DNS filter profile data is empty or could not be retrieved from the device."
        success_msg: "DNS filter profile data successfully captured and verified."

    - name: Display DNS Filter Profile Details
      # Documentation: Provide clear, formatted output for audit logs and visibility
      ansible.builtin.debug:
        msg: |
          ======================= DNS FILTER PROFILE =======================
          {{ dns_output.stdout }}