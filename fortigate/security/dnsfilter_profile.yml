---
# NetLearner Staging: FortiGate DNS Filter Profile Audit
# Purpose: Retrieves and validates the DNS Filter configuration to ensure compliance with Staging security policies.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
- name: Audit FortiGate DNS Filter Profile
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve DNS Filter Profile Configuration
      # Using FQCN for reliability across different Ansible environments.
      # This task is inherently idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: get firewall dnsfilter-profile
      register: dns_profile_output
      # Ensure the task fails if the command returns known FortiOS error indicators.
      failed_when: 
        - dns_profile_output.failed or "command parse error" in dns_profile_output.stdout | lower
        - "'entry not found' in dns_profile_output.stdout | lower"

    - name: Verify Observability - Validate Configuration Retrieval
      # Assert ensures that the automation stops if the output is null or unexpected, 
      # providing a safety gate for downstream tasks.
      ansible.builtin.assert:
        that:
          - dns_profile_output.stdout is defined
          - dns_profile_output.stdout | length > 0
        fail_msg: "DNS Filter Profile output is empty or undefined. Check connectivity or profile existence."
        success_msg: "DNS Filter Profile successfully retrieved and validated."

    - name: Display DNS Filter Profile Details
      # Structured output for human-readable audit logs in NetLearner Staging.
      ansible.builtin.debug:
        msg: |
          ======================= STAGING AUDIT: DNS FILTER PROFILE =======================
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          HOST: {{ inventory_hostname }}
          DATA:
          {{ dns_profile_output.stdout }}
