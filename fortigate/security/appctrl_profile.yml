---
# FortiGate Application Control Profile Retrieval
# Purpose: Gathers the current configuration and operational status of application control profiles.
# This playbook is read-only and inherently idempotent.
# Improved by: Architect:# Date: 2026-03-08

- name: Retrieve FortiGate Application Control Profile
  hosts: fortigate
  gather_facts: false
  # Connection type typically defined in inventory, but specified here for clarity.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Fetch application control configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for consistency and portability.
      ansible.netcommon.cli_command:
        command: get firewall appctrl
      register: app_ctrl_output
      # Error Handling: Ensure the task fails if the command is unrecognized or the device returns an error.
      failed_when: 
        - app_ctrl_output.failed or "Command fail" in app_ctrl_output.stdout
        - "'Unknown action' in app_ctrl_output.stdout"

    - name: Validate retrieval success and data integrity
      # Observability: Verify that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - app_ctrl_output.stdout is defined
          - app_ctrl_output.stdout | length > 0
        fail_msg: "Application control data could not be retrieved or the output is empty."
        success_msg: "Application control data successfully captured."
        quiet: true

    - name: Display Application Control Configuration
      # Documentation: Providing a structured view of the output for audit and visibility.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE APP CONTROL =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          
          {{ app_ctrl_output.stdout }}