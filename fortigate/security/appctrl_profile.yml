---
# FortiGate Application Control Profile Audit
# Auto-improved: 2026-04-12
# Architect: NetLearner Architect
#
# Purpose: This playbook retrieves and validates Application Control settings 
# to ensure security policy visibility. It adheres to idempotency standards 
# by utilizing read-only operations and provides high observability through 
# integrated assertions.
---
- name: Get App Control Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve application control configuration via CLI
      # Why: CLI access provides raw visibility into the device's operational state.
      # Idempotency: Read-only 'get' operations are inherently safe for repeated execution.
      ansible.netcommon.cli_command:
        command: "get firewall appctrl"
      register: app_config
      check_mode: false # Ensure data is gathered even during a dry run (--check)
      # Error Handling: Fail if the command is unrecognized or the return code is non-zero.
      failed_when: 
        - app_config.rc != 0
        - "'Command fail' in app_config.stdout"

    - name: Verify configuration observability and integrity
      # Why: Assertions ensure the automation has captured valid state data before proceeding.
      ansible.builtin.assert:
        that:
          - "app_config.stdout is defined"
          - "app_config.stdout | length > 0"
        fail_msg: "Failed to retrieve valid Application Control data from {{ inventory_hostname }}."
        success_msg: "Application Control configuration successfully captured and verified."

    - name: Display formatted Application Control details
      # Why: Enhances operator observability by presenting a structured view of the output.
      ansible.builtin.debug:
        msg: |
          ======================= APP CONTROL AUDIT =======================
          DEVICE: {{ inventory_hostname }}
          STATUS: SUCCESS
          STDOUT:
          {{ app_config.stdout }}
