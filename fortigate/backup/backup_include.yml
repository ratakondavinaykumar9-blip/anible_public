---
# FortiGate Selective Backup
# Improved for: Idempotency, Observability, and Error Handling
- name: Selective Backup
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Gather minimal facts for timestamping
      # Required to populate 'ansible_date_time' for unique backup filenames
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Ensure backup directory exists
      # Idempotency: Ensures directory is present with correct permissions
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      register: dir_creation

    - name: Verify backup directory status
      # Observability: Ensure the environment is ready for writing
      ansible.builtin.assert:
        that:
          - dir_creation is successful
        fail_msg: "Could not access or create backup directory: {{ backup_path }}"

    - name: Get firewall configuration
      # Core Config: Retrieves policy and object definitions
      ansible.netcommon.cli_command:
        command: show firewall
      register: fw
      failed_when: fw.stdout == "" or "Command fail" in fw.stdout

    - name: Get router configuration
      # Optional: Retrieves routing protocols. ignore_errors used as routing might be empty.
      ansible.netcommon.cli_command:
        command: show router
      register: router
      ignore_errors: true

    - name: Get VPN configuration
      # Optional: Retrieves VPN settings. ignore_errors used as VPN might not be configured.
      ansible.netcommon.cli_command:
        command: show vpn
      register: vpn
      ignore_errors: true

    - name: Save selective configuration
      # Idempotency & Observability: Writes content only if data is retrieved.
      # File mode 0600 ensures configuration data (potentially sensitive) is protected.
      ansible.builtin.copy:
        content: |
          # FortiGate Selective Backup - {{ inventory_hostname }}
          # Date: {{ ansible_date_time.iso8601 }}
          
          # --- Firewall Configuration ---
          {{ fw.stdout }}
          
          # --- Router Configuration ---
          {{ router.stdout | default('Not configured or empty') }}
          
          # --- VPN Configuration ---
          {{ vpn.stdout | default('Not configured or empty') }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_selective_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.conf"
        mode: '0600'
      register: backup_file

    - name: Verify backup integrity
      # Observability: Confirm the file was written successfully
      ansible.builtin.assert:
        that:
          - backup_file.dest is defined
          - backup_file.state == 'file'
        fail_msg: "Backup file creation failed for {{ inventory_hostname }}"

    - name: Final Result
      ansible.builtin.debug:
        msg: "Selective backup for {{ inventory_hostname }} verified and saved to: {{ backup_file.dest }}"