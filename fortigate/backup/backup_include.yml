---
# FortiGate Selective Backup
# Purpose: Capture critical configuration subsets for focused auditing and rapid recovery.
# This approach reduces storage overhead and simplifies diff analysis compared to full configuration backups.
- name: FortiGate Selective Backup
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Generate local timestamp for backup synchronization
      # Why: Creating a unique timestamp on the control node ensures consistent naming across the fleet.
      # This is required because gather_facts is disabled for network performance.
      ansible.builtin.set_fact:
        backup_timestamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      run_once: true

    - name: Capture firewall policy and object configuration
      # Why: Firewall policies are the most frequently changed and highest-risk component.
      ansible.netcommon.cli_command:
        command: show firewall
      register: fw_config
      failed_when:
        - fw_config.stdout is not defined
        - fw_config.stdout | length == 0

    - name: Capture routing table and static route definitions
      # Why: Routing is essential for connectivity; tracking changes prevents network blackholing.
      # ignore_errors is used as some VDOMs may not have specific routing instances configured.
      ansible.netcommon.cli_command:
        command: show router
      register: router_config
      ignore_errors: true

    - name: Capture VPN Phase1 and Phase2 definitions
      # Why: VPN configs are complex; selective backup enables quick verification of tunnel parameters.
      ansible.netcommon.cli_command:
        command: show vpn
      register: vpn_config
      ignore_errors: true

    - name: Verify integrity of captured firewall data
      # Why: Prevents the creation of empty or invalid backup files.
      ansible.builtin.assert:
        that:
          - "'config firewall' in fw_config.stdout"
        fail_msg: "Firewall configuration capture returned invalid or incomplete data."

    - name: Ensure local backup directory exists
      # Why: Idempotent task to ensure the storage target is available on the controller before writing.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Persist consolidated configuration to disk
      # Why: Aggregates captured outputs into a single, timestamped artifact for archival.
      # delegate_to: localhost is used as network devices do not support standard filesystem modules.
      ansible.builtin.copy:
        content: |
          # FortiGate Selective Backup
          # Host: {{ inventory_hostname }}
          # Generated: {{ backup_timestamp }}
          
          # --- FIREWALL CONFIGURATION ---
          {{ fw_config.stdout | default('NOT_CAPTURED') }}
          
          # --- ROUTING CONFIGURATION ---
          {{ router_config.stdout | default('NOT_CAPTURED') }}
          
          # --- VPN CONFIGURATION ---
          {{ vpn_config.stdout | default('NOT_CAPTURED') }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_selective_{{ backup_timestamp }}.conf"
        mode: '0644'
      delegate_to: localhost
      register: backup_result

    - name: Validate successful file persistence
      # Why: Confirms the backup file was successfully written to the local filesystem.
      ansible.builtin.assert:
        that:
          - backup_result.dest is defined
        fail_msg: "Failed to persist backup artifact to {{ backup_path }}."

    - name: Display backup summary
      # Why: Provides immediate feedback on the location of the generated backup.
      ansible.builtin.debug:
        msg: "Selective backup for {{ inventory_hostname }} successfully saved to {{ backup_result.dest }}"
