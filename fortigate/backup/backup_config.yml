---
# FortiGate Backup Configuration - Hardened Version
# This playbook retrieves the full configuration and persists it to the Ansible control node.
- name: Backup FortiGate Config
  hosts: fortigate
  gather_facts: false
  vars:
    # Path on the Ansible control node for storing backups
    backup_path: "/tmp/fgt_backups"
    # Generate a timestamp for unique filenames without requiring full fact gathering
    backup_time: "{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}"

  tasks:
    - name: Retrieve full configuration from device
      # FQCN: Using fully qualified collection name for network command execution
      ansible.netcommon.cli_command:
        command: show full-configuration
      register: config_res
      # Error Handling: Fail if output is empty or contains known FortiOS error strings
      failed_when: >
        config_res.stdout == "" or
        "command parse error" in config_res.stdout or
        "Unknown action" in config_res.stdout

    - name: Validate configuration integrity
      # Observability: Ensure we received a substantial configuration before saving
      ansible.builtin.assert:
        that:
          - config_res.stdout | length > 100
        fail_msg: "Retrieved configuration for {{ inventory_hostname }} is suspiciously small or empty."
        success_msg: "Configuration successfully retrieved for {{ inventory_hostname }}."

    - name: Ensure backup directory exists on localhost
      # Idempotency: Ensures directory presence regardless of previous state
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0750'
      run_once: true
      delegate_to: localhost

    - name: Persist configuration to local storage
      # Observability: Register status to verify the file was written successfully
      ansible.builtin.copy:
        content: "{{ config_res.stdout }}"
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ backup_time }}.conf"
        mode: '0600'
      delegate_to: localhost
      register: backup_file

    - name: Verify backup file creation
      # Observability: Assert that the copy operation was successful and destination exists
      ansible.builtin.assert:
        that:
          - backup_file.dest is defined
        fail_msg: "Failed to write backup file for {{ inventory_hostname }} to {{ backup_path }}."

    - name: Report backup location
      ansible.builtin.debug:
        msg: "Success: Backup for {{ inventory_hostname }} verified at {{ backup_file.dest }}"