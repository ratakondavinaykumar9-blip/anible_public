---
# FortiGate Backup Configuration
# Improved for NetLearner standards: Idempotency, Observability, and Error Handling.
- name: Backup FortiGate Config
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"
    # Use 'now' filter for a consistent timestamp across all hosts in the play
    backup_timestamp: "{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}"

  tasks:
    - name: Ensure backup directory exists on controller
      # Standard: Idempotency - state: directory ensures the path exists without modification if already present.
      # Standard: FQCN - Using fully qualified collection names for core modules.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost
      register: dir_status

    - name: Validate backup directory
      # Standard: Observability - Ensure the local environment is prepared for file storage.
      ansible.builtin.assert:
        that:
          - dir_status is successful
        fail_msg: "The backup directory {{ backup_path }} could not be verified or created on the controller."

    - name: Retrieve full configuration from FortiGate
      # Standard: FQCN - Using netcommon for network-agnostic CLI execution.
      ansible.netcommon.cli_command:
        command: "show full-configuration"
      register: config_result
      # Standard: Error Handling - Fail if the output is empty or contains known FortiOS error strings.
      failed_when:
        - config_result.stdout | length == 0
        - "'Command fail' in config_result.stdout"
        - "'Unknown action' in config_result.stdout"

    - name: Verify configuration integrity
      # Standard: Observability - Ensure captured output contains expected FortiOS markers.
      ansible.builtin.assert:
        that:
          - "'config system global' in config_result.stdout"
        fail_msg: "Retrieved output for {{ inventory_hostname }} does not appear to be a valid FortiOS configuration."

    - name: Save configuration to local disk
      # Standard: Best Practices - Delegating to localhost to store backups centrally on the controller.
      # Standard: Documentation - Mode 0640 ensures restricted access to sensitive config data.
      ansible.builtin.copy:
        content: "{{ config_result.stdout }}"
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ backup_timestamp }}.conf"
        mode: '0640'
      delegate_to: localhost
      register: file_status

    - name: Confirm successful file write
      # Standard: Observability - Verify the persistence task was successful.
      ansible.builtin.assert:
        that:
          - file_status is successful
        fail_msg: "Failed to save the backup file for {{ inventory_hostname }} to {{ backup_path }}."

    - name: Backup Summary
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} successfully stored at {{ file_status.dest }}"