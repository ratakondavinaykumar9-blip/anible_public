---
# FortiGate DLP Profile Retrieval
# This playbook retrieves the Data Loss Prevention (DLP) profile configuration
# from FortiGate devices while ensuring idempotency and observability.

- name: Get FortiGate DLP Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve DLP profile configuration via CLI
      # Use FQCN for the network command module
      ansible.netcommon.cli_command:
        command: get firewall dlp-profile
      register: dlp_profile_result
      # IDEMPOTENCY: Retrieval operations are read-only and should not indicate a 'changed' state.
      changed_when: false
      # ERROR HANDLING: Explicitly fail if the command returns a non-zero exit code or typical error strings.
      failed_when:
        - dlp_profile_result.rc != 0
        - "'Command fail' in dlp_profile_result.stdout"
        - "'Unknown action' in dlp_profile_result.stdout"

    - name: Verify DLP profile data integrity
      # OBSERVABILITY: Assert that the output is not empty and contains valid data structures.
      ansible.builtin.assert:
        that:
          - dlp_profile_result.stdout is defined
          - dlp_profile_result.stdout | length > 0
        fail_msg: "DLP profile retrieval failed: No data returned from the device."
        success_msg: "DLP profile data successfully captured and validated."

    - name: Display formatted DLP profile output
      # FQCN used for debugging and logging purposes.
      ansible.builtin.debug:
        msg: |
          ======================= DLP PROFILE SUMMARY =======================
          {{ dlp_profile_result.stdout }}