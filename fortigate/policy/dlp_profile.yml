---
# FortiGate DLP Profile Retrieval
# Purpose: Safely fetches DLP profile configuration with validation and error handling.
# Adheres to NetLearner Staging idempotency and observability standards.
- name: Get DLP Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve DLP profile via CLI
      # Use Fully Qualified Collection Name (FQCN) to ensure module reliability
      ansible.netcommon.cli_command:
        command: get firewall dlp-profile
      register: dlp_raw
      # Error Handling: Explicitly catch FortiOS CLI errors and unexpected failures
      failed_when:
        - dlp_raw.failed
        - "'Unknown' in dlp_raw.stdout"
        - "'Command fail' in dlp_raw.stdout"

    - name: Validate DLP profile data
      # Observability: Assert that the output is not empty to verify successful communication
      ansible.builtin.assert:
        that:
          - dlp_raw.stdout | length > 0
        fail_msg: "DLP profile retrieval returned no data. Check device connectivity or configuration."
        success_msg: "DLP profile successfully retrieved and validated."

    - name: Display DLP Profile Configuration
      # Observability: Provide formatted output for manual audit and verification
      ansible.builtin.debug:
        msg: |
          ======================= DLP PROFILE =======================
          {{ dlp_raw.stdout }}
