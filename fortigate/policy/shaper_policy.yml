---
# FortiGate Traffic Shaper Configuration Audit
# Purpose: This playbook retrieves and validates the current traffic shaper configuration.
# Standards: Idempotency (read-only), Observability (assertions), and FQCN usage.

- name: Get Traffic Shaper
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve shaper configuration via CLI
      # Using FQCN: ansible.netcommon.cli_command for reliable command execution.
      # Why: 'get' commands provide the operational state for audit purposes.
      ansible.netcommon.cli_command:
        command: get firewall shaper
      register: shaper_result
      # Error Handling: Ensure the command didn't fail and didn't return a CLI error.
      failed_when: 
        - shaper_result.failed
        - "'command parse error' in shaper_result.stdout"

    - name: Validate shaper configuration response
      # Observability: Assert that we received a non-empty response from the device.
      ansible.builtin.assert:
        that:
          - "shaper_result.stdout is defined"
          - "shaper_result.stdout | length > 0"
        fail_msg: "No traffic shaper configuration was found or the command failed."
        quiet: true

    - name: Display Traffic Shaper Details
      # Observability: Format the output for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC SHAPER =======================
          {{ shaper_result.stdout }}