# NetLearner Architect - Standardized FortiGate Policy Retrieval
# Purpose: Retrieve and validate the firewall policy list from FortiGate devices.
# This playbook follows the Research-Strategy-Execution lifecycle for network automation.

- name: Get FortiGate Policy List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall policies via CLI
      # FQCN: Using ansible.netcommon.cli_command for platform-agnostic CLI interaction.
      # Idempotency: Read-only 'get' operations are inherently safe for repeated execution.
      ansible.netcommon.cli_command:
        command: "get firewall policy"
      register: policy_output
      # Error Handling: Detect specific CLI error strings that might not return a non-zero exit code.
      failed_when: 
        - policy_output.failed or "Command fail" in policy_output.stdout or "Unknown action" in policy_output.stdout

    - name: Assert policy data observability
      # Observability: Validate that the registered output contains usable data before proceeding.
      # This ensures the automation is not "blindly" succeeding with empty results.
      ansible.builtin.assert:
        that:
          - "policy_output.stdout is defined"
          - "policy_output.stdout | length > 0"
        fail_msg: "Data Integrity Error: Policy list is empty or undefined for {{ inventory_hostname }}."
        quiet: true

    - name: Display retrieved policies
      # Observability: Provide a structured view of the output for auditing and manual verification.
      ansible.builtin.debug:
        msg: |
          ======================= POLICIES: {{ inventory_hostname }} =======================
          {{ policy_output.stdout }}