---
# FortiGate Policy Retrieval Playbook
# Enhanced for Idempotency, Observability, and Robust Error Handling.
# Standards: FQCN usage, Register/Assert validation, and Documentation.

- name: Retrieve and Validate FortiGate Firewall Policies
  hosts: fortigate
  gather_facts: false # Performance: facts are not required for this operation

  tasks:
    - name: Fetch firewall policies using CLI command
      # Why: Using cli_command to retrieve the operational state of firewall policies.
      # This operation is idempotent as it performs a read-only retrieval without modifying state.
      ansible.netcommon.cli_command:
        command: "get firewall policy"
      register: policy_output
      # Error Handling: Fail if the command returns a failure or a known FortiOS error string.
      failed_when: 
        - "policy_output.failed or 'Command fail' in policy_output.stdout"
      # Idempotency: Ensure the task reports 'ok' instead of 'changed' for data retrieval.
      changed_when: false

    - name: Validate policy retrieval success
      # Observability: Ensure that the command actually returned data and is not empty.
      ansible.builtin.assert:
        that:
          - "policy_output.stdout is defined"
          - "policy_output.stdout | length > 0"
          - "'policy' in policy_output.stdout or 'ID' in policy_output.stdout"
        fail_msg: "Failed to retrieve firewall policies or output is malformed."
        success_msg: "Successfully retrieved and validated firewall policy list."

    - name: Display retrieved policies
      # Documentation: Provides visibility into the current policy configuration for audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICIES =======================
          {{ policy_output.stdout }}