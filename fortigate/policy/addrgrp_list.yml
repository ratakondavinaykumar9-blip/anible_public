---
# FortiGate Address Group Retrieval
# This playbook retrieves the current address group configuration from FortiGate devices.
# Improvements focus on idempotency, observability, and robust error handling.

- name: Get FortiGate Address Groups
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve address groups via CLI
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      # Idempotency: This is a read-only operation and safe to run repeatedly
      ansible.netcommon.cli_command:
        command: "get firewall addrgrp"
      register: groups
      # Error Handling: Ensure we fail if the device returns a CLI error string despite exit code 0
      failed_when:
        - "groups.rc != 0"
        - "'Command fail' in groups.stdout"
        - "'Unknown action' in groups.stdout"

    - name: Validate retrieval success
      # Observability: Use assertions to verify that data was actually returned
      ansible.builtin.assert:
        that:
          - "groups.stdout is defined"
          - "groups.stdout | length > 0"
        fail_msg: "Address group data retrieval failed or returned empty output."
        success_msg: "Successfully retrieved address group configuration."

    - name: Display address group configuration
      # Observability: Provide formatted output for manual verification
      ansible.builtin.debug:
        msg: |
          ======================= ADDRESS GROUPS =======================
          {{ groups.stdout }}
