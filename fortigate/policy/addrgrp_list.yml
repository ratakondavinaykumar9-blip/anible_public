---
# NetLearner Architect - FortiGate Address Group Audit
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Auto-improved: 2026-03-15
# Author: NetLearner Architect
#
- name: Get Address Groups from FortiGate
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall address groups via CLI
      # Idempotency: Read-only operations are inherently idempotent and safe to run multiple times.
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      ansible.netcommon.cli_command:
        command: get firewall addrgrp
      register: addrgrp_output
      # Error Handling: Explicitly check for CLI parsing errors or command failures.
      failed_when:
        - addrgrp_output.failed or "command parse error" in addrgrp_output.stdout | lower
      # Documentation: Captures the raw output of the address group configuration for validation.

    - name: Verify successful retrieval of group data
      # Observability: Using assertion to ensure the command returned actual data and not an empty string.
      ansible.builtin.assert:
        that:
          - addrgrp_output.stdout is defined
          - addrgrp_output.stdout | length > 0
        fail_msg: "The retrieval of address groups from {{ inventory_hostname }} failed or returned no data."
        success_msg: "Successfully validated address group data retrieval."

    - name: Display Address Group Configuration
      # Documentation: Provides a formatted view of the retrieved data for operator visibility.
      ansible.builtin.debug:
        msg: |
          ==============================================================
          ADDRESS GROUPS - {{ inventory_hostname }}
          ==============================================================
          {{ addrgrp_output.stdout }}