---
# FortiGate Service and Group Audit
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Retrieve and Validate FortiGate Service Configurations
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Fetch Firewall Service Objects
      # Documentation: Using 'get' to retrieve operational state of service objects.
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      ansible.netcommon.cli_command:
        command: "get firewall service custom"
      register: svc_output
      # Idempotency: Retrieval tasks should not signal a change in system state.
      changed_when: false
      # Error Handling: Catch explicit FortiOS CLI execution failures.
      failed_when: 
        - svc_output.failed or "Command fail" in svc_output.stdout

    - name: Validate Service Objects Data
      # Observability: Ensure the buffer contains data before proceeding.
      ansible.builtin.assert:
        that:
          - "svc_output.stdout | length > 0"
        fail_msg: "Firewall service object retrieval returned an empty result."
        success_msg: "Firewall service objects successfully retrieved."

    - name: Fetch Firewall Service Groups
      # Documentation: Retrieving group memberships to verify object nesting.
      ansible.netcommon.cli_command:
        command: "get firewall service group"
      register: group_output
      changed_when: false
      failed_when: 
        - group_output.failed or "Command fail" in group_output.stdout

    - name: Validate Service Groups Data
      # Observability: Verify that service groups exist and are accessible.
      ansible.builtin.assert:
        that:
          - "group_output.stdout | length > 0"
        fail_msg: "Firewall service group retrieval returned an empty result."
        success_msg: "Firewall service groups successfully retrieved."

    - name: Display Unified Service Inventory
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc_output.stdout }}
          
          ======================= SERVICE GROUPS ========================
          {{ group_output.stdout }}