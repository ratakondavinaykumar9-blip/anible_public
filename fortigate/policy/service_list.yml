# FortiGate Service and Group Audit
# This playbook retrieves and verifies service objects and groups from FortiGate devices.
# Standards: Idempotency, Observability, FQCN, and Error Handling.
- name: FortiGate Service and Group Configuration Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Firewall Service Objects
      # Using cli_command for raw output retrieval; safe for multi-run execution.
      ansible.netcommon.cli_command:
        command: get firewall service
      register: svc_output
      changed_when: false
      failed_when: 
        - svc_output.rc != 0
        - "'Command fail' in svc_output.stdout"

    - name: Verify Service Objects Retrieval
      # Observability: Ensure the command returned valid data.
      ansible.builtin.assert:
        that:
          - svc_output.stdout is defined
          - svc_output.stdout | length > 0
        fail_msg: "Failed to retrieve service objects or output is empty."
        success_msg: "Successfully retrieved firewall service objects."

    - name: Retrieve Firewall Service Groups
      # Idempotency: Read-only operation marked as 'changed_when: false'.
      ansible.netcommon.cli_command:
        command: get firewall service group
      register: grp_output
      changed_when: false
      failed_when:
        - grp_output.rc != 0
        - "'Command fail' in grp_output.stdout"

    - name: Verify Service Groups Retrieval
      # Observability: Confirm the presence of group configurations.
      ansible.builtin.assert:
        that:
          - grp_output.stdout is defined
        fail_msg: "Service group retrieval failed."
        success_msg: "Successfully retrieved firewall service groups."

    - name: Display Service and Group Summary
      # Documentation: Providing clear visibility into the system state.
      ansible.builtin.debug:
        msg:
          - "======================= SERVICE OBJECTS ======================="
          - "{{ svc_output.stdout }}"
          - "======================= SERVICE GROUPS ========================"
          - "{{ grp_output.stdout | default('No service groups found.') }}"