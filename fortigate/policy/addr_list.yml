---
# FortiGate Address Objects Retrieval
# Author: NetLearner Architect (Improved)
#
# This playbook retrieves firewall address objects from FortiGate devices.
# It adheres to idempotency as it performs read-only operations.
# Observability is ensured through registration and explicit assertions.

- name: Get Address Objects
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall address objects via CLI
      # Use Fully Qualified Collection Name (FQCN) for the cli_command module.
      # This task is idempotent as it does not modify the device state.
      ansible.netcommon.cli_command:
        command: "get firewall address"
      register: addr_result
      # Error Handling: Fail if the return code is non-zero or if the output indicates an error.
      failed_when:
        - addr_result.rc != 0
        - "'error' in addr_result.stdout | lower"

    - name: Validate address object data retrieval
      # Observability: Assert that the command returned data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - addr_result.stdout is defined
          - addr_result.stdout | length > 0
        fail_msg: "The command succeeded but returned no address object data."
        success_msg: "Address object data successfully retrieved and validated."

    - name: Display firewall address objects
      # Documentation: Providing a formatted view of the retrieved objects for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= ADDRESS OBJECTS REPORT =======================
          DEVICE: {{ inventory_hostname }}
          ----------------------------------------------------------------------
          {{ addr_result.stdout }}