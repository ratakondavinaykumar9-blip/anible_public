---
# FortiGate Policy Hit Count
# This playbook retrieves and validates firewall policy hitcount statistics.
# Improved for: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Retrieve FortiGate Policy Hit Counts
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve hit count statistics from FortiOS CLI
      # Use FQCN (ansible.netcommon.cli_command) for standardized network execution.
      # Idempotency: changed_when: false ensures read-only tasks do not report state changes.
      ansible.netcommon.cli_command:
        command: get firewall policy hitcount
      register: hits
      changed_when: false
      # Error Handling: Explicitly fail if the command returns a "Command fail" or "Unknown action" string.
      failed_when: 
        - hits.failed or "Command fail" in hits.stdout or "Unknown action" in hits.stdout

    - name: Validate hit count data integrity
      # Observability: Use assert to ensure that data was actually returned and isn't empty.
      ansible.builtin.assert:
        that:
          - "hits.stdout is defined"
          - "hits.stdout | length > 0"
        fail_msg: "Hitcount data retrieval failed or returned an empty result. Verify policy configuration on the device."
        success_msg: "Successfully retrieved hitcount data."
        quiet: true

    - name: Display Formatted Policy Hit Count
      # Documentation: Provide clear, formatted output for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= POLICY HIT COUNT REPORT =======================
          {{ hits.stdout }}
          =======================================================================