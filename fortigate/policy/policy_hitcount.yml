# Policy Hitcount - Refined by NetLearner Architect
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Safe, verified retrieval of policy hitcount telemetry from FortiGate devices.

- name: Get FortiGate Policy Hit Count
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "FortiGate: Retrieve Firewall Policy Hitcounts"
      # Read-only 'get' operation is inherently idempotent.
      # Utilizes FQCN for cross-platform network CLI execution.
      ansible.netcommon.cli_command:
        command: "get firewall policy hitcount"
      register: hits_result
      # Error Handling: Catch common FortiOS CLI error strings that don't trigger a non-zero exit code.
      failed_when: 
        - "('Command fail' in hits_result.stdout) or ('Unknown action' in hits_result.stdout)"

    - name: "Observability: Verify Telemetry Response"
      # Observability: Validate that the command returned data to prevent silent failures.
      # Asserts that the payload is non-empty before proceeding to display.
      ansible.builtin.assert:
        that:
          - hits_result.stdout is defined
          - hits_result.stdout | length > 0
        fail_msg: "Telemetry Failure: No hitcount data returned from {{ inventory_hostname }}."
        quiet: true

    - name: "Observability: Display Formatted Hitcount Data"
      # Formats output for clear visibility in automation logs and human review.
      ansible.builtin.debug:
        msg: |
          ======================= [ {{ inventory_hostname }} ] POLICY HIT COUNT =======================
          {{ hits_result.stdout }}

---