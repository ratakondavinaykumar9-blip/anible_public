---
# FortiGate Policy Status Monitoring
# Standards-aligned version for production use
# Improved: 2026-03-15
# Author: NetLearner Architect
---
- name: Retrieve and Verify FortiGate Policy Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute FortiOS CLI command to get policy status
      # FQCN: Using ansible.netcommon.cli_command for direct status retrieval.
      # This is idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: "get firewall policy status"
      register: policy_status
      # Error Handling: Explicitly fail if the command is unrecognized or execution fails.
      failed_when: 
        - policy_status.failed or "Unknown command" in policy_status.stdout

    - name: Assert policy status data integrity
      # Observability: Validating that the response contains expected data before proceeding.
      ansible.builtin.assert:
        that:
          - "policy_status.stdout is defined"
          - "policy_status.stdout | length > 0"
        fail_msg: "Policy status retrieval failed or returned empty output from the device."
        success_msg: "Policy status data successfully captured."

    - name: Display formatted Policy Status
      # Documentation: Outputting the status in a clear, readable format for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICY STATUS =======================
          {{ policy_status.stdout }}
          =======================================================================