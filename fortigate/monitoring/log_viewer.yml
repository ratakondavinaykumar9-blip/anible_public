---
# FortiGate Log Viewer
# Improved version following NetLearner Architect standards for Idempotency, Observability, and Error Handling.
- name: View FortiGate Logs
  hosts: fortigate
  gather_facts: false # Disabled to improve execution speed; host facts are not required for log retrieval.
  vars:
    # Default log parameters; can be overridden via extra-vars at runtime.
    log_type: "traffic"
    log_count: 50

  tasks:
    - name: "Execute log retrieval: {{ log_type }}"
      # FQCN: Using ansible.netcommon.cli_command for direct CLI interaction.
      ansible.netcommon.cli_command:
        # Chaining commands to set the filter category and then display the results.
        command: "execute log filter category {{ log_type }} && execute log display {{ log_count }}"
      register: logs
      # Idempotency: Read-only operations must not trigger a 'changed' state.
      changed_when: false
      # Error Handling: Explicitly fail if the FortiOS CLI returns common error strings.
      failed_when: 
        - logs.failed or "Command fail" in logs.stdout or "Invalid" in logs.stdout

    - name: "Verify log data integrity"
      # Observability: Ensure that the command actually returned data before proceeding.
      ansible.builtin.assert:
        that:
          - "logs.stdout is defined"
          - "logs.stdout | length > 0"
        fail_msg: "Log retrieval failed: The device returned empty output for category '{{ log_type }}'."
        success_msg: "Successfully retrieved {{ log_type }} logs."

    - name: "Display Logs"
      # Documentation: Formatted output for operator visibility during execution.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE {{ log_type | upper }} LOGS =======================
          {{ logs.stdout }}