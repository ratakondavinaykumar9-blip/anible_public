---
# FortiGate Log Viewer - Production Grade
# This playbook retrieves and displays logs from FortiGate devices.
# Optimized for NetLearner Staging: Ensures idempotency, observability, and robust error handling.
- name: View FortiGate Logs
  hosts: fortigate
  gather_facts: false
  vars:
    # Default parameters for log retrieval; can be overridden via extra-vars
    log_type: "traffic"
    log_count: 50

  tasks:
    - name: Set Log Category Filter
      # Requirement: Idempotency & Best Practices
      # Sets the log category (e.g., traffic, event, virus) for the session.
      # Using 'changed_when: false' as this is an operational query, not a state change.
      ansible.netcommon.cli_command:
        command: "execute log filter category {{ log_type }}"
      register: filter_result
      changed_when: false

    - name: Verify Filter Application
      # Requirement: Observability
      # Ensure the device accepted the filter command without errors.
      ansible.builtin.assert:
        that:
          - "filter_result.rc == 0"
          - "'Command fail' not in filter_result.stdout"
        fail_msg: "Failed to set log filter to '{{ log_type }}'. Check if category is valid on target."

    - name: Retrieve Log Entries
      # Requirement: Error Handling & FQCN
      # Fetch logs using the established filter. 'failed_when' catches CLI-specific error strings.
      ansible.netcommon.cli_command:
        command: "execute log display"
      register: logs_output
      failed_when:
        - "logs_output.rc != 0"
        - "'Error' in logs_output.stdout"
      changed_when: false

    - name: Assert Logs Were Found
      # Requirement: Observability
      # Validate that the command returned data to prevent processing empty buffers.
      ansible.builtin.assert:
        that:
          - "logs_output.stdout | length > 0"
        fail_msg: "The log buffer for '{{ log_type }}' is currently empty."

    - name: Display Formatted Logs
      # Requirement: Documentation & Best Practices
      # Slices the output lines to honor the 'log_count' variable and presents them clearly.
      ansible.builtin.debug:
        msg: |
          ======================= {{ log_type | upper }} LOGS (Limit: {{ log_count }}) =======================
          {{ logs_output.stdout_lines[:log_count] | join('\n') }}
