---
# Sdwan Status
# Auto-improved: 2026-03-08
# Author: Architect:(Senior Network Automation Expert)
# Purpose: Securely retrieve and validate FortiGate SD-WAN status with robust error handling.
---
- name: FortiGate SD-WAN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SD-WAN status via CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      # Idempotency: Read-only 'get' command should never report a change to the system state
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_result
      changed_when: false
      # Error Handling: Fail explicitly if the return code is non-zero (command execution failure)
      failed_when: sdwan_result.rc != 0

    - name: Validate SD-WAN status output
      # Observability: Assert that the command returned valid data containing SD-WAN keywords
      # This ensures we aren't processing empty or irrelevant output
      ansible.builtin.assert:
        that:
          - "sdwan_result.stdout is defined"
          - "'SD-WAN' in sdwan_result.stdout"
        fail_msg: "SD-WAN status retrieval failed or SD-WAN is not enabled on the device."
        success_msg: "SD-WAN status successfully captured and verified."

    - name: Display SD-WAN Status
      # Observability: Provide a formatted view of the status for human review
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS =======================
          {{ sdwan_result.stdout }}