# Sdwan Status
# Auto-improved: 2026-04-12 10:00 (NetLearner Architect Standards)
# Author: NetLearner Architect
#
# IMPROVEMENTS:
# 1. Idempotency: Added 'changed_when: false' as this is a read-only state retrieval.
# 2. Observability: Added 'ansible.builtin.assert' to verify the integrity of the CLI output.
# 3. Documentation: Added detailed comments explaining the "why" behind each task and parameter.
# 4. Error Handling: Implemented 'failed_when' to catch internal FortiOS CLI command failures.
# 5. Best Practices: Used Full Qualified Collection Names (FQCN) for all modules.
---
- name: Get FortiGate SD-WAN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SD-WAN status from FortiGate CLI
      # Use FQCN for consistent behavior across different Ansible environments
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_output
      # Idempotency: This task is a 'get' operation and should never indicate a change in system state
      changed_when: false
      # Error Handling: FortiOS CLI may return 'Command fail' while maintaining a 0 exit code
      failed_when:
        - "'Command fail' in sdwan_output.stdout"
        - "'Unknown action' in sdwan_output.stdout"

    - name: Validate SD-WAN operational state
      # Observability: Programmatic verification that the output contains expected SD-WAN data
      ansible.builtin.assert:
        that:
          - sdwan_output.stdout is defined
          - "'SD-WAN' in sdwan_output.stdout"
        fail_msg: "Critical: Failed to retrieve a valid SD-WAN status report. Output: {{ sdwan_output.stdout }}"
        success_msg: "Successfully validated SD-WAN operational status."

    - name: Display formatted SD-WAN status
      # Observability: Human-readable output for real-time monitoring and logging
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS =======================
          {{ sdwan_output.stdout }}