---
# FortiGate SD-WAN Status Improvement
# This playbook retrieves and verifies the SD-WAN operational status from FortiGate devices.
# Adheres to standards for Idempotency, Observability, Documentation, and FQCN.

- name: Get SD-WAN Status
  hosts: fortigate
  gather_facts: false # Fact gathering is disabled as this is a direct operational query

  tasks:
    - name: Retrieve SD-WAN status via CLI
      # Use FQCN for the network-agnostic CLI command module
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_result
      # Error Handling: Ensure the task fails if the command is unrecognized or returns an error
      failed_when:
        - sdwan_result.stdout is not defined
        - "'Unknown command' in sdwan_result.stdout"
        - "'Command fail' in sdwan_result.stdout"

    - name: Validate SD-WAN status response
      # Observability: Assert that the output contains expected data to ensure the device is SD-WAN capable/configured
      ansible.builtin.assert:
        that:
          - "sdwan_result.stdout | length > 0"
        fail_msg: "The SD-WAN status output was empty, check device configuration."
        success_msg: "SD-WAN status successfully captured."

    - name: Display SD-WAN Status
      # Debugging output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS =======================
          {{ sdwan_result.stdout }}