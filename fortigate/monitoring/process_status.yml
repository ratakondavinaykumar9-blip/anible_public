---
# FortiGate Process Status Monitoring
# Purpose: Retrieves and validates system process information for operational observability.
# Compliance: NetLearner Architect Standards (Idempotency, Observability, FQCN, Error Handling)
- name: Get FortiGate Process Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute FortiOS process list command
      # FQCN: Using ansible.netcommon collection for network CLI compatibility.
      # Idempotency: diagnose commands are read-only; changed_when: false ensures no state change is reported.
      ansible.netcommon.cli_command:
        command: diagnose system process list
      register: proc_status
      changed_when: false
      # Error Handling: Identify failure if the command is unsupported or the connection fails.
      failed_when:
        - proc_status.failed or "Unknown command" in proc_status.stdout

    - name: Verify process data integrity
      # Observability: Assert that we received meaningful data containing expected headers.
      ansible.builtin.assert:
        that:
          - proc_status.stdout is defined
          - proc_status.stdout | length > 0
          - "'PID' in proc_status.stdout or 'Run Time' in proc_status.stdout"
        fail_msg: "Process information retrieval failed or returned an unexpected format."
        quiet: true

    - name: Display system process status
      # Documentation: Formatted output for human-readable audit logs and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE PROCESS STATUS =======================
          {{ proc_status.stdout }}
