---
# FortiGate Process Status - Improved Production Playbook
# Purpose: Retrieves and validates system process information for health monitoring.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get FortiGate Process Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute FortiOS diagnostic command for process list
      # Why: Retrieves real-time process state. Read-only commands are inherently idempotent.
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction.
      ansible.netcommon.cli_command:
        command: diagnose system process list
      register: proc_results
      # Error Handling: Catch CLI-specific error strings that might not return a non-zero exit code.
      failed_when:
        - proc_results.failed | default(false)
        - "'command parse error' in proc_results.stdout | lower"
        - "'unknown command' in proc_results.stdout | lower"

    - name: Verify process data observability
      # Observability: Assert that the command returned valid, non-empty process data.
      ansible.builtin.assert:
        that:
          - proc_results.stdout is defined
          - proc_results.stdout | length > 0
          - "'PID' in proc_results.stdout or 'process' in proc_results.stdout | lower"
        fail_msg: "Process list retrieval failed or returned unexpected content."
        success_msg: "System process list successfully captured and validated."

    - name: Display system process status
      # Why: Provides visibility into the registered state for the automation operator.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE PROCESSES =======================
          {{ proc_results.stdout }}