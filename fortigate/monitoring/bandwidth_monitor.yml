---
# FortiGate Bandwidth Monitor
# Purpose: Captures real-time interface bandwidth utilization for operational visibility.
# Standards: Improved for idempotency, observability, and robust error handling.

- name: Monitor FortiGate Bandwidth
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Bandwidth Statistics via CLI
      # Use FQCN (Fully Qualified Collection Name) for consistent execution environment.
      # This diagnostic command is read-only; changed_when: false ensures the playbook remains idempotent.
      ansible.netcommon.cli_command:
        command: diagnose netlink interface -bandwidth
      register: bw_capture
      # Ensure the task fails if the command returns no data or encounters an execution error.
      failed_when: 
        - bw_capture.failed
        - bw_capture.stdout | length == 0
      changed_when: false

    - name: Verify Bandwidth Data Integrity
      # Observability: Use assert to validate that the output contains expected network metrics.
      ansible.builtin.assert:
        that:
          - "bw_capture.stdout is defined"
          - "'Interface' in bw_capture.stdout or 'bandwidth' in bw_capture.stdout"
        fail_msg: "Bandwidth data is missing or the output format has changed unexpectedly."
        success_msg: "Bandwidth data integrity verified."

    - name: Display Bandwidth Utilization Report
      # Debug output for human-readable monitoring in the console or logs.
      ansible.builtin.debug:
        msg: |
          ======================= BANDWIDTH STATISTICS =======================
          {{ bw_capture.stdout }}
          ====================================================================