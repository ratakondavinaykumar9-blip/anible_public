---
# FortiGate Bandwidth Monitor
# Standard: NetLearner Architect v2.0
# Purpose: Retrieves and validates real-time interface bandwidth utilization from FortiGate devices.
# This playbook ensures observability through assertion and is safe for frequent polling (Idempotent).

- name: Monitor FortiGate Interface Bandwidth
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve Interface Bandwidth Statistics
      # Use FQCN for network command execution
      # The command is read-only (GET operation), ensuring idempotency.
      fortinet.fortios.fortios_monitor:
        vdom: "root"
        selector: "netlink.interface.bandwidth"
        params: {}
      register: bandwidth_stats
      # Use failed_when to catch empty returns or specific API errors
      failed_when: 
        - bandwidth_stats.meta is not defined or bandwidth_stats.meta.status != 'success'
      ignore_errors: false

    - name: Validate Bandwidth Data Integrity
      # Observability: Assert that we received a valid data structure before processing
      ansible.builtin.assert:
        that:
          - bandwidth_stats.results is defined
          - bandwidth_stats.results | length > 0
        fail_msg: "Failed to retrieve bandwidth statistics: Data structure is empty or invalid."
        success_msg: "Bandwidth data successfully captured for {{ inventory_hostname }}."

    - name: Display Bandwidth Utilization Profile
      # Documentation: Formatted output for human operators and log collectors
      ansible.builtin.debug:
        msg: 
          - "======================= BANDWIDTH REPORT ======================="
          - "Device: {{ inventory_hostname }}"
          - "Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}"
          - "Data: {{ bandwidth_stats.results }}"
          - "================================================================"
      # Only display if the task actually returned data
      when: bandwidth_stats.results is defined
