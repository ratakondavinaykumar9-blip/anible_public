---
# FortiGate VPN Status Summary
# This playbook retrieves and validates the VPN operational status for FortiGate firewalls.
# 
# Standards Compliance:
# 1. Idempotency: Uses 'changed_when: false' as 'get' is a read-only operation.
# 2. Observability: Employs 'register' and 'assert' to verify data integrity.
# 3. Documentation: Inline comments explain task purpose and logic.
# 4. Error Handling: Uses 'failed_when' to catch specific command execution errors.
# 5. Best Practices: Uses Fully Qualified Collection Names (FQCN) for all modules.

- name: FortiGate VPN Status Summary
  hosts: fortigate
  gather_facts: false # Optimization: Fact gathering is unnecessary for this diagnostic task

  tasks:
    - name: Retrieve VPN status via CLI
      # Why: Fetch the current state of VPN tunnels directly from the device.
      ansible.netcommon.cli_command:
        command: "get vpn status"
      register: vpn_status_result
      # Idempotency: Ensure the task does not report a change for a read operation.
      changed_when: false
      # Error Handling: Fail if the module fails or if the command is unrecognized by the OS.
      failed_when: 
        - vpn_status_result.failed
        - "'Unknown command' in vpn_status_result.stdout"

    - name: Validate VPN status output
      # Why: Confirm that the device returned actionable data.
      # Observability: Provides explicit pass/fail criteria for the automation run.
      ansible.builtin.assert:
        that:
          - "vpn_status_result.stdout is defined"
          - "vpn_status_result.stdout | length > 0"
        fail_msg: "VPN status retrieval failed or returned empty content for {{ inventory_hostname }}."
        success_msg: "VPN status successfully retrieved and verified for {{ inventory_hostname }}."

    - name: Display VPN Status Summary
      # Why: Present the retrieved diagnostic information in a readable format.
      ansible.builtin.debug:
        msg: |
          ======================= VPN SUMMARY: {{ inventory_hostname }} =======================
          {{ vpn_status_result.stdout }}
          =====================================================================================