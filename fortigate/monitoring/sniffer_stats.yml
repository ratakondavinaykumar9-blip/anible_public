---
# FortiGate Packet Sniffer
# Standards-aligned playbook for network diagnostics
- name: Packet Sniffer
  hosts: fortigate
  gather_facts: false # Disabled to improve performance as standard system facts are not required
  vars:
    # Default parameters for the diagnostic sniffer
    filter: "host 192.168.1.1"
    count: 100
    verbose: 4

  tasks:
    - name: Execute packet sniffer diagnostic command
      # FQCN: Using ansible.netcommon for consistent CLI interaction across network platforms
      ansible.netcommon.cli_command:
        command: "diagnose sniffer packet any '{{ filter }}' {{ verbose }} {{ count }}"
      register: sniffer
      # Idempotency: Diagnostic commands are read-only and do not alter the device configuration
      changed_when: false
      # Error Handling: Validate command execution and catch platform-specific error strings
      failed_when:
        - sniffer.failed or "Command fail" in sniffer.stdout
        - "'syntax error' in sniffer.stdout"

    - name: Verify packet capture data was retrieved
      # Observability: Ensure the capture actually returned data to the management plane
      ansible.builtin.assert:
        that:
          - sniffer.stdout is defined
          - sniffer.stdout | length > 0
        fail_msg: "The sniffer command executed but returned no packet data. Verify the filter: {{ filter }}"
        success_msg: "Packet capture data successfully retrieved from {{ inventory_hostname }}."

    - name: Display packet sniffer output
      # Provide formatted output for visibility in automation logs
      ansible.builtin.debug:
        msg: |
          ======================= SNIFFER DATA =======================
          Target: {{ inventory_hostname }}
          Filter: {{ filter }}
          Count:  {{ count }}
          ------------------------------------------------------------
          {{ sniffer.stdout }}