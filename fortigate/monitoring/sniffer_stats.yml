---
# FortiGate Packet Sniffer - Improved for NetLearner Staging
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Author: NetLearner Architect
#
- name: Packet Sniffer
  hosts: fortigate
  gather_facts: false
  vars:
    # The traffic filter to apply (e.g., 'host 1.1.1.1' or 'port 443')
    filter: "host 192.168.1.1"
    # Number of packets to capture before the sniffer terminates
    count: 100
    # Verbosity level (1: print headers, 2: print IP data, 3: print Ethernet data, etc.)
    verbose: 4

  tasks:
    - name: Execute packet sniffer command on FortiGate
      # Idempotency: Read-only diagnostic commands use 'changed_when: false' to ensure
      # they don't report a "changed" state in subsequent runs.
      ansible.netcommon.cli_command:
        command: "diagnose sniffer packet any '{{ filter }}' {{ verbose }} {{ count }}"
      register: sniffer_result
      # Error Handling: Explicitly catch FortiOS-specific error strings that don't trigger a shell non-zero exit code.
      failed_when:
        - sniffer_result.stdout is not defined
        - "'Command fail' in sniffer_result.stdout"
        - "'Unknown action' in sniffer_result.stdout"
        - "'invalid' in sniffer_result.stdout"
      changed_when: false

    - name: Verify capture integrity and presence of data
      # Observability: Ensure the command executed successfully and returned meaningful packet data.
      ansible.builtin.assert:
        that:
          - sniffer_result.stdout | length > 0
          - "'interfaces' in sniffer_result.stdout or 'packets received' in sniffer_result.stdout"
        fail_msg: "Sniffer returned empty or invalid output. Check filter syntax or interface status."
        success_msg: "Packet capture data successfully retrieved and validated."

    - name: Display formatted capture results
      # Documentation/Observability: Present results in a clear, labeled block for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= SNIFFER CONTEXT =======================
          FILTER:    {{ filter }}
          VERBOSITY: {{ verbose }}
          MAX_COUNT: {{ count }}
          ----------------------- CAPTURE START -----------------------
          {{ sniffer_result.stdout }}
          ------------------------ CAPTURE END ------------------------
