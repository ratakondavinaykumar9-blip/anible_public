---
# FortiGate Traffic History - High Reliability Version
# This playbook retrieves operational data. Being read-only, it is inherently idempotent.
- name: Retrieve FortiGate Traffic History
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch traffic history via CLI
      # Using FQCN ansible.netcommon.cli_command for broad compatibility with network devices.
      # This command is read-only and does not modify device state, ensuring idempotency.
      ansible.netcommon.cli_command:
        command: get firewall traffic-history
      register: traffic_history_raw
      # Error Handling: Detect failures and handle cases where the command might be invalid for the firmware.
      failed_when:
        - "traffic_history_raw.failed"
        - "'Unknown command' in traffic_history_raw.stdout"
      ignore_errors: false

    - name: Validate traffic history retrieval
      # Observability: Confirm the register contains valid data before concluding the task.
      ansible.builtin.assert:
        that:
          - "traffic_history_raw.stdout is defined"
          - "traffic_history_raw.stdout | length > 0"
        fail_msg: "No traffic history data was returned from the device."
        success_msg: "Traffic history data successfully captured."

    - name: Display formatted traffic history
      # Documentation: Outputs the results for immediate operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC HISTORY REPORT =======================
          {{ traffic_history_raw.stdout }}
          ======================================================================