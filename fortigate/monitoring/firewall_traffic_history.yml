---
# Firewall Traffic History
# Improved: 2026-03-08
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: FortiGate Traffic History Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall traffic history
      # Why: Fetches historical traffic statistics for analysis. 
      # This is a read-only 'get' command, making the task inherently idempotent.
      ansible.netcommon.cli_command:
        command: get firewall traffic-history
      register: history_output
      # Why: Error Handling - ensure the command is supported and executed without device-side errors.
      failed_when: 
        - history_output.failed
        - "'Unknown command' in history_output.stdout"
        - "'Command fail' in history_output.stdout"

    - name: Validate traffic history data
      # Why: Observability - verify that the device returned actual data before proceeding.
      ansible.builtin.assert:
        that:
          - history_output.stdout is defined
          - history_output.stdout | length > 0
        fail_msg: "Traffic history retrieval failed or returned empty output."
        success_msg: "Traffic history successfully retrieved."

    - name: Display Traffic History
      # Why: Provide visibility of the results in the Ansible controller output.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC HISTORY =======================
          {{ history_output.stdout }}