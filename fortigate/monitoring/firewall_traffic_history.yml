# Firewall Traffic History
# Auto-improved: 2026-04-12 12:00
# Author: Arjun (OpenClaw)
# Improved by: NetLearner Architect
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
---
# FortiGate Traffic History - High Reliability Version
- name: Get Traffic History
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for read-only CLI commands

  tasks:
    - name: Retrieve firewall traffic history via CLI
      # Using FQCN (Fully Qualified Collection Name) for best practices and compatibility.
      # Command is read-only, ensuring idempotency across multiple runs.
      ansible.netcommon.cli_command:
        command: get firewall traffic-history
      register: history
      # Idempotency: Ensure this task is always marked as 'ok' and not 'changed' for read-only operations.
      changed_when: false
      # Error Handling: Fail if the device returns specific error messages in stdout or fails to execute.
      failed_when:
        - history.failed or "'Unknown command'" in history.stdout or "'Command fail'" in history.stdout

    - name: Validate traffic history data integrity
      # Observability: Use assert to verify that we received valid data before proceeding.
      ansible.builtin.assert:
        that:
          - history.stdout is defined
          - history.stdout | length > 0
        fail_msg: "Traffic history retrieval failed or returned empty data."
        success_msg: "Traffic history successfully retrieved and validated."

    - name: Display formatted traffic history
      # Documentation: Providing clear visual boundaries in audit logs for better observability.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC HISTORY START =======================
          {{ history.stdout }}
          ======================== TRAFFIC HISTORY END ========================