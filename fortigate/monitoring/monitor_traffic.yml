---
# FortiGate Traffic Monitoring - Enhanced Version
# Purpose: This playbook retrieves and displays real-time interface traffic statistics from FortiGate devices.
# Standards: Idempotent, Observable, Documented, and FQCN-compliant.

- name: Monitor Traffic
  hosts: fortigate
  gather_facts: false # Fact gathering is disabled to speed up execution on network devices

  tasks:
    - name: Retrieve interface traffic statistics via CLI
      # Using FQCN for cross-platform network CLI execution. 
      # This task is idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: get system interface traffic
      register: traffic_output
      # Error Handling: Ensure the task fails if the output is missing or contains error keywords
      failed_when: 
        - traffic_output.stdout is not defined or traffic_output.stdout | length == 0
        - "'command parse error' in traffic_output.stdout"

    - name: Verify that traffic data was successfully captured
      # Observability: Assert that the command returned the expected structural data
      ansible.builtin.assert:
        that:
          - "'Interface' in traffic_output.stdout or 'traffic' in traffic_output.stdout"
        fail_msg: "The retrieved data does not appear to be a valid traffic report."
        success_msg: "Traffic statistics successfully captured and validated."

    - name: Display traffic monitoring results
      # Provides structured visibility into the captured operational state
      ansible.builtin.debug:
        msg: |
          ==================================================================
          FORTIGATE TRAFFIC MONITORING REPORT
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ==================================================================
          {{ traffic_output.stdout }}
          ==================================================================