# FortiGate Traffic Monitoring
# Improved: 2026-04-12
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Monitor Traffic
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get system interface traffic statistics
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      # Documentation: Retrieving live interface counters from the FortiOS CLI
      ansible.netcommon.cli_command:
        command: get system interface traffic
      register: traffic
      # Idempotency: Read-only 'get' commands must not report as 'changed'
      changed_when: false
      # Error Handling: Explicitly fail if the command is rejected or returns an error
      failed_when: >
        traffic.stdout == "" or
        "command parse error" in traffic.stdout or
        "Unknown action" in traffic.stdout

    - name: Verify traffic data integrity
      # Observability: Assert that the output is defined and contains data
      ansible.builtin.assert:
        that:
          - traffic.stdout is defined
          - traffic.stdout | length > 0
        fail_msg: "Traffic data is empty or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Display Traffic Statistics
      # Observability: Provide a human-readable summary of the retrieved statistics
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC MONITORING: {{ inventory_hostname }} =======================
          {{ traffic.stdout }}