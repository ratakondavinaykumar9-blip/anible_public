---
# FortiGate Memory Monitoring Playbook
# This playbook retrieves and validates memory usage statistics.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Monitor FortiGate Memory
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system performance status
      # This is a read-only command, making the task inherently idempotent.
      # Using FQCN (ansible.netcommon.cli_command) for consistency and best practices.
      ansible.netcommon.cli_command:
        command: "get system performance status"
      register: mem_raw
      # Error Handling: Ensure the task fails explicitly if the command execution fails on the device.
      failed_when: mem_raw.rc != 0

    - name: Validate memory data retrieval
      # Observability: Use assert to verify that the output contains the expected 'Memory' string.
      # This ensures we are not processing empty or malformed data in subsequent steps.
      ansible.builtin.assert:
        that:
          - "'Memory' in mem_raw.stdout"
        fail_msg: "The command succeeded but 'Memory' statistics were not found in the output."
        success_msg: "Memory statistics successfully captured."

    - name: Display memory statistics
      # Documentation: Filter the raw output to show only relevant memory lines for better visibility.
      ansible.builtin.debug:
        msg: |
          ======================= MEMORY MONITORING =======================
          {{ mem_raw.stdout_lines | select('search', 'Memory', ignorecase=true) | list | join('\n') }}