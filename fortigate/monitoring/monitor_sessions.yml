---
# FortiGate Session Monitoring - NetLearner Architect Optimized
# This playbook retrieves real-time session metrics and validates data integrity.
# Standards: Idempotent (Read-only), Observability (Asserts), FQCN, Error Handling.

- name: Monitor FortiGate Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve detailed session list
      # Using FQCN for consistent network-agnostic command execution.
      # This task is inherently idempotent as it does not modify device state.
      ansible.netcommon.cli_command:
        command: "get system session list"
      register: sessions_output
      # Error Handling: Catch empty responses or CLI-level execution errors.
      failed_when: 
        - sessions_output.stdout is not defined or sessions_output.stdout == ""
        - "'command fail' in sessions_output.stdout | lower"

    - name: Retrieve session statistics summary
      ansible.netcommon.cli_command:
        command: "get system session stat"
      register: stats_output
      failed_when: 
        - stats_output.stdout is not defined or stats_output.stdout == ""

    - name: Assert session data validity
      # Observability: Verify that the response contains expected session metric keywords.
      ansible.builtin.assert:
        that:
          - "'sessions' in stats_output.stdout | lower"
        fail_msg: "The session statistics response was invalid or missing expected metrics."
        success_msg: "Session statistics successfully captured and validated."

    - name: Display Session Monitoring Report
      # Documentation: Provides operational visibility into firewall session load.
      ansible.builtin.debug:
        msg: |
          ======================= SESSION MONITORING =======================
          TARGET HOST: {{ inventory_hostname }}
          
          STATISTICS SUMMARY:
          {{ stats_output.stdout }}
          
          TOTAL SESSIONS COUNTED: {{ sessions_output.stdout_lines | length if sessions_output.stdout_lines is defined else 'Unknown' }}
          ==================================================================