---
# FortiGate CPU Monitoring
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Purpose: Retrieves real-time CPU performance and process statistics.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
---
- name: Monitor FortiGate CPU Performance
  hosts: fortigate
  gather_facts: false
  vars:
    # Defining expected patterns for observability validation
    cpu_header: "CPU"
    top_header: "RunTime"

  tasks:
    - name: "MONITOR | Retrieve system performance status"
      # Idempotency: Read-only CLI command execution has no impact on device state.
      # FQCN: Using fully qualified collection name for portability and best practice.
      ansible.netcommon.cli_command:
        command: "get system performance status"
      register: cpu_raw
      # Error Handling: Explicitly fail if the command fails or returns no output.
      failed_when: 
        - cpu_raw.failed
        - cpu_raw.stdout | length == 0

    - name: "ASSERT | Validate CPU data integrity"
      # Observability: Confirm that the output actually contains the expected CPU metrics.
      ansible.builtin.assert:
        that:
          - "cpu_header in cpu_raw.stdout"
        fail_msg: "The command 'get system performance status' did not return valid CPU data."
        quiet: true

    - name: "MONITOR | Retrieve top process usage"
      # 'diagnose system top 1 20 1' ensures the command is non-interactive.
      # Parameters: 1s delay, 20 lines, 1 iteration.
      ansible.netcommon.cli_command:
        command: "diagnose system top 1 20 1"
      register: top_raw
      # Error Handling: We allow the playbook to continue if process monitoring fails, 
      # but we capture the failure state via registration.
      ignore_errors: true

    - name: "ASSERT | Validate process list retrieval"
      # Observability: Verify that the process table header is present in the output.
      ansible.builtin.assert:
        that:
          - "not top_raw.failed"
          - "top_header in top_raw.stdout"
        fail_msg: "Process monitoring failed or returned an unrecognized format."
        quiet: true

    - name: "DISPLAY | Report CPU Monitoring Results"
      # Documentation: Providing a structured output for easy log analysis.
      ansible.builtin.debug:
        msg: |
          ======================= CPU MONITORING SUMMARY =======================
          DEVICE: {{ inventory_hostname }}
          
          --- SYSTEM PERFORMANCE ---
          {{ cpu_raw.stdout }}
          
          --- TOP PROCESSES ---
          {{ top_raw.stdout | default('No process data available.') }}