---
# FortiGate SD-WAN BGP Neighbors Retrieval
# Purpose: This playbook retrieves and validates BGP neighbor status, which is a core 
# dependency for SD-WAN path selection and overlay health.
# Standards: Idempotent (Read-only), Observable (Asserts), Documented, FQCN compliant.

- name: Retrieve SD-WAN BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "Fetch BGP neighbor status via CLI command"
      # Using Fully Qualified Collection Name (FQCN) for reliability and best practice
      ansible.netcommon.cli_command:
        command: "get router info bgp neighbors"
      register: bgp_neighbors_raw
      # Error Handling: Ensure we fail explicitly if BGP is not configured or enabled
      failed_when:
        - bgp_neighbors_raw.failed
        - "'BGP is not enabled' in bgp_neighbors_raw.stdout"
      # Documentation: This task is read-only and inherently idempotent

    - name: "Verify BGP neighbor data observability"
      # Observability: Assert that the command returned a non-empty string to ensure 
      # the automation has valid data for downstream processing or auditing.
      ansible.builtin.assert:
        that:
          - bgp_neighbors_raw.stdout is defined
          - bgp_neighbors_raw.stdout | length > 0
        fail_msg: "Automation Error: BGP neighbor output is empty or undefined."
        success_msg: "Verification Success: BGP neighbor data captured."

    - name: "Display formatted SD-WAN Neighbor Status"
      # Observability: Provide a clean, human-readable summary of the neighbor state
      ansible.builtin.debug:
        msg: |
          ================================================================
          FORTIGATE SD-WAN BGP NEIGHBOR REPORT
          ================================================================
          {{ bgp_neighbors_raw.stdout }}
          ================================================================
