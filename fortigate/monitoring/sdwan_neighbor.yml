---
# Playbook: FortiGate SD-WAN BGP Neighbor Retrieval
# This playbook retrieves BGP neighbor status to verify SD-WAN routing health.
# Adheres to Idempotency, Observability, and FQCN standards.
# Improved: 2026-03-15
# Author: NetLearner Architect

- name: Get FortiGate SD-WAN BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to fetch BGP neighbors
      # Using FQCN: ansible.netcommon.cli_command
      # This is a read-only operation and is inherently idempotent.
      ansible.netcommon.cli_command:
        command: "get router info bgp neighbors"
      register: neighbors_result
      # Use failed_when to ensure we catch cases where the command might return an error string
      failed_when: 
        - neighbors_result.failed or "Command fail" in neighbors_result.stdout

    - name: Validate neighbor data retrieval
      # Observability: Ensure the command returned output and did not fail.
      ansible.builtin.assert:
        that:
          - neighbors_result.stdout is defined
          - neighbors_result.stdout | length > 0
        fail_msg: "No BGP neighbor information could be retrieved from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved BGP neighbor data from {{ inventory_hostname }}."

    - name: Display SD-WAN Neighbor Status
      # Documentation: Providing formatted output for human operators.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          SD-WAN / BGP NEIGHBOR STATUS FOR: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================================================================
          {{ neighbors_result.stdout }}
          ======================================================================