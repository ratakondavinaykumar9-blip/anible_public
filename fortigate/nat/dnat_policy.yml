---
# Architect: FortiGate DNAT Policy Retrieval
# Purpose: Fetches and validates DNAT configuration for auditing and observability.
# Standards: Idempotent, Observable, Documented, Error-handled, FQCN compliant.

- name: Get FortiGate DNAT Policies
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve DNAT policies via CLI
      # Using FQCN for network command execution
      ansible.netcommon.cli_command:
        command: get firewall dnats
      register: dnat_output
      # Idempotency: Read-only operations must not report state changes
      changed_when: false
      # Error Handling: Fail if command is unrecognized or execution fails
      failed_when:
        - dnat_output.failed or "Unknown" in dnat_output.stdout

    - name: Validate DNAT data integrity
      # Observability: Ensure the command returned valid configuration data
      ansible.builtin.assert:
        that:
          - dnat_output.stdout is defined
          - dnat_output.stdout | length > 0
        fail_msg: "DNAT retrieval failed: Output is empty or undefined."
        success_msg: "DNAT policies successfully captured."

    - name: Display DNAT Configuration
      # Documentation: Format output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= DNAT SUMMARY =======================
          {{ dnat_output.stdout }}