# FortiGate DNAT Policy Audit
# Improved according to NetLearner Staging Standards
# Author: NetLearner Architect (Managed by Gemini CLI)
#
- name: Get DNAT Policies
  hosts: fortigate
  gather_facts: false # Performance: Disabling fact gathering as only CLI inspection is needed

  tasks:
    - name: Retrieve DNAT configuration from firewall
      # Why: Directly querying the FortiOS CLI to fetch the current DNAT policy state.
      # FQCN: Using ansible.netcommon.cli_command for platform-agnostic network CLI interaction.
      ansible.netcommon.cli_command:
        command: get firewall dnats
      register: dnat_output
      # Idempotency: Read-only 'get' commands must not report a 'changed' status to ensure safe re-runs.
      changed_when: false
      # Error Handling: Fail explicitly if the command returns a non-zero exit code or FortiOS error strings.
      failed_when: >
        (dnat_output.rc | default(0) != 0) or
        ("error" in dnat_output.stdout | lower) or
        ("invalid" in dnat_output.stdout | lower)

    - name: Validate DNAT data observability
      # Observability: Confirm that the output buffer contains data before proceeding with analysis.
      ansible.builtin.assert:
        that:
          - dnat_output.stdout is defined
          - dnat_output.stdout | length > 0
        fail_msg: "DNAT retrieval failed: The device returned an empty or undefined response."
        success_msg: "DNAT policy data successfully retrieved and verified."

    - name: Display DNAT Policies
      # Documentation: Formatted debug output for human-readable verification in deployment logs.
      ansible.builtin.debug:
        msg: |
          ======================= DNAT POLICIES =======================
          {{ dnat_output.stdout }}