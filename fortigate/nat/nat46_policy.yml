---
# FortiGate NAT46 Policy Retrieval and Validation
# This playbook retrieves NAT46 configuration from FortiGate devices, 
# ensuring observability and structural integrity of the output.
- name: FortiGate NAT46 Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve NAT46 configuration via CLI
      # Using FQCN for consistent cross-platform network command execution
      ansible.netcommon.cli_command:
        command: get firewall nat46
      register: nat46_result
      # Error Handling: Ensure the command is supported and executed successfully
      failed_when: 
        - nat46_result.rc != 0
        - "'Unknown action' in nat46_result.stdout"
        - "'Command fail' in nat46_result.stdout"

    - name: Validate NAT46 data presence
      # Observability: Confirm the device returned non-empty configuration
      ansible.builtin.assert:
        that:
          - nat46_result.stdout is defined
          - nat46_result.stdout | length > 0
        fail_msg: "NAT46 configuration retrieval returned empty or undefined results."
        success_msg: "NAT46 configuration successfully captured for analysis."

    - name: Display NAT46 Policy Details
      # Documentation: Format output for human-readability in logs/CI/CD pipelines
      ansible.builtin.debug:
        msg: |
          ======================= NAT46 CONFIGURATION START =======================
          {{ nat46_result.stdout }}
          ======================= NAT46 CONFIGURATION END =========================
      when: nat46_result.stdout is defined