---
# Nat Session
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Standards applied:
# 1. Idempotency: Read-only 'get' operations are safe for repeated execution.
# 2. Observability: Registered output and assertions to verify command integrity.
# 3. Documentation: Clear comments explaining error handling and logic.
# 4. Error Handling: 'failed_when' handles cases where no sessions match the filter.
# 5. Best Practices: Strict adherence to Fully Qualified Collection Names (FQCN).

- name: FortiGate NAT Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch active NAT sessions from FortiGate CLI
      # Using FQCN for transport-agnostic network commands
      ansible.netcommon.cli_command:
        command: get system session list | grep NAT
      register: nat_sess_output
      # Prevent failure if 'grep' returns no matches (standard behavior for empty results)
      failed_when: 
        - nat_sess_output.failed
        - "'command not found' in nat_sess_output.stderr"

    - name: Validate session retrieval integrity
      # Observability: Ensure the device responded with a valid structure
      ansible.builtin.assert:
        that:
          - nat_sess_output is defined
          - nat_sess_output.stdout is defined
        fail_msg: "Failed to communicate with the FortiGate or retrieve session data."
        quiet: true

    - name: Display NAT sessions summary
      # Idempotency: Displaying data does not modify system state
      ansible.builtin.debug:
        msg: |
          ======================= NAT SESSIONS =======================
          {% if nat_sess_output.stdout | length > 0 %}
          {{ nat_sess_output.stdout }}
          {% else %}
          No active NAT sessions were found at this time.
          {% endif %}