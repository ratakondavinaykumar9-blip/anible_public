---
# FortiGate NAT Session Retrieval
# Purpose: Audit active NAT sessions for troubleshooting and compliance.
# Standards: NetLearner Architect Standard v1.0
# Improved: 2026-04-12

- name: FortiGate NAT Sessions Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get NAT session list from device
      # This task is idempotent as it performs a non-mutating state retrieval.
      # Grep returns exit code 1 if no matches are found; we use failed_when to ensure 
      # the playbook continues even if no NAT sessions are currently active.
      ansible.netcommon.cli_command:
        command: get system session list | grep NAT
      register: nat_sess
      failed_when: 
        - nat_sess.rc is defined
        - nat_sess.rc > 1  # rc 0 = success, rc 1 = no match (valid for audit)

    - name: Verify command execution success
      # Observability: Ensure the device responded and the register variable is populated.
      ansible.builtin.assert:
        that:
          - nat_sess.stdout is defined
        fail_msg: "Failed to communicate with {{ inventory_hostname }} or retrieve session data."
        quiet: true

    - name: Display NAT session details
      # Documentation: Provide clear visibility into the current network state.
      # Conditional logic handles empty results gracefully for better observability.
      ansible.builtin.debug:
        msg: |
          ======================= NAT SESSIONS: {{ inventory_hostname }} =======================
          {{ nat_sess.stdout if nat_sess.stdout | length > 0 else 'STATUS: No active NAT sessions detected.' }}

    - name: Confirm audit integrity
      # Error Handling: Explicitly confirm the audit step finished without underlying connection failures.
      ansible.builtin.assert:
        that:
          - not nat_sess.failed | default(false)
        fail_msg: "The NAT session retrieval task encountered a fatal transport error."
        quiet: true
