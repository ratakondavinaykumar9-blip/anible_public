---
# FortiGate VIP (DNAT) List Audit
# Purpose: Retrieves and validates the Virtual IP (DNAT) configuration for auditing purposes.
# Idempotency: This operation is read-only and safe to execute multiple times without changing state.
# Standards: Implements FQCN, robust error handling, and observability assertions.

- name: Audit FortiGate VIP List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve VIP configurations via CLI
      # Use FQCN for cross-platform network CLI compatibility.
      ansible.netcommon.cli_command:
        command: get firewall vip
      register: vip
      # Error Handling: Ensure the task fails if the device returns specific error strings 
      # that might not trigger a standard non-zero exit code.
      failed_when: 
        - vip.failed or "Command fail" in vip.stdout or "Unknown action" in vip.stdout

    - name: Verify VIP data integrity
      # Observability: Assert that the command execution resulted in non-empty output
      # to prevent silent failures in automated reporting pipelines.
      ansible.builtin.assert:
        that:
          - "vip.stdout is defined"
          - "vip.stdout | length > 0"
        fail_msg: "Failed to retrieve VIP data or the list is empty on {{ inventory_hostname }}."
        success_msg: "Successfully validated VIP data for {{ inventory_hostname }}."

    - name: Display VIP (DNAT) Report
      # Documentation: Structured debug output provides a clear human-readable summary in logs.
      ansible.builtin.debug:
        msg: |
          ======================= VIPs (DNAT) =======================
          Device: {{ inventory_hostname }}
          Audit Data:
          {{ vip.stdout }}
