---
# FortiGate NAT64 Policies Audit
# Purpose: Retrieves and validates NAT64 configuration for IPv6/IPv4 transition monitoring.
# Idempotency: This is a read-only "Get" operation and is inherently safe to run multiple times.
# Author: NetLearner Architect (Improved)
---
- name: Get NAT64 Policies
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for CLI command execution

  tasks:
    - name: Retrieve NAT64 configuration from firewall
      # Using FQCN for robust network interaction via network_cli
      ansible.netcommon.cli_command:
        command: get firewall nat64
      register: nat64_raw
      # Error Handling: Catch actual execution failures while allowing for "Unknown action" 
      # which typically occurs if the NAT64 feature is not enabled on the VDOM.
      failed_when:
        - nat64_raw.rc != 0
        - "'Unknown action' not in nat64_raw.stdout"
        - "'Unknown action' not in nat64_raw.stderr"

    - name: Validate NAT64 command execution
      # Observability: Assert that we received a defined response from the device
      ansible.builtin.assert:
        that:
          - nat64_raw.stdout is defined
        fail_msg: "Device {{ inventory_hostname }} did not return a valid NAT64 response."
        success_msg: "NAT64 response successfully captured from {{ inventory_hostname }}."
        quiet: true

    - name: Display NAT64 configuration details
      # Observability: Provide structured output for network operators
      ansible.builtin.debug:
        msg: |
          ======================= NAT64 POLICIES =======================
          Target Device: {{ inventory_hostname }}
          Status: {{ 'Feature Disabled' if 'Unknown action' in nat64_raw.stdout else 'Active' }}
          --------------------------------------------------------------
          {{ nat64_raw.stdout | default('No NAT64 policies defined.') }}
