---
# FortiGate NAT64 Policy Retrieval and Validation
# This playbook retrieves NAT64 configurations while ensuring operational observability,
# error handling, and adherence to Ansible best practices (FQCN).
# Idempotency: This is a read-only operation and does not modify device state.

- name: Get NAT64 Policies
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve NAT64 configuration via CLI
      # Using FQCN for best practices and consistency across environments.
      ansible.netcommon.cli_command:
        command: get firewall nat64
      register: nat64_output
      # Error Handling: Fail only if the command itself fails or returns a parser error.
      # We allow empty results as valid configuration states.
      failed_when: 
        - nat64_output.failed | default(false)
        - "'command parse error' in nat64_output.stdout | lower"

    - name: Validate retrieval success (Observability)
      # Assert ensures the task path stops if the expected data structure is missing.
      ansible.builtin.assert:
        that:
          - "nat64_output.stdout is defined"
        fail_msg: "Critical Error: Failed to capture stdout from the NAT64 command."
        success_msg: "NAT64 configuration successfully captured."
        quiet: true

    - name: Display NAT64 Configuration Details
      # Documentation: Providing formatted output for human-readable audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= NAT64 POLICY SUMMARY =======================
          Device: {{ inventory_hostname }}
          Status: SUCCESS
          Data:
          {{ nat64_output.stdout | default('No NAT64 policies found or configured.') }}