---
# FortiGate Kernel Routes
# Improved: 2026-03-08
# Description: Retrieves and validates kernel routing information from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage.
- name: Get Kernel Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve kernel routing table via CLI
      # Using FQCN for cross-platform stability. 
      # This task is idempotent as it performs a non-intrusive 'get' operation.
      ansible.netcommon.cli_command:
        command: get router info routing-table kernel
      register: kernel
      # Error Handling: Trap FortiOS specific error messages that might return exit code 0
      failed_when: 
        - kernel.failed or "Command fail" in kernel.stdout or "Unknown action" in kernel.stdout

    - name: Validate that kernel route data was retrieved
      # Observability: Assert that the output contains data to ensure subsequent tasks have valid input
      ansible.builtin.assert:
        that:
          - kernel.stdout is defined
          - kernel.stdout | length > 0
        fail_msg: "Failed to retrieve kernel routing table or the output was empty."
        success_msg: "Successfully retrieved kernel routing table data."

    - name: Display kernel routes
      # Observability: Provide clear visibility into the system state for debugging and auditing
      ansible.builtin.debug:
        msg: |
          ======================= KERNEL ROUTES: {{ inventory_hostname }} =======================
          {{ kernel.stdout }}