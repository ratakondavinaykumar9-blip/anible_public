---
# FortiGate Kernel Routes - Optimized for Production
# Improved: 2026-03-15
# Author: NetLearner Architect
# Standards: Idempotency, Observability, FQCN, Error Handling
#
- name: Get FortiGate Kernel Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve kernel routing table from FortiGate
      # Why: Fetches low-level kernel routes to verify hardware offloading and actual traffic pathing.
      # FQCN used: ansible.netcommon.cli_command
      ansible.netcommon.cli_command:
        command: "get router info routing-table kernel"
      register: kernel_output
      # Error Handling: Fail explicitly if the command returns a shell error or null output.
      failed_when: 
        - kernel_output.rc != 0
        - "'Command fail' in kernel_output.stdout"
      ignore_errors: false

    - name: Validate kernel route retrieval
      # Observability: Use assert to ensure the output contains expected routing data.
      # Idempotency: This task is read-only and safe to run repeatedly without state change.
      ansible.builtin.assert:
        that:
          - "kernel_output.stdout is defined"
          - "kernel_output.stdout | length > 0"
        fail_msg: "The kernel routing table could not be retrieved or is empty."
        success_msg: "Kernel routing table successfully captured."

    - name: Display formatted kernel routes
      # Observability: Provide clear visibility into the captured state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= KERNEL ROUTES =======================
          {{ kernel_output.stdout }}

    - name: Persist routing data to host facts
      # Why: Storing the output in a fact allows subsequent plays to reference the data 
      # without re-executing the CLI command, improving performance and consistency.
      ansible.builtin.set_fact:
        fg_kernel_routes_cache: "{{ kernel_output.stdout }}"