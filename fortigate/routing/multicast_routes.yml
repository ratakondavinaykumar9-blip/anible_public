---
# FortiGate Multicast Routing Table Audit
# This playbook retrieves and validates the multicast routing table from FortiGate devices.
# Purpose: Ensures visibility into multicast traffic flow for network troubleshooting and auditing.
# Standards: Idempotency (Read-only operation), Observability (Assert/Register), FQCN usage.

- name: FortiGate Multicast Route Verification
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Multicast Routing Table
      # Using FQCN ansible.netcommon.cli_command for standardized network interaction.
      # This task is idempotent as 'get' commands do not modify the device configuration.
      ansible.netcommon.cli_command:
        command: get router info routing-table multicast
      register: mc
      # Error Handling: Detect CLI-level failures that may not trigger a transport error.
      failed_when: 
        - mc.failed or "Command fail" in mc.stdout or "Unknown action" in mc.stdout

    - name: Validate Multicast Data Retrieval
      # Observability: Verify that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - mc.stdout is defined
          - mc.stdout | length > 0
        fail_msg: "Multicast routing table is empty or could not be retrieved."
        success_msg: "Multicast routing table successfully captured."

    - name: Display Multicast Routes
      # Observability: Formatted output for audit logs and real-time verification.
      ansible.builtin.debug:
        msg: |
          ======================= MULTICAST ROUTES =======================
          {{ mc.stdout }}