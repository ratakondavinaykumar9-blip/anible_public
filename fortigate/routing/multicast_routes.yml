---
# Multicast Routes
# Standard: NetLearner Architect v2.0
# WHY: High-availability multicast visibility is critical for NetLearner Staging validation.
# This playbook provides idempotent, observable data collection for multicast RIB state.

- name: FortiGate Multicast Routes
  hosts: fortigate
  gather_facts: false # Optimization: System facts not required for CLI state inspection

  tasks:
    - name: Retrieve multicast routing table via CLI
      # WHY: Fetching the active multicast routing information to verify PIM/IGMP convergence.
      ansible.netcommon.cli_command:
        command: get router info routing-table multicast
      register: mc
      # Idempotency: Read-only operations are inherently safe.
      # check_mode: false ensures this runs even when the operator is performing a dry run.
      check_mode: false
      # Error Handling: Fail if the device returns an error or command is unsupported.
      failed_when:
        - mc.failed or "Unknown action" in mc.stdout or "Command fail" in mc.stdout

    - name: Validate multicast data integrity
      # Observability: Assert that the command execution resulted in valid output.
      ansible.builtin.assert:
        that:
          - mc.stdout is defined
          - mc.stdout | length > 0
        fail_msg: "Data retrieval failed: Multicast table is empty or command was rejected."
        success_msg: "Multicast routing table captured successfully."

    - name: Display Multicast Routes
      # Observability: Human-readable output for real-time audit and logging.
      ansible.builtin.debug:
        msg: |
          ======================= MULTICAST ROUTES =======================
          Device: {{ inventory_hostname }}
          Status: SUCCESS
          Payload:
          {{ mc.stdout }}
