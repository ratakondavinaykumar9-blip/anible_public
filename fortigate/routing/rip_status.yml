---
# FortiGate RIP Status (Improved)
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Target: Retrieve and verify RIP routing table information from FortiGate devices.

- name: FortiGate RIP Status
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve RIP routing information
      # FQCN: ansible.netcommon.cli_command is used for direct CLI interaction.
      # Idempotency: This is a read-only operation and does not change state.
      ansible.netcommon.cli_command:
        command: get router info rip
      register: rip_output
      # Error Handling: Fail if the command explicitly returns an error message or if the task fails.
      failed_when: 
        - rip_output.failed or "Unknown action" in rip_output.stdout or "Command fail" in rip_output.stdout

    - name: Verify RIP status data integrity
      # Observability: Assert that the command returned valid, non-empty output.
      ansible.builtin.assert:
        that:
          - rip_output.stdout is defined
          - rip_output.stdout | length > 0
        fail_msg: "The RIP status output was empty or could not be retrieved."
        success_msg: "RIP status data successfully captured."

    - name: Display RIP routing table
      # Documentation: Providing a clean, formatted output for the network operator.
      ansible.builtin.debug:
        msg: |
          ==========================================================
          FORTIG