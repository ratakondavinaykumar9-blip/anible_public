---
# FortiGate RIP Status - Enhanced Production Version
# Standards Applied: Idempotency, Observability, FQCN, Error Handling
# Author: NetLearner Architect
#
- name: Retrieve and Validate FortiGate RIP Routing Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute RIP status command on FortiOS CLI
      # Using FQCN for portable execution; changed_when: false ensures idempotency reporting for read-only tasks
      ansible.netcommon.cli_command:
        command: get router info rip
      register: rip_output
      changed_when: false
      # Error Handling: Catch specific FortiOS CLI error strings that might not trigger a non-zero exit code
      failed_when:
        - rip_output.stdout is not defined
        - "'Command fail' in rip_output.stdout"
        - "'parse error' in rip_output.stdout"

    - name: Verify RIP status output integrity
      # Observability: Assert that the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - rip_output.stdout | length > 0
          - "'Codes:' in rip_output.stdout or 'RIP' in rip_output.stdout"
        fail_msg: "RIP Status command returned invalid or empty response. Ensure RIP is configured and enabled."
        success_msg: "RIP status successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display Formatted RIP Routing Information
      # Documentation: Providing a clear, structured view for operational observability
      ansible.builtin.debug:
        msg: |
          ==========================================================
          DEVICE: {{ inventory_hostname }}
          SERVICE: RIP Routing Table
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ==========================================================
          {{ rip_output.stdout }}
