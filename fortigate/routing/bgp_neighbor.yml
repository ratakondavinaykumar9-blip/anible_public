---
# Architect: Improved BGP Neighbor Playbook
# This playbook retrieves and validates BGP neighbor status from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert/Register), FQCN, Error Handling.

- name: Retrieve and Verify FortiGate BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute BGP neighbor status command
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction.
      # Idempotency: This is a GET operation, making it safe to run repeatedly without state change.
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors_result
      # Error Handling: Ensure the task fails explicitly if the CLI command fails.
      failed_when: 
        - neighbors_result.failed | default(false)
        - "'command parse error' in neighbors_result.stdout | lower"

    - name: Verify BGP data integrity
      # Observability: Use assert to verify that the device returned a non-empty response.
      ansible.builtin.assert:
        that:
          - neighbors_result.stdout is defined
          - neighbors_result.stdout | length > 0
        fail_msg: "Failed to retrieve BGP data from {{ inventory_hostname }} or the output was empty."
        success_msg: "BGP neighbor data successfully retrieved and validated."

    - name: Display BGP Neighbors Information
      # Documentation: Providing a clear, formatted view of the operational state for the operator.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          DEVICE: {{ inventory_hostname }}
          COMMAND: get router info bgp neighbors
          ===================== BGP NEIGHBORS =======================
          {{ neighbors_result.stdout }}
          ===========================================================