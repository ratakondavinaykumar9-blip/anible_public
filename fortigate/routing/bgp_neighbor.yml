---
# FortiGate BGP Neighbors Inspection
# This playbook retrieves operational BGP state for monitoring and audit purposes.
# Idempotency: This playbook is inherently idempotent as it uses read-only operational commands.
- name: Get BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve BGP neighbor status from CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability.
      # This task captures the raw output of the BGP neighbor status command.
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors
      # Error Handling: Ensure the task fails if the output contains common FortiOS CLI error strings.
      failed_when:
        - "'command parse error' in neighbors.stdout"
        - "'Unknown action' in neighbors.stdout"

    - name: Validate BGP neighbor output integrity
      # Observability: Assert that the command returned data to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - "neighbors.stdout is defined"
          - "neighbors.stdout | length > 0"
        fail_msg: "The BGP neighbor status command returned no data. Check device connectivity or BGP configuration."
        success_msg: "BGP neighbor data successfully retrieved."

    - name: Display BGP Neighbors Report
      # Documentation: Provides human-readable observability for the network operator.
      ansible.builtin.debug:
        msg: |
          ======================= BGP NEIGHBORS =======================
          {{ neighbors.stdout }}