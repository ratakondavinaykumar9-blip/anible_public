MCP issues detected. Run /mcp list for status.```yaml
---
# FortiGate Policy Routes Retrieval
# Optimized for NetLearner Architecture Standards
# Focus: Idempotency, Observability, and Robust Error Handling
- name: Get Policy Routes
  hosts: fortigate
  gather_facts: false # Facts gathering is not required for CLI command execution on FortiOS

  tasks:
    - name: Execute 'get router policy' command
      # Using FQCN for module consistency.
      # Idempotency: This is a read-only command and is safe for repeated execution.
      ansible.netcommon.cli_command:
        command: get router policy
      register: policy_result
      # Error Handling: Detect CLI execution failures or command syntax errors that don't return non-zero exit codes.
      failed_when: >
        policy_result.failed or 
        "command parse error" in policy_result.stdout | lower or
        "unknown command" in policy_result.stdout | lower

    - name: Verify policy route data integrity
      # Observability: Ensure that the command actually returned data before proceeding.
      ansible.builtin.assert:
        that:
          - "policy_result.stdout is defined"
          - "policy_result.stdout | length > 0"
        fail_msg: "Data retrieval failed: The 'get router policy' output is empty or undefined."
        success_msg: "Policy route data successfully captured and validated."

    - name: Display Policy Routes to Console
      # Documentation: Formatted output for operator visibility and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= POLICY ROUTES =======================
          {{ policy_result.stdout }}
