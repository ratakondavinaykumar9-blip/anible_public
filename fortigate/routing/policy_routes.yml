---
# FortiGate Policy Routes Audit
# This playbook retrieves and validates policy-based routing (PBR) state.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Retrieve and Display FortiGate Policy Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch current policy routes via CLI
      # Why: Retrieving the operational state of policy routes is essential for 
      # auditing routing decisions without modifying the device configuration.
      ansible.netcommon.cli_command:
        command: get router policy
      register: policy_output
      # Idempotency: Read-only operations must always report 'changed: false'.
      changed_when: false
      # Error Handling: Ensure the task fails if the command is not recognized or the device errors.
      failed_when: 
        - policy_output.failed or "Command fail" in policy_output.stderr

    - name: Validate policy route response
      # Why: Observability check to confirm that the device returned a valid, 
      # non-empty routing table before attempting to process or display it.
      ansible.builtin.assert:
        that:
          - policy_output.stdout is defined
          - policy_output.stdout | length > 0
        fail_msg: "Failed to retrieve policy routes: The output was empty or invalid."
        quiet: true

    - name: Display formatted Policy Routes
      # Why: Provides the operator with a clear, human-readable view of the 
      # current policy-based routing configuration.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICY ROUTES =======================
          {{ policy_output.stdout }}