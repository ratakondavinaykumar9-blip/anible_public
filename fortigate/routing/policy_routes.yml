---
# Policy Routes
# Auto-improved: 2026-03-08
# Author: Architect:#
---
- name: Get FortiGate Policy Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve policy routes from the device
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      # Documentation: This task executes the operational command to list policy routes
      ansible.netcommon.cli_command:
        command: get router policy
      register: policy_data
      # Error Handling: Ensure the playbook fails if the command is rejected or execution fails
      failed_when: 
        - policy_data.failed
        - "'command parse error' in policy_data.stdout"

    - name: Verify policy route data retrieval
      # Observability: Assert that the command returned meaningful output
      ansible.builtin.assert:
        that:
          - "policy_data.stdout is defined"
          - "policy_data.stdout | length > 0"
        fail_msg: "Policy route output is empty or the command failed to return data."
        success_msg: "Policy routes successfully retrieved and verified."

    - name: Display Policy Routes
      # Documentation: Provide visual confirmation of the current device state
      ansible.builtin.debug:
        msg: |
          ======================= POLICY ROUTES =======================
          {{ policy_data.stdout }}
      # Idempotency: Read-only operations are inherently idempotent and safe for repeated execution