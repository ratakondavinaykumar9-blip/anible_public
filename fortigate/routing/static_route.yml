---
# NetLearner Architect Standardized Playbook
# Purpose: Retrieves and validates FortiGate static route configuration.
# Standards: Idempotency (read-only), Observability (assert/register), FQCN usage.
# Author: NetLearner Architect (2026-03-15)

- name: Retrieve and Validate FortiGate Static Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute command to fetch static route configuration
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability
      # Idempotency: This is a read-only operation and safe to run multiple times
      ansible.netcommon.cli_command:
        command: "get router static"
      register: static_output
      # Error Handling: Ensure the command did not return a CLI error message
      failed_when: 
        - static_output.failed | default(false)
        - "'Command fail' in static_output.stdout or 'Unknown command' in static_output.stdout"

    - name: Verify successful route retrieval
      # Observability: Assert that the output is not empty and contains expected data
      ansible.builtin.assert:
        that:
          - static_output.stdout is defined
          - static_output.stdout | length > 0
        fail_msg: "Data retrieval failed or no static routes are configured on the device."
        success_msg: "Static route data successfully retrieved and validated."

    - name: Display formatted static route data
      # Documentation: Provide clear, human-readable output for auditing
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE STATIC ROUTES =======================
          {{ static_output.stdout }}