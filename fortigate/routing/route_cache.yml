---
# FortiGate Route Cache Retrieval Playbook
# This playbook collects the routing table cache from FortiGate devices for operational visibility.
# Standard compliance: Idempotency (read-only), Observability (assertions), and FQCN usage.

- name: Get Route Cache from FortiGate
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch the routing table cache via CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability.
      # This task is inherently idempotent as it performs a read-only state inspection.
      ansible.netcommon.cli_command:
        command: get router info routing-table cache
      register: cache_result
      # Error Handling: Ensure we fail if the device returns an error message despite a successful transport connection.
      failed_when: 
        - cache_result.failed or "Command fail" in cache_result.stdout or "Unknown action" in cache_result.stdout

    - name: Validate that the route cache data was retrieved
      # Observability: Verify that the command returned non-empty output to ensure meaningful results.
      ansible.builtin.assert:
        that:
          - cache_result.stdout is defined
          - cache_result.stdout | length > 0
        fail_msg: "Route cache data is missing or empty. Verify routing protocols are active on the target."
        success_msg: "Route cache data successfully captured."

    - name: Display the retrieved Route Cache
      # Providing a formatted view for operators and audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= ROUTE CACHE =======================
          {{ cache_result.stdout }}