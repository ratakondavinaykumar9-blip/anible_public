---
# FortiGate Route Cache Inspection - NetLearner Standards
# Purpose: Retrieves the routing table cache for path analysis and NP6/NP7 offload verification.
# Idempotency: Read-only operation; safe for repeated execution across staging/production.
# Author: NetLearner Architect (Refined from Arjun's original)
---
- name: FortiGate Route Cache
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve routing table cache via CLI
      # FQCN used to ensure compatibility with ansible-core standards.
      # Command retrieves operational data; does not modify device state.
      ansible.netcommon.cli_command:
        command: get router info routing-table cache
      register: cache_result
      # Error Handling: Catch firmware-specific command failures or empty results.
      failed_when:
        - cache_result.failed
        - "'Command fail' in cache_result.stdout"
        - "'Unknown action' in cache_result.stdout"

    - name: Validate route cache data integrity
      # Observability: Ensure the buffer contains expected routing headers or non-zero length.
      ansible.builtin.assert:
        that:
          - cache_result.stdout | length > 0
          - "'dest' in cache_result.stdout | lower or 'route' in cache_result.stdout | lower"
        fail_msg: "Route cache retrieval failed or returned invalid data. Verify FortiOS version."
        success_msg: "Successfully validated route cache data from {{ inventory_hostname }}."

    - name: Display Formatted Route Cache
      # Observability: Provide clean, actionable output for the NetLearner Staging environment.
      ansible.builtin.debug:
        msg: |
          ======================= ROUTE CACHE: {{ inventory_hostname }} =======================
          Status: Operational
          -----------------------------------------------------------
          {{ cache_result.stdout }}
