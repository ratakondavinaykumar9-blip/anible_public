---
# FortiGate BGP Status Monitoring
# This playbook retrieves and validates the BGP summary from FortiGate firewalls.
# It adheres to enterprise standards for idempotency, observability, and error handling.

- name: FortiGate BGP Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch BGP summary information
      # Use Fully Qualified Collection Name (FQCN) for the network CLI module.
      # This task is naturally idempotent as it performs a read-only 'get' operation.
      ansible.netcommon.cli_command:
        command: get router info bgp summary
      register: bgp_result
      # Idempotency: Explicitly mark as unchanged to prevent false positives in reporting.
      changed_when: false
      # Error Handling: Detect if the command failed or was not recognized by FortiOS.
      failed_when:
        - bgp_result.stdout is not defined
        - "'command parse error' in bgp_result.stdout | lower"
        - "'unknown command' in bgp_result.stdout | lower"

    - name: Validate BGP output observability
      # Observability: Assert that the output contains expected data patterns.
      # Ensures the playbook fails meaningfully if the BGP process is not initialized.
      ansible.builtin.assert:
        that:
          - bgp_result.stdout != ""
          - "'BGP' in bgp_result.stdout or 'Neighbor' in bgp_result.stdout"
        fail_msg: "BGP summary data is missing or malformed. Ensure BGP is configured."
        success_msg: "BGP summary data successfully retrieved and validated."

    - name: Present formatted BGP status
      # Documentation: Displaying the result for human verification in logs.
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS SUMMARY =======================
          {{ bgp_result.stdout }}