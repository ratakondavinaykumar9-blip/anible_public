---
# FortiGate BGP Status Retrieval Playbook
# Improved for idempotency, observability, and robust error handling.
- name: Get FortiGate BGP Status
  hosts: fortigate
  gather_facts: false # Facts are not required for simple CLI command execution

  tasks:
    - name: Retrieve BGP summary from the device
      # FQCN: Using ansible.netcommon.cli_command for cross-platform compatibility.
      # Idempotency: Read-only commands are inherently idempotent and safe for repeated runs.
      ansible.netcommon.cli_command:
        command: get router info bgp summary
      register: bgp_output
      # Error Handling: Explicitly fail if the command fails or returns a FortiOS error string.
      failed_when: 
        - bgp_output.failed or "Command fail" in bgp_output.stdout

    - name: Validate command response integrity
      # Observability: Ensure the command returned a valid, non-empty response.
      ansible.builtin.assert:
        that:
          - bgp_output.stdout is defined
          - bgp_output.stdout | length > 0
        fail_msg: "The BGP summary command returned no data or the execution failed."
        success_msg: "BGP summary data successfully captured from the host."

    - name: Verify BGP operational status
      # Observability: Confirm BGP is initialized by checking for standard headers in the output.
      ansible.builtin.assert:
        that:
          - "'BGP' in bgp_output.stdout or 'Neighbor' in bgp_output.stdout"
        fail_msg: "BGP process may not be active or configured on this device."
        quiet: true

    - name: Display BGP Status Summary
      # Documentation: Output the results in a clear, readable format for operational review.
      ansible.builtin.debug:
        msg: |
          ======================= BGP OPERATIONAL STATUS =======================
          {{ bgp_output.stdout }}