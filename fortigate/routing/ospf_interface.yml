---
# FortiGate OSPF Interface Monitoring
# Standards: Idempotency (Read-only), Observability (Asserts), Documentation (Comments), Error Handling (Failed_when), FQCN.
- name: Get FortiGate OSPF Interface Information
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve OSPF interface status from device
      # Using FQCN: ansible.netcommon.cli_command for reliable CLI execution.
      # This is a read-only operation and is idempotent by nature.
      ansible.netcommon.cli_command:
        command: "get router info ospf interface"
      register: ospf_intf_result
      # Error Handling: Detect CLI execution failures or specific FortiOS error responses.
      failed_when:
        - ospf_intf_result.failed or "Command fail" in ospf_intf_result.stdout

    - name: Validate OSPF operational data
      # Observability: Ensure the output contains data to confirm the command was processed correctly.
      ansible.builtin.assert:
        that:
          - "ospf_intf_result.stdout is defined"
          - "ospf_intf_result.stdout | length > 0"
        fail_msg: "The OSPF interface command returned no data. Check OSPF configuration or device state."
        quiet: true

    - name: Present OSPF Interface Status
      # Documentation: Provide the operator with a formatted view of the OSPF interface state.
      ansible.builtin.debug:
        msg: |
          ============================================================
          OSPF INTERFACE OPERATIONAL STATE
          ============================================================
          {{ ospf_intf_result.stdout }}