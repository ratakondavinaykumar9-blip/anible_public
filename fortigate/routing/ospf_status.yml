# OSPF Operational Status Verification
# Why: Validates the health of the OSPF routing process by checking neighbor adjacencies and the LSDB.
# Idempotency: This playbook is read-only and safe to execute repeatedly without altering device state.
# Author: NetLearner Architect
# Date: 2026-04-12

- name: Get OSPF Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve OSPF neighbor adjacency information
      # Fetches the list of neighbors to verify 'Full' state transitions.
      ansible.netcommon.cli_command:
        command: get router info ospf neighbor
      register: ospf_neighbor_result
      # Custom failure logic: Only fail on transport/syntax errors, not if the OSPF process has 0 neighbors.
      failed_when: 
        - ospf_neighbor_result.failed
        - "'command parse error' in ospf_neighbor_result.stdout"

    - name: Retrieve OSPF Link State Database (LSDB)
      # Fetches the database summary to verify area consistency and route propagation.
      ansible.netcommon.cli_command:
        command: get router info ospf database
      register: ospf_database_result
      failed_when: 
        - ospf_database_result.failed
        - "'command parse error' in ospf_database_result.stdout"

    - name: Verify OSPF data capture success
      # Observability: Assert that the commands returned valid, non-null output buffers.
      ansible.builtin.assert:
        that:
          - ospf_neighbor_result.stdout is defined
          - ospf_database_result.stdout is defined
        fail_msg: "Failed to capture OSPF operational data from the device."
        quiet: true

    - name: Display OSPF Operational Summary
      # Provides a human-readable snapshot of the OSPF environment for observability.
      ansible.builtin.debug:
        msg: |
          ======================= OSPF NEIGHBORS =======================
          {{ ospf_neighbor_result.stdout | default('No neighbors found') }}

          ======================= OSPF DATABASE ========================
          {{ ospf_database_result.stdout | default('Database empty or unavailable') }}