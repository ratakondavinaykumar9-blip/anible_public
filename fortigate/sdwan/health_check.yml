- name: Configure FortiGate SD-WAN Health Checks (SLA)
  hosts: fortigates
  connection: httpapi
  vars:
    vdom: "root"
  tasks:
    - name: Create SD-WAN Health Check for Google DNS
      fortinet.fortios.fortios_system_sdwan:
        vdom: "{{ vdom }}"
        system_sdwan:
          health_check:
            - name: "Google_DNS"
              server: "8.8.8.8"
              protocol: "ping"
              interval: 500
              probe_timeout: 500
              recoverytime: 5
              failtime: 5
              update_static_route: "enable"
              members:
                - seq_num: 1
                - seq_num: 2
              sla:
                - id: 1
                  link_cost_factor: "latency"
                  latency_threshold: 100
                  jitter_threshold: 50
                  packetloss_threshold: 5
