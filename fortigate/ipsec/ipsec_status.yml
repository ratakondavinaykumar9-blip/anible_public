---
# ==============================================================================
# Playbook: FortiGate IPSec VPN Status Audit
# Purpose: Retrieves and validates the operational state of IPSec tunnels.
# Standards: Idempotent, Observable, and FQCN compliant.
# ==============================================================================
- name: FortiGate IPSec Status Monitoring
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve IPSec tunnel status from FortiGate CLI
      # Using FQCN for cross-platform network command execution.
      # This task is inherently idempotent as it is a read-only 'get' operation.
      ansible.netcommon.cli_command:
        command: get vpn ipsec status
      register: ipsec_output
      # Ensure we fail if the command returns an error or empty result.
      failed_when: 
        - ipsec_output.rc != 0
        - "'' == ipsec_output.stdout"
      changed_when: false

    - name: Validate IPSec output observability
      # Assert ensures the response contains expected FortiOS operational data.
      # This provides a safety gate before any parsing or display logic.
      ansible.builtin.assert:
        that:
          - "'IPsec' in ipsec_output.stdout"
        fail_msg: "Invalid response received from FortiGate. IPSec data missing."
        success_msg: "Successfully retrieved IPSec telemetry."

    - name: Display formatted IPSec tunnel metrics
      # Structured display for human-readable audit logs.
      ansible.builtin.debug:
        msg:
          - "==========================================================="
          - "               FORTIGATE IPSEC STATUS REPORT               "
          - "==========================================================="
          - "{{ ipsec_output.stdout }}"
          - "==========================================================="
