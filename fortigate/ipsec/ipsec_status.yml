---
# FortiGate IPSec Status - Improved by NetLearner Architect
# Purpose: Retrieve and verify the operational status of IPSec tunnels.
# Standards: Idempotency (Read-only), Observability (Assert), Best Practices (FQCN).

- name: FortiGate IPSec Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec tunnel status
      # Use FQCN for network common CLI command execution.
      # This operation is inherently idempotent as it does not modify configuration.
      ansible.netcommon.cli_command:
        command: "get vpn ipsec status"
      register: ipsec_result
      # Error Handling: Detect command failure or unrecognized command syntax.
      failed_when:
        - ipsec_result.failed or "Unknown action" in ipsec_result.stdout

    - name: Verify IPSec command output integrity
      # Observability: Confirm the command returned meaningful output.
      ansible.builtin.assert:
        that:
          - "ipsec_result.stdout is defined"
          - "ipsec_result.stdout | length > 0"
        fail_msg: "The command 'get vpn ipsec status' returned no output."
        success_msg: "IPSec status successfully retrieved."

    - name: Display Formatted IPSec Status
      # Provides visual confirmation for the network administrator.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC STATUS =======================
          {{ ipsec_result.stdout }}