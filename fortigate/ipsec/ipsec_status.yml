---
# IPSec Status Retrieval Playbook
# Purpose: Retrieves and displays the current IPSec VPN status from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Register/Assert), Documentation (Comments), FQCN.

- name: FortiGate IPSec Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute FortiGate CLI command to get IPSec status
      # FQCN: Using ansible.netcommon.cli_command for standard CLI interaction
      ansible.netcommon.cli_command:
        command: get vpn ipsec status
      register: ipsec_output
      # Idempotency: Read-only operations should not report a 'changed' status in Ansible
      changed_when: false
      # Error Handling: Fail if the command execution fails or returns an "Unknown action" error
      failed_when: 
        - ipsec_output.failed or "Unknown action" in ipsec_output.stdout

    - name: Validate IPSec status data integrity
      # Observability: Assert that we received meaningful output from the device
      ansible.builtin.assert:
        that:
          - ipsec_output.stdout is defined
          - ipsec_output.stdout | length > 0
        fail_msg: "The IPSec status output was empty or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Display IPSec Status Summary
      # Documentation: Providing a clear, formatted view of the tunnel status for the operator
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC STATUS: {{ inventory_hostname }} =======================
          
          {{ ipsec_output.stdout }}

          ================================================================================