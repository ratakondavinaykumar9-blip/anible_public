---
# FortiGate IPSec Errors Troubleshooting Playbook
# This playbook fetches IKE/IPSec logs from FortiGate devices to assist in VPN diagnostics.
# Implements NetLearner standards for idempotency, observability, and FQCN usage.

- name: Get IPSec Errors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec IKE logs via CLI
      # Read-only 'diagnose' commands do not modify device state, ensuring the task is idempotent.
      # Using Fully Qualified Collection Name (FQCN) for cross-platform reliability.
      ansible.netcommon.cli_command:
        command: diagnose vpn ike log
      register: errors_output
      # Error Handling: Fail the task if the command returns an 'Unknown action' error or if the session fails.
      failed_when: 
        - errors_output.failed or "Unknown action" in errors_output.stdout

    - name: Validate that logs were successfully registered
      # Observability: Ensure the command returned a valid stdout before proceeding to audit results.
      ansible.builtin.assert:
        that:
          - errors_output.stdout is defined
        fail_msg: "Audit Failure: Failed to retrieve IPSec logs from the host."
        success_msg: "Audit Success: IPSec logs successfully captured."

    - name: Display IPSec Error Logs
      # Documentation: Providing a clear, formatted view of the captured logs for analysis.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC ERRORS =======================
          {{ errors_output.stdout }}
      # Maintain clean observability by only displaying if logs are present.
      when: errors_output.stdout | length > 0