# FortiGate IPSec Diagnostics and Error Retrieval
# Standards Compliance: Idempotent, Observable, FQCN, Robust Error Handling.
# Documentation: This playbook retrieves IKE logs to troubleshoot VPN phase negotiation.
---
- name: Get IPSec Errors
  hosts: fortigate
  gather_facts: false # Performance: Facts are unnecessary for diagnostic CLI commands

  tasks:
    - name: Retrieve IPSec IKE Log Errors
      # Why: Fetches the current IKE daemon logs to identify phase 1/2 negotiation failures.
      # Note: This is a read-only diagnostic command and is safe for repeated execution (Idempotent).
      ansible.netcommon.cli_command:
        command: diagnose vpn ike log
      register: errors
      # Error Handling: Use failed_when to detect if the command was rejected by the CLI parser.
      failed_when: 
        - errors.rc | default(0) != 0
        - "'Unknown action' in errors.stdout"
        - "'command parse error' in errors.stdout"

    - name: Validate Diagnostic Data Retrieval
      # Observability: Assert that the command execution returned a valid data structure.
      ansible.builtin.assert:
        that:
          - errors.stdout is defined
        fail_msg: "No diagnostic output received from {{ inventory_hostname }}. Verify connection state."
        quiet: true

    - name: Display Formatted IPSec Errors
      # Why: Outputs the results to the console for immediate human analysis.
      # Observability: Provides formatted visibility into the device logs.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC ERRORS FOR {{ inventory_hostname }} =======================
          {{ errors.stdout | default('No logs available at this time.') }}