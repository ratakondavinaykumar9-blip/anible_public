---
# IPSec Statistics Retrieval Playbook
# Auto-improved: 2026-03-15
# Author: NetLearner Architect (OpenClaw)
# Description: Retrieves, validates, and displays IPSec VPN statistics from FortiGate devices.
---
- name: Retrieve FortiGate IPSec Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch IPSec stats from device
      # Best Practices: Using FQCN for network CLI operations.
      # Idempotency: "get" commands are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: get vpn ipsec stats
      register: stats
      # Error Handling: Catch cases where the command might be unsupported or fail silently.
      failed_when: 
        - stats.failed | default(false)
        - "'Unknown action' in stats.stdout"
        - "'Command fail' in stats.stdout"

    - name: Validate IPSec statistics response
      # Observability: Ensure the command returned data before proceeding.
      ansible.builtin.assert:
        that:
          - stats.stdout is defined
          - stats.stdout | length > 0
        fail_msg: "The IPSec statistics command returned no data on {{ inventory_hostname }}."
        success_msg: "Successfully retrieved IPSec statistics for {{ inventory_hostname }}."

    - name: Display IPSec statistics output
      # Documentation: Providing a clear, formatted view of the captured data.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC STATS: {{ inventory_hostname }} =======================
          {{ stats.stdout }}
          ===================================================================================