# FortiGate IPSec Statistics
# Refactored for NetLearner Staging: 2026-04-12
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling
- name: Get IPSec Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec VPN statistics from FortiGate CLI
      # Why: Gathers real-time telemetry. This is a read-only command and is inherently safe for repeated execution (Idempotency).
      ansible.netcommon.cli_command:
        command: get vpn ipsec stats
      register: stats
      # Error Handling: Fail explicitly if the command is unrecognized by the firmware or returns empty results.
      failed_when: >
        stats.stdout == "" or 
        "unknown command" in stats.stdout | lower or
        "command parse error" in stats.stdout | lower

    - name: Validate capture of IPSec telemetry
      # Why: Observability. Asserts that the returned data contains expected keyword patterns to ensure validity.
      ansible.builtin.assert:
        that:
          - "'stats' in stats.stdout | lower"
        fail_msg: "IPSec statistics retrieval returned invalid or malformed data."
        quiet: true

    - name: Display formatted IPSec statistics
      # Why: Provides visibility into the device state for audit logs and real-time monitoring.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC STATS =======================
          {{ stats.stdout }}