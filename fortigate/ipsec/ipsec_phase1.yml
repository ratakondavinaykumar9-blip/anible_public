---
# FortiGate IPSec Phase 1 Status Audit
# Purpose: Retrieves IPSec Phase 1 tunnel configuration for status verification.
# Standards: NetLearner Architect Blueprint (Idempotency, Observability, FQCN).
- name: Get IPSec Phase 1
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec Phase 1 Configuration Status
      # FQCN: Using ansible.netcommon.cli_command for direct CLI interaction.
      # Idempotency: Read-only 'get' command is inherently safe for multiple runs.
      ansible.netcommon.cli_command:
        command: get vpn ipsec phase1
      register: ph1
      # Error Handling: Fail if the command returns a failure message or specific FortiOS error strings.
      failed_when: 
        - ph1.failed or "Command fail" in ph1.stdout
        - "'entry not found' in ph1.stdout | lower"

    - name: Validate Execution Success
      # Observability: Assert that the response contains the expected configuration keywords and is not empty.
      ansible.builtin.assert:
        that:
          - "ph1.stdout is defined"
          - "ph1.stdout | length > 0"
        fail_msg: "CRITICAL: IPSec Phase 1 data is missing or command failed to return output."
        success_msg: "IPSec Phase 1 configuration successfully captured."

    - name: Display IPSec Phase 1 Details
      # Observability: Structured logging of the retrieved state for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          FORTIGATE IPSEC PHASE 1 - AUDIT LOG
          ======================================================================
          {{ ph1.stdout }}
          ======================================================================
