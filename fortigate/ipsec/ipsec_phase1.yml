---
# FortiGate IPSec Phase 1 Configuration Audit
# This playbook retrieves and verifies the IPSec Phase 1 status from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation, FQCN.

- name: Audit FortiGate IPSec Phase 1
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec Phase 1 Configuration
      # Using FQCN (ansible.netcommon.cli_command) for consistency and best practices.
      # This command is read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: "get vpn ipsec phase1"
      register: ph1_output
      # Error Handling: Ensure the command didn't return an error message specific to FortiOS
      failed_when: 
        - ph1_output.failed
        - "'command parse error' in ph1_output.stdout"
        - "'Unknown action' in ph1_output.stdout"

    - name: Validate IPSec Configuration Data
      # Observability: Assert that we received a valid, non-empty response from the device.
      ansible.builtin.assert:
        that:
          - ph1_output.stdout is defined
          - ph1_output.stdout | length > 0
        fail_msg: "IPSec Phase 1 configuration could not be retrieved or is empty."
        success_msg: "IPSec Phase 1 configuration successfully captured."

    - name: Display IPSec Phase 1 Details
      # Documentation: Providing clear, structured output for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC PHASE 1 REPORT =======================
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          --------------------------------------------------------------------
          {{ ph1_output.stdout }}