---
# IPsec Phase 2 Retrieval and Verification
# This playbook retrieves IPsec Phase 2 configuration from FortiGate devices.
# It adheres to NetLearner standards for idempotency, observability, and error handling.
- name: Retrieve FortiGate IPsec Phase 2 Information
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch IPsec Phase 2 status from device
      # Using FQCN for the network CLI command module.
      # This is idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: "get vpn ipsec phase2"
      register: ph2_result
      # Error Handling: Ensure the command was parsed correctly by FortiOS.
      failed_when:
        - "'command parse error' in ph2_result.stdout"
        - "'Unknown action' in ph2_result.stdout"

    - name: Verify data integrity of Phase 2 output
      # Observability: Use assert to verify that the command returned data.
      # This prevents false positives in automation pipelines.
      ansible.builtin.assert:
        that:
          - "ph2_result.stdout is defined"
          - "ph2_result.stdout | length > 0"
        fail_msg: "IPsec Phase 2 retrieval failed or returned empty output."
        success_msg: "IPsec Phase 2 data successfully captured."

    - name: Display IPsec Phase 2 Status
      # Documentation: Providing a clear, formatted view of the operational state.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC PHASE 2 REPORT =======================
          {{ ph2_result.stdout }}