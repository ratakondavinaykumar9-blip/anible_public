---
# FortiGate IPSec Troubleshooting Playbook
# Purpose: Diagnose VPN tunnel issues using operational "get" and "diagnose" commands.
# Standards: Idempotency (Read-only tasks), Observability (Register/Assert), FQCN usage.
- name: Troubleshoot FortiGate IPSec Tunnel
  hosts: fortigate
  gather_facts: false
  vars:
    # Required: The name of the IPSec tunnel to troubleshoot. 
    # Can be passed via --extra-vars "tunnel_name=VPN_NAME"
    tunnel_name: ""

  tasks:
    - name: Pre-flight Check - Ensure tunnel_name is provided
      # Observability: Verify that the required variable is passed to the playbook before proceeding.
      ansible.builtin.assert:
        that:
          - tunnel_name != ""
        fail_msg: "Variable 'tunnel_name' is required. Please provide it via --extra-vars."
        success_msg: "Starting troubleshooting for tunnel: {{ tunnel_name }}"

    - name: Fetch Current IPsec Tunnel Status
      # Idempotency: 'get' commands are operational and do not alter the device configuration.
      # FQCN: Utilizing the netcommon collection for standardized CLI interaction.
      ansible.netcommon.cli_command:
        command: "get vpn ipsec status | grep {{ tunnel_name }}"
      register: ipsec_status
      # Error Handling: grep returns non-zero if no match is found; we ignore this to allow further diagnostics.
      ignore_errors: true

    - name: Fetch Detailed Phase 1 and Phase 2 Information
      ansible.netcommon.cli_command:
        command: "get vpn ipsec tunnel details {{ tunnel_name }}"
      register: ipsec_details
      # Error Handling: Define failure based on command execution status and specific FortiOS error strings.
      failed_when:
        - ipsec_details.rc != 0
        - "'Unknown' in ipsec_details.stdout or 'Invalid' in ipsec_details.stdout"

    - name: Retrieve IKE Debug Information
      # Observability: Capturing buffered IKE logs to identify Phase 1/Phase 2 negotiation failures.
      ansible.netcommon.cli_command:
        command: "diagnose vpn ike log | grep {{ tunnel_name }}"
      register: ike_logs
      ignore_errors: true

    - name: Verify Successful Data Collection
      # Observability: Ensure that the critical detail command produced a valid response object.
      ansible.builtin.assert:
        that:
          - ipsec_details.stdout is defined
        fail_msg: "Communication with FortiGate failed or tunnel details could not be parsed."
        quiet: true

    - name: Generate Troubleshooting Summary
      # Documentation: Providing a structured output for easy analysis by the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC TROUBLESHOOT REPORT =======================
          Target Tunnel: {{ tunnel_name }}
          
          [Status Summary]
          {{ ipsec_status.stdout | default('No tunnel status found in summary list.') }}
          
          [Configuration & Statistics Details]
          {{ ipsec_details.stdout | default('No detailed statistics available.') }}
          
          [IKE/VPN Debug Logs]
          {{ ike_logs.stdout | default('No matching IKE logs found in buffer.') }}
          =========================================================================