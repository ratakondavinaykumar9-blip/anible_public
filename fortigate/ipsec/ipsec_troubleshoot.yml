---
# FortiGate IPSec Troubleshooting & Diagnostics
# Standards-aligned version for NetLearner Staging
# Focus: Idempotency (Read-only), Observability, and Error Resilience
- name: Troubleshoot IPSec Tunnel
  hosts: fortigate
  gather_facts: false
  vars:
    # Required variable; should be passed via --extra-vars or inventory
    tunnel_name: ""

  tasks:
    - name: Validation | Ensure tunnel_name is provided
      ansible.builtin.assert:
        that:
          - tunnel_name | length > 0
        fail_msg: "ERROR: 'tunnel_name' variable is missing. Please provide it via extra-vars."
        quiet: true

    - name: Diagnostics | Get VPN IPSec status
      # Using FQCN for broad compatibility across network platforms
      ansible.netcommon.cli_command:
        command: "get vpn ipsec status | grep {{ tunnel_name }}"
      register: ipsec_status
      # If grep fails (rc=1), the tunnel might be down or misnamed. 
      # We don't want to halt the playbook as we need further diagnostics.
      failed_when: false
      changed_when: false

    - name: Observability | Verify if tunnel exists in status output
      ansible.builtin.assert:
        that:
          - ipsec_status.rc == 0
        fail_msg: "WARNING: Tunnel '{{ tunnel_name }}' not found in active IPSec status. Checking details..."
      ignore_errors: true

    - name: Diagnostics | Get detailed tunnel configuration and state
      ansible.netcommon.cli_command:
        command: "get vpn ipsec tunnel details {{ tunnel_name }}"
      register: tunnel_details
      # Capture even if the tunnel is down to see the configuration state
      failed_when: false
      changed_when: false

    - name: Diagnostics | Check IKE real-time debug logs
      # Filters logs specifically for the target tunnel to reduce noise
      ansible.netcommon.cli_command:
        command: "diagnose vpn ike log | grep {{ tunnel_name }}"
      register: ike_debug_log
      failed_when: false
      changed_when: false

    - name: Reporting | Summary of IPSec Troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================================================================
          IPSEC TROUBLESHOOTING REPORT: {{ tunnel_name }}
          Generated: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================================================================
          
          [1] STATUS SUMMARY:
          {{ ipsec_status.stdout | default('No status found.') }}
          
          [2] TUNNEL DETAILS (Phases & Selectors):
          {{ tunnel_details.stdout | default('Detailed information unavailable.') }}
          
          [3] IKE/PHASE-1 LOG ENTRIES:
          {{ ike_debug_log.stdout | default('No matching IKE logs found in buffer.') }}
          
          ======================================================================
          End of Report
```