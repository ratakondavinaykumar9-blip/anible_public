---
# IPSec Monitor - Production Grade
# This playbook retrieves IPSec VPN tunnel status from FortiGate devices.
# It is inherently idempotent as it only executes a 'get' (read-only) command.
- name: FortiGate IPSec Monitor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec monitor status
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction
      ansible.netcommon.cli_command:
        command: get vpn ipsec monitor
      register: mon
      # Error Handling: Ensure the task fails if the device returns an error string
      failed_when: 
        - mon.failed | default(false)
        - "'Command fail' in mon.stdout or 'Unknown action' in mon.stdout"

    - name: Verify monitor data integrity
      # Observability: Assert that the command returned valid data to prevent silent failures
      ansible.builtin.assert:
        that:
          - mon.stdout is defined
          - mon.stdout | length > 0
        fail_msg: "IPSec monitor data is missing or could not be retrieved."
        success_msg: "IPSec monitor data successfully captured."

    - name: Display IPSec tunnel status report
      # Documentation: Formatted output for clear operational visibility
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSEC MONITOR REPORT - {{ inventory_hostname }}
          ============================================================
          {{ mon.stdout }}