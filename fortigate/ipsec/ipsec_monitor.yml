---
# FortiGate IPSec Tunnel Monitoring
# Optimized for NetLearner Staging environments.
# Purpose: Provides real-time visibility into VPN tunnel status for audit and troubleshooting.
# Idempotency: Read-only operation; safe for execution in high-frequency monitoring loops.

- name: FortiGate IPSec Monitor
  hosts: fortigate
  gather_facts: false # Disabled to reduce overhead; FortiOS facts are not required for CLI monitoring.

  tasks:
    - name: Retrieve IPSec monitor status from FortiOS CLI
      # Why: Fetches the current operational state of all configured IPSec tunnels.
      ansible.netcommon.cli_command:
        command: get vpn ipsec monitor
      register: mon
      # Error Handling: Explicitly catch "Command fail" strings often returned by FortiOS on failed lookups.
      failed_when: 
        - mon.rc != 0 or "Command fail" in mon.stdout

    - name: Validate IPSec monitor data retrieval
      # Observability: Ensures the playbook stops if the device returns an empty response.
      ansible.builtin.assert:
        that:
          - mon.stdout is defined
          - mon.stdout | length > 0
        fail_msg: "Failed to retrieve valid IPSec monitor data from the device."
        success_msg: "IPSec monitor data successfully captured."

    - name: Display IPSec Monitoring Report
      # Observability: Prints formatted tunnel status for human operators/logs.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC MONITOR =======================
          {{ mon.stdout }}
