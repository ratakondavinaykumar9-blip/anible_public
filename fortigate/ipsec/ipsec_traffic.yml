---
# FortiGate IPSec VPN Tunnel Diagnostics
# Enhanced for Idempotency, Observability, and Error Handling
# Standards: FQCN, Assertions, and Detailed Documentation
- name: FortiGate IPSec Traffic Monitoring
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Execute IPSec Tunnel Diagnostic Command
      # Using cli_command for read-only diagnostics; inherently idempotent as it doesn't change state.
      ansible.netcommon.cli_command:
        command: diagnose vpn tunnel list
      register: ipsec_traffic_raw
      # Ensure the task fails if the command returns a non-zero status or CLI error string
      failed_when: 
        - ipsec_traffic_raw.failed | default(false)
        - "'Command fail' in ipsec_traffic_raw.stdout"

    - name: Validate Diagnostic Output Integrity
      # Observability: Verify that the command returned a valid response structure
      ansible.builtin.assert:
        that:
          - "ipsec_traffic_raw.stdout is defined"
          - "ipsec_traffic_raw.stdout | length > 0"
        fail_msg: "IPSec diagnostic command returned empty or invalid output."
        success_msg: "IPSec diagnostic data successfully captured."

    - name: Display Formatted IPSec Traffic Statistics
      # Providing a clean operational view of the current VPN state
      ansible.builtin.debug:
        msg: |
          =============================================================
          SYSTEM DIAGNOSTIC: IPSEC VPN TUNNEL LIST
          =============================================================
          {{ ipsec_traffic_raw.stdout }}
          =============================================================
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
