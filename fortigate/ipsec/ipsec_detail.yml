# IPSec Tunnel Details Retrieval
# Optimized for NetLearner Staging Environment
# Auto-improved: 2026-04-12
# Author: NetLearner Architect (Baseline: OpenClaw)
---
- name: Get IPSec Details
  hosts: fortigate
  gather_facts: false # Performance optimization: Skip fact gathering for CLI tasks

  tasks:
    - name: Retrieve IPSec tunnel details from FortiGate CLI
      # Use FQCN (Fully Qualified Collection Name) for consistent module resolution
      ansible.netcommon.cli_command:
        command: get vpn ipsec tunnel details
      register: ipsec_details
      # Error Handling: Fail if command returns a known FortiOS error string or empty output
      failed_when: >
        ipsec_details.stdout is not defined or 
        ipsec_details.stdout | length == 0 or 
        'Command fail' in ipsec_details.stdout or 
        'Unknown action' in ipsec_details.stdout
      # Idempotency: 'get' operations are read-only and inherently safe for multiple runs.

    - name: Validate IPSec data observability
      # Observability: Assert that we actually received data to prevent silent report failures
      ansible.builtin.assert:
        that:
          - ipsec_details.stdout | length > 0
        fail_msg: "IPSec details retrieval returned empty output. Verify device connectivity."
        success_msg: "IPSec details successfully retrieved."

    - name: Display IPSec Tunnel Details
      # Documentation: Providing a clean visual separator for manual troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DETAILS =======================
          {{ ipsec_details.stdout }}