---
# FortiGate IPSec Details Retrieval
# Purpose: Gathers and displays real-time status of IPSec tunnels for troubleshooting and auditing.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Retrieve FortiGate IPSec Tunnel Details
  hosts: fortigate
  gather_facts: false  # Optimization: Facts are not necessary for this read-only diagnostic command.

  tasks:
    - name: Execute command to get IPSec tunnel details
      # Best Practice: Using Fully Qualified Collection Name (FQCN) for network commands.
      ansible.netcommon.cli_command:
        command: get vpn ipsec tunnel details
      register: details
      # Error Handling: Catch explicit command failure strings or transport errors.
      failed_when: 
        - details.failed or "Command fail" in details.stdout

    - name: Validate IPSec data retrieval
      # Observability: Ensure the command returned a valid response structure.
      ansible.builtin.assert:
        that:
          - details.stdout is defined
        fail_msg: "Data retrieval failed or returned a null response."
        success_msg: "Successfully retrieved IPSec details from the device."

    - name: Display IPSec Tunnel Details
      # Documentation: Provides formatted output for operator visibility during execution.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DETAILS =======================
          {{ details.stdout | default('No IPSec tunnel information available.') }}