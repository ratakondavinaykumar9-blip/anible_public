---
# NetLearner Architect - FortiGate GRE Tunnel Discovery
# Date: 2026-04-12
# Purpose: Robust discovery of GRE tunnel state with full observability and error handling.
# Idempotency: Read-only CLI operations are safe for recurring automated audits.
#
- name: Get GRE Tunnels
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve GRE tunnel configuration from FortiOS CLI
      # FQCN: Using the standard network common command module.
      # Idempotency: Inherently safe as it performs no state changes on the device.
      ansible.netcommon.cli_command:
        command: "get system gre"
      register: gre_capture
      # Error Handling: Validate that the command was recognized and executed by the device.
      failed_when:
        - gre_capture.stdout is not defined
        - "'command parse error' in gre_capture.stdout | lower"
        - "'unknown command' in gre_capture.stdout | lower"

    - name: Verify capture integrity
      # Observability: Assert that the command execution yielded a valid response object.
      ansible.builtin.assert:
        that:
          - gre_capture.stdout is defined
        fail_msg: "Data Capture Failure: No output received from {{ inventory_hostname }}."
        success_msg: "Data Capture Success: GRE configuration retrieved from {{ inventory_hostname }}."

    - name: Display GRE Tunnel configuration details
      # Documentation: Structured debug output for immediate operational visibility.
      ansible.builtin.debug:
        msg: |
          ==============================================================================
          GRE TUNNEL DISCOVERY - {{ inventory_hostname }}
          ==============================================================================
          {{ gre_capture.stdout | default('No GRE configuration found on this device.') }}
      # Observability: Ensure display is attempted only when a valid capture object exists.
      when: gre_capture is defined
