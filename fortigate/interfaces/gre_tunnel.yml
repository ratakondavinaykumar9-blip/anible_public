---
# FortiGate GRE Tunnels Retrieval
# Standards: Idempotent, Observable, Documented, Robust
# This playbook retrieves the status of GRE tunnels on FortiGate devices.
- name: Get GRE Tunnels
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve GRE tunnel status via CLI
      # Using FQCN for network command execution.
      # Why: 'get system gre' is the standard command for monitoring GRE interface status.
      # Idempotency: This is a read-only operation and safe to run repeatedly.
      ansible.netcommon.cli_command:
        command: get system gre
      register: gre_output
      # Error Handling: Catch specific CLI error strings and non-zero return codes.
      failed_when: 
        - gre_output.rc != 0 or "Command fail" in gre_output.stdout or "Unknown action" in gre_output.stdout

    - name: Assert GRE command executed successfully
      # Observability: Verify that the command returned data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - gre_output.stdout is defined
          - gre_output.stdout | length > 0
        fail_msg: "Failed to retrieve GRE tunnel information or the output is empty."
        success_msg: "GRE tunnel status successfully retrieved."
        quiet: true

    - name: Display GRE Tunnel Information
      # Documentation: Provide clear visibility of the results to the operator.
      ansible.builtin.debug:
        msg: |
          ======================= GRE TUNNELS =======================
          {{ gre_output.stdout }}