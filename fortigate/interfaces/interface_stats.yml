---
# FortiGate Interface Statistics
# This playbook retrieves low-level netlink interface statistics from a FortiGate device.
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: Get FortiGate Interface Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve netlink interface list via diagnose command
      # FQCN: Using ansible.netcommon.cli_command for direct shell interaction.
      # Idempotency: changed_when: false ensures read-only operations do not report a change status.
      ansible.netcommon.cli_command:
        command: diagnose netlink interface list
      register: interface_stats
      changed_when: false
      # Error Handling: Fail if the output is empty or if the command is unrecognized by the firmware.
      failed_when:
        - interface_stats.stdout | length == 0
        - "'Unknown command' in interface_stats.stdout"

    - name: Validate interface statistics data
      # Observability: Assert that the output contains expected data patterns (e.g., 'index').
      # This ensures the playbook fails early if the device returns unexpected content.
      ansible.builtin.assert:
        that:
          - "'index' in interface_stats.stdout"
        fail_msg: "The command succeeded but the output did not contain valid interface statistics."
        success_msg: "Interface statistics successfully validated."

    - name: Display interface statistics
      # Documentation: Providing a clear, formatted view of the registered data for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE STATS =======================
          {{ interface_stats.stdout }}