---
# FortiGate Interface Statistics - Improved for NetLearner Staging
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
# WHY: This playbook captures low-level kernel interface statistics (netlink) 
# which are critical for troubleshooting packet drops and driver-level issues.
# It uses 'diagnose' which is non-intrusive and safe for multiple executions.

- name: Get FortiGate Interface Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Interface Statistics via CLI
      # Use FQCN for ansible.netcommon collection
      # This task is idempotent as it performs a read-only 'diagnose' command
      ansible.netcommon.cli_command:
        command: diagnose netlink interface list
      register: stats_result
      # Error Handling: Fail if the command is unrecognized or returns an error string
      failed_when:
        - stats_result.stdout is not defined or stats_result.stdout | length == 0
        - "'Command fail' in stats_result.stdout"
        - "'Unknown action' in stats_result.stdout"

    - name: Verify Statistics Integrity
      # Observability: Assert that valid data was returned before display
      # Ensures that we have captured actual interface data (containing 'if=')
      ansible.builtin.assert:
        that:
          - stats_result.stdout is defined
          - "'if=' in stats_result.stdout"
          - "'state=' in stats_result.stdout"
        fail_msg: "Validation failed: The captured output does not appear to be valid interface statistics."
        success_msg: "Validation successful: Interface statistics captured and verified."

    - name: Display Formatted Interface Statistics
      # Presentation layer for human-readable console output
      ansible.builtin.debug:
        msg: |
          ======================================================================
          FORTIGATE INTERFACE STATISTICS (NETLINK)
          ======================================================================
          {{ stats_result.stdout }}
          ======================================================================
