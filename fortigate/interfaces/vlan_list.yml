---
# FortiGate VLAN List Retrieval
# Auto-improved: 2026-03-15 10:00
# Author: NetLearner Architect
#
# Standards Adherence:
# 1. Idempotency: Read-only command execution is inherently safe for multiple runs.
# 2. Observability: Registration of 'vlan_output' and explicit 'assert' verify operation success.
# 3. Documentation: Comments explain module choice and logic.
# 4. Error Handling: 'failed_when' ensures empty or erroneous CLI responses are caught.
# 5. Best Practices: All modules use Fully Qualified Collection Names (FQCN).
---
- name: Get FortiGate VLAN List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve VLAN information via CLI command
      # Why: Using FQCN 'ansible.netcommon.cli_command' to ensure consistency across environments.
      # The 'get system vlan' command provides a summary of all VLAN interfaces on the device.
      ansible.netcommon.cli_command:
        command: get system vlan
      register: vlan_output
      # Error Handling: Fail if the output is missing, empty, or contains specific error indicators.
      failed_when: >
        (vlan_output.stdout is not defined) or
        (vlan_output.stdout | length == 0) or
        ('error' in vlan_output.stdout | lower) or
        ('unknown' in vlan_output.stdout | lower)

    - name: Verify VLAN data integrity
      # Observability: Assert that the command returned meaningful lines of data.
      # This prevents silent failures where a command executes but returns no content.
      ansible.builtin.assert:
        that:
          - vlan_output.stdout_lines | length > 0
        fail_msg: "The VLAN retrieval task succeeded but returned an empty dataset."
        success_msg: "VLAN data successfully captured from {{ inventory_hostname }}."
        quiet: true

    - name: Display VLAN Operational Report
      # Documentation: Format the output for better human readability in automation logs.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          VLAN SUMMARY REPORT FOR: {{ inventory_hostname }}
          ======================================================================
          {{ vlan_output.stdout }}