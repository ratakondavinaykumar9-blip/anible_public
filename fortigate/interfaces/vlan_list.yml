---
# NetLearner Staging: FortiGate VLAN Inventory
# This playbook retrieves the current VLAN configuration from FortiGate devices.
# Improvements focus on robustness, data validation, and adherence to FQCN standards.

- name: FortiGate VLAN List Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system vlan' on FortiGate
      # Using a 'get' command ensures idempotency as it retrieves state without modification.
      # FQCN (Fully Qualified Collection Name) is used for reliable module resolution.
      ansible.netcommon.cli_command:
        command: "get system vlan"
      register: vlan_raw
      # Custom failure logic ensures we catch CLI-specific errors that don't trigger a shell exit code.
      failed_when: 
        - vlan_raw.failed or vlan_raw.stdout == ""
        - "'command parse error' in vlan_raw.stdout | lower"
        - "'unknown command' in vlan_raw.stdout | lower"

    - name: Assert VLAN data integrity
      # Verify the response contains data to prevent silent automation failures.
      # This provides observability by validating the output before it is consumed.
      ansible.builtin.assert:
        that:
          - vlan_raw.stdout is defined
          - vlan_raw.stdout | length > 0
        fail_msg: "VLAN data retrieval failed or returned an empty string for {{ inventory_hostname }}."
        success_msg: "VLAN data successfully captured and registered."

    - name: Display VLAN Inventory
      # Outputs results in a structured, readable format for auditing and verification.
      ansible.builtin.debug:
        msg: |
          ======================= VLANs ({{ inventory_hostname }}) =======================
          {{ vlan_raw.stdout }}
