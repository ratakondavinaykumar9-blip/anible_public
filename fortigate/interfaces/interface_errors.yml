---
# FortiGate Interface Error Diagnostics
# Purpose: Gathers hardware-level NIC information to identify potential interface errors or drops.
# Standards: Idempotency (Read-only), Observability (Asserts), FQCN usage, and Error Handling.
- name: FortiGate Interface Error Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute hardware diagnostic command for NIC statistics
      # FQCN: Using ansible.netcommon.cli_command for raw diagnostic execution
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: nic_stats
      # Idempotency: Read-only commands should never report 'changed' status
      changed_when: false
      # Error Handling: Fail if the command explicitly returns an error or fails to execute
      failed_when: 
        - nic_stats.failed or "Command fail" in nic_stats.stdout

    - name: Verify diagnostic data integrity
      # Observability: Assert that the output is defined and contains data
      ansible.builtin.assert:
        that:
          - nic_stats.stdout is defined
          - nic_stats.stdout | length > 0
        fail_msg: "Diagnostic output is empty. Verify device permissions or command availability."
        success_msg: "Interface diagnostic data successfully captured."

    - name: Display Interface Error Report
      # Observability: Formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS =======================
          {{ nic_stats.stdout }}