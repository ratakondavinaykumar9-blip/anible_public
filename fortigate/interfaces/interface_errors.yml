# FortiGate Interface Error Diagnostics
# Purpose: Retrieves hardware-level NIC statistics to identify physical layer issues (CRC, collisions, drops).
# Standards: Idempotent (Read-only), Observed via Asserts, FQCN compliant.
# Updated: 2026-04-12
# Author: NetLearner Architect
---
- name: FortiGate Hardware Health Monitoring
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve hardware NIC statistics
      # Using FQCN for the network-common CLI module. 
      # Diagnostic commands are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: nic_stats
      # Error Handling: Ensure the command was accepted by the FortiOS shell.
      failed_when: 
        - nic_stats.failed 
        - "'Command fail' in nic_stats.stdout or 'Unknown action' in nic_stats.stdout"

    - name: Verify diagnostic data integrity
      # Observability: Assert that we received a non-empty response before proceeding.
      ansible.builtin.assert:
        that:
          - "nic_stats.stdout is defined"
          - "nic_stats.stdout | length > 0"
        fail_msg: "The FortiGate returned an empty response for hardware NIC statistics."
        quiet: true

    - name: Display Interface Error Report
      # Documentation: Clear messaging for SOC/NOC visibility during automated runs.
      ansible.builtin.debug:
        msg: |
          ======================= HARDWARE NIC DIAGNOSTICS =======================
          DATE: {{ ansible_date_time.iso8601 | default('N/A') }}
          HOST: {{ inventory_hostname }}
          RAW OUTPUT:
          {{ nic_stats.stdout }}