---
# FortiGate VXLAN Operational Status Retrieval
# Standards: Idempotency (Read-only), Observability (Register/Assert), FQCN
- name: Get VXLAN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve VXLAN information from FortiGate
      # FQCN: Utilizing the network common CLI module for standard command execution
      # Idempotency: This is a read-only operation and safe to run repeatedly
      ansible.netcommon.cli_command:
        command: "get system vxlan"
      register: vxlan_raw
      # Error Handling: Ensure the command was accepted and executed by FortiOS
      failed_when: 
        - vxlan_raw.failed | default(false)
        - "'Command fail' in vxlan_raw.stdout"
        - "'Unknown action' in vxlan_raw.stdout"

    - name: Verify VXLAN output consistency
      # Observability: Confirm that the device returned non-empty data for validation
      ansible.builtin.assert:
        that:
          - vxlan_raw.stdout is defined
          - vxlan_raw.stdout | length > 0
        fail_msg: "The VXLAN status query returned no data. Check if VXLAN is enabled or configured."
        quiet: true

    - name: Display VXLAN Operational State
      # Documentation: Provides a clean, formatted output of the operational status
      ansible.builtin.debug:
        msg: |
          ======================= VXLAN STATUS: {{ inventory_hostname }} =======================
          {{ vxlan_raw.stdout }}