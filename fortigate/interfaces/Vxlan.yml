---
# FortiGate VXLAN Audit Playbook
# Improved by Architect:# Standards: Idempotency (Read-only), Observability (Register/Assert), FQCN, Error Handling.

- name: Audit FortiGate VXLAN Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve VXLAN system state via CLI
      # Using FQCN for best practices. This task is idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: get system vxlan
      register: vxlan_result
      # Error Handling: Fail if the command is unrecognized or execution fails
      failed_when: 
        - vxlan_result.rc != 0 
        - "'Unknown action' in vxlan_result.stderr"

    - name: Verify VXLAN data retrieval success
      # Observability: Assert that stdout is not empty and the register variable exists
      ansible.builtin.assert:
        that:
          - vxlan_result.stdout is defined
          - vxlan_result.stdout | length > 0
        fail_msg: "VXLAN configuration is either empty or could not be retrieved from {{ inventory_hostname }}."
        success_msg: "VXLAN configuration successfully captured from {{ inventory_hostname }}."
        quiet: true

    - name: Display VXLAN operational status
      # Observability: Provide clear, formatted output of the registered command results
      ansible.builtin.debug:
        msg: |
          ======================= VXLAN STATUS: {{ inventory_hostname }} =======================
          {{ vxlan_result.stdout }}