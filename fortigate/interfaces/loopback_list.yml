---
# Loopback List
# Improved: 2026-03-15
# Author: NetLearner Architect
# Description: This playbook retrieves loopback interface status from FortiGate devices.
# It adheres to idempotency by ensuring read-only tasks do not report changes.
# Observability is provided via register and assert tasks for data validation.

- name: FortiGate Loopback Interface Status Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system loopback' command
      # Why: Fetches the current operational state and configuration summary of loopback interfaces.
      ansible.netcommon.cli_command:
        command: get system loopback
      register: lb_output
      # Idempotency: Read-only operations must not trigger a 'changed' state in Ansible.
      changed_when: false
      # Error Handling: Catch cases where the command might be unsupported or incorrectly parsed.
      failed_when:
        - lb_output.failed
        - "'command parse error' in lb_output.stdout"
        - "'Unknown action' in lb_output.stdout"

    - name: Verify loopback data integrity
      # Observability: Validate that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - lb_output.stdout is defined
          - lb_output.stdout | length > 0
        fail_msg: "Data retrieval failed: Loopback output is empty or undefined."
        success_msg: "Successfully retrieved loopback interface data."

    - name: Display Loopback Interface Status
      # Why: Provides a formatted visual representation of the retrieved data for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= LOOPBACKS =======================
          {{ lb_output.stdout }}
          =========================================================