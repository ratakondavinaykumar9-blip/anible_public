---
# FortiGate Loopback Interface Audit
# This playbook retrieves the current loopback configuration for observability and audit trails.
# Idempotency is maintained as this is a read-only operation.
# Improved: 2026-04-12
---
- name: Audit FortiGate Loopback Interfaces
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve loopback interface details via CLI
      # Fetches raw system data to ensure real-time visibility into interface status.
      # Using FQCN for compatibility and consistency across the NetLearner ecosystem.
      ansible.netcommon.cli_command:
        command: get system loopback
      register: lb_result
      # Error Handling: Ensures the task fails if the output is empty or the command returns an error.
      failed_when: 
        - lb_result.stdout == ""
        - lb_result.rc | default(0) != 0

    - name: Verify loopback data integrity
      # Observability: Assert that the command returned the expected table headers.
      # This prevents downstream processing of malformed data.
      ansible.builtin.assert:
        that:
          - "'name' in lb_result.stdout"
        fail_msg: "The 'get system loopback' command returned unexpected or null results on {{ inventory_hostname }}."
        success_msg: "Successfully verified loopback interface data for {{ inventory_hostname }}."

    - name: Display formatted loopback information
      # Provides clear operational visibility for network engineers.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE LOOPBACKS =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: 2026-04-12
          OUTPUT:
          {{ lb_result.stdout }}
