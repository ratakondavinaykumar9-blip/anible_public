---
# Interface Traffic Report for FortiGate
# Auto-improved: 2026-04-12 12:00
# Author: Arjun (OpenClaw) / NetLearner Architect Refinement
#
# Standards Adherence:
# 1. Idempotency: Marked with 'changed_when: false' as this is a non-mutating state retrieval.
# 2. Observability: Uses 'register' to capture output and 'assert' to verify data integrity.
# 3. Documentation: Detailed comments explaining the "why" and validation logic.
# 4. Error Handling: Employs 'failed_when' to catch empty results or CLI execution errors.
# 5. Best Practices: Utilizes Fully Qualified Collection Names (FQCN) for all modules.

- name: Retrieve FortiGate Interface Traffic Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to get interface traffic
      # Purpose: Fetches real-time ingress and egress counters from the FortiOS network stack.
      ansible.netcommon.cli_command:
        command: get system interface traffic
      register: traffic_capture
      # Idempotency: This task is read-only; ensuring 'changed' is never true.
      changed_when: false
      # Error Handling: Fail if the command returns nothing or contains common error strings.
      failed_when:
        - traffic_capture.stdout | length == 0
        - "'Command fail' in traffic_capture.stdout"
        - "'Unknown' in traffic_capture.stdout"

    - name: Validate retrieved traffic data
      # Observability: Confirm the output contains expected keywords before proceeding.
      ansible.builtin.assert:
        that:
          - "traffic_capture.stdout is search('(?i)interface|traffic|in|out')"
        fail_msg: "Interface traffic data validation failed. Output format unexpected."
        success_msg: "Interface traffic data successfully validated."
        quiet: true

    - name: Display Interface Traffic Report
      # Documentation: Provides structured visibility into the captured telemetry.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE TRAFFIC =======================
          Node: {{ inventory_hostname }}
          Capture Method: CLI (get system interface traffic)
          -----------------------------------------------------------------
          {{ traffic_capture.stdout }}
