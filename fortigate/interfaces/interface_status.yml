---
# FortiGate Interface Status - Standardized for Production
# This playbook retrieves low-level hardware NIC information from a FortiGate device.
# Idempotency: The 'diagnose' command is read-only, making this playbook safe for repeated execution.
- name: Get Interface Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute hardware NIC diagnostic command
      # FQCN: Using the standard netcommon collection for CLI-based status retrieval
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: interface_status
      # Error Handling: Ensure we fail if the command is unrecognized or execution fails
      failed_when: 
        - interface_status.failed or "Command fail" in interface_status.stdout or "Unknown action" in interface_status.stdout

    - name: Verify interface data integrity
      # Observability: Use assert to validate that the device returned meaningful data
      ansible.builtin.assert:
        that:
          - "interface_status.stdout is defined"
          - "interface_status.stdout | length > 0"
        fail_msg: "Diagnostic output is empty. Verify connectivity and administrative privileges."
        quiet: true

    - name: Display formatted Interface Status
      # Documentation: Present the captured hardware state in a readable format
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE STATUS =======================
          {{ interface_status.stdout }}