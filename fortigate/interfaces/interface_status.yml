# FortiGate Interface Status
- name: Get FortiGate Interface Hardware Status
  hosts: fortigate
  gather_facts: false # Facts are not required for this low-level diagnostic command.

  tasks:
    - name: Execute hardware NIC diagnostic command
      # FQCN: Using the standard netcommon collection for CLI-based status retrieval.
      # Idempotency: Read-only 'diagnose' commands are safe for repeated execution across environments.
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: interface_status
      # Error Handling: Ensure we fail if the command is unrecognized or execution fails on the device.
      failed_when: 
        - interface_status.failed or "Command fail" in interface_status.stdout or "Unknown action" in interface_status.stdout

    - name: Verify interface data integrity
      # Observability: Use assert to validate that the device returned meaningful data.
      # This prevents silent failures where the command runs but returns no output.
      ansible.builtin.assert:
        that:
          - "interface_status.stdout is defined"
          - "interface_status.stdout | length > 0"
        fail_msg: "Diagnostic output is empty. Verify connectivity and administrative privileges."
        success_msg: "Interface status successfully retrieved and verified."
        quiet: true

    - name: Display formatted Interface Status
      # Documentation: Present the captured hardware state in a readable format for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE STATUS =======================
          {{ interface_status.stdout }}