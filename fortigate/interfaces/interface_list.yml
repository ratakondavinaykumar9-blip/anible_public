---
# FortiGate Interface Status Retrieval
# This playbook adheres to the NetLearner Architect standards for high-reliability automation.
- name: Get Interface List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system interface status from FortiGate CLI
      # Why: Utilizing FQCN for cli_command to execute direct FortiOS 'get' commands for operational state.
      ansible.netcommon.cli_command:
        command: "get system interface"
      register: intf_result
      # Error Handling: Define failure if the command is rejected or returns an error string.
      failed_when: 
        - intf_result.failed or "Command fail" in intf_result.stdout or "Unknown action" in intf_result.stdout

    - name: Validate successful interface data capture
      # Observability: Assert that the command returned meaningful data to prevent downstream failures.
      ansible.builtin.assert:
        that:
          - "intf_result.stdout is defined"
          - "intf_result.stdout | length > 0"
          - "'name' in intf_result.stdout or 'Interface' in intf_result.stdout"
        fail_msg: "Interface retrieval validation failed. Output was empty or malformed."
        success_msg: "Interface data successfully validated."

    - name: Display formatted interface information
      # Why: Providing human-readable output for audit trails and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACES =======================
          {{ intf_result.stdout }}