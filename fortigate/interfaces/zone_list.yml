---
# FortiGate Zone List - Production Grade
# Purpose: Safely retrieve and validate the list of security zones from FortiGate firewalls.
# This playbook is idempotent (read-only), observable, and follows Ansible best practices.
- name: FortiGate Zone Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system zone status from CLI
      # Use the Fully Qualified Collection Name (FQCN) to ensure compatibility and clarity.
      # 'get system zone' captures the current operational state and interface-to-zone mappings.
      ansible.netcommon.cli_command:
        command: get system zone
      register: zone_data
      # Error Handling: Explicitly fail if the command execution fails or if the FortiOS CLI returns an error message.
      failed_when: >
        zone_data.failed or 
        "Unknown action" in zone_data.stdout or 
        "item not found" in zone_data.stdout or
        "Command fail" in zone_data.stdout

    - name: Validate that zone data was successfully captured
      # Observability: Assert that the output is not empty to verify the operation's utility in automation pipelines.
      ansible.builtin.assert:
        that:
          - zone_data.stdout is defined
          - zone_data.stdout | length > 0
        fail_msg: "Critical Error: Zone retrieval returned empty or undefined results."
        success_msg: "Success: Zone information successfully retrieved and validated."

    - name: Display the formatted zone list
      # Observability: Provide a structured debug message for human operators and logging systems.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ZONES =======================
          {{ zone_data.stdout }}