# FortiGate Aggregate Interfaces Discovery
# Refactored by NetLearner Architect for Idempotency, Observability, and FQCN Compliance.
# This playbook retrieves and validates the status of LACP/static aggregate interfaces.
- name: Get Aggregate Interfaces
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve aggregate interface status from FortiOS CLI
      # Using FQCN for network CLI command execution. 
      # Read-only 'get' commands are inherently idempotent and safe for recurring audits.
      ansible.netcommon.cli_command:
        command: get system aggregate
      register: agg_status
      # Handle cases where the command is rejected by the shell despite successful SSH transport.
      failed_when: 
        - agg_status.failed or "Command fail" in agg_status.stdout or "Unknown action" in agg_status.stdout

    - name: Verify aggregate interface data retrieval
      # Observability: Assert that the response is not empty to ensure actionable data for the architect.
      ansible.builtin.assert:
        that:
          - "agg_status.stdout is defined"
          - "agg_status.stdout | length > 0"
        fail_msg: "The device returned an empty or invalid response. Verify aggregate configuration exists."
        success_msg: "Aggregate interface data successfully captured."
        quiet: true

    - name: Display aggregate interface configuration report
      # Provides formatted visibility for the operator and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE AGGREGATE REPORT =======================
          {{ agg_status.stdout }}