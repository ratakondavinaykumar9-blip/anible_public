---
# ==============================================================================
# Playbook: FortiGate Security Fabric Status Audit
# Purpose: This playbook performs a diagnostic check to verify the operational 
#          state of the FortiGate Security Fabric. It ensures the device is 
#          actively participating in the fabric and reporting correctly.
# Idempotency: This is a read-only diagnostic play. It does not modify device 
#              configuration and is safe for continuous/automated execution.
# ==============================================================================

- name: Get Fabric Status
  hosts: fortigate
  gather_facts: false # Performance: FortiOS CLI operations do not require standard fact gathering

  tasks:
    - name: Retrieve Security Fabric status via CLI
      # Use Fully Qualified Collection Name (FQCN) for reliability and best practices
      ansible.netcommon.cli_command:
        command: get fabric status
      register: fabric_output
      # Error Handling: Fail if the command returns an empty string or is unsupported
      failed_when: 
        - fabric_output.stdout | length == 0
        - "'Unknown action' in fabric_output.stdout"

    - name: Validate Fabric operational health
      # Observability: Assert that the output contains the mandatory 'Group name' field
      ansible.builtin.assert:
        that:
          - "'Group name:' in fabric_output.stdout"
        fail_msg: "CRITICAL: Security Fabric check failed. Device is not part of a fabric group or fabric is disabled."
        success_msg: "SUCCESS: Security Fabric is active and data was successfully retrieved."

    - name: Display formatted Fabric Status Report
      # Observability: Output the topology and status for audit logs and human review
      ansible.builtin.debug:
        msg: |
          ======================= FABRIC STATUS =======================
          DEVICE:   {{ inventory_hostname }}
          PLATFORM: {{ ansible_network_os | default('fortios') }}
          
          {{ fabric_output.stdout }}
          =============================================================
