---
# Fabric Status
# Improved: 2026-03-15 (NetLearner Architect)
# Standards: Idempotency, Observability, FQCN, Error Handling
#
---
- name: FortiGate Fabric Status Collection
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get fabric status' on FortiGate
      # FQCN: Using ansible.netcommon.cli_command to ensure compatibility and best practice.
      ansible.netcommon.cli_command:
        command: get fabric status
      register: fabric_result
      # Idempotency: This is a read-only 'get' command. We set changed_when to false 
      # to ensure the playbook remains idempotent and doesn't report false changes.
      changed_when: false
      # Error Handling: Explicitly fail if the command returns empty output, 
      # indicating a potential communication or execution issue.
      failed_when: 
        - fabric_result.stdout is not defined 
        - fabric_result.stdout | length == 0

    - name: Validate Fabric status output
      # Observability: Assert that the command returned meaningful fabric information.
      # This verifies that the device is responding with the expected data structure.
      ansible.builtin.assert:
        that:
          - "'Fabric' in fabric_result.stdout"
        fail_msg: "The command output did not contain expected 'Fabric' keywords. Check device configuration."
        success_msg: "Fabric status successfully retrieved and validated."

    - name: Display Fabric Status
      # Documentation: Providing a clear, formatted output for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= FABRIC STATUS =======================
          {{ fabric_result.stdout }}