MCP issues detected. Run /mcp list for status.```yaml
---
- name: FortiGate Wireless Controller Status Audit
  hosts: fortigate
  gather_facts: false
  # Pattern: NetLearner Architect - Wireless Monitoring Standard 2026

  tasks:
    - name: Retrieve Wireless Termination Point (WTP) status
      # Why: Fetches real-time operational state of managed Access Points (APs).
      # This is an idempotent read operation used to verify the wireless subsystem state.
      ansible.netcommon.cli_command:
        command: get wireless-controller wtp
      register: wifi_controller_output
      # Error Handling: Catch FortiOS CLI-specific errors that may occur even if the connection is successful.
      failed_when:
        - wifi_controller_output.stdout is not defined
        - "'error' in wifi_controller_output.stdout | lower"
        - "'unknown command' in wifi_controller_output.stdout | lower"

    - name: Validate WTP data integrity and responsiveness
      # Observability: Ensures the controller returned a non-empty status and the WTP service is active.
      ansible.builtin.assert:
        that:
          - "wifi_controller_output.stdout | length > 0"
          - "'wtp' in wifi_controller_output.stdout | lower"
        fail_msg: "Wireless Controller returned empty or invalid status data. Check VDOM/Permissions."
        success_msg: "Wireless Controller status successfully retrieved and validated."

    - name: Display formatted wireless status summary
      # Documentation: Provides immediate visual feedback to the network architect during deployment or audit.
      ansible.builtin.debug:
        msg: |
          ======================= WIRELESS STATUS =======================
          {{ wifi_controller_output.stdout }}
