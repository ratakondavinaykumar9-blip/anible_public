---
# Wireless Controller Status Retrieval
# Updated: 2026-03-15
# Author: NetLearner Architect
#
# Description:
# This playbook retrieves the status of Wireless Termination Points (WTP) from FortiGate devices.
# Idempotency: Read-only operation; safe for repeated execution without state alteration.
# Observability: Implements register/assert patterns to verify data integrity.
---
- name: Get Wireless Controller Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Wireless Termination Point (WTP) status via CLI
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get wireless-controller wtp
      register: wifi_status
      # Error Handling: Ensure failure if the return code is non-zero or if the CLI returns a parsing error
      failed_when:
        - wifi_status.rc != 0
        - "'command parse error' in wifi_status.stdout"

    - name: Verify Wireless Controller response integrity
      # Observability: Validates that the command returned a populated result
      ansible.builtin.assert:
        that:
          - wifi_status.stdout is defined
          - wifi_status.stdout | length > 0
        fail_msg: "The wireless controller returned empty or invalid data."
        success_msg: "Wireless controller output successfully captured."

    - name: Display Wireless Status
      # Best Practice: FQCN for debug module and clear output formatting
      ansible.builtin.debug:
        msg: |
          ======================= WIRELESS STATUS =======================
          {{ wifi_status.stdout }}