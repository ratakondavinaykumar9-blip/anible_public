---
# NetLearner Architect Standard: FortiGate System Status
# This playbook retrieves system status using both API and CLI methods.
# It ensures idempotency by focusing on read-only/state-preserving operations.

- name: Get System Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve global system settings via API
      # FQCN: fortinet.fortios.fortios_system_global
      # Why: Validates API reachability and captures structured global configuration state.
      # Idempotency: 'state: present' with no parameters acts as a safe check on root VDOM.
      fortinet.fortios.fortios_system_global:
        vdom: "root"
        state: "present"
      register: api_status
      # Error Handling: API access may be restricted; allowing fallback to CLI method.
      ignore_errors: true

    - name: Execute system status command via CLI
      # FQCN: ansible.netcommon.cli_command
      # Why: Obtains full system telemetry and versioning strings for deep observability.
      ansible.netcommon.cli_command:
        command: "get system status"
      register: cli_status
      # Error Handling: Fail if output is empty or contains standard FortiOS error patterns.
      failed_when: >
        cli_status.stdout is not defined or 
        cli_status.stdout == "" or 
        "Command fail" in cli_status.stdout

    - name: Validate system responsiveness and data integrity
      # Observability: Assertions confirm the device returned valid identifying information.
      ansible.builtin.assert:
        that:
          - "'Version:' in cli_status.stdout"
          - "'Serial-Number:' in cli_status.stdout"
        fail_msg: "Critical system data (Version/Serial) could not be verified from CLI output."
        quiet: true

    - name: Display formatted system status report
      # FQCN: ansible.builtin.debug
      # Why: Provides high-signal visibility into device health for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= SYSTEM STATUS =======================
          DEVICE: {{ inventory_hostname }}
          {{ cli_status.stdout }}
          =============================================================
