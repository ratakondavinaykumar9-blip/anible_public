---
# FortiGate System Status Playbook
# Improved for NetLearner Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get FortiGate System Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve global system configuration facts via API
      # Why: Using the API module ensures structured data retrieval for potential programmatic use.
      # Idempotency: Fact gathering is inherently idempotent and safe for repeated execution.
      fortinet.fortios.fortios_configuration_fact:
        vdom: "root"
        selector: "system_global"
      register: api_system_status
      ignore_errors: true # Why: API access may be restricted; allow the playbook to continue to the CLI fallback.

    - name: Execute 'get system status' command via CLI
      # Why: Captures the standard operational summary used by network engineers for troubleshooting.
      ansible.netcommon.cli_command:
        command: "get system status"
      register: cli_status
      # Error Handling: Ensure the command executed and returned meaningful system information.
      failed_when: 
        - cli_status.stdout is not defined
        - "'Version' not in cli_status.stdout"

    - name: Validate system status retrieval
      # Observability: Assert that the command execution returned content to verify connectivity and permission.
      ansible.builtin.assert:
        that:
          - cli_status.stdout | length > 0
        fail_msg: "The 'get system status' command returned no data. Check device connectivity."
        success_msg: "System status successfully retrieved and validated."

    - name: Display formatted system status
      # Documentation: Provides clear visibility of the device health and versioning in the automation logs.
      ansible.builtin.debug:
        msg: |
          ======================= SYSTEM STATUS =======================
          {{ cli_status.stdout }}
          =============================================================