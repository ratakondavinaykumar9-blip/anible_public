---
# FortiGate FortiCloud Status
# Improved: 2026-03-15
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get FortiCloud Status
  hosts: fortigate
  gather_facts: false # Fact gathering disabled for network-only tasks to improve performance

  tasks:
    - name: Retrieve FortiCloud service information
      # Idempotency: cli_command is safe for repeated execution as it performs a read-only operation
      ansible.netcommon.cli_command:
        command: get fmupdate service
      register: forticloud_raw
      # Error Handling: Ensure we catch application-level errors not reported via exit code
      failed_when: 
        - forticloud_raw.failed or "Command fail" in forticloud_raw.stdout or "Unknown action" in forticloud_raw.stdout

    - name: Validate FortiCloud output integrity
      # Observability: Assert that the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - forticloud_raw.stdout is defined
          - forticloud_raw.stdout | length > 0
        fail_msg: "The command 'get fmupdate service' returned an empty response or failed."
        quiet: true

    - name: Display FortiCloud operational status
      # Documentation: Providing structured output for audit logs and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= FORTICLOUD =======================
          {{ forticloud_raw.stdout }}
          ==========================================================