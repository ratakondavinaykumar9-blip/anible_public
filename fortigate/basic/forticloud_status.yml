---
# FortiGate FortiCloud Status Verification
# This playbook retrieves and validates the FortiCloud service status.
# It ensures connectivity and service registration are correctly reported.

- name: Verify FortiGate FortiCloud Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve FortiCloud service status via CLI
      # 'get' commands are read-only operations and thus inherently idempotent.
      # Using the Fully Qualified Collection Name (FQCN) for cross-platform consistency.
      ansible.netcommon.cli_command:
        command: get fmupdate service
      register: forticloud_raw
      # FortiOS might return a success code even if the specific sub-command fails.
      # 'failed_when' ensures we catch string-based error patterns in the output.
      failed_when: 
        - forticloud_raw.stdout is not defined
        - "'Command fail' in forticloud_raw.stdout"
        - "'Unknown action' in forticloud_raw.stdout"

    - name: Validate FortiCloud service data
      # Observability: Using 'assert' to programmatically verify the command returned
      # the expected service information rather than an empty or irrelevant string.
      ansible.builtin.assert:
        that:
          - "'FortiCloud' in forticloud_raw.stdout"
        fail_msg: "FortiCloud service information was not found in the device output."
        success_msg: "FortiCloud service status successfully verified."

    - name: Display FortiCloud Status
      # Enhanced observability for manual execution and auditing logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTICLOUD STATUS =======================
          {{ forticloud_raw.stdout }}
          =================================================================
