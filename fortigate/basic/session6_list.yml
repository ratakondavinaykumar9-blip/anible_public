# FortiGate IPv6 Session Monitoring Playbook
# Refactored by NetLearner Architect for Enterprise Standards
# Ensures observability, robust error handling, and strict adherence to FQCN.
- name: FortiGate IPv6 Session Audit
  hosts: fortigate
  gather_facts: false
  # Connection: Requires ansible.netcommon.network_cli or fortinet.fortios.fortios

  tasks:
    - name: Retrieve Active IPv6 Sessions from FortiGate
      # Why: Critical for monitoring IPv6 traffic flow and auditing stateful connections.
      # Idempotency: 'get' commands are read-only and inherently safe for multiple executions.
      ansible.netcommon.cli_command:
        command: get system session6 list
      register: sess_output
      # Error Handling: Catch cases where IPv6 might be disabled or command syntax varies by firmware.
      failed_when: 
        - sess_output.rc != 0
        - "'Unknown action' in sess_output.stdout"
        - "'Command fail' in sess_output.stdout"

    - name: Validate Session Retrieval Integrity
      # Why: Observability check to ensure the output is valid before proceeding to display or process.
      ansible.builtin.assert:
        that:
          - sess_output.stdout is defined
          - "sess_output.stdout | length >= 0"
        fail_msg: "IPv6 session retrieval returned an invalid or null response."
        quiet: true

    - name: Log IPv6 Sessions to Console
      # Why: Provides immediate visibility for operators during troubleshooting or session auditing.
      ansible.builtin.debug:
        msg:
          - "======================= IPv6 SESSIONS ======================="
          - "{{ sess_output.stdout | default('No active IPv6 sessions found.') }}"

    - name: Verify Command Execution Status
      # Why: Explicit check for command return code to satisfy high-reliability requirements.
      ansible.builtin.assert:
        that:
          - sess_output.rc == 0
        fail_msg: "FortiGate CLI returned a non-zero exit code."
        quiet: true