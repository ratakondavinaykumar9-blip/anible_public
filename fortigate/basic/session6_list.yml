---
# FortiGate IPv6 Sessions - Improved Version
# This playbook retrieves the current IPv6 session list from FortiGate devices.
# It adheres to enterprise standards for observability, error handling, and FQCN usage.

- name: Retrieve FortiGate IPv6 Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute command to list IPv6 sessions
      # Using FQCN for cross-environment compatibility
      ansible.netcommon.cli_command:
        command: get system session6 list
      register: sess_output
      # Error Handling: Ensure we catch command parse errors or unsupported features
      failed_when:
        - sess_output.failed | default(false)
        - "'command parse error' in sess_output.stdout or 'Unknown action' in sess_output.stdout"

    - name: Validate that session output was received
      # Observability: Assert ensures the playbook doesn't silently continue with empty data
      ansible.builtin.assert:
        that:
          - sess_output.stdout is defined
          - sess_output.stdout | length > 0
        fail_msg: "No IPv6 session data was returned. Verify IPv6 is enabled on the device."
        quiet: true

    - name: Display formatted session list
      # Documentation/Observability: Provides a clear view of the state for the operator
      ansible.builtin.debug:
        msg: |
          ======================= IPv6 SESSIONS =======================
          {{ sess_output.stdout }}
          =============================================================