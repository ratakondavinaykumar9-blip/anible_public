---
# FortiGate DNS Configuration Audit
# This playbook retrieves, validates, and parses system DNS settings to ensure 
# architectural compliance and operational observability.
- name: Audit FortiGate DNS Settings
  hosts: fortigate
  gather_facts: false
  # Ensuring the connection uses the standard network_cli for FortiOS devices.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve Operational DNS State
      # Best Practices: Using Fully Qualified Collection Names (FQCN) for reliability.
      # Observability: Registering output to 'dns_raw' for downstream verification.
      ansible.netcommon.cli_command:
        command: get system dns
      register: dns_raw
      # Idempotency: Retrieval is a read-only task and should not trigger a change status.
      changed_when: false
      # Error Handling: Identifying device-specific error strings to ensure task accuracy.
      failed_when: 
        - dns_raw.failed 
        - "'Command fail' in dns_raw.stdout"

    - name: Validate Configuration Integrity
      # Observability: Using assertions to verify that both primary and secondary servers exist.
      # This ensures the audit is actionable and prevents silent configuration gaps.
      ansible.builtin.assert:
        that:
          - "'primary' in dns_raw.stdout"
          - "'secondary' in dns_raw.stdout"
        fail_msg: "Critical: DNS configuration is missing or invalid on {{ inventory_hostname }}."
        success_msg: "Success: DNS configuration structure verified on {{ inventory_hostname }}."

    - name: Parse DNS for Structured Reporting
      # Documentation: Extracting key values into facts for clean logging and audit trails.
      # This moves the playbook from raw text scraping to structured data management.
      ansible.builtin.set_fact:
        primary_dns: "{{ dns_raw.stdout | regex_search('primary\\s+:\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)', '\\1') | first | default('UNDEFINED') }}"
        secondary_dns: "{{ dns_raw.stdout | regex_search('secondary\\s+:\\s+(\\d+\\.\\d+\\.\\d+\\.\\d+)', '\\1') | first | default('UNDEFINED') }}"

    - name: Generate Audit Report
      # Providing a human-readable summary of the validated operational state.
      ansible.builtin.debug:
        msg: |
          ==================================================
          FORTIGATE DNS AUDIT REPORT
          ==================================================
          DEVICE:     {{ inventory_hostname }}
          PRIMARY:    {{ primary_dns }}
          SECONDARY:  {{ secondary_dns }}
          ==================================================
          RAW OUTPUT:
          {{ dns_raw.stdout }}
