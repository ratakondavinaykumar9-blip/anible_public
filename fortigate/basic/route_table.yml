# NetLearner Architect Improved Playbook
# Purpose: Retrieve and validate the FortiGate routing table for observability and reachability audits.
# Standards: Idempotent (Read-only), Observable, Documented, Error-handled, FQCN compliant.

- name: Retrieve FortiGate Routing Table
  hosts: fortigate
  gather_facts: false # Disabled to reduce execution time; device facts are not required for CLI command execution.

  tasks:
    - name: Fetch routing table data via CLI
      # Why: Direct CLI access is used to capture the full operational state of the routing table, 
      # including dynamic routes (OSPF/BGP) and static path selection.
      ansible.netcommon.cli_command:
        command: get router info routing-table all
      register: routes_output
      # Error Handling: Ensure the task fails explicitly if the device returns an error message or empty string.
      failed_when: 
        - routes_output.stdout == ""
        - "'Command fail' in routes_output.stdout"

    - name: Assert routing table observability
      # Why: Verification step to ensure data integrity before any subsequent automation logic or reporting.
      ansible.builtin.assert:
        that:
          - routes_output.stdout | length > 0
          - "'Codes:' in routes_output.stdout" # Verifies the characteristic header of a FortiGate route table.
        fail_msg: "Routing table output is empty or malformed. Verification failed."
        success_msg: "Routing table successfully retrieved and validated."

    - name: Display formatted route table
      # Why: Provides immediate visibility for network engineers during troubleshooting or manual audit runs.
      ansible.builtin.debug:
        msg: 
          - "======================= ROUTE TABLE ======================="
          - "{{ routes_output.stdout }}"

---