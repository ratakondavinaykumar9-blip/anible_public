---
# FortiGate Route Table Retrieval
# This playbook retrieves the full routing table from a FortiGate device.
# It follows NetLearner standards for observability, error handling, and FQCN usage.

- name: Retrieve and Validate FortiGate Route Table
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get routing table info via CLI
      # Use FQCN for network operations to ensure cross-version compatibility.
      # This task is inherently idempotent as it performs a read-only 'get' operation.
      ansible.netcommon.cli_command:
        command: get router info routing-table all
      register: routes_result
      # Basic error handling: Ensure the task fails if the command is not recognized or execution fails.
      failed_when: 
        - routes_result.rc is defined and routes_result.rc != 0
        - "'Command fail' in routes_result.stdout"

    - name: Validate routing table response
      # Observability: Use assertions to verify that the output is meaningful and not empty.
      # Checking for 'routing table' ensures the device returned the expected data structure.
      ansible.builtin.assert:
        that:
          - routes_result.stdout is defined
          - routes_result.stdout | length > 0
          - "'routing table' in routes_result.stdout | lower"
        fail_msg: "The routing table retrieval returned empty or invalid data."
        success_msg: "Routing table successfully retrieved and validated."

    - name: Display formatted route table
      # Use FQCN for the debug module to provide visual feedback for operators.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ROUTE TABLE =======================
          {{ routes_result.stdout }}