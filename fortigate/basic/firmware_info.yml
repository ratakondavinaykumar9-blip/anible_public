# FortiGate Firmware Information Retrieval
# Improved: 2026-03-18
# Author: NetLearner Architect
#
# Purpose: Retrieves and validates system firmware status, including partitions and build versions.
# Standards: Idempotency (read-only), Observability (assertions), FQCN, and Robust Error Handling.
---
- name: "FIRMWARE | Monitor FortiGate Firmware Status"
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "FIRMWARE | Retrieve system firmware details"
      # Idempotency: Read-only CLI command execution has no impact on device state.
      # FQCN: Using fully qualified collection names ensures portability across automation environments.
      ansible.netcommon.cli_command:
        command: "get system firmware"
      register: fortigate_fw_raw
      # Error Handling: Fail if the response is empty, indicating a possible connection or parsing issue.
      # Idempotency: 'changed_when: false' ensures the task does not report a "changed" state for a read-only action.
      # Check Mode: 'check_mode: no' allows the command to run during dry runs to gather state information.
      changed_when: false
      check_mode: no
      failed_when: fortigate_fw_raw.stdout | length == 0

    - name: "ASSERT | Validate firmware data integrity"
      # Observability: Confirm that the output contains critical structural keywords (Version, Partition).
      ansible.builtin.assert:
        that:
          - "'Version' in fortigate_fw_raw.stdout"
          - "'Partition' in fortigate_fw_raw.stdout"
        fail_msg: "The 'get system firmware' command returned an unrecognized or empty format from {{ inventory_hostname }}."
        quiet: true

    - name: "DISPLAY | Report Firmware Monitoring Results"
      # Documentation: Provides structured, human-readable output for auditing and log verification.
      ansible.builtin.debug:
        msg: |
          ======================= FIRMWARE STATUS =======================
          DEVICE: {{ inventory_hostname }}
          
          --- SYSTEM FIRMWARE OUTPUT ---
          {{ fortigate_fw_raw.stdout }}