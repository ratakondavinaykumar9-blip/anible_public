---
# FortiGate Firmware Information Audit
# Purpose: Retrieves and validates firmware status for compliance and lifecycle tracking.
# Standards: Idempotency, Observability, FQCN, Error Handling.
- name: FortiGate Firmware Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute firmware retrieval command
      # Why: Pulls current active and backup firmware versions from the device flash for auditing.
      # This task is idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: get system firmware
      register: fw_result
      # Error Handling: Ensure we fail if the command is unrecognized or execution fails.
      failed_when: 
        - fw_result.failed 
        - "'Unknown' in fw_result.stdout or 'Error' in fw_result.stdout"

    - name: Verify firmware data integrity
      # Observability: Asserts that the device returned a valid response containing version data.
      # This ensures downstream automation or reporting has valid data to process.
      ansible.builtin.assert:
        that:
          - "fw_result.stdout is defined"
          - "fw_result.stdout | length > 0"
          - "'Version' in fw_result.stdout or 'build' in fw_result.stdout"
        fail_msg: "Data Integrity Error: Firmware output for {{ inventory_hostname }} is invalid or incomplete."
        success_msg: "Data Integrity Verified: Firmware information successfully captured."

    - name: Display formatted firmware status
      # Why: Provides a clear, human-readable summary for operational logs and visibility.
      ansible.builtin.debug:
        msg: |
          ======================= FIRMWARE AUDIT: {{ inventory_hostname }} =======================
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          
          {{ fw_result.stdout }}
          =========================================================================================