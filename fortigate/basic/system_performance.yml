---
# FortiGate Performance Monitoring
# This playbook retrieves system performance statistics from FortiGate devices.
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Get FortiGate Performance Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system performance status from FortiOS
      # Using FQCN for cross-platform consistency.
      # Idempotency: Read-only commands should not report a 'changed' status.
      ansible.netcommon.cli_command:
        command: get system performance status
      register: perf_result
      changed_when: false
      # Error Handling: Catch potential execution failures or command-specific errors in FortiOS.
      failed_when: 
        - perf_result.failed or "Unknown command" in perf_result.stdout or "Command fail" in perf_result.stdout

    - name: Validate performance data integrity
      # Observability: Ensure the output contains expected metrics (CPU and Memory) before proceeding.
      ansible.builtin.assert:
        that:
          - "'CPU states:' in perf_result.stdout"
          - "'Memory:' in perf_result.stdout"
        fail_msg: "The performance output is incomplete or invalid. Please check device connectivity."
        success_msg: "Performance metrics successfully captured and validated."

    - name: Display performance report
      # Documentation: Providing a clear, formatted view of the performance status for operational audit.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE PERFORMANCE =======================
          {{ perf_result.stdout }}
          =====================================================================