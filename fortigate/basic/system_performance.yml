---
# Network Automation Framework Optimized Playbook
# Purpose: Retrieve and validate FortiGate system performance status
# Improvements: FQCN usage, idempotency confirmation, observability via assertions, and robust error handling.

- name: Get FortiGate Performance Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "FortiGate: Fetch performance status via CLI"
      # Using Fully Qualified Collection Name (FQCN) for cross-platform compatibility
      ansible.netcommon.cli_command:
        command: get system performance status
      register: perf_output
      # Idempotency: Explicitly set changed_when to false as this is a read-only monitoring command
      changed_when: false
      # Error Handling: Fail if the command is unrecognized or the task fails
      failed_when: 
        - perf_output.failed
        - "'Unknown command' in perf_output.stdout"

    - name: "FortiGate: Validate performance data integrity"
      # Observability: Use assertions to verify the output contains expected performance metrics
      ansible.builtin.assert:
        that:
          - "perf_output.stdout is defined"
          - "perf_output.stdout | length > 0"
          - "'CPU' in perf_output.stdout"
          - "'Memory' in perf_output.stdout"
        fail_msg: "Performance status retrieval failed or returned incomplete data (CPU/Memory metrics missing)."
        success_msg: "Performance metrics successfully captured and validated."

    - name: "FortiGate: Display retrieved performance metrics"
      # Documentation: Providing a formatted view of the performance data for the operator
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE STATUS =======================
          {{ perf_output.stdout }}
          ==================================================================