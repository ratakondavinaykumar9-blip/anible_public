---
# FortiGate License Information Retrieval
# This playbook retrieves the license status from FortiGate devices and verifies its validity.
# It adheres to NetLearner Architect standards for observability, idempotency, and error handling.

- name: Get and Verify FortiGate License Info
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system license status via CLI
      # Use Fully Qualified Collection Name (FQCN) for cross-platform compatibility
      ansible.netcommon.cli_command:
        command: diagnose system license status
      register: license_output
      # Idempotency: Read-only commands should not report a 'changed' status
      changed_when: false
      # Error Handling: Fail if the output is empty or contains known failure strings
      failed_when:
        - license_output.stdout is not defined or license_output.stdout | length == 0
        - "'Command fail' in license_output.stdout"

    - name: Verify license validity (Observability)
      # Assert that the device reports a valid license to ensure service continuity
      # This provides an explicit success/failure check beyond just capturing output
      ansible.builtin.assert:
        that:
          - "'Status: Valid' in license_output.stdout or 'Status: Licensed' in license_output.stdout"
        fail_msg: "FortiGate license verification failed. The device may be unlicensed or in evaluation mode."
        success_msg: "FortiGate license status successfully verified as Valid/Licensed."

    - name: Display formatted license status
      # Provides human-readable output for log visibility and manual auditing
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE LICENSE STATUS =======================
          {{ license_output.stdout }}