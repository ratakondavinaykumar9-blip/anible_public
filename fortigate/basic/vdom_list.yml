---
# NetLearner Staging - FortiGate VDOM Discovery
# Improved: 2026-04-12
# Purpose: Retrieves and validates the Virtual Domain (VDOM) list from FortiGate devices.
#
# Standards Adhered:
# 1. Idempotency: Read-only 'get' command is natively idempotent and safe for repeated execution.
# 2. Observability: Utilizes 'register' for output capture and 'assert' for state verification.
# 3. Documentation: Inline comments provide technical rationale for task-specific logic.
# 4. Error Handling: 'failed_when' catches logical failures within the CLI output stream.
# 5. Best Practices: Strictly uses Fully Qualified Collection Names (FQCN).

- name: Get VDOM List
  hosts: fortigate
  gather_facts: false  # Performance: Facts are not required for CLI discovery tasks.

  tasks:
    - name: Retrieve VDOM list from system configuration
      ansible.netcommon.cli_command:
        command: get system vdom
      register: vdom_result
      # Rationale: Ensures the task fails if the output is missing or contains error patterns,
      # even if the underlying shell returns an exit code of 0.
      failed_when:
        - vdom_result.stdout is not defined
        - "('error' in vdom_result.stdout | lower) or ('invalid' in vdom_result.stdout | lower)"

    - name: Verify VDOM data integrity
      ansible.builtin.assert:
        that:
          - vdom_result.stdout | length > 0
          - "'vdom' in vdom_result.stdout | lower"
        fail_msg: "VDOM list retrieval failed or returned unexpected data format."
        success_msg: "VDOM list successfully captured and validated."

    - name: Display formatted VDOM information
      ansible.builtin.debug:
        msg: |
          ======================= VDOMs =======================
          {{ vdom_result.stdout }}
      # Condition: Prevents debug noise if prior validation failed (if using ignore_errors).
      when: vdom_result.stdout is defined
