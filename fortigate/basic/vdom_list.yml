---
# FortiGate VDOM List
# Improved: 2026-03-15
# Author: NetLearner Architect
# Purpose: Retrieves and validates the list of Virtual Domains (VDOMs) from FortiGate devices.
- name: Get VDOM List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve VDOMs from system configuration
      # FQCN: Using ansible.netcommon.cli_command for broad compatibility.
      # Idempotency: This is a read-only 'get' command and is inherently safe for multiple runs.
      ansible.netcommon.cli_command:
        command: get system vdom
      register: vdom_output
      # Error Handling: Ensure the task fails if the underlying CLI command returns a non-zero exit code.
      failed_when: 
        - vdom_output.failed | default(false)
        - vdom_output.rc | default(0) != 0

    - name: Verify VDOM data integrity
      # Observability: Assert that the command execution resulted in actual data being returned.
      ansible.builtin.assert:
        that:
          - vdom_output.stdout is defined
          - vdom_output.stdout | length > 0
        fail_msg: "VDOM retrieval failed: No data returned from host {{ inventory_hostname }}."
        success_msg: "VDOM data successfully captured for {{ inventory_hostname }}."

    - name: Display VDOM list for visibility
      # Documentation: Print the formatted stdout to the console for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= VDOMs =======================
          {{ vdom_output.stdout }}