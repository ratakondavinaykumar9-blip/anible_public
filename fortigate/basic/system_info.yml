---
# NetLearner Standardized Playbook: FortiGate System Information
# Purpose: Retrieves and validates core system metadata from FortiGate devices.
# Standards: Idempotency, Observability, Error Handling, and FQCN.

- name: Retrieve FortiGate System Metadata
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system info' command
      # Using FQCN for the network common CLI module.
      # This operation is inherently idempotent as it is a read-only state retrieval.
      ansible.netcommon.cli_command:
        command: get system info
      register: fortigate_info
      # Error Handling: Fail if the output is missing or contains specific failure strings.
      failed_when:
        - fortigate_info.stdout is not defined
        - "'Command fail' in fortigate_info.stdout"
        - "'Unknown action' in fortigate_info.stdout"

    - name: Validate System Information Integrity
      # Observability: Assert that the response contains expected operational markers (e.g., Hostname).
      ansible.builtin.assert:
        that:
          - "fortigate_info.stdout | length > 0"
          - "'Hostname' in fortigate_info.stdout"
        fail_msg: "The system info response was empty or malformed."
        success_msg: "System metadata successfully validated for {{ inventory_hostname }}."

    - name: Display Structured System Information
      # Observability: Formatted output for logging and manual audit trails.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          DEVICE: {{ inventory_hostname }}
          STATUS: SUCCESS
          ======================= SYSTEM INFO =======================
          {{ fortigate_info.stdout }}
          ===========================================================