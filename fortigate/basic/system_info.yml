# FortiGate System Information
# Improved: 2026-04-12 (NetLearner Architect)
# Standards: Idempotency, Observability, FQCN, Error Handling
#
- name: Get System Info
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system status via CLI
      # Use Fully Qualified Collection Name (FQCN) for network-common CLI interaction
      ansible.netcommon.cli_command:
        command: get system status
      register: info
      # Idempotency: Read-only commands must not report a 'changed' status
      changed_when: false
      # Error Handling: Explicitly fail if the command is unrecognized or returns empty data
      failed_when:
        - info.stdout is not defined
        - "info.stdout | length == 0"
        - "'unknown command' in info.stdout | lower"

    - name: Validate telemetry data
      # Observability: Ensure critical system fields are present before proceeding
      ansible.builtin.assert:
        that:
          - "'Version' in info.stdout"
          - "'Serial-Number' in info.stdout"
          - "'Hostname' in info.stdout"
        fail_msg: "System status retrieval failed or returned incomplete data for {{ inventory_hostname }}."
        quiet: true

    - name: Display formatted system info
      # Observability: Provide structured visibility for manual audit logs
      ansible.builtin.debug:
        msg: |
          ======================= SYSTEM INFO =======================
          Device: {{ inventory_hostname }}
          Output:
          {{ info.stdout }}