---
# FortiGate Administrative User Audit Playbook
# Purpose: This playbook retrieves the list of configured administrators for audit compliance.
# Standards: Idempotency is maintained via read-only commands; Observability via assertions.

- name: Get FortiGate Admin List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system administrator list
      # Using FQCN for reliable module resolution.
      # This task is idempotent as it performs a non-modifying state retrieval.
      ansible.netcommon.cli_command:
        command: get system admin
      register: admin_output
      # Error Handling: Capture cases where the device might return a success code but an error string in stdout.
      failed_when:
        - admin_output.failed or "Command fail" in admin_output.stdout or "Unknown action" in admin_output.stdout

    - name: Verify administrator data was retrieved
      # Observability: Ensure the playbook does not silently succeed with empty data.
      ansible.builtin.assert:
        that:
          - admin_output.stdout is defined
          - admin_output.stdout | length > 0
        fail_msg: "The administrator list could not be retrieved or is empty."
        success_msg: "Administrator list captured successfully."

    - name: Display formatted administrator details
      # Documentation: Providing clear visibility for human operators or log analysis.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ADMINS =======================
          {{ admin_output.stdout }}