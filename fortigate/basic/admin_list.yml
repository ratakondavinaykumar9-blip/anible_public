# NetLearner Architect Standard: FortiGate Admin Audit
# Last Modified: 2026-04-12
# Improvements: FQCN usage, Output Validation (Observability), and Error Trapping.

- name: Get FortiGate Administrator List
  hosts: fortigate
  gather_facts: false # FortiOS does not support standard Ansible fact gathering; performance optimization.

  tasks:
    - name: Execute 'get system admin' Command
      # Using Fully Qualified Collection Name (FQCN) for cross-environment reliability.
      # Read-only 'get' operations are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: "get system admin"
      register: admin_list
      # Error Handling: Catch CLI-specific error strings that may not trigger a non-zero exit code.
      failed_when: 
        - admin_list.stdout is not defined
        - "'unknown command' in admin_list.stdout | lower"
        - "'command fail' in admin_list.stdout | lower"

    - name: Verify Admin List Integrity
      # Observability: Assert that the output is populated and contains expected data.
      # This ensures subsequent automation layers do not process null or corrupted data.
      ansible.builtin.assert:
        that:
          - admin_list.stdout | length > 0
          - "'admin' in admin_list.stdout or 'name' in admin_list.stdout"
        fail_msg: "Data Integrity Error: The administrator list is empty or the format is unrecognized."
        success_msg: "Data Integrity Verified: Administrator list retrieved successfully."

    - name: Display Administrator Report
      # Observability: Formatted output for clear visibility in NetLearner Staging execution logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ADMINS =======================
          {{ admin_list.stdout }}
          ======================= AUDIT COMPLETE =========================