---
# FortiGate Clock and NTP Operational Status
# Author: NetLearner Architect
# Purpose: Gathers and validates system clock and NTP status using FQCN and robust error handling.
# Idempotency: Inherently idempotent as it performs read-only operational state gathering.
- name: Get Clock and NTP
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve current system time
      # Fetches operational time directly from the CLI to ensure synchronization across the fabric.
      ansible.netcommon.cli_command:
        command: get system time
      register: time_result
      # Error Handling: Detect CLI-level failures that may return exit code 0 but contain error strings.
      failed_when: 
        - time_result.failed 
        - '"Unknown action" in time_result.stdout or "Command fail" in time_result.stdout'

    - name: Validate system time retrieval
      # Observability: Ensure the command returned a non-empty string for further processing.
      ansible.builtin.assert:
        that:
          - time_result.stdout | length > 0
        fail_msg: "System time retrieval returned an empty response on {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve NTP synchronization status
      # Gathers NTP configuration and sync state to verify infrastructure health.
      ansible.netcommon.cli_command:
        command: get system ntp
      register: ntp_result
      failed_when: 
        - ntp_result.failed 
        - '"Unknown action" in ntp_result.stdout or "Command fail" in ntp_result.stdout'

    - name: Validate NTP status
      # Observability: Verify that NTP data is present and correctly formatted in the output.
      ansible.builtin.assert:
        that:
          - ntp_result.stdout | length > 0
          - "'ntp' in ntp_result.stdout.lower()"
        fail_msg: "NTP configuration status could not be verified on {{ inventory_hostname }}."
        quiet: true

    - name: Display system state summary
      # Documentation & Observability: Provides formatted output for audit logs and manual verification.
      ansible.builtin.debug:
        msg: |
          DEVICE: {{ inventory_hostname }}
          ==================================================
          SYSTEM CLOCK:
          {{ time_result.stdout | trim }}
          
          NTP STATUS:
          {{ ntp_result.stdout | trim }}
          ==================================================
```