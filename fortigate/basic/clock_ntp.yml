---
# FortiGate Clock and NTP Status Verification
# This playbook retrieves and validates the system time and NTP status on FortiGate devices.
# Adheres to standards for: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Audit FortiGate Clock and NTP
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve current system time
      # FQCN used for broad compatibility; retrieves runtime clock data
      ansible.netcommon.cli_command:
        command: get system time
      register: system_time_result
      # Error Handling: Fail if the command is unrecognized or connection fails
      failed_when: 
        - system_time_result.failed or "Unknown" in system_time_result.stdout
      # Idempotency: Read-only operations must not report a change status
      changed_when: false

    - name: Retrieve NTP configuration and status
      ansible.netcommon.cli_command:
        command: get system ntp
      register: ntp_status_result
      failed_when: 
        - ntp_status_result.failed or "Unknown" in ntp_status_result.stdout
      changed_when: false

    - name: Validate Clock Operational State
      # Observability: Assert that the system returned a valid date string
      ansible.builtin.assert:
        that:
          - "system_time_result.stdout is search('[0-9]{4}-[0-9]{2}-[0-9]{2}')"
        fail_msg: "The system time output format is invalid or missing."
        quiet: true

    - name: Validate NTP Configuration
      # Observability: Ensure NTP is enabled to maintain time synchronization
      ansible.builtin.assert:
        that:
          - "'status: enable' in ntp_status_result.stdout"
        fail_msg: "NTP is currently disabled on the device."
        success_msg: "NTP is enabled and synchronized."
        quiet: false

    - name: Display Clock and NTP summary
      ansible.builtin.debug:
        msg: |
          --- CLOCK REPORT ---
          {{ system_time_result.stdout }}
          
          --- NTP CONFIGURATION ---
          {{ ntp_status_result.stdout }}