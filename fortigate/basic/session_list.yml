---
# FortiGate Session List Retrieval
# This playbook retrieves the current session list for diagnostic and audit purposes.
# Standards: Idempotency (read-only), Observability (assert), and FQCN usage.
- name: Get Session List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve active sessions from the device
      # FQCN: Using ansible.netcommon.cli_command for standardized CLI interaction.
      # Idempotency: 'get' (read) commands are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_output
      # Error Handling: Ensure we catch application-level errors that might be returned in stdout.
      failed_when:
        - sessions_output.failed | default(false) or "'error' in sessions_output.stdout | default('') | lower"

    - name: Validate session output integrity
      # Observability: Assert that stdout contains data to verify the command returned a result.
      ansible.builtin.assert:
        that:
          - sessions_output.stdout is defined
          - sessions_output.stdout | length > 0
        fail_msg: "Session list is empty or could not be retrieved. Verify device state."
        quiet: true

    - name: Display session information
      # Provide visibility into the collected data for reporting and logs.
      ansible.builtin.debug:
        msg: |
          ======================= SESSIONS =======================
          {{ sessions_output.stdout }}