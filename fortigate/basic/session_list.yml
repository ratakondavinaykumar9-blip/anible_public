# FortiGate Session List Retrieval Playbook
# This playbook retrieves the current session table from a FortiGate device.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, and Robust Error Handling.

- name: Get FortiGate Session List
  hosts: fortigate
  gather_facts: false  # Performance: FortiOS devices do not require standard setup facts for CLI operations

  tasks:
    - name: Execute 'get system session list' command
      # Using FQCN for cross-platform network CLI compatibility and stability
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_raw
      # Error Handling: Ensure the command didn't fail or return an 'Unknown action' error from FortiOS
      failed_when: 
        - sessions_raw.failed 
        - "'Unknown action' in sessions_raw.stdout"

    - name: Verify session data integrity
      # Observability: Assert that we received a valid, non-empty response from the device
      ansible.builtin.assert:
        that:
          - sessions_raw.stdout is defined
          - sessions_raw.stdout | length > 0
        fail_msg: "Session retrieval failed: The device returned an empty or undefined response."
        success_msg: "Session data successfully captured and validated."

    - name: Display session information
      # Idempotency: This task is safe to run multiple times as it only performs a read/display action
      ansible.builtin.debug:
        msg: |
          ======================= SESSIONS =======================
          {{ sessions_raw.stdout }}
      # Only display if data is present to keep the output clean
      when: sessions_raw.stdout != ""