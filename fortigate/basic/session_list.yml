---
# FortiGate Session List Improvement
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get FortiGate Session List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute session list command
      # Why: Retrieve the active session table for audit and troubleshooting.
      # Idempotency: Read-only command, inherently idempotent.
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_output
      # Error Handling: Explicitly fail if the command fails or returns an error indicator
      failed_when: 
        - sessions_output.failed or "Unknown command" in sessions_output.stdout

    - name: Validate session output presence
      # Observability: Verify that the command returned meaningful data
      ansible.builtin.assert:
        that:
          - sessions_output.stdout is defined
          - sessions_output.stdout | length > 0
        fail_msg: "The session list command returned no data. Check device connectivity or session state."
        quiet: true

    - name: Display formatted session list
      # Observability: Provide clear visibility into the results for logging and analysis
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE SESSIONS =======================
          {{ sessions_output.stdout }}
      when: sessions_output.stdout is defined