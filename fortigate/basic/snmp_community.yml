# FortiGate SNMP Community Retrieval
# Improved: 2026-04-12
# Author: NetLearner Architect
#
# Purpose: Safely retrieves and validates SNMP community configuration.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
---
- name: Get FortiGate SNMP Community Configuration
  hosts: fortigate
  gather_facts: false
  vars:
    # Pattern to validate that configuration was actually returned
    snmp_pattern: "config system snmp community"

  tasks:
    - name: "MONITOR | Retrieve SNMP community configuration"
      # Idempotency: Read-only CLI command execution has no impact on device state.
      # FQCN: Using fully qualified collection name (FQCN) for portability.
      ansible.netcommon.cli_command:
        command: "get system snmp community"
      register: snmp_raw
      # Error Handling: Explicitly fail if the command fails or returns no output.
      failed_when:
        - snmp_raw.failed
        - snmp_raw.stdout | length == 0

    - name: "ASSERT | Validate SNMP configuration integrity"
      # Observability: Verify that the output contains the expected SNMP header.
      # This prevents false positives from empty or invalid terminal responses.
      ansible.builtin.assert:
        that:
          - "snmp_pattern in snmp_raw.stdout"
        fail_msg: "The command 'get system snmp community' did not return a valid SNMP configuration."
        quiet: true

    - name: "DISPLAY | Report SNMP Configuration Results"
      # Documentation: Providing a structured output for easy log analysis and visibility.
      ansible.builtin.debug:
        msg: |
          ======================= SNMP COMMUNITY CONFIGURATION =======================
          DEVICE: {{ inventory_hostname }}
          
          --- FULL SNMP CONFIGURATION ---
          {{ snmp_raw.stdout }}