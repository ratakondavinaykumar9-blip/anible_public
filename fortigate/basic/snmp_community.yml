---
# FortiGate SNMP Community Information Retrieval
# Improved by NetLearner Architect
# This playbook retrieves SNMP community configuration from FortiGate devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN

- name: Get SNMP Community Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SNMP community details via CLI
      # This task is inherently idempotent as it performs a read-only operation.
      # Using FQCN (ansible.netcommon.cli_command) to ensure forward compatibility.
      ansible.netcommon.cli_command:
        command: get system snmp community
      register: snmp_result
      # Enhanced error handling: catch explicit error strings in command output 
      # that might not trigger a non-zero exit code in some network environments.
      failed_when:
        - snmp_result.failed or "error" in snmp_result.stdout | lower or "unknown command" in snmp_result.stdout | lower

    - name: Verify SNMP configuration retrieval success
      # Observability: Assert that the command returned non-empty data.
      # This ensures the playbook fails early if the retrieval logic is incorrect.
      ansible.builtin.assert:
        that:
          - snmp_result.stdout is defined
          - snmp_result.stdout | length > 0
        fail_msg: "Failed to retrieve SNMP configuration or the output is unexpectedly empty."
        success_msg: "Successfully retrieved and validated SNMP community details."

    - name: Display SNMP configuration for visibility
      # Provides clear visibility of the retrieved data for auditing and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= SNMP COMMUNITY DETAILS =======================
          {{ snmp_result.stdout }}