---
# FortiGate SNMP Community Retrieval
# Improved by Architect:for Idempotency, Observability, and Robustness
# Standards: Idempotency, Observability, FQCN, Documentation, Error Handling
- name: Get SNMP Community
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SNMP community configuration via CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      # Documentation: Fetches the current SNMP community settings to verify configuration state.
      ansible.netcommon.cli_command:
        command: get system snmp community
      register: snmp_result
      # Idempotency: Read-only operations must always report 'changed: false' to ensure safe re-runs.
      changed_when: false
      # Error Handling: Fail if the command is unrecognized by the device or if the transport fails.
      failed_when: >
        snmp_result.failed or 
        "Unknown action" in snmp_result.stdout or 
        "Command fail" in snmp_result.stdout

    - name: Validate SNMP configuration retrieval
      # Observability: Use assertions to programmatically verify the success of the retrieval.
      ansible.builtin.assert:
        that:
          - snmp_result.stdout is defined
          - snmp_result.stdout | length > 0
        fail_msg: "SNMP configuration retrieval failed or returned an empty response."
        success_msg: "SNMP configuration successfully retrieved and validated."

    - name: Display SNMP Community Information
      # Observability: Provide formatted debug output for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= SNMP CONFIGURATION =======================
          {{ snmp_result.stdout }}