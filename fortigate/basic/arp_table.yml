---
# FortiGate ARP Table Retrieval
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Standards compliance:
# 1. Idempotency: Read-only operation is safe for repeated execution.
# 2. Observability: Uses 'register' and 'assert' to verify data integrity.
# 3. Documentation: Clear comments explaining task logic and error handling.
# 4. Error Handling: Uses 'failed_when' to catch specific device-level errors.
# 5. Best Practices: Uses Fully Qualified Collection Names (FQCN).

- name: Retrieve and Validate FortiGate ARP Table
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch ARP table from device
      # FQCN: Using ansible.netcommon for standardized network CLI command execution.
      ansible.netcommon.cli_command:
        command: get system arp
      register: arp_output
      # Error Handling: Ensure we fail if the device explicitly returns a "Command fail" message 
      # or if the execution itself fails.
      failed_when: (arp_output.failed) or ("Command fail" in arp_output.stdout)

    - name: Validate ARP table data
      # Observability: Confirm the command returned content and contains expected column headers.
      ansible.builtin.assert:
        that:
          - arp_output.stdout | length > 0
          - "'Address' in arp_output.stdout or 'Interface' in arp_output.stdout"
        fail_msg: "ARP table validation failed: Output is empty or has an unexpected format."
        success_msg: "ARP table successfully retrieved and verified."

    - name: Display ARP Table
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ARP TABLE =======================
          {{ arp_output.stdout }}