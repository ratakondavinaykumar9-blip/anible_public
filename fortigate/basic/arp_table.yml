---
# NetLearner Staging: FortiGate ARP Table Retrieval
# This playbook retrieves the current ARP table from FortiGate devices for network monitoring.
# Standards: Idempotent (Read-only), Observable (Assertions), Fully Documented.

- name: Retrieve and Validate FortiGate ARP Table
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute ARP table retrieval command
      # FQCN: ansible.netcommon.cli_command
      # This is a read-only operation and is natively idempotent.
      ansible.netcommon.cli_command:
        command: get system arp
      register: arp_result
      # Error Handling: Verify the command didn't return a "Command fail" or "Unknown action" string
      failed_when: 
        - arp_result.failed | default(false)
        - "'Command fail' in arp_result.stdout"

    - name: Verify ARP table data integrity
      # Observability: Ensure the output is defined and contains data.
      # This prevents downstream processing of null results in automation pipelines.
      ansible.builtin.assert:
        that:
          - arp_result.stdout is defined
          - arp_result.stdout | length > 0
        fail_msg: "Failed to retrieve a valid ARP table from {{ inventory_hostname }}."
        success_msg: "ARP table successfully captured for {{ inventory_hostname }}."

    - name: Display formatted ARP table
      # Observability: Formatted output for operator visibility and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE: {{ inventory_hostname }} =======================
          {{ arp_result.stdout }}

