---
# FortiGate HA Status Verification
# This playbook retrieves and validates High Availability (HA) status for FortiGate devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: Get and Verify HA Status
  hosts: fortigate
  gather_facts: false  # Optimized: Facts are not required for raw CLI command execution.

  tasks:
    - name: Retrieve HA status from device
      # Idempotency: 'get' commands are read-only and inherently idempotent.
      # Best Practice: Using Fully Qualified Collection Name (FQCN).
      ansible.netcommon.cli_command:
        command: get system ha status
      register: ha_result
      # Error Handling: Fail explicitly if the command returns no data or an error string.
      failed_when:
        - ha_result.stdout | length == 0
        - "'Command fail' in ha_result.stdout"
        - "'Unknown action' in ha_result.stdout"
      check_mode: false  # Ensure the command runs during --check runs to verify connectivity.

    - name: Validate HA operational state
      # Observability: Verify that the output contains expected HA metadata.
      # This ensures the device is actually part of a cluster and the output is valid.
      ansible.builtin.assert:
        that:
          - "'Mode:' in ha_result.stdout"
          - "'Group:' in ha_result.stdout"
        fail_msg: "HA status output is invalid or HA is not configured on {{ inventory_hostname }}."
        success_msg: "HA status successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display formatted HA status
      # Documentation: Providing a clear, human-readable view of the cluster state.
      ansible.builtin.debug:
        msg: |
          ======================= HA STATUS: {{ inventory_hostname }} =======================
          Reported at: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          {{ ha_result.stdout }}
