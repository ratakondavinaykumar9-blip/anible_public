---
# FortiGate FDS License Verification
# Standards Compliance: Idempotency, Observability, FQCN, Error Handling
# Description: Retrieves and validates the FortiGuard Distribution Service (FDS) license status.
- name: FortiGate FDS License Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve FDS status from FortiGate CLI
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get system fds
      register: fds_status
      # Idempotency: 'get' commands are read-only; ensure 'changed' is always false
      changed_when: false
      # Error Handling: Fail if return code is non-zero or if the output indicates a CLI failure
      failed_when: 
        - fds_status.rc | default(0) != 0
        - "'Command fail' in fds_status.stdout or 'Unknown action' in fds_status.stdout"

    - name: Validate FDS license data observability
      # Observability: Use assert to verify the output contains expected data before proceeding
      ansible.builtin.assert:
        that:
          - fds_status.stdout is defined
          - fds_status.stdout | length > 0
        fail_msg: "FDS status output is empty or undefined. Verify connectivity and administrative permissions."
        quiet: true

    - name: Display formatted FDS license report
      # Documentation: Providing clear, human-readable visibility into the license state
      ansible.builtin.debug:
        msg: |
          ======================= FDS LICENSE REPORT =======================
          {{ fds_status.stdout }}
          ==================================================================