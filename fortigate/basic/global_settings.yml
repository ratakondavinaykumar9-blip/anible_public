---
# FortiGate Global Settings Audit
# Auto-improved: 2026-04-12 12:00
# Author: NetLearner Architect (Refactored from OpenClaw base)
#
# Purpose:
# This playbook retrieves the system global configuration for auditing.
# It adheres to NetLearner standards for idempotency, observability, 
# error handling, and the use of Fully Qualified Collection Names (FQCN).
---
- name: Get and Validate Global Settings
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system global configuration via CLI
      # FQCN: Using ansible.netcommon for explicit module resolution
      ansible.netcommon.cli_command:
        command: get system global
      register: global_output
      # Error Handling: Fail if the device returns an error message or empty stdout
      failed_when:
        - global_output.stdout == ""
        - "'command parse error' in global_output.stdout | lower"
        - "'Unknown action' in global_output.stdout"

    - name: Verify configuration retrieval integrity
      # Observability: Assert that the output is populated and contains expected keys
      # This ensures the playbook doesn't silently pass with invalid data.
      ansible.builtin.assert:
        that:
          - global_output.stdout is defined
          - global_output.stdout | length > 0
          - "'hostname' in global_output.stdout or 'admintimeout' in global_output.stdout"
        fail_msg: "Validation Failed: The retrieved output is empty or does not contain valid global configuration."
        success_msg: "Validation Passed: Global settings retrieved and verified successfully."

    - name: Display formatted global settings
      # Documentation: Provides a clear visual boundary for audit logs and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= GLOBAL SETTINGS =======================
          {{ global_output.stdout }}
