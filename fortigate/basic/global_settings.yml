---
# FortiGate Global Settings Audit
# Author: NetLearner Architect (AI Improved)
# Purpose: Safely retrieves and validates global system settings for auditing purposes.
# This playbook adheres to Idempotency, Observability, and FQCN standards.

- name: Get Global Settings
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve global system configuration
      # Standard 5: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get system global
      register: global_output
      # Standard 1: Command is read-only; changed_when: false maintains idempotency report integrity
      changed_when: false
      # Standard 4: Error Handling - fail if return code is non-zero or specific error strings appear
      failed_when:
        - global_output.rc != 0
        - "'Unknown action' in global_output.stdout"
        - "'Command fail' in global_output.stdout"

    - name: Validate retrieval and data integrity
      # Standard 2: Observability - use assert to verify that output contains expected global markers
      ansible.builtin.assert:
        that:
          - "global_output.stdout is defined"
          - "global_output.stdout | length > 0"
          - "'hostname' in global_output.stdout"
        fail_msg: "Global settings retrieval failed or returned unexpected content for {{ inventory_hostname }}."
        success_msg: "Global settings successfully validated for {{ inventory_hostname }}."

    - name: Display formatted global settings
      # Standard 3: Clear documentation of the "why" via debug messaging
      ansible.builtin.debug:
        msg: |
          ======================= GLOBAL SETTINGS: {{ inventory_hostname }} =======================
          Report generated on: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          -----------------------------------------------------------------------------------------
          {{ global_output.stdout }}