---
# FortiGate Global Settings - Optimized for Idempotency, Observability, and Best Practices
# This playbook retrieves the global system configuration from FortiGate devices.
# It ensures high reliability through explicit validation and error handling.
- name: Get Global Settings
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system global configuration
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      # Documentation: This module interacts with the FortiOS CLI to fetch current state
      ansible.netcommon.cli_command:
        command: get system global
      register: global_output
      # Idempotency: Marking as 'changed: false' because this is a read-only retrieval
      changed_when: false
      # Error Handling: Explicitly fail if the command returns an error string or empty output
      failed_when: 
        - global_output.stdout is not defined or global_output.stdout | length == 0
        - "'error' in global_output.stdout | lower or 'unknown' in global_output.stdout | lower"

    - name: Validate configuration retrieval
      # Observability: Asserting that the data exists to ensure subsequent tasks have valid context
      ansible.builtin.assert:
        that:
          - global_output.stdout is defined
          - global_output.stdout | length > 0
        fail_msg: "Data retrieval failed: The 'get system global' command returned no data."
        success_msg: "Data retrieval successful: Global settings captured."

    - name: Display formatted global settings
      # Documentation: Presenting the output in a readable format for the operator
      ansible.builtin.debug:
        msg: |
          ======================= GLOBAL SETTINGS =======================
          {{ global_output.stdout }}