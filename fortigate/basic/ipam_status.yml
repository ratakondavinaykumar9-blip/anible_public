# NetLearner Architect - FortiGate IPAM Status Verification
# This playbook retrieves the IP Address Management (IPAM) status from FortiGate devices.
# It adheres to enterprise standards for idempotency, observability, and robust error handling.

- name: Get IPAM Status
  hosts: fortigate
  gather_facts: false # Optimization: Standard Linux fact gathering is not applicable to FortiOS CLI operations.

  tasks:
    - name: Execute IPAM status retrieval command
      # FQCN: Using fully qualified collection names ensures compatibility and prevents module naming conflicts.
      ansible.netcommon.cli_command:
        command: get system ipam
      register: ipam_result
      # IDEMPOTENCY: Read-only 'get' commands must be marked as 'changed_when: false' to ensure 
      # the playbook report accurately reflects that no state changes occurred on the device.
      changed_when: false
      # ERROR HANDLING: Validates that the command was recognized by the OS and did not return 
      # an "Unknown" error string, which FortiOS often returns with a 0 exit code.
      failed_when: 
        - ipam_result.rc != 0
        - "'Unknown' in ipam_result.stdout"

    - name: Validate IPAM response integrity
      # OBSERVABILITY: Asserting that the output is non-empty provides immediate feedback 
      # if the management plane returns null data, preventing silent failures in the pipeline.
      ansible.builtin.assert:
        that:
          - ipam_result.stdout is defined
          - ipam_result.stdout | length > 0
        fail_msg: "The IPAM status command returned an empty or invalid response from {{ inventory_hostname }}."
        success_msg: "IPAM status successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display formatted IPAM status
      # DOCUMENTATION: Providing structured output for audit logs to assist network engineers 
      # in verifying the current operational state of the IPAM service.
      ansible.builtin.debug:
        msg: |
          ======================= IPAM STATUS: {{ inventory_hostname }} =======================
          {{ ipam_result.stdout }}

---