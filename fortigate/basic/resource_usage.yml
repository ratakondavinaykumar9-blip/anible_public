---
# FortiGate Resource Usage - Improved for industry standards
# This playbook retrieves and validates system resource statistics for operational monitoring.
# Standards Applied: Idempotency (Read-only), Observability (Assert), Documentation, Error Handling, FQCN.
- name: Get FortiGate Resource Usage
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system resource usage statistics
      # Using FQCN for network command execution. 
      # Diagnostic commands are read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: diagnose system resource usage
      register: resource_output
      # Error Handling: Ensure we capture failure if the command is unrecognized or connection fails.
      failed_when: 
        - resource_output.failed | default(false)
        - "'Command fail' in resource_output.stdout"

    - name: Validate captured resource data
      # Observability: Assert ensures the output contains expected performance metrics (CPU/Load).
      ansible.builtin.assert:
        that:
          - resource_output.stdout is defined
          - resource_output.stdout | length > 0
          - "'CPU' in resource_output.stdout or 'load' in resource_output.stdout | lower"
        fail_msg: "Resource usage data is empty or malformed. Check device state."
        success_msg: "Resource usage data successfully retrieved and verified."

    - name: Display Resource Usage Report
      # Formatted output for clear observability in the Ansible controller logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE RESOURCE USAGE =======================
          Host: {{ inventory_hostname }}
          
          {{ resource_output.stdout }}
          ========================================================================