---
# FortiGate Resource Usage - Production Grade
# This playbook retrieves system performance statistics (CPU/Memory) from FortiGate firewalls.
# Standard: Idempotency is maintained as this is a read-only diagnostic operation.
- name: Get FortiGate Resource Usage
  hosts: fortigate
  gather_facts: false # Optimization: Device facts are not required for this diagnostic task

  tasks:
    - name: Execute diagnostic command on FortiGate
      # FQCN (Fully Qualified Collection Name) used to ensure module resolution across various execution environments.
      ansible.netcommon.cli_command:
        command: diagnose system resource usage
      register: resource_output
      # Error Handling: Explicitly fail if the output is empty, indicating a potential connectivity or privilege issue.
      failed_when: resource_output.stdout | length == 0

    - name: Verify diagnostic data integrity
      # Observability: Validate that the output contains expected performance metrics before displaying.
      ansible.builtin.assert:
        that:
          - "resource_output.stdout is defined"
          - "'CPU' in resource_output.stdout"
        fail_msg: "The diagnostic output did not contain expected resource data."
        success_msg: "Diagnostic data successfully captured and validated."

    - name: Display Resource Usage Summary
      ansible.builtin.debug:
        msg: |
          ======================= RESOURCE USAGE ({{ inventory_hostname }}) =======================
          {{ resource_output.stdout }}