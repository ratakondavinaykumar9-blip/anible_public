---
# NetLearner Staging: FortiGate Resource Monitoring
# Purpose: This playbook retrieves real-time CPU and Memory statistics from FortiGate devices.
# Why: It provides critical observability for network health checks and automated performance monitoring.

- name: Monitor FortiGate Resource Usage
  hosts: fortigate
  gather_facts: false # Disabling fact gathering for faster execution; facts are not needed for diagnostic CLI commands.

  tasks:
    - name: Execute resource usage diagnostic command
      # Why: 'diagnose system resource usage' is the standard FortiOS CLI command for per-process monitoring.
      # FQCN: Using 'ansible.netcommon.cli_command' to ensure compatibility with network-agnostic transport layers.
      ansible.netcommon.cli_command:
        command: diagnose system resource usage
      register: resource_raw
      # Why: Explicitly fail if the output is empty or if the FortiGate returns a CLI-level error string.
      failed_when:
        - resource_raw.stdout | length == 0
        - "'Command fail' in resource_raw.stdout"
        - "'Unknown command' in resource_raw.stdout"

    - name: Verify resource report integrity
      # Why: Assertions provide a validation gate to ensure the output contains expected data patterns (CPU/Memory).
      # This ensures downstream automation does not process malformed or incomplete diagnostic data.
      ansible.builtin.assert:
        that:
          - "'CPU' in resource_raw.stdout"
          - "'Memory' in resource_raw.stdout"
        fail_msg: "The diagnostic output is malformed or missing expected resource statistics (CPU/Memory)."
        quiet: true

    - name: Display formatted resource snapshot
      # Why: Provides clear operational visibility of the system state in the Ansible controller's console and logs.
      ansible.builtin.debug:
        msg: |
          ========================= FORTIGATE RESOURCE USAGE =========================
          DEVICE: {{ inventory_hostname }}
          
          {{ resource_raw.stdout }}
          ============================================================================
