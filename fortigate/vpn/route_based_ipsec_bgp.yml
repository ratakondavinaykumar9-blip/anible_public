---
- name: Deploy Route-Based IPsec VPN with BGP on FortiGate
  hosts: fortigates
  connection: httpapi
  gather_facts: false
  vars:
    # VDOM context (default is root). Virtual Domains allow for logical separation of traffic.
    vdom: "root"
    
    # Phase 1 Parameters: Defines the IKE negotiation and the Virtual Tunnel Interface (VTI).
    vpn_p1_name: "VPN_TO_REMOTE_SITE"
    wan_interface: "wan1"
    remote_gateway: ""
    pre_shared_key: ""
    ike_version: "2"
    p1_proposal: "aes256-sha256"
    
    # Phase 2 Parameters: Defines the IPsec security association (SA) and encryption.
    vpn_p2_name: "VPN_TO_REMOTE_SITE_P2"
    p2_proposal: "aes256-sha256"
    
    # Tunnel Interface IP Configuration
    # Using /30 for point-to-point peering. Format: "ip mask"
    tunnel_local_ip: "169.254.100.1 255.255.255.252"
    tunnel_remote_ip: "169.254.100.2 255.255.255.252"
    
    # BGP Configuration: Dynamic routing ensures automatic failover and prefix exchange.
    local_as: 65000
    remote_as: 65001
    neighbor_ip: "169.254.100.2"
    
    # Security Policy Parameters: Mandatory for traffic to pass through the tunnel.
    internal_interface: "port1"
    source_address: "all"
    destination_address: "all"

  tasks:
    - name: VPN and BGP Deployment Orchestration
      block:
        - name: VPN Phase 1 - Create Virtual Tunnel Interface (VTI)
          fortinet.fortios.fortios_vpn_ipsec_phase1_interface:
            vdom: "{{ vdom }}"
            state: "present"
            vpn_ipsec_phase1_interface:
              name: "{{ vpn_p1_name }}"
              interface: "{{ wan_interface }}"
              remote_gw: "{{ remote_gateway }}"
              psksecret: "{{ pre_shared_key }}"
              ikevers: "{{ ike_version }}"
              proposal: "{{ p1_proposal }}"
              # disable add_route: BGP will manage the routing table dynamically.
              add_route: "disable"
              keylife: 28800
              dpd: "on-idle"
          register: p1_result

        - name: Verify Phase 1 Configuration Success
          ansible.builtin.assert:
            that:
              - p1_result.failed == false
              - p1_result.http_status == 200
            msg: "Phase 1 / VTI creation failed or returned an unexpected status."

        - name: VPN Phase 2 - Link to Phase 1 Interface
          fortinet.fortios.fortios_vpn_ipsec_phase2_interface:
            vdom: "{{ vdom }}"
            state: "present"
            vpn_ipsec_phase2_interface:
              name: "{{ vpn_p2_name }}"
              p1name: "{{ vpn_p1_name }}"
              proposal: "{{ p2_proposal }}"
              keylifeseconds: 3600
              pfs: "enable"
          register: p2_result

        - name: Verify Phase 2 Configuration Success
          ansible.builtin.assert:
            that:
              - p2_result.failed == false
              - p2_result.http_status == 200
            msg: "Phase 2 tunnel link creation failed."

        - name: Interface - Assign IP and Remote-IP for BGP Peering
          # FortiOS requires remote-ip on tunnel interfaces for point-to-point BGP peering.
          fortinet.fortios.fortios_system_interface:
            vdom: "{{ vdom }}"
            state: "present"
            system_interface:
              name: "{{ vpn_p1_name }}"
              ip: "{{ tunnel_local_ip }}"
              remote_ip: "{{ tunnel_remote_ip }}"
              allowaccess: "ping"
          register: intf_result

        - name: Verify Tunnel Interface IP Configuration
          ansible.builtin.assert:
            that:
              - intf_result.failed == false
            msg: "Failed to assign IP addresses to the VPN interface."

        - name: Router BGP - Configure Local Process and Neighbor
          fortinet.fortios.fortios_router_bgp:
            vdom: "{{ vdom }}"
            state: "present"
            router_bgp:
              as: "{{ local_as }}"
              router_id: "{{ tunnel_local_ip.split(' ')[0] }}"
              neighbor:
                - ip: "{{ neighbor_ip }}"
                  remote_as: "{{ remote_as }}"
                  interface: "{{ vpn_p1_name }}"
                  # Graceful restart and soft-reconfig improve stability and troubleshooting.
                  capability_graceful_restart: "enable"
                  soft_reconfiguration: "enable"
          register: bgp_result

        - name: Verify BGP Configuration
          ansible.builtin.assert:
            that:
              - bgp_result.failed == false
            msg: "BGP neighbor or process configuration failed."

        - name: Policy - Outbound Traffic (Internal to Tunnel)
          fortinet.fortios.fortios_firewall_policy:
            vdom: "{{ vdom }}"
            state: "present"
            firewall_policy:
              name: "OUT_{{ vpn_p1_name }}"
              srcintf: [{ name: "{{ internal_interface }}" }]
              dstintf: [{ name: "{{ vpn_p1_name }}" }]
              srcaddr: [{ name: "{{ source_address }}" }]
              dstaddr: [{ name: "{{ destination_address }}" }]
              action: "accept"
              schedule: "always"
              service: [{ name: "ALL" }]
          register: pol_out_result

        - name: Policy - Inbound Traffic (Tunnel to Internal)
          fortinet.fortios.fortios_firewall_policy:
            vdom: "{{ vdom }}"
            state: "present"
            firewall_policy:
              name: "IN_{{ vpn_p1_name }}"
              srcintf: [{ name: "{{ vpn_p1_name }}" }]
              dstintf: [{ name: "{{ internal_interface }}" }]
              srcaddr: [{ name: "{{ source_address }}" }]
              dstaddr: [{ name: "{{ destination_address }}" }]
              action: "accept"
              schedule: "always"
              service: [{ name: "ALL" }]
          register: pol_in_result

        - name: Verify Security Policies
          ansible.builtin.assert:
            that:
              - pol_out_result.failed == false
              - pol_in_result.failed == false
            msg: "Firewall policies for VPN traffic were not applied correctly."

      rescue:
        - name: Error Reporting - Config Rollback Notification
          ansible.builtin.fail:
            msg: |
              CRITICAL FAILURE: FortiGate VPN/BGP provisioning interrupted.
              Diagnostic Steps:
              1. Validate WAN Interface '{{ wan_interface }}' connectivity to '{{ remote_gateway }}'.
              2. Ensure Pre-Shared Key (PSK) matches the remote peer.
              3. Verify BGP Neighbor IP '{{ neighbor_ip }}' is reachable over the tunnel.
              Technical Error: {{ ansible_failed_result }}

      always:
        - name: Finalization - Log Deployment Attempt
          ansible.builtin.debug:
            msg: "Deployment sequence for {{ vpn_p1_name }} finalized. Run 'get vpn tunnel list' or 'get router info bgp summary' on the device for runtime verification."