---
- name: Deploy Route-Based IPsec VPN with BGP on FortiGate
  hosts: fortigates
  connection: fortinet.fortios.httpapi
  gather_facts: false
  vars:
    # VDOM context - Required for multi-VDOM environments to ensure correct targeting
    vdom: "root"
    
    # Phase 1 Parameters - VTI (Virtual Tunnel Interface) definitions
    vpn_p1_name: "VPN_TO_REMOTE_SITE"
    wan_interface: "wan1"
    remote_gateway: ""
    pre_shared_key: ""
    ike_version: "2"
    p1_proposal: "aes256-sha256"
    
    # Phase 2 Parameters - Encapsulation and PFS settings
    vpn_p2_name: "VPN_TO_REMOTE_SITE_P2"
    p2_proposal: "aes256-sha256"
    
    # Tunnel Interface IP Configuration - Required for BGP Peering (Point-to-Point)
    tunnel_local_ip: "169.254.100.1 255.255.255.252"
    tunnel_remote_ip: "169.254.100.2 255.255.255.252"
    
    # BGP Configuration - Dynamic routing handles failover and prefix advertisement
    local_as: 65000
    remote_as: 65001
    neighbor_ip: "169.254.100.2"
    
    # Security Policy Parameters - Defines the scope of allowed traffic
    internal_interface: "port1"
    source_address: "all"
    destination_address: "all"

  tasks:
    - name: VPN and BGP Deployment Orchestration
      block:
        - name: VPN Phase 1 - Create Virtual Tunnel Interface (VTI)
          fortinet.fortios.fortios_vpn_ipsec_phase1_interface:
            vdom: "{{ vdom }}"
            state: "present"
            vpn_ipsec_phase1_interface:
              name: "{{ vpn_p1_name }}"
              interface: "{{ wan_interface }}"
              remote_gw: "{{ remote_gateway }}"
              psksecret: "{{ pre_shared_key }}"
              ikevers: "{{ ike_version }}"
              proposal: "{{ p1_proposal }}"
              # Why: BGP will manage the routing table; 'disable' prevents redundant static routes
              add_route: "disable"
              keylife: 28800
              dpd: "on-idle"
          register: vpn_p1_res

        - name: Observability - Verify Phase 1 VTI State
          ansible.builtin.assert:
            that: 
              - vpn_p1_res.meta.status == 'success' or vpn_p1_res.meta.http_status == 200
            fail_msg: "VPN Phase 1 creation failed: {{ vpn_p1_res.meta.msg | default('Unknown Error') }}"

        - name: VPN Phase 2 - Link to Phase 1 Interface
          fortinet.fortios.fortios_vpn_ipsec_phase2_interface:
            vdom: "{{ vdom }}"
            state: "present"
            vpn_ipsec_phase2_interface:
              name: "{{ vpn_p2_name }}"
              p1name: "{{ vpn_p1_name }}"
              proposal: "{{ p2_proposal }}"
              keylifeseconds: 3600
              pfs: "enable"
          register: vpn_p2_res

        - name: Observability - Verify Phase 2 State
          ansible.builtin.assert:
            that: 
              - vpn_p2_res.meta.status == 'success' or vpn_p2_res.meta.http_status == 200
            fail_msg: "VPN Phase 2 creation failed: {{ vpn_p2_res.meta.msg | default('Unknown Error') }}"

        - name: Interface - Assign IP and Remote-IP for BGP Peering
          fortinet.fortios.fortios_system_interface:
            vdom: "{{ vdom }}"
            state: "present"
            system_interface:
              name: "{{ vpn_p1_name }}"
              ip: "{{ tunnel_local_ip }}"
              # Why: remote_ip is mandatory for FortiOS point-to-point tunnel peering
              remote_ip: "{{ tunnel_remote_ip }}"
              allowaccess: "ping"
          register: intf_res

        - name: Observability - Verify Tunnel Interface IP
          ansible.builtin.assert:
            that: 
              - intf_res.meta.status == 'success' or intf_res.meta.http_status == 200
            fail_msg: "Tunnel IP assignment failed: {{ intf_res.meta.msg | default('Unknown Error') }}"

        - name: Router BGP - Configure Local Process and Neighbor
          fortinet.fortios.fortios_router_bgp:
            vdom: "{{ vdom }}"
            state: "present"
            router_bgp:
              as: "{{ local_as }}"
              router_id: "{{ tunnel_local_ip.split(' ')[0] }}"
              neighbor:
                - ip: "{{ neighbor_ip }}"
                  remote_as: "{{ remote_as }}"
                  interface: "{{ vpn_p1_name }}"
                  # Why: Ensures peering stays up during process restarts (SSO/HA)
                  capability_graceful_restart: "enable"
                  soft_reconfiguration: "enable"
          register: bgp_res

        - name: Observability - Verify BGP Peering Configuration
          ansible.builtin.assert:
            that: 
              - bgp_res.meta.status == 'success' or bgp_res.meta.http_status == 200
            fail_msg: "BGP Configuration failed: {{ bgp_res.meta.msg | default('Unknown Error') }}"

        - name: Policy - Outbound Traffic (Internal to Tunnel)
          fortinet.fortios.fortios_firewall_policy:
            vdom: "{{ vdom }}"
            state: "present"
            firewall_policy:
              name: "OUT_{{ vpn_p1_name }}"
              srcintf: [{ name: "{{ internal_interface }}" }]
              dstintf: [{ name: "{{ vpn_p1_name }}" }]
              srcaddr: [{ name: "{{ source_address }}" }]
              dstaddr: [{ name: "{{ destination_address }}" }]
              action: "accept"
              schedule: "always"
              service: [{ name: "ALL" }]
          register: pol_out_res

        - name: Policy - Inbound Traffic (Tunnel to Internal)
          fortinet.fortios.fortios_firewall_policy:
            vdom: "{{ vdom }}"
            state: "present"
            firewall_policy:
              name: "IN_{{ vpn_p1_name }}"
              srcintf: [{ name: "{{ vpn_p1_name }}" }]
              dstintf: [{ name: "{{ internal_interface }}" }]
              srcaddr: [{ name: "{{ source_address }}" }]
              dstaddr: [{ name: "{{ destination_address }}" }]
              action: "accept"
              schedule: "always"
              service: [{ name: "ALL" }]
          register: pol_in_res

      rescue:
        - name: Error Reporting - Config Rollback Notification
          ansible.builtin.fail:
            msg: |
              Critical Failure during FortiGate VPN/BGP provisioning. 
              Review the following:
              1. WAN Interface '{{ wan_interface }}' reachability and MTU.
              2. PSK consistency and IKE Version mismatch with peer.
              3. BGP Peer IP '{{ neighbor_ip }}' and AS '{{ remote_as }}' validation.
              Error Details: {{ ansible_failed_result }}

      always:
        - name: Verification - Log Deployment Status
          ansible.builtin.debug:
            msg: 
              - "Deployment sequence for {{ vpn_p1_name }} finalized."
              - "Action: Run 'get vpn tunnel list' and 'get router info bgp summary' to confirm session state."
