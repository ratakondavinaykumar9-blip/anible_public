---
- name: FortiGate ADVPN Hub Configuration - Production Hardened
  hosts: fortigates
  connection: httpapi
  vars:
    # VPN Phase 1 Parameters: Dynamic type is essential for Hub role to accept spoke connections
    vpn_hub_name: "DC_ADVPN_HUB"
    vpn_p1_interface: "port1"
    vpn_psk: "ENTER_SECURE_PSK_HERE"
    ike_version: "2"
    enc_proposals: "aes256-sha256 aes128-sha1"
    dh_groups: "14 5"
    
    # VPN Overlay Parameters: Hub assigns its own IP and range for dynamic BGP peering
    vpn_overlay_ip: "10.254.0.1"
    vpn_overlay_mask: "255.255.255.0"
    vpn_overlay_range: "10.254.0.0 255.255.255.0"
    
    # BGP Parameters: iBGP used for dynamic routing within the ADVPN mesh
    bgp_as: 65001
    bgp_router_id: "10.254.0.1"
    
    # Firewall Policy ID: Hardcoded for idempotency and easier audit trails
    policy_id_hairpin: 1001

  tasks:
    - name: Deploy Production ADVPN Hub Architecture
      block:
        - name: Configure Phase 1 Interface (Dial-up Hub Role)
          fortinet.fortios.fortios_vpn_ipsec_phase1_interface:
            state: present
            vpn_ipsec_phase1_interface:
              name: "{{ vpn_hub_name }}"
              type: dynamic
              interface: "{{ vpn_p1_interface }}"
              ikevers: "{{ ike_version }}"
              peertype: any
              psksecret: "{{ vpn_psk }}"
              proposal: "{{ enc_proposals }}"
              dhgrp: "{{ dh_groups }}"
              # Why: auto_discovery_sender allows the Hub to signal shortcut possibilities to spokes
              auto_discovery_sender: enable
              auto_discovery_forwarder: enable
              # Why: net_device enables virtual sub-interfaces for per-spoke routing (Required for BGP RR)
              net_device: enable
              # Why: add_route disabled to prevent conflict with BGP-learned routes
              add_route: disable
              dpd: on_demand
              dpd_retryinterval: 5
          register: p1_config

        - name: Validate Phase 1 Configuration
          ansible.builtin.assert:
            that: 
              - p1_config.meta.status == 'success' or not p1_config.changed
            fail_msg: "Phase 1 Configuration failed on {{ inventory_hostname }}"

        - name: Configure Phase 2 Interface (Wildcard Selectors)
          fortinet.fortios.fortios_vpn_ipsec_phase2_interface:
            state: present
            vpn_ipsec_phase2_interface:
              name: "{{ vpn_hub_name }}_P2"
              phase1name: "{{ vpn_hub_name }}"
              proposal: "{{ enc_proposals }}"
              dhgrp: "{{ dh_groups }}"
              # Why: 0.0.0.0/0 selectors allow the tunnel to carry any traffic dictated by BGP
              src_subnet: "0.0.0.0 0.0.0.0"
              dst_subnet: "0.0.0.0 0.0.0.0"
              keylifeseconds: 3600
          register: p2_config

        - name: Assign IP to Tunnel Interface
          fortinet.fortios.fortios_system_interface:
            state: present
            system_interface:
              name: "{{ vpn_hub_name }}"
              ip: "{{ vpn_overlay_ip }} {{ vpn_overlay_mask }}"
              allowaccess: ping
              # Why: remote_ip provides a peering gateway for spokes within the overlay
              remote_ip: "10.254.0.254 255.255.255.0"
          register: intf_config

        - name: Enable VPN-to-VPN Hairpinning Policy
          fortinet.fortios.fortios_firewall_policy:
            state: present
            firewall_policy:
              name: "ADVPN_SPOKE_TO_SPOKE_TRANSIT"
              policyid: "{{ policy_id_hairpin }}"
              srcintf: [{ name: "{{ vpn_hub_name }}" }]
              dstintf: [{ name: "{{ vpn_hub_name }}" }]
              srcaddr: [{ name: "all" }]
              dstaddr: [{ name: "all" }]
              action: accept
              schedule: "always"
              service: [{ name: "ALL" }]
              status: enable
              # Why: Essential for spokes to communicate and negotiate shortcuts initially
              comments: "ADVPN: Allows initial transit and shortcut negotiation for spokes"
          register: policy_config

        - name: Configure BGP for Dynamic Spoke Peering
          fortinet.fortios.fortios_router_bgp:
            state: present
            router_bgp:
              as: "{{ bgp_as }}"
              router_id: "{{ bgp_router_id }}"
              neighbor_group:
                - name: "ADVPN_SPOKE_GROUP"
                  remote_as: "{{ bgp_as }}"
                  # Why: Hub acts as Route Reflector for scalability in a Hub-and-Spoke topology
                  route_reflector_client: enable
                  # Why: Ensures initial traffic transits the hub for visibility/policy control
                  next_hop_self: enable
                  capability_graceful_restart: enable
                  soft_reconfiguration: enable
              neighbor_range:
                - id: 1
                  prefix: "{{ vpn_overlay_range }}"
                  neighbor_group: "ADVPN_SPOKE_GROUP"
              network:
                - id: 1
                  prefix: "{{ vpn_overlay_ip }} {{ vpn_overlay_mask }}"
          register: bgp_config

      rescue:
        - name: Rollback/Log Deployment Failure
          ansible.builtin.debug:
            msg: |
              ADVPN Hub deployment failed. 
              Check if WAN Interface '{{ vpn_p1_interface }}' is up and Policy ID '{{ policy_id_hairpin }}' is unique.
          
        - name: Signal Playbook Failure
          ansible.builtin.fail:
            msg: "ADVPN Deployment failed on {{ inventory_hostname }}. Review register outputs for details."

      always:
        - name: Verify Configuration State via Facts
          fortinet.fortios.fortios_configuration_fact:
            selector: "vpn_ipsec_phase1_interface"
            params:
              name: "{{ vpn_hub_name }}"
          register: vpn_status
          ignore_errors: true

        - name: Final Validation Summary
          ansible.builtin.assert:
            that:
              - vpn_status.meta.results is defined
              - vpn_status.meta.results | length > 0
            msg: "Verification failed: VPN Interface {{ vpn_hub_name }} not found in running-config."
          when: vpn_status.meta is defined