---
- name: FortiGate ADVPN Hub Configuration
  hosts: fortigates
  connection: httpapi
  vars:
    # VPN Phase 1 Parameters
    vpn_hub_name: "DC_ADVPN_HUB"
    vpn_p1_interface: "port1"
    vpn_psk: "ENTER_SECURE_PSK_HERE"
    ike_version: "2"
    enc_proposals: "aes256-sha256 aes128-sha1"
    dh_groups: "14 5"
    
    # VPN Overlay Parameters
    vpn_overlay_ip: "10.254.0.1"
    vpn_overlay_mask: "255.255.255.0"
    # Range for dynamic spoke BGP peering
    vpn_overlay_range: "10.254.0.0 255.255.255.0"
    
    # BGP Parameters
    bgp_as: 65001
    bgp_router_id: "10.254.0.1"
    
    # Firewall Policy ID
    policy_id_hairpin: 1001

  tasks:
    - name: Deploy Production ADVPN Hub Architecture
      block:
        - name: Configure Phase 1 Interface (Dial-up Hub Role)
          fortinet.fortios.fortios_vpn_ipsec_phase1_interface:
            state: present
            vpn_ipsec_phase1_interface:
              name: "{{ vpn_hub_name }}"
              type: dynamic
              interface: "{{ vpn_p1_interface }}"
              ikevers: "{{ ike_version }}"
              peertype: any
              psksecret: "{{ vpn_psk }}"
              proposal: "{{ enc_proposals }}"
              dhgrp: "{{ dh_groups }}"
              # auto_discovery_sender: Enables the hub to send shortcut information to spokes
              auto_discovery_sender: enable
              # auto_discovery_forwarder: Allows the hub to forward shortcut requests between spokes
              auto_discovery_forwarder: enable
              # net_device: Creates virtual sub-interfaces for each spoke, critical for Route Reflector scalability
              net_device: enable
              # add_route: Disabled to prevent IPsec static routes from overriding BGP dynamic routes
              add_route: disable
              dpd: on_demand
              dpd_retryinterval: 5
          register: p1_result

        - name: Verify Phase 1 Idempotency and Success
          ansible.builtin.assert:
            that: 
              - p1_result.meta.status == 'success'
            fail_msg: "Phase 1 configuration failed on {{ inventory_hostname }}"

        - name: Configure Phase 2 Interface (Wildcard Selectors)
          fortinet.fortios.fortios_vpn_ipsec_phase2_interface:
            state: present
            vpn_ipsec_phase2_interface:
              name: "{{ vpn_hub_name }}_P2"
              phase1name: "{{ vpn_hub_name }}"
              proposal: "{{ enc_proposals }}"
              dhgrp: "{{ dh_groups }}"
              # Wildcard selectors allow BGP to control all routing over the IPsec tunnel
              src_subnet: "0.0.0.0 0.0.0.0"
              dst_subnet: "0.0.0.0 0.0.0.0"
              keylifeseconds: 3600
          register: p2_result

        - name: Assign IP to Tunnel Interface
          fortinet.fortios.fortios_system_interface:
            state: present
            system_interface:
              name: "{{ vpn_hub_name }}"
              ip: "{{ vpn_overlay_ip }} {{ vpn_overlay_mask }}"
              allowaccess: ping
              # remote_ip: Defines a dummy peer range for the hub's tunnel interface
              remote_ip: "10.254.0.254 255.255.255.0"
          register: intf_result

        - name: Enable VPN-to-VPN Hairpinning Policy
          fortinet.fortios.fortios_firewall_policy:
            state: present
            firewall_policy:
              name: "ADVPN_SPOKE_TO_SPOKE_TRANSIT"
              policyid: "{{ policy_id_hairpin }}"
              srcintf: [{ name: "{{ vpn_hub_name }}" }]
              dstintf: [{ name: "{{ vpn_hub_name }}" }]
              srcaddr: [{ name: "all" }]
              dstaddr: [{ name: "all" }]
              action: accept
              schedule: "always"
              service: [{ name: "ALL" }]
              # status: enable allows spokes to communicate initially to negotiate direct shortcuts
              status: enable
              comments: "Allows initial transit and shortcut negotiation for ADVPN spokes"
          register: policy_result

        - name: Configure BGP for Dynamic Spoke Peering
          fortinet.fortios.fortios_router_bgp:
            state: present
            router_bgp:
              as: "{{ bgp_as }}"
              router_id: "{{ bgp_router_id }}"
              neighbor_group:
                - name: "ADVPN_SPOKE_GROUP"
                  remote_as: "{{ bgp_as }}"
                  # route_reflector_client: Hub reflects routes between spokes so they don't need a full mesh
                  route_reflector_client: enable
                  # next_hop_self: Ensures initial spoke-to-spoke traffic transits the hub
                  next_hop_self: enable
                  capability_graceful_restart: enable
                  soft_reconfiguration: enable
              neighbor_range:
                - id: 1
                  prefix: "{{ vpn_overlay_range }}"
                  neighbor_group: "ADVPN_SPOKE_GROUP"
              network:
                - id: 1
                  prefix: "{{ vpn_overlay_ip }} {{ vpn_overlay_mask }}"
          register: bgp_result

        - name: Final Architectural Validation
          ansible.builtin.assert:
            that:
              - intf_result.meta.status == 'success'
              - bgp_result.meta.status == 'success'
            fail_msg: "Core network services failed to initialize on {{ inventory_hostname }}"

      rescue:
        - name: Critical Deployment Failure Notification
          ansible.builtin.debug:
            msg: |
              ADVPN Hub deployment failed on {{ inventory_hostname }}.
              P1 Status: {{ p1_result.meta.status | default('N/A') }}
              BGP Status: {{ bgp_result.meta.status | default('N/A') }}
              Verify WAN interface '{{ vpn_p1_interface }}' and Policy ID '{{ policy_id_hairpin }}'.

      always:
        - name: Retrieve Operational Facts for Verification
          fortinet.fortios.fortios_configuration_fact:
            selector: "vpn_ipsec_phase1_interface"
            params:
              name: "{{ vpn_hub_name }}"
          register: vpn_verify
          ignore_errors: true

        - name: Display Deployment Verification Summary
          ansible.builtin.debug:
            msg: "VPN Hub '{{ vpn_hub_name }}' is verified in the running configuration."
          when: 
            - vpn_verify.meta.results is defined 
            - vpn_verify.meta.results | length > 0
