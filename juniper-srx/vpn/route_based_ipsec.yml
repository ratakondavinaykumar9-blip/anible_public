MCP issues detected. Run /mcp list for status.---
- name: Deploy Route-Based IPsec VPN on Juniper SRX
  hosts: juniper_srx
  gather_facts: false
  connection: junipernetworks.junos.remote
  vars:
    # --- Peer Connectivity ---
    vpn_peer_name: "REMOTE_BRANCH_01"
    vpn_remote_gateway_ip: "" # MANDATORY: Provide remote peer public IP
    vpn_external_interface: "ge-0/0/0.0"
    vpn_preshared_key: "CHANGE_ME_VIA_VAULT" # SECURITY: Use Ansible Vault for production secrets
    
    # --- Tunnel Interface Configuration ---
    vpn_st0_unit: 0
    vpn_st0_ip: "" # e.g., 10.255.255.1/30
    vpn_st0_zone: "vpn"
    vpn_tcp_mss: 1350 # PERFORMANCE: Reduces fragmentation overhead for encapsulated traffic
    
    # --- Routing & Policies ---
    vpn_remote_subnets: [] # List of CIDRs to route into tunnel
    vpn_local_zone: "trust"
    
    # --- IKE Phase 1 (Gateway) ---
    ike_version: "v2"
    ike_proposal_name: "PRO_IKE_PH1"
    ike_policy_name: "POL_IKE_PH1"
    ike_gateway_name: "GW_IPSEC_PEER"
    ike_dh_group: "group14" # COMPLIANCE: Minimum DH Group 14 (2048-bit) recommended
    ike_encryption: "aes-256-cbc"
    ike_authentication: "sha-256"
    ike_lifetime: 28800
    
    # --- IPsec Phase 2 (VPN) ---
    ipsec_proposal_name: "PRO_IPSEC_PH2"
    ipsec_policy_name: "POL_IPSEC_PH2"
    ipsec_vpn_name: "VPN_TUNNEL_ST0"
    ipsec_encryption: "aes-256-gcm" # PERFORMANCE: GCM provides built-in integrity/encryption
    ipsec_authentication: "hmac-sha-256-128"
    ipsec_perfect_forward_secrecy: "group14"
    ipsec_lifetime: 3600

  tasks:
    - name: VPN Deployment Orchestration
      block:
        # 0. Pre-Flight Validation
        - name: Validate mandatory deployment variables
          ansible.builtin.assert:
            that:
              - vpn_remote_gateway_ip | length > 0
              - vpn_st0_ip | length > 0
              - vpn_remote_subnets | length > 0
            fail_msg: "Deployment aborted: Missing required variables (Gateway IP, Tunnel IP, or Remote Subnets)."

        # 1. Interface Definition (Idempotent Resource Module)
        - name: Configure st0 logical tunnel interface
          junipernetworks.junos.junos_interfaces:
            config:
              - name: "st0"
                description: "IPsec Tunnel to {{ vpn_peer_name }}"
                units:
                  - name: "{{ vpn_st0_unit }}"
                    description: "VPN Tunnel Unit {{ vpn_st0_unit }}"
            state: merged
          register: res_st0_int

        - name: Verify st0 interface configuration success
          ansible.builtin.assert:
            that: "not res_st0_int.failed"
            quiet: true

        # 2. L3 Configuration
        - name: Configure IPv4 on st0 interface
          junipernetworks.junos.junos_l3_interfaces:
            config:
              - name: "st0.{{ vpn_st0_unit }}"
                ipv4:
                  - address: "{{ vpn_st0_ip }}"
            state: merged
          register: res_st0_l3

        # 3. Security Zone Mapping (Flow Processing)
        - name: Assign st0 unit to security zone
          junipernetworks.junos.junos_security_zones:
            config:
              - name: "{{ vpn_st0_zone }}"
                interfaces:
                  - name: "st0.{{ vpn_st0_unit }}"
                    host_inbound_traffic:
                      protocols: [ "all" ]
                      services: [ "all" ]
            state: merged
          register: res_zone

        # 4. VPN Engine Configuration (Complex Hierarchy)
        - name: Configure IKE and IPsec Stack
          junipernetworks.junos.junos_config:
            update: merge
            lines:
              # IKE Proposal: Defines cryptographic strength for P1
              - "set security ike proposal {{ ike_proposal_name }} authentication-method pre-shared-keys"
              - "set security ike proposal {{ ike_proposal_name }} dh-group {{ ike_dh_group }}"
              - "set security ike proposal {{ ike_proposal_name }} authentication-algorithm {{ ike_authentication }}"
              - "set security ike proposal {{ ike_proposal_name }} encryption-algorithm {{ ike_encryption }}"
              - "set security ike proposal {{ ike_proposal_name }} lifetime-seconds {{ ike_lifetime }}"
              # IKE Policy: Links proposal to authentication secret
              - "set security ike policy {{ ike_policy_name }} proposals {{ ike_proposal_name }}"
              - "set security ike policy {{ ike_policy_name }} pre-shared-key ascii-text {{ vpn_preshared_key }}"
              # IKE Gateway: Defines the physical peer and versioning
              - "set security ike gateway {{ ike_gateway_name }} ike-policy {{ ike_policy_name }}"
              - "set security ike gateway {{ ike_gateway_name }} address {{ vpn_remote_gateway_ip }}"
              - "set security ike gateway {{ ike_gateway_name }} external-interface {{ vpn_external_interface }}"
              - "set security ike gateway {{ ike_gateway_name }} version {{ ike_version }}"
              # IPsec Proposal: Defines encryption for P2 data plane
              - "set security ipsec proposal {{ ipsec_proposal_name }} protocol esp"
              - "set security ipsec proposal {{ ipsec_proposal_name }} authentication-algorithm {{ ipsec_authentication }}"
              - "set security ipsec proposal {{ ipsec_proposal_name }} encryption-algorithm {{ ipsec_encryption }}"
              - "set security ipsec proposal {{ ipsec_proposal_name }} lifetime-seconds {{ ipsec_lifetime }}"
              # IPsec Policy: Ensures PFS for P2 re-keys
              - "set security ipsec policy {{ ipsec_policy_name }} perfect-forward-secrecy keys {{ ipsec_perfect_forward_secrecy }}"
              - "set security ipsec policy {{ ipsec_policy_name }} proposals {{ ipsec_proposal_name }}"
              # VPN Binding: Maps IKE/IPsec logic to the logical st0 interface
              - "set security ipsec vpn {{ ipsec_vpn_name }} bind-interface st0.{{ vpn_st0_unit }}"
              - "set security ipsec vpn {{ ipsec_vpn_name }} ike gateway {{ ike_gateway_name }}"
              - "set security ipsec vpn {{ ipsec_vpn_name }} ike ipsec-policy {{ ipsec_policy_name }}"
              - "set security ipsec vpn {{ ipsec_vpn_name }} establish-tunnels immediately"
              # Flow Optimization: Adjusts MSS to avoid PMTU/Blackhole issues
              - "set security flow tcp-mss ipsec-vpn mss {{ vpn_tcp_mss }}"
            comment: "Ansible: Configured Route-Based VPN for {{ vpn_peer_name }}"
          register: res_vpn_engine

        # 5. Routing Configuration
        - name: Configure static routes for remote subnets
          junipernetworks.junos.junos_static_routes:
            config:
              - destination: "{{ item }}"
                next_hop: "st0.{{ vpn_st0_unit }}"
            state: merged
          loop: "{{ vpn_remote_subnets }}"
          register: res_routes

        # 6. Security Policy Enforcement
        - name: Permit cross-zone VPN traffic
          junipernetworks.junos.junos_security_policies:
            config:
              - from_zone: "{{ vpn_local_zone }}"
                to_zone: "{{ vpn_st0_zone }}"
                policy:
                  - name: "PERMIT_LAN_TO_VPN"
                    match:
                      source_address: ["any"]
                      destination_address: ["any"]
                      application: ["any"]
                    then:
                      action: permit
              - from_zone: "{{ vpn_st0_zone }}"
                to_zone: "{{ vpn_local_zone }}"
                policy:
                  - name: "PERMIT_VPN_TO_LAN"
                    match:
                      source_address: ["any"]
                      destination_address: ["any"]
                      application: ["any"]
                    then:
                      action: permit
            state: merged
          register: res_policies

      rescue:
        - name: Rollback Configuration on Failure
          junipernetworks.junos.junos_config:
            rollback: 0
          when: res_vpn_engine is failed or res_policies is failed

        - name: Report Deployment Failure
          ansible.builtin.fail:
            msg: >
              VPN Deployment for {{ vpn_peer_name }} failed.
              The configuration has been rolled back.
              Check Gateway IP ({{ vpn_remote_gateway_ip }}) and Interface availability.

      always:
        - name: Post-Deployment Observability (Verify SAs)
          junipernetworks.junos.junos_command:
            commands:
              - "show security ike sa"
              - "show security ipsec sa"
          register: vpn_verification
          ignore_errors: true # Verification failure shouldn't crash the playbook if config was valid

    - name: Display VPN Verification Summary
      ansible.builtin.debug:
        msg:
          - "--- VPN VERIFICATION STATUS ---"
          - "{{ vpn_verification.stdout_lines if vpn_verification.stdout_lines is defined else 'No status available' }}"
---