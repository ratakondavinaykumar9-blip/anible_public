---
- name: Audit Cisco ASA/Firepower Routing Configuration
  hosts: asa_firepower
  gather_facts: false
  description: |
    This playbook performs a read-only audit of the routing table and RIB database.
    It implements NetLearner standards for observability and error handling to ensure
    network state can be verified programmatically.

  tasks:
    - name: Retrieve active routing table
      # Use FQCN for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: show route
      register: routes
      # Error Handling: Catch common ASA CLI failure patterns
      failed_when: 
        - routes.failed or "Invalid input" in routes.stdout or "Incomplete command" in routes.stdout
      changed_when: false # Idempotency: Read-only operations never change state

    - name: Retrieve routing information base (RIB) database
      ansible.netcommon.cli_command:
        command: show route database
      register: route_db
      failed_when: 
        - route_db.failed or "Invalid input" in route_db.stdout
      changed_when: false

    - name: Verify routing data integrity
      # Observability: Ensure the buffers are not empty before proceeding
      ansible.builtin.assert:
        that:
          - "routes.stdout | length > 0"
          - "route_db.stdout | length > 0"
        fail_msg: "Routing data retrieval returned an empty result from {{ inventory_hostname }}"
        success_msg: "Successfully validated routing data presence for {{ inventory_hostname }}"

    - name: Log routing state for observability
      ansible.builtin.debug:
        msg: |
          ======================================================================
          NETWORK STATE AUDIT: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================================================================
          
          ACTIVE ROUTING TABLE:
          ---------------------
          {{ routes.stdout }}
          
          RIB DATABASE ENTRIES:
          ---------------------
          {{ route_db.stdout }}
