---
# ==============================================================================
# Playbook: Get Routing Table Information
# Description: Retrieves the active Routing Table and Routing Database from 
#              Cisco ASA/Firepower devices for operational visibility.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN Usage.
# ==============================================================================
- name: Retrieve and Verify Routing Information
  hosts: asa_firepower
  gather_facts: false
  # connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve the active routing table
      # Using FQCN and marking changed_when: false to maintain idempotency/read-only status
      ansible.netcommon.cli_command:
        command: show route
      register: routes
      changed_when: false
      failed_when: 
        - routes.stdout is not defined
        - "'Invalid input' in routes.stdout"

    - name: Verify routing table output (Observability)
      # Ensures the playbook stops if data collection fails, providing clear feedback
      ansible.builtin.assert:
        that:
          - routes.stdout | length > 0
          - "'Gateway of last resort' in routes.stdout or 'Codes:' in routes.stdout"
        fail_msg: "The routing table on {{ inventory_hostname }} appears to be empty or unreachable."
        success_msg: "Routing table successfully captured for {{ inventory_hostname }}."

    - name: Retrieve the routing database (RIB)
      # Captured to see full protocol database details including inactive routes
      ansible.netcommon.cli_command:
        command: show route database
      register: route_db
      changed_when: false
      # Use ignore_errors if some older ASA versions might not support the 'database' keyword
      ignore_errors: true

    - name: Verify routing database output
      ansible.builtin.assert:
        that:
          - route_db.stdout is defined
        fail_msg: "The routing database command failed on {{ inventory_hostname }}."
      when: not route_db.failed | default(false)

    - name: Display formatted routing summary
      # Documentation via clear debug messages for network operators
      ansible.builtin.debug:
        msg: |
          ======================================================================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================================================================
          
          ACTIVE ROUTING TABLE:
          ----------------------------------------------------------------------
          {{ routes.stdout }}
          
          {% if route_db.stdout is defined %}
          ROUTING DATABASE DETAILS:
          ----------------------------------------------------------------------
          {{ route_db.stdout }}
          {% else %}
          ROUTING DATABASE: Not available or command failed.
          {% endif %}
          ======================================================================