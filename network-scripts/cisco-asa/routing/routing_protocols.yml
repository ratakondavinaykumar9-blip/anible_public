---
- name: Routing Protocols Analysis
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve active routing protocol configuration
      # Use FQCN (Best Practice). Retrieval tasks are idempotent as they do not modify the device state.
      # Output is registered to provide visibility into the command result for observability.
      ansible.netcommon.cli_command:
        command: show running-config | include router
      register: routing_info
      # Error Handling: Explicitly fail the task if the command execution encounters an error.
      failed_when: routing_info.failed

    - name: Validate command success
      # Observability: Assert that the command returned a valid response to ensure data integrity.
      ansible.builtin.assert:
        that:
          - routing_info.stdout is defined
        fail_msg: "Failed to retrieve data from {{ inventory_hostname }}. Check connectivity and credentials."
        quiet: true

    - name: Display Routing Protocol Configuration
      # Observability: Provide clear, formatted output to the console for operator review.
      ansible.builtin.debug:
        msg: |
          ======================= ROUTING PROTOCOLS: {{ inventory_hostname }} =======================
          {{ routing_info.stdout if routing_info.stdout | length > 0 else 'No active routing protocols detected.' }}