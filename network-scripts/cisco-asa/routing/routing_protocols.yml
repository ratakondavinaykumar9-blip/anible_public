---
# ARCHITECTURAL AUDIT: Routing Protocol Verification
# This playbook retrieves and validates the routing protocol configuration on ASA/Firepower devices.
# It is idempotent (read-only) and implements NetLearner observability standards.
- name: Audit Routing Protocols
  hosts: asa_firepower
  gather_facts: false # Performance optimization: device facts are not required for this audit.

  tasks:
    - name: Retrieve active routing protocol configuration from device
      # Using Fully Qualified Collection Names (FQCN) for cross-platform compatibility and long-term stability.
      ansible.netcommon.cli_command:
        command: "show running-config | include router"
      register: protocols_capture
      # Error Handling: Only fail if the command itself returns a system error, not if the output is empty.
      failed_when:
        - protocols_capture.failed | default(false)
        - "'Invalid input' in protocols_capture.stderr or 'Error' in protocols_capture.stderr"

    - name: Assert successful data capture for architectural observability
      # Observability: Validating that the captured object exists and is usable for downstream reporting.
      ansible.builtin.assert:
        that:
          - protocols_capture.stdout is defined
        fail_msg: "Critical: Failed to retrieve routing configuration from {{ inventory_hostname }}."
        success_msg: "Success: Routing configuration successfully retrieved from {{ inventory_hostname }}."

    - name: Display routing protocol status report
      # Providing a clean, human-readable summary that accounts for empty configurations.
      ansible.builtin.debug:
        msg: |
          ======================= ROUTING PROTOCOLS: {{ inventory_hostname }} =======================
          {{ protocols_capture.stdout if protocols_capture.stdout | trim | length > 0 else 'STATUS: No active routing protocols detected.' }}
