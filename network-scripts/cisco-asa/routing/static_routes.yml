---
# Playbook: Get and Verify ASA/Firepower Static Routes
# Purpose: Retrieves the current static routing table and validates the output.
# Standards: Idempotency, Observability, FQCN, Error Handling.
- name: Get Static Routes
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get static routes from device
      # Use Fully Qualified Collection Name (FQCN) for cross-platform compatibility
      ansible.netcommon.cli_command:
        command: show route static
      register: static_routes
      # Error Handling: Fail if the command execution itself returns an error
      failed_when: static_routes.failed == true

    - name: Verify static route output integrity
      # Observability: Ensure the output is defined and contains expected routing data
      # Note: Idempotency is maintained as this is a read-only operation.
      ansible.builtin.assert:
        that:
          - static_routes.stdout is defined
          - static_routes.stdout | length > 0
        fail_msg: "The static route output is empty or the command failed."
        quiet: true

    - name: Display formatted static routes
      # Documentation: Presenting the operational state for audit/logs
      ansible.builtin.debug:
        msg: |
          ======================= STATIC ROUTES =======================
          {{ static_routes.stdout }}