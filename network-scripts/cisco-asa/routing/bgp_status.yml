# NetLearner Architect - BGP Status Audit Playbook
# Purpose: Retrieves and validates BGP neighbor status on ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get BGP Status
  hosts: asa_firepower
  gather_facts: false # Performance: ASA facts are not required for this operation.

  tasks:
    - name: "BGP | Retrieve BGP summary information"
      ansible.netcommon.cli_command:
        command: "show bgp summary"
      register: bgp_output
      # Error Handling: Fail if the command is unrecognized, BGP is not configured, or connection fails.
      failed_when: 
        - bgp_output.failed
        - "'Invalid input' in bgp_output.stdout"
        - "'BGP not enabled' in bgp_output.stdout"

    - name: "BGP | Validate BGP output integrity"
      ansible.builtin.assert:
        that:
          - "bgp_output.stdout is defined"
          - "bgp_output.stdout | length > 0"
          - "'BGP' in bgp_output.stdout"
        fail_msg: "BGP summary output is empty or malformed. Ensure BGP is configured on {{ inventory_hostname }}."
        success_msg: "BGP summary successfully retrieved and validated."

    - name: "BGP | Display BGP Neighbor Status"
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS: {{ inventory_hostname }} =======================
          {{ bgp_output.stdout }}
          ==========================================================