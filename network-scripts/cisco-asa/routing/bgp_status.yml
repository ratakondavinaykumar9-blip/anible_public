---
# Standard:ized Playbook: ASA BGP Status Verification
# This playbook retrieves and validates BGP summary information from Cisco ASA/Firepower devices.
- name: Get BGP Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve BGP summary from device
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interactions
      ansible.netcommon.cli_command:
        command: show bgp summary
      register: bgp_result
      # Error Handling: Fail if the command is unrecognized or the device returns an error string.
      # We allow "BGP not active" as it is a valid operational state to report.
      failed_when:
        - bgp_result.stdout is not defined
        - "'Invalid input' in bgp_result.stdout"
        - "'% ERROR' in bgp_result.stdout"
      # Idempotency: This is a read-only 'show' command, ensuring the playbook is safe to run repeatedly.

    - name: Validate BGP summary output integrity
      # Observability: Use assert to verify that we received a non-empty response from the control plane.
      ansible.builtin.assert:
        that:
          - bgp_result.stdout is defined
          - bgp_result.stdout | length > 0
        fail_msg: "BGP status retrieval failed: Received empty or undefined output from {{ inventory_hostname }}."
        success_msg: "BGP status successfully captured from {{ inventory_hostname }}."

    - name: Display formatted BGP status report
      # Documentation: Provide a clean, human-readable terminal output for network operators.
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS REPORT =======================
          DEVICE: {{ inventory_hostname }}
          ------------------------------------------------------------------
          {{ bgp_result.stdout }}
          ==================================================================