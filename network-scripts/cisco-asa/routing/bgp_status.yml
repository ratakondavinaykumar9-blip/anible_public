---
# NetLearner Architect Improved BGP Status Playbook
# Purpose: This playbook retrieves and validates BGP routing status on Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert/Register), FQCN usage, and Robust Error Handling.

- name: Retrieve BGP Operational Status
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: "OPERATIONAL: Execute BGP summary command"
      # Using FQCN (Fully Qualified Collection Name) for cross-platform consistency.
      # This task is read-only and thus naturally idempotent.
      ansible.netcommon.cli_command:
        command: show bgp summary
      register: bgp_summary_result
      # Define explicit failure conditions to catch unconfigured BGP or syntax issues.
      failed_when:
        - bgp_summary_result.stdout is not defined
        - "('Invalid' in bgp_summary_result.stdout) or ('BGP not enabled' in bgp_summary_result.stdout)"

    - name: "OBSERVABILITY: Assert BGP summary data integrity"
      # Verifies that the output contains expected data before proceeding.
      ansible.builtin.assert:
        that:
          - bgp_summary_result.stdout | length > 0
          - "'BGP router identifier' in bgp_summary_result.stdout"
        fail_msg: "BGP is either not configured or not returning valid summary data on {{ inventory_hostname }}."
        success_msg: "BGP summary successfully validated for {{ inventory_hostname }}."

    - name: "VISIBILITY: Display BGP Status"
      # Provides clear, formatted output for operator review.
      ansible.builtin.debug:
        msg: |
          ==========================================================
          BGP OPERATIONAL STATUS: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ==========================================================
          {{ bgp_summary_result.stdout }}
          ==========================================================