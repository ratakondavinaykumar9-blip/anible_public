---
- name: EIGRP Status Verification
  hosts: asa_firepower
  gather_facts: false
  # This playbook performs a read-only operation, making it inherently idempotent.
  # It retrieves and verifies the status of EIGRP neighbors on Cisco ASA/FTD devices.

  tasks:
    - name: Retrieve EIGRP neighbor status from the device
      # Using FQCN for network command execution to ensure long-term compatibility
      ansible.netcommon.cli_command:
        command: show eigrp neighbors
      register: eigrp_status
      # Error Handling: Ensure the task fails only on actual communication or execution errors.
      failed_when: eigrp_status.failed

    - name: Verify that the EIGRP status was successfully registered
      # Observability: Assert that the output is defined to ensure the command returned data
      ansible.builtin.assert:
        that:
          - "eigrp_status.stdout is defined"
        fail_msg: "EIGRP status retrieval failed; stdout is undefined."
        quiet: true

    - name: Display formatted EIGRP neighbor information
      # Documentation: Provide clear, human-readable visibility into the routing protocol state
      ansible.builtin.debug:
        msg: |
          ======================= EIGRP NEIGHBORS =======================
          {{ eigrp_status.stdout | default('No EIGRP neighbors found or output empty.') }}
          ===============================================================