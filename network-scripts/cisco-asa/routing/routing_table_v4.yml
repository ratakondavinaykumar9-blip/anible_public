---
# Playbook: IPv4 Routing Table Audit
# Purpose: Retrieves and validates the IPv4 routing table for ASA/Firepower devices.
# This playbook is idempotent as it performs read-only state inspection.
- name: IPv4 Routing Table Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve the current IPv4 routing table
      # Using FQCN (Fully Qualified Collection Name) for predictable module resolution.
      # The output is registered to enable observability and automated validation.
      ansible.netcommon.cli_command:
        command: show route ipv4
      register: routing_table_output
      # Error Handling: Ensure the task fails if the device rejects the command 
      # or if the execution encounters a transport error.
      failed_when: 
        - routing_table_output.failed or 'Invalid input' in routing_table_output.stdout

    - name: Validate routing information retrieval
      # Assertions ensure the playbook provides a definitive success/fail signal.
      # This verifies that the retrieved data is present and non-empty.
      ansible.builtin.assert:
        that:
          - routing_table_output.stdout is defined
          - routing_table_output.stdout | length > 0
        fail_msg: "Critical: IPv4 routing table retrieval failed or returned no data."
        success_msg: "Successfully captured IPv4 routing table for audit."

    - name: Display captured IPv4 routing information
      # Debug output provides human-readable visibility into the operational state.
      ansible.builtin.debug:
        msg: |
          ======================= IPv4 ROUTES =======================
          {{ routing_table_output.stdout }}