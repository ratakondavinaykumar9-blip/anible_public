# NetLearner Staging: Network Routing Audit
# Purpose: This playbook retrieves and validates the IPv4 routing table from Cisco ASA/Firepower devices.
# Idempotency: Maintained through read-only CLI operations which do not modify device state.
- name: Retrieve and Validate IPv4 Routing Table
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve IPv4 routing table via CLI
      # Use FQCN for standard network command execution across vendors
      ansible.netcommon.cli_command:
        command: show route ipv4
      register: v4_route_result
      # Error Handling: Fail if the device returns common CLI error patterns
      failed_when:
        - v4_route_result.failed
        - "'Invalid' in v4_route_result.stdout or 'Usage' in v4_route_result.stdout"

    - name: Verify routing table content and observability
      # Observability: Assert that the output contains expected routing data structures
      ansible.builtin.assert:
        that:
          - v4_route_result.stdout | length > 0
          - "'Gateway of last resort' in v4_route_result.stdout"
        fail_msg: "Routing table retrieval failed or returned empty data."
        success_msg: "IPv4 routing table successfully retrieved and validated."

    - name: Display formatted IPv4 Routing Table
      # Provides operator-level visibility into the gathered state
      ansible.builtin.debug:
        msg: |
          ======================= IPv4 ROUTES =======================
          {{ v4_route_result.stdout }}