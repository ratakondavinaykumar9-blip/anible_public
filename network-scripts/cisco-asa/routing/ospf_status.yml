---
# Playbook: Get and Validate OSPF Operational Status
# Why: Essential for verifying routing convergence and link-state database consistency across the ASA/Firepower fabric.
- name: Get OSPF Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get OSPF neighbors
      # Why: To verify adjacency state with peer routers.
      # Idempotency: Safe read-only operation.
      ansible.netcommon.cli_command:
        command: show ospf neighbor
      register: ospf_neighbor_result
      # Error Handling: Fail only on actual execution errors or invalid command syntax.
      failed_when: 
        - ospf_neighbor_result.failed
        - "'Invalid' in ospf_neighbor_result.stderr or 'error' in ospf_neighbor_result.stderr"

    - name: Verify OSPF neighbor command observability
      # Why: Ensure the task returned expected data structures for downstream processing and verify connectivity.
      ansible.builtin.assert:
        that:
          - "ospf_neighbor_result.stdout is defined"
        fail_msg: "OSPF neighbor output is missing for {{ inventory_hostname }}"
        quiet: true

    - name: Get OSPF database
      # Why: To audit the Link State Advertisements (LSAs) and ensure database synchronization across the area.
      ansible.netcommon.cli_command:
        command: show ospf database
      register: ospf_db_result
      failed_when: 
        - ospf_db_result.failed
        - "'Invalid' in ospf_db_result.stderr or 'error' in ospf_db_result.stderr"

    - name: Verify OSPF database observability
      # Why: Confirm the OSPF process is active and maintaining a valid link-state topology table.
      ansible.builtin.assert:
        that:
          - "ospf_db_result.stdout is defined"
        fail_msg: "OSPF database output is missing for {{ inventory_hostname }}"
        quiet: true

    - name: Display OSPF Operational Summary
      # Why: Provides a consolidated view for the network architect during automated audits or manual troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= OSPF NEIGHBOR STATUS =======================
          {{ ospf_neighbor_result.stdout | default('No OSPF neighbors found.') }}

          ======================= OSPF DATABASE SUMMARY =======================
          {{ ospf_db_result.stdout | default('No OSPF database entries found.') }}
