---
# NetLearner Architect Improved Playbook
# Purpose: Audit and verify IPv6 routing state on Cisco ASA/Firepower devices.
# Standards: FQCN, Idempotency, Observability, Error Handling.

- name: Audit IPv6 Routing Table
  hosts: asa_firepower
  gather_facts: false # Performance: Fact gathering is disabled as it's not required for this audit.

  tasks:
    - name: Retrieve IPv6 routing table from device
      # FQCN used for long-term maintainability and to avoid module name conflicts.
      ansible.netcommon.cli_command:
        command: show route ipv6
      register: ipv6_route_output
      # Error Handling: Explicitly fail if the CLI returns an error message or fails to execute.
      failed_when: 
        - ipv6_route_output.failed
        - "'Invalid input' in ipv6_route_output.stdout or 'Usage' in ipv6_route_output.stdout"

    - name: Verify routing table retrieval success
      # Observability: Use assertions to validate that we received a non-empty response from the control plane.
      ansible.builtin.assert:
        that:
          - ipv6_route_output.stdout is defined
          - ipv6_route_output.stdout | length > 0
        fail_msg: "Data integrity check failed: IPv6 routing table is empty or could not be read."
        success_msg: "Data integrity check passed: IPv6 routing information successfully captured."

    - name: Display formatted IPv6 routing table
      # Documentation: Providing a clear, human-readable view of the operational state for audit trails.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          TARGET DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================= IPv6 ROUTES =======================
          {{ ipv6_route_output.stdout }}
          ===========================================================