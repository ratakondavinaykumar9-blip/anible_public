---
# NAT Control Status Verification
# This playbook retrieves and validates the NAT control status on Cisco ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (register/assert), FQCN, and Error Handling.

- name: NAT Control Verification
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT control configuration from the device
      # Use FQCN for reliability; changed_when: false ensures idempotency for read operations
      ansible.netcommon.cli_command:
        command: show nat-control
      register: nat_control_output
      # Idempotency: Read-only operations must not trigger a change state in Ansible
      changed_when: false
      # Error Handling: Fail if the command is unrecognized or the device returns an error string
      failed_when:
        - nat_control_output.failed
        - "'Invalid input' in nat_control_output.stdout"

    - name: Validate that NAT control information was successfully retrieved
      # Observability: Assert that the output is defined and contains data
      ansible.builtin.assert:
        that:
          - "nat_control_output.stdout is defined"
          - "nat_control_output.stdout | length > 0"
        fail_msg: "Failed to retrieve NAT control status or the output was empty."
        success_msg: "Successfully retrieved NAT control status."

    - name: Display NAT control status for visibility
      # Observability: Log the exact status for administrative review and audit trails
      ansible.builtin.debug:
        msg: "Current NAT Control Status: {{ nat_control_output.stdout }}"