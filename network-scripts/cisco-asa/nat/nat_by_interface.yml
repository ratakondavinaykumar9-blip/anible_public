---
# Playbook: Get NAT by Interface
# Purpose: Retrieves and validates NAT configuration from Cisco ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (asserts), Documentation, Error Handling, FQCN.

- name: Retrieve and Validate NAT by Interface
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show nat interface' on target device
      # FQCN: ansible.netcommon.cli_command
      # Idempotency: Read-only operational commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: show nat interface
      register: nat_intf
      # Error Handling: Explicitly catch common CLI error strings that might not trigger a module failure.
      failed_when:
        - nat_intf.failed or 'Invalid input' in nat_intf.stdout

    - name: Verify observability of NAT data
      # Observability: Assert that the command returned data to ensure the operation was functionally successful.
      ansible.builtin.assert:
        that:
          - nat_intf.stdout is defined
          - nat_intf.stdout | length > 0
        fail_msg: "The NAT interface output is empty or undefined. Verify device configuration."
        success_msg: "Successfully retrieved and validated NAT interface configuration."

    - name: Display formatted NAT configuration
      # Observability: Provides human-readable output for log verification and real-time monitoring.
      ansible.builtin.debug:
        msg: |
          ======================= NAT BY INTERFACE =======================
          {{ nat_intf.stdout }}
