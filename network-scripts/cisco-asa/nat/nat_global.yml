---
# NAT Global Settings Audit Playbook
# Purpose: This playbook retrieves and verifies global NAT configuration on Cisco ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (assertions), Documentation, Error Handling, and FQCN.
- name: Audit NAT Global Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve global NAT configuration
      # Best Practices: Use Fully Qualified Collection Names (FQCN) for reliability
      # Idempotency: This is a read-only operation and is safe to run multiple times
      ansible.netcommon.cli_command:
        command: show running-config global | include nat
      register: nat_global_output
      # Error Handling: Distinguish between "no matches found" and "command execution failure"
      failed_when:
        - nat_global_output.failed
        - "'Invalid input' in nat_global_output.stderr"

    - name: Verify NAT configuration retrieval success
      # Observability: Use assertions to ensure the command returned a valid response structure
      ansible.builtin.assert:
        that:
          - "nat_global_output.stdout is defined"
        fail_msg: "Failed to retrieve NAT global settings from {{ inventory_hostname }}. Check connectivity or credentials."
        success_msg: "NAT global settings successfully retrieved for {{ inventory_hostname }}."

    - name: Display NAT Global Settings
      # Documentation: Provide a clear, formatted output of the current state for audit trails
      ansible.builtin.debug:
        msg: |
          ===========================================================
          NAT GLOBAL CONFIGURATION AUDIT
          ===========================================================
          Device: {{ inventory_hostname }}
          Execution Time: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          Configuration Output:
          {{ nat_global_output.stdout | default('No global NAT settings found in running-config.') }}
          ===========================================================