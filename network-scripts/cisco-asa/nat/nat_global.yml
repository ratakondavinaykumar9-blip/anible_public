---
# NAT Global Settings
# This playbook retrieves and displays global NAT configurations from Cisco ASA/Firepower devices.
# It follows idempotency standards by performing a read-only state check without modifying the device.
- name: NAT Global Configuration Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch global NAT configuration from device
      # Using Fully Qualified Collection Name (FQCN) for reliability and best practice
      ansible.netcommon.cli_command:
        command: show running-config global | include nat
      register: nat_global_output
      # Error Handling: Ensure the task fails if the command is unrecognized, while allowing empty results
      failed_when: 
        - nat_global_output.failed | default(false)
        - "'Invalid input' in nat_global_output.stdout"

    - name: Verify configuration capture
      # Observability: Use assert to verify the device returned a valid response
      ansible.builtin.assert:
        that:
          - nat_global_output.stdout is defined
        fail_msg: "Failed to capture NAT configuration from {{ inventory_hostname }}"
        success_msg: "Successfully captured NAT configuration from {{ inventory_hostname }}"

    - name: Display retrieved NAT settings
      # Visibility: Providing a clear, formatted output for operational auditing
      ansible.builtin.debug:
        msg: |
          ======================= NAT GLOBAL =======================
          {{ nat_global_output.stdout if nat_global_output.stdout | length > 0 else 'No global NAT settings found' }}