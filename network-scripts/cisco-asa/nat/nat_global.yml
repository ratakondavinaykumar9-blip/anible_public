---
# NAT Global Settings Audit
# Purpose: This playbook retrieves and verifies the global NAT configuration
# on Cisco ASA/Firepower devices to ensure consistency and audit compliance.
# This operation is inherently idempotent as it performs a read-only query.
- name: Audit NAT Global Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve global NAT configuration from running-config
      # Using Fully Qualified Collection Name (FQCN) for explicit module resolution
      ansible.netcommon.cli_command:
        command: show running-config global | include nat
      register: nat_global_result
      # Error Handling: Catch invalid command syntax or unexpected CLI responses
      failed_when:
        - nat_global_result.stdout is not defined
        - "'Invalid input' in nat_global_result.stdout"

    - name: Validate configuration retrieval success
      # Observability: Assert that the command returned a valid response structure
      ansible.builtin.assert:
        that:
          - nat_global_result.stdout is defined
        fail_msg: "Failed to retrieve global NAT configuration from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved global NAT configuration from {{ inventory_hostname }}"
        quiet: true

    - name: Display NAT Global configuration for operator review
      # Observability: Providing formatted output for audit logging and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= NAT GLOBAL AUDIT =======================
          Device: {{ inventory_hostname }}
          Status: Verified
          Configuration:
          {{ nat_global_result.stdout | default('No global NAT configuration found.') }}
