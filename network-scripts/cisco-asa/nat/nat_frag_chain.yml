---
# NAT Fragmentation Audit and Verification Playbook
# This playbook retrieves and validates NAT fragmentation settings on Cisco ASA/Firepower devices.
# It adheres to NetLearner Architect standards for idempotency, observability, and robust error handling.
- name: Audit NAT Fragmentation Configuration
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve NAT fragmentation configuration
      # Use FQCN for the command module. 
      # This task is read-only (idempotent by nature).
      ansible.netcommon.cli_command:
        command: show running-config nat | include fragment
      register: nat_frag_output
      # Ensure the task doesn't fail if the command is valid but returns an empty string (no fragments configured).
      failed_when: 
        - nat_frag_output.failed
        - "'Invalid input' in nat_frag_output.stderr"
      # Documentation: Audit tasks should run even in check mode to provide visibility.
      check_mode: false

    - name: Verify command execution success
      # Observability: Assert that the command was successfully sent and parsed by the device.
      ansible.builtin.assert:
        that:
          - nat_frag_output.stdout is defined
        fail_msg: "Failed to retrieve NAT fragmentation config from {{ inventory_hostname }}."
        success_msg: "NAT fragmentation config successfully retrieved from {{ inventory_hostname }}."

    - name: Display NAT fragmentation status
      # Documentation: Provide formatted output for human-readable audit logs.
      ansible.builtin.debug:
        msg: 
          - "============================================================"
          - "DEVICE: {{ inventory_hostname }}"
          - "NAT FRAGMENTATION CONFIGURATION:"
          - "{{ nat_frag_output.stdout | default('No fragmentation settings found in running-config', true) }}"
          - "============================================================"

    - name: Validate configuration presence
      # Error Handling: Use a conditional check to flag devices missing specific fragmentation policies if required.
      # This is an example of 'failed_when' logic tailored for audit compliance.
      ansible.builtin.set_fact:
        frag_configured: "{{ nat_frag_output.stdout | length > 0 }}"

    - name: Report configuration status
      ansible.builtin.debug:
        msg: "Optimization Note: NAT fragmentation is {{ 'ACTIVE' if frag_configured else 'NOT CONFIGURED' }} on this node."
