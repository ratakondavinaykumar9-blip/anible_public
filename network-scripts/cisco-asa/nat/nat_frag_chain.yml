---
# NAT Fragmentation Audit Playbook
# This playbook retrieves and validates NAT fragmentation settings on Cisco ASA/Firepower devices.
# It follows best practices for observability, error handling, and documentation.
- name: Audit NAT Fragmentation Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT fragmentation configuration from device
      # Using Fully Qualified Collection Name (FQCN) for the CLI command module.
      # This task is idempotent as it only performs a read operation.
      ansible.netcommon.cli_command:
        command: show running-config nat | include fragment
      register: frag_results
      # Error Handling: Explicitly fail if the command returns an error state.
      failed_when: 
        - frag_results.failed | default(false)
        - "'Invalid input' in frag_results.stdout"

    - name: Verify successful data retrieval
      # Observability: Assert that the command executed and returned a stdout key.
      ansible.builtin.assert:
        that:
          - frag_results.stdout is defined
        fail_msg: "Failed to capture NAT fragmentation output from {{ inventory_hostname }}."
        success_msg: "Successfully captured NAT fragmentation output from {{ inventory_hostname }}."

    - name: Display NAT Fragmentation results
      # Documentation: Outputting formatted results for audit visibility.
      ansible.builtin.debug:
        msg: |
          ======================= NAT FRAGMENTATION =======================
          Device: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          Configuration:
          {{ frag_results.stdout if frag_results.stdout | length > 0 else 'No NAT fragmentation configuration found.' }}