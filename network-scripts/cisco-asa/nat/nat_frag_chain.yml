---
# NAT Fragmentation Audit and Validation
# This playbook audits Cisco ASA/Firepower devices for NAT fragmentation configuration.
# Identifying these settings is critical for ensuring consistent traffic flow for fragmented packets.
- name: NAT Fragmentation
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT fragmentation configuration
      # Best Practices: Using FQCN (Fully Qualified Collection Name) for the netcommon collection.
      # Idempotency: This task is read-only, ensuring it is safe to run repeatedly without side effects.
      ansible.netcommon.cli_command:
        command: show running-config nat | include fragment
      register: frag_output
      # Error Handling: Ensures the playbook fails on connection issues or command rejection, 
      # but allows execution to continue if the 'include' filter simply finds no matches.
      failed_when: 
        - frag_output.failed
        - "'Invalid input' in frag_output.stdout"

    - name: Validate data retrieval success
      # Observability: Assert that the command was executed and a response was captured in the register.
      ansible.builtin.assert:
        that:
          - frag_output.stdout is defined
        fail_msg: "Failed to retrieve NAT configuration from {{ inventory_hostname }}. Verify credentials and reachability."
        quiet: true

    - name: Display NAT fragmentation report
      # Documentation: Providing a clear, human-readable summary of the current device state.
      ansible.builtin.debug:
        msg: |
          ======================= NAT FRAGMENTATION REPORT =======================
          Device: {{ inventory_hostname }}
          Status: {{ 'Configuration Found' if frag_output.stdout != '' else 'No Specific Configuration' }}
          
          Raw Output:
          {{ frag_output.stdout if frag_output.stdout != '' else 'No NAT rules with the "fragment" keyword were detected.' }}