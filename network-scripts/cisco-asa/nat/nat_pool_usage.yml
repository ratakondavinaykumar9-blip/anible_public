---
# This playbook retrieves and validates NAT pool usage and statistics on ASA/Firepower devices.
# It ensures observability and error handling according to NetLearner architectural standards.
- name: Monitor NAT Pool Usage
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT pool allocation and address ranges
      # Fetching operational state; this read-only command is inherently idempotent.
      ansible.netcommon.cli_command:
        command: show ip nat pool
      register: nat_pool_data
      # Error Handling: Fail if the device does not recognize the command or returns a system error.
      failed_when: 
        - '"Invalid input" in nat_pool_data.stdout'
        - '"ERROR" in nat_pool_data.stdout'

    - name: Verify NAT pool data was successfully retrieved
      # Observability: Assert that the output is not empty to ensure data integrity.
      ansible.builtin.assert:
        that:
          - nat_pool_data.stdout | length > 0
        fail_msg: "NAT pool information is empty or command failed to return data."
        success_msg: "NAT pool data successfully captured."

    - name: Retrieve active NAT translation statistics
      # Filtering NAT statistics specifically for pool-based objects to monitor real-time utilization.
      ansible.netcommon.cli_command:
        command: show nat | include pool
      register: nat_stats_data
      # Error Handling: Ignore errors if no translations exist, as this is a valid operational state.
      ignore_errors: true

    - name: Display consolidated NAT usage report
      # Observability: Providing a formatted view of the retrieved state for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= NAT POOL ALLOCATION =======================
          {{ nat_pool_data.stdout }}
          
          ======================= NAT TRANSLATION STATS =====================
          {{ nat_stats_data.stdout | default('No active pool translations observed.') }}

    - name: Alert on high NAT pool utilization
      # Observability: Proactive check for 100% utilization strings in the command output.
      ansible.builtin.debug:
        msg: "CRITICAL: NAT pool exhaustion (100% utilization) detected!"
      when: '"100%" in nat_pool_data.stdout'
