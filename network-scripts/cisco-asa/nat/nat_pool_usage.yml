---
# Playbook: NAT Pool Usage Audit
# Purpose: This playbook retrieves NAT pool configuration and usage statistics from Cisco ASA/Firepower devices.
# It implements senior-level standards: Idempotency, Observability, FQCN, and Robust Error Handling.
- name: Get NAT Pool Usage
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT pool configuration details
      # FQCN: Using ansible.netcommon for platform-specific CLI execution.
      ansible.netcommon.cli_command:
        command: show ip nat pool
      register: pool
      # Idempotency: Read-only 'show' commands are inherently idempotent and safe for repeated execution.
      # Error Handling: We ignore failures if the specific command is unsupported on certain ASA versions.
      failed_when: 
        - pool.failed 
        - "'Invalid input' not in pool.stdout"
      ignore_errors: true

    - name: Retrieve active NAT statistics filtered by pool
      ansible.netcommon.cli_command:
        command: show nat | include pool
      register: nat_stats
      failed_when:
        - nat_stats.failed
        - "'Invalid input' not in nat_stats.stdout"
      ignore_errors: true

    - name: Validate data collection success
      # Observability: Ensure that the command execution resulted in valid data capture.
      ansible.builtin.assert:
        that:
          - pool.stdout is defined
          - nat_stats.stdout is defined
        fail_msg: "Data retrieval failed. Please check device connectivity and credentials."
        success_msg: "NAT Pool data successfully captured."
        quiet: true

    - name: Display NAT Pool Utilization Report
      # Observability: Provide clear, structured output for administrative audit and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= NAT POOL CONFIGURATION =======================
          {{ pool.stdout | default('Command unsupported or no pool configured.') }}

          ======================= NAT POOL STATISTICS =======================
          {{ nat_stats.stdout | default('Command unsupported or no statistics available.') }}