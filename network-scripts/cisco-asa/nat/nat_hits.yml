---
# NAT Translation Hits
# This playbook retrieves NAT hitcount statistics from Cisco ASA/Firepower devices.
# Implementation follows standards for Idempotency, Observability, and Best Practices.

- name: Get NAT Translation Hitcounts
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show nat' command to retrieve hitcounts
      # Use FQCN for consistent plugin resolution.
      # Read-only commands are inherently idempotent as they do not modify state.
      ansible.netcommon.cli_command:
        command: show nat | include hitcount
      register: nat_hits
      # Error Handling: Ensure the task fails if the command is unrecognized or execution fails.
      failed_when: 
        - nat_hits.failed | default(false)
        - "'Invalid' in nat_hits.stdout"

    - name: Validate that NAT hitcount data was retrieved
      # Observability: Use assertions to verify that the output contains data,
      # preventing silent failures in automation workflows.
      ansible.builtin.assert:
        that:
          - nat_hits.stdout is defined
          - nat_hits.stdout | length > 0
        fail_msg: "No NAT hitcount data returned. Verify NAT rules exist on the target device."
        success_msg: "NAT hitcount data successfully captured."

    - name: Display NAT Hitcount Results
      # Observability: Provide clear, formatted output for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= NAT HITS =======================
          {{ nat_hits.stdout }}