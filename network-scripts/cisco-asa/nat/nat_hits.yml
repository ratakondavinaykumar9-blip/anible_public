---
# Playbook: Cisco ASA/Firepower NAT Hitcount Retrieval
# Purpose: Audits NAT translation hits to identify active/stale rules.
# Architect Note: This operation is idempotent as it performs a non-disruptive read-only query.
- name: Get NAT Translation Hits
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute command to retrieve NAT hitcounts
      # FQCN: ansible.netcommon.cli_command is used for compatibility with ASA/FTD CLI
      ansible.netcommon.cli_command:
        command: show nat | include hitcount
      register: nat_hits
      # Error Handling: Explicitly handle command failure or CLI syntax errors
      failed_when: 
        - nat_hits.failed or "Invalid" in nat_hits.stdout
      # Idempotency: show commands do not change device state
      changed_when: false

    - name: Verify NAT translation data was returned
      # Observability: Ensure the buffer contains data before proceeding
      ansible.builtin.assert:
        that:
          - nat_hits.stdout is defined
          - nat_hits.stdout | length > 0
        fail_msg: "No NAT hitcount data found. Verify NAT configuration on {{ inventory_hostname }}."
        quiet: true

    - name: Display NAT Statistics Report
      # Documentation: Formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ==========================================================
          NAT HITCOUNT SUMMARY FOR {{ inventory_hostname | upper }}
          ==========================================================
          {{ nat_hits.stdout }}
          ==========================================================
