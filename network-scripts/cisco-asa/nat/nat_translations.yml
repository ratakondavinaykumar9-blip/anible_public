---
- name: Get NAT Translations from Cisco ASA
  hosts: asa_firepower
  gather_facts: false
  # Purpose: Safely retrieve, verify, and display NAT translations (xlate) for operational visibility.
  # This playbook ensures idempotency as it performs read-only operations.

  tasks:
    - name: Retrieve summary of active NAT translations (xlate)
      # Standard: Best Practices - Using Fully Qualified Collection Name (FQCN)
      # Standard: Idempotency - Read-only commands are safe to run multiple times without state change.
      cisco.asa.asa_command:
        commands:
          - show xlate
      # Standard: Observability - Registering output for verification and display
      register: xlate_summary
      # Standard: Error Handling - Define failure based on CLI error strings to catch logical failures
      failed_when: >
        xlate_summary.failed or
        "Invalid input" in xlate_summary.stdout[0] or
        "ERROR" in xlate_summary.stdout[0]

    - name: Verify NAT translation summary data integrity
      # Standard: Observability - Use assert to ensure the command returned actionable data
      ansible.builtin.assert:
        that:
          - xlate_summary.stdout[0] | length > 0
        fail_msg: "NAT summary retrieval succeeded but returned no data."
        success_msg: "NAT summary successfully retrieved."

    - name: Retrieve detailed NAT translation information
      cisco.asa.asa_command:
        commands:
          - show xlate detail
      register: xlate_detail
      failed_when: >
        xlate_detail.failed or
        "Invalid input" in xlate_detail.stdout[0] or
        "ERROR" in xlate_detail.stdout[0]

    - name: Verify detailed NAT translation data integrity
      ansible.builtin.assert:
        that:
          - xlate_detail.stdout[0] | length > 0
        fail_msg: "Detailed NAT info retrieval succeeded but returned no data."
        success_msg: "Detailed NAT info successfully retrieved."

    - name: Display NAT Translation Results
      ansible.builtin.debug:
        msg: |
          ======================= NAT TRANSLATIONS SUMMARY =======================
          {{ xlate_summary.stdout[0] }}

          ======================= NAT TRANSLATIONS DETAIL =======================
          {{ xlate_detail.stdout[0] }}