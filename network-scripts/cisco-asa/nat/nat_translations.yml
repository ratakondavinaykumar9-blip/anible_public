---
# ==============================================================================
# Playbook: Get Active NAT Translations (Xlate)
# Description: Safely retrieves and validates active NAT translations from 
#              Cisco ASA/Firepower devices for observability and auditing.
# ==============================================================================
- name: Audit Active NAT Translations
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve summary NAT translations
      # Use FQCN for portability and explicit module resolution
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate_summary
      # Idempotency: Show commands never change device state
      changed_when: false
      # Error Handling: Fail if the CLI returns an invalid command response
      failed_when: 
        - xlate_summary.stdout is not defined
        - '"invalid" in xlate_summary.stdout | lower'

    - name: Verify NAT summary integrity
      # Observability: Assert that the output contains expected session headers
      ansible.builtin.assert:
        that:
          - '"in use" in xlate_summary.stdout or "Xlate" in xlate_summary.stdout'
        fail_msg: "NAT translation table summary is missing or unreachable."
        quiet: true

    - name: Retrieve detailed NAT translation mappings
      # Captures port-level and protocol details for forensic analysis
      ansible.netcommon.cli_command:
        command: show xlate detail
      register: xlate_detail
      changed_when: false
      # Suppress errors if table is empty but command is valid
      ignore_errors: false

    - name: Verify detailed output availability
      ansible.builtin.assert:
        that:
          - xlate_detail.stdout is defined
        fail_msg: "Detailed NAT translation retrieval failed."
        quiet: true

    - name: Display NAT Translation Report
      # Formats output for human-readable visibility in automation logs
      ansible.builtin.debug:
        msg: |
          ========================= NAT TRANSLATIONS =========================
          DEVICE: {{ inventory_hostname }}
          
          [SUMMARY STATISTICS]
          {{ xlate_summary.stdout }}

          [DETAILED MAPPINGS]
          {{ xlate_detail.stdout }}
          ====================================================================
```