---
# Description: Retrieve and display active NAT translations (xlates) from Cisco ASA/Firepower devices.
# This playbook is idempotent as it performs read-only operations to provide operational visibility.
- name: Get NAT Translations
  hosts: asa_firepower
  gather_facts: false # Fact collection is disabled to optimize performance as facts are not required for these tasks.

  tasks:
    - name: Retrieve summary NAT translation table
      # Use FQCN for the Cisco ASA collection to ensure robust and standardized command execution.
      cisco.asa.asa_command:
        commands:
          - show xlate
      register: xlate_output
      # Explicitly catch failures to ensure the playbook stops if the device is unreachable or the command fails.
      failed_when: xlate_output.failed | default(false)

    - name: Validate summary NAT output
      # Observability: Assert that the command returned data to verify successful retrieval from the device.
      ansible.builtin.assert:
        that:
          - xlate_output.stdout is defined
          - xlate_output.stdout[0] | length > 0
        fail_msg: "The 'show xlate' command failed or returned empty output on {{ inventory_hostname }}."
        success_msg: "Successfully retrieved summary NAT translation table."

    - name: Retrieve detailed NAT translation information
      # Detailed translations provide source/destination interface and port mapping for deep-dive troubleshooting.
      cisco.asa.asa_command:
        commands:
          - show xlate detail
      register: xlate_detail_output
      failed_when: xlate_detail_output.failed | default(false)

    - name: Validate detailed NAT output
      # Observability: Verify detailed output was captured before attempting to display it to the user.
      ansible.builtin.assert:
        that:
          - xlate_detail_output.stdout is defined
          - xlate_detail_output.stdout[0] | length > 0
        fail_msg: "The 'show xlate detail' command failed or returned empty output on {{ inventory_hostname }}."
        success_msg: "Successfully retrieved detailed NAT translation information."

    - name: Display Active NAT Translations
      # Provide a clear, formatted output for human readability during troubleshooting sessions.
      ansible.builtin.debug:
        msg: |
          ======================= NAT TRANSLATIONS (SUMMARY) =======================
          {{ xlate_output.stdout[0] }}

          ======================= NAT TRANSLATIONS (DETAILED) ======================
          {{ xlate_detail_output.stdout[0] }}