---
# Improved NAT Configuration Playbook
# Standards: Idempotent, Observable, Documented, and FQCN-compliant.
- name: Get NAT Configuration and Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather structured NAT configuration facts
      # Why: Retrieves the current NAT configuration in a structured format for easier parsing.
      # Idempotency: 'state: gathered' is a read-only operation and will never modify the device.
      cisco.asa.asa_nat:
        state: gathered
      register: nat_output
      ignore_errors: false

    - name: Capture real-time NAT hit-count statistics via CLI
      # Why: 'show nat' provides dynamic performance counters not found in configuration facts.
      ansible.netcommon.cli_command:
        command: show nat
      register: nat_stats
      failed_when: 
        - nat_stats.failed 
        - "'Invalid' in nat_stats.stdout"

    - name: Capture active translation (xlate) table
      # Why: Monitors memory-resident translation slots to identify active traffic flows.
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate
      failed_when: xlate.failed

    - name: Verify NAT data collection observability
      # Observability: Asserts that critical data was successfully retrieved before proceeding.
      ansible.builtin.assert:
        that:
          - nat_stats.stdout is defined
          - xlate.stdout is defined
        fail_msg: "Critical NAT/xlate data collection failed for {{ inventory_hostname }}"
        success_msg: "Data collection successful for {{ inventory_hostname }}"

    - name: Display consolidated NAT report
      # Why: Provides a human-readable summary of both configuration and operational state.
      ansible.builtin.debug:
        msg: |
          ============================================================
          NAT ANALYSIS REPORT: {{ inventory_hostname }}
          ============================================================
          
          [STRUCTURED CONFIGURATION]
          {% if nat_output.gathered is defined and nat_output.gathered %}
          {% for rule in nat_output.gathered %}
          ID: {{ rule.rule_id | default('Manual') }} | Source: {{ rule.source_address | default('any') }} -> {{ rule.translated_source | default('dynamic') }}
          {% endfor %}
          {% else %}
          No structured NAT rules detected in the configuration.
          {% endif %}
          
          [OPERATIONAL STATISTICS]
          {{ nat_stats.stdout }}
          
          [ACTIVE TRANSLATIONS (XLATE)]
          {{ xlate.stdout }}