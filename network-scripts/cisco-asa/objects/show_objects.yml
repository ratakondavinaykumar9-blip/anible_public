---
# Playbook: Audit Cisco ASA/Firepower Network Objects
# Why: Safely retrieves network object definitions for auditing and visibility.
# This implementation follows NetLearner standards for idempotency, observability, and error handling.

- name: Get and Validate Network Objects
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve network object configuration from running-config
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      ansible.netcommon.cli_command:
        command: show running-config object network
      register: objects_output
      # Idempotency: Read-only operations must never report a 'changed' status.
      changed_when: false
      # Error Handling: Fail explicitly if the command is unrecognized or if the execution fails.
      failed_when:
        - objects_output.failed
        - "'Invalid input' in objects_output.stdout"

    - name: Verify successful data retrieval
      # Observability: Assert that the command returned valid output to prevent silent failures.
      ansible.builtin.assert:
        that:
          - objects_output.stdout is defined
        fail_msg: "Data retrieval failed. Please verify device connectivity and CLI permissions."
        quiet: true

    - name: Display formatted Network Objects report
      # Documentation: Provides a human-readable summary with host context.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          HOST: {{ inventory_hostname }}
          ---------------------------------------------------------------
          {{ objects_output.stdout if objects_output.stdout | length > 0 else 'INFO: No network objects are currently defined.' }}