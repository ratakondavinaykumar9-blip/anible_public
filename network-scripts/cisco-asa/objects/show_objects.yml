- name: Retrieve and Validate Network Objects from Cisco ASA/Firepower
  # Description: This playbook fetches the current network object configuration.
  # Idempotency: This is a read-only (GET) operation, making it safe to run multiple times without changing state.
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch network object running configuration
      # FQCN: Using ansible.netcommon.cli_command for cross-platform compatibility.
      # Documentation: Why: Required to audit existing network objects before performing changes or for visibility.
      ansible.netcommon.cli_command:
        command: show running-config object network
      register: objects_output
      # Error Handling: Ensure the task fails if the command is invalid or if the device returns an error string.
      failed_when:
        - objects_output.failed or "Invalid input" in objects_output.stdout

    - name: Validate network object data presence
      # Observability: Use assert to verify that the command actually returned data.
      # This prevents the playbook from proceeding or succeeding with empty results.
      ansible.builtin.assert:
        that:
          - objects_output.stdout is defined
          - objects_output.stdout | length > 0
        fail_msg: "The retrieved configuration is empty or the command failed to return data."
        success_msg: "Successfully retrieved network object configuration."

    - name: Display retrieved Network Objects
      # Observability: Print the output in a formatted block for operator review.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          {{ objects_output.stdout }}