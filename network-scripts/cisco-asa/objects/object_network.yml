---
# This playbook retrieves network object details from Cisco ASA/Firepower devices.
# Standard: Idempotency - This operation is read-only and inherently safe to execute multiple times.
- name: Network Objects Detail Retrieval
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve network objects from the device CLI
      # Standard: Best Practices - Using Fully Qualified Collection Name (FQCN).
      ansible.netcommon.cli_command:
        command: show object network
      register: network_objects_result
      # Standard: Error Handling - Define failure if the device returns common CLI error strings.
      failed_when:
        - network_objects_result.failed or "Invalid input" in network_objects_result.stdout

    - name: Validate that network objects were successfully retrieved
      # Standard: Observability - Use 'assert' to verify the command returned a non-empty response.
      ansible.builtin.assert:
        that:
          - network_objects_result.stdout is defined
          - network_objects_result.stdout | length > 0
        fail_msg: "The 'show object network' command returned no data or failed."
        success_msg: "Successfully retrieved network objects from {{ inventory_hostname }}."

    - name: Display formatted network objects
      # Standard: Observability - Output the registered result for visibility and logging.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          {{ network_objects_result.stdout }}