# Protocol Objects Retrieval and Verification
# Purpose: Fetches protocol objects from ASA/Firepower to ensure visibility into the security policy.
# This playbook is idempotent as it performs read-only operations on the device state.

- name: Protocol Objects Retrieval
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "OPERATIONAL: Retrieve protocol objects from the device"
      # Using Fully Qualified Collection Name (FQCN) to ensure the correct module is invoked.
      ansible.netcommon.cli_command:
        command: show object protocol
      register: proto_output
      # Error Handling: Fail explicitly if the command is not recognized or execution fails.
      failed_when: 
        - proto_output.failed or "Invalid input" in proto_output.stdout

    - name: "OBSERVABILITY: Verify protocol output integrity"
      # Asserting that data was returned to ensure observability and detect empty configurations.
      ansible.builtin.assert:
        that:
          - "proto_output.stdout | length > 0"
        fail_msg: "Data retrieval failure: The 'show object protocol' command returned no data."
        success_msg: "Protocol objects successfully retrieved and verified."

    - name: "DEBUG: Display retrieved Protocol Objects"
      # Providing formatted output for human-readable audit and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= PROTOCOL OBJECTS =======================
          {{ proto_output.stdout }}