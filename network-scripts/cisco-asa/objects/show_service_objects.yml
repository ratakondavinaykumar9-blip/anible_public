---
- name: Audit Cisco ASA Service Objects
  hosts: asa_firepower
  gather_facts: false
  # Purpose: Safely retrieve and validate service object configurations for network auditing.

  tasks:
    - name: Fetch service object configuration
      # Standard 5: Use platform-specific FQCN (Fully Qualified Collection Name)
      cisco.asa.asa_command:
        commands:
          - show running-config object service
      register: asa_service_output
      # Standard 1: Ensure idempotency; read-only commands should never report 'changed'
      changed_when: false
      # Standard 4: Robust error handling to catch CLI-specific errors or execution failures
      failed_when:
        - asa_service_output.failed or "Invalid input" in asa_service_output.stdout[0]

    - name: Verify configuration capture success
      # Standard 2: Observability; use assertions to verify the output exists
      ansible.builtin.assert:
        that:
          - asa_service_output.stdout[0] is defined
        fail_msg: "Data capture failed for {{ inventory_hostname }}. Verify connectivity and credentials."
        quiet: true

    - name: Display formatted service object details
      # Standard 2: Enhanced observability for manual verification and logging
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS: {{ inventory_hostname }} =======================
          {{ asa_service_output.stdout[0] }}