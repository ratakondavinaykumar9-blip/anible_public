# Playbook: Audit Object Groups
# Purpose: Retrieves the running configuration for object-groups on Cisco ASA/Firepower devices.
# This operation is inherently idempotent as it is a read-only request.
- name: Audit Cisco ASA/Firepower Object Groups
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve object-group configuration from device
      # Using FQCN (ansible.netcommon.cli_command) to fetch the specific running-config section.
      # This provides the raw data needed for compliance and auditing without changing state.
      ansible.netcommon.cli_command:
        command: show running-config object-group
      register: groups
      # Error Handling: Fail if the command is unrecognized by the device or the task fails.
      failed_when: 
        - groups.failed or "% Invalid" in groups.stdout

    - name: Validate retrieval of object group data
      # Observability: Assert that data was actually returned to avoid false positives in reporting.
      ansible.builtin.assert:
        that:
          - groups.stdout is defined
          - groups.stdout | length > 0
        fail_msg: "Validation failed: The object-group configuration is empty or could not be read."
        quiet: true

    - name: Display Object Group Configuration
      # Observability: Print the results to the console for the operator to review.
      ansible.builtin.debug:
        msg: |
          ======================= OBJECT GROUPS =======================
          {{ groups.stdout }}