---
- name: Cisco ASA/Firepower - Retrieve and Validate Object Groups
  hosts: asa_firepower
  gather_facts: false
  # Idempotency: This playbook is safe to run repeatedly as it only performs read-only operations.

  tasks:
    - name: Retrieve object groups from running configuration
      # Best Practices: Use Fully Qualified Collection Names (FQCN) for reliability.
      ansible.netcommon.cli_command:
        command: show running-config object-group
      register: groups
      # Error Handling: Fail if the command is unrecognized by the device or execution fails.
      failed_when: 
        - groups.failed or "Invalid input" in groups.stdout

    - name: Verify that object group data was captured
      # Observability: Ensure the output variable is defined before proceeding.
      ansible.builtin.assert:
        that:
          - groups.stdout is defined
        fail_msg: "Critical Error: Failed to retrieve object group output from the device."
        success_msg: "Success: Object group configuration successfully captured."

    - name: Display Object Group configuration
      # Observability: Provide formatted output for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= OBJECT GROUPS =======================
          {{ groups.stdout }}