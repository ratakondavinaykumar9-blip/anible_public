# Cisco ASA/Firepower Service Object Data Extraction
# Standards: FQCN, Idempotency (Read-only), Observability (Assert), Error Handling
- name: Service Objects Detail
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service objects from device configuration
      # Using FQCN for better maintainability and strict versioning
      ansible.netcommon.cli_command:
        command: show object service
      register: svc
      # Error Handling: Fail if output indicates a CLI syntax error or general failure
      failed_when: >
        svc.failed or 
        "Invalid input" in svc.stdout or 
        "ERROR" in svc.stdout

    - name: Assert that the command returned non-empty results
      # Observability: verify success before continuing to processing/display tasks
      ansible.builtin.assert:
        that:
          - "svc.stdout is defined and (svc.stdout | length > 0)"
        fail_msg: "The 'show object service' command returned no results. Verify object existence."
        quiet: true

    - name: Display formatted service object details
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc.stdout }}