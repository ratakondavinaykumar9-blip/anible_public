---
# Service Objects Detail
# Purpose: Retrieve and validate service object definitions from Cisco ASA/Firepower devices.
# This playbook ensures idempotency through read-only operations and implements 
# strict observability and error handling standards.
- name: Service Objects Detail
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service objects from device
      # Use Fully Qualified Collection Name (FQCN) for cross-platform reliability
      ansible.netcommon.cli_command:
        command: show object service
      register: svc_output
      # Error Handling: Explicitly catch Cisco CLI error strings that might not trigger a non-zero exit code
      failed_when:
        - svc_output.failed or "Invalid input" in svc_output.stdout

    - name: Validate service object retrieval
      # Observability: Assert that the output is defined and contains data to prevent silent failures
      ansible.builtin.assert:
        that:
          - svc_output.stdout is defined
          - svc_output.stdout | length > 0
        fail_msg: "Service object retrieval failed or the device returned an empty configuration."
        success_msg: "Service object data successfully captured."

    - name: Display formatted service object configuration
      # Documentation: Providing a clear, human-readable output for audit and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc_output.stdout }}