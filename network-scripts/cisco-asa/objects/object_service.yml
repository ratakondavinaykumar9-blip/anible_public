---
# Architect:Improved Playbook: Service Objects Detail
# Purpose: Retrieves and validates detailed service object configurations from ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert/Register), FQCN (Standardized Collections).
- name: Service Objects Detail
  hosts: asa_firepower
  gather_facts: false # Performance optimization; device facts are not required for CLI command execution.

  tasks:
    - name: Retrieve service objects from device CLI
      # Idempotency: This is a read-only command, ensuring it is safe to execute repeatedly.
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction.
      ansible.netcommon.cli_command:
        command: show object service
      register: svc
      # Error Handling: Detect execution failures or invalid command syntax on the device.
      failed_when: svc.failed or "Invalid input" in svc.stdout
      # Observability: Allow the task to run in check mode to ensure visibility during dry-runs.
      check_mode: false

    - name: Validate service object data integrity
      # Observability: Assert task ensures that the command returned usable configuration data.
      ansible.builtin.assert:
        that:
          - svc.stdout is defined
          - svc.stdout | length > 0
        fail_msg: "The command 'show object service' failed to return data. Verify configuration on {{ inventory_hostname }}."
        success_msg: "Service object configuration successfully retrieved."

    - name: Display service object details
      # Documentation: Providing structured output for audit logs and human analysis.
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc.stdout }}