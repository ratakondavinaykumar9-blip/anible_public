MCP issues detected. Run /mcp list for status.```yaml
---
- name: Get Recent Logs from ASA Firepower
  hosts: asa_firepower
  gather_facts: false
  # Standardize log retrieval count as a configurable variable
  vars:
    log_count: 50

  tasks:
    - name: Validate log_count input
      # Observability: Ensure variables are within expected bounds before execution
      ansible.builtin.assert:
        that:
          - log_count is defined
          - log_count | int > 0
        fail_msg: "The variable 'log_count' must be a positive integer."
        quiet: true

    - name: Retrieve recent logs from device
      # FQCN: Using fully qualified collection name for portability
      # Idempotency: Read-only command ensures no state change on the device
      ansible.netcommon.cli_command:
        command: "show logging | last {{ log_count }}"
      register: logs_result
      # Error Handling: Fail if the device returns an error message or undefined output
      failed_when:
        - logs_result.stdout is not defined
        - "'Invalid' in logs_result.stdout or 'Error' in logs_result.stdout"

    - name: Verify log content integrity
      # Observability: Assert that the command actually returned data to prevent silent failures
      ansible.builtin.assert:
        that:
          - logs_result.stdout | length > 0
        fail_msg: "Log buffer appears to be empty or command failed to return data."
        success_msg: "Successfully captured {{ log_count }} log lines."

    - name: Display retrieved logs
      # Documentation: Provide a clear, formatted header for operational visibility
      ansible.builtin.debug:
        msg: |
          ======================= RECENT LOGS: {{ inventory_hostname }} =======================
          {{ logs_result.stdout }}
