---
- name: Get and Validate Recent Logs from Cisco ASA/Firepower
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Number of log entries to retrieve; default is 50
    log_count: 50

  tasks:
    - name: Retrieve recent logging entries
      # Using FQCN for consistent network CLI execution across environments
      ansible.netcommon.cli_command:
        command: "show logging | last {{ log_count }}"
      register: logs_output
      # Error Handling: Fail if the output is empty or contains known error strings
      failed_when: 
        - logs_output.stdout == ""
        - "'Invalid input' in logs_output.stdout"

    - name: Verify log retrieval integrity
      # Observability: Assert that the command returned valid data
      ansible.builtin.assert:
        that:
          - logs_output.stdout is defined
          - logs_output.stdout | length > 0
        fail_msg: "Log retrieval failed: The log buffer might be empty or the command was rejected."
        success_msg: "Log retrieval successful: Data received for the last {{ log_count }} lines."

    - name: Display recent logs
      # Documentation: Providing a structured view of the command output
      ansible.builtin.debug:
        msg: |
          ======================= RECENT LOGS (Count: {{ log_count }}) =======================
          {{ logs_output.stdout }}