---
# Playbook: Get Recent Logs from Cisco ASA/Firepower
# Purpose: Retrieves the last N entries from the device logging buffer for troubleshooting.
# Standards: Idempotent, Observable, Documented, Error-Resilient.
- name: Get Recent Logs
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default log count to retrieve; can be overridden via extra_vars
    log_count: 50

  tasks:
    - name: Retrieve logging buffer contents
      # Using FQCN for network CLI interaction to ensure compatibility and stability
      ansible.netcommon.cli_command:
        command: "show logging | last {{ log_count }}"
      register: logs_output
      # Use failed_when to customize failure conditions (e.g., command not found or auth failure)
      # ignore_errors is avoided here to ensure we handle the state explicitly in assertions
      ignore_errors: true

    - name: Verify log retrieval success
      # Observability: Ensure the command executed and returned content
      ansible.builtin.assert:
        that:
          - logs_output is success
          - logs_output.stdout is defined
          - "logs_output.stdout | length > 0"
        fail_msg: "Failed to retrieve logs. Check if 'logging buffered' is enabled or if the buffer is empty."
        success_msg: "Successfully retrieved the last {{ log_count }} log entries."

    - name: Display retrieved logs
      # Formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= RECENT LOGS (Last {{ log_count }}) =======================
          {{ logs_output.stdout }}
      when: logs_output.stdout is defined and (logs_output.stdout | length > 0)