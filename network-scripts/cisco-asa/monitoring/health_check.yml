---
# ASA Health Check - CPU, Memory, Connections, Performance
- name: ASA Comprehensive Health Check
  hosts: asa_firepower
  # gather_facts is enabled to provide the 'ansible_date_time' variable for reporting
  gather_facts: yes
  vars:
    output_format: text

  tasks:
    - name: Get CPU usage
      # Captures current CPU load to identify performance bottlenecks or potential DoS conditions
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_result
      changed_when: false
      failed_when: cpu_result.stdout == ""

    - name: Validate CPU data retrieval
      ansible.builtin.assert:
        that:
          - "'CPU usage' in cpu_result.stdout"
        fail_msg: "Failed to retrieve valid CPU usage data from {{ inventory_hostname }}"

    - name: Get memory info
      # Monitors memory allocation to prevent system instability from resource exhaustion
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_result
      changed_when: false
      failed_when: mem_result.stdout == ""

    - name: Validate memory data retrieval
      ansible.builtin.assert:
        that:
          - "'memory' in mem_result.stdout"
        fail_msg: "Failed to retrieve valid memory information from {{ inventory_hostname }}"

    - name: Get connection count
      # Tracks active sessions to ensure they are within licensed platform limits
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_result
      changed_when: false

    - name: Get resource usage
      # Checks system-wide resource allocation (XLATEs, AAA sessions, etc.)
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_result
      changed_when: false

    - name: Get context info
      # Validates multi-context status and specific resource allocation per context
      ansible.netcommon.cli_command:
        command: show context
      register: context_result
      changed_when: false

    - name: Get traffic rates
      # Analyzes throughput and packet processing rates for performance monitoring
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      changed_when: false

    - name: Output JSON Report
      # Idempotently saves the health state to a file for audit and trend analysis
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "cpu": "{{ cpu_result.stdout | trim }}",
            "memory": "{{ mem_result.stdout | trim }}",
            "connections": "{{ conn_result.stdout | trim }}",
            "resources": "{{ resource_result.stdout | trim }}",
            "contexts": "{{ context_result.stdout | trim }}",
            "traffic": "{{ traffic_result.stdout | trim }}"
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Health Summary
      # Provides immediate visibility into the device status during playbook execution
      ansible.builtin.debug:
        msg: |
          ========================================================================
          Health Check: {{ inventory_hostname }} | Status: COMPLETED
          Timestamp: {{ ansible_date_time.iso8601 }}
          ========================================================================
          CPU: {{ cpu_result.stdout_lines[0] if cpu_result.stdout_lines else 'N/A' }}
          MEM: {{ mem_result.stdout_lines[0] if mem_result.stdout_lines else 'N/A' }}
          CONN: {{ conn_result.stdout | trim }}
          TRAFFIC: {{ traffic_result.stdout_lines[0] if traffic_result.stdout_lines else 'N/A' }}
          ========================================================================