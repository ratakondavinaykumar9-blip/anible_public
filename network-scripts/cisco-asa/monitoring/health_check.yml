---
# ASA Health Check - CPU, Memory, Connections, Performance
# This playbook performs a comprehensive, non-disruptive health audit of Cisco ASA/Firepower devices.
- name: ASA Comprehensive Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Gather time facts for reporting
      # Why: Required to generate a timestamp (ansible_date_time) for the audit report.
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Get CPU usage
      # Why: Monitoring CPU is critical for detecting process-intensive anomalies or DoS attacks.
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_output
      # Why: Error Handling - Fail if the command returns no output.
      failed_when: cpu_output.stdout | length == 0

    - name: Verify CPU data integrity
      # Why: Observability - Ensure the device returned expected performance metrics.
      ansible.builtin.assert:
        that:
          - "'CPU usage' in cpu_output.stdout"
        fail_msg: "Incomplete CPU data received from {{ inventory_hostname }}"

    - name: Get memory information
      # Why: Monitors memory allocation to prevent system instability from exhaustion.
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_output
      failed_when: mem_output.stdout | length == 0

    - name: Verify memory data integrity
      # Why: Observability - Verify memory output contains valid keywords.
      ansible.builtin.assert:
        that:
          - "'Free memory' in mem_output.stdout"
        fail_msg: "Incomplete memory data received from {{ inventory_hostname }}"

    - name: Get connection count
      # Why: Tracks active sessions against platform capacity limits.
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_output

    - name: Verify connection data integrity
      # Why: Observability - Ensure the connection table count was successfully queried.
      ansible.builtin.assert:
        that:
          - "'in use' in conn_output.stdout"
        fail_msg: "Failed to retrieve connection metrics from {{ inventory_hostname }}"

    - name: Get resource usage
      # Why: Analyzes context-specific resource consumption in multi-context environments.
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_output

    - name: Get context information
      # Why: Validates the presence and status of all configured security contexts.
      ansible.netcommon.cli_command:
        command: show context
      register: context_output

    - name: Get traffic rates
      # Why: Observes throughput rates to identify potential network congestion.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_output

    - name: Export JSON Health Report
      # Why: Idempotency - Overwrites the existing report with the current state.
      # Why: Observability - Provides a structured format for external monitoring systems.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "cpu": {{ cpu_output.stdout | to_json }},
            "memory": {{ mem_output.stdout | to_json }},
            "connections": {{ conn_output.stdout | to_json }},
            "resources": {{ resource_output.stdout | to_json }},
            "contexts": {{ context_output.stdout | to_json }},
            "traffic": {{ traffic_output.stdout | to_json }}
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Display Device Health Summary
      # Why: Provides immediate, human-readable feedback to the automation engineer.
      ansible.builtin.debug:
        msg: |
          ============================================================
          HEALTH CHECK SUMMARY: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 }}
          ============================================================
          CPU STATISTICS:
          {{ cpu_output.stdout }}

          MEMORY STATISTICS:
          {{ mem_output.stdout }}

          CONNECTION STATISTICS:
          {{ conn_output.stdout }}

          TRAFFIC STATISTICS:
          {{ traffic_output.stdout }}
          ============================================================