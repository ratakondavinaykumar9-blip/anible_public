---
# CPU History Retrieval for Cisco ASA/Firepower
# This playbook retrieves historical CPU metrics while adhering to NetLearner engineering standards.
- name: Cisco CPU History Analysis
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show cpu history' via CLI
      # Use FQCN: ansible.netcommon.cli_command is the standard for network-agnostic CLI execution
      ansible.netcommon.cli_command:
        command: show cpu history
      register: cpu_raw
      # Idempotency: Show commands are read-only and never change device state
      changed_when: false
      # Error Handling: Fail if the command is unrecognized by the device shell
      failed_when: 
        - "'Invalid input' in cpu_raw.stdout"
        - "'syntax error' in cpu_raw.stdout"

    - name: Verify CPU data capture
      # Observability: Assert that the command returned meaningful content
      ansible.builtin.assert:
        that:
          - cpu_raw.stdout is defined
          - cpu_raw.stdout | length > 0
        fail_msg: "CPU history output is empty or command failed to return data."
        success_msg: "CPU history successfully retrieved."

    - name: Display formatted CPU History
      # Observability: Structured output for human-readable logs
      ansible.builtin.debug:
        msg: |
          ======================= CPU HISTORY =======================
          {{ cpu_raw.stdout }}