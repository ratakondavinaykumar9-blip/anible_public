---
- name: Cisco ASA/Firepower Performance Monitoring
  hosts: asa_firepower
  gather_facts: false
  # Using gather_facts: false as network facts are not required for CLI monitoring tasks

  tasks:
    - name: Retrieve Performance Monitoring Statistics
      # Captures CPU, memory, and connection rate metrics for resource analysis
      # Using FQCN: ansible.netcommon.cli_command for standardized network interaction
      ansible.netcommon.cli_command:
        command: show perfmon
      register: perf_mon_result
      # Error Handling: Check for common CLI error strings that might not trigger a connection failure
      failed_when: 
        - perf_mon_result.failed
        - "'Invalid' in perf_mon_result.stdout or 'Error' in perf_mon_result.stdout"

    - name: Verify Performance Data Integrity
      # Observability: Assert that the command returned data to ensure monitoring validity
      ansible.builtin.assert:
        that:
          - perf_mon_result.stdout | length > 0
        fail_msg: "Device {{ inventory_hostname }} returned empty performance data."
        quiet: true

    - name: Retrieve Interface Traffic Statistics
      # Captures throughput metrics across all interfaces to identify bottlenecks
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      failed_when:
        - traffic_result.failed
        - "'Invalid' in traffic_result.stdout or 'Error' in traffic_result.stdout"

    - name: Verify Traffic Data Integrity
      # Observability: Ensure traffic statistics were successfully gathered
      ansible.builtin.assert:
        that:
          - traffic_result.stdout | length > 0
        fail_msg: "Device {{ inventory_hostname }} returned empty traffic data."
        quiet: true

    - name: Display Consolidated Monitoring Output
      # Documentation: Provides a human-readable summary for auditing and immediate troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE REPORT =======================
          HOST: {{ inventory_hostname }}
          
          [PERFMON - CPU/Memory/Connections]
          {{ perf_mon_result.stdout }}

          [TRAFFIC - Interface Throughput]
          {{ traffic_result.stdout }}
          ==================================================================