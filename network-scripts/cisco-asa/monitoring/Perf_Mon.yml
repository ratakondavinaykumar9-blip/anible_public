MCP issues detected. Run /mcp list for status.---
- name: Performance Monitoring for Cisco ASA/Firepower
  hosts: asa_firepower
  # Best Practice: Disable fact gathering for network devices to optimize performance
  gather_facts: false

  tasks:
    - name: Retrieve performance monitor statistics
      # Best Practice: Use Fully Qualified Collection Names (FQCN)
      ansible.netcommon.cli_command:
        command: show perfmon
      register: perf_mon_output
      # Error Handling: Fail if command is unrecognized or returns empty data
      failed_when:
        - perf_mon_output.stdout | length == 0
        - "'Invalid' in perf_mon_output.stdout"

    - name: Verify performance statistics integrity
      # Observability: Assert that critical metrics exist in the output
      ansible.builtin.assert:
        that:
          - "'CPU' in perf_mon_output.stdout or 'PERFMON' in perf_mon_output.stdout"
        fail_msg: "Performance monitor data is missing or malformed."
        success_msg: "Successfully validated performance monitor telemetry."

    - name: Retrieve interface traffic statistics
      # Idempotency: Read-only operations are inherently safe for repeated execution
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_output
      failed_when:
        - traffic_output.stdout | length == 0
        - "'Invalid' in traffic_output.stdout"

    - name: Verify traffic statistics integrity
      # Observability: Ensure interface-specific data was captured
      ansible.builtin.assert:
        that:
          - "'interface' in traffic_output.stdout or 'input' in traffic_output.stdout"
        fail_msg: "Traffic statistics output does not contain expected interface data."
        success_msg: "Successfully validated interface traffic telemetry."

    - name: Display operational performance metrics
      # Documentation: Provide clear visibility into the state of the firewall
      ansible.builtin.debug:
        msg: |
          ======================= NETLEARNER PERFORMANCE HUB =======================
          STATUS: Success
          
          --- [SHOW PERFMON] ---
          {{ perf_mon_output.stdout }}

          --- [SHOW TRAFFIC] ---
          {{ traffic_output.stdout }}