MCP issues detected. Run /mcp list for status.```yaml
---
- name: Get Cisco ASA/Firepower Connection Table
  # Documentation: This playbook retrieves real-time connection telemetry from security appliances.
  # Idempotency: Read-only 'show' commands are naturally idempotent and safe for repeated execution.
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Capture connection summary
      # Best Practice: Using Fully Qualified Collection Name (FQCN) for consistency.
      ansible.netcommon.cli_command:
        command: show conn
      register: conn_summary
      # Error Handling: Verify the command was executed successfully and not rejected as invalid.
      failed_when:
        - conn_summary.stdout is not defined
        - "'Invalid input' in conn_summary.stdout"

    - name: Validate connection summary telemetry
      # Observability: Assert that the device returned a population of connections.
      ansible.builtin.assert:
        that:
          - "conn_summary.stdout_lines | length > 0"
          - "'in use' in conn_summary.stdout"
        fail_msg: "Connection table summary could not be retrieved or is malformed."
        quiet: true

    - name: Capture detailed connection telemetry
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_detail
      failed_when:
        - conn_detail.stdout is not defined
        - "'Invalid input' in conn_detail.stdout"

    - name: Validate detailed telemetry integrity
      # Observability: Ensure detailed output is present before attempting to process/display.
      ansible.builtin.assert:
        that:
          - "conn_detail.stdout_lines | length > 0"
        fail_msg: "Detailed connection telemetry is empty."
        quiet: true

    - name: Display connection telemetry
      # Documentation: Providing structured visibility into the gathered network state.
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTION SUMMARY =======================
          {{ conn_summary.stdout }}

          ======================= CONNECTION DETAILS =======================
          {{ conn_detail.stdout }}
