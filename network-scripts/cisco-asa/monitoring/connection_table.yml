---
- name: Get ASA Connection Table Information
  hosts: asa_firepower
  gather_facts: false
  # Purpose: Retrieve and validate the current connection table from Cisco ASA/Firepower devices.
  # This provides visibility into active traffic sessions for troubleshooting and audit.

  tasks:
    - name: Retrieve summary connection table
      # Using FQCN for standardized network CLI interactions
      ansible.netcommon.cli_command:
        command: show conn
      register: conn_summary
      # Error Handling: Ensure the command didn't return a device-side error despite a successful SSH session.
      failed_when:
        - conn_summary.stdout is not defined
        - "'Invalid input' in conn_summary.stdout"
        - "'% Error' in conn_summary.stdout"

    - name: Validate summary connection output
      # Observability: Confirm the device returned data to prevent false positives in automation pipelines.
      ansible.builtin.assert:
        that:
          - conn_summary.stdout | length > 0
        fail_msg: "The 'show conn' command returned an empty result."
        success_msg: "Summary connection table successfully retrieved."

    - name: Retrieve detailed connection table
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_detailed
      failed_when:
        - conn_detailed.stdout is not defined
        - "'Invalid input' in conn_detailed.stdout"
        - "'% Error' in conn_detailed.stdout"

    - name: Validate detailed connection output
      # Observability: Ensure detailed metrics are available for deep-packet analysis.
      ansible.builtin.assert:
        that:
          - conn_detailed.stdout | length > 0
        fail_msg: "The 'show conn detail' command returned an empty result."
        success_msg: "Detailed connection table successfully retrieved."

    - name: Display connection information
      # Idempotency: debug tasks do not modify system state and are safe for repeated execution.
      ansible.builtin.debug:
        msg: |
          ======================= SUMMARY CONNECTIONS =======================
          {{ conn_summary.stdout }}
          
          ======================= DETAILED CONNECTIONS =======================
          {{ conn_detailed.stdout }}