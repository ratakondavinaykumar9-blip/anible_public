---
# Playbook: Get Connection Table
# Purpose: Retrieves and validates the connection table from Cisco ASA/Firepower devices.
# Idempotency: Inherently idempotent as these are read-only 'show' commands.
# Best Practices: Uses Fully Qualified Collection Names (FQCN).
- name: Retrieve and Validate ASA Connection Table
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get summary connection table
      # Using FQCN ansible.netcommon.cli_command for standardized network interaction.
      ansible.netcommon.cli_command:
        command: show conn
      register: conn_summary
      # Error Handling: Fail if the transport fails or if the device returns CLI error patterns.
      failed_when: >
        conn_summary.failed or
        'Invalid input' in conn_summary.stdout or
        'incomplete command' in conn_summary.stdout

    - name: Assert summary connection table is not empty
      # Observability: Ensure the command returned data to verify operational state.
      ansible.builtin.assert:
        that:
          - conn_summary.stdout | length > 0
        fail_msg: "Connection summary output was empty. Verify device status and connectivity."
        success_msg: "Connection summary successfully captured."

    - name: Get detailed connection table
      # Detailed connection information is critical for protocol-specific troubleshooting.
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_detail
      failed_when: >
        conn_detail.failed or
        'Invalid input' in conn_detail.stdout or
        'incomplete command' in conn_detail.stdout

    - name: Assert detailed connection table is not empty
      # Observability: Verify the detailed output contains content.
      ansible.builtin.assert:
        that:
          - conn_detail.stdout | length > 0
        fail_msg: "Detailed connection output was empty."
        success_msg: "Detailed connection info successfully captured."

    - name: Display captured connection data
      # Debugging output for operator visibility during execution.
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTIONS SUMMARY =======================
          {{ conn_summary.stdout }}

          ======================= CONNECTIONS DETAILED ======================
          {{ conn_detail.stdout }}