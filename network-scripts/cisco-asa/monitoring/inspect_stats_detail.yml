---
- name: Cisco ASA/Firepower Inspection Statistics Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service-policy inspection statistics via CLI
      # Use FQCN for portability and consistency across environments
      ansible.netcommon.cli_command:
        command: show service-policy inspect
      register: inspection_output
      # Error Handling: Ensure we catch unrecognized commands or device communication failures
      failed_when:
        - inspection_output.failed | default(false)
        - "'Invalid input' in inspection_output.stdout"
      # Idempotency: Read-only operations are inherently idempotent; 
      # check_mode is supported to prevent accidental changes if command syntax varied.
      check_mode: false

    - name: Verify integrity of retrieved inspection data
      # Observability: Assert that the output contains data to ensure the device is responding correctly
      ansible.builtin.assert:
        that:
          - inspection_output.stdout is defined
          - inspection_output.stdout | length > 0
        fail_msg: "Data retrieval failed: Inspection statistics are empty or unavailable."
        success_msg: "Successfully validated inspection statistics retrieval."

    - name: Present formatted inspection statistics for audit
      # Documentation: Display the raw inspection counters to the console for real-time visibility
      ansible.builtin.debug:
        msg: |
          ==================================================================
          INSPECTION STATS FOR {{ inventory_hostname }}
          ==================================================================
          {{ inspection_output.stdout }}