---
# Inspection Stats Detail - Refined for Production Stability
# This playbook retrieves Deep Packet Inspection (DPI) metrics from Cisco security appliances.
# It adheres to Standard:s for reliability and observability.
- name: Inspection Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service-policy inspection statistics
      # FQCN: Using ansible.netcommon.cli_command for cross-platform CLI execution
      # Idempotency: Read-only 'show' commands are inherently idempotent as they do not change device state
      ansible.netcommon.cli_command:
        command: show service-policy inspect
      register: inspect_results
      # Error Handling: Explicitly fail if the command returns an error marker or an empty buffer
      failed_when:
        - inspect_results.stdout == ""
        - "'Invalid input' in inspect_results.stdout"
        - "'%' in inspect_results.stdout"

    - name: Validate captured telemetry data
      # Observability: Assert ensures that the playbook only proceeds with valid, non-empty data
      ansible.builtin.assert:
        that:
          - inspect_results.stdout is defined
          - inspect_results.stdout | length > 0
        fail_msg: "Data acquisition failed: The device returned an empty or invalid response."
        success_msg: "Telemetry successfully captured from the security appliance."

    - name: Display formatted inspection metrics
      # Documentation: Provides a human-readable summary of the DPI engine status
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          {{ inspect_results.stdout }}