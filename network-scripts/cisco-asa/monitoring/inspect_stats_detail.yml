# Inspection Stats Detail
# Purpose: Retrieve and display service-policy inspection statistics from ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, Best Practices.
- name: Inspection Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service-policy inspection statistics
      # Standard: Best Practice - Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show service-policy inspect
      # Standard: Observability - Register output for downstream verification
      register: inspect_result
      # Standard: Error Handling - Define explicit failure conditions based on output content
      failed_when:
        - inspect_result.stdout is not defined
        - "'Invalid' in inspect_result.stdout or 'Error' in inspect_result.stdout"

    - name: Verify that inspection statistics were retrieved
      # Standard: Observability - Use assertion to ensure the command returned non-empty data
      ansible.builtin.assert:
        that:
          - inspect_result.stdout | length > 0
        fail_msg: "Inspection statistics retrieval failed or returned empty content."
        success_msg: "Inspection statistics successfully retrieved and verified."

    - name: Display formatted inspection statistics
      # Standard: Idempotency - This is a read-only operation and is safe for repeated execution
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          {{ inspect_result.stdout }}