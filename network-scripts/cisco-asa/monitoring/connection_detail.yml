# Playbook: Connection Detail Retrieval
# Purpose: Gathers and validates connection state from Cisco ASA/Firepower security appliances.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Comments), Error Handling (Failed_when), FQCN.

- name: Connection Detail Retrieval
  hosts: asa_firepower
  gather_facts: false # Facts are not required for CLI-based command execution, reducing overhead.

  tasks:
    - name: Retrieve connection details via CLI
      # Use Fully Qualified Collection Name (FQCN) for the network CLI module.
      # This operation is idempotent as it performs a non-intrusive state inspection.
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_result
      # Error Handling: Fail if the command is unrecognized or returns a syntax error.
      failed_when: >
        conn_result.failed or 
        "Invalid input" in conn_result.stdout or 
        "ERROR:" in conn_result.stdout

    - name: Verify connection table output is populated
      # Observability: Utilize assertions to confirm state capture before reporting success.
      ansible.builtin.assert:
        that:
          - "conn_result.stdout is defined"
          - "conn_result.stdout | length > 0"
        fail_msg: "The connection table could not be retrieved or is currently empty."
        success_msg: "Connection details successfully registered and validated."

    - name: Output connection details to the terminal
      # Documentation: Provides a structured view for human operators during manual execution.
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTION DETAIL =======================
          {{ conn_result.stdout }}