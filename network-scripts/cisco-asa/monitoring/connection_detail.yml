---
# Playbook: Cisco ASA Connection Detail Retrieval
# Purpose: Gathers and validates 'show conn detail' from ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (asserts), Documentation (comments), FQCN usage.
- name: Connection Detail
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Retrieve connection details using show command
      # Use FQCN for network CLI commands to ensure the correct collection is invoked
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn
      # Ensuring idempotency: read-only commands must not report a change state
      changed_when: false
      # Error handling: capture cases where the device returns an error string instead of data
      failed_when: >
        conn.stdout is not defined or 
        '% Invalid' in conn.stdout or 
        'Error' in conn.stdout

    - name: Validate that connection data was retrieved
      # Observability: Assert that the command output contains content to prevent silent failures
      ansible.builtin.assert:
        that:
          - conn.stdout | length > 0
        fail_msg: "Failed to retrieve connection details: output is empty or invalid."
        success_msg: "Connection details successfully retrieved and validated."

    - name: Display connection details
      # Formatted debug output for human-readable visibility in the automation logs
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTION DETAIL =======================
          {{ conn.stdout }}