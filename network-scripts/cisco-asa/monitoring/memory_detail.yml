# Memory Detail Playbook
# Purpose: Retrieves and validates ASA/Firepower memory statistics for system health monitoring.
- name: Memory Detail
  hosts: asa_firepower
  gather_facts: false # Facts are not required for simple CLI command execution

  tasks:
    - name: Execute 'show memory detail' command
      # Using FQCN (Fully Qualified Collection Name) for consistent cross-platform behavior
      ansible.netcommon.cli_command:
        command: show memory detail
      register: mem_detail
      # Error Handling: Fail if the command returns no data or an 'Invalid input' error
      failed_when:
        - mem_detail.stdout | length == 0
        - "'Invalid input' in mem_detail.stdout"

    - name: Verify command output integrity
      # Observability: Assert that the output contains expected memory keywords to ensure validity
      ansible.builtin.assert:
        that:
          - "'Free memory' in mem_detail.stdout"
        fail_msg: "Memory detail output is missing expected data markers or returned an error."
        quiet: true

    - name: Display formatted memory details
      # Idempotency: This is a read-only display task and is safe to execute repeatedly
      ansible.builtin.debug:
        msg: |
          ======================= MEMORY DETAIL =======================
          {{ mem_detail.stdout }}