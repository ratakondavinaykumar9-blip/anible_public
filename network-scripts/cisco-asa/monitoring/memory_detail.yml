---
- name: Cisco ASA/Firepower Memory Detail Analysis
  hosts: asa_firepower
  gather_facts: false
  # Standardizing on false for YAML consistency in network automation

  tasks:
    - name: Retrieve detailed memory statistics from the security appliance
      # FQCN: Using ansible.netcommon.cli_command for cross-platform network compatibility
      ansible.netcommon.cli_command:
        command: show memory detail
      register: mem_output
      # Error Handling: Ensure the playbook fails if the command returns an empty string or fails at the CLI level
      failed_when: 
        - mem_output.stdout is not defined or mem_output.stdout | length == 0

    - name: Validate successful memory data acquisition
      # Observability: Asserting that the output contains expected data to ensure the session was valid
      ansible.builtin.assert:
        that:
          - "'Free memory' in mem_output.stdout or 'Used memory' in mem_output.stdout"
        fail_msg: "The 'show memory detail' command did not return the expected memory statistics."
        success_msg: "Memory details successfully validated and parsed."

    - name: Output memory detail for operational visibility
      # Documentation: Providing a clear visual delimiter for log analysis and manual review
      ansible.builtin.debug:
        msg: |
          ======================= MEMORY DETAIL =======================
          {{ mem_output.stdout }}