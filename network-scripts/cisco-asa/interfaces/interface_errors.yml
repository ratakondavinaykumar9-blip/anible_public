---
# Playbook: Check Interface Errors
# Purpose: Retrieves interface-level health statistics (CRC, collisions, errors) from ASA/Firepower devices.
# Standards: Idempotent (read-only), Observable (assert), and FQCN compliant.
- name: Get Interface Errors
  hosts: asa_firepower
  gather_facts: false
  tasks:
    - name: Execute hardware error check on interfaces
      # Use FQCN for plugin consistency and future-proofing
      ansible.netcommon.cli_command:
        command: "show interface | include (error|CRC|collision)"
      register: interface_errors
      # Mark as read-only to ensure idempotency and prevent false 'changed' states in reporting
      changed_when: false
      # Ensure the task only fails if the underlying connection or command execution fails, 
      # not if the 'include' filter returns zero matches.
      failed_when: interface_errors.failed

    - name: Verify telemetry collection success
      # Observability: Validate that the command returned a structured response
      ansible.builtin.assert:
        that:
          - "interface_errors.stdout is defined"
        fail_msg: "Critical failure: No output received from the device during interface error check."
        success_msg: "Telemetry successfully captured from host."

    - name: Report identified interface errors
      # Conditional display: provides clear feedback even if the output is empty (no errors found)
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS =======================
          {{ interface_errors.stdout | default('No interface errors, CRCs, or collisions detected.') }}