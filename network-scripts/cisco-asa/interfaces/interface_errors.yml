---
# Check Interface Errors
# This playbook retrieves interface error statistics (Errors, CRC, Collisions)
# from Cisco ASA/Firepower devices to monitor link health and physical layer integrity.
- name: Get Interface Errors
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show interface command to filter for errors
      # Using FQCN: ansible.netcommon.cli_command is the standard for generic CLI execution.
      # Idempotency: Read-only commands do not modify state, making this task inherently safe.
      ansible.netcommon.cli_command:
        command: "show interface | include (error|CRC|collision)"
      register: interface_errors
      # Error Handling: Ensure we fail if the command cannot be executed, but not if the result is empty.
      failed_when: interface_errors.failed | default(false)

    - name: Validate command execution and output presence
      # Observability: Using assert to verify that the device returned a valid response.
      ansible.builtin.assert:
        that:
          - interface_errors.stdout is defined
        fail_msg: "The command 'show interface' failed to return output on {{ inventory_hostname }}."
        success_msg: "Interface error data successfully captured from {{ inventory_hostname }}."

    - name: Display Interface Error Findings
      # Documentation: Providing a structured output for human operators.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS: {{ inventory_hostname }} =======================
          {{ interface_errors.stdout if interface_errors.stdout != '' else 'No Errors, CRCs, or Collisions detected.' }}