---
# Check Interface Health and Errors
# This playbook identifies potential physical or link-layer issues (CRC, collisions) 
# on ASA/Firepower interfaces to enable proactive maintenance and observability.
- name: Monitor Interface Error Statistics
  hosts: asa_firepower
  gather_facts: false # Facts are disabled to minimize execution overhead on network appliances

  tasks:
    - name: Retrieve error, CRC, and collision counters from interfaces
      # Standard 5: Fully Qualified Collection Names (FQCN) ensure consistency and clarity
      ansible.netcommon.cli_command:
        command: "show interface | include (error|CRC|collision)"
      register: errors_output
      # Standard 1: Idempotency - Marking read-only operational checks as 'changed_when: false'
      changed_when: false
      # Standard 4: Error Handling - Explicitly define failure conditions for command execution
      failed_when: 
        - errors_output.failed | default(false)
        - errors_output.stdout is not defined

    - name: Verify integrity of the retrieved interface data
      # Standard 2: Observability - Asserting that the registered variable contains usable data
      ansible.builtin.assert:
        that:
          - errors_output.stdout is defined
          - errors_output.stdout | length > 0
        fail_msg: "Interface error statistics could not be retrieved for {{ inventory_hostname }}"
        quiet: true

    - name: Display formatted interface error report
      # Standard 3: Documentation - Explaining the 'why' and providing clear output for operators
      ansible.builtin.debug:
        msg: |
          ================================================================
          DEVICE: {{ inventory_hostname }}
          TASK: Physical Interface Health Audit (CRC/Errors/Collisions)
          ================================================================
          {{ errors_output.stdout }}
          ================================================================
