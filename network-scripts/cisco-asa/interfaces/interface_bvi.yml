---
# Playbook: Bridge Virtual Interface (BVI) Status Retrieval
# Purpose: Gathers real-time status and configuration for the BVI on Cisco ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Retrieve ASA BVI Interface Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Execute 'show interface BVI' on ASA/Firepower"
      # Using FQCN for cross-platform network command execution.
      # This task is idempotent as it performs a read-only 'show' operation.
      ansible.netcommon.cli_command:
        command: show interface BVI
      register: bvi_output
      # Error Handling: Handle scenarios where the BVI may not be configured or the command fails.
      failed_when: 
        - bvi_output.failed
        - "'Invalid input' in bvi_output.stdout"

    - name: "Observability: Validate BVI Output Content"
      # Asserting that the command returned valid and non-empty stdout to ensure observability.
      ansible.builtin.assert:
        that:
          - bvi_output.stdout is defined
          - bvi_output.stdout | length > 0
        fail_msg: "Critical: Failed to retrieve BVI details or the interface is not configured."
        success_msg: "Successfully verified BVI interface status."

    - name: "Display: Formatted BVI Interface Status"
      # Providing visibility into the current operational state of the bridge virtual interface.
      ansible.builtin.debug:
        msg: |
          ======================= BVI STATUS =======================
          {{ bvi_output.stdout }}