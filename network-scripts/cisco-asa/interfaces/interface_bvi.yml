# Bridge Virtual Interface (BVI) Status Verification
# Purpose: Retrieves and validates the BVI status to ensure bridge-group connectivity is operational.
- name: Get and Verify Bridge Virtual Interface (BVI)
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve BVI interface status
      # FQCN: Using ansible.netcommon.cli_command for standardized CLI execution across network devices.
      # Idempotency: This is a read-only operation; it is safe to run multiple times without changing state.
      ansible.netcommon.cli_command:
        command: show interface BVI
      register: bvi_output
      # Error Handling: Explicitly fail if the interface is missing or the command is unrecognized by the OS.
      failed_when:
        - bvi_output.failed or "Invalid input" in bvi_output.stdout or "not found" in bvi_output.stdout

    - name: Validate BVI observability
      # Observability: Ensure that the command output is populated and meaningful before proceeding.
      ansible.builtin.assert:
        that:
          - bvi_output.stdout is defined
          - bvi_output.stdout | length > 0
        fail_msg: "Data Capture Error: The BVI interface may not be configured on this host."
        success_msg: "Data Capture Success: BVI interface status retrieved and validated."

    - name: Display BVI status report
      # Documentation: Provide a formatted view of the BVI status for operational auditing and transparency.
      ansible.builtin.debug:
        msg: |
          ======================= BVI STATUS REPORT =======================
          {{ bvi_output.stdout }}