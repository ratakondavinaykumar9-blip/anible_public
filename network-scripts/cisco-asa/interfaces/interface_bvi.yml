---
# NetLearner Architect Standardized Playbook: BVI Retrieval
# Purpose: Retrieves the configuration and operational status of the Bridge Virtual Interface (BVI).
# Idempotency: This playbook is inherently idempotent as it utilizes read-only 'show' commands.
- name: Get Bridge Virtual Interface (BVI) Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show interface BVI' command
      # Use Fully Qualified Collection Name (FQCN) for consistency and portability.
      ansible.netcommon.cli_command:
        command: show interface BVI
      register: bvi_result
      # Error Handling: Do not fail if the BVI interface is simply not configured on the device.
      # We only fail on actual communication or execution errors.
      failed_when: 
        - bvi_result.failed
        - "'Invalid input' not in bvi_result.stdout"
        - "'not found' not in bvi_result.stdout"

    - name: Validate command response integrity
      # Observability: Ensure that the command returned a valid stdout object to prevent downstream failures.
      ansible.builtin.assert:
        that:
          - bvi_result.stdout is defined
        fail_msg: "Data retrieval failure: No output received from {{ inventory_hostname }}."
        quiet: true

    - name: Provide formatted operational visibility
      # Documentation: Use a structured debug message to clearly indicate if the BVI is present or missing.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          BVI STATUS REPORT - {{ inventory_hostname }}
          ===========================================================
          {{ bvi_result.stdout if 'interface BVI' in bvi_result.stdout else 'INFO: BVI interface is not configured on this device.' }}