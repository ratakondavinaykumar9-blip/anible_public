MCP issues detected. Run /mcp list for status.```yaml
---
- name: Verify and Display Trunk Interfaces
  hosts: asa_firepower
  gather_facts: false # Performance: Fact gathering is unnecessary for simple CLI verification tasks

  tasks:
    - name: Retrieve Trunk Interface Status
      # Best Practice: Use FQCN (Fully Qualified Collection Name) for predictable module resolution
      # Documentation: Capturing operational state to facilitate audit trails and pre-change validation
      ansible.netcommon.cli_command:
        command: show trunk
      register: trunk_result
      # Error Handling: Fail explicitly if the device returns common CLI error patterns
      failed_when:
        - trunk_result.failed or "Invalid input" in trunk_result.stdout or "Incomplete command" in trunk_result.stdout

    - name: Validate Trunk Data Integrity
      # Observability: Assert that the command returned meaningful output to prevent silent failures
      ansible.builtin.assert:
        that:
          - "trunk_result.stdout is defined"
          - "trunk_result.stdout | length > 0"
        fail_msg: "Trunk data retrieval failed: Output was empty or undefined."
        success_msg: "Trunk interface data successfully captured and validated."

    - name: Display Operational Trunk State
      # Idempotency: This task is read-only and safe to execute repeatedly across maintenance windows
      ansible.builtin.debug:
        msg: |
          =====================================================
          NETLEARNER ARCHITECT - OPERATIONAL STATUS: TRUNK
          =====================================================
          {{ trunk_result.stdout }}
