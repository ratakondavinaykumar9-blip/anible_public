---
# NetLearner Optimized Interface MAC Audit
# Purpose: Retrieves and validates MAC addresses from ASA/Firepower devices for auditing.
# This playbook is idempotent by design as it performs read-only operations without state change.
- name: Interface MAC Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Collect interface MAC addresses from security appliance"
      # FQCN: Using ansible.netcommon.cli_command for cross-platform network command execution.
      ansible.netcommon.cli_command:
        command: "show interface | include (address|MAC)"
      register: mac_audit
      # Error Handling: Ensure we fail if the command is unrecognized or returns an error.
      failed_when:
        - mac_audit.failed
        - "'Invalid input' in mac_audit.stdout"

    - name: "Verify MAC address data was successfully retrieved"
      # Observability: Assert that the command output contains data to ensure visibility into device state.
      ansible.builtin.assert:
        that:
          - "mac_audit.stdout is defined"
          - "mac_audit.stdout | length > 0"
        fail_msg: "Failed to retrieve MAC address information from {{ inventory_hostname }}."
        success_msg: "Interface MAC address data successfully captured."

    - name: "Display formatted MAC address information"
      # Documentation: Provides a clear, formatted summary for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE MAC AUDIT =======================
          DEVICE: {{ inventory_hostname }}
          STATUS: Success
          -------------------------------------------------------------------
          {{ mac_audit.stdout }}