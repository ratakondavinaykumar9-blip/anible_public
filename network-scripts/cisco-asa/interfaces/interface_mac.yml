---
# This playbook retrieves interface MAC addresses from Cisco ASA/Firepower devices.
# Standards: Idempotent (read-only), Observability (assert), Documentation (comments),
# Error Handling (failed_when), Best Practices (FQCN).
- name: Interface MAC Address Retrieval
  hosts: asa_firepower
  gather_facts: false # Optimization: Fact gathering is not required for this operational command

  tasks:
    - name: Execute show command to retrieve interface MAC addresses
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: "show interface | include (address|MAC)"
      register: mac_output
      # Error Handling: Fail if the command returns an error or invalid input message
      failed_when:
        - mac_output.failed | default(false)
        - "'Invalid input' in mac_output.stdout"

    - name: Validate successful data retrieval
      # Observability: Ensure the output is not empty before attempting to display it
      ansible.builtin.assert:
        that:
          - "mac_output.stdout is defined"
          - "mac_output.stdout | length > 0"
        fail_msg: "The command returned no data. Check device connectivity or interface status."
        success_msg: "Successfully captured interface MAC address information."

    - name: Display formatted MAC address information
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE MAC =======================
          {{ mac_output.stdout }}