---
# Playbook: Audit EtherChannel Configuration
# Standards: Idempotent (Read-only), Observability (Assert), FQCN Usage.
# Purpose: This playbook retrieves and validates EtherChannel status on ASA/Firepower devices 
# to ensure architectural compliance and link redundancy.

- name: Get EtherChannel Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show etherchannel' command
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction.
      ansible.netcommon.cli_command:
        command: show etherchannel
      register: ec_result
      # Error Handling: Fail if the command execution fails or returns CLI-specific error patterns.
      failed_when:
        - ec_result.failed
        - "'Invalid input' in ec_result.stdout"

    - name: Validate EtherChannel data retrieval
      # Observability: Asserting that the output is defined and contains data ensures 
      # we are not processing null states in downstream automation.
      ansible.builtin.assert:
        that:
          - ec_result.stdout is defined
          - ec_result.stdout | length > 0
        fail_msg: "EtherChannel output is empty. The device may not have EtherChannels configured."
        success_msg: "EtherChannel data successfully captured."

    - name: Display formatted EtherChannel status
      # Documentation: Providing a clear, structured view of the operational state for the architect.
      ansible.builtin.debug:
        msg: |
          ======================= ETHERCHANNEL DATA =======================
          HOST: {{ inventory_hostname }}
          RETRIEVAL STATUS: SUCCESS
          -----------------------------------------------------------------
          {{ ec_result.stdout }}
