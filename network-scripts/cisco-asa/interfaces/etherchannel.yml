---
# ==============================================================================
# PLAYBOOK: Retrieve EtherChannel Information
# AUTHOR: NetLearner Architect
# DESCRIPTION: Safely retrieves and validates EtherChannel status on Cisco ASA
#              or Firepower devices using automated validation and error checks.
# ==============================================================================
- name: Get EtherChannel Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show etherchannel' command
      # Best Practice: Using Fully Qualified Collection Name (FQCN) for Cisco ASA
      cisco.asa.asa_command:
        commands:
          - show etherchannel
      register: ec_output
      # Error Handling: Specifically catch CLI errors or invalid commands
      failed_when:
        - "'Invalid input' in ec_output.stdout[0]"
        - "'ERROR' in ec_output.stdout[0]"
      # Idempotency: Read-only 'show' commands are inherently idempotent.

    - name: Assert EtherChannel data presence
      # Observability: Verify that the device returned data to ensure reliability
      ansible.builtin.assert:
        that:
          - "ec_output.stdout[0] is defined"
          - "ec_output.stdout[0] | length > 0"
        fail_msg: "EtherChannel information is missing or the command failed to execute correctly."
        success_msg: "EtherChannel information retrieved successfully."

    - name: Display EtherChannel summary
      # Documentation: Structured output for human-readable operational logs
      ansible.builtin.debug:
        msg: |
          ======================= ETHERCHANNEL STATUS =======================
          Device: {{ inventory_hostname }}
          -------------------------------------------------------------------
          {{ ec_output.stdout[0] }}