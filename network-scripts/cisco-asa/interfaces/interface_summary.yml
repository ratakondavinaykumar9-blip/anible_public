---
# Architect: Improved Interface Summary Playbook
# This playbook retrieves and validates the interface summary from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation, FQCN.
- name: Interface Summary and Validation
  hosts: asa_firepower
  gather_facts: false # Facts are disabled to optimize execution time as they aren't required.

  tasks:
    - name: Retrieve interface summary via CLI
      # Using Fully Qualified Collection Name (FQCN) for portability and clarity.
      ansible.netcommon.cli_command:
        command: show interface summary
      register: summary_output
      # Error Handling: Fail if the command is unrecognized or the return code is non-zero.
      failed_when:
        - summary_output.rc != 0
        - "'Invalid input' in summary_output.stdout"

    - name: Validate interface summary data
      # Observability: Assert that the output contains data to ensure the operation was meaningful.
      ansible.builtin.assert:
        that:
          - summary_output.stdout is defined
          - summary_output.stdout | length > 0
        fail_msg: "The 'show interface summary' command returned empty or invalid data."
        success_msg: "Interface summary successfully retrieved and verified."

    - name: Display formatted interface summary
      # Documentation: Provides the operator with a clear visual representation of the state.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE SUMMARY =======================
          {{ summary_output.stdout }}

    # Note on Idempotency: This playbook is inherently idempotent because it utilizes 
    # read-only 'show' commands which do not alter the persistent state of the device.