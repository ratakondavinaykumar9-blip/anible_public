---
# Playbook to retrieve and validate the interface summary from Cisco ASA/Firepower devices.
# This playbook ensures observability and follows network automation best practices.
- name: Cisco ASA Interface Summary
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve interface summary
      # Use the Fully Qualified Collection Name (FQCN) for Cisco ASA
      cisco.asa.asa_command:
        commands:
          - show interface summary
      register: summary_result
      # Error Handling: Ensure the task fails if the output is empty or if the CLI returns an error
      failed_when: 
        - summary_result.stdout[0] == ""
        - "'Invalid input' in summary_result.stdout[0]"

    - name: Validate interface summary output
      # Observability: Assert that the command returned the expected structural data
      ansible.builtin.assert:
        that:
          - "'Interface' in summary_result.stdout[0]"
        fail_msg: "Interface summary output is invalid or missing expected headers."
        success_msg: "Interface summary retrieved and verified successfully."

    - name: Display formatted summary
      # Documentation: Provide clear visibility into the current state of the interfaces
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE SUMMARY =======================
          {{ summary_result.stdout[0] }}