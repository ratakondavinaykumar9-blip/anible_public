# Interface Summary Retrieval and Validation
# This playbook retrieves the operational status of interfaces on Cisco ASA/Firepower devices.
# It implements NetLearner standards for observability, documentation, and error handling.
- name: Interface Summary
  hosts: asa_firepower
  gather_facts: false # Operational tasks do not require facts gathering

  tasks:
    - name: Get interface summary from CLI
      # Using Fully Qualified Collection Name (FQCN) for consistency across environments
      ansible.netcommon.cli_command:
        command: show interface summary
      register: summary_output
      # Ensure the task fails if the output indicates an invalid command or is missing
      failed_when: 
        - summary_output.stdout is not defined or summary_output.stdout | length == 0
        - "'Invalid input' in summary_output.stdout"

    - name: Verify summary output integrity
      # Observability: Assert that the retrieved data contains expected content to ensure validity
      ansible.builtin.assert:
        that:
          - "'Interface' in summary_output.stdout"
          - "'Summary' in summary_output.stdout or 'Status' in summary_output.stdout"
        fail_msg: "Interface summary returned empty or invalid data from {{ inventory_hostname }}"
        success_msg: "Interface summary validated for {{ inventory_hostname }}"

    - name: Display Interface Summary
      # Provides operational visibility into the device state for the engineer
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE SUMMARY: {{ inventory_hostname }} =======================
          {{ summary_output.stdout }}