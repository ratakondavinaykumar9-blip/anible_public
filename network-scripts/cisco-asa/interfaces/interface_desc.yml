---
# Playbook: Fetch and Validate ASA Interface Descriptions
# This playbook retrieves interface descriptions for documentation and auditing purposes.
# Idempotency: This is a read-only operation; it is safe to run repeatedly as it does not modify device state.
- name: Get Interface Descriptions
  hosts: asa_firepower
  gather_facts: false # Performance: Skip setup as system facts are not required for CLI command execution

  tasks:
    - name: Retrieve interface descriptions via CLI
      # Use Fully Qualified Collection Name (FQCN) for the network command execution
      ansible.netcommon.cli_command:
        command: show interface description
      register: desc
      # Error Handling: Fail explicitly if the command returns empty or if the CLI returns an error message
      failed_when: 
        - (desc.stdout | length == 0) or ("Invalid" in desc.stdout) or ("Error" in desc.stdout)

    - name: Verify output integrity (Observability)
      # Assert ensures the playbook stops with a clear message if data capture was unsuccessful
      ansible.builtin.assert:
        that:
          - desc.stdout is defined
          - desc.stdout | length > 0
        fail_msg: "Data validation failed: The command returned no output. Verify device connectivity."
        success_msg: "Observability Check: Interface descriptions successfully captured and verified."

    - name: Display formatted interface information
      # Use debug to present the captured output in a readable format for logs and audits
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE DESCRIPTIONS =======================
          {{ desc.stdout }}