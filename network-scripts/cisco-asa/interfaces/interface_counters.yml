---
- name: Retrieve Cisco ASA Interface Statistics
  hosts: asa_firepower
  gather_facts: false
  # Standard: Documentation - Provides read-only visibility into interface health for monitoring

  tasks:
    - name: Fetch interface counters using regex filtering
      # Standard: Best Practices - Use FQCN for specific platform collections
      # Standard: Idempotency - Read-only commands are inherently idempotent and safe for repeated execution
      cisco.asa.asa_command:
        commands:
          - show interface | include (OK|input packets|output packets)
      register: interface_counters
      # Standard: Error Handling - Prevents silent failures if the command returns an error or empty string
      failed_when:
        - interface_counters.failed or interface_counters.stdout[0] == ""
        - "'Invalid input' in interface_counters.stdout[0]"

    - name: Validate that counter data was successfully retrieved
      # Standard: Observability - Explicitly verify the data exists before proceeding
      ansible.builtin.assert:
        that:
          - interface_counters.stdout[0] | length > 0
        fail_msg: "Interface counter data is missing or could not be parsed."
        success_msg: "Interface statistics successfully captured."

    - name: Display captured interface statistics
      # Standard: Observability - Outputs the filtered results for manual verification/logging
      ansible.builtin.debug:
        msg: "{{ interface_counters.stdout_lines[0] }}"