# NetLearner Architect Standard - Interface Statistics Retrieval
# Purpose: Gathers interface packet counters for Cisco ASA/Firepower platforms.
# Standards: Idempotency (Read-only), Observability (Assert), Best Practices (FQCN).
- name: Get Interface Counters
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show interface command
      # Why: Using cli_command for filtered retrieval. Safe for repeat execution (Idempotent).
      ansible.netcommon.cli_command:
        command: "show interface | include (OK|input packets|output packets)"
      register: counters
      # Error Handling: Explicit failure if command returns no data to prevent silent success.
      failed_when: counters.stdout == ""

    - name: Verify counter data integrity
      # Why: Observability check to confirm the response contains expected operational status flags.
      ansible.builtin.assert:
        that:
          - "'OK' in counters.stdout"
        fail_msg: "Interface data is missing status flags. Verify connectivity and CLI permissions."
        success_msg: "Interface counters successfully validated."

    - name: Output interface statistics
      # Why: Provides formatted output of counters for audit logging and manual review.
      ansible.builtin.debug:
        msg: "{{ counters.stdout_lines }}"

---