---
# Interface IP Configuration Audit
# This playbook retrieves and validates interface IP settings on ASA/Firepower devices.
- name: Interface IP Config
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current interface IP configuration
      # Use FQCN for platform-specific command execution
      # This task is inherently idempotent as it only reads the device state
      cisco.asa.asa_command:
        commands:
          - show ip address
      register: ip_output
      # Error handling: fail if the command execution fails or returns an error string
      failed_when: 
        - ip_output.failed
        - "'Invalid' in ip_output.stdout[0]"

    - name: Verify retrieval of interface data
      # Observability: Assert that the output contains expected headers to ensure data integrity
      ansible.builtin.assert:
        that:
          - "'Interface' in ip_output.stdout[0]"
          - "'IP-Address' in ip_output.stdout[0]"
        fail_msg: "The 'show ip address' command returned unexpected or empty results."
        success_msg: "Interface IP configuration successfully retrieved and validated."

    - name: Display Interface IP Configuration
      # Documentation: Provide a formatted view of the operational state for the operator
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE IP =======================
          {{ ip_output.stdout[0] }}