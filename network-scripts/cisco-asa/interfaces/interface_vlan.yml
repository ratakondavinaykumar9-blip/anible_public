---
# ==============================================================================
# PLAYBOOK: Cisco ASA VLAN Interface Retrieval
# DESCRIPTION: Fetches and displays VLAN interface status from Cisco ASA/Firepower.
# STANDARDS: Idempotent, Observable, Documented, and uses FQCN.
# ==============================================================================
- name: Retrieve and Validate VLAN Interfaces
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show interface VLAN' command
      # Using FQCN (ansible.netcommon) for cross-version compatibility.
      # Read-only commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: show interface VLAN
      register: vlan_result
      # Error Handling: Fail if the device returns an error message or command is unrecognized.
      failed_when:
        - vlan_result.failed or "Invalid input" in vlan_result.stdout

    - name: Validate command output content
      # Observability: Ensure that the command returned data before proceeding.
      ansible.builtin.assert:
        that:
          - vlan_result.stdout is defined
          - vlan_result.stdout | length > 0
        fail_msg: "VLAN interface data could not be retrieved or is empty."
        success_msg: "Successfully captured VLAN interface configuration."

    - name: Display VLAN interface details
      # Providing a structured view for better observability in automation logs.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          DEVICE: {{ inventory_hostname }}
          COMMAND: show interface VLAN
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ======================================================================
          {{ vlan_result.stdout }}
          ======================================================================