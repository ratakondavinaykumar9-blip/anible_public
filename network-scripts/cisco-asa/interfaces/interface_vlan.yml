MCP issues detected. Run /mcp list for status.```yaml
---
- name: Audit VLAN Interface Configurations
  hosts: asa_firepower
  gather_facts: false
  # This playbook is inherently idempotent as it performs read-only operations.
  # It provides observability into the network state and validates device responses.

  tasks:
    - name: Retrieve VLAN interface status from Cisco ASA
      # Using FQCN for platform-specific execution and better performance
      cisco.asa.asa_command:
        commands:
          - show interface VLAN
      register: vlan_result
      # Identify failures if the command is unrecognized or the session times out
      failed_when: 
        - vlan_result.failed or "Invalid input" in vlan_result.stdout[0]

    - name: Validate VLAN output integrity
      # Observability: Ensure we received a non-empty response before proceeding
      ansible.builtin.assert:
        that:
          - vlan_result.stdout[0] | length > 0
          - "'VLAN' in vlan_result.stdout[0]"
        fail_msg: "Device {{ inventory_hostname }} returned invalid or empty VLAN data."
        success_msg: "VLAN interface data successfully validated for {{ inventory_hostname }}."

    - name: Display formatted VLAN interface status
      # Observability: Structured output for logging and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= VLAN INTERFACES: {{ inventory_hostname }} =======================
          {{ vlan_result.stdout[0] }}
```