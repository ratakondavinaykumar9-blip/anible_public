# Playbook to retrieve and validate Cisco ASA/Firepower Port-Channel status.
# This is part of the NetLearner Staging infrastructure validation suite.
- name: Cisco ASA/Firepower Port-Channel Operational Audit
  hosts: asa_firepower
  gather_facts: false # Performance optimization: ASA facts are often not required for CLI audits.

  tasks:
    - name: Retrieve Port-Channel operational state from device
      # Using FQCN (Fully Qualified Collection Name) for architectural consistency.
      # Read-only 'show' commands are inherently idempotent and safe for repeated runs.
      ansible.netcommon.cli_command:
        command: show port-channel
      register: portch_output
      # Error Handling: Fail explicitly if the command is unrecognized or the device returns an error.
      failed_when: 
        - portch_output.stdout is not defined
        - "'Invalid input' in portch_output.stdout"
        - "'% Invalid' in portch_output.stdout"

    - name: Validate Port-Channel output integrity
      # Observability: Assert that the command returned actionable data before proceeding.
      ansible.builtin.assert:
        that:
          - portch_output.stdout | length > 0
        fail_msg: "Device returned an empty response for Port-Channel status."
        success_msg: "Port-Channel operational data successfully captured."

    - name: Display Port-Channel operational status
      ansible.builtin.debug:
        msg: |
          ======================= PORT CHANNEL DATA =======================
          {{ portch_output.stdout }}
      # Best practice: Conditional execution to minimize console noise in automation logs.
      when: portch_output.stdout | length > 0