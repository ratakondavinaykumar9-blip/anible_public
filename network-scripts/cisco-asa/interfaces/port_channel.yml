---
# ==============================================================================
# Playbook: Show Port Channel Information
# Description: Retrieves and validates Port Channel status from ASA/Firepower devices.
# Standards: Idempotency, Observability, FQCN, and Error Handling.
# ==============================================================================
- name: Get Port Channel Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve port-channel status from device
      # Using FQCN (Fully Qualified Collection Name) for network command execution.
      # This task is inherently idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: show port-channel
      register: portch_result
      # Error Handling: Explicitly fail if the device returns common error strings.
      failed_when: 
        - "'Invalid input' in portch_result.stdout"
        - "'ERROR' in portch_result.stdout"

    - name: Validate observability of the command output
      # Observability: Assert that the command returned data to ensure the session was valid.
      ansible.builtin.assert:
        that:
          - portch_result.stdout is defined
          - portch_result.stdout | length > 0
        fail_msg: "Port-channel information could not be retrieved or is empty."
        success_msg: "Successfully retrieved port-channel status from {{ inventory_hostname }}."

    - name: Display Formatted Port Channel Status
      # Documentation: Providing a structured view of the retrieved operational data.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          DEVICE: {{ inventory_hostname }}
          PORT CHANNEL STATUS:
          ======================================================================
          {{ portch_result.stdout }}