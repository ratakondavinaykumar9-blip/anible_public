---
- name: Get Interface Traffic Rates
  hosts: asa_firepower
  gather_facts: false
  # This playbook is inherently idempotent as it performs read-only monitoring 
  # and does not modify the device configuration state.

  tasks:
    - name: Retrieve per-interface traffic statistics from the security appliance
      # Use Fully Qualified Collection Name (FQCN) for the command module.
      # We register the output to enable observability and validation in subsequent steps.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_output
      # Error Handling: Fail the task if the output is empty or indicates a CLI syntax error.
      failed_when:
        - traffic_output.stdout | length == 0
        - "'Invalid input' in traffic_output.stdout"

    - name: Validate that traffic statistics were successfully captured
      # Observability: Assert that the output contains expected keywords (e.g., 'interface').
      # This ensures the playbook doesn't report "success" on garbled or incomplete data.
      ansible.builtin.assert:
        that:
          - "'interface' in traffic_output.stdout | lower"
        fail_msg: "The 'show traffic' command did not return expected interface data."
        success_msg: "Successfully verified the presence of interface traffic statistics."

    - name: Display formatted traffic rates for operational visibility
      # Outputting the data for human review.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC RATES =======================
          {{ traffic_output.stdout }}