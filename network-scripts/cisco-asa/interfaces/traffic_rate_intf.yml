---
# NetLearner Architect Standardized Playbook: Interface Traffic Rate Retrieval
# This playbook retrieves real-time traffic statistics from Cisco ASA/Firepower devices.
# Applied Standards: Idempotency (Read-only), Observability (Assert), Documentation, Error Handling, and FQCN.
- name: Get Interface Traffic Rates
  hosts: asa_firepower
  gather_facts: false
  # Read-only operation: ensuring the task executes even during --check mode runs.
  check_mode: false

  tasks:
    - name: Retrieve interface traffic statistics via CLI
      # Utilizing Fully Qualified Collection Name (FQCN) for consistent module resolution.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      # Error Handling: Catch device-specific error strings that may not trigger standard failures.
      failed_when: >
        traffic_result.failed or
        "Invalid input" in traffic_result.stdout or
        "Permission denied" in traffic_result.stdout

    - name: Validate traffic output integrity
      # Observability: Assert that the device returned a non-empty string to verify data capture.
      ansible.builtin.assert:
        that:
          - traffic_result.stdout is defined
          - traffic_result.stdout | length > 0
        fail_msg: "The traffic rate data for {{ inventory_hostname }} is missing or inaccessible."
        quiet: true

    - name: Display captured traffic statistics
      # Observability: Provide formatted output for administrative review and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC RATES: {{ inventory_hostname }} =======================
          {{ traffic_result.stdout }}
