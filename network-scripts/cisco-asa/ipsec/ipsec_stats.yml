# IPSec Statistics and Counters Audit
# This playbook gathers IPsec and IKEv1 statistics from Cisco ASA/Firepower devices.
# Compliance: NetLearner Staging Automation Standards (FQCN, Idempotency, Observability).
- name: Get IPSec Statistics
  hosts: asa_firepower
  gather_facts: false # Device facts are not required for command-based telemetry gathering.

  tasks:
    - name: Retrieve IPsec Security Association (SA) details
      # FQCN: Using ansible.netcommon.cli_command for platform-agnostic CLI interaction.
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa detail
      register: sa_detail
      # Error Handling: Fail if output indicates an invalid command or unexpected error.
      failed_when: >
        sa_detail.stdout is not defined or 
        'Invalid input' in sa_detail.stdout or 
        'ERROR:' in sa_detail.stdout

    - name: Verify IPsec SA data integrity
      # Observability: Assert that output contains expected identifiers or known empty state messages.
      ansible.builtin.assert:
        that:
          - sa_detail.stdout | length > 0
          - "'local ident' in sa_detail.stdout or 'No active' in sa_detail.stdout"
        fail_msg: "Unexpected response format or empty output while retrieving IPsec SA details."
        quiet: true

    - name: Retrieve global IPsec processing statistics
      ansible.netcommon.cli_command:
        command: show crypto ipsec stats
      register: stats
      failed_when: >
        stats.stdout is not defined or 
        'Invalid input' in stats.stdout

    - name: Retrieve IKEv1 (ISAKMP) negotiation statistics
      ansible.netcommon.cli_command:
        command: show crypto isakmp stats
      register: ike_stats
      failed_when: >
        ike_stats.stdout is not defined or 
        'Invalid input' in ike_stats.stdout

    - name: Display NetLearner IPSec Telemetry Report
      # Observability: Consolidate registered outputs into a single readable debug message for auditing.
      ansible.builtin.debug:
        msg: |
          ======================= NETLEARNER AUDIT: {{ inventory_hostname }} =======================
          TIMESTAMP: {{ lookup('ansible.builtin.pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          --- [ CRYPTO IPSEC SA DETAIL ] ---
          {{ sa_detail.stdout }}
          
          --- [ CRYPTO IPSEC STATS ] ---
          {{ stats.stdout }}
          
          --- [ CRYPTO ISAKMP STATS ] ---
          {{ ike_stats.stdout }}