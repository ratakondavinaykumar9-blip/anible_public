---
# IPSec Statistics and Counters Performance Audit
# This playbook gathers critical VPN health metrics from Cisco ASA/Firepower devices.
# It follows high-availability standards for idempotency and observability.
- name: Get IPSec Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve detailed IPsec Security Association (SA) information
      # FQCN: using ansible.netcommon.cli_command for broad compatibility across network OS variants
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa detail
      register: sa_detail
      # Error Handling: Ensure the command executed successfully without returning CLI-level errors
      failed_when: 
        - sa_detail.failed
        - "'Invalid input' in sa_detail.stdout"

    - name: Verify IPsec SA data integrity
      # Observability: Assert that the output contains expected cryptographic headers
      ansible.builtin.assert:
        that:
          - "sa_detail.stdout is defined"
          - "'interface:' in sa_detail.stdout or 'No SAs found' in sa_detail.stdout"
        fail_msg: "Failed to retrieve valid IPsec SA details."

    - name: Retrieve global IPsec protocol statistics
      ansible.netcommon.cli_command:
        command: show crypto ipsec stats
      register: stats
      failed_when: stats.failed

    - name: Verify IPsec stats responsiveness
      ansible.builtin.assert:
        that:
          - "stats.stdout is defined"
          - "'IPsec Global Statistics' in stats.stdout"
        fail_msg: "IPsec statistics output is malformed or missing."

    - name: Retrieve IKEv1 (ISAKMP) control plane statistics
      # This task is critical for diagnosing phase 1 negotiation failures
      ansible.netcommon.cli_command:
        command: show crypto isakmp stats
      register: ike_stats
      # Idempotency: 'show' commands are read-only and inherently idempotent
      ignore_errors: true # Some newer FTD images may prioritize IKEv2 over ISAKMP

    - name: Display consolidated VPN health report
      # Observability: Providing a structured view of the gathered telemetry
      ansible.builtin.debug:
        msg: |
          ===========================================================
          IPSEC SECURITY ASSOCIATIONS (PHASE 2)
          ===========================================================
          {{ sa_detail.stdout }}

          ===========================================================
          GLOBAL CRYPTO PERFORMANCE COUNTERS
          ===========================================================
          {{ stats.stdout }}

          ===========================================================
          IKEv1 ISAKMP STATISTICS (PHASE 1)
          ===========================================================
          {{ ike_stats.stdout | default('IKEv1 stats not available or command failed') }}