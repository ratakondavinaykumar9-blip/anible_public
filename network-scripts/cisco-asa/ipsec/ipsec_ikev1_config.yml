---
# IKEv1 Tunnel Configuration Audit
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Audit IKEv1 VPN Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve running-config crypto map
      # Why: To verify the IPsec security associations and peer mappings
      cisco.asa.asa_command:
        commands:
          - show running-config crypto map
      register: crypto_map_output
      failed_when: false # Prevent failure if no crypto map is configured

    - name: Verify crypto map retrieval
      # Why: Ensure the command was executed and returned a valid response object
      ansible.builtin.assert:
        that:
          - crypto_map_output.stdout is defined
        fail_msg: "Failed to retrieve crypto map configuration from {{ inventory_hostname }}"

    - name: Retrieve IPsec transform-set
      # Why: To audit the encryption and hash algorithms used for Phase 2
      cisco.asa.asa_command:
        commands:
          - show crypto ipsec transform-set
      register: transform_set_output
      failed_when: false

    - name: Verify transform-set retrieval
      ansible.builtin.assert:
        that:
          - transform_set_output.stdout is defined
        fail_msg: "Failed to retrieve IPsec transform-set from {{ inventory_hostname }}"

    - name: Retrieve ISAKMP (Phase 1) policy
      # Why: To audit the IKEv1 Phase 1 parameters (Authentication, Encryption, DH Group)
      cisco.asa.asa_command:
        commands:
          - show running-config crypto isakmp policy
      register: isakmp_output
      failed_when: false

    - name: Verify ISAKMP policy retrieval
      ansible.builtin.assert:
        that:
          - isakmp_output.stdout is defined
        fail_msg: "Failed to retrieve ISAKMP policy from {{ inventory_hostname }}"

    - name: Aggregate and Display Configuration Results
      # Why: Provide a consolidated view for the operator while ensuring non-blocking execution
      ansible.builtin.debug:
        msg: |
          ======================= IKEv1 AUDIT REPORT: {{ inventory_hostname }} =======================
          
          ISAKMP Phase 1 Policy:
          {{ isakmp_output.stdout[0] | default('No ISAKMP policy configured') }}
          
          IPsec Phase 2 Crypto Map:
          {{ crypto_map_output.stdout[0] | default('No crypto map configured') }}
          
          Transform Set Details:
          {{ transform_set_output.stdout[0] | default('No transform-sets found') }}