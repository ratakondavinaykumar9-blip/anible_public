---
# IKEv1 Tunnel Configuration Audit
# Purpose: Retrieve and validate IKEv1/IPsec configuration for Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable (Asserts), Documented, FQCN.
- name: Audit IKEv1 Configuration
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve Crypto Map Configuration
      # Use Fully Qualified Collection Name (FQCN) for ASA-specific command execution
      cisco.asa.asa_command:
        commands:
          - show running-config crypto map
      register: crypto_map
      # Error Handling: Ensure the command was understood and executed by the device CLI
      failed_when: 
        - crypto_map.failed
        - "'Invalid input' in crypto_map.stdout[0]"

    - name: Retrieve IPsec Transform-Set Details
      cisco.asa.asa_command:
        commands:
          - show crypto ipsec transform-set
      register: transform_set
      failed_when:
        - transform_set.failed
        - "'Invalid input' in transform_set.stdout[0]"

    - name: Retrieve ISAKMP (IKEv1) Policy Configuration
      cisco.asa.asa_command:
        commands:
          - show running-config crypto isakmp policy
      register: isakmp
      failed_when:
        - isakmp.failed
        - "'Invalid input' in isakmp.stdout[0]"

    - name: Verify Configuration Retrieval Success
      # Observability: Assert that results are defined to prevent silent failures in reports
      ansible.builtin.assert:
        that:
          - crypto_map.stdout[0] is defined
          - transform_set.stdout[0] is defined
          - isakmp.stdout[0] is defined
        fail_msg: "Audit failed: One or more crypto components could not be retrieved from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved all IKEv1 configuration components."

    - name: Display Structured IKEv1 Configuration Report
      # Documentation: Format output for human readability to assist in troubleshooting/compliance
      ansible.builtin.debug:
        msg: |
          ======================= IKEv1 CONFIG REPORT =======================
          DEVICE: {{ inventory_hostname }}
          
          [ISAKMP (Phase 1) Policies]
          {{ isakmp.stdout[0] | default('None configured') }}
          
          [Crypto Map (Phase 2) Configuration]
          {{ crypto_map.stdout[0] | default('None configured') }}
          
          [IPsec Transform Sets]
          {{ transform_set.stdout[0] | default('None configured') }}
