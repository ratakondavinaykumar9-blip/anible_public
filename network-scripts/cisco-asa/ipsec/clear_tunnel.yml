---
# Clear IPSec Tunnel - NetLearner Automation Standard
# This playbook performs operational clearing of crypto sessions/SAs on Cisco ASA/Firepower.
- name: Clear IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Target peer IP for specific tunnel clearing. If empty, all SAs are cleared.
    tunnel_peer: ""

  tasks:
    - name: Clear specific crypto sessions by peer IP
      # Using FQCN for cross-platform compatibility and stability.
      # Operational clearing is non-idempotent by nature, but we wrap it in safety checks.
      ansible.netcommon.cli_command:
        command: "clear crypto session local {{ tunnel_peer }}"
      register: clear_result
      when: tunnel_peer | length > 0
      # Prevent playbook failure if the session is already inactive (Idempotency behavior).
      failed_when: 
        - clear_result.failed
        - "'not found' not in clear_result.stdout"
        - "'no session' not in clear_result.stdout"

    - name: Verify specific tunnel clear operation
      # Observability: Ensure the command was accepted by the device.
      ansible.builtin.assert:
        that:
          - clear_result is skipped or clear_result.failed == false
        fail_msg: "The command to clear peer {{ tunnel_peer }} failed on the device."
      when: tunnel_peer | length > 0

    - name: Clear all crypto IPsec SAs
      # Logic: Clear the global SA table only if no specific peer is defined.
      ansible.netcommon.cli_command:
        command: "clear crypto ipsec sa"
      register: clear_ipsec
      when: tunnel_peer | length == 0

    - name: Verify global SA clear operation
      ansible.builtin.assert:
        that:
          - clear_ipsec is skipped or clear_ipsec.failed == false
        fail_msg: "The command to clear global IPsec SAs failed."
      when: tunnel_peer | length == 0

    - name: Log operation results for audit trail
      # Observability: Output the device response for verification in automation logs.
      ansible.builtin.debug:
        msg: 
          - "NetLearner Operation: IPSec Clear"
          - "Target Peer: {{ tunnel_peer | default('GLOBAL_CLEAR', true) }}"
          - "Execution Result: {{ clear_result.stdout | default(clear_ipsec.stdout | default('No output returned')) }}"
