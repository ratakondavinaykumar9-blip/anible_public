---
# Network Automation Framework Architect: Improved Crypto Drops Playbook
# Purpose: Safely retrieves and validates crypto protocol drop statistics from ASA/Firepower devices.
- name: Monitor Crypto Protocol Drops
  hosts: asa_firepower
  gather_facts: false # Optimization: Facts are not required for this operational check.

  tasks:
    - name: Retrieve crypto protocol drop statistics from device
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      # Idempotency: This 'show' command is read-only and safe for repeated execution.
      ansible.netcommon.cli_command:
        command: show crypto protocol drop
      register: crypto_drops
      # Error Handling: Fail if the command is unrecognized by the device or the task fails.
      failed_when: 
        - crypto_drops.failed or "Invalid" in crypto_drops.stdout

    - name: Validate that crypto drop data was captured
      # Observability: Assert ensures the playbook stops if the device returned an empty response.
      ansible.builtin.assert:
        that:
          - "crypto_drops.stdout is defined"
          - "crypto_drops.stdout | length > 0"
        fail_msg: "Critical: Failed to retrieve valid crypto drop data from {{ inventory_hostname }}."
        success_msg: "Successfully captured crypto drop statistics."

    - name: Display Crypto Protocol Drops report
      # Observability: Formatted output provides clear operational visibility in logs/CLI.
      ansible.builtin.debug:
        msg: |
          ======================= CRYPTO DROPS SUMMARY =======================
          Device: {{ inventory_hostname }}
          Timestamp: {{ lookup('pipe', 'date +%Y-%m-%d\ %H:%M:%S') }}
          --------------------------------------------------------------------
          {{ crypto_drops.stdout }}
          ====================================================================