---
- name: Audit Crypto Protocol Drops
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve crypto protocol drop statistics
      # Using FQCN for network CLI compatibility. 
      # This 'show' command is inherently idempotent as it only reads operational data without modifying device state.
      ansible.netcommon.cli_command:
        command: show crypto protocol drop
      register: crypto_drops
      # Error Handling: Ensure the command was accepted by the device and did not return an error string.
      # We combine the task failure status with a check for 'Invalid input' to catch syntax errors.
      failed_when:
        - crypto_drops.failed or "Invalid input" in crypto_drops.stdout

    - name: Validate crypto drop data integrity
      # Observability: Assert that the command output contains the expected header.
      # This ensures we are parsing the correct operational context before proceeding.
      ansible.builtin.assert:
        that:
          - "'Crypto protocol drop' in crypto_drops.stdout"
        fail_msg: "Unexpected output format or empty response from {{ inventory_hostname }}."
        success_msg: "Crypto drop statistics successfully retrieved and validated."

    - name: Display crypto drop statistics
      # Documentation: Provide a clear, formatted summary for audit logs and operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          CRYPTO PROTOCOL DROPS REPORT - {{ inventory_hostname }}
          ======================================================================
          {{ crypto_drops.stdout }}