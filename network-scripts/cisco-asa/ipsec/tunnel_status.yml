---
# ==============================================================================
# Playbook: IPSec Tunnel Status Overview
# ==============================================================================
# Author: Analyst (OpenClaw)
# Improved by: Architect:# Version: 1.2.0
# Last Updated: 2026-03-08
# Description: Enhanced IPSec VPN tunnel monitoring with robust error handling,
#              idempotent report generation, and deep observability metrics.
#
# Standards Applied:
#   - Idempotency: Safe re-runs with state-aware file/directory management.
#   - Observability: Registered variables and programmatic assertions.
#   - Documentation: Detailed "why" comments for maintenance.
#   - Error Handling: Block/Rescue pattern with specific failure conditions.
#   - Best Practices: Fully Qualified Collection Names (FQCN).
# ==============================================================================

- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: false
  connection: network_cli

  vars:
    alert_on_down: false
    output_dir: "/tmp/vpn_status"
    tunnel_down_threshold: 1
    # Use now() for consistent timestamps without requiring fact gathering
    execution_timestamp: "{{ now(fmt='%Y-%m-%d %H:%M:%S') }}"

  tasks:
    - name: Initialize monitoring environment
      block:
        - name: Ensure local report directory exists
          # Idempotency: Checks for directory existence before attempting creation
          ansible.builtin.file:
            path: "{{ output_dir }}"
            state: directory
            mode: '0755'
          delegate_to: localhost
          run_once: true

    - name: Execute VPN status collection and analysis
      block:
        - name: Retrieve L2L VPN session database
          # FQCN: Using fully qualified names ensures compatibility across Ansible versions
          ansible.netcommon.cli_command:
            command: show vpn-sessiondb l2l
          register: l2l_sessions
          changed_when: false
          failed_when:
            - l2l_sessions.failed or "error" in l2l_sessions.stdout | lower

        - name: Retrieve IPSec Security Association details
          ansible.netcommon.cli_command:
            command: show crypto ipsec sa
          register: ipsec_sa
          changed_when: false
          failed_when: ipsec_sa.failed

        - name: Retrieve IKEv1 SA status
          # ignore_errors: IKEv1 may not be configured; allow playbook to continue
          ansible.netcommon.cli_command:
            command: show crypto isakmp sa
          register: ikev1_sa
          changed_when: false
          ignore_errors: true

        - name: Retrieve IKEv2 SA status
          ansible.netcommon.cli_command:
            command: show crypto ikev2 sa
          register: ikev2_sa
          changed_when: false
          ignore_errors: true

        - name: Parse operational tunnel metrics
          # Observability: Extracting counts to allow for programmatic threshold validation
          ansible.builtin.set_fact:
            active_tunnels: "{{ (l2l_sessions.stdout | regex_findall('Active:\\s+(\\d+)') | first | default(0)) | int }}"
            total_tunnels: "{{ (l2l_sessions.stdout | regex_findall('Total:\\s+(\\d+)') | first | default(0)) | int }}"
          when: l2l_sessions.stdout is defined

        - name: Validate tunnel health status
          # Observability: Assert that active tunnels meet the minimum requirements
          ansible.builtin.assert:
            that:
              - active_tunnels >= tunnel_down_threshold
            fail_msg: "CRITICAL: Only {{ active_tunnels }}/{{ total_tunnels }} tunnels active on {{ inventory_hostname }}"
            success_msg: "HEALTH OK: {{ active_tunnels }} tunnels active on {{ inventory_hostname }}"
            quiet: "{{ not alert_on_down }}"

      rescue:
        - name: Handle data collection failures
          # Error Handling: Provide context for failure without stopping the entire run
          ansible.builtin.debug:
            msg: "WARNING: Failed to retrieve full IPSec status from {{ inventory_hostname }}. Verify connectivity."

        - name: Flag host as unreachable or in error
          ansible.builtin.set_fact:
            active_tunnels: 0
            total_tunnels: 0
            collection_error: true

      always:
        - name: Display operational summary
          ansible.builtin.debug:
            msg: |
              ==================================================
              IPSec VPN Summary: {{ inventory_hostname }}
              ==================================================
              Status:       {{ 'OPERATIONAL' if active_tunnels | default(0) > 0 else 'DOWN' }}
              Active/Total: {{ active_tunnels | default(0) }}/{{ total_tunnels | default(0) }}
              Timestamp:    {{ execution_timestamp }}
              ==================================================

    - name: Generate and persist status report
      # Idempotency: copy only updates the destination if the content has changed
      ansible.builtin.copy:
        content: |
          # IPSec Tunnel Status Report
          # Host: {{ inventory_hostname }}
          # Generated: {{ execution_timestamp }}
          
          ## L2L VPN Sessions
          {{ l2l_sessions.stdout | default('N/A') }}
          
          ## IPSec SA Details
          {{ ipsec_sa.stdout | default('N/A') }}
          
          ## IKEv1 SA
          {{ ikev1_sa.stdout | default('N/A') }}
          
          ## IKEv2 SA
          {{ ikev2_sa.stdout | default('N/A') }}
        dest: "{{ output_dir }}/{{ inventory_hostname }}_vpn_status.txt"
        mode: '0640'
      delegate_to: localhost