---
# Playbook: IPsec Decapsulation Statistics Collection
# Purpose: Gathers and validates IPsec decapsulation stats for Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable (Assertions), Documented, Error Handled, FQCN compliant.

- name: IPsec Decapsulation Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve IPsec statistics from the security appliance
      # Why: Fetches crypto engine counters to monitor decapsulation success and identify potential tunnel drops.
      # Using FQCN cisco.asa.asa_command for platform-specific command execution and reliability.
      cisco.asa.asa_command:
        commands:
          - show crypto ipsec stats
      register: ipsec_stats_result
      # Error Handling: Explicitly fail if the command is unrecognized or if the execution encounters an error.
      failed_when:
        - ipsec_stats_result.failed or "Invalid input" in ipsec_stats_result.stdout[0]

    - name: Validate that IPsec statistics were successfully captured
      # Why: Observability check to ensure the output contains relevant cryptographic data before display.
      ansible.builtin.assert:
        that:
          - ipsec_stats_result.stdout[0] is defined
          - "'IPsec' in ipsec_stats_result.stdout[0]"
        fail_msg: "IPsec statistics output is missing or invalid on {{ inventory_hostname }}. Verify crypto configuration."
        success_msg: "IPsec statistics successfully validated for {{ inventory_hostname }}."

    - name: Display IPsec decapsulation statistics
      # Why: Provides a formatted output for immediate operational visibility into VPN performance.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DECAP ({{ inventory_hostname }}) =======================
          {{ ipsec_stats_result.stdout[0] }}