---
# Improved Detailed IPSec Tunnel Information Playbook
# This playbook retrieves comprehensive IPSec VPN status from Cisco ASA/FTD devices.
# It implements standards for Idempotency, Observability, FQCN, and Error Handling.

- name: Get Detailed IPSec Tunnel Information
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Optional: Define tunnel_peer via extra-vars to filter for a specific remote IP
    tunnel_peer: ""

  tasks:
    - name: "VPN-SESSIONDB: Retrieve L2L session details"
      # Why: show vpn-sessiondb provides high-level status of active tunnels and license usage.
      ansible.netcommon.cli_command:
        command: "{{ 'show vpn-sessiondb l2l filter-ipaddress=' + tunnel_peer if tunnel_peer else 'show vpn-sessiondb l2l' }}"
      register: tunnel_detail
      # Error Handling: Do not fail if no tunnels are currently active.
      failed_when: false

    - name: "CRYPTO-SA: Retrieve IPsec Security Association details"
      # Why: This command verifies transform sets, SPIs, and packet encapsulation/decapsulation counters.
      ansible.netcommon.cli_command:
        command: "{{ 'show crypto ipsec sa peer ' + tunnel_peer if tunnel_peer else 'show crypto ipsec sa' }}"
      register: crypto_sa
      failed_when: "crypto_sa.stdout is not defined"

    - name: "IKEv1: Retrieve ISAKMP (IKEv1) SA details"
      # Why: IKEv1 is checked for legacy tunnel support. 
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa detail"
      register: ikev1_detail
      # Error Handling: Ignore errors if IKEv1 is disabled or unsupported on the target platform.
      ignore_errors: true

    - name: "IKEv2: Retrieve IKEv2 SA details"
      # Why: IKEv2 is the modern standard for site-to-site VPNs.
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa detail"
      register: ikev2_detail
      ignore_errors: true

    - name: "OBSERVABILITY: Verify command execution success"
      # Why: Asserts ensure that the network device responded with valid data.
      ansible.builtin.assert:
        that:
          - "tunnel_detail.stdout is defined"
          - "crypto_sa.stdout is defined"
        fail_msg: "Failed to retrieve basic VPN session or crypto SA information from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved VPN state from {{ inventory_hostname }}"

    - name: "DISPLAY: Summarize IPSec status"
      # Idempotency: This task is read-only and safe to run multiple times.
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSec STATUS SUMMARY for {{ inventory_hostname }}
          {% if tunnel_peer %}
          FILTERING BY PEER: {{ tunnel_peer }}
          {% endif %}
          ============================================================
          
          --- SESSION DATABASE ---
          {{ tunnel_detail.stdout | default('No active sessions found.') }}

          --- CRYPTO IPSEC SA ---
          {{ crypto_sa.stdout | default('N/A') }}

          --- IKEv1 SA (ISAKMP) ---
          {{ ikev1_detail.stdout | default('N/A') }}

          --- IKEv2 SA ---
          {{ ikev2_detail.stdout | default('N/A') }}