---
# IKEv2 Tunnel Configuration Audit
# This playbook retrieves and validates IKEv2 and IPsec profile configurations
# to ensure cryptographic settings are correctly applied and visible on the device.
- name: Audit IKEv2 and IPsec Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve IKEv2 policy and proposal configuration
      # FQCN: Using ansible.netcommon for platform-agnostic CLI command execution
      ansible.netcommon.cli_command:
        command: show running-config crypto ikev2
      register: ikev2_output
      # Error Handling: Ensure the command was recognized by the device
      failed_when: 
        - ikev2_output.failed 
        - "'invalid' in ikev2_output.stdout | lower"

    - name: Validate that IKEv2 configuration exists
      # Observability: Assert that the security policy is actually defined and not an empty return
      ansible.builtin.assert:
        that:
          - "ikev2_output.stdout | length > 0"
        fail_msg: "IKEv2 configuration is missing or could not be retrieved from the device."
        success_msg: "IKEv2 configuration successfully verified."

    - name: Retrieve Crypto IPsec profile configuration
      ansible.netcommon.cli_command:
        command: show running-config crypto ipsec profile
      register: ipsec_profile_output
      failed_when: 
        - ipsec_profile_output.failed 
        - "'invalid' in ipsec_profile_output.stdout | lower"

    - name: Validate that IPsec profiles exist
      # Observability: Ensure profiles are configured to prevent downstream VPN failures
      ansible.builtin.assert:
        that:
          - "ipsec_profile_output.stdout | length > 0"
        fail_msg: "IPsec profile configuration is missing or could not be retrieved."
        success_msg: "IPsec profile configuration successfully verified."

    - name: Display consolidated cryptographic configuration
      # Documentation: Provide a formatted view of the running configuration for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= IKEv2 CONFIG =======================
          {{ ikev2_output.stdout }}

          ======================= IPSEC PROFILE CONFIG =======================
          {{ ipsec_profile_output.stdout }}