---
# IPSec Tunnel Troubleshooting Playbook
# This playbook provides non-intrusive diagnostics for site-to-site VPN tunnels on Cisco ASA/Firepower.
# Idempotency: Only utilizes 'show' (read-only) commands; safe for repeated execution without state changes.
- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Required peer IP for troubleshooting. Pass via CLI: -e "tunnel_peer=1.2.3.4"
    tunnel_peer: ""

  tasks:
    - name: "VALIDATION: Ensure tunnel_peer variable is defined"
      # Best Practice: Use assert for early failure on missing required runtime inputs.
      ansible.builtin.assert:
        that:
          - tunnel_peer | length > 0
        fail_msg: "Variable 'tunnel_peer' is required. Usage: ansible-playbook troubleshoot.yml -e 'tunnel_peer=x.x.x.x'"
        success_msg: "Validating tunnel status for peer: {{ tunnel_peer }}"

    - name: "OBSERVABILITY: Retrieve IKEv1 Phase 1 Status"
      # Using FQCN cisco.asa.asa_command. ignore_errors is used as IKEv1 may be disabled on modern deployments.
      cisco.asa.asa_command:
        commands:
          - "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1_data
      ignore_errors: true

    - name: "OBSERVABILITY: Retrieve IKEv2 Phase 1 Status"
      # IKEv2 is checked independently to verify modern tunnel negotiation status.
      cisco.asa.asa_command:
        commands:
          - "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2_data
      ignore_errors: true

    - name: "OBSERVABILITY: Retrieve IPsec Phase 2 Status"
      # Phase 2 verification confirms encrypted traffic selectors and active SA lifetimes.
      cisco.asa.asa_command:
        commands:
          - "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec_data
      ignore_errors: true

    - name: "OBSERVABILITY: Inspect VPN Session Database"
      # Provides a high-level summary of the L2L session state in the security appliance database.
      cisco.asa.asa_command:
        commands:
          - "show vpn-sessiondb l2l filter-ipaddress={{ tunnel_peer }}"
      register: session_data
      ignore_errors: true

    - name: "OBSERVABILITY: Collect Recent VPN Syslog Errors"
      # Extracts the last 20 error-related logs to assist in identifying negotiation failures.
      cisco.asa.asa_command:
        commands:
          - "show logging | include error | last 20"
      register: log_data
      ignore_errors: true

    - name: "ERROR HANDLING: Verify command registration"
      # Ensure that diagnostic tasks successfully registered results before proceeding to summary.
      ansible.builtin.assert:
        that:
          - ikev1_data is defined
          - ikev2_data is defined
          - ipsec_data is defined
        fail_msg: "Diagnostic commands failed to register. Verify device connectivity and credentials."

    - name: "SUMMARY: Final IPSec Tunnel Status Report"
      # Logic-rich summary using Jinja2 to interpret CLI output for clear visibility.
      ansible.builtin.debug:
        msg: |
          ======================= TUNNEL ANALYSIS: {{ tunnel_peer }} =======================
          
          {% set ikev1_up = 'AM_ACTIVE' in (ikev1_data.stdout[0] | default('')) %}
          {% set ikev2_up = 'UP-ACTIVE' in (ikev2_data.stdout[0] | default('')) %}
          
          IKE PHASE 1:
          {% if ikev1_up or ikev2_up %}
          ✅ UP (Mode: {{ 'IKEv1' if ikev1_up else 'IKEv2' }})
          {% else %}
          ❌ DOWN (No active Phase 1 SA found)
          {% endif %}
          
          IPSEC PHASE 2:
          {% if 'caps:' in (ipsec_data.stdout[0] | default('')) %}
          ✅ UP (SAs established)
          {% else %}
          ❌ DOWN (No Phase 2 SAs for peer {{ tunnel_peer }})
          {% endif %}
          
          ======================= RAW DIAGNOSTIC OUTPUT =======================
          --- IKEv1 ---
          {{ ikev1_data.stdout[0] | default('No SA found') }}
          
          --- IKEv2 ---
          {{ ikev2_data.stdout[0] | default('No SA found') }}
          
          --- IPsec ---
          {{ ipsec_data.stdout[0] | default('No SA found') }}
          
          --- VPN Session ---
          {{ session_data.stdout[0] | default('No active session') }}
          
          --- Recent Log Errors ---
          {{ log_data.stdout[0] | default('No recent error logs found') }}
          ====================================================================