---
- name: SSL VPN License Verification
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN license information
      # Standard 3: Documentation - Retrieves current SSL VPN/AnyConnect licensing status.
      # Standard 5: FQCN - Using the fully qualified collection name for network commands.
      ansible.netcommon.cli_command:
        command: show sslvpn-license
      register: license_result
      # Standard 4: Error Handling - Ensure the task fails if the command is unsupported or execution fails.
      failed_when: 
        - license_result.failed or "Invalid input" in license_result.stdout

    - name: Validate license data integrity
      # Standard 2: Observability - Using assert to verify that we received a valid and populated response.
      # Standard 1: Idempotency - This check is read-only and safe for repeated execution.
      ansible.builtin.assert:
        that:
          - license_result.stdout is defined
          - license_result.stdout | length > 0
          - "'AnyConnect' in license_result.stdout or 'SSL VPN' in license_result.stdout"
        fail_msg: "Failed to retrieve valid SSL VPN license data from {{ inventory_hostname }}."
        success_msg: "SSL VPN license data successfully retrieved and validated."

    - name: Display SSL VPN Licenses
      # Standard 2: Observability - Providing a formatted view of the registered command output.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN LICENSE REPORT =======================
          Device: {{ inventory_hostname }}
          Output:
          {{ license_result.stdout }}