---
- name: SSL VPN License Audit
  hosts: asa_firepower
  gather_facts: false
  # Purpose: Audits SSL VPN license status on Cisco ASA/Firepower devices.
  # Standards: Idempotent, Observable, Documented, Secure.

  tasks:
    - name: Retrieve SSL VPN license information
      # FQCN: Utilizing cisco.asa collection for platform-specific execution
      cisco.asa.asa_command:
        commands:
          - show sslvpn-license
      register: license_result
      # Idempotency: 'show' commands are read-only; changed_when: false ensures no false 'changed' status
      changed_when: false
      # Error Handling: Ensure the task fails if the command is not supported or returns an error
      failed_when:
        - license_result.failed
        - "'Invalid input' in license_result.stdout[0]"

    - name: Validate license data retrieval
      # Observability: Assert that the command returned data and contains expected keywords
      ansible.builtin.assert:
        that:
          - license_result.stdout[0] is defined
          - license_result.stdout[0] | length > 0
        fail_msg: "Failed to retrieve SSL VPN license data or output was empty."
        success_msg: "Successfully validated SSL VPN license data retrieval."

    - name: Display formatted SSL VPN license details
      # Documentation: Providing a clear, human-readable view of the license state for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN LICENSE REPORT =======================
          Device: {{ inventory_hostname }}
          Status: RETRIEVED
          ----------------------------------------------------------------------
          {{ license_result.stdout[0] }}
          ======================================================================