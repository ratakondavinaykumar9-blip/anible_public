---
- name: Audit SSL VPN and Tunnel Group Configuration
  hosts: asa_firepower
  gather_facts: false
  # Purpose: This playbook retrieves, validates, and displays the SSL VPN configuration.
  # It ensures state visibility and provides structured observability for network audits.

  tasks:
    - name: Retrieve WebVPN running configuration
      # Using FQCN for cross-platform compatibility and standardizing execution.
      ansible.netcommon.cli_command:
        command: show run webvpn
      register: webvpn_output
      # Error Handling: Identify cases where the command is unsupported or fails silently.
      failed_when: 
        - webvpn_output.failed
        - "'Invalid input' in webvpn_output.stdout"

    - name: Verify WebVPN configuration response
      # Observability: Assert that the command returned data to prevent downstream processing errors.
      ansible.builtin.assert:
        that:
          - webvpn_output.stdout is defined
          - webvpn_output.stdout | length > 0
        fail_msg: "WebVPN configuration is missing or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve Tunnel Group running configuration
      # Captures connection profiles which define authentication and address pool assignments.
      ansible.netcommon.cli_command:
        command: show run tunnel-group
      register: tg_output
      failed_when: 
        - tg_output.failed
        - "'Invalid input' in tg_output.stdout"

    - name: Verify Tunnel Group configuration response
      # Observability: Ensure the Tunnel Group section exists in the running-config.
      ansible.builtin.assert:
        that:
          - tg_output.stdout is defined
          - tg_output.stdout | length > 0
        fail_msg: "Tunnel-group configuration is empty or inaccessible on {{ inventory_hostname }}."
        quiet: true

    - name: Display SSL VPN Audit Report
      # Documentation: Provides a human-readable summary of the current state.
      ansible.builtin.debug:
        msg: |
          ========================================================================
          SSL VPN AUDIT REPORT: {{ inventory_hostname }}
          TIMESTAMP: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          ========================================================================
          WEBVPN CONFIGURATION:
          {{ webvpn_output.stdout }}

          TUNNEL-GROUP CONFIGURATION:
          {{ tg_output.stdout }}
          ========================================================================