---
# Playbook: Get SSL VPN Configuration
# Purpose: Retrieves and validates SSL VPN (webvpn) and tunnel-group configurations 
# from Cisco ASA/Firepower devices. This is a read-only operation and is idempotent.
- name: Get SSL VPN Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve webvpn configuration
      # Using FQCN ansible.netcommon.cli_command for standardized network command execution.
      ansible.netcommon.cli_command:
        command: show run webvpn
      register: webvpn_config
      # Ensure task fails if the command execution itself fails (e.g., connection issues).
      failed_when: webvpn_config.stdout is not defined

    - name: Validate webvpn configuration retrieval
      # Observability: Confirm that the command returned a valid response.
      ansible.builtin.assert:
        that:
          - webvpn_config.stdout is string
        fail_msg: "Failed to retrieve webvpn configuration from {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve tunnel-group configuration
      # Tunnel groups define the connection parameters and policies for SSL VPN sessions.
      ansible.netcommon.cli_command:
        command: show run tunnel-group
      register: tunnel_group_config
      failed_when: tunnel_group_config.stdout is not defined

    - name: Validate tunnel-group configuration retrieval
      # Observability: Verify successful data capture for the tunnel-group section.
      ansible.builtin.assert:
        that:
          - tunnel_group_config.stdout is string
        fail_msg: "Failed to retrieve tunnel-group configuration from {{ inventory_hostname }}."
        quiet: true

    - name: Display consolidated SSL VPN configuration
      # Provides an formatted summary for operational visibility and debugging.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN CONFIG =======================
          {{ webvpn_config.stdout | default('No webvpn configuration found.') }}

          ===================== TUNNEL GROUP CONFIG =====================
          {{ tunnel_group_config.stdout | default('No tunnel-group configuration found.') }}