---
# SSL VPN Configuration Audit and Verification
# This playbook retrieves and validates the SSL VPN configuration for Cisco ASA/Firepower devices.
- name: Audit SSL VPN Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve WebVPN Global Configuration
      # Fetching the 'webvpn' section of the running-config to audit SSL portal and cipher settings.
      # We use ansible.netcommon.cli_command for broad compatibility with network CLI interfaces.
      ansible.netcommon.cli_command:
        command: show run webvpn
      register: webvpn_output
      failed_when: 
        - webvpn_output.stdout is not defined
        - "'Invalid input' in webvpn_output.stdout"

    - name: Verify WebVPN Configuration Presence
      # Observability: Asserting that the command returned data ensures we are not auditing an empty state.
      # This provides a clear failure message if the feature is not configured.
      ansible.builtin.assert:
        that:
          - webvpn_output.stdout | length > 0
        fail_msg: "WebVPN configuration is missing or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve Tunnel-Group Configuration
      # Retrieving tunnel-group definitions to verify connection profiles and group-policy mapping.
      ansible.netcommon.cli_command:
        command: show run tunnel-group
      register: tunnel_group_output
      failed_when:
        - tunnel_group_output.stdout is not defined
        - "'Invalid input' in tunnel_group_output.stdout"

    - name: Verify Tunnel-Group Configuration Presence
      ansible.builtin.assert:
        that:
          - tunnel_group_output.stdout | length > 0
        fail_msg: "Tunnel-Group configuration is missing or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Display Consolidated SSL VPN Audit Logs
      # Idempotency: This task is read-only and provides consistent observability across multiple runs.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN CONFIG AUDIT: {{ inventory_hostname }} =======================
          
          --- WEBVPN CONFIGURATION ---
          {{ webvpn_output.stdout }}
          
          --- TUNNEL-GROUP CONFIGURATION ---
          {{ tunnel_group_output.stdout }}
```