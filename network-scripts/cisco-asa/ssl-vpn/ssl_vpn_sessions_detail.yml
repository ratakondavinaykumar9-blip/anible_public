---
# SSL VPN Sessions Detail - ASA/Firepower
# This playbook retrieves detailed SSL VPN session information from Cisco ASA/Firepower devices.
# It captures current session counts, user details, and connection states for observability.
- name: SSL VPN Sessions Detail
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get SSL VPN session details
      # Captures the detailed SSL VPN session database (Username, Public IP, Tunnel Group, etc.)
      # Idempotency: 'show' commands are read-only and inherently safe to run multiple times.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb detail ssl
      register: ssl_sessions
      failed_when: 
        - ssl_sessions.failed or "Invalid input" in ssl_sessions.stdout

    - name: Verify session data capture
      # Observability: Ensures that the command returned output and the task executed correctly.
      ansible.builtin.assert:
        that:
          - ssl_sessions.stdout is defined
        fail_msg: "Failed to capture valid SSL VPN session data from {{ inventory_hostname }}"

    - name: Display SSL VPN Sessions
      # Observability: Formats the command output for real-time administrator review.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSIONS: {{ inventory_hostname }} =======================
          Timestamp: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          
          {{ ssl_sessions.stdout }}