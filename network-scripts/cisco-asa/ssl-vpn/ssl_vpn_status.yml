---
# SSL VPN Status Monitoring Playbook
# This playbook retrieves operational state data from Cisco ASA/Firepower devices.
# It follows NetLearner standards for idempotency, observability, and error handling.
- name: Get SSL VPN Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get SSL VPN sessions
      # Using cli_command for raw output retrieval; safe and idempotent for read-only operations.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb ssl
      register: ssl_sessions
      # We allow failure here in case SSL VPN is not configured, preventing playbook termination.
      ignore_errors: true

    - name: Verify SSL VPN session command execution
      # Observability: Ensure the command was accepted by the device.
      ansible.builtin.assert:
        that:
          - ssl_sessions.failed is false
        fail_msg: "Failed to retrieve SSL VPN sessions. Check if the command is supported in the current context."
        success_msg: "Successfully retrieved SSL VPN session data."

    - name: Get SSL VPN statistics
      # Retrieves global SSL statistics to monitor handshake performance and cipher usage.
      ansible.netcommon.cli_command:
        command: show ssl
      register: ssl_stats
      failed_when: 
        - ssl_stats.failed
        - "'Invalid input' in ssl_stats.stderr"

    - name: Verify SSL VPN statistics retrieval
      # Observability: Validate that the statistics output is not empty.
      ansible.builtin.assert:
        that:
          - ssl_stats.stdout is defined
          - ssl_stats.stdout | length > 0
        fail_msg: "SSL statistics output is empty or undefined."

    - name: Display SSL VPN Operational State
      # Formatted output for human operators or logging systems.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSION SUMMARY =======================
          {{ ssl_sessions.stdout | default('No session data available') }}

          ======================= SSL PROTOCOL STATISTICS =======================
          {{ ssl_stats.stdout }}