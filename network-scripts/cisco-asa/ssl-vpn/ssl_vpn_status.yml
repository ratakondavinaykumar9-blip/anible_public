---
# SSL VPN Operational Status Audit
# Purpose: This playbook retrieves and validates the current state of SSL VPN sessions and statistics
# on Cisco ASA/Firepower devices. It is designed for observability and idempotent execution.
- name: SSL VPN Status Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve active SSL VPN session database
      # Why: Captures current user sessions to identify usage and potential capacity issues.
      # This operation is read-only and inherently idempotent across multiple runs.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb ssl
      register: ssl_sessions_raw
      # Error Handling: Fail only if the command itself is unrecognized or the connection fails.
      failed_when: 
        - ssl_sessions_raw.failed or "Invalid input" in ssl_sessions_raw.stdout

    - name: Validate SSL session data integrity
      # Observability: Asserts that the register variable contains the expected stdout attribute.
      ansible.builtin.assert:
        that:
          - ssl_sessions_raw.stdout is defined
        fail_msg: "Data Integrity Error: Failed to capture SSL VPN sessions from {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve SSL protocol engine statistics
      # Why: Monitors SSL negotiation versions and cipher suite usage for security auditing.
      ansible.netcommon.cli_command:
        command: show ssl
      register: ssl_protocol_stats
      failed_when: ssl_protocol_stats.failed

    - name: Validate SSL protocol data integrity
      # Observability: Asserts that the protocol statistics were successfully registered.
      ansible.builtin.assert:
        that:
          - ssl_protocol_stats.stdout is defined
        fail_msg: "Data Integrity Error: SSL protocol stats are missing from {{ inventory_hostname }}."
        quiet: true

    - name: Display consolidated SSL VPN operational report
      # Why: Aggregates captured data into a single, observable output for logging or monitoring.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          SSL VPN OPERATIONAL REPORT | Target: {{ inventory_hostname }}
          ===========================================================
          
          --- SESSION DATABASE ---
          {{ ssl_sessions_raw.stdout | default('No session data captured') }}
          
          --- PROTOCOL ENGINE STATUS ---
          {{ ssl_protocol_stats.stdout | default('No protocol stats captured') }}
          
          ===========================================================
