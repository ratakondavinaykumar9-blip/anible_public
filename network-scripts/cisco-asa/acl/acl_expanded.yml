---
- name: Get Expanded Access Control List
  hosts: asa_firepower
  gather_facts: false
  # Documentation: This playbook retrieves the expanded version of an ACL to reveal specific object-group members.
  # Read-only 'show' commands are inherently idempotent as they do not modify the device state.
  vars:
    # Best Practice: Defaulting variable to empty string to avoid undefined errors if not provided
    acl_name: ""

  tasks:
    - name: Execute show access-list expanded command
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: "{{ 'show access-list ' + acl_name + ' expanded' if acl_name | length > 0 else 'show access-list expanded' }}"
      # Observability: Register command output for subsequent validation and auditing
      register: expanded_acl
      # Error Handling: Explicitly fail if the device returns syntax errors or missing ACL messages
      failed_when: >
        'Invalid input' in expanded_acl.stdout or
        'does not exist' in expanded_acl.stdout

    - name: Validate command output observability
      # Observability: Use assert to verify that the command returned meaningful content
      ansible.builtin.assert:
        that:
          - "expanded_acl.stdout is defined"
          - "expanded_acl.stdout | length > 0"
        fail_msg: "No ACL data was returned. Verify the ACL name exists on the target device."
        success_msg: "Expanded ACL data successfully retrieved and verified."

    - name: Display expanded ACL results
      # Observability: Output the lines for human readability
      ansible.builtin.debug:
        msg: "{{ expanded_acl.stdout_lines }}"