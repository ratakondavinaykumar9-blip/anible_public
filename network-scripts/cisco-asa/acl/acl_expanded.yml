MCP issues detected. Run /mcp list for status.```yaml
---
- name: Get and Validate Expanded Access Control Lists
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Variable to specify a targeted ACL; defaults to empty string to show all expanded entries
    acl_name: ""

  tasks:
    - name: Retrieve expanded ACL entries from device
      # Best Practice: Using Fully Qualified Collection Name (FQCN) for the command module
      # Idempotency: This is a read-only operation and safe for multiple executions
      ansible.netcommon.cli_command:
        command: "{{ 'show access-list ' + acl_name + ' expanded' if acl_name | length > 0 else 'show access-list expanded' }}"
      register: expanded_acl_output
      # Error Handling: Fail the task if the device returns a CLI error instead of ACL data
      failed_when:
        - "'Invalid input' in expanded_acl_output.stdout"
        - "'not found' in expanded_acl_output.stdout"
        - "'does not exist' in expanded_acl_output.stdout"

    - name: Validate ACL output integrity
      # Observability: Programmatic assertion to ensure the command returned meaningful data
      ansible.builtin.assert:
        that:
          - expanded_acl_output.stdout is defined
          - expanded_acl_output.stdout | length > 0
        fail_msg: "No ACL data retrieved. Verify if the ACL '{{ acl_name }}' exists and contains entries."
        quiet: true

    - name: Display expanded ACL entries
      # Observability: Formatted debug output for visibility in automation logs
      ansible.builtin.debug:
        msg: "{{ expanded_acl_output.stdout_lines }}"
