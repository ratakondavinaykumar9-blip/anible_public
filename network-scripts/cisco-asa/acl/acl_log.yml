---
# ==============================================================================
# Playbook: ASA/Firepower ACL Log Retrieval
# Description: Safely retrieves and validates ACL-related syslog entries from 
#              Cisco ASA/FTD buffers.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN Usage.
# ==============================================================================
- name: Get ACL Logs
  hosts: asa_firepower
  gather_facts: false  # Fact collection is unnecessary for direct CLI commands

  tasks:
    - name: Retrieve ACL-specific syslog entries from buffer
      # FQCN: Using ansible.netcommon for broad compatibility across network OS
      ansible.netcommon.cli_command:
        command: show logging | include ACL
      register: acl_log
      # Error Handling: Fail if command is rejected or execution fails
      failed_when:
        - acl_log.failed | default(false)
        - "'Invalid input' in acl_log.stdout"

    - name: Verify command execution integrity
      # Observability: Ensure the result structure is valid before processing
      ansible.builtin.assert:
        that:
          - acl_log.stdout is defined
        fail_msg: "The command 'show logging' failed to return a valid response."
        quiet: true

    - name: Inform user if log buffer is empty
      # Documentation/Feedback: Clarify why no output might be displayed
      ansible.builtin.debug:
        msg: "No ACL matches found in the buffer. Ensure 'log' keyword is present on ACEs."
      when: 
        - acl_log.stdout | length == 0

    - name: Display Formatted ACL Logs
      # Observability: Structured output for human analysis
      ansible.builtin.debug:
        msg: |
          ======================= ACL LOGS: {{ inventory_hostname }} =======================
          {{ acl_log.stdout | default('BUFFER EMPTY OR NO MATCHES') }}
          ================================================================================
      when: 
        - acl_log.stdout | length > 0