---
# NetLearner Architect - ASA/Firepower ACL Log Retrieval
# This playbook retrieves security ACL logs for forensic analysis and monitoring.
- name: Get ACL Logs
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Retrieve ACL-specific entries from the logging buffer"
      # Use Fully Qualified Collection Name (FQCN) for network operations
      ansible.netcommon.cli_command:
        command: "show logging | include ACL"
      register: acl_log_raw
      # Idempotency: 'show' commands are read-only and inherently safe for repeated execution
      # Error Handling: Fail on execution/connection errors, but allow empty log buffers
      failed_when:
        - acl_log_raw.failed | default(false)
        - "'Invalid' in acl_log_raw.stderr"

    - name: "Verify log retrieval integrity"
      # Observability: Assert that the task returned valid data structures
      ansible.builtin.assert:
        that:
          - acl_log_raw is defined
          - acl_log_raw.stdout is defined
        fail_msg: "Critical: Data retrieval failed for {{ inventory_hostname }}. Check VTY/SSH status."
        quiet: true

    - name: "Display retrieved ACL security events"
      # Observability: Provide formatted feedback with fallback for empty buffers
      ansible.builtin.debug:
        msg: |
          ======================= ACL LOGS [ {{ inventory_hostname }} ] =======================
          {{ acl_log_raw.stdout if (acl_log_raw.stdout | trim | length > 0) else '--- NO ACL LOGS DETECTED IN LOCAL BUFFER ---' }}
