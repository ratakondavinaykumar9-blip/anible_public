---
# Playbook: Cisco ASA - Compiled ACL Verification
# Purpose: This playbook retrieves the status of Compiled ACLs (TurboACL) to ensure the 
# firewall's lookup engine is optimized and identifies potential compilation or memory issues.
- name: Retrieve and Validate Compiled ACL Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get compiled configuration from the device
      # FQCN: Using the specialized Cisco ASA command module for better platform integration
      # Idempotency: Read-only "show" commands are inherently idempotent and safe for repeated execution
      cisco.asa.asa_command:
        commands:
          - show compile-cfg
      register: compiled_raw
      # Error Handling: Catch platform-specific errors or unsupported command scenarios
      failed_when: 
        - "compiled_raw.failed"
        - "'Invalid' in compiled_raw.stdout[0]"
        - "'ERROR' in compiled_raw.stdout[0]"

    - name: Validate command response integrity
      # Observability: Use assertions to ensure the output is not empty, preventing silent failures
      ansible.builtin.assert:
        that:
          - "compiled_raw.stdout[0] is defined"
          - "compiled_raw.stdout[0] | length > 0"
        fail_msg: "The 'show compile-cfg' command returned no data on {{ inventory_hostname }}."
        success_msg: "Successfully retrieved compiled ACL data from {{ inventory_hostname }}."

    - name: Display Compiled ACL Status
      # Observability: Provide formatted output for logging and operational visibility
      ansible.builtin.debug:
        msg: |
          ============================================================
          COMPILED ACL CONFIGURATION - {{ inventory_hostname }}
          ============================================================
          {{ compiled_raw.stdout[0] }}
      when: compiled_raw.stdout[0] | length > 0