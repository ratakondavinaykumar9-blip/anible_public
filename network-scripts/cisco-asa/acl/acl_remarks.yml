MCP issues detected. Run /mcp list for status.```yaml
---
- name: Audit Cisco ASA/Firepower ACL Remarks
  # Target group defined in inventory for security appliances
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Defining command as a variable for easier maintenance and observability
    audit_command: "show running-config access-list | include remark"

  tasks:
    - name: "Retrieve ACL remarks from running configuration"
      # Using FQCN (Fully Qualified Collection Name) for predictable behavior
      cisco.asa.asa_command:
        commands:
          - "{{ audit_command }}"
      register: remarks_output
      # Idempotency: 'show' commands are read-only and safe for repeated execution.
      # Error Handling: Ensure we don't fail if the search returns no results (empty string).
      failed_when: 
        - remarks_output.failed
        - "'Invalid input' in remarks_output.stdout[0]"

    - name: "Validate command execution integrity"
      # Observability: Assert that the response object contains the expected structure
      ansible.builtin.assert:
        that:
          - "remarks_output.stdout is defined"
          - "remarks_output.stdout | type_debug == 'list'"
        fail_msg: "Network response format is invalid or unreachable."
        quiet: true

    - name: "Display audited ACL remarks"
      # Documentation: Providing a structured view for human auditors or logging systems
      ansible.builtin.debug:
        msg: |
          ===========================================================
          AUDIT REPORT: ACL REMARKS
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ lookup('pipe', 'date +%Y-%m-%d\ %H:%M:%S') }}
          ===========================================================
          {% if remarks_output.stdout[0] | length > 0 %}
          {{ remarks_output.stdout[0] }}
          {% else %}
          NO REMARKS FOUND IN RUNNING-CONFIG
          {% endif %}
          ===========================================================
```