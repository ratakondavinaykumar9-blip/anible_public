---
- name: Audit Cisco ASA Access-List Remarks
  hosts: asa_firepower
  gather_facts: false
  # Standard: Documentation - Ensuring clear purpose and scope for the playbook.

  tasks:
    - name: Retrieve ACL remarks from the running configuration
      # Standard: Best Practices - Utilizing Fully Qualified Collection Names (FQCN).
      # Why: Ensures the correct module is invoked regardless of the environment's search path.
      cisco.asa.asa_command:
        commands:
          - show running-config access-list | include remark
      # Standard: Observability - Capturing output for validation and audit trails.
      register: acl_remarks_result
      # Standard: Error Handling - Defining explicit failure criteria for connection or command issues.
      failed_when: 
        - acl_remarks_result.failed
        - "'Invalid' in acl_remarks_result.msg | default('')"

    - name: Validate command execution and data presence
      # Standard: Observability - Using assertions to ensure technical requirements are met before proceeding.
      # Why: Provides immediate feedback if the device returns unexpected or empty results.
      ansible.builtin.assert:
        that:
          - "acl_remarks_result.stdout is defined"
          - "acl_remarks_result.stdout | length > 0"
        fail_msg: "No ACL remarks were found or the command failed to return data."
        success_msg: "ACL remarks successfully retrieved."

    - name: Display ACL Remarks Report
      # Standard: Observability - Formatting output for human readability in logs.
      # Standard: Idempotency - Read-only 'show' operations are inherently safe to run multiple times.
      ansible.builtin.debug:
        msg: |
          ======================= ACL REMARKS AUDIT =======================
          {{ acl_remarks_result.stdout[0] if acl_remarks_result.stdout[0] != '' else 'No remarks found in configuration.' }}
      when: acl_remarks_result.stdout is defined