---
# Playbook: Audit ASA Access-List Remarks
# This playbook extracts 'remark' entries from the running configuration of Cisco ASA/Firepower devices.
# Designed for idempotency, observability, and robust error handling according to NetLearner standards.

- name: ACL Remarks Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch ACL remarks from running configuration
      # Using FQCN for network CLI interaction
      ansible.netcommon.cli_command:
        command: show running-config access-list | include remark
      register: remarks_result
      # Idempotency: Operational 'show' commands must not indicate a state change
      changed_when: false
      # Error Handling: Explicitly fail if the command is unrecognized or returns an error string
      failed_when:
        - remarks_result.failed == true
        - "'Invalid input' in remarks_result.stdout or 'ERROR' in remarks_result.stdout"

    - name: Verify data retrieval
      # Observability: Assert that the command returned a valid response object
      ansible.builtin.assert:
        that:
          - "remarks_result.stdout is defined"
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}"
        quiet: true

    - name: Display ACL Remarks Report
      # Observability: Format the output for better readability during manual audits
      ansible.builtin.debug:
        msg: |
          ======================= ACL REMARKS: {{ inventory_hostname }} =======================
          {{ remarks_result.stdout if remarks_result.stdout | length > 0 else 'No remarks found or command returned empty.' }}