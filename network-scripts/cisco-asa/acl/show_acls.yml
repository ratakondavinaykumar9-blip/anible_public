---
- name: Get Access Lists and Hit Counts from Cisco ASA/Firepower
  hosts: asa_firepower
  gather_facts: false
  # Purpose: This playbook retrieves ACL configurations and operational hit counts for audit/visibility.
  # Standards: Idempotency is maintained via read-only state gathering.

  tasks:
    - name: Retrieve ACL configuration state
      # Standard: Fetching 'gathered' state is idempotent and safe for repeated runs.
      # Standard: Using FQCN (cisco.asa.asa_acl).
      cisco.asa.asa_acl:
        state: gathered
      register: acl_output
      # Error Handling: Fail if the module cannot communicate with the device.
      failed_when: acl_output.failed | default(false)

    - name: Validate ACL data retrieval
      # Observability: Confirm that the gathered key exists in the response to verify success.
      ansible.builtin.assert:
        that:
          - acl_output.gathered is defined
        fail_msg: "Failed to retrieve ACL configuration from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved ACL configuration for {{ inventory_hostname }}"
        quiet: true

    - name: Retrieve ACL hit counts via CLI
      # Standard: Using FQCN (ansible.netcommon.cli_command) for generic CLI command execution.
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: acl_hits
      # Error Handling: Treat 'Invalid input' as failure, but ignore empty results (idempotent read).
      failed_when: 
        - acl_hits.failed | default(false)
        - "'Invalid input' in (acl_hits.stderr | default(''))"

    - name: Verify CLI command execution
      # Observability: Ensure the command was executed and captured correctly.
      ansible.builtin.assert:
        that:
          - acl_hits.stdout is defined
        fail_msg: "CLI command execution failed or timed out on {{ inventory_hostname }}"
        quiet: true

    - name: Display ACL Summary and Hit Counts
      # Documentation: Provide a human-readable summary of the current security policy status.
      ansible.builtin.debug:
        msg: |
          ============================================================
          ACL INVENTORY SUMMARY: {{ inventory_hostname }}
          ============================================================
          {% if acl_output.gathered %}
          {% for acl in acl_output.gathered %}
          - ACL Name: {{ acl.name }}
            Entries: {{ acl.entries | default([]) | length }}
          {% endfor %}
          {% else %}
          No ACLs found in the current configuration.
          {% endif %}

          ============================================================
          HIT COUNT DETAILS (show access-list | include hitcnt):
          ============================================================
          {{ acl_hits.stdout | default('No hit count data returned.') }}