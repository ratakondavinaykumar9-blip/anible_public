---
# Playbook: ASA ACL Analysis
# Objective: Retrieve and summarize Access Control Lists and their hit counts
# Standards: Idempotency (read-only), FQCN, Error Handling, and Observability

- name: Get Access Lists
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather structured ACL facts from the device
      # Use FQCN and state: gathered for an idempotent, read-only operation
      cisco.asa.asa_acls:
        state: gathered
      register: acl_output
      # Ensure connection failures are not ignored during initial data gathering
      ignore_errors: false

    - name: Retrieve ACL hit counts via CLI
      # Structured facts often exclude dynamic operational data like hit counts
      ansible.netcommon.cli_command:
        command: "show access-list | include hitcnt"
      register: acl_hits
      # Error Handling: Validate that the command executed successfully and returned a valid response
      failed_when:
        - acl_hits.stdout is not defined
        - "'Invalid' in acl_hits.stdout or 'Usage' in acl_hits.stdout"

    - name: Validate successful data retrieval
      # Observability: Assert that both structured facts and raw CLI output were captured
      ansible.builtin.assert:
        that:
          - acl_output.gathered is defined
          - acl_hits.stdout is defined
        fail_msg: "Required ACL data was not successfully gathered from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved ACL state and hit counts for {{ inventory_hostname }}"
        quiet: true