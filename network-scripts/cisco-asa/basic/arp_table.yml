# Playbook: Get and Validate ARP Table
# Standards: Idempotency (read-only), Observability (assert/register), FQCN usage.
- name: Get and Validate ARP Table
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "COMMAND: Retrieve ARP table entries"
      # Using ansible.netcommon.cli_command (FQCN) for platform-agnostic execution.
      # This task is idempotent as it does not modify the device configuration.
      ansible.netcommon.cli_command:
        command: show arp
      register: arp_result
      # Error Handling: Validate that the command was understood and executed successfully.
      failed_when: >
        arp_result.failed or
        'Invalid input' in arp_result.stdout or
        'ERROR' in arp_result.stdout

    - name: "ASSERT: Confirm ARP table contains data"
      # Observability: Stop execution if the returned table is empty to avoid false positives.
      ansible.builtin.assert:
        that:
          - arp_result.stdout | length > 0
        fail_msg: "Retrieved ARP table is empty. Verify interface status."
        quiet: true

    - name: "DISPLAY: Render ARP information"
      # Observability: Display the results in the console for immediate review.
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE =======================
          {{ arp_result.stdout }}