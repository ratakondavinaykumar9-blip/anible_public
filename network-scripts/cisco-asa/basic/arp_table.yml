---
# Playbook: Retrieve and Validate ARP Table
# Purpose: This playbook securely retrieves the ARP table from Cisco ASA/Firepower devices,
# ensuring the output is valid and observable for network auditing.
- name: Get ARP Table
  hosts: asa_firepower
  gather_facts: false # Performance: Facts are not required for simple CLI command execution.

  tasks:
    - name: Execute 'show arp' on target device
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability.
      ansible.netcommon.cli_command:
        command: show arp
      register: arp_result
      # Error Handling: Fail the task if the output is null or empty to prevent downstream errors.
      failed_when: 
        - arp_result.stdout is not defined or arp_result.stdout | length == 0

    - name: Validate ARP table data
      # Observability: Assert that the command returned meaningful network state data.
      ansible.builtin.assert:
        that:
          - "arp_result.rc == 0"
          - "'arp' in arp_result.stdout or arp_result.stdout | length > 0"
        fail_msg: "ARP table retrieval failed or returned unexpected data format."
        success_msg: "ARP table successfully retrieved and verified."

    - name: Display Formatted ARP Table
      # Documentation: Output the results in a readable format for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE =======================
          {{ arp_result.stdout }}