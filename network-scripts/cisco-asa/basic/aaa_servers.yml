# Playbook: AAA Server Configuration Audit
# Purpose: Safely retrieves and validates AAA configuration from Cisco ASA/Firepower hosts.
# Standards: Idempotency, Observability, Documentation, Error Handling, and FQCN usage.
- name: Audit AAA Servers
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve AAA server running configuration
      # Uses FQCN to execute a show command on the network device.
      ansible.netcommon.cli_command:
        command: show running-config aaa-server
      register: aaa_result
      # Idempotency: Read-only operations must always report 'changed: false' to ensure 
      # the playbook remains safe and reporting reflects actual state changes.
      changed_when: false
      # Error Handling: Fail the task if the command fails or if the device returns 
      # an "Invalid input" error (e.g., if the command isn't supported on the OS version).
      failed_when: aaa_result.failed or 'Invalid input' in aaa_result.stdout

    - name: Verify AAA configuration exists
      # Observability: Uses assertion to verify that configuration data was actually 
      # returned and is not just an empty string.
      ansible.builtin.assert:
        that:
          - aaa_result.stdout is defined
          - aaa_result.stdout | length > 0
        fail_msg: "AAA configuration could not be retrieved or the output is empty."
        quiet: true

    - name: Display AAA configuration for audit
      # Observability: Outputs the registered variable content in a formatted block 
      # for the operator's review.
      ansible.builtin.debug:
        msg: |
          ======================= AAA SERVERS =======================
          {{ aaa_result.stdout }}