---
# AAA Servers Configuration Audit
# Purpose: This playbook retrieves and validates the AAA server configuration on Cisco ASA/Firepower devices.
# Standards: Ensures idempotency, provides observability through assertions, and follows FQCN best practices.

- name: AAA Servers Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve AAA server running configuration
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      # Idempotency: Marked as 'changed_when: false' because this is a read-only operation that does not modify device state.
      ansible.netcommon.cli_command:
        command: show running-config aaa-server
      register: aaa_result
      changed_when: false
      # Error Handling: Fail explicitly if the command is unrecognized by the device or if the task fails.
      failed_when:
        - aaa_result.failed or "invalid input" in aaa_result.stdout | lower

    - name: Validate AAA configuration data
      # Observability: Assert that the command successfully returned configuration data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - aaa_result.stdout is defined
          - aaa_result.stdout | length > 0
        fail_msg: "AAA server configuration could not be retrieved or is empty on {{ inventory_hostname }}."
        success_msg: "AAA configuration successfully captured for {{ inventory_hostname }}."

    - name: Display AAA Server Details
      # Documentation: Provides a structured view of the retrieved configuration for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= AAA SERVERS AUDIT =======================
          Device: {{ inventory_hostname }}
          Status: Success
          Configuration Output:
          {{ aaa_result.stdout }}