---
# Power Supply Status Monitoring for Cisco ASA/Firepower
# This playbook retrieves and validates the status of power supplies to ensure hardware redundancy.
- name: Get Power Supply Status
  hosts: asa_firepower
  gather_facts: false # Optimization: Skip standard host facts for network infrastructure

  tasks:
    - name: Retrieve power supply status from device
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show power
      register: r_power_status
      # Error Handling: Fail if output is empty or the command is unrecognized
      failed_when:
        - r_power_status.stdout | length == 0
        - "'Invalid input' in r_power_status.stdout"

    - name: Verify power supply operational health
      # Observability: Assert that the hardware reports no critical failures
      ansible.builtin.assert:
        that:
          - "'Power Supply' in r_power_status.stdout"
          - "'Fail' not in r_power_status.stdout"
          - "'Off' not in r_power_status.stdout"
        fail_msg: "Hardware alert: Power supply failure or disconnection detected on {{ inventory_hostname }}."
        success_msg: "Power supply verification successful for {{ inventory_hostname }}."

    - name: Display power supply summary
      # Documentation: Provide clear, formatted output for operational visibility
      ansible.builtin.debug:
        msg: |
          ======================= POWER STATUS: {{ inventory_hostname }} =======================
          {{ r_power_status.stdout }}
          =======================================================================================
