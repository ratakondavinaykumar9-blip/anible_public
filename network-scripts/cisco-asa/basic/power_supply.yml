---
- name: Cisco ASA/Firepower Power Supply Status Audit
  hosts: asa_firepower
  gather_facts: false
  # This playbook is idempotent as it performs read-only operations to audit hardware status.

  tasks:
    - name: Execute 'show power' command on the target device
      # Using Fully Qualified Collection Name (FQCN) to ensure best practices and portability
      cisco.asa.asa_command:
        commands:
          - show power
      register: power_output
      # Error Handling: Fail explicitly if the command is unrecognized or returns an error string
      failed_when:
        - power_output.failed or "Invalid input" in power_output.stdout[0]

    - name: Verify that power supply data was successfully captured
      # Observability: Assert that the command returned non-empty output to ensure data integrity
      ansible.builtin.assert:
        that:
          - power_output.stdout is defined
          - power_output.stdout[0] | length > 0
        fail_msg: "Power supply status could not be retrieved or the output is empty."
        success_msg: "Power supply status successfully retrieved from the device."

    - name: Display the formatted power supply status
      # Documentation: Providing a clear, human-readable view of the hardware status for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= POWER SUPPLY STATUS =======================
          {{ power_output.stdout[0] }}