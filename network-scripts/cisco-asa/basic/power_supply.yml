---
# Playbook: Get Power Supply Status
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
# Purpose: This playbook retrieves and validates the power supply status on Cisco ASA/Firepower devices.

- name: Get Power Supply Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve power supply status via CLI
      # FQCN: ansible.netcommon.cli_command.
      # Idempotency: "show" commands are read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: show power
      register: power_output
      # Error Handling: Explicitly fail if the command returns no data.
      failed_when: 
        - power_output.stdout is not defined or power_output.stdout | length == 0

    - name: Validate power supply information
      # Observability: Ensure the output contains expected keywords to confirm data validity.
      ansible.builtin.assert:
        that:
          - "'Power' in power_output.stdout or 'supply' in power_output.stdout"
        fail_msg: "Power supply status retrieval failed: Unexpected output format."
        success_msg: "Power supply status successfully retrieved and validated."
        quiet: true

    - name: Display power supply status
      # Observability: Outputting the result for manual inspection or logging.
      ansible.builtin.debug:
        msg: |
          ======================= POWER SUPPLY STATUS =======================
          {{ power_output.stdout }}