# NetLearner Architect - ASA/Firepower HTTP Status Audit
# Purpose: To verify administrative HTTP server status across the security fleet.
# This ensures that management access is consistent with defined security policies.
- name: Get and Validate HTTP Server Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Query device for HTTP server configuration
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability.
      # The cli_command module provides a generic transport for non-stateful queries.
      ansible.netcommon.cli_command:
        command: show http server
      register: http_raw
      # Error Handling: Detect if the command is unsupported or if the session fails.
      # 'failed_when' prevents false positives if the device returns an 'Invalid input' string.
      failed_when:
        - http_raw.failed or "Invalid input" in http_raw.stdout

    - name: Assert output integrity and observability
      # Observability: Validate that the response is non-empty to ensure high-fidelity reporting.
      # Using 'assert' provides an explicit checkpoint for the automation pipeline.
      ansible.builtin.assert:
        that:
          - http_raw.stdout is defined
          - http_raw.stdout | length > 0
        fail_msg: "Data retrieval failure on {{ inventory_hostname }}. Verify connectivity and credentials."
        quiet: true

    - name: Output formatted HTTP server state
      # Documentation: Clear headers and variable-driven output for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= [ {{ inventory_hostname }} ] HTTP SERVER =======================
          {{ http_raw.stdout }}