---
# NetLearner Architect Standard: HTTP Server Status Retrieval
# This playbook retrieves the HTTP server configuration from ASA/Firepower devices.
# It ensures observability through assertions and maintains idempotent behavior.
- name: Get HTTP Server Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show http server' command
      # Use Fully Qualified Collection Name (FQCN) for the network command module.
      # This operation is inherently idempotent as it is a read-only configuration check.
      ansible.netcommon.cli_command:
        command: show http server
      register: http_output
      # Error Handling: Fail if the device returns an error or if the command is unsupported.
      failed_when: 
        - "'Invalid input' in http_output.stdout"
        - "'ERROR:' in http_output.stdout"

    - name: Assert HTTP server data was retrieved
      # Observability: Validate that the command returned meaningful output for subsequent tasks.
      ansible.builtin.assert:
        that:
          - "http_output.stdout | length > 0"
        fail_msg: "Failed to retrieve HTTP server status or received empty output from the device."
        success_msg: "HTTP server status successfully captured."

    - name: Display formatted HTTP server status
      # Documentation: Provide structured visibility for operators and audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= HTTP SERVER STATUS =======================
          {{ http_output.stdout }}
          ==================================================================

    - name: Set fact for server state
      # Best Practice: Store state in a structured variable for potential downstream logic.
      ansible.builtin.set_fact:
        http_server_enabled: "{{ 'enabled' in http_output.stdout | lower }}"