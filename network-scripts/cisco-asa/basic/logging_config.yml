---
# Logging Configuration Retrieval and Validation
# Purpose: This playbook retrieves and validates the current logging configuration from Cisco ASA/Firepower devices.
# Standards: Implements FQCN, observability via assertions, and robust error handling.
- name: Get Logging Config
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Retrieve logging configuration using FQCN
      # Using ansible.netcommon.cli_command for standardized network CLI interaction
      ansible.netcommon.cli_command:
        command: show logging
      register: logging_result
      # Error Handling: Fail if the device returns an error string instead of the configuration
      failed_when: 
        - logging_result.stdout is search('Invalid input') or logging_result.stdout is search('ERROR')
      # Idempotency: Read-only commands are inherently idempotent as they do not modify device state

    - name: Validate logging output observability
      # Observability: Assert that the output is not empty to ensure data integrity
      ansible.builtin.assert:
        that:
          - "logging_result.stdout is defined"
          - "logging_result.stdout | length > 0"
        fail_msg: "Data retrieval failed: The 'show logging' command returned an empty or undefined result."
        success_msg: "Logging configuration successfully captured."

    - name: Display formatted logging configuration
      # Documentation: Providing a clear visual delimiter for log inspection
      ansible.builtin.debug:
        msg: |
          ======================= LOGGING CONFIGURATION =======================
          {{ logging_result.stdout }}