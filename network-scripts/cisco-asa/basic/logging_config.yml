---
- name: Retrieve and Validate Logging Configuration
  hosts: asa_firepower
  gather_facts: false # Disabled fact gathering to improve performance as only CLI access is required.

  tasks:
    - name: Execute 'show logging' command
      # Best Practices: Use Fully Qualified Collection Name (FQCN) for the network command module.
      ansible.netcommon.cli_command:
        command: show logging
      register: log_result
      # Error Handling: Fail the task if the device returns a CLI error or the command fails.
      failed_when:
        - log_result.failed | default(false)
        - "'Invalid input' in log_result.stdout"

    - name: Assert Logging Data Integrity
      # Observability: Verify that the output is not empty to ensure the data was successfully captured.
      ansible.builtin.assert:
        that:
          - "log_result.stdout is defined"
          - "log_result.stdout | length > 0"
        fail_msg: "The 'show logging' command returned empty or invalid results for {{ inventory_hostname }}."
        success_msg: "Logging configuration successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display Formatted Logging Output
      # Documentation: Provide a structured and human-readable view of the logging status for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= LOGGING STATUS: {{ inventory_hostname }} =======================
          {{ log_result.stdout }}
