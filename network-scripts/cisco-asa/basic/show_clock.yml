---
# Playbook: Get Clock and NTP Status for ASA/Firepower
# Purpose: This playbook retrieves and validates time synchronization state. 
# Accurate time is critical for log correlation and certificate validation.

- name: Get Clock and NTP Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current system clock
      # Using Fully Qualified Collection Name (FQCN) for reliability and future-proofing.
      ansible.netcommon.cli_command:
        command: show clock
      register: clock_output
      # Idempotency: 'show' commands are inherently idempotent as they do not modify configuration.

    - name: Validate system clock retrieval
      # Observability: Ensure the device returned a non-empty response.
      ansible.builtin.assert:
        that:
          - "clock_output.stdout is defined"
          - "clock_output.stdout | length > 0"
        fail_msg: "The 'show clock' command returned no data."
        success_msg: "System clock successfully retrieved."

    - name: Retrieve NTP synchronization status
      # Error Handling: 'show ntp status' may fail if NTP is not configured or the process hasn't started.
      # ignore_errors is used to prevent the play from stopping if NTP is simply unconfigured.
      ansible.netcommon.cli_command:
        command: show ntp status
      register: ntp_output
      ignore_errors: true

    - name: Verify NTP synchronization status
      # Observability: Check for the 'synchronized' keyword to confirm operational state.
      ansible.builtin.assert:
        that:
          - "'Clock is synchronized' in ntp_output.stdout"
        fail_msg: "Clock is NOT synchronized via NTP."
        success_msg: "Clock is successfully synchronized via NTP."
      when: ntp_output.failed is false
      ignore_errors: true

    - name: Display Consolidated Temporal Report
      # Documentation: Providing a human-readable summary of the device's time status.
      ansible.builtin.debug:
        msg: |
          ---------------------------------------------------
          DEVICE: {{ inventory_hostname }}
          SYSTEM CLOCK: {{ clock_output.stdout | trim }}
          NTP STATUS:   {{ ntp_output.stdout | default('NTP not configured or failed to respond') | trim }}
          ---------------------------------------------------