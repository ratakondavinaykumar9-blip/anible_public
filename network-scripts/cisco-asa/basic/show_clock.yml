# NetLearner Architect Standards: Time Synchronization Audit
# This playbook retrieves and validates temporal state on ASA/Firepower infrastructure.
# Read-only operations ensure idempotency across multiple execution cycles.

- name: Audit System Clock and NTP Synchronization
  hosts: asa_firepower
  gather_facts: false
  vars:
    ansible_connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve hardware system clock
      # Using FQCN to ensure predictable module resolution
      ansible.netcommon.cli_command:
        command: show clock
      register: clock_output
      # Fail early if the device returns an empty buffer, indicating a command execution timeout
      failed_when: clock_output.stdout | length == 0

    - name: Verify clock output integrity
      # Observability: Assert that the output contains standard time markers
      ansible.builtin.assert:
        that:
          - "clock_output.stdout is search('[0-9]:[0-9]')"
        fail_msg: "The 'show clock' command returned an invalid format."
        quiet: true

    - name: Check NTP synchronization status
      ansible.netcommon.cli_command:
        command: show ntp status
      register: ntp_output
      # Error Handling: We ignore errors as NTP might be disabled on some nodes; 
      # this prevents the entire play from failing during a broad audit.
      ignore_errors: true

    - name: Validate NTP operational state
      # Observability: Confirm the device is synchronized to an upstream stratum
      ansible.builtin.assert:
        that:
          - "'synchronized' in ntp_output.stdout"
        fail_msg: "CRITICAL: Device is not synchronized with a valid NTP source."
        success_msg: "NTP synchronization is active and healthy."
      # Only run assertion if the command itself was successful
      when: ntp_output.stdout is defined
      ignore_errors: true

    - name: Output audit results for logging
      # Documentation: Summary msg providing context for the security/operations audit trail
      ansible.builtin.debug:
        msg:
          - "Audit Timestamp: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}"
          - "Device Clock: {{ clock_output.stdout | trim }}"
          - "Sync Status: {{ 'OK' if 'synchronized' in (ntp_output.stdout | default('')) else 'WARNING/UNSYNCED' }}"
          - "NTP Details: {{ ntp_output.stdout | default('NTP NOT CONFIGURED') | trim }}"