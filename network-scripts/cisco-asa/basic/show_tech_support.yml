---
- name: "OPERATIONAL: Retrieve and Archive Cisco ASA/Firepower Tech Support Information"
  hosts: asa_firepower
  gather_facts: false
  # Why: Gathering facts is disabled to speed up execution as we only need CLI access.

  tasks:
    - name: "DATA_COLLECTION: Execute 'show tech-support' on the remote device"
      ansible.netcommon.cli_command:
        command: show tech-support
      register: tech_support_output
      # Why: Capture the command output for validation and subsequent file writing.
      # Error Handling: Fail if output is missing or contains common Cisco CLI error strings.
      failed_when: >
        tech_support_output.stdout is not defined or
        'Invalid input' in tech_support_output.stdout or
        '% Invalid' in tech_support_output.stdout

    - name: "OBSERVABILITY: Validate that the tech-support output is not empty"
      ansible.builtin.assert:
        that:
          - "tech_support_output.stdout | length > 0"
        fail_msg: "The tech-support output was empty. Check device status or connectivity."
        success_msg: "Successfully captured tech-support data."
      # Why: Ensure we have actual data before attempting to persist it to the filesystem.

    - name: "PERSISTENCE: Save captured tech-support data to a local file"
      ansible.builtin.copy:
        content: "{{ tech_support_output.stdout }}"
        dest: "/tmp/asa_tech_support_{{ inventory_hostname }}.txt"
        mode: '0644'
      register: file_save_status
      # Why: The copy module is idempotent; it only updates the file if the content has changed.
      # Using a local path allows for centralized collection and offline analysis.

    - name: "OBSERVABILITY: Confirm file write operation status"
      ansible.builtin.assert:
        that:
          - "file_save_status.dest is defined"
        fail_msg: "Failed to save the tech-support file to /tmp. Check local permissions."
      # Why: Explicitly verify that the data was successfully written to the management station.

    - name: "REPORTING: Display the summary of the capture operation"
      ansible.builtin.debug:
        msg: "Tech support capture complete. File saved at: {{ file_save_status.dest }}"
      # Why: Provide immediate feedback to the operator with the exact location of the artifact.