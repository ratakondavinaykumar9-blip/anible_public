# Show Tech Support - Enhanced for Enterprise NetLearner Standards
# Purpose: Securely retrieve and archive technical support diagnostic data from ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Tech Support Info
  hosts: asa_firepower
  gather_facts: false
  # Note: 'show tech-support' is resource-intensive; ensure ansible_command_timeout 
  # is adjusted in ansible.cfg or inventory for large configurations.

  tasks:
    - name: Execute diagnostic command on remote device
      # Use FQCN for network CLI operations
      ansible.netcommon.cli_command:
        command: show tech-support
      register: tech_output
      # Error Handling: Explicitly catch command failures or invalid syntax responses
      failed_when: 
        - tech_output.failed or "Invalid input" in tech_output.stdout
      # Documentation: This task is read-only and inherently idempotent

    - name: Validate retrieved data integrity
      # Observability: Ensure we didn't receive an empty or truncated buffer
      ansible.builtin.assert:
        that:
          - tech_output.stdout is defined
          - tech_output.stdout | length > 0
        fail_msg: "Tech support retrieval returned empty content for {{ inventory_hostname }}."
        success_msg: "Tech support data validated for {{ inventory_hostname }}."

    - name: Archive tech support data to local filesystem
      # Idempotency: builtin.copy only writes if content differs from existing file
      ansible.builtin.copy:
        content: "{{ tech_output.stdout }}"
        dest: "/tmp/asa_tech_support_{{ inventory_hostname }}.txt"
        owner: root
        group: root
        mode: '0600' # Restricted permissions for sensitive diagnostic data
      register: archive_result

    - name: Confirm persistence of diagnostic archive
      # Observability: Verify the file system operation succeeded
      ansible.builtin.assert:
        that:
          - archive_result.dest is defined
          - archive_result.state == "file"
        fail_msg: "Critical failure: Could not save tech support info to {{ archive_result.dest | default('destination') }}."

    - name: Report execution summary
      ansible.builtin.debug:
        msg: 
          - "Host: {{ inventory_hostname }}"
          - "Status: {{ 'New/Updated File Created' if archive_result.changed else 'No Changes Detected (File current)' }}"
          - "Path: {{ archive_result.dest }}"
          - "Size: {{ tech_output.stdout | length }} bytes"