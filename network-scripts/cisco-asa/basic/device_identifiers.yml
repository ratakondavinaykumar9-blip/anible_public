---
# IMPROVED: Show Device Identifiers with Validation and Observability
# This playbook retrieves unique hardware identifiers (Serial, UUID, MAC) from Cisco ASA/Firepower devices.
- name: Get Device IDs
  hosts: asa_firepower
  gather_facts: false # Optimization: Fact gathering is disabled for CLI-only discovery tasks.

  tasks:
    - name: Retrieve Serial Number and UUID
      # Using FQCN (Fully Qualified Collection Name) for cross-platform compatibility.
      ansible.netcommon.cli_command:
        command: "show version | include (Serial|UUID)"
      register: serial_result
      # Error Handling: Fail if the output is empty or contains standard Cisco error messages.
      failed_when:
        - "serial_result.stdout == ''"
        - "'Invalid input' in serial_result.stdout"

    - name: Validate Serial Information
      # Observability: Assert that identifying strings are present in the command output.
      ansible.builtin.assert:
        that:
          - "serial_result.stdout | length > 0"
        fail_msg: "The device did not return any Serial or UUID information."
        quiet: true

    - name: Retrieve MAC Address Information
      ansible.netcommon.cli_command:
        command: "show version | include MAC"
      register: mac_result
      failed_when:
        - "mac_result.stdout == ''"
        - "'Invalid input' in mac_result.stdout"

    - name: Validate MAC Address Information
      # Observability: Verify that MAC address data was successfully captured.
      ansible.builtin.assert:
        that:
          - "mac_result.stdout | length > 0"
        fail_msg: "The device did not return MAC address information."
        quiet: true

    - name: Display Formatted Device Identifiers
      # Documentation: Provide a clean, human-readable summary of the gathered identifiers.
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE IDs =======================
          SERIAL/UUID DATA:
          {{ serial_result.stdout }}

          MAC ADDRESS DATA:
          {{ mac_result.stdout }}
          ==========================================================