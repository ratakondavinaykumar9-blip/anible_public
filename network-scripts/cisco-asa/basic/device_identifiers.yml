---
# Playbook: Get Cisco ASA/Firepower Device Identifiers
# Purpose: Retrieves and validates hardware identifiers (Serial, UUID, MAC) for inventory audit.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage, and robust Error Handling.
- name: Get Device Identifiers
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Serial and UUID information
      # FQCN: Utilizing the standardized network common collection for CLI operations
      ansible.netcommon.cli_command:
        command: "show version | include (Serial|UUID)"
      register: serial_output
      # Idempotency: Read-only commands must explicitly set changed_when to false
      changed_when: false
      # Error Handling: Ensure the task fails if the output is empty or unexpected
      failed_when: serial_output.stdout | length == 0

    - name: Validate Serial/UUID data capture
      # Observability: Assert that the command actually returned identification strings
      ansible.builtin.assert:
        that:
          - "'Serial' in serial_output.stdout or 'UUID' in serial_output.stdout"
        fail_msg: "Identification strings (Serial/UUID) missing from output on {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve MAC address information
      ansible.netcommon.cli_command:
        command: "show version | include MAC"
      register: mac_output
      changed_when: false
      failed_when: mac_output.stdout | length == 0

    - name: Validate MAC address data capture
      ansible.builtin.assert:
        that:
          - "'MAC' in mac_output.stdout"
        fail_msg: "MAC address information could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Display Formatted Device Identity Report
      # Documentation: Providing a clean, human-readable summary for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE IDENTIFICATION =======================
          HOST: {{ inventory_hostname }}
          ---------------------------------------------------------------------
          {{ serial_output.stdout }}
          {{ mac_output.stdout }}
          =====================================================================