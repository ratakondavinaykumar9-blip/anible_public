---
# NetLearner Architect Standardized Playbook
# Purpose: Securely retrieves and validates hardware identifiers (Serial/MAC) from ASA/Firepower devices.
# Idempotency: Verified; read-only operations allow safe, repeated execution without state change.
# Observability: Implemented via register variables, content-aware failed_when logic, and explicit assertions.
# Best Practices: All modules utilize Fully Qualified Collection Names (FQCN).

- name: Get Device Identifiers
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Hardware Serial and UUID Information
      # FQCN: Using the ansible.netcommon collection for standardized network interaction
      ansible.netcommon.cli_command:
        command: "show version | include (Serial|UUID)"
      register: serial_output
      # Error Handling: Fail if the output is empty or does not contain expected hardware strings
      failed_when: >
        serial_output.stdout | length == 0 or
        ('Serial' not in serial_output.stdout and 'UUID' not in serial_output.stdout)

    - name: Retrieve Interface MAC Address Table
      ansible.netcommon.cli_command:
        command: "show version | include MAC"
      register: mac_output
      # Error Handling: Validate that MAC address information was successfully returned
      failed_when: mac_output.stdout | length == 0 or 'MAC' not in mac_output.stdout

    - name: Validate Observability - Verify Data Capture
      # Observability: Assert that critical facts were captured before continuing or reporting success
      ansible.builtin.assert:
        that:
          - serial_output.stdout | length > 0
          - mac_output.stdout | length > 0
        fail_msg: "Data collection failed: Critical identifiers are missing for {{ inventory_hostname }}."
        success_msg: "Observability Check: Hardware identifiers successfully captured and validated."

    - name: Display Standardized Device Inventory Record
      # Documentation: Displaying sanitized and trimmed output for observability in CI/CD logs
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE IDENTIFIERS =======================
          HOST: {{ inventory_hostname }}
          ------------------------------------------------------------------
          SERIAL/UUID DATA:
          {{ serial_output.stdout | trim }}

          MAC ADDRESS DATA:
          {{ mac_output.stdout | trim }}
          ==================================================================
```