---
# Playbook: Domain and DNS Configuration Audit
# This playbook retrieves and validates the domain-name configuration on Cisco ASA/Firepower devices.
# It adheres to standards for Idempotency, Observability, and Error Handling.
- name: Audit Domain and DNS configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current domain-name configuration
      # Using FQCN for the network common CLI module
      # Idempotency: This is a read-only operation and safe for repeated execution
      ansible.netcommon.cli_command:
        command: show running-config domain-name
      register: domain_output
      # Error Handling: Fail if the command is unrecognized or the task fails
      failed_when: 
        - domain_output.failed
        - "'Invalid input' in domain_output.stdout"

    - name: Verify domain-name configuration presence
      # Observability: Ensure the device actually has a domain name configured
      ansible.builtin.assert:
        that:
          - domain_output.stdout is defined
          - domain_output.stdout | length > 0
          - "'domain-name' in domain_output.stdout"
        fail_msg: "Audit Failed: No domain-name configuration found on the device."
        success_msg: "Audit Passed: Domain-name configuration successfully retrieved."

    - name: Display retrieved domain configuration
      # Observability: Provide a clear summary of the retrieved state
      ansible.builtin.debug:
        msg: "Device Domain Config: {{ domain_output.stdout }}"