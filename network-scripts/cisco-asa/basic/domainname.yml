# NetLearner Architect Improved Playbook: Domain and DNS Audit
# This playbook retrieves and validates network configuration safely across multiple runs.
- name: Audit Domain and DNS Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve domain-name configuration from running-config
      # FQCN: Using ansible.netcommon.cli_command for direct CLI interaction with ASA devices.
      # Idempotency: This is a read-only operation and safe to run repeatedly.
      ansible.netcommon.cli_command:
        command: show running-config domain-name
      register: domain_raw
      # Error Handling: Ensure we fail if the command is unrecognized or the connection fails.
      failed_when: 
        - domain_raw.failed or "Invalid" in domain_raw.stdout

    - name: Validate domain-name configuration retrieval
      # Observability: Assert that the command returned content to ensure data integrity.
      ansible.builtin.assert:
        that:
          - domain_raw.stdout is defined
          - domain_raw.stdout | length > 0
        fail_msg: "Domain-name retrieval failed or returned empty. Check device configuration."
        quiet: true

    - name: Retrieve DNS server configuration
      # Fulfilling the 'DNS' portion of the playbook's objective as stated in the header.
      ansible.netcommon.cli_command:
        command: show running-config dns
      register: dns_raw
      # Error Handling: ignore_errors is used as DNS may not be configured on all staging devices.
      ignore_errors: true

    - name: Display retrieved Domain and DNS details
      # Observability: Providing structured output for audit logging and manual verification.
      ansible.builtin.debug:
        msg:
          - "Domain Configuration: {{ domain_raw.stdout | trim | default('Undefined') }}"
          - "DNS Configuration: {{ dns_raw.stdout | trim | default('No DNS configured') }}"
      # Documentation: Only attempt display if the device responded to prevent template errors.
      when: domain_raw.stdout is defined