---
# Hardware Environmental Status Audit for Cisco ASA/Firepower
# Purpose: Monitors physical health (power, fans, temperature) to ensure operational stability.
# Idempotency: This is a read-only operation and does not modify device state, making it safe for repeated execution.
- name: Hardware Environmental Status Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve hardware environmental status via CLI
      # FQCN: Using ansible.netcommon for standardized CLI interaction across network devices
      ansible.netcommon.cli_command:
        command: show environment
      register: env_result
      # Error Handling: Fail the task if the output is empty or indicates a command error
      failed_when:
        - env_result.stdout | length == 0
        - "'Invalid' in env_result.stdout"

    - name: Validate hardware telemetry observability
      # Observability: Assert that critical hardware headers are present in the output
      ansible.builtin.assert:
        that:
          - "'Power Supply' in env_result.stdout or 'Temperature' in env_result.stdout"
        fail_msg: "Critical environmental telemetry missing for {{ inventory_hostname }}. Verify hardware module status."
        success_msg: "Environmental telemetry successfully captured and validated for {{ inventory_hostname }}."

    - name: Display formatted environmental report
      # Observability: Provides human-readable output for logging and manual inspection
      ansible.builtin.debug:
        msg: |
          ===========================================================
          DEVICE: {{ inventory_hostname }}
          AUDIT STATUS: SUCCESSFUL
          ======================= ENVIRONMENT =======================
          {{ env_result.stdout }}
