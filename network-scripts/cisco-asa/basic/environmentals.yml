---
- name: Get Environmental Information and Verify Health
  # Targeted at ASA and Firepower devices; gather_facts is disabled for performance on network nodes.
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show environment' command
      # Using FQCN for better portability and explicit module sourcing.
      # This task is inherently idempotent as it only retrieves current state.
      ansible.netcommon.cli_command:
        command: show environment
      register: env_output
      # Error Handling: Ensure the task fails if the command returns an empty response.
      failed_when: 
        - env_output.stdout is not defined 
        - env_output.stdout | length == 0

    - name: Validate hardware health status
      # Observability: Assert that the device sensors are reporting 'Normal' or 'OK'.
      # This ensures the playbook doesn't just run, but actually confirms a healthy state.
      ansible.builtin.assert:
        that:
          - "'Normal' in env_output.stdout or 'OK' in env_output.stdout"
        fail_msg: "Environmental health check failed. Potential hardware/sensor issue detected."
        success_msg: "Environmental health check passed: Hardware is operating within normal parameters."

    - name: Display formatted environmental data
      # Provide clear visibility into the raw output for audit logs and manual verification.
      ansible.builtin.debug:
        msg: |
          ======================= ENVIRONMENT STATUS =======================
          {{ env_output.stdout }}