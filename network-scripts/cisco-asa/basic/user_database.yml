---
# NetLearner Architect Improved Playbook
# Purpose: Audit and verify the local user database on Cisco ASA/Firepower devices.
# Idempotency: This operation is read-only (GET) and safe for repeated execution.
- name: User Database Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current local username configuration
      # Using FQCN for broad compatibility across network platforms
      ansible.netcommon.cli_command:
        command: show running-config username
      register: users_output
      # Error Handling: Ensure execution stops if the command is unrecognized or fails
      failed_when: 
        - users_output.failed or "Invalid input" in users_output.stdout

    - name: Validate command execution and data integrity
      # Observability: Assert that the command returned a valid, non-null response
      ansible.builtin.assert:
        that:
          - users_output.stdout is defined
        fail_msg: "Failed to retrieve user database from {{ inventory_hostname }}"
        success_msg: "User database integrity verified for {{ inventory_hostname }}"

    - name: Display formatted User Database report
      # Documentation: Providing a clear, audited view of the security configuration
      ansible.builtin.debug:
        msg: |
          ===========================================================
          USER DATABASE AUDIT - {{ inventory_hostname }}
          ===========================================================
          {{ users_output.stdout if users_output.stdout != "" else "No local users configured." }}