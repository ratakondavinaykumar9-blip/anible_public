---
# NetLearner Architect: Hardware Model Information Retrieval
# Retrieves and validates hardware model and version information from ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable (Assert), Best Practices (FQCN).

- name: Retrieve and Verify Hardware Model Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute command to extract Hardware and Model details
      # Uses FQCN for cross-environment compatibility and stability.
      # This task is inherently idempotent as it performs a non-state-changing query.
      ansible.netcommon.cli_command:
        command: "show version | include (Hardware|Model)"
      register: device_model_output
      # Error Handling: Ensure the task fails if the device returns no data or is unreachable.
      failed_when: 
        - device_model_output.stdout is not defined
        - device_model_output.stdout | length == 0

    - name: Validate that hardware information was correctly retrieved
      # Observability: Verifies the integrity of the output before proceeding.
      # Ensures the regex/filter in the CLI command actually matched relevant data.
      ansible.builtin.assert:
        that:
          - "'Hardware' in device_model_output.stdout or 'Model' in device_model_output.stdout"
        fail_msg: "The command output did not contain expected 'Hardware' or 'Model' strings."
        success_msg: "Hardware model data successfully validated."

    - name: Display retrieved Hardware Model information
      # Provides clear visibility for the operator into the specific hardware instance.
      ansible.builtin.debug:
        msg: "Detected Hardware Information: {{ device_model_output.stdout_lines }}"
