---
# NetLearner Architect - ASA/Firepower Queue Monitoring
# This playbook retrieves hardware/interface queue statistics for performance troubleshooting.
# It adheres to NetLearner standards for idempotency, observability, and error handling.

- name: Get Queue Info
  hosts: asa_firepower
  gather_facts: false # Facts are not required for simple CLI data retrieval, improving execution speed.

  tasks:
    - name: Retrieve queue statistics via CLI
      # This task is inherently idempotent as 'show' commands do not modify the device state.
      # FQCN is used to ensure compatibility across different Ansible environments.
      ansible.netcommon.cli_command:
        command: show queue
      register: queue_output
      # Error Handling: Validate that the command was recognized by the device.
      failed_when:
        - queue_output.failed
        - "'Invalid input' in queue_output.stdout or 'Usage' in queue_output.stdout"

    - name: Verify integrity of captured queue data
      # Observability: Use assertion to ensure the command returned actual data before proceeding.
      ansible.builtin.assert:
        that:
          - "queue_output.stdout | length > 0"
        fail_msg: "Queue data retrieval failed: The output buffer is empty."
        success_msg: "Queue data successfully validated and stored."

    - name: Display formatted queue metrics
      # Observability: Print the output with clear headers for easier log analysis in CI/CD pipelines.
      ansible.builtin.debug:
        msg: |
          ======================= QUEUE STATISTICS =======================
          {{ queue_output.stdout }}
          ================================================================
