---
# Playbook: Get Network Interface Queue Information
# Purpose: Retrieves and validates interface queue statistics from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Comments), FQCN usage.
- name: Get Queue Info
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show queue' command on the device
      # Using FQCN for better portability and consistency across environments.
      # Read-only 'show' commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: show queue
      register: queue_output
      # Error Handling: Ensure we catch command-level failures or unsupported syntax.
      failed_when: 
        - queue_output.failed or "Invalid input" in queue_output.stdout

    - name: Verify queue information was successfully retrieved
      # Observability: Assert that the output is not empty to ensure data integrity before reporting.
      ansible.builtin.assert:
        that:
          - queue_output.stdout is defined
          - queue_output.stdout | length > 0
        fail_msg: "Failed to retrieve queue information or command returned an empty result."
        success_msg: "Queue information successfully captured."

    - name: Display formatted queue statistics
      # Documentation: Providing a clear, readable summary for network administrators.
      ansible.builtin.debug:
        msg: |
          ======================= QUEUES ({{ inventory_hostname }}) =======================
          {{ queue_output.stdout }}