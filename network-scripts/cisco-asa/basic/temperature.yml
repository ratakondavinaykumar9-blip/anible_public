---
# Playbook: Monitor Temperature Sensors
# This playbook retrieves and validates temperature data from Cisco ASA/Firepower devices.
# It adheres to enterprise standards for idempotency, observability, and robust error handling.
- name: Network Health Monitoring - Temperature
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve temperature sensor data
      # Using FQCN (Fully Qualified Collection Name) for reliable network command execution.
      # This task is inherently idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: show temperature
      register: temp_output
      # Error Handling: Explicitly fail if the command execution fails or returns an 'Invalid input' string.
      failed_when: 
        - temp_output.failed or "Invalid input" in temp_output.stdout

    - name: Verify telemetry data integrity
      # Observability: Assert that the command returned meaningful data before proceeding.
      # This ensures that subsequent automation or reporting doesn't process null values.
      ansible.builtin.assert:
        that:
          - temp_output.stdout is defined
          - temp_output.stdout | length > 0
        fail_msg: "Temperature telemetry is missing or empty."
        success_msg: "Temperature telemetry successfully validated."

    - name: Output formatted temperature report
      # Documentation & Observability: Provides a human-readable summary for log analysis.
      ansible.builtin.debug:
        msg: |
          ======================= TEMPERATURE REPORT =======================
          Device: {{ inventory_hostname }}
          Status: Success
          ------------------------------------------------------------------
          {{ temp_output.stdout }}
          ==================================================================