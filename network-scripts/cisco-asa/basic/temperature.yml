---
# Playbook to monitor hardware temperature on ASA/Firepower devices.
# Proactive thermal monitoring is essential for hardware health and preventing unexpected shutdowns.
- name: Monitor Hardware Temperature
  hosts: asa_firepower
  gather_facts: false # Optimization: System facts are not required for these CLI-based tasks.

  tasks:
    - name: Retrieve hardware temperature via CLI
      # Use Fully Qualified Collection Name (FQCN) for reliability and clarity.
      # Read-only CLI commands are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: show temperature
      register: temp_output
      # Error Handling: Explicitly fail if the device returns an empty response or an error string.
      failed_when: >
        temp_output.stdout | length == 0 or
        'Invalid' in temp_output.stdout or
        'Error' in temp_output.stdout

    - name: Validate captured temperature data
      # Observability: Use assertions to verify that the output contains expected thermal indicators.
      ansible.builtin.assert:
        that:
          - "'Temperature' in temp_output.stdout or 'Celsius' in temp_output.stdout"
        fail_msg: "The command output does not contain valid temperature information."
        success_msg: "Hardware temperature data successfully validated."

    - name: Display formatted temperature status
      # Observability: Provide a clear, human-readable report of the device's thermal health.
      ansible.builtin.debug:
        msg: |
          ======================= TEMPERATURE STATUS: {{ inventory_hostname }} =======================
          {{ temp_output.stdout }}
