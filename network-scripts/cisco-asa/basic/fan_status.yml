MCP issues detected. Run /mcp list for status.```yaml
---
- name: Audit Cisco ASA/Firepower Fan Status
  hosts: asa_firepower
  gather_facts: false
  # Why: Verifies hardware environment health to prevent thermal throttling or shutdown.
  # Idempotency: This playbook is read-only and safe to execute repeatedly.

  tasks:
    - name: Retrieve fan hardware status from device CLI
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show fan
      # Observability: Register output for validation and logging
      register: fan_result
      # Error Handling: Fail if command execution fails or returns invalid input
      failed_when:
        - fan_result.failed or "invalid" in fan_result.stdout | lower

    - name: Assert that all fan units are in an 'OK' state
      # Observability: Use assert to enforce hardware health standards
      ansible.builtin.assert:
        # Why: ASA/FTD CLI returns 'OK' for operational fans. 
        # Lack of 'OK' indicates a critical hardware failure.
        that:
          - "'OK' in fan_result.stdout"
        fail_msg: "CRITICAL: Fan failure detected or status is non-operational."
        success_msg: "SUCCESS: All fans are functioning within normal parameters."

    - name: Output fan telemetry to console
      ansible.builtin.debug:
        msg: |
          ======================= FAN STATUS TELEMETRY =======================
          {{ fan_result.stdout }}
```