---
# NetLearner Architect - Fan Status Monitoring
# This playbook retrieves fan status from Cisco ASA/Firepower devices, 
# implementing validation checks to ensure operational integrity.
- name: Get Fan Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve fan status using CLI command
      # Using FQCN (Fully Qualified Collection Name) for portability and best practices.
      # Idempotency: 'show' commands are read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: show fan
      register: fan_result
      failed_when: 
        - fan_result.stdout is not defined
        - "'Invalid' in fan_result.stdout"

    - name: Verify fan status output integrity
      # Observability: Ensuring the command returned data and contains expected keywords.
      ansible.builtin.assert:
        that:
          - fan_result.stdout is defined
          - fan_result.stdout | length > 0
          - "'Fan' in fan_result.stdout or 'fan' in fan_result.stdout"
        fail_msg: "Failed to retrieve valid fan status from {{ inventory_hostname }}. Output was empty or unrecognized."
        success_msg: "Successfully retrieved and validated fan status from {{ inventory_hostname }}."

    - name: Display formatted fan status
      # Documentation: Providing a clean visual representation for network operators.
      ansible.builtin.debug:
        msg: |
          ======================= FAN STATUS: {{ inventory_hostname }} =======================
          {{ fan_result.stdout }}