# NetLearner Architect - ASA/Firepower Inspection Statistics Retrieval
# Purpose: Gathers real-time inspection telemetry from service policies.
# Standards: Idempotent (Read-only), Observable (Assert), Documented, FQCN.
- name: Get Inspection Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get inspection statistics via cli_command
      # FQCN: Ensures we use the specific collection module for network CLI operations.
      ansible.netcommon.cli_command:
        command: show service-policy | include inspect
      register: inspect_output
      # Error Handling: Fail if the command execution errors or if the device returns invalid syntax.
      failed_when:
        - inspect_output.failed | default(false)
        - "'Invalid input' in inspect_output.stdout"

    - name: Verify data observability
      # Observability: Confirm the output is populated before proceeding to ensure data integrity.
      ansible.builtin.assert:
        that:
          - "inspect_output.stdout is defined"
          - "inspect_output.stdout | length > 0"
        fail_msg: "No inspection statistics were returned. Verify service-policy configuration."
        success_msg: "Inspection statistics successfully retrieved and registered."

    - name: Display Inspection Results
      # Observability: Provide a clean, formatted output for auditing and automation logging.
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          {{ inspect_output.stdout | trim }}