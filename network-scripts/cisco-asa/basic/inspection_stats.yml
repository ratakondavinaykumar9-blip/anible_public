---
- name: Get Cisco ASA Inspection Statistics
  hosts: asa_firepower
  gather_facts: false
  # Why: This playbook gathers real-time inspection statistics from service policies to monitor security traffic.
  # Idempotency: This operation is read-only and safe to run repeatedly without modifying device state.

  tasks:
    - name: Retrieve inspection statistics from service-policy
      # Standard 5: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show service-policy | include inspect
      register: inspect_results
      # Standard 4: Error Handling - Catch CLI errors that don't return a non-zero exit code
      failed_when: 
        - "'Invalid input' in inspect_results.stdout or 'Incomplete command' in inspect_results.stdout"

    - name: Verify data was successfully captured
      # Standard 2: Observability - Use assert to verify the task returned expected data
      ansible.builtin.assert:
        that:
          - inspect_results.stdout is defined
        fail_msg: "Failed to retrieve output from the Cisco ASA device."
        quiet: true

    - name: Display inspection statistics
      # Standard 2: Observability - Format output for clear visibility
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          {{ inspect_results.stdout if inspect_results.stdout | length > 0 else 'No inspection matches found in active service policies.' }}