---
- name: Cisco ASA Group Policy Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve group-policy configuration from ASA
      # Why: Using FQCN (Fully Qualified Collection Name) ensures the use of the specialized Cisco ASA collection.
      # Idempotency: "show" commands are read-only operations and are inherently idempotent.
      cisco.asa.asa_command:
        commands:
          - show running-config group-policy
      register: policy_output
      # Error Handling: Explicitly fail if the connection fails or if the ASA returns an "Invalid input" error.
      failed_when: 
        - policy_output.failed or "Invalid input" in policy_output.stdout[0]

    - name: Validate policy retrieval
      # Why: Observability - verify that data was actually returned to ensure automation integrity.
      ansible.builtin.assert:
        that:
          - policy_output.stdout[0] is defined
          - policy_output.stdout[0] | length > 0
        fail_msg: "Failed to retrieve group policies or the configuration is empty on {{ inventory_hostname }}."
        success_msg: "Successfully retrieved group policies for {{ inventory_hostname }}."

    - name: Display Group Policies
      # Why: Documentation and visibility - providing the operator with the raw configuration state.
      ansible.builtin.debug:
        msg: |
          ======================= GROUP POLICIES: {{ inventory_hostname }} =======================
          {{ policy_output.stdout[0] }}