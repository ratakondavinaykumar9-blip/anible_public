---
# Playbook: ASA Group Policy Verification
# Description: This playbook retrieves and audits group policies from Cisco ASA/Firepower devices.
# Standards: Implements FQCN, Observability through assertions, and robust error handling.
- name: Audit Cisco ASA Group Policies
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve group-policy configuration
      # Use platform-specific FQCN for Cisco ASA commands
      cisco.asa.asa_command:
        commands:
          - show running-config group-policy
      register: policies_output
      # Error Handling: Catch common CLI errors that might not trigger a shell failure
      failed_when:
        - "policies_output.failed"
        - "'invalid' in policies_output.stdout[0] | lower"
      ignore_errors: false

    - name: Validate policy data integrity
      # Observability: Ensure the device returned configuration data to prevent silent processing of empty results
      ansible.builtin.assert:
        that:
          - policies_output.stdout[0] is defined
          - policies_output.stdout[0] | length > 0
        fail_msg: "Critical: No group policies were found or the command returned an empty string."
        success_msg: "Validation Passed: Group policy data successfully captured."

    - name: Display Group Policy Configuration
      # Observability: Formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= GROUP POLICIES =======================
          {{ policies_output.stdout[0] }}
      # Idempotency: This is a read-only operation; it is inherently safe to run multiple times
      when: not ansible_check_mode