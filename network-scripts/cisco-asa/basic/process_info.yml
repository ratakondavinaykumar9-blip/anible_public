---
# Cisco ASA/Firepower Operational Health Check: Process Information
# This playbook retrieves real-time process statistics to monitor system health.
# Idempotency: This is a read-only operation and is inherently safe to run multiple times.
- name: Retrieve and Validate Process Information
  hosts: asa_firepower
  gather_facts: false # Facts are not required for this operational monitoring task

  tasks:
    - name: Execute 'show process' command on the target device
      # Use Fully Qualified Collection Names (FQCN) for clarity and future-proofing
      ansible.netcommon.cli_command:
        command: show process
      register: proc_result
      # Error Handling: Explicitly fail if the command returns no data or is undefined
      failed_when: 
        - proc_result.stdout is not defined
        - proc_result.stdout | length == 0

    - name: Verify the integrity of the captured process data
      # Observability: Assert that the output contains expected headers to ensure a valid response
      ansible.builtin.assert:
        that:
          - "'Process' in proc_result.stdout"
        fail_msg: "The captured process information is invalid, incomplete, or the command failed."
        success_msg: "Process information integrity verified successfully."

    - name: Output the formatted process data for operator review
      # Observability: Provide a clean, formatted view for manual inspection or log captures
      ansible.builtin.debug:
        msg: |
          ======================= ASA/FIREPOWER PROCESSES =======================
          {{ proc_result.stdout }}
