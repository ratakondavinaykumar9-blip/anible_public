---
- name: Get Process Information from ASA/Firepower
  hosts: asa_firepower
  gather_facts: false
  # Documentation: This playbook retrieves and validates process data from network security appliances.
  # It is inherently idempotent as 'show' commands do not modify the device's operational state.

  tasks:
    - name: Execute 'show process' command on the target device
      # Best Practices: Utilizing Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show process
      register: proc_results
      # Error Handling: Ensure the playbook fails if the command is unrecognized or returns an error string
      failed_when:
        - proc_results.stdout is not defined
        - "'Invalid' in proc_results.stdout or 'Error' in proc_results.stdout"

    - name: Assert that process data was correctly captured
      # Observability: Verify that the response contains expected data markers and is not empty
      ansible.builtin.assert:
        that:
          - proc_results.stdout | length > 0
          - "'Process' in proc_results.stdout"
        fail_msg: "The 'show process' command failed to return valid data."
        success_msg: "Process data successfully retrieved and verified."

    - name: Output the retrieved process list
      ansible.builtin.debug:
        msg: |
          ======================= PROCESSES =======================
          {{ proc_results.stdout }}