---
- name: Get and Validate VLAN Information on ASA/Firepower
  hosts: asa_firepower
  gather_facts: false
  # Standard: Idempotency is inherent as this is a read-only operational command.

  tasks:
    - name: Retrieve VLAN details via CLI
      # Standard: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show vlan
      register: vlan_result
      # Standard: Error Handling - catch specific failure strings or execution errors
      failed_when:
        - vlan_result.failed or "Invalid input" in vlan_result.stdout or "ERROR" in vlan_result.stdout

    - name: Verify VLAN output integrity
      # Standard: Observability - Ensure the command returned data before proceeding
      ansible.builtin.assert:
        that:
          - vlan_result.stdout is defined
          - vlan_result.stdout | length > 0
        fail_msg: "VLAN information is empty or the command was not recognized by the device."
        success_msg: "VLAN information successfully captured from {{ inventory_hostname }}."

    - name: Display formatted VLAN report
      # Standard: Documentation - Provide clear, readable output for the operator
      ansible.builtin.debug:
        msg: |
          ===========================================================
          VLAN STATUS REPORT: {{ inventory_hostname }}
          ===========================================================
          {{ vlan_result.stdout }}