---
# NetLearner Architect Standard: Network Observability & Validation
# Purpose: Retrieves and validates VLAN configuration from Cisco ASA/Firepower appliances.
# Compliance: Idempotent (Read-Only), Observable (Assert), and Error-Aware.

- name: Get VLAN Info
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve VLAN configuration from device
      # FQCN: Using fully qualified collection names for stability and clarity.
      ansible.netcommon.cli_command:
        command: show vlan
      # Idempotency: Read-only tasks are set to check_mode: false to ensure data is gathered during dry-runs.
      check_mode: false
      register: vlan_output
      # Error Handling: Fail on execution error or if the device returns a CLI syntax error.
      failed_when: >
        vlan_output.failed or 
        "Invalid input" in vlan_output.stdout or 
        "incomplete command" in vlan_output.stdout.lower()

    - name: Validate VLAN information integrity
      # Observability: Assert that the returned data is present and contains expected keywords.
      ansible.builtin.assert:
        that:
          - vlan_output.stdout is defined
          - vlan_output.stdout | length > 0
          - "'VLAN' in vlan_output.stdout or 'Name' in vlan_output.stdout"
        fail_msg: "VLAN information is missing or the output format is unrecognized."
        quiet: true

    - name: Display formatted VLAN information
      # Documentation: Provides clear operational visibility for logs and console output.
      ansible.builtin.debug:
        msg: |
          ======================= VLAN STATUS =======================
          {{ vlan_output.stdout }}
