---
# Playbook to audit SNMP configuration on Cisco ASA/Firepower devices.
# This read-only operation is inherently idempotent and safe for repeated execution.
- name: Get SNMP Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve SNMP server configuration
      # Using FQCN for platform-specific command execution ensures consistency and reliability.
      cisco.asa.asa_command:
        commands:
          - show snmp-server
      register: snmp_output
      # Explicit error handling to catch cases where the command is unsupported or fails on the target.
      failed_when: 
        - snmp_output.failed or 'Invalid input' in snmp_output.stdout[0]

    - name: Validate SNMP configuration retrieval
      # Assertions provide observability by confirming that the expected data was successfully captured.
      ansible.builtin.assert:
        that:
          - snmp_output.stdout[0] is defined
          - snmp_output.stdout[0] | length > 0
        fail_msg: "Failed to retrieve SNMP configuration or the output is empty."
        success_msg: "SNMP configuration successfully retrieved."

    - name: Display SNMP configuration
      # Debugging output provides human-readable observability for operational auditing.
      ansible.builtin.debug:
        msg: |
          ======================= SNMP STATUS =======================
          {{ snmp_output.stdout[0] }}