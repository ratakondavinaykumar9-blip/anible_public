---
# Architect:Improved Playbook
# Purpose: Retrieves and validates SNMP server configuration on Cisco ASA/Firepower devices.
# This playbook adheres to standards for Idempotency, Observability, Documentation, Error Handling, and FQCN usage.

- name: Get SNMP Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve SNMP server configuration via CLI
      # Standard: FQCN used (ansible.netcommon.cli_command)
      # Idempotency: Read-only command is safe for repeated execution without side effects
      ansible.netcommon.cli_command:
        command: show snmp-server
      register: snmp_result
      # Error Handling: Explicitly fail if the command returns an error string or if the module fails
      failed_when: 
        - snmp_result.failed or "Invalid input" in snmp_result.stdout

    - name: Validate SNMP configuration data
      # Observability: Using assert to verify the command returned actual configuration data
      ansible.builtin.assert:
        that:
          - snmp_result.stdout is defined
          - snmp_result.stdout | length > 0
        fail_msg: "The SNMP configuration could not be retrieved or the output is empty."
        success_msg: "SNMP configuration successfully captured and verified."

    - name: Display formatted SNMP configuration
      # Documentation: Providing a clear, documented summary for the operator via debug
      ansible.builtin.debug:
        msg: |
          ======================= SNMP SERVER STATUS =======================
          {{ snmp_result.stdout }}