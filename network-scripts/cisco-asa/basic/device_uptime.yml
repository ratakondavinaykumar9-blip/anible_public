# Playbook: Get Cisco ASA/Firepower Uptime
# Description: This playbook retrieves the system uptime for network devices.
# It follows high-standard automation practices including idempotency, validation, and error handling.
- name: Get Device Uptime
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve uptime information via CLI
      # Using FQCN (Fully Qualified Collection Name) for cross-version compatibility.
      # Setting 'changed_when: false' marks this as a read-only task, ensuring true idempotency reporting.
      ansible.netcommon.cli_command:
        command: "show version | include (uptime|Uptime)"
      register: uptime_result
      changed_when: false
      # Error Handling: Fail explicitly if the command returns empty output or is undefined.
      failed_when: 
        - uptime_result.stdout is not defined or uptime_result.stdout | length == 0

    - name: Validate uptime output integrity
      # Observability: Verify that the expected data pattern exists before proceeding.
      # This prevents downstream processing of garbage or error strings.
      ansible.builtin.assert:
        that:
          - "uptime_result.stdout is search('uptime', ignorecase=true)"
        fail_msg: "Uptime information was not found in the output for {{ inventory_hostname }}."
        success_msg: "Uptime data validated successfully."
        quiet: true

    - name: Display formatted uptime
      # Observability: Provide clear, actionable output for the operator.
      ansible.builtin.debug:
        msg: "Device [{{ inventory_hostname }}] Uptime: {{ uptime_result.stdout | trim }}"