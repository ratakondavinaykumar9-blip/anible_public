---
- name: Get Device Uptime
  hosts: asa_firepower
  gather_facts: false
  # Purpose: Safely retrieve and verify the system uptime for Cisco ASA/Firepower devices.
  # Standards: Idempotent (Read-only), Observability (Assert), Best Practices (FQCN).

  tasks:
    - name: Retrieve uptime information via CLI
      # Using FQCN for network command execution
      ansible.netcommon.cli_command:
        command: "show version | include (uptime|Uptime)"
      register: uptime_output
      # Error Handling: Fail if command returns empty output or syntax errors
      failed_when:
        - uptime_output.stdout | length == 0
        - "'Invalid input' in uptime_output.stdout"

    - name: Validate uptime data integrity
      # Observability: Ensure the output contains expected keywords
      ansible.builtin.assert:
        that:
          - "uptime_output.stdout is search('uptime', ignorecase=true)"
        fail_msg: "Uptime information was not found in the command output."
        success_msg: "Uptime information successfully verified."

    - name: Display formatted uptime
      ansible.builtin.debug:
        msg: "Device {{ inventory_hostname }} Uptime: {{ uptime_output.stdout | trim }}"