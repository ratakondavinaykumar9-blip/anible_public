---
- name: "Network Audit: Retrieve and Validate Flash Storage Information"
  hosts: asa_firepower
  gather_facts: false
  # Idempotency: This playbook is inherently idempotent as it only performs read-only 'show' operations.

  tasks:
    - name: "Retrieve flash information using FQCN"
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show flash
      register: flash_result
      # Error Handling: Fail the task if the command is not recognized or execution fails
      failed_when: 
        - flash_result.failed | default(false)
        - "'Invalid input' in flash_result.stdout"

    - name: "Validate command output"
      # Observability: Assert that the output contains expected keywords (e.g., 'bytes')
      ansible.builtin.assert:
        that:
          - "flash_result.stdout is defined"
          - "'bytes' in flash_result.stdout"
        fail_msg: "Flash information could not be verified or is empty."
        success_msg: "Flash information successfully retrieved and validated."

    - name: "Display formatted Flash report"
      # Documentation: Displaying the output for visibility and logging purposes
      ansible.builtin.debug:
        msg: |
          ======================= FLASH REPORT: {{ inventory_hostname }} =======================
          {{ flash_result.stdout }}
          ====================================================================