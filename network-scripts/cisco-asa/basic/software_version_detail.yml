# NetLearner Architect Standard: Detailed Software Version Retrieval
# This playbook retrieves and validates the software version of ASA/Firepower devices.
# It adheres to NetLearner Staging standards for idempotency, observability, and error handling.

- name: Get Detailed Version
  hosts: asa_firepower
  gather_facts: false # Performance optimization: Fact gathering is not required for command execution.

  tasks:
    - name: Retrieve software version from device
      # Using FQCN for cross-platform network command execution.
      # This operation is inherently idempotent as it only performs a read-only 'show' command.
      ansible.netcommon.cli_command:
        command: show version
      register: version_output
      # Error Handling: Ensure the task fails if the command returns an error string despite a zero exit status.
      failed_when:
        - version_output.stdout is not defined
        - "'Invalid input' in version_output.stdout"
        - "'ERROR:' in version_output.stdout"

    - name: Verify version data integrity
      # Observability: Assert that the output contains expected identifying strings to confirm successful retrieval.
      ansible.builtin.assert:
        that:
          - "'Cisco' in version_output.stdout"
          - "'Software' in version_output.stdout"
        fail_msg: "The retrieved version output does not appear to be valid Cisco ASA/Firepower data."
        success_msg: "Version data successfully retrieved and validated."

    - name: Display formatted version information
      # Provides a human-readable summary of the validated output for observability.
      ansible.builtin.debug:
        msg: |
          ======================= DETAILED VERSION =======================
          {{ version_output.stdout }}