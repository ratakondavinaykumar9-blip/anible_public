---
- name: Get Detailed Software Version from Cisco ASA/Firepower
  # Purpose: Retrieves and validates software version information for inventory and compliance auditing.
  # This playbook is designed to be idempotent and provides robust validation of device responses.
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Defining expected pattern to ensure we received a valid response from an ASA/Firepower device
    valid_version_pattern: "Cisco"

  tasks:
    - name: Retrieve software version details via CLI
      # Use FQCN for the network common CLI module
      # Task is idempotent as it performs a read-only 'show' operation
      ansible.netcommon.cli_command:
        command: show version
      register: ver
      # Error Handling: Fail explicitly if the command is not recognized or execution fails
      failed_when:
        - ver.failed or "Invalid input" in ver.stdout
      # Ensure this task runs even in check mode to support read-only validation
      check_mode: false

    - name: Validate command output integrity
      # Observability: Use assert to verify that the retrieved data meets expected format/content
      ansible.builtin.assert:
        that:
          - "ver.stdout is defined"
          - "valid_version_pattern in ver.stdout"
        fail_msg: "The 'show version' output is empty or does not contain expected Cisco headers."
        success_msg: "Successfully retrieved and validated software version."

    - name: Display formatted version information
      # Observability: Output the results for manual review or logging systems
      ansible.builtin.debug:
        msg: |
          ======================= DETAILED VERSION =======================
          {{ ver.stdout }}