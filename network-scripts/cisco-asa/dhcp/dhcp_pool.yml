---
# DHCP Pool Configuration and Verification
# Author: NetLearner Architect
# This playbook retrieves and validates DHCP pool configurations on Cisco ASA/Firepower devices.
# Standards: FQCN, Idempotency (read-only), Observability (register/assert), Error Handling.

- name: DHCP Pool Configuration Management
  hosts: asa_firepower
  gather_facts: false # Performance optimization for network devices

  tasks:
    - name: Retrieve current DHCP pool configuration
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show running-config dhcpd pool
      register: dhcp_pool_output
      # Error Handling: Detect if the command failed or returned an invalid response
      failed_when: 
        - dhcp_pool_output.failed or 'Invalid input' in dhcp_pool_output.stdout

    - name: Validate DHCP configuration retrieval
      # Observability: Assert that the response is defined and properly captured
      ansible.builtin.assert:
        that:
          - dhcp_pool_output.stdout is defined
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}. Verify connectivity and credentials."
        success_msg: "DHCP configuration successfully captured from {{ inventory_hostname }}."

    - name: Display DHCP Pool Configuration
      # Documentation: Format output for operational visibility and audit trails
      # Idempotency: Read-only operations are inherently idempotent and safe for repeated execution
      ansible.builtin.debug:
        msg: |
          ========================================================================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ lookup('pipe', 'date +%Y-%m-%d\ %H:%M:%S') }}
          ======================= DHCP POOL CONFIGURATION =======================
          {{ dhcp_pool_output.stdout if dhcp_pool_output.stdout | length > 0 else 'NOTICE: No DHCP pools are currently configured on this device.' }}
          ========================================================================