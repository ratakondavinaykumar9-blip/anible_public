MCP issues detected. Run /mcp list for status.```yaml
---
# DHCP Pool Configuration and Operational Verification
# Purpose: Ensures DHCP pools are correctly configured and verified on Cisco ASA/Firepower devices.
- name: DHCP Pool Configuration
  hosts: asa_firepower
  gather_facts: false # NetLearner Standard: Disable facts to optimize execution for network devices

  vars:
    # Define desired configuration state (typically sourced from host_vars/group_vars)
    dhcp_pool_range: "192.168.10.10-192.168.10.50"
    dhcp_target_interface: "inside"

  tasks:
    - name: Ensure DHCP pool is configured on the target interface
      # Standard 1 & 5: Idempotent configuration using Fully Qualified Collection Names (FQCN)
      # Ensures the DHCP pool range and service enablement are present in the running configuration.
      cisco.asa.asa_config:
        lines:
          - "dhcpd address {{ dhcp_pool_range }} {{ dhcp_target_interface }}"
          - "dhcpd enable {{ dhcp_target_interface }}"
      register: config_result
      # Standard 4: Error Handling - Catch configuration failures while ignoring non-critical warnings
      failed_when:
        - "config_result.failed"
        - "'Invalid' in config_result.msg or 'Error' in config_result.msg"

    - name: Retrieve DHCP pool configuration for verification
      # Standard 2: Observability - Registering output for programmatic validation
      ansible.netcommon.cli_command:
        command: "show running-config dhcpd pool"
      register: pools_output
      # Documentation: Capturing the state of the device to confirm the configuration was applied successfully.

    - name: Validate DHCP pool configuration state
      # Standard 2: Observability - Using 'assert' to confirm the desired state is active in the running-config
      ansible.builtin.assert:
        that:
          - "dhcp_pool_range in pools_output.stdout"
          - "dhcp_target_interface in pools_output.stdout"
        fail_msg: "CRITICAL: DHCP pool {{ dhcp_pool_range }} not found on {{ dhcp_target_interface }}!"
        success_msg: "SUCCESS: DHCP pool configuration verified on {{ dhcp_target_interface }}."

    - name: Display current DHCP pool operational status
      # Standard 3: Documentation - Providing clear, formatted visibility for audit trails and logging
      ansible.builtin.debug:
        msg: |
          ======================= DHCP POOL AUDIT =======================
          Interface: {{ dhcp_target_interface }}
          Pool Range: {{ dhcp_pool_range }}
          
          Current Running Configuration:
          {{ pools_output.stdout }}
          ===============================================================
```