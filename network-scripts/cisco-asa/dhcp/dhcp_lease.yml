MCP issues detected. Run /mcp list for status.```yaml
---
- name: DHCP Leases Retrieval
  hosts: asa_firepower
  gather_facts: false
  # Documentation: This playbook provides visibility into DHCP address allocations on ASA/Firepower devices.
  # Idempotency: It is inherently idempotent as it only performs a read-only 'show' command.

  tasks:
    - name: Fetch current DHCP leases from the security appliance
      # Best Practice: Use Fully Qualified Collection Names (FQCN)
      ansible.netcommon.cli_command:
        command: show dhcpd lease
      register: lease_output
      # Error Handling: Catch ASA-specific error strings that might not return a non-zero exit code
      failed_when:
        - lease_output.failed or "Invalid input" in lease_output.stdout or "ERROR:" in lease_output.stdout

    - name: Validate that lease data was successfully captured
      # Observability: Verify the expected state of the registered variable before proceeding
      ansible.builtin.assert:
        that:
          - lease_output.stdout is defined
          - lease_output.stdout | length > 0
        fail_msg: "Command completed but returned no data. Ensure DHCP server is active and leases exist."
        success_msg: "Successfully retrieved DHCP lease data."

    - name: Output DHCP lease details to console
      ansible.builtin.debug:
        msg: |
          ======================= DHCP LEASES =======================
          {{ lease_output.stdout }}
```