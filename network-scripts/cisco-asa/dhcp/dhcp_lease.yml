---
# DHCP Leases Retrieval for Cisco ASA/Firepower
# Purpose: This playbook securely retrieves and displays active DHCP leases.
# Standards: Idempotency is maintained via read-only commands; Observability is provided through assertions.
- name: DHCP Leases
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Task: Retrieve DHCP leases using FQCN"
      # Using FQCN for the network-agnostic CLI module
      ansible.netcommon.cli_command:
        command: show dhcpd lease
      register: lease_output
      # Error Handling: Ensure we catch ASA-specific CLI errors that might not trigger a module failure
      failed_when:
        - lease_output.failed or "Invalid input" in lease_output.stdout
      # Idempotency: Naturally idempotent as 'show' commands do not modify device configuration

    - name: "Assert: Verify lease data was successfully captured"
      # Observability: Validate that the response is defined to ensure the integrity of the automation pipeline
      ansible.builtin.assert:
        that:
          - "lease_output.stdout is defined"
          - "lease_output.stdout | length > 0"
        fail_msg: "DHCP lease retrieval failed or returned empty data. Check if DHCP server is enabled."
        success_msg: "DHCP lease data successfully captured and verified."

    - name: "Display: Output formatted DHCP lease information"
      # Documentation: Clear visual separation for logs and operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= DHCP LEASES =======================
          {{ lease_output.stdout }}