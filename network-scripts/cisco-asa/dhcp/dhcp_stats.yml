MCP issues detected. Run /mcp list for status.```yaml
---
- name: Monitor DHCP Statistics
  # Description: Retrieves and validates DHCP operational data from ASA/Firepower devices.
  # Idempotency: This playbook is safe to run repeatedly as it only performs read-only operations.
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve DHCP server statistics via CLI
      # Why: Fetches raw counters for DHCP transactions (Discovers, Offers, etc.) to monitor pool health.
      ansible.netcommon.cli_command:
        command: show dhcpd statistics
      register: dhcp_stats
      # Error Handling: Fail if the command is unsupported or the CLI returns a syntax error.
      failed_when:
        - dhcp_stats.failed or "Invalid input" in dhcp_stats.stdout

    - name: Validate statistics output integrity
      # Observability: Ensures that the command returned meaningful content before displaying results.
      ansible.builtin.assert:
        that:
          - dhcp_stats.stdout is defined
          - dhcp_stats.stdout | length > 0
        fail_msg: "DHCP statistics retrieval failed: Empty or invalid response from {{ inventory_hostname }}."
        success_msg: "DHCP statistics successfully captured and validated for {{ inventory_hostname }}."

    - name: Display formatted DHCP statistics
      # Why: Provides a clear, human-readable view of the statistics for operational logs and audits.
      ansible.builtin.debug:
        msg: |
          ========================= DHCP OPERATIONAL DATA =========================
          DEVICE: {{ inventory_hostname }}
          -------------------------------------------------------------------------
          {{ dhcp_stats.stdout }}
          =========================================================================
```