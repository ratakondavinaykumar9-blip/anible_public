---
# Playbook: Get Failover Interface Status
# This playbook retrieves and validates the failover interface status on Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert/Register), Documentation (Comments), FQCN.
- name: Get Failover Interface Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve failover interface status from device
      # Use FQCN for CLI command execution to ensure portability and clarity
      ansible.netcommon.cli_command:
        command: show failover interface
      register: intf_result
      # Error Handling: Fail explicitly if the command is not recognized or the output indicates an error
      failed_when: 
        - intf_result.failed or "invalid input" in intf_result.stdout | lower
        - "'usage:' in intf_result.stdout | lower"

    - name: Validate failover status response
      # Observability: Assert that the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - intf_result.stdout is defined
          - intf_result.stdout | length > 0
          - "'failover' in intf_result.stdout | lower"
        fail_msg: "The command 'show failover interface' returned invalid or empty data."
        success_msg: "Failover interface status successfully retrieved and validated."

    - name: Display formatted failover interface information
      # Documentation: Provide a clear, human-readable view of the operational state for logs/stdout
      ansible.builtin.debug:
        msg: |
          ======================= FAILOVER INTERFACES =======================
          {{ intf_