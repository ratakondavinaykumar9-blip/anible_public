---
# Failover Configuration Check and Validation Playbook
# Purpose: Verifies the failover status on Cisco ASA/Firepower devices to ensure High Availability (HA) integrity.
# This playbook adheres to idempotency by using read-only 'show' commands.
- name: Failover Config Check
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Failover Status from Device
      # Use Fully Qualified Collection Name (FQCN) for consistent module resolution.
      # Command is inherently idempotent as it does not modify device state.
      ansible.netcommon.cli_command:
        command: show failover
      register: failover_output
      # Error Handling: Ensure the task fails if the command execution encounters an issue.
      failed_when: failover_output.failed | default(false)

    - name: Verify Failover Operational State
      # Observability: Use assert to validate that Failover is active.
      # This provides a clear pass/fail signal for automation pipelines.
      ansible.builtin.assert:
        that:
          - "'Failover On' in failover_output.stdout"
        fail_msg: "CRITICAL: Failover is NOT enabled or is in a failed state on {{ inventory_hostname }}."
        success_msg: "SUCCESS: Failover is operational on {{ inventory_hostname }}."

    - name: Display Formatted Failover Status
      # Provides human-readable observability for audit logs and console output.
      ansible.builtin.debug:
        msg: |
          ======================= FAILOVER REPORT: {{ inventory_hostname }} =======================
          {{ failover_output.stdout }}