---
# Playbook: Retrieve and Validate Cisco ASA/Firepower Failover Configuration
# Standards: Idempotency (Read-only), Observability (Asserts/Register), Best Practices (FQCN)
- name: Get Failover Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve failover running-config
      # Purpose: Fetch the current failover state. Read operations are inherently idempotent.
      # Using FQCN (Fully Qualified Collection Names) for reliable collection mapping.
      ansible.netcommon.cli_command:
        command: show running-config failover
      register: failover_output
      # Error Handling: Catch common CLI errors or invalid command responses.
      failed_when: 
        - failover_output.failed or "Invalid" in failover_output.stdout

    - name: Verify failover configuration retrieval
      # Observability: Ensure the command returned content to avoid false positives in automation.
      ansible.builtin.assert:
        that:
          - failover_output.stdout is defined
          - failover_output.stdout | length > 0
        fail_msg: "The failover configuration could not be retrieved or is empty."
        success_msg: "Successfully captured failover configuration."

    - name: Log failover configuration details
      # Documentation: Provides human-readable visibility into the device state for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= FAILOVER CONFIG =======================
          {{ failover_output.stdout }}

    - name: Determine failover operational status
      # Observability: Register a boolean fact to allow conditional logic in larger workflows.
      ansible.builtin.set_fact:
        is_failover_configured: "{{ 'failover' in failover_output.stdout }}"

    - name: Final status report
      # Provides a concise summary of the task outcome.
      ansible.builtin.debug:
        msg: "Failover configuration check complete. Status: {{ 'Configured' if is_failover_configured else 'Unconfigured' }}"