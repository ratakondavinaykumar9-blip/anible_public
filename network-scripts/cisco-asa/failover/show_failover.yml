---
- name: Get Failover Status and Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "GATHER | Retrieve core failover information"
      # Using FQCN cisco.asa.asa_command for consistent platform execution.
      # This is a read-only operation, ensuring idempotency across multiple runs.
      cisco.asa.asa_command:
        commands:
          - show failover
      register: failover_output
      # Error Handling: Prevent task failure if failover is simply disabled on the device.
      failed_when: 
        - failover_output.failed
        - "'Invalid input' in failover_output.msg | default('')"

    - name: "ASSERT | Verify device response integrity"
      # Observability: Ensure the device returned valid data before proceeding.
      ansible.builtin.assert:
        that:
          - failover_output.stdout is defined
          - failover_output.stdout | length > 0
        fail_msg: "Device {{ inventory_hostname }} failed to return failover status."

    - name: "GATHER | Retrieve failover statistics"
      # Gathering granular packet and interface statistics for performance monitoring.
      cisco.asa.asa_command:
        commands:
          - show failover statistics
      register: failover_stats
      # Conditional Execution: Skip statistics gathering if failover is not active.
      when: 
        - failover_output.stdout[0] is defined
        - "'failover off' not in failover_output.stdout[0] | lower"

    - name: "GATHER | Retrieve failover history"
      # Capturing the state change history to identify recent failover events or flapping.
      cisco.asa.asa_command:
        commands:
          - show failover history
      register: failover_history
      when: 
        - failover_output.stdout[0] is defined
        - "'failover off' not in failover_output.stdout[0] | lower"

    - name: "REPORT | Consolidate failover summary"
      # Providing a structured observability report for the network operator.
      ansible.builtin.debug:
        msg: |
          ==============================================================================
          Failover Status Report: {{ inventory_hostname }}
          ==============================================================================
          
          CORE STATUS:
          {{ failover_output.stdout[0] }}
          
          DETAILED STATISTICS:
          {{ failover_stats.stdout[0] | default('N/A - Statistics not gathered (Failover disabled)') }}
          
          EVENT HISTORY:
          {{ failover_history.stdout[0] | default('N/A - History not gathered (Failover disabled)') }}
      when: failover_output.stdout is defined