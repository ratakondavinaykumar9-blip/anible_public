---
# Playbook to retrieve and validate ASA failover status, statistics, and history.
# Optimized for NetLearner Staging with a focus on Idempotency, Observability, and Robustness.
- name: Get Failover Status and Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get failover information
      # FQCN: Using cisco.asa collection to retrieve structured failover state.
      # Idempotency: This operation is read-only and safe to run repeatedly.
      cisco.asa.asa_failover:
      register: failover_output
      # Error Handling: Ignore errors here to handle the "Failover Off" state gracefully via assertion.
      ignore_errors: true

    - name: Validate failover operational status
      # Observability: Ensure failover is actually enabled before attempting to collect statistics.
      ansible.builtin.assert:
        that:
          - failover_output is not failed
          - '"Failover Off" not in failover_output.msg | default("")'
        fail_msg: "Failover is not operational or configured on {{ inventory_hostname }}."
        success_msg: "Failover is operational on {{ inventory_hostname }}."

    - name: Get failover statistics
      # Captures detailed packet and state transition metrics for deep observability.
      ansible.netcommon.cli_command:
        command: show failover statistics
      register: failover_stats
      # Error Handling: Use failed_when to catch empty output or unrecognized commands.
      failed_when:
        - failover_stats.stdout is not defined
        - failover_stats.stdout | length == 0
        - '"Invalid input" in failover_stats.stdout'

    - name: Get failover history
      # Retrieves transition history to audit stability and identify recent failover events.
      ansible.netcommon.cli_command:
        command: show failover history
      register: failover_history
      failed_when:
        - failover_history.stdout is not defined
        - failover_history.stdout | length == 0
        - '"Invalid input" in failover_history.stdout'

    - name: Verify data collection completeness
      # Observability: Final assertion to ensure all required output variables were captured.
      ansible.builtin.assert:
        that:
          - failover_stats.stdout is defined
          - failover_history.stdout is defined
        fail_msg: "Incomplete data collection for {{ inventory_hostname }}."
        quiet: true

    - name: Summary Report
      # Documentation: Provide a consolidated, human-readable summary of the failover state.
      ansible.builtin.debug:
        msg: |
          ============================================================
          FAILOVER STATUS: {{ inventory_hostname }}
          ============================================================
          
          CORE STATUS:
          {{ failover_output | to_nice_yaml }}
          
          STATISTICS:
          {{ failover_stats.stdout }}
          
          HISTORY:
          {{ failover_history.stdout }}
          ============================================================
