MCP issues detected. Run /mcp list for status.---
- name: Archive ASA/Firepower Configuration Backup
  hosts: asa_firepower
  gather_facts: false
  vars:
    backup_path: "/tmp/asa_backups"
    # Using now() to maintain timestamping without requiring full fact gathering
    timestamp: "{{ now(fmt='%Y-%m-%dT%H-%M-%S') }}"

  tasks:
    - name: Ensure local backup directory exists
      # IDEMPOTENCY: Ensures the destination path is available before file operations
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Retrieve running configuration
      # BEST PRACTICE: Using Fully Qualified Collection Names (FQCN)
      ansible.netcommon.cli_command:
        command: show running-config
      register: config_result
      # ERROR HANDLING: Verify output isn't empty and doesn't contain error strings
      failed_when: 
        - config_result.stdout == ""
        - "'Invalid input' in config_result.stdout"

    - name: Retrieve device version information
      ansible.netcommon.cli_command:
        command: show version
      register: version_result
      failed_when: 
        - version_result.stdout == ""
        - "'Invalid input' in version_result.stdout"

    - name: Validate data retrieval
      # OBSERVABILITY: Assert that required metadata and config were successfully captured
      ansible.builtin.assert:
        that:
          - config_result.stdout | length > 100
          - version_result.stdout | length > 0
        fail_msg: "Failed to capture sufficient data from {{ inventory_hostname }}"

    - name: Persist archive to local storage
      # DOCUMENTATION: Combines version and config into a single timestamped audit trail
      ansible.builtin.copy:
        content: |
          # Backup Date: {{ timestamp }}
          # Device: {{ inventory_hostname }}
          
          # VERSION
          {{ version_result.stdout }}
          
          # CONFIG
          {{ config_result.stdout }}
        dest: "{{ backup_path }}/archive_{{ inventory_hostname }}_{{ timestamp }}.txt"
        mode: '0640'
      delegate_to: localhost
      register: backup_file

    - name: Verify file persistence
      # OBSERVABILITY: Confirm the file was successfully written to the destination
      ansible.builtin.assert:
        that:
          - backup_file.dest is defined
        fail_msg: "The backup file for {{ inventory_hostname }} was not created."

    - name: Report Result
      ansible.builtin.debug:
        msg: "Archive backup for {{ inventory_hostname }} completed: {{ backup_file.dest }}"