---
- name: Archive Cisco ASA and Firepower Configuration
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Centralized path for backup storage on the control node
    backup_path: "/tmp/asa_backups"
    # Using local timestamp to avoid dependency on remote device facts
    backup_timestamp: "{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}"

  tasks:
    - name: Ensure local backup directory exists
      # WHY: Ensures the destination path is available before writing files, maintaining idempotency
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Retrieve running configuration from security appliance
      # WHY: Captures the current active state for disaster recovery and audit compliance
      ansible.netcommon.cli_command:
        command: show running-config
      register: config_output
      # ERROR HANDLING: Fails explicitly if the command returns no data to prevent empty backups
      failed_when: 
        - config_output.stdout is not defined or config_output.stdout | length == 0

    - name: Retrieve system version information
      # WHY: Records hardware and software metadata associated with the configuration
      ansible.netcommon.cli_command:
        command: show version
      register: version_output
      failed_when: 
        - version_output.stdout is not defined or version_output.stdout | length == 0

    - name: Validate data integrity
      # OBSERVABILITY: Verifies that both configuration and version data were successfully registered
      ansible.builtin.assert:
        that:
          - "config_output.stdout | length > 0"
          - "version_output.stdout | length > 0"
        fail_msg: "Data retrieval failed for {{ inventory_hostname }}. Aborting file creation."
        quiet: true

    - name: Persist consolidated archive to control node
      # WHY: Combines metadata, version, and config into a single timestamped audit file
      ansible.builtin.copy:
        content: |
          # NetLearner Archive Backup
          # Generated: {{ backup_timestamp }}
          # Device: {{ inventory_hostname }}
          
          # --- SYSTEM VERSION ---
          {{ version_output.stdout }}
          
          # --- RUNNING CONFIGURATION ---
          {{ config_output.stdout }}
        dest: "{{ backup_path }}/archive_{{ inventory_hostname }}_{{ backup_timestamp }}.txt"
        mode: '0640'
      delegate_to: localhost

    - name: Finalize backup report
      # OBSERVABILITY: Confirms successful execution and provides the destination path
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} successfully stored in {{ backup_path }}"