MCP issues detected. Run /mcp list for status.---
- name: Backup with Version
  hosts: asa_firepower
  gather_facts: no
  vars:
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: Generate consistent timestamp
      # Documentation: Creates a unified timestamp for all backups in this execution
      ansible.builtin.set_fact:
        backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d_%H%M%S') }}"
      run_once: true

    - name: Ensure backup directory exists
      # Idempotency: Creates the destination folder on the controller if it doesn't exist
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Get running configuration
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show running-config
      register: running
      # Error Handling: Prevent saving empty files if the command fails silently
      failed_when: 
        - running.stdout | length == 0
        - "'Invalid input' in running.stdout"

    - name: Get version information
      ansible.netcommon.cli_command:
        command: show version
      register: version
      failed_when: version.stdout | length == 0

    - name: Validate configuration data
      # Observability: Assert that the captured output contains expected firewall keywords
      ansible.builtin.assert:
        that:
          - "running.stdout | length > 100"
          - "'Cisco' in version.stdout"
        fail_msg: "Configuration capture for {{ inventory_hostname }} failed validation or is too small."

    - name: Save backup to local file
      # Documentation: Combines config and version metadata into an audit-ready timestamped file
      ansible.builtin.copy:
        content: |
          # ASA Configuration Backup
          # Device Version Metadata:
          # {{ version.stdout_lines[:5] | join('\n# ') }}
          # Archive Date: {{ backup_timestamp }}
          
          {{ running.stdout }}
        # Idempotency: 'copy' only writes to the file system if content has changed
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ backup_timestamp }}.cfg"
        mode: '0644'
      delegate_to: localhost

    - name: Report backup status
      # Observability: Provides final confirmation of the archived backup location
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} successfully archived in {{ backup_path }}/"