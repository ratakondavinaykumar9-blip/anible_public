---
- name: Secure Backup of ASA Configuration with Version Metadata
  hosts: asa_firepower
  gather_facts: false
  vars:
    backup_path: "/tmp/asa_backups"
    # Use now() for consistent timestamping without requiring full fact gathering
    timestamp: "{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}"

  tasks:
    - name: Ensure backup directory exists on control node
      # Idempotency: Ensures the directory is present without failing if it already exists
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Retrieve running configuration from ASA
      # Captures the current active configuration from the device
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config
      # Error Handling: Fail explicitly if the response is empty
      failed_when: running_config.stdout | length == 0

    - name: Verify running configuration integrity
      # Observability: Ensure we have actual configuration data before proceeding
      ansible.builtin.assert:
        that:
          - "'interface' in running_config.stdout"
        fail_msg: "Retrieved configuration appears incomplete or invalid."

    - name: Retrieve version information from ASA
      # Captures metadata to include in the backup file header
      ansible.netcommon.cli_command:
        command: show version
      register: version_info
      # Error Handling: Allow the playbook to continue even if metadata retrieval fails
      ignore_errors: true

    - name: Save configuration with metadata to control node
      # Writes the configuration to disk; delegated to localhost to keep backups off the device
      ansible.builtin.copy:
        content: |
          # ASA Configuration Backup
          # Device: {{ inventory_hostname }}
          # Version Metadata:
          # {{ (version_info.stdout_lines | default(['N/A']))[:5] | join('\n# ') }}
          # Backup Timestamp: {{ timestamp }}
          
          {{ running_config.stdout }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"
        mode: '0600'
      delegate_to: localhost
      register: save_result

    - name: Confirm backup file was successfully written
      # Observability: Verify that the copy task successfully created the file
      ansible.builtin.assert:
        that:
          - save_result.dest is defined
        fail_msg: "Failed to write the backup file to {{ backup_path }}"

    - name: Display backup summary
      # Provides final visibility into the location of the generated backup
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} successfully stored at {{ save_result.dest }}"