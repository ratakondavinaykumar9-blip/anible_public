---
# Playbook: Backup Cisco ASA/Firepower running-config to TFTP
# Purpose: Ensures configuration persistence and centralized storage.
# Standards: FQCN, Observability, Idempotency, and Robust Error Handling.
- name: Backup to TFTP
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Target TFTP server IP or Hostname
    tftp_server: "10.0.0.1"
    # Descriptive filename including device name for traceability
    backup_filename: "{{ inventory_hostname }}_running_config.cfg"

  tasks:
    - name: Transfer running-config to TFTP server
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      # The full URI syntax is used to avoid interactive prompts, ensuring automation stability.
      ansible.netcommon.cli_command:
        command: "copy running-config tftp://{{ tftp_server }}/{{ backup_filename }}"
      register: tftp_output
      # Error Handling: Check for common Cisco error signatures in the command output.
      # Using 'failed_when' to catch application-level errors that might not return a non-zero exit code.
      failed_when: >
        tftp_output.failed or
        'Error' in tftp_output.stdout or
        'Invalid' in tftp_output.stdout or
        'failed' in tftp_output.stdout or
        '% ' in tftp_output.stdout
      # Idempotency: This task is safe to run repeatedly; it overwrites the destination
      # file with the current running state without affecting device stability.

    - name: Assert backup success
      # Observability: Verify that the CLI output contains success indicators (e.g., bytes copied).
      ansible.builtin.assert:
        that:
          - "'bytes copied' in tftp_output.stdout or '[OK]' in tftp_output.stdout"
        fail_msg: "TFTP transfer failed for {{ inventory_hostname }}. CLI Output: {{ tftp_output.stdout }}"
        success_msg: "Configuration successfully backed up to {{ tftp_server }}/{{ backup_filename }}"

    - name: Display backup confirmation
      # Documentation: Provides clear, logged feedback for the operator.
      ansible.builtin.debug:
        msg: "Backup process for {{ inventory_hostname }} to TFTP server {{ tftp_server }} is complete and verified."