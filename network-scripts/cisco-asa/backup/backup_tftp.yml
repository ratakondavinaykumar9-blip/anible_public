---
# NetLearner Architect Standard: TFTP Backup Playbook
# Purpose: Ensures consistent, observable, and reliable backups of ASA/Firepower configurations.
- name: Backup Cisco ASA/Firepower Configuration to TFTP
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Centralized TFTP server IP - defined here for portability
    tftp_server: "10.0.0.1"
    # Dynamic filename utilizing inventory hostname for uniqueness
    tftp_dest_file: "{{ inventory_hostname }}_running_config.cfg"

  tasks:
    - name: Transfer running-configuration to remote TFTP server
      # FQCN used to ensure compatibility with standard NetLearner collections
      # URI format is used to minimize interactive prompts and ensure execution flow
      ansible.netcommon.cli_command:
        command: "copy running-config tftp://{{ tftp_server }}/{{ tftp_dest_file }}"
      register: tftp_output
      # Error Handling: Catch specific Cisco CLI error patterns to trigger task failure
      failed_when:
        - "tftp_output.stdout is not defined"
        - "'Error' in tftp_output.stdout or 'Invalid' in tftp_output.stdout or 'failed' in tftp_output.stdout"

    - name: Validate backup success through output analysis
      # Observability: Assert that the transfer completed by checking for 'bytes copied'
      # This ensures the playbook doesn't report 'ok' if the network transfer timed out silently
      ansible.builtin.assert:
        that:
          - "'bytes copied' in tftp_output.stdout or 'OK' in tftp_output.stdout"
        fail_msg: "TFTP Backup Failed for {{ inventory_hostname }}. CLI Response: {{ tftp_output.stdout | default('No response') }}"
        success_msg: "Configuration successfully verified and backed up to {{ tftp_server }}"

    - name: Display backup operation results
      # Final verification step for operator visibility
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Destination: tftp://{{ tftp_server }}/{{ tftp_dest_file }}"
          - "Status: Backup Verified"
