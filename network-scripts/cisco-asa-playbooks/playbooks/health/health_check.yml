---
# ASA Health Check - CPU, Memory, Connections
# This playbook performs a non-intrusive health assessment of Cisco ASA devices.
# Standards: Idempotency (read-only), Observability (assertions), 
# Documentation, Error Handling, and FQCN (Fully Qualified Collection Names).
- name: ASA Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Collect controller timestamp for reporting
      # Using setup on localhost because network devices do not support standard fact gathering
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      run_once: true
      register: controller_setup

    - name: Retrieve system resource usage
      # FQCN: Using ansible.netcommon.cli_command for cross-platform stability
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_output
      # Error Handling: Fail if output is empty or contains known error strings
      failed_when: 
        - resource_output.stdout | length == 0
        - "'Invalid input' in resource_output.stdout"

    - name: Retrieve active connection counts
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_output
      failed_when: conn_output.stdout | length == 0

    - name: Retrieve CPU utilization metrics
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_output
      failed_when: cpu_output.stdout | length == 0

    - name: Retrieve memory allocation statistics
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_output
      failed_when: mem_output.stdout | length == 0

    - name: Verify health metrics collection success
      # Observability: Assert that all required data points were captured
      ansible.builtin.assert:
        that:
          - resource_output.stdout is defined
          - conn_output.stdout is defined
          - cpu_output.stdout is defined
          - mem_output.stdout is defined
        fail_msg: "Critical health metrics could not be retrieved from {{ inventory_hostname }}"
        quiet: true

    - name: Generate JSON health report for monitoring systems
      # Idempotency: Re-creates the report file on each run to reflect current state
      # Redirection: Delegated to localhost to centralize logs on the management server
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ hostvars['localhost']['ansible_date_time']['iso8601'] }}",
            "resources": {{ resource_output.stdout | to_json }},
            "connections": {{ conn_output.stdout | to_json }},
            "cpu": {{ cpu_output.stdout | to_json }},
            "memory": {{ mem_output.stdout | to_json }}
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      delegate_to: localhost
      when