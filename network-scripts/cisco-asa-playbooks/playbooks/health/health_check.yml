---
# ASA Health Check - Performance and Resource Monitoring
# This playbook collects health metrics from Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable (Asserts), Documented, FQCN.
- name: ASA Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Gather facts for reporting timestamp
      # Why: Enables the 'ansible_date_time' variable for the JSON report
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"
      delegate_to: localhost

    - name: Get system resource usage
      # Why: Monitor usage of XLATE, connections, and other resource limits
      cisco.asa.asa_command:
        commands:
          - show resource usage
      register: resource_output
      failed_when: 
        - resource_output.failed or "Invalid" in resource_output.stdout[0]

    - name: Verify resource output integrity
      # Observability: Ensure we received a valid response before proceeding
      ansible.builtin.assert:
        that:
          - "resource_output.stdout[0] is search('Resource')"
        fail_msg: "Resource usage command did not return expected data."

    - name: Get connection statistics
      # Why: Identify session spikes that could indicate DDoS or capacity issues
      cisco.asa.asa_command:
        commands:
          - show conn count
      register: conn_output
      failed_when: 
        - conn_output.failed or "Invalid" in conn_output.stdout[0]

    - name: Verify connection stats integrity
      # Observability: Validate that session count data is present
      ansible.builtin.assert:
        that:
          - "conn_output.stdout[0] is search('in use')"
        fail_msg: "Connection count command did not return expected data."

    - name: Get CPU utilization
      # Why: Detect high processor load that impacts traffic throughput
      cisco.asa.asa_command:
        commands:
          - show cpu usage
      register: cpu_output
      failed_when: 
        - cpu_output.failed or "Invalid" in cpu_output.stdout[0]

    - name: Verify CPU usage integrity
      # Observability: Check for valid CPU percentage data
      ansible.builtin.assert:
        that:
          - "cpu_output.stdout[0] is search('CPU usage')"
        fail_msg: "CPU usage command did not return expected data."

    - name: Get memory status
      # Why: Monitor for memory leaks or exhaustion risks
      cisco.asa.asa_command:
        commands:
          - show memory
      register: mem_output
      failed_when: 
        - mem_output.failed or "Invalid" in mem_output.stdout[0]

    - name: Verify memory output integrity
      # Observability: Confirm memory statistics were successfully retrieved
      ansible.builtin.assert:
        that:
          - "mem_output.stdout[0] is search('Free')"
        fail_msg: "Memory info command did not return expected data."

    - name: Generate structured JSON health report
      # Why: Provides a machine-readable format for SolarWinds or SIEM ingestion
      # Idempotency: Overwrites the local file on the controller with current state
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "resources": {{ resource_output.stdout[0] | to_json }},
            "connections": {{ conn_output.stdout[0] | to_json }},
            "cpu": {{ cpu_output.stdout[0] | to_json }},
            "memory": {{ mem_output.stdout[0] | to_json }}
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'
      delegate_to: localhost

    - name: Display human-readable health summary
      # Why: Immediate feedback for network administrators during execution
      ansible.builtin.debug:
        msg: |
          ============================================================
          Health Check: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          ============================================================
          CPU USAGE:
          {{ cpu_output.stdout[0] }}

          MEMORY STATUS:
          {{ mem_output.stdout[0] }}

          CONNECTIONS:
          {{ conn_output.stdout[0] }}

          RESOURCES:
          {{ resource_output.stdout[0] }}
          ============================================================
      when: output_format | default('text') == 'text'