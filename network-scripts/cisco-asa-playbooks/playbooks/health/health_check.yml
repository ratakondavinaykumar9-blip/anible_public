---
# ASA Health Check - CPU, Memory, Connections
# Standards applied: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: ASA Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default format is 'text' for CLI debugging; use 'json' for system integration
    output_format: text

  tasks:
    - name: Capture execution timestamp from controller
      # Standard gather_facts is disabled for speed; generate local timestamp for report consistency
      ansible.builtin.set_fact:
        execution_timestamp: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Fetch system resource usage
      # Gathers usage stats for connections, XLATEs, and other licensed resources
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_output
      # Error Handling: Validate command execution and ensure non-empty output
      failed_when: 
        - resource_output.failed or resource_output.stdout | length == 0

    - name: Fetch active connection count
      # Monitors stateful connection table metrics
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_output
      failed_when: 
        - conn_output.failed or conn_output.stdout | length == 0

    - name: Fetch CPU utilization profile
      # Captures 5s, 1m, and 5m usage snapshots
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_output
      failed_when: 
        - cpu_output.failed or cpu_output.stdout | length == 0

    - name: Fetch memory allocation details
      # Monitors system heap and free memory status
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_output
      failed_when: 
        - mem_output.failed or mem_output.stdout | length == 0

    - name: Validate telemetry integrity
      # Observability: Assert that received strings contain expected headers to ensure data validity
      ansible.builtin.assert:
        that:
          - "'Resource' in resource_output.stdout"
          - "'connections' in conn_output.stdout"
          - "'CPU' in cpu_output.stdout"
          - "'Free' in mem_output.stdout"
        fail_msg: "Telemetry validation failed. The ASA output may be malformed or truncated."

    - name: Persist health report to persistent storage
      # Idempotency: 'copy' module ensures the destination file is updated only if content changes
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ execution_timestamp }}",
            "resources": {{ resource_output.stdout | to_json }},
            "connections": {{ conn_output.stdout | to_json }},
            "cpu": {{ cpu_output.stdout | to_json }},
            "memory": {{ mem_output.stdout | to_json }}
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: Display formatted summary to operator
      # Observability: Provides immediate visibility for manual health audits
      ansible.builtin.debug:
        msg: |
          ============================================================
          ASA HEALTH SUMMARY | {{ inventory_hostname }}
          TIMESTAMP: {{ execution_timestamp }}
          ============================================================
          [RESOURCE USAGE]
          {{ resource_output.stdout }}

          [CONNECTION STATS]
          {{ conn_output.stdout }}

          [CPU UTILIZATION]
          {{ cpu_output.stdout }}

          [MEMORY STATUS]
          {{ mem_output.stdout }}
      when: output_format == 'text'
