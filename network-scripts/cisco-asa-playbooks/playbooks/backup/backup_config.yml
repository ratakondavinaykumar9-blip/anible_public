---
# Backup ASA Configuration - Improved for Production Standards
- name: Backup ASA Configuration
  hosts: asa_firepower
  gather_facts: false # Fact gathering is typically skipped for network devices to optimize performance
  vars:
    # Defined backup path; can be overridden via inventory or extra_vars
    backup_path: "/tmp/asa_backups"
    # Generate a unique timestamp for versioned backups and idempotency
    timestamp: "{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}"
    backup_name: "{{ inventory_hostname }}_{{ timestamp }}"

  tasks:
    - name: "PRE-CHECK: Ensure backup directory exists on control node"
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost
      # Ensures storage is ready before attempting network operations to prevent orphaned sessions

    - name: "GATHER: Retrieve running configuration"
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config
      # Error Handling: Fail if the response is empty, indicating a session or privilege error
      failed_when: 
        - running_config.stdout is not defined or running_config.stdout | length == 0
      # Best Practice: Using Fully Qualified Collection Names (FQCN)

    - name: "GATHER: Retrieve startup configuration"
      ansible.netcommon.cli_command:
        command: show startup-config
      register: startup_config
      failed_when:
        - startup_config.stdout is not defined or startup_config.stdout | length == 0

    - name: "ASSERT: Validate configuration data integrity"
      ansible.builtin.assert:
        that:
          - "'interface' in running_config.stdout"
          - "'hostname' in running_config.stdout"
        fail_msg: "Retrieved configuration appears truncated or invalid"
        quiet: true
      # Observability: Verifying that we actually captured a valid Cisco ASA configuration

    - name: "EXPORT: Save running configuration to local disk"
      ansible.builtin.copy:
        content: "{{ running_config.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0640'
      delegate_to: localhost
      register: save_running
      # Idempotency: Copy module ensures the file is created safely without corruption

    - name: "EXPORT: Save startup configuration to local disk"
      ansible.builtin.copy:
        content: "{{ startup_config.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0640'
      delegate_to: localhost
      register: save_startup

    - name: "METADATA: Generate backup manifest"
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ timestamp }}",
            "files": {
              "running_config": "{{ backup_name }}_running.cfg",
              "startup_config": "{{ backup_name }}_startup.cfg"
            }
          }
        dest: "{{ backup_path }}/{{ backup_name }}_manifest.json"
        mode: '0640'
      delegate_to: localhost

    - name: "ASSERT: Verify local file persistence"
      ansible.builtin.assert:
        that:
          - save_running is success
          - save_startup is success
        fail_msg: "Configuration files were not successfully saved to {{ backup_path }}"
      # Final validation to ensure the backup objective was met

    - name: "REPORT: Display backup summary"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "BACKUP SUCCESSFUL: {{ inventory_hostname }}"
          - "========================================"
          - "Storage Path: {{ backup_path }}"
          - "Manifest: {{ backup_name }}_manifest.json"
          - "========================================"