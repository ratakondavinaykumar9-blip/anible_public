---
# Backup ASA Configuration
# Standards: Idempotent, Observable, Documented, Secure, FQCN-compliant
- name: Backup ASA Configuration
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    # Use lookup to generate timestamp on the controller (avoids dependency on device clock/facts)
    backup_timestamp: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    backup_path: "/tmp/asa_backups"
    backup_name: "{{ inventory_hostname }}_{{ backup_timestamp }}"

  tasks:
    - name: Ensure local backup directory exists
      # Why: Ensures the destination path is available before starting backup operations.
      # Idempotency: 'state: directory' only creates if missing.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      register: dir_check

    - name: Verify backup directory readiness
      # Observability: Confirm the directory is present and writable on the control node.
      ansible.builtin.assert:
        that:
          - dir_check is successful
        fail_msg: "Backup directory {{ backup_path }} could not be created or accessed on localhost."

    - name: Fetch running configuration
      # Why: Captures the current active operational state of the ASA.
      # Best Practice: Use FQCN and handle potential command failures or empty responses.
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config_output
      failed_when: 
        - running_config_output.stdout is not defined
        - running_config_output.stdout | length == 0
        - "'Invalid input' in running_config_output.stdout"

    - name: Fetch startup configuration
      # Why: Captures the configuration that will be loaded on next reboot.
      # Error Handling: Startup config might be empty/uninitialized on new devices; ignore_errors allows playbook to continue.
      ansible.netcommon.cli_command:
        command: show startup-config
      register: startup_config_output
      ignore_errors: true

    - name: Validate configuration retrieval integrity
      # Observability: Ensure the retrieved content contains expected ASA configuration markers.
      ansible.builtin.assert:
        that:
          - "'hostname' in running_config_output.stdout or 'interface' in running_config_output.stdout"
        fail_msg: "Running configuration retrieved from {{ inventory_hostname }} appears incomplete or invalid."

    - name: Persist running configuration to disk
      # Why: Saves the captured config to a timestamped file for archival and auditing.
      # Idempotency: 'copy' with content only updates if the content differs from the destination.
      ansible.builtin.copy:
        content: "{{ running_config_output.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0600'
      delegate_to: localhost
      register: running_save_status

    - name: Persist startup configuration to disk
      # Why: Archives the startup config if it was successfully retrieved.
      ansible.builtin.copy:
        content: "{{ startup_config_output.stdout | default('! Startup config unavailable at time of backup') }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0600'
      delegate_to: localhost
      when: startup_config_output is successful and startup_config_output.stdout is defined

    - name: Create backup manifest (JSON)
      # Why: Structured metadata simplifies automated backup management, indexing, and recovery.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "backup_timestamp": "{{ backup_timestamp }}",
            "files": {
              "running_config": "{{ backup_name }}_running.cfg",
              "startup_config": "{{ backup_name }}_startup.cfg"
            },
            "status": "completed",
            "ansible_version": "{{ ansible_version.full }}"
          }
        dest: "{{ backup_path }}/{{ backup_name }}_manifest.json"
        mode: '0644'
      delegate_to: localhost

    - name: Verify backup file existence
      # Observability: Final check to ensure the file was actually written to the local filesystem.
      ansible.builtin.stat:
        path: "{{ backup_path }}/{{ backup_name }}_running.cfg"
      delegate_to: localhost
      register: backup_file_stat

    - name: Assert backup success
      ansible.builtin.assert:
        that:
          - backup_file_stat.stat.exists
        fail_msg: "Backup verification failed: File {{ backup_name }}_running.cfg was not found on localhost."

    - name: Display backup summary
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} successfully completed. Path: {{ backup_path }}/{{ backup_name }}_running.cfg"