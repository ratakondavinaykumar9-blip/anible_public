---
# Backup ASA Configuration
- name: Backup ASA Configuration
  hosts: asa_firepower
  # Disable fact gathering to avoid Python execution attempts on network hardware
  gather_facts: no
  vars:
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: Gather controller-side facts for timestamping
      # This task populates ansible_date_time for unique, traceable filenames
      # Delegating to localhost ensures facts are gathered even when remote hosts are non-Linux
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"
      delegate_to: localhost
      run_once: true

    - name: Define dynamic backup naming convention
      # Use a file-system friendly ISO8601 timestamp for idempotency in logging
      ansible.builtin.set_fact:
        backup_name: "{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}"

    - name: Ensure local backup directory exists
      # Idempotent: ensures path exists with correct ownership and secure permissions
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Retrieve running configuration from ASA
      # Use FQCN for platform-specific command handling and reliability
      cisco.asa.asa_command:
        commands:
          - show running-config
      register: running_config
      # Error Handling: verify command returned data and didn't result in a CLI error
      failed_when:
        - running_config.stdout is not defined
        - running_config.stdout[0] | length == 0
        - "'Invalid' in running_config.stdout[0]"

    - name: Validate running configuration integrity
      # Observability: assert that we captured a valid config before writing to disk
      ansible.builtin.assert:
        that:
          - "'interface' in running_config.stdout[0]"
          - "'boot system' in running_config.stdout[0]"
        fail_msg: "Captured running configuration appears incomplete or corrupted."

    - name: Retrieve startup configuration from ASA
      cisco.asa.asa_command:
        commands:
          - show startup-config
      register: startup_config
      failed_when:
        - startup_config.stdout is not defined
        - startup_config.stdout[0] | length == 0

    - name: Save running configuration to controller
      # copy with content is idempotent; it only updates the file if the content differs
      ansible.builtin.copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0644'
      delegate_to: localhost
      register: running_file_write

    - name: Save startup configuration to controller
      ansible.builtin.copy:
        content: "{{ startup_config.stdout[0] }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0644'
      delegate_to: localhost
      register: startup_file_write

    - name: Generate backup manifest for audit trail
      # Metadata allows for programmatic verification of backup sessions
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "files": {
              "running": "{{ backup_name }}_running.cfg",
              "startup": "{{ backup_name }}_startup.cfg"
            },
            "checksums": {
              "running": "{{ running_config.stdout[0] | hash('sha1') }}",
              "startup": "{{ startup_config.stdout[0] | hash('sha1') }}"
            }
          }
        dest: "{{ backup_path }}/{{ backup_name }}_manifest.json"
        mode: '0644'
      delegate_to: localhost

    - name: Verify backup persistence success
      # Observability: Ensure files were actually registered as written
      ansible.builtin.assert:
        that:
          - running_file_write.dest is defined
          - startup_file_write.dest is defined
        fail_msg: "Configuration files were not successfully persisted to {{ backup_path }}."

    - name: Display backup completion summary
      ansible.builtin.debug:
        msg:
          - "SUCCESS: Backup generated for {{ inventory_hostname }}"
          - "Base Name: {{ backup_name }}"
          - "Location: {{ backup_path }}"
