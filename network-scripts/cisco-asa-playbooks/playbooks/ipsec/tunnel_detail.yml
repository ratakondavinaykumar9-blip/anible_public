---
# Detailed IPSec Tunnel Information for Cisco ASA/Firepower
# This playbook collects comprehensive VPN session data and IPsec security association details.
- name: Get Detailed IPSec Tunnel Info
  hosts: asa_firepower
  gather_facts: yes  # Required to populate ansible_date_time for the report timestamp
  vars:
    output_format: text
    tunnel_peer: ""  # Set a specific peer IP to filter results, otherwise gets all L2L sessions

  tasks:
    - name: "VALIDATE: Verify input parameters"
      ansible.builtin.assert:
        that:
          - tunnel_peer is string
        fail_msg: "The tunnel_peer variable must be a string."
      # Documentation: Pre-flight check to ensure the input variable is in the expected format.

    - name: "COLLECT: Get detailed tunnel info by peer"
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l filter-ipaddress {{ tunnel_peer }}"
      register: tunnel_peer_output
      when: tunnel_peer | length > 0
      # Documentation: Fetches session details filtered by a specific peer IP.

    - name: "COLLECT: Get all tunnel details"
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l"
      register: tunnel_all_output
      when: tunnel_peer | length == 0
      # Documentation: Fetches all active L2L sessions when no specific peer is provided.

    - name: "COLLECT: Get crypto stats for specific peer"
      ansible.netcommon.cli_command:
        command: "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: crypto_detail_output
      when: tunnel_peer | length > 0
      ignore_errors: yes
      # Error Handling: If the peer is not active, the command may return an error string.
      # ignore_errors ensures the playbook continues to collect other diagnostic data.

    - name: "COLLECT: Get IKEv1 session details"
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa detail"
      register: ikev1_detail_output
      # Why: Phase 1 IKEv1 details are critical for troubleshooting legacy tunnel establishment.

    - name: "COLLECT: Get IKEv2 session details"
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa detail"
      register: ikev2_detail_output
      # Why: Phase 1 IKEv2 details provide visibility into modern VPN session parameters.

    - name: "OBSERVABILITY: Validate command execution"
      ansible.builtin.assert:
        that:
          - ikev1_detail_output.stdout is defined
          - ikev2_detail_output.stdout is defined
        fail_msg: "Core VPN status commands failed to return output. Verify device accessibility."
      # Observability: Confirm that baseline data collection was successful before processing output.

    - name: "EXPORT: Save detailed report as JSON"
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "tunnel_peer": "{{ tunnel_peer | default('all', true) }}",
            "tunnel_details": {{ (tunnel_peer | length > 0) | ternary(tunnel_peer_output.stdout | default(''), tunnel_all_output.stdout | default('')) | to_json }},
            "crypto_details": {{ crypto_detail_output.stdout | default('') | to_json }},
            "ikev1_details": {{ ikev1_detail_output.stdout | to_json }},
            "ikev2_details": {{ ikev2_detail_output.stdout | to_json }}
          }
        dest: "/tmp/asa_ipsec_detail_{{ inventory_hostname }}_{{ tunnel_peer | default('all', true) | replace('.', '_') }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'
      # Idempotency: The copy module is idempotent. Specifying mode 0644 ensures consistent permissions across runs.

    - name: "DISPLAY: Human readable output"
      ansible.builtin.debug:
        msg: |
          =======================
          IPSec Tunnel Details: {{ inventory_hostname }}
          {% if tunnel_peer | length > 0 %}
          Peer: {{ tunnel_peer }}
          {% endif %}
          =======================
          {{ (tunnel_peer | length > 0) | ternary(tunnel_peer_output.stdout | default('N/A'), tunnel_all_output.stdout | default('N/A')) }}

          Crypto SA:
          {{ crypto_detail_output.stdout | default('N/A') }}
      when: output_format | default('text') == 'text'
      # Documentation: Provides immediate feedback to the operator in a readable format.