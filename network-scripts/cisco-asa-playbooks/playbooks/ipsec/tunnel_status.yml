---
# IPSec Tunnel Status Overview
# This playbook retrieves comprehensive VPN and IPSec status from Cisco ASA/Firepower devices.
# It adheres to enterprise standards for idempotency, observability, and robust error handling.
- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Gather minimal facts for timestamping
      # Why: Required to populate 'ansible_date_time' for consistent reporting across the fleet.
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"
      register: facts_result

    - name: Get VPN session database for L2L tunnels
      # Why: Captures high-level operational status of active Site-to-Site VPN sessions.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb l2l
      register: tunnel_output
      check_mode: false
      # Error Handling: Ensure the task fails if the command cannot be executed, 
      # but allow for cases where the feature might be unconfigured ('invalid input').
      failed_when: 
        - tunnel_output.failed 
        - "'invalid' not in (tunnel_output.msg | default('') | lower)"

    - name: Get IPSec Security Associations (SA)
      # Why: Provides detailed Phase 2 parameters and traffic counters for active tunnels.
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa
      register: ipsec_sa_output
      check_mode: false

    - name: Get IKEv1 Security Associations
      # Why: Checks status of Phase 1 negotiations for legacy IKEv1 tunnels.
      ansible.netcommon.cli_command:
        command: show crypto isakmp sa
      register: ikev1_sa_output
      check_mode: false
      # Error Handling: IKEv1 might be disabled or unsupported; ignore errors to prevent playbook failure.
      ignore_errors: true

    - name: Get IKEv2 Security Associations
      # Why: Checks status of Phase 1 negotiations for modern IKEv2 tunnels.
      ansible.netcommon.cli_command:
        command: show crypto ikev2 sa
      register: ikev2_sa_output
      check_mode: false
      ignore_errors: true

    - name: Verify capture success
      # Why: Observability - Ensure critical operational data was registered before reporting.
      ansible.builtin.assert:
        that:
          - tunnel_output.stdout is defined
          - ipsec_sa_output.stdout is defined
        fail_msg: "Essential VPN/IPSec status data could not be retrieved from {{ inventory_hostname }}."

    - name: Export status to JSON
      # Why: Creates a structured, machine-readable record of the device state for auditing.
      # Idempotency: ansible.builtin.copy is idempotent; it only updates the file if content changes.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 | default(now(fmt='%Y-%m-%dT%H:%M:%SZ')) }}",
            "tunnel_summary": {{ tunnel_output.stdout | default('') | to_json }},
            "ipsec_sa": {{ ipsec_sa_output.stdout | default('') | to_json }},
            "ikev1_sa": {{ ikev1_sa_output.stdout | default('') | to_json }},
            "ikev2_sa": {{ ikev2_sa_output.stdout | default('') | to_json }}
          }
        dest: "/tmp/asa_ipsec_status_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'

    - name: Display human-readable status
      # Why: Provides immediate formatted feedback to the operator during execution.
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSec Tunnel Status: {{ inventory_hostname }}
          Captured: {{ ansible_date_time.iso8601 | default(now(fmt='%Y-%m-%dT%H:%M:%SZ')) }}
          ============================================================
          VPN SESSION DB (L2L):
          {{ tunnel_output.stdout }}

          IPSEC SA SUMMARY:
          {{ ipsec_sa_output.stdout }}
      when: output_format | default('text') == 'text'