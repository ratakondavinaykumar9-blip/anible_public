---
# IPSec Tunnel Status Overview
# This playbook provides a centralized audit of VPN tunnel status across ASA and Firepower appliances.
- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: Infrastructure | Gather local facts for audit timestamping
      # Why: Captures the precise time of the audit from the controller for consistent reporting.
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: VPN Diagnostic | Get VPN session database summary
      # Why: Provides a high-level view of all active L2L sessions.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb l2l
      register: tunnel_output
      # Error Handling: Fail if command is unrecognized or returns invalid data.
      failed_when: 
        - tunnel_output.stdout is not defined
        - "'Invalid input' in tunnel_output.stdout[0] | default('')"

    - name: VPN Diagnostic | Get IPSec Security Associations
      # Why: Details Phase 2 status, including encrypted/decrypted packet counts.
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa
      register: ipsec_sa_output
      failed_when:
        - ipsec_sa_output.stdout is not defined
        - "'Invalid input' in ipsec_sa_output.stdout[0] | default('')"

    - name: VPN Diagnostic | Get IKEv1 tunnels
      # Why: Checks Phase 1 status for legacy IKEv1 configurations.
      ansible.netcommon.cli_command:
        command: show crypto isakmp sa
      register: ikev1_sa_output
      # Error Handling: Ignore failures if IKEv1 is globally disabled on the device.
      ignore_errors: true

    - name: VPN Diagnostic | Get IKEv2 tunnels
      # Why: Checks Phase 1 status for modern IKEv2 configurations.
      ansible.netcommon.cli_command:
        command: show crypto ikev2 sa
      register: ikev2_sa_output
      # Error Handling: Ignore failures if IKEv2 is globally disabled on the device.
      ignore_errors: true

    - name: Observability | Validate data collection integrity
      # Why: Ensures the report generation task has the necessary data to proceed.
      ansible.builtin.assert:
        that:
          - tunnel_output.stdout[0] is defined
          - ipsec_sa_output.stdout[0] is defined
        fail_msg: "Audit failed: Critical VPN status commands returned no data for {{ inventory_hostname }}."
        quiet: true

    - name: Reporting | Export results to centralized JSON file
      # Idempotency: mode '0644' and delegate_to: localhost ensure a stable audit trail on the controller.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ hostvars['localhost']['ansible_date_time'].iso8601 }}",
            "tunnel_summary": {{ tunnel_output.stdout[0] | to_json }},
            "ipsec_sa": {{ ipsec_sa_output.stdout[0] | to_json }},
            "ikev1_sa": {{ (ikev1_sa_output.stdout[0] if ikev1_sa_output.stdout | default([]) | length > 0 else 'N/A') | to_json }},
            "ikev2_sa": {{ (ikev2_sa_output.stdout[0] if ikev2_sa_output.stdout | default([]) | length > 0 else 'N/A') | to_json }}
          }
        dest: "/tmp/asa_ipsec_status_{{ inventory_hostname }}.json"
        mode: '0644'
      delegate_to: localhost
      when: output_format | default('text') == 'json'

    - name: Visibility | Display human-readable status
      ansible.builtin.debug:
        msg: |
          ============================================================
          VPN AUDIT: {{ inventory_hostname }}
          TIMESTAMP: {{ hostvars['localhost']['ansible_date_time'].iso8601 }}
          ============================================================
          {{ tunnel_output.stdout[0] }}
      when: output_format | default('text') == 'text'
