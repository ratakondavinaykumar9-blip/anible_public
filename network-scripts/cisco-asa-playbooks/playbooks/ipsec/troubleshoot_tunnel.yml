---
# IPSec Tunnel Troubleshooting Playbook - Refined for NetLearner Standards
# Focuses on idempotency, observability, and robust error handling for Cisco ASA/Firepower.
- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text
    # Required - peer IP to troubleshoot. Passed via -e "tunnel_peer=x.x.x.x"
    tunnel_peer: ""

  tasks:
    - name: "VALIDATION: Ensure tunnel_peer is provided"
      # Observability: Validating inputs before execution prevents runtime failures and saves cycles
      ansible.builtin.assert:
        that:
          - tunnel_peer | length > 0
        fail_msg: "tunnel_peer variable is required. Usage: ansible-playbook troubleshoot.yml -e 'tunnel_peer=203.0.113.1'"
        success_msg: "Proceeding with troubleshooting for peer: {{ tunnel_peer }}"

    - name: "FACTS: Gather temporal facts for reporting"
      # Idempotency: Gathering facts is a read-only operation and safe to repeat
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: "COLLECTION: Get peer IKEv1 status"
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1_sa
      # Error Handling: If a peer isn't found, the command might return an error; we want to continue analysis
      failed_when: false

    - name: "COLLECTION: Get peer IKEv2 status"
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2_sa
      failed_when: false

    - name: "COLLECTION: Get IPsec SA for peer"
      ansible.netcommon.cli_command:
        command: "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec_sa
      failed_when: false

    - name: "COLLECTION: Get tunnel session details"
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l filter-ipaddress={{ tunnel_peer }}"
      register: tunnel_session
      failed_when: false

    - name: "COLLECTION: Check interface status"
      ansible.netcommon.cli_command:
        command: "show interface ip brief"
      register: interface_brief
      failed_when: false

    - name: "COLLECTION: Get syslog errors"
      ansible.netcommon.cli_command:
        command: "show logging | include errors | last 50"
      register: error_logs
      failed_when: false

    - name: "OBSERVABILITY: Verify data collection success"
      # Ensure we actually connected and received responses for critical fields
      ansible.builtin.assert:
        that:
          - ikev1_sa.stdout is defined
          - ipsec_sa.stdout is defined
          - interface_brief.stdout is defined
        fail_msg: "Data collection failed for {{ inventory_hostname }}. Verify network connectivity and credentials."

    - name: "OUTPUT: Export state to JSON for external monitoring"
      # Idempotency: This task ensures the state file is updated with current data each run
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "troubleshooting_peer": "{{ tunnel_peer }}",
            "ikev1_sa": {{ ikev1_sa.stdout | default('') | to_json }},
            "ikev2_sa": {{ ikev2_sa.stdout | default('') | to_json }},
            "ipsec_sa": {{ ipsec_sa.stdout | default('') | to_json }},
            "tunnel_session": {{ tunnel_session.stdout | default('') | to_json }},
            "interfaces": {{ interface_brief.stdout | default('') | to_json }},
            "error_logs": {{ error_logs.stdout | default('') | to_json }}
          }
        dest: "/tmp/asa_ipsec_troubleshoot_{{ inventory_hostname }}_{{ tunnel_peer }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: "REPORT: Display human-readable troubleshooting data"
      ansible.builtin.debug:
        msg: |