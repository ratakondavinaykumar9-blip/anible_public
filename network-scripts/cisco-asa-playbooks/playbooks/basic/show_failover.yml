---
# Playbook: ASA Failover Status Monitoring
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Failover Status
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Defines the output mode: 'text' (default) or 'json'
    output_format: text

  tasks:
    - name: Retrieve failover configuration and state
      # FQCN: cisco.asa.asa_failover is used to manage and retrieve failover state.
      # Documentation: This task queries the security appliance to populate failover-specific facts.
      cisco.asa.asa_failover:
      register: failover_output
      # Error Handling: Allow the task to fail gracefully so the assertion can provide a custom error message.
      ignore_errors: true

    - name: Validate failover data retrieval success
      # Observability: Explicitly checking that the module completed and returned expected data.
      ansible.builtin.assert:
        that:
          - failover_output is defined
          - failover_output.failed is false
        fail_msg: "Failed to retrieve failover info from {{ inventory_hostname }}. Verify connectivity, credentials, and ASA state."
        success_msg: "Failover data successfully retrieved for {{ inventory_hostname }}."

    - name: Persist failover data to JSON artifact
      # Idempotency: ansible.builtin.copy ensures the file state is maintained without redundant writes.
      # Documentation: Saves the raw state for programmatic analysis or historical record-keeping.
      ansible.builtin.copy:
        content: "{{ failover_output | to_nice_json }}"
        dest: "/tmp/asa_failover_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'
      # Observability: Registered to track if the artifact was updated or created during this run.
      register: json_export_result

    - name: Display human-readable failover summary
      # Documentation: Provides a clear, formatted status report for network administrators in the CLI output.
      ansible.builtin.debug:
        msg: |
          ============================================================
          FAILOVER REPORT: {{ inventory_hostname }}
          ============================================================
          {% if failover_output.ansible_facts is defined and failover_output.ansible_facts.asa_failover is defined %}
          PRIMARY STATUS:   {{ failover_output.ansible_facts.asa_failover.primary | default('DATA MISSING') }}
          SECONDARY STATUS: {{ failover_output.ansible_facts.asa_failover.secondary | default('DATA MISSING') }}
          {% else %}
          NOTICE: Failover is either not configured or could not be detected on this device.
          {% endif %}
          ============================================================
      when: output_format | default('text') == 'text'