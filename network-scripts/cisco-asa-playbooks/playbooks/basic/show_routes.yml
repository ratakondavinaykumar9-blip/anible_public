---
# Description: Improved Routing Table Extraction for Cisco ASA/Firepower
# Standards: Idempotency, Observability, FQCN, Error Handling, and Documentation
- name: Get and Parse Routing Table
  hosts: asa_firepower
  gather_facts: no
  vars:
    output_format: text
    backup_path: "/tmp/asa_routes_{{ inventory_hostname }}.json"

  tasks:
    - name: Gather minimal facts for timestamping
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "date_time"
      tags: [always]

    - name: Retrieve routing table from device
      # Using FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: show route
      register: route_output
      # Error Handling: Fail if the command returns no data or unexpected error messages
      failed_when: 
        - route_output.stdout == ""
        - "'Invalid input' in route_output.stdout"
      changed_when: false # Read-only command; maintain idempotency

    - name: Validate routing table content
      # Observability: Assert that the output contains expected routing indicators
      ansible.builtin.assert:
        that:
          - "'Gateway of last resort' in route_output.stdout"
          - "route_output.stdout_lines | length > 0"
        fail_msg: "Routing table appears empty or malformed."
        success_msg: "Successfully validated routing table output."

    - name: Display raw routing data
      ansible.builtin.debug:
        var: route_output.stdout
      when: output_format == 'text'

    - name: Generate and save structured JSON route report
      # Idempotency: ansible.builtin.copy only updates the file if content changes
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "extracted_at": "{{ ansible_date_time.iso8601 }}",
            "routing_table_raw": {{ route_output.stdout | to_json }}
          }
        dest: "{{ backup_path }}"
        mode: '0644'
      # Conditionality: Only executes if the user explicitly requests JSON format
      when: output_format | default('text') == 'json'
      register: file_creation

    - name: Confirm report generation
      ansible.builtin.assert:
        that:
          - file_creation.dest is defined
        fail_msg: "Failed to write the JSON report to {{ backup_path }}"
      when: output_format | default('text') == 'json'