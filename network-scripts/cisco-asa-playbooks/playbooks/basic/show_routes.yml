---
- name: "NETLEARNER: Secure & Observable Routing Table Retrieval"
  hosts: asa_firepower
  gather_facts: yes  # Required to populate ansible_date_time for the JSON report
  vars:
    output_format: text
    report_dest: "/tmp/asa_routes_{{ inventory_hostname }}.json"

  tasks:
    - name: Fetch routing table via CLI
      # Why: Use FQCN for predictable module resolution across different Ansible versions
      ansible.netcommon.cli_command:
        command: show route
      register: route_output
      # Idempotency: 'show' commands are read-only and should never trigger a 'changed' status
      changed_when: false
      # Error Handling: Explicitly fail if the command returns an error string or null output
      failed_when:
        - route_output.stdout is not defined
        - route_output.stdout == ""
        - "'invalid input' in route_output.stdout | lower"

    - name: Validate routing data integrity
      # Observability: Assert that captured data contains expected routing markers
      ansible.builtin.assert:
        that:
          - "route_output.stdout | length > 0"
          - "'Gateway of last resort' in route_output.stdout"
        fail_msg: "Routing table on {{ inventory_hostname }} is empty or malformed."
        success_msg: "Routing table data validated successfully."

    - name: Display routing table for operator audit
      ansible.builtin.debug:
        var: route_output.stdout_lines

    - name: Persist structured JSON artifact
      # Idempotency: builtin.copy ensures the file is only updated if content actually changes
      # Documentation: Saves state for NetLearner historical tracking and forensic analysis
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "routes_raw": {{ route_output.stdout | to_json }}
          }
        dest: "{{ report_dest }}"
        mode: '0644'
      when: output_format | default('text') == 'json'
