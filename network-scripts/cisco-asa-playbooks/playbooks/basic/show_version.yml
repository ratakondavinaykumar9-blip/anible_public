---
# NetLearner Architect Improved Playbook
# Purpose: Retrieve and validate Cisco ASA version information for inventory and monitoring.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.

- name: Get ASA Version Information
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format; can be overridden at runtime (e.g., -e "output_format=json")
    output_format: text

  tasks:
    - name: Retrieve ASA version details using FQCN
      # Using cisco.asa collection to interface with the device
      cisco.asa.asa_version:
      register: version_output
      # Explicit failure condition if the module fails to return expected facts
      failed_when: 
        - version_output.failed | default(false)
        - version_output.ansible_facts.asa_version is not defined

    - name: Validate version data integrity (Observability)
      # Ensure that the expected keys exist in the returned facts before proceeding to reporting
      ansible.builtin.assert:
        that:
          - version_output.ansible_facts.asa_version.version is defined
          - version_output.ansible_facts.asa_version.serial is defined
          - version_output.ansible_facts.asa_version.model is defined
        fail_msg: "Failed to retrieve complete version information from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved and verified version data for {{ inventory_hostname }}"

    - name: Persist version data as JSON for external integration (SolarWinds/CMDB)
      # This task is idempotent as ansible.builtin.copy only updates the file if content differs
      ansible.builtin.copy:
        content: "{{ version_output | ansible.builtin.to_nice_json }}"
        dest: "/tmp/asa_version_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'

    - name: Generate human-readable report (Text mode)
      # Conditional formatting for CLI/Logs output
      ansible.builtin.debug:
        msg: |
          ============================================================
          ASA SYSTEM REPORT: {{ inventory_hostname }}
          ============================================================
          Version:      {{ version_output.ansible_facts.asa_version.version }}
          Model:        {{ version_output.ansible_facts.asa_version.model }}
          Serial:       {{ version_output.ansible_facts.asa_version.serial }}
          Hardware:     {{ version_output.ansible_facts.asa_version.hardware }}
          Flash:        {{ version_output.ansible_facts.asa_version.flash }}
          Running Mode: {{ version_output.ansible_facts.asa_version.running_mode }}
          Device ID:    {{ version_output.ansible_facts.asa_version.device_id }}
          ============================================================
      when: output_format | default('text') == 'text'