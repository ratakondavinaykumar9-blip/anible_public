---
# Playbook: Get Interface Status and Details
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get Interface Status
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format; can be overridden at runtime via --extra-vars
    output_format: text

  tasks:
    - name: Gather current ASA interface configuration
      # Why: Retrieve the current state of all interfaces for visibility and audit.
      # FQCN: cisco.asa.asa_interfaces with 'state: gathered' is a read-only idempotent operation.
      cisco.asa.asa_interfaces:
        state: gathered
      register: interfaces_output
      # Error Handling: Ensure the playbook fails gracefully with a clear message if retrieval fails.
      failed_when: 
        - interfaces_output.failed | default(false)
        - "'ansible_facts' not in interfaces_output"

    - name: Verify interface data integrity
      # Observability: Assert that the required facts were populated before proceeding.
      ansible.builtin.assert:
        that:
          - interfaces_output.ansible_facts.asa_interfaces is defined
          - interfaces_output.ansible_facts.asa_interfaces | type_debug == 'list'
        fail_msg: "Interface facts retrieval failed or returned an invalid format for {{ inventory_hostname }}."
        success_msg: "Successfully validated interface facts for {{ inventory_hostname }}."

    - name: Persist interface state to JSON
      # Documentation: Save the gathered state to a file for external auditing or post-processing.
      # Idempotency: The copy module ensures the file is only updated if the content has changed.
      ansible.builtin.copy:
        content: "{{ interfaces_output.ansible_facts.asa_interfaces | to_nice_json }}"
        dest: "/tmp/asa_interfaces_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format | default('text') == 'json'

    - name: Display human-readable interface summary
      # Observability: Provide a structured summary table for immediate operator feedback.
      ans