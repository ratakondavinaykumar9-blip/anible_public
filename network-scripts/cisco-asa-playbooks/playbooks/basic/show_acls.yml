---
# NetLearner Architect Optimized Playbook
# Purpose: Idempotent retrieval and validation of Cisco ASA Access Control Lists (ACLs)
- name: Retrieve and Validate Cisco ASA Access Lists
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Define output preference: 'text' (default) for console summary or 'json' for file export
    output_format: text

  tasks:
    - name: Gather current ACL configuration from device
      # Using Fully Qualified Collection Name (FQCN)
      # 'state: gathered' ensures idempotency by performing a read-only operation
      cisco.asa.asa_acls:
        state: gathered
      register: acl_result
      # Use failed_when to ensure we catch unexpected module return states
      failed_when: acl_result.failed | default(false)

    - name: Validate that ACL data was successfully retrieved
      # Observability: Verify the data structure exists before processing
      ansible.builtin.assert:
        that:
          - acl_result.gathered is defined
        fail_msg: "Critical: Failed to retrieve ACL data from {{ inventory_hostname }}. Verify connectivity/credentials."
        success_msg: "Successfully synchronized ACL state for {{ inventory_hostname }}."

    - name: Export ACL configuration to local JSON file
      # Idempotency: ansible.builtin.copy only updates the destination if content has changed
      ansible.builtin.copy:
        content: "{{ acl_result.gathered | to_nice_json }}"
        dest: "/tmp/asa_acls_{{ inventory_hostname }}.json"
        mode: '0640'
      when: output_format | default('text') == 'json'
      register: json_export

    - name: Verify JSON export persistence
      # Observability: Ensure the backup file was successfully written
      ansible.builtin.assert:
        that:
          - not json_export.failed
        when: output_format | default('text') == 'json'

    - name: Display Access List Summary Report
      # Documentation: Summary provide clear visibility into device state
      ansible.builtin.debug:
        msg: |
          ============================================================
          ACCESS CONTROL LIST AUDIT: {{ inventory_hostname }}
          ============================================================
          {% if acl_result.gathered %}
          {% for acl in acl_result.gathered %}
          - ACL NAME: {{ acl.name }}
            ENTRIES: {{ acl.acl_entries | default([]) | length }}
          {% endfor %}
          {% else %}
          STATUS: No Access Control Lists configured on this device.
          {% endif %}
          ============================================================
      when: output_format | default('text') == 'text'