---
# FortiGate Policy Status - Improved Version
# Purpose: Retrieves and validates the operational status of firewall policies.
# This playbook is idempotent (read-only) and follows enterprise automation standards.
- name: Get FortiGate Policy Status
  hosts: fortigate
  gather_facts: false # Facts not required for CLI command execution

  tasks:
    - name: Retrieve policy status via FortiOS CLI
      # Use FQCN (Fully Qualified Collection Name) for portability and clarity
      ansible.netcommon.cli_command:
        command: get firewall policy status
      register: status_result
      # Error Handling: Ensure the task fails if FortiOS returns an error string or the command is unsupported
      failed_when:
        - status_result.failed or 'Command fail' in status_result.stdout or 'Unknown' in status_result.stdout

    - name: Verify command output integrity
      # Observability: Assert that we received a valid, non-empty response from the target device
      ansible.builtin.assert:
        that:
          - status_result.stdout is defined
          - status_result.stdout | length > 0
        fail_msg: "The 'get firewall policy status' command returned no data. Check device connectivity or permissions."
        quiet: true

    - name: Display formatted Policy Status
      ansible.builtin.debug:
        msg: |
          ======================= POLICY STATUS =======================
          {{ status_result.stdout }}