---
# FortiGate Policy Status
# Purpose: This playbook retrieves and validates the operational status of firewall policies
# to ensure network consistency and auditability across NetLearner Staging.
- name: Get Policy Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Firewall Policy Status via CLI
      # Using FQCN for consistency and future-proofing.
      # This task is inherently idempotent as it performs a read-only 'get' operation.
      ansible.netcommon.cli_command:
        command: get firewall policy status
      register: policy_status
      # Error Handling: FortiOS may return a success code but include error text in stdout.
      failed_when:
        - "policy_status.stdout is not defined"
        - "'command parse error' in policy_status.stdout | lower"
        - "'unknown action' in policy_status.stdout | lower"

    - name: Verify Policy Status Data Integrity
      # Observability: Assert that the response is not empty and contains data.
      ansible.builtin.assert:
        that:
          - "policy_status.stdout | length > 0"
        fail_msg: "Received empty policy status from {{ inventory_hostname }}. Verify connectivity and permissions."
        quiet: true

    - name: Display Policy Status for Audit
      # Documentation: Providing structured output for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= POLICY STATUS: {{ inventory_hostname }} =======================
          {{ policy_status.stdout }}
