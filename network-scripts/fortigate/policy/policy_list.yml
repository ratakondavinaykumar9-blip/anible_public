---
# ==============================================================================
# Playbook: FortiGate Policy List Retrieval
# Description: Safely fetches and validates the firewall policy configuration
#              from Fortinet devices.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
# ==============================================================================
- name: Get Policy List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to fetch firewall policies
      # Use Fully Qualified Collection Name (FQCN) for reliability.
      # 'get' provides status/summary; 'show' provides configuration.
      ansible.netcommon.cli_command:
        command: get firewall policy
      register: policy_result
      # Error Handling: Identify failure if the command returns an error string 
      # even if the exit code is technically 0.
      failed_when:
        - policy_result.failed or "Command fail" in policy_result.stdout
      # Idempotency: Read-only operations are inherently idempotent.
      changed_when: false

    - name: Verify policy data integrity
      # Observability: Assert that the output is not empty to ensure 
      # the data is valid for downstream processing.
      ansible.builtin.assert:
        that:
          - policy_result.stdout is defined
          - policy_result.stdout | length > 0
        fail_msg: "Firewall policy retrieval returned no data. Check connectivity or permissions."
        success_msg: "Firewall policies successfully retrieved and validated."

    - name: Display retrieved policies
      # Documentation: Provide a clear, formatted view for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICIES =======================
          {{ policy_result.stdout }}