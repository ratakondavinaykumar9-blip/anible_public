# FortiGate Policy List - Optimized for NetLearner Architect Standards
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get FortiGate Policy List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall policy configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability
      ansible.netcommon.cli_command:
        command: show firewall policy
      register: policy_output
      # Error Handling: Catch execution failures or invalid command responses
      failed_when: 
        - policy_output.failed
        - "'Unknown command' in policy_output.stdout"
      # Documentation: 'show' is preferred for configuration retrieval as it returns 
      # the raw config structure, which is more predictable for parsing than 'get'.

    - name: Verify policy data integrity (Observability)
      # Assert that we received valid configuration data to prevent silent failures
      ansible.builtin.assert:
        that:
          - policy_output.stdout | length > 0
          - "'config firewall policy' in policy_output.stdout or 'edit' in policy_output.stdout"
        fail_msg: "Vulnerability: Policy retrieval returned empty or invalid data."
        success_msg: "Policy configuration successfully retrieved and validated."

    - name: Display policy configuration audit trail
      ansible.builtin.debug:
        msg: |
          ======================= FIREWALL POLICIES =======================
          {{ policy_output.stdout }}
      # Idempotency: This operation is read-only, making it inherently safe to run multiple times.