---
# ==============================================================================
# PLAYBOOK: FortiGate Address Object Retrieval
# ARCHITECT: NetLearner Architect
# DESCRIPTION: Performs an idempotent retrieval of firewall address objects 
#              with built-in validation and robust error handling.
# ==============================================================================
- name: Get FortiGate Address Objects
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch address objects via CLI command
      # BEST PRACTICES: Using Fully Qualified Collection Names (FQCN)
      ansible.netcommon.cli_command:
        command: get firewall address
      register: addr_output
      # IDEMPOTENCY: Read-only 'get' commands must never report a 'changed' state
      changed_when: false
      # ERROR HANDLING: Catch CLI failures that may not return a non-zero exit code
      failed_when:
        - "addr_output.rc | default(0) != 0"
        - "'Command fail' in addr_output.stdout"
        - "'error' in addr_output.stdout.lower()"

    - name: Validate data observability
      # OBSERVABILITY: Assert that the command returned valid data before proceeding
      ansible.builtin.assert:
        that:
          - "addr_output.stdout is defined"
          - "addr_output.stdout | length > 0"
        fail_msg: "Critical Error: Received empty or invalid response from {{ inventory_hostname }}"
        quiet: true

    - name: Display address objects summary
      # OBSERVABILITY: Provide a clear, formatted view of the retrieved data
      ansible.builtin.debug:
        msg: |
          ======================= ADDRESS OBJECTS: {{ inventory_hostname }} =======================
          {{ addr_output.stdout }}
