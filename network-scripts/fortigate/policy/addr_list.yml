---
# FortiGate Address Objects Retrieval and Validation Playbook
# Purpose: Safely retrieve and audit firewall address objects from FortiGate devices.
# Standards: FQCN, Idempotency, Observability, Documentation, Error Handling.

- name: Retrieve and Validate FortiGate Address Objects
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch firewall address objects via CLI
      # FQCN: Using ansible.netcommon.cli_command for cross-platform compatibility
      # Idempotency: Read-only 'get' operations are inherently idempotent
      ansible.netcommon.cli_command:
        command: get firewall address
      register: address_retrieval
      # Error Handling: Define failure conditions based on FortiOS CLI error patterns
      failed_when:
        - address_retrieval.failed
        - "'Command fail' in address_retrieval.stdout"
        - "'Unknown action' in address_retrieval.stdout"

    - name: Validate retrieval observability
      # Observability: Ensure the output is not empty and contains expected metadata
      ansible.builtin.assert:
        that:
          - address_retrieval.stdout is defined
          - address_retrieval.stdout | length > 0
        fail_msg: "The firewall returned an empty response for address objects."
        success_msg: "Address objects successfully retrieved and validated."

    - name: Display formatted address object report
      # Documentation: Provide a clear, human-readable view of the operational state
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ADDRESS OBJECTS =======================
          Device: {{ inventory_hostname }}
          Status: SUCCESS
          -------------------------------------------------------------------------
          {{ address_retrieval.stdout }}
          =========================================================================