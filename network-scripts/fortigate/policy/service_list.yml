---
- name: FortiGate Service and Group Audit
  hosts: fortigate
  gather_facts: false
  # Why: This playbook performs a read-only audit of FortiGate service objects and groups.
  # It is designed to be idempotent and provides observability for security compliance.

  tasks:
    - name: Retrieve Service Objects
      # Why: Fetches custom and predefined service objects to verify existing network definitions.
      ansible.netcommon.cli_command:
        command: get firewall service
      register: svc_output
      # Error Handling: Ensure the command executed successfully on the device.
      failed_when: svc_output.rc != 0

    - name: Validate Service Objects Data
      # Observability: Assert that the retrieval returned a non-empty result.
      ansible.builtin.assert:
        that:
          - svc_output.stdout is defined
          - svc_output.stdout | length > 0
        fail_msg: "Service object retrieval failed or returned an empty response."
        quiet: true

    - name: Retrieve Service Groups
      # Why: Fetches service group definitions to audit object aggregation in policies.
      ansible.netcommon.cli_command:
        command: get firewall service group
      register: groups_output
      failed_when: groups_output.rc != 0

    - name: Validate Service Groups Data
      # Observability: Verify that group data was successfully captured.
      ansible.builtin.assert:
        that:
          - groups_output.stdout is defined
          - groups_output.stdout | length > 0
        fail_msg: "Service group retrieval failed or returned an empty response."
        quiet: true

    - name: Display Configuration Results
      # Observability: Structured debug output for audit logging and operator visibility.
      ansible.builtin.debug:
        msg:
          - "======================= SERVICE OBJECTS ======================="
          - "{{ svc_output.stdout }}"
          - "======================= SERVICE GROUPS ========================"
          - "{{ groups_output.stdout }}"
