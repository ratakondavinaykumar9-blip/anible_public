---
- name: Audit FortiGate Firewall Service Objects and Groups
  hosts: fortigate
  gather_facts: false
  # Standardized metadata for tracking and maintenance
  vars:
    ansible_network_os: fortinet.fortios.fortios

  tasks:
    - name: Retrieve Custom Firewall Service Objects
      # Best Practice: Use Fully Qualified Collection Names (FQCN)
      # 'show' is preferred over 'get' to capture the configuration-level objects
      ansible.netcommon.cli_command:
        command: "show firewall service custom"
      register: svc_output
      # Error Handling: Identify FortiOS-specific error strings to fail early
      failed_when: 
        - svc_output.failed or "Command fail" in svc_output.stdout or "Unknown action" in svc_output.stdout
      tags: [services, audit]

    - name: Validate Service Objects Data
      # Observability: Assert that the command returned meaningful content
      ansible.builtin.assert:
        that:
          - svc_output.stdout is defined
          - svc_output.stdout | length > 0
        fail_msg: "Service objects retrieval returned empty or failed state."
        success_msg: "Successfully retrieved firewall service objects."

    - name: Retrieve Firewall Service Groups
      # Idempotency: Read-only operations are inherently safe for multiple runs
      ansible.netcommon.cli_command:
        command: "show firewall service group"
      register: group_output
      failed_when:
        - group_output.failed or "Command fail" in group_output.stdout
      tags: [groups, audit]

    - name: Validate Service Groups Data
      ansible.builtin.assert:
        that:
          - group_output.stdout is defined
          - group_output.stdout | length > 0
        fail_msg: "Service groups retrieval returned empty or failed state."
        success_msg: "Successfully retrieved firewall service groups."

    - name: Display Service Configuration Summary
      # Documentation: Clear separation of output for human operators/auditors
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc_output.stdout }}

          ======================= SERVICE GROUPS ========================
          {{ group_output.stdout }}
      when: not ansible_check_mode