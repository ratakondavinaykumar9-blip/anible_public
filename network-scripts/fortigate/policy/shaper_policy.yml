---
- name: FortiGate Traffic Shaper Audit
  hosts: fortigate
  gather_facts: false
  # Documentation: This playbook retrieves operational state for Traffic Shapers.
  # Read-only 'get' commands are inherently idempotent.

  tasks:
    - name: Retrieve firewall shaper operational state
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get firewall shaper
      register: shaper_result
      # Error Handling: Explicitly fail if the return code is non-zero
      failed_when: shaper_result.rc != 0

    - name: Validate shaper data integrity
      # Observability: Ensure the command returned data before proceeding
      ansible.builtin.assert:
        that:
          - "shaper_result.stdout is defined"
          - "shaper_result.stdout | length > 0"
        fail_msg: "Traffic shaper configuration is empty or could not be retrieved."
        success_msg: "Traffic shaper data successfully captured and verified."

    - name: Display Traffic Shaper Report
      # Documentation: Formatted output for visibility into the device state
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC SHAPER STATUS =======================
          {{ shaper_result.stdout }}