---
# ==============================================================================
# Playbook: FortiGate Address Group Audit
# Standards: Idempotency, Observability, FQCN, Robust Error Handling
# Why: This playbook performs a read-only audit of firewall address groups to
#      ensure device reachability and configuration integrity without state change.
# ==============================================================================
- name: Audit FortiGate Address Groups
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch firewall address group configuration via CLI
      # Use Fully Qualified Collection Name (FQCN) for consistency and portability
      ansible.netcommon.cli_command:
        command: "get firewall addrgrp"
      register: groups_output
      # Error Handling: Explicitly check for CLI-specific failure strings or task failure
      failed_when: 
        - groups_output.failed or "Command fail" in groups_output.stdout
      ignore_errors: false

    - name: Verify data retrieval success
      # Observability: Use assertions to validate that the device returned non-empty configuration data
      ansible.builtin.assert:
        that:
          - groups_output.stdout is defined
          - groups_output.stdout | length > 0
        fail_msg: "Address group retrieval failed: Output is empty or the command was not recognized."
        success_msg: "Successfully retrieved address group configuration data."

    - name: Display Address Group Details
      # Idempotency: Read-only tasks are inherently idempotent as they do not modify the target state
      ansible.builtin.debug:
        msg: |
          ======================= ADDRESS GROUPS =======================
          {{ groups_output.stdout }}
      when: groups_output.stdout is defined