---
# Improved FortiGate DLP Profile Retrieval Playbook
# Purpose: Safely retrieve and validate Data Loss Prevention (DLP) profiles.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, and Robust Error Handling.
- name: FortiGate DLP Profile Verification
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "DLP-01: Retrieve DLP profile configuration via CLI"
      # Using FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: "get firewall dlp-profile"
      register: dlp_output
      # Error Handling: Catch FortiOS CLI errors that may not trigger a non-zero exit code
      failed_when:
        - dlp_output.stdout is not defined
        - "'command parse error' in dlp_output.stdout"
        - "'Unknown action' in dlp_output.stdout"

    - name: "DLP-02: Verify DLP profile data integrity"
      # Observability: Ensure the returned output is not empty and contains expected configuration markers
      ansible.builtin.assert:
        that:
          - dlp_output.stdout | length > 0
          - "'dlp-profile' in dlp_output.stdout or 'edit' in dlp_output.stdout"
        fail_msg: "DLP Profile retrieval failed: The response was empty or the command is unsupported on this firmware."
        success_msg: "DLP Profile successfully retrieved and validated."

    - name: "DLP-03: Display formatted DLP Profile results"
      # Observability: Providing structured output for operator visibility and audit logging
      ansible.builtin.debug:
        msg: |
          ======================= START DLP PROFILE =======================
          {{ dlp_output.stdout }}
          ======================== END DLP PROFILE ========================