# FortiGate DLP Profile Retrieval
# Purpose: Fetches and validates Data Loss Prevention (DLP) configuration for auditing and visibility.
- name: Get FortiGate DLP Profile
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve DLP profile configuration via CLI
      # Use FQCN (Fully Qualified Collection Name) for better maintainability and to avoid module conflicts
      ansible.netcommon.cli_command:
        command: get firewall dlp-profile
      register: dlp_output
      # Error Handling: Fail the task if the command is unrecognized or the output indicates an error
      failed_when: 
        - dlp_output.stdout is not defined
        - "'Unknown action' in dlp_output.stdout"

    - name: Validate that DLP profile data was returned
      # Observability: Ensure the command returned actual content before considering the task successful
      # This prevents downstream logic from proceeding with empty data
      ansible.builtin.assert:
        that:
          - dlp_output.stdout | length > 0
        fail_msg: "DLP profile output is empty. Verify that DLP is enabled and profiles exist on {{ inventory_hostname }}."
        success_msg: "DLP profile successfully retrieved and validated."

    - name: Display DLP profile for operational audit
      # Observability: Print formatted output for logging and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= DLP PROFILE: {{ inventory_hostname }} =======================
          {{ dlp_output.stdout }}