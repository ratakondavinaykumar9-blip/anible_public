---
# Playbook: FortiGate Policy Hit Count Retrieval
# Purpose: This playbook retrieves policy hit counts from FortiGate devices to support audit and optimization.
# Standards: Idempotent (Read-only), Observable (Assertions), Documented, FQCN compliant.
- name: Get Policy Hit Count
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch hit count data from firewall
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction.
      ansible.netcommon.cli_command:
        command: get firewall policy hitcount
      register: hits
      # Idempotency: Marked as changed: false because this is a non-mutating 'get' command.
      # This ensures the playbook is safe to run multiple times without indicating drift.
      changed_when: false
      # Error Handling: Explicitly check for common CLI failure indicators or "error" strings in the output.
      failed_when:
        - hits.failed or "Unknown action" in hits.stdout or "error" in hits.stdout.lower()

    - name: Assert hit count data is present
      # Observability: Verify that the output is defined and not empty to confirm the command executed correctly.
      ansible.builtin.assert:
        that:
          - hits.stdout is defined
          - hits.stdout | length > 0
        fail_msg: "Data retrieval failed or the output was empty. Verify policy existence and permissions."
        success_msg: "Successfully captured policy hit count data."

    - name: Display Policy Hit Count results
      # Documentation: Present the raw command output in a formatted block for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= POLICY HIT COUNT =======================
          {{ hits.stdout }}