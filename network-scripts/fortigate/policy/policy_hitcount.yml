MCP issues detected. Run /mcp list for status.```yaml
---
- name: FortiGate Policy Hit Count Analysis
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Firewall Policy Hit Counts
      # Why: Fetches operational statistics to identify unused firewall policies or verify traffic flow.
      # Idempotency: This is a read-only operation and is inherently safe to run multiple times.
      ansible.netcommon.cli_command:
        command: get firewall policy hitcount
      register: hits_output
      # Error Handling: Explicitly catch cases where the command might be unsupported or return CLI errors.
      failed_when:
        - hits_output.failed or "Unknown action" in hits_output.stdout or "error" in hits_output.stdout

    - name: Validate Hit Count Data Integrity
      # Observability: Asserts that the response is not empty and contains expected metadata before proceeding.
      ansible.builtin.assert:
        that:
          - hits_output.stdout is defined
          - hits_output.stdout | length > 0
        fail_msg: "The FortiGate returned an empty or invalid hit count response."
        success_msg: "Verified valid hit count data structure from device."

    - name: Display Policy Hit Count Report
      # Why: Provides visibility into the retrieved metrics for auditing and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICY HIT COUNT REPORT =======================
          {{ hits_output.stdout }}
