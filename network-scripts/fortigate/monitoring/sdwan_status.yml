# FortiGate SD-WAN Status Monitoring
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, Error Handling
- name: Get SD-WAN Status
  hosts: fortigate
  gather_facts: false # Performance: Skipping fact gathering for network CLI tasks

  tasks:
    - name: Retrieve SD-WAN status via CLI
      # Idempotency: Safe read-only operation. No state change on device.
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_raw
      # Error Handling: Capture CLI-level errors that might not return a non-zero exit code
      failed_when: >
        sdwan_raw.stdout is not defined or 
        sdwan_raw.stdout == "" or 
        "error" in sdwan_raw.stdout | lower or 
        "invalid" in sdwan_raw.stdout | lower

    - name: Verify SD-WAN output integrity
      # Observability: Explicitly assert that the response contains expected operational data
      ansible.builtin.assert:
        that:
          - sdwan_raw.stdout | length > 0
          - "'SD-WAN' in sdwan_raw.stdout or 'Virtual-WAN-link' in sdwan_raw.stdout"
        fail_msg: "Failed to retrieve valid SD-WAN status from {{ inventory_hostname }}."
        quiet: true

    - name: Display SD-WAN Operational Status
      # Best Practices: Using FQCN and providing clear, formatted output for observability
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS: {{ inventory_hostname }} =======================
          {{ sdwan_raw.stdout }}