---
# Playbook: FortiGate SD-WAN Operational Status Audit
# Description: Retrieves, validates, and displays the SD-WAN status from FortiGate devices.
# Standards: FQCN usage, Idempotency (Read-only), Observability (Assert), and Error Handling.
- name: Get SD-WAN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to get SD-WAN status
      # Using Fully Qualified Collection Name (FQCN) for cross-version compatibility
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_result
      # Idempotency: Telemetry commands should never report a 'changed' state
      changed_when: false
      # Error Handling: Ensure we fail if the FortiOS CLI returns an error message
      failed_when:
        - sdwan_result.rc != 0
        - "'command parse error' in sdwan_result.stdout | lower"
        - "'unknown command' in sdwan_result.stdout | lower"

    - name: Validate SD-WAN status response
      # Observability: Verify the device returned meaningful SD-WAN data
      ansible.builtin.assert:
        that:
          - sdwan_result.stdout is defined
          - sdwan_result.stdout | length > 0
          - "'SD-WAN' in sdwan_result.stdout"
        fail_msg: "SD-WAN status output is invalid or empty on {{ inventory_hostname }}. Verify SD-WAN configuration."
        success_msg: "SD-WAN status successfully retrieved and verified for {{ inventory_hostname }}."

    - name: Display SD-WAN Status Report
      # Observability: Formatted output for human operators
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS: {{ inventory_hostname }} =======================
          {{ sdwan_result.stdout }}