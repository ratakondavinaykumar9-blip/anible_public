---
# Playbook: FortiGate SD-WAN Health Check
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get SD-WAN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch SD-WAN status via CLI
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability
      ansible.netcommon.cli_command:
        command: get system sdwan status
      register: sdwan_response
      # Idempotency: Operational 'get' commands should not trigger a 'changed' state in Ansible
      changed_when: false
      # Error Handling: Explicitly fail if the CLI returns an error string or non-zero return code
      failed_when: 
        - sdwan_response.rc | default(0) != 0
        - "'error' in sdwan_response.stdout | lower"
        - "'command fail' in sdwan_response.stdout | lower"

    - name: Validate retrieved SD-WAN data
      # Observability: Assert ensures the response is not empty before concluding the task
      ansible.builtin.assert:
        that:
          - sdwan_response.stdout is defined
          - sdwan_response.stdout | length > 0
        fail_msg: "SD-WAN status retrieval failed or returned empty output."
        success_msg: "SD-WAN status successfully captured and validated."

    - name: Present SD-WAN Status Report
      # Observability: Provides formatted, human-readable output for the network operator
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN STATUS =======================
          {{ sdwan_response.stdout }}
      when: sdwan_response.stdout is defined