---
# Playbook: Get FortiGate Traffic History
# Purpose: Retrieves and displays traffic history from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, Error Handling.
- name: Get FortiGate Traffic History
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute traffic-history retrieval via CLI
      # Using FQCN for the network common CLI module to ensure broad compatibility
      ansible.netcommon.cli_command:
        command: get firewall traffic-history
      register: history_result
      # Error Handling: Fail explicitly if the command is unrecognized or returns an error string
      failed_when:
        - history_result.failed
        - "'command parse error' in history_result.stdout.lower() or 'unknown command' in history_result.stdout.lower()"

    - name: Verify traffic history output integrity
      # Observability: Assert that the command returned data to prevent silent failures
      ansible.builtin.assert:
        that:
          - history_result.stdout is defined
          - history_result.stdout | length > 0
        fail_msg: "Traffic history retrieval failed or returned empty content."
        success_msg: "Traffic history data successfully captured."

    - name: Output traffic history for administrative review
      # Documentation: Providing clear visual separation for logged output
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC HISTORY START =======================
          {{ history_result.stdout }}
          ======================= TRAFFIC HISTORY END =========================