---
# FortiGate Traffic History Retrieval
# This playbook retrieves and validates traffic history from FortiGate devices.
# Standards: Idempotency (read-only), Observability (assert), FQCN usage.
- name: Get Traffic History
  hosts: fortigate
  gather_facts: false # Performance: facts not required for CLI command execution

  tasks:
    - name: Execute FortiGate traffic history command
      # Using FQCN for consistent cross-platform network management
      ansible.netcommon.cli_command:
        command: get firewall traffic-history
      register: traffic_history_output
      # Error Handling: Identify failure based on return code or common error keywords in output
      failed_when:
        - traffic_history_output.rc != 0
        - "'error' in traffic_history_output.stdout | lower"
        - "'command parse error' in traffic_history_output.stdout | lower"

    - name: Validate traffic history data integrity
      # Observability: Ensure the result is non-empty and valid before processing
      ansible.builtin.assert:
        that:
          - traffic_history_output.stdout | length > 0
          - traffic_history_output.stdout is defined
        fail_msg: "Traffic history retrieval failed or returned empty data from {{ inventory_hostname }}."
        success_msg: "Traffic history data successfully validated for {{ inventory_hostname }}."

    - name: Display traffic history results
      # Observability: Provide formatted output for administrative review
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC HISTORY ({{ inventory_hostname }}) =======================
          {{ traffic_history_output.stdout }}
