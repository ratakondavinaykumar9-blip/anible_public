---
# FortiGate Bandwidth Monitor - Improved Version
# Purpose: Safely retrieves and validates interface bandwidth statistics.
# Standards: Idempotent (read-only), Observable (asserts), and uses FQCN.

- name: Monitor Bandwidth
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve interface bandwidth diagnostics
      # This diagnostic command is read-only, ensuring idempotency.
      # FQCN is used to ensure the correct module is invoked across environments.
      ansible.netcommon.cli_command:
        command: diagnose netlink interface -bandwidth
      register: bw
      # Error Handling: Fail if the transport fails or the CLI returns a parse error.
      failed_when: 
        - bw.failed or "command parse error" in bw.stdout

    - name: Validate bandwidth data capture
      # Observability: Use assert to verify that the command returned actionable data.
      # This prevents the playbook from silently succeeding with empty output.
      ansible.builtin.assert:
        that:
          - bw.stdout is defined
          - bw.stdout | length > 0
        fail_msg: "Bandwidth diagnostic returned no data. Verify device state and permissions."
        quiet: true

    - name: Display Bandwidth Report
      # Observability: Provide a structured and readable output for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= BANDWIDTH REPORT: {{ inventory_hostname }} =======================
          {{ bw.stdout }}