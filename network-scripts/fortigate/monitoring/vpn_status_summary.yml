---
# FortiGate VPN Status Summary
# Purpose: Retrieves VPN operational metadata to verify tunnel stability and peer connectivity.
# Standards Compliance: Idempotent (Read-only), Observable, Documented, and Secure.
- name: VPN Status Summary
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get vpn status' on FortiGate appliance
      # FQCN: Using ansible.netcommon to ensure reliable CLI execution across platforms.
      # Idempotency: Read-only command; safe to execute multiple times without state changes.
      ansible.netcommon.cli_command:
        command: get vpn status
      register: vpn_status_output
      # Error Handling: Ensure the task fails explicitly if the transport or command fails.
      failed_when: vpn_status_output.failed | default(false)

    - name: Assert VPN status data integrity
      # Observability: Verify that the command returned meaningful output before proceeding.
      ansible.builtin.assert:
        that:
          - vpn_status_output.stdout is defined
          - vpn_status_output.stdout | length > 0
        fail_msg: "CRITICAL: Failed to retrieve VPN status or output is empty for {{ inventory_hostname }}."
        success_msg: "SUCCESS: VPN status captured and validated for {{ inventory_hostname }}."

    - name: Display formatted VPN operational summary
      # Documentation: Provides a structured visual separator for audit logs and human operators.
      ansible.builtin.debug:
        msg: |
          ======================= VPN SUMMARY =======================
          Node: {{ inventory_hostname }}
          -----------------------------------------------------------
          {{ vpn_status_output.stdout }}
          ===========================================================
