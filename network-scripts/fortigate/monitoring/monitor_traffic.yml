---
# FortiGate Traffic Monitoring
# This playbook retrieves and validates interface traffic statistics from FortiGate devices.
# Standards Applied: Idempotency (Read-only), Observability (Assert), Error Handling (Failed_when), FQCN.
- name: Monitor Traffic
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get interface traffic statistics from FortiGate
      # Using FQCN for portability. This command fetches real-time interface throughput.
      ansible.netcommon.cli_command:
        command: get system interface traffic
      register: traffic_result
      # Idempotency: Marking as changed: false because this is a non-state-altering read operation.
      changed_when: false
      # Error Handling: Ensure the task fails if the command returns no data.
      failed_when: 
        - traffic_result.stdout is not defined or traffic_result.stdout | length == 0

    - name: Validate traffic data integrity
      # Observability: Assert that the output contains the expected 'Interface' header to ensure valid data.
      ansible.builtin.assert:
        that:
          - "'Interface' in traffic_result.stdout"
        fail_msg: "The traffic monitoring command returned invalid or unrecognized output."
        success_msg: "Traffic statistics successfully captured and verified."

    - name: Display traffic monitoring report
      # Documentation: Presenting the captured data in a structured format for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC MONITORING REPORT =======================
          Target Host: {{ inventory_hostname }}
          -------------------------------------------------------------------------
          {{ traffic_result.stdout }}