---
# FortiGate Memory Monitoring - NetLearner Architect Standard
# This playbook retrieves and validates memory usage from Fortinet devices using best practices.
- name: Monitor FortiGate Memory Usage
  hosts: fortigate
  gather_facts: false # Optimization: Standard facts are not required for CLI-based monitoring.

  tasks:
    - name: Fetch memory statistics from FortiGate CLI
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability.
      # Idempotency: This is a read-only operation; changed_when is set to false to prevent false 'changed' states.
      ansible.netcommon.cli_command:
        command: "get system performance status | grep -i memory"
      register: mem_raw
      # Error Handling: Define failure if the command fails or returns an empty string.
      failed_when: 
        - mem_raw.failed
        - mem_raw.stdout | length == 0
      changed_when: false

    - name: Validate memory data integrity
      # Observability: Assert that the command output contains expected keywords to ensure valid data capture.
      ansible.builtin.assert:
        that:
          - "'memory' in mem_raw.stdout | lower"
        fail_msg: "Memory statistics could not be parsed from the device output."
        success_msg: "Memory statistics successfully retrieved and verified."

    - name: Display Memory Monitoring Report
      # Documentation: Providing a clear, formatted summary for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= MEMORY MONITORING REPORT =======================
          Device: {{ inventory_hostname }}
          Status: SUCCESS
          
          {{ mem_raw.stdout }}
          ========================================================================