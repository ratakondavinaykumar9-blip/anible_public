---
# FortiGate Log Viewer - Production Grade
# This playbook retrieves recent logs from a FortiGate firewall for operational visibility.
# It adheres to idempotency by performing read-only operations that do not alter device state.
- name: View FortiOS Logs
  hosts: fortigate
  gather_facts: false
  vars:
    # The category of logs to retrieve (e.g., traffic, event, virus, webfilter)
    log_type: "traffic"
    # The maximum number of log entries to display
    log_count: 50

  tasks:
    - name: "VALIDATION: Ensure input variables are correct"
      ansible.builtin.assert:
        that:
          - log_type is string
          - log_count | int > 0
        fail_msg: "Invalid input: log_type must be a string and log_count must be a positive integer."
        quiet: true

    - name: "EXECUTION: Retrieve logs from FortiGate CLI"
      # Using FQCN (Fully Qualified Collection Name) for consistent multi-environment support.
      # Command combines log filtering and display in a single execution block.
      ansible.netcommon.cli_command:
        command: "execute log filter category {{ log_type }} && execute log display | head {{ log_count }}"
      register: logs_result
      # FortiOS CLI may return error strings in stdout without a non-zero exit code.
      # We explicitly catch 'Command fail' and 'Invalid' to ensure playbook failure on errors.
      failed_when:
        - logs_result.failed or "Command fail" in logs_result.stdout or "Invalid" in logs_result.stdout

    - name: "OBSERVABILITY: Verify that logs were successfully captured"
      ansible.builtin.assert:
        that:
          - logs_result.stdout_lines | length > 0
        fail_msg: "Observability Check: The command executed but no log entries were returned for '{{ log_type }}'."
        quiet: true

    - name: "OUTPUT: Display formatted logs"
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE {{ log_type | upper }} LOGS =======================
          DEVICE: {{ inventory_hostname }}
          -----------------------------------------------------------------------------------
          {{ logs_result.stdout }}
          ===================================================================================
