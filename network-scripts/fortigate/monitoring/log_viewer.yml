---
# FortiGate Log Viewer - Production Grade
# This playbook retrieves and displays logs from a FortiGate firewall.
# It adheres to NetLearner standards for idempotency, observability, and error handling.
- name: FortiGate Log Retrieval and Analysis
  hosts: fortigate
  gather_facts: false
  vars:
    # Default log type to retrieve (e.g., traffic, event, virus, webfilter).
    log_type: "traffic"
    # Number of log entries to display.
    log_count: 50

  tasks:
    - name: Retrieve logs from FortiGate CLI
      # Using Fully Qualified Collection Name (FQCN) for network command execution.
      ansible.netcommon.cli_command:
        command: "execute log filter category {{ log_type }} && execute log display | head {{ log_count }}"
      register: log_output
      # Idempotency: Read-only operations should not report 'changed' status.
      changed_when: false
      # Error Handling: Fail if the command returns known FortiOS error strings.
      failed_when:
        - log_output.failed or "Command fail" in log_output.stdout or "Invalid" in log_output.stdout

    - name: Validate log retrieval results
      # Observability: Assert that we received a valid response from the device.
      ansible.builtin.assert:
        that:
          - log_output.stdout | length > 0
        fail_msg: "Log retrieval failed or returned no data for category: {{ log_type }}"
        success_msg: "Successfully retrieved logs for category: {{ log_type }}"

    - name: Display formatted log output
      # Providing a clear, documented output for the operator.
      ansible.builtin.debug:
        msg: |
          ==============================================================================
          FORTIGATE LOG SUMMARY
          Category: {{ log_type }}
          Limit:    {{ log_count }} entries
          ==============================================================================
          {{ log_output.stdout }}
          ==============================================================================