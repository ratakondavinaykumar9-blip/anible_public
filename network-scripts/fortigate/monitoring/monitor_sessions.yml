---
# FortiGate Session Monitoring Playbook
# Standardized for NetLearner Architecture
# Focus: Idempotency, Observability, and Robust Error Handling
- name: Monitor FortiGate Network Sessions
  hosts: fortigate
  gather_facts: false
  vars:
    # Threshold for session count warnings (example for observability)
    session_threshold: 50000

  tasks:
    - name: Retrieve Active Session List
      # Using FQCN for consistent cross-environment execution
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_output
      # Idempotency: CLI 'get' commands are read-only and inherently idempotent
      changed_when: false
      # Error Handling: Ensure the command was recognized by the FortiOS CLI
      failed_when: 
        - sessions_output.failed
        - "'Unknown action' in sessions_output.stdout"

    - name: Retrieve Session Statistics
      ansible.netcommon.cli_command:
        command: get system session stat
      register: stats_output
      changed_when: false
      failed_when: stats_output.failed

    - name: Validate Session Data Integrity
      # Observability: Assert that we received a valid response from the device
      ansible.builtin.assert:
        that:
          - "stats_output.stdout is defined"
          - "'sessions' in stats_output.stdout.lower()"
        fail_msg: "Failed to retrieve valid session statistics from {{ inventory_hostname }}"
        success_msg: "Successfully validated session telemetry for {{ inventory_hostname }}"

    - name: Display Session Monitoring Report
      # Documentation: Summary view for NOC/SOC visibility
      ansible.builtin.debug:
        msg: |
          ======================= SESSION MONITORING REPORT =======================
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          
          RAW STATISTICS:
          {{ stats_output.stdout }}
          
          STATUS: Verification Complete
          ==========================================================================

    - name: Check for Critical Session Exhaustion
      # Proactive Monitoring: Alert if session counts are abnormally high
      ansible.builtin.set_fact:
        session_count_warning: "{{ 'High session count detected' if 'clash' in stats_output.stdout else 'Normal' }}"
      when: stats_output.stdout is defined