---
# FortiGate Session Monitoring - Production Grade
# This playbook retrieves and validates session metrics for operational observability.
# All operations are read-only, ensuring idempotency across multiple runs.
- name: Monitor Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve active session list
      # Why: Necessary for granular session analysis and diagnostic logging.
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_result
      # Error Handling: Catch device-specific CLI errors that might not trigger a non-zero exit code.
      failed_when: 
        - sessions_result.failed or "Unknown action" in sessions_result.stdout

    - name: Retrieve global session statistics
      # Why: Provides high-level health metrics including session count and setup rates.
      ansible.netcommon.cli_command:
        command: get system session stat
      register: stats_result
      failed_when: 
        - stats_result.failed or "Unknown action" in stats_result.stdout

    - name: Validate monitoring data integrity
      # Observability: Assert that the command output is populated before proceeding.
      ansible.builtin.assert:
        that:
          - "stats_result.stdout is defined"
          - "stats_result.stdout | length > 0"
        fail_msg: "Data collection failed: Session statistics are empty or undefined."
        success_msg: "Data collection successful: Metrics captured for {{ inventory_hostname }}."

    - name: Display formatted session report
      # Documentation: Formats raw CLI output into a human-readable operational report.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE SESSION MONITORING =======================
          HOST: {{ inventory_hostname }}
          
          RAW STATISTICS:
          {{ stats_result.stdout }}
          
          DIAGNOSTIC SUMMARY:
          - Session Table Entries: {{ sessions_result.stdout_lines | length }}
          - Collection Status: SUCCESS
