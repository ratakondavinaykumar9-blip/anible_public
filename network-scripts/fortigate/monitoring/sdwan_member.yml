---
# FortiGate SD-WAN Member Status Audit
# This playbook retrieves and validates SD-WAN members while ensuring
# observability and robust error handling according to architectural standards.
- name: Get SD-WAN Members
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SD-WAN member configuration via CLI
      # Using FQCN: ansible.netcommon.cli_command for predictable module resolution.
      # Idempotency: Read-only 'get' operations are inherently safe for repeated execution.
      ansible.netcommon.cli_command:
        command: get system sdwan member
      register: members_result
      # Error Handling: Detect device-specific error strings that may not trigger a non-zero exit code.
      failed_when: >
        members_result.failed or 
        "Command fail" in members_result.stdout or 
        "error" in members_result.stdout | lower

    - name: Validate SD-WAN member data integrity
      # Observability: Assert that the command returned the expected SD-WAN table content.
      ansible.builtin.assert:
        that:
          - members_result.stdout | length > 0
          - "'member' in members_result.stdout"
        fail_msg: "SD-WAN member data could not be retrieved or the table is empty."
        success_msg: "SD-WAN member data successfully verified."

    - name: Display SD-WAN Member Report
      # Documentation: Provide clear, formatted output for operational auditing and logs.
      ansible.builtin.debug:
        msg: |
          ============================================================
          FORTIGATE SD-WAN MEMBERS REPORT
          ============================================================
          {{ members_result.stdout }}
          ============================================================