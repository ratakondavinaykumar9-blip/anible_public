---
# FortiGate SD-WAN Configuration Audit
# Purpose: Retrieves and validates SD-WAN member status using idempotent read operations.
- name: Audit FortiGate SD-WAN Members
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SD-WAN member status via CLI
      # Use Fully Qualified Collection Names (FQCN) for better portability and consistency
      ansible.netcommon.cli_command:
        command: get system sdwan member
      register: sdwan_members
      # Error Handling: Catch specific FortiOS CLI error strings that don't trigger non-zero exit codes
      failed_when: >
        sdwan_members.failed or 
        "Command fail" in sdwan_members.stdout or 
        "Unknown action" in sdwan_members.stdout

    - name: Validate SD-WAN output integrity
      # Observability: Assert that the command returned a meaningful and non-empty response
      ansible.builtin.assert:
        that:
          - sdwan_members.stdout is defined
          - sdwan_members.stdout | length > 0
        fail_msg: "No SD-WAN member data found or the device returned an empty response."
        success_msg: "SD-WAN member status successfully retrieved and validated."

    - name: Display SD-WAN Member Information
      # Provide formatted output for operational logging and visibility
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN MEMBERS REPORT =======================
          Target Host: {{ inventory_hostname }}
          
          {{ sdwan_members.stdout }}
