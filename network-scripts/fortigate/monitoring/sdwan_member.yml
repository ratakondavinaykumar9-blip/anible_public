---
# Playbook: FortiGate SD-WAN Member Audit
# Description: Retrieves and validates the configuration of SD-WAN members.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, Error Handling.
- name: Get SD-WAN Members
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "AUDIT | Retrieve SD-WAN members configuration"
      # Using FQCN for module reliability. Read-only commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: "get system sdwan member"
      register: members_output
      # Error Handling: Fail if the command is unrecognized or execution fails on the device.
      failed_when:
        - members_output.failed or "'Unknown action' in members_output.stdout"
        - "'Command fail' in members_output.stdout"

    - name: "ASSERT | Verify SD-WAN data integrity"
      # Observability: Ensure the device returned valid data before proceeding.
      ansible.builtin.assert:
        that:
          - "members_output.stdout is defined"
          - "members_output.stdout | length > 0"
          - "'member' in members_output.stdout"
        fail_msg: "Validation Failed: No SD-WAN members found or output was malformed."
        success_msg: "Validation Passed: SD-WAN member data retrieved successfully."

    - name: "DISPLAY | Format and show SD-WAN status"
      # Documentation: Provides human-readable output for auditing purposes.
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN MEMBERS =======================
          {{ members_output.stdout }}