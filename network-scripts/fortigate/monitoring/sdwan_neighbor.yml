---
# NetLearner Architect Improved Playbook: FortiGate SD-WAN Neighbors
# Purpose: Retrieves and validates BGP neighbor status to ensure SD-WAN overlay health.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage, Error Handling.
- name: Get SD-WAN Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute BGP neighbor retrieval command
      # Using FQCN for ansible.netcommon to ensure consistent behavior across environments.
      # This operation is inherently idempotent as it retrieves state without modification.
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors_result
      # Error Handling: Ensure the task fails if the command is unrecognized or the return code is non-zero.
      failed_when: 
        - neighbors_result.rc != 0 or "command parse error" in neighbors_result.stdout

    - name: Verify output integrity and connectivity
      # Observability: Assert that the command returned data to confirm the control plane is responsive.
      ansible.builtin.assert:
        that:
          - neighbors_result.stdout is defined
          - neighbors_result.stdout | length > 0
        fail_msg: "BGP neighbor data is empty. Verify if BGP/SD-WAN is configured on the target."
        success_msg: "BGP neighbor data successfully retrieved and validated."
        quiet: true

    - name: Display SD-WAN Neighbor Status
      # Observability: Provide a formatted view of the neighbors for logging and manual audit.
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN NEIGHBORS =======================
          {{ neighbors_result.stdout }}