---
# FortiGate SD-WAN Neighbors
# Purpose: Retrieves BGP neighbor status for SD-WAN health monitoring.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
- name: Get SD-WAN Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get BGP neighbors from FortiGate CLI
      # FQCN: Using ansible.netcommon for standardized CLI interaction
      # Why: To fetch raw routing table information directly from FortiOS.
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors
      # Error Handling: Ensure the task fails if the underlying CLI session 
      # encountered an error or if the stdout is unexpectedly missing.
      failed_when: 
        - neighbors.failed | default(false)
        - neighbors.stdout is not defined

    - name: Assert BGP neighbor data exists
      # Observability: Verify that the device returned a non-empty payload.
      # This prevents downstream processing of empty or failed results.
      ansible.builtin.assert:
        that:
          - neighbors.stdout | length > 0
        fail_msg: "BGP neighbor retrieval failed or returned no data for {{ inventory_hostname }}."
        quiet: true

    - name: Display SD-WAN Neighbors Report
      # Documentation: Providing a clear visual separator for log readability
      # and identifying the source host in a multi-node environment.
      ansible.builtin.debug:
        msg: |
          ======================= SD-WAN NEIGHBORS: {{ inventory_hostname }} =======================
          {{ neighbors.stdout }}
      # Idempotency: This operation is read-only and safe for repeated execution.
