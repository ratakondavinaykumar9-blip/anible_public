---
# FortiGate Packet Sniffer - Enhanced Operational Playbook
# Standards: Idempotency (read-only), Observability, FQCN, and Error Handling
- name: FortiGate Packet Sniffer
  hosts: fortigate
  gather_facts: false
  vars:
    # Centralized variables for easier maintenance and overrides
    sniffer_filter: "host 192.168.1.1"
    sniffer_count: 100
    sniffer_interface: "any"
    sniffer_verbose: 4 # Level 4: Interface name, IP header, and timestamps

  tasks:
    - name: Execute diagnostic packet sniffer on FortiGate
      # Use Fully Qualified Collection Name (FQCN) for best practice
      ansible.netcommon.cli_command:
        command: "diagnose sniffer packet {{ sniffer_interface }} '{{ sniffer_filter }}' {{ sniffer_verbose }} {{ sniffer_count }} l"
      register: sniffer_output
      # Setting changed_when to false ensures the playbook is idempotent (read-only operation)
      changed_when: false
      # Error Handling: Catch FortiOS-specific CLI parsing errors
      failed_when:
        - sniffer_output.stdout is search("command parse error")
        - sniffer_output.stdout is search("Unknown action")

    - name: Verify capture execution success
      # Observability: Assert that output was captured and the task didn't fail silently
      ansible.builtin.assert:
        that:
          - "sniffer_output.stdout is defined"
          - "sniffer_output.failed == false"
        fail_msg: "Packet sniffer command failed or was rejected by the FortiGate CLI."
        success_msg: "Packet sniffer executed and captured data successfully."

    - name: Display formatted sniffer results
      # Clean documentation and visualization of the diagnostic data
      ansible.builtin.debug:
        msg: |
          ======================= SNIFFER OUTPUT ({{ sniffer_interface }}) =======================
          {{ sniffer_output.stdout }}
      # Only output if data was actually returned to keep the log clean
      when: sniffer_output.stdout | length > 0