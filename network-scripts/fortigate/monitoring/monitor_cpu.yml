---
# FortiGate CPU Monitoring and Health Check
# This playbook gathers real-time CPU performance metrics from FortiGate devices.
# It ensures idempotency through read-only operations and provides high observability via assertions.

- name: Monitor CPU Performance
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve instantaneous CPU utilization per core
      # Why: Gathers the current CPU load to identify performance bottlenecks.
      ansible.netcommon.cli_command:
        command: get system performance status | grep "CPU"
      register: cpu_results
      failed_when: 
        - cpu_results.rc is defined and cpu_results.rc != 0
        - "not 'CPU' in cpu_results.stdout"

    - name: Validate CPU data retrieval
      # Why: Observability check to ensure the output contains expected metrics before proceeding.
      ansible.builtin.assert:
        that:
          - cpu_results.stdout is defined
          - cpu_results.stdout | length > 0
        fail_msg: "Critical: Unable to parse CPU performance data from {{ inventory_hostname }}."
        quiet: true

    - name: Capture system process snapshot
      # Why: Provides visibility into which specific processes are consuming system resources.
      ansible.netcommon.cli_command:
        command: diagnose system top 1 20
      register: top_results
      # Why: This command may timeout or be restricted under high load; ignore_errors ensures monitoring continues.
      ignore_errors: true

    - name: Validate process snapshot data
      # Why: Observability check to confirm if process data was successfully captured.
      ansible.builtin.assert:
        that:
          - top_results.stdout is defined
        fail_msg: "Warning: Could not retrieve process list from {{ inventory_hostname }}."
        quiet: true

    - name: Display consolidated CPU monitoring report
      # Why: Provides a formatted, human-readable view of collected performance data for observability.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          FORTIGATE PERFORMANCE MONITOR: {{ inventory_hostname }}
          ======================================================================
          
          CPU UTILIZATION BY CORE:
          {{ cpu_results.stdout }}

          PROCESS SNAPSHOT (TOP 20):
          {{ top_results.stdout | default('N/A - Data retrieval failed') }}
          
          ======================================================================
```