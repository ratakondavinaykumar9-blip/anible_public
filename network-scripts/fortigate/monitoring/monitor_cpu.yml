---
# FortiGate CPU Monitoring - Enhanced for industry standards
# This playbook retrieves real-time CPU statistics and process data to ensure system health.
- name: Monitor FortiGate CPU Performance
  hosts: fortigate
  gather_facts: false
  # gather_facts is disabled as we use network_cli for direct command execution on FortiOS.

  tasks:
    - name: Retrieve system performance status
      # Execute 'get system performance status' to capture real-time CPU load metrics.
      # The output is registered to 'cpu_raw' for validation and reporting.
      ansible.netcommon.cli_command:
        command: get system performance status
      register: cpu_raw
      failed_when: 
        - cpu_raw.failed 
        - "'CPU' not in cpu_raw.stdout"
      # failed_when ensures the playbook stops if the command fails or returns data without CPU keywords.

    - name: Validate CPU status capture
      # Assertion ensures the device returned actionable CPU data before proceeding.
      # This provides observability into the success of the telemetry collection.
      ansible.builtin.assert:
        that:
          - "'CPU' in cpu_raw.stdout"
        fail_msg: "The 'get system performance status' command did not return expected CPU metrics."
        quiet: true

    - name: Capture top process resource usage
      # Using 'diagnose system top 1 20 1' to get a single non-interactive snapshot (1 second delay, 20 items, 1 iteration).
      # This prevents the playbook from hanging on the default interactive/looping behavior of 'top'.
      ansible.netcommon.cli_command:
        command: diagnose system top 1 20 1
      register: top_raw
      failed_when: top_raw.failed
      # Idempotency: Diagnose commands are read-only and safe to run multiple times.

    - name: Validate process data integrity
      # Confirms that the diagnostic output is populated, ensuring the observability chain is intact.
      ansible.builtin.assert:
        that:
          - "top_raw.stdout | length > 0"
        fail_msg: "The 'diagnose system top' output was empty."
        quiet: true

    - name: Display aggregated monitoring results
      # Formats the registered telemetry into a readable summary for the operator.
      # regex_search is used to isolate relevant CPU lines from the full status output.
      ansible.builtin.debug:
        msg: |
          ======================= CPU MONITORING SUMMARY =======================
          
          SYSTEM CPU STATUS:
          {{ cpu_raw.stdout | regex_findall('CPU.*') | join('\n') }}

          PROCESS SNAPSHOT (TOP 20):
          {{ top_raw.stdout }}