---
# FortiGate CPU Monitoring
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Standards:
# 1. Idempotency: Read-only CLI commands are inherently idempotent as they do not alter device state.
# 2. Observability: Employs 'register' to capture output and 'assert' to validate data integrity.
# 3. Documentation: Clear step-by-step logic explaining the purpose of each monitoring task.
# 4. Error Handling: Uses 'failed_when' and 'ignore_errors' to manage potential command failures gracefully.
# 5. Best Practices: Implements Fully Qualified Collection Names (FQCN) for all modules.

- name: Monitor FortiGate CPU Performance
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "MONITOR | Retrieve CPU performance status"
      # Using FQCN for portability and explicit module sourcing.
      # Idempotency: Reading performance status is safe for repeated execution.
      ansible.netcommon.cli_command:
        command: "get system performance status | grep CPU"
      register: cpu_raw
      # Error Handling: Ensure we fail if the command execution fails or returns empty.
      failed_when: 
        - cpu_raw.failed 
        - cpu_raw.stdout | length == 0

    - name: "ASSERT | Validate CPU data retrieval"
      # Observability: Confirm the output contains the 'CPU' keyword to ensure the grep was successful.
      ansible.builtin.assert:
        that:
          - "'CPU' in cpu_raw.stdout"
        fail_msg: "Failed to retrieve valid CPU metrics from 'get system performance status'."
        quiet: true

    - name: "MONITOR | Retrieve top process usage"
      # 'diagnose system top 1 20 1' is used to make the command non-interactive (1s delay, 20 lines, 1 iteration).
      # This prevents the Ansible task from hanging while waiting for a manual break.
      ansible.netcommon.cli_command:
        command: "diagnose system top 1 20 1"
      register: top_raw
      # Error Handling: We allow the playbook to continue if specific process monitoring fails,
      # but we register the result for subsequent validation.
      ignore_errors: true

    - name: "ASSERT | Validate process data integrity"
      # Observability: Check that the process table header 'RunTime' or 'top' is present.
      ansible.builtin.assert:
        that:
          - "not top_raw.failed"
          - "'RunTime' in top_raw.stdout or 'top' in top_raw.stdout"
        fail_msg: "Process monitoring failed or returned an unexpected output format."
        quiet: true

    - name: "DISPLAY | Report CPU Monitoring Results"
      # Documentation: Providing a clear, formatted summary of the gathered metrics.
      ansible.builtin.debug:
        msg: |
          ======================= CPU MONITORING =======================
          DEVICE: {{ inventory_hostname }}
          
          --- CPU STATUS ---
          {{ cpu_raw.stdout }}
          
          --- TOP PROCESSES ---
          {{ top_raw.stdout | default('No process data available.') }}