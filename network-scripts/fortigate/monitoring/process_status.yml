---
# NetLearner Architect Standard: FortiGate Process Monitoring
# Purpose: Retrieves real-time process list for health monitoring and troubleshooting.
# This playbook is idempotent as it performs read-only operations and does not modify state.

- name: Get FortiGate Process Status
  hosts: fortigate
  gather_facts: false # Fact gathering is disabled to improve performance on network devices

  tasks:
    - name: Retrieve system process list from CLI
      # FQCN: Using the network common collection for consistent CLI execution
      ansible.netcommon.cli_command:
        command: diagnose system process list
      register: proc_status
      # Error Handling: Catch FortiOS-specific CLI errors that might return an exit code of 0
      failed_when: 
        - proc_status.failed or "Unknown action" in proc_status.stdout or "Command fail" in proc_status.stdout

    - name: Observability - Assert valid process data retrieval
      # Verification: Ensures the automation pipeline doesn't proceed with null or invalid data
      ansible.builtin.assert:
        that:
          - "proc_status.stdout is defined"
          - "proc_status.stdout | length > 0"
          - "'PID' in proc_status.stdout or 'process' in proc_status.stdout"
        fail_msg: "Process retrieval failed or returned incomplete data on {{ inventory_hostname }}."
        quiet: true

    - name: Observability - Display formatted process report
      # Documentation: Provides visibility into the current state of the device for the operator
      ansible.builtin.debug:
        msg: |
          ======================= PROCESS REPORT: {{ inventory_hostname }} =======================
          {{ proc_status.stdout }}
