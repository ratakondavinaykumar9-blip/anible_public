---
# FortiGate Process Status Diagnostics
# This playbook retrieves the current process list for monitoring and troubleshooting.
# Idempotency: This is a read-only diagnostic command and is safe to run multiple times.
- name: Get Process Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute process list diagnostic command
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: diagnose system process list
      register: proc
      # Error Handling: Define failure conditions for specific FortiOS error strings
      failed_when: 
        - proc.failed or "Unknown action" in proc.stdout or "Command fail" in proc.stdout

    - name: Validate process data integrity
      # Observability: Assert that the command returned meaningful output
      ansible.builtin.assert:
        that:
          - proc.stdout is defined
          - proc.stdout | length > 0
          - "'process' in proc.stdout or 'Runtime' in proc.stdout"
        fail_msg: "The process diagnostic command returned empty or unexpected results."
        success_msg: "Process data successfully retrieved and validated."

    - name: Display formatted process information
      # Observability: Provide clear visibility into the command output
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE PROCESSES =======================
          {{ proc.stdout }}