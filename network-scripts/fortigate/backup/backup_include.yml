---
# FortiGate Selective Backup - Improved Version
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Selective Backup
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Collect local timestamp for file naming
      # Observability: Ensure ansible_date_time is available even with gather_facts: false
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      run_once: true

    - name: Ensure backup directory exists with secure permissions
      # Idempotency: Ensures the directory is present with defined state on every run
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Get firewall configuration
      # FQCN: Using fully qualified name for network command execution
      ansible.netcommon.cli_command:
        command: show firewall
      register: fw
      # Error Handling: Fail if output is empty or if the device returns a command error
      failed_when: 
        - fw.stdout == ""
        - "'Command fail' in fw.stdout"

    - name: Verify firewall configuration capture
      # Observability: Assert that critical configuration data was actually retrieved
      ansible.builtin.assert:
        that:
          - fw.stdout | length > 0
        fail_msg: "Firewall configuration retrieval failed or returned empty output."

    - name: Get router configuration
      ansible.netcommon.cli_command:
        command: show router
      register: router
      # Error Handling: Continue if router config is missing on specific VDOMs/devices
      ignore_errors: true

    - name: Get VPN configuration
      ansible.netcommon.cli_command:
        command: show vpn
      register: vpn
      ignore_errors: true

    - name: Save selective configuration to local controller
      # Idempotency: Managed via the 'dest' parameter and 'force' (default: yes)
      ansible.builtin.copy:
        content: |
          # FortiGate Selective Backup - {{ inventory_hostname }}
          # Captured on: {{ ansible_date_time.iso8601 }}
          
          # --- FIREWALL SECTION ---
          {{ fw.stdout }}
          
          # --- ROUTER SECTION ---
          {{ router.stdout | default('Not available or error during retrieval') }}
          
          # --- VPN SECTION ---
          {{ vpn.stdout | default('Not available or error during retrieval') }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_selective_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.conf"
        mode: '0600' # Documentation: Restrict access to sensitive config files
      delegate_to: localhost
      register: backup_output

    - name: Confirm backup completion and path
      # Observability: Provide clear feedback on the task outcome
      ansible.builtin.debug:
        msg: "Selective backup for {{ inventory_hostname }} saved to {{ backup_output.dest }}"
      when: not backup_output.failed