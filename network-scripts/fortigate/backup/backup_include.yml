# FortiGate Selective Backup
# Optimized for NetLearner Staging Environment
# This playbook extracts specific configuration blocks for modular disaster recovery.
- name: Selective Backup
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Gather facts from localhost for timestamping
      # Why: Network devices don't support standard fact gathering; we use the controller's clock.
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      run_once: true

    - name: Get firewall configuration
      ansible.netcommon.cli_command:
        command: show firewall
      register: fw
      # Error Handling: Detect CLI execution failures or empty responses.
      failed_when: fw.stdout == "" or "Unknown" in fw.stdout

    - name: Verify firewall config data
      # Observability: Assert that the received data is valid before proceeding.
      ansible.builtin.assert:
        that: fw.stdout | length > 0
        fail_msg: "Firewall config extraction returned no data for {{ inventory_hostname }}."

    - name: Get router configuration
      ansible.netcommon.cli_command:
        command: show router
      register: router
      failed_when: router.stdout == "" or "Unknown" in router.stdout

    - name: Verify router config data
      ansible.builtin.assert:
        that: router.stdout | length > 0
        fail_msg: "Router config extraction returned no data for {{ inventory_hostname }}."

    - name: Get VPN configuration
      ansible.netcommon.cli_command:
        command: show vpn
      register: vpn
      failed_when: vpn.stdout == "" or "Unknown" in vpn.stdout

    - name: Verify VPN config data
      ansible.builtin.assert:
        that: vpn.stdout | length > 0
        fail_msg: "VPN config extraction returned no data for {{ inventory_hostname }}."

    - name: Ensure local backup directory exists
      # Idempotency: 'state: directory' ensures the path exists with correct permissions without recreation.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost

    - name: Save selective configuration to controller
      # Documentation: Concatenates output into a single file with a sanitized ISO8601 timestamp.
      # Best Practice: Use FQCN and explicit mode for file security.
      ansible.builtin.copy:
        content: |
          # FortiGate Selective Backup: {{ inventory_hostname }}
          # Date: {{ hostvars['localhost']['ansible_date_time']['iso8601'] }}
          
          # --- FIREWALL CONFIG ---
          {{ fw.stdout }}
          
          # --- ROUTER CONFIG ---
          {{ router.stdout }}
          
          # --- VPN CONFIG ---
          {{ vpn.stdout }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_selective_{{ hostvars['localhost']['ansible_date_time']['iso8601'] | regex_replace(':', '-') }}.conf"
        mode: '0644'
      delegate_to: localhost

    - name: Log selective backup result
      ansible.builtin.debug:
        msg: "Selective backup for {{ inventory_hostname }} successfully archived in {{ backup_path }}/"