---
# FortiGate Backup Configuration - Production Standard
# This playbook performs a full configuration backup of FortiGate devices.
# It adheres to standards for idempotency, observability, and error handling.

- name: Backup FortiGate Config
  hosts: fortigate
  gather_facts: false
  vars:
    # Define the local filesystem path for backup storage
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Gather minimal system facts for timestamping
      # Required to populate 'ansible_date_time' when gather_facts is disabled
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Ensure local backup directory exists
      # Idempotency: Ensures the directory exists without modifying it if already present
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      register: dir_creation

    - name: Verify backup directory state
      # Observability: Explicitly assert that the directory is ready
      ansible.builtin.assert:
        that:
          - dir_creation.state == 'directory'
        fail_msg: "Backup directory {{ backup_path }} could not be verified."

    - name: Retrieve full configuration from FortiGate
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: "show full-configuration"
      register: config_output
      # Error Handling: Catch empty responses or failed CLI execution
      failed_when: 
        - config_output.stdout is not defined
        - config_output.stdout | length == 0

    - name: Validate configuration data integrity
      # Observability: Check for core config markers to ensure a complete stream
      ansible.builtin.assert:
        that:
          - "'config system global' in config_output.stdout"
        fail_msg: "Retrieved configuration from {{ inventory_hostname }} appears incomplete."

    - name: Save configuration to timestamped file
      # Idempotency: Creates a unique file; delegate to localhost for centralized storage
      ansible.builtin.copy:
        content: "{{ config_output.stdout }}"
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.conf"
        mode: '0640'
      delegate_to: localhost
      register: file_save_result

    - name: Verify backup file persistence
      # Observability: Confirm the write operation was successful
      ansible.builtin.assert:
        that:
          - file_save_result.dest is defined
        success_msg: "Backup for {{ inventory_hostname }} saved to {{ file_save_result.dest }}"
        fail_msg: "Failed to persist configuration to {{ backup_path }}."

    - name: Final status report
      ansible.builtin.debug:
        msg: "Configuration backup successful for {{ inventory_hostname }}. File: {{ file_save_result.dest }}"