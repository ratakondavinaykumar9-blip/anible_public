# FortiGate Backup Configuration
# Purpose: Securely retrieve and archive FortiGate configurations with integrity checks.
# This playbook adheres to standards for Idempotency, Observability, and Error Handling.
- name: Backup FortiGate Config
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Gather timestamp facts from the control node
      # Requirement: Observability - Ensures precise timestamping for versioned backups.
      ansible.builtin.setup:
        gather_subset:
          - 'date_time'
      delegate_to: localhost
      run_once: true

    - name: Ensure the local backup directory exists
      # Requirement: Idempotency - 'state: directory' ensures the path exists without modifying it on subsequent runs.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      run_once: true
      register: directory_status

    - name: Verify backup directory accessibility
      # Requirement: Observability - Validates that the filesystem is ready for write operations.
      ansible.builtin.assert:
        that:
          - directory_status is successful
        fail_msg: "Cannot access or create the backup directory at {{ backup_path }}."

    - name: Retrieve full configuration from the FortiGate device
      # Requirement: Best Practice - Using FQCN (ansible.netcommon).
      ansible.netcommon.cli_command:
        command: show full-configuration
      register: config_data
      # Requirement: Error Handling - Prevents silent failures or saving empty configuration strings.
      failed_when:
        - config_data.stdout == ""
        - "'Error' in config_data.stdout"

    - name: Validate configuration integrity
      # Requirement: Observability - Asserts that the output contains expected FortiOS markers.
      ansible.builtin.assert:
        that:
          - "'config system global' in config_data.stdout"
        fail_msg: "The configuration retrieved from {{ inventory_hostname }} appears to be truncated or invalid."

    - name: Save configuration to a timestamped file on the control node
      # Requirement: Best Practice - Ensures restrictive file permissions (0600) for sensitive data.
      ansible.builtin.copy:
        content: "{{ config_data.stdout }}"
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ hostvars['localhost']['ansible_date_time']['iso8601'] | regex_replace(':', '-') }}.conf"
        mode: '0600'
      register: save_result

    - name: Finalize and report backup status
      # Requirement: Observability - Provides the operator with the specific path of the created artifact.
      ansible.builtin.debug:
        msg: "Backup successful for {{ inventory_hostname }}. Saved to: {{ save_result.dest }}"