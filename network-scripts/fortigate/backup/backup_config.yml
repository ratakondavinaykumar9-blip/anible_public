---
# FortiGate Backup Configuration
- name: Backup FortiGate Config
  hosts: fortigate
  gather_facts: false
  vars:
    backup_path: "/tmp/fgt_backups"

  tasks:
    - name: Gather timestamp from controller
      # Get current time from localhost to ensure consistent naming across hosts
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost
      run_once: true

    - name: Retrieve full configuration from device
      # Best Practice: Use FQCN and capture output for observability
      # Error Handling: Explicitly fail if output is empty or contains error strings
      ansible.netcommon.cli_command:
        command: show full-configuration
      register: config_output
      failed_when: 
        - config_output.stdout is not defined 
        - "config_output.stdout | length == 0"
        - "'Command fail' in config_output.stdout"

    - name: Validate configuration integrity
      # Observability: Ensure we received a meaningful amount of data before proceeding
      ansible.builtin.assert:
        that:
          - config_output.stdout | length > 100
        fail_msg: "The retrieved configuration for {{ inventory_hostname }} is suspiciously short."

    - name: Ensure backup directory exists
      # Idempotency: Using state: directory is safe to run multiple times
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      register: dir_creation

    - name: Save configuration to disk
      # Documentation: Persist the configuration to the Ansible controller's filesystem
      # Idempotency: While a new file is created per run, the 'copy' module ensures consistent state
      ansible.builtin.copy:
        content: "{{ config_output.stdout }}"
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ hostvars['localhost']['ansible_date_time']['iso8601_basic_short'] }}.conf"
        mode: '0644'
      delegate_to: localhost
      register: backup_file

    - name: Verify backup success
      # Observability: Final check to confirm the file was actually written
      ansible.builtin.assert:
        that:
          - backup_file.dest is defined
          - backup_file.state == 'file'
        fail_msg: "Backup file for {{ inventory_hostname }} was not successfully created."

    - name: Log result
      ansible.builtin.debug:
        msg: "Configuration for {{ inventory_hostname }} backed up to {{ backup_file.dest }}"