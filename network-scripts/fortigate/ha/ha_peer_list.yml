---
# FortiGate HA Peer List Retrieval
# This playbook adheres to NetLearner standards for idempotency, observability, and robust error handling.
- name: Get HA Peer List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute HA peer status command
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction
      ansible.netcommon.cli_command:
        command: get system ha peer
      register: ha_peer_output
      # Idempotency: Read-only state retrieval should never report 'changed: true'
      changed_when: false
      # Error Handling: Catch non-zero exit codes and specific FortiOS error strings
      failed_when: >
        ha_peer_output.rc != 0 or 
        "Unknown action" in ha_peer_output.stdout or 
        "Command fail" in ha_peer_output.stdout

    - name: Validate HA peer data integrity
      # Observability: Ensure that data was actually returned before proceeding
      ansible.builtin.assert:
        that:
          - ha_peer_output.stdout is defined
          - ha_peer_output.stdout | length > 0
        fail_msg: "HA peer information is empty or could not be retrieved. Verify HA configuration."
        success_msg: "HA peer information successfully captured."

    - name: Display HA Peer Status
      # Observability: Provide formatted output for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= HA PEERS =======================
          {{ ha_peer_output.stdout }}
          ========================================================