---
# Playbook: FortiGate HA Peer List
# Purpose: Retrieves and validates High Availability (HA) peer status from FortiGate devices.
# Standards: Automation Framework (Idempotency, Observability, FQCN).
- name: Get HA Peer List
  hosts: fortigate
  gather_facts: false # Performance: Fact gathering is not required for CLI-based status checks.

  tasks:
    - name: Execute CLI command to retrieve HA peer information
      # FQCN used to ensure the correct module is invoked across different environments.
      ansible.netcommon.cli_command:
        command: get system ha peer
      register: ha_peer_result
      # Idempotency: 'get' commands are read-only and inherently safe for repeated execution.
      # Error Handling: Explicitly catch device-specific error strings that may not trigger a CLI failure.
      failed_when: >
        ha_peer_result.failed or 
        "Command fail" in ha_peer_result.stdout or 
        "Unknown action" in ha_peer_result.stdout

    - name: Validate integrity of captured HA data
      # Observability: Assert that the command returned valid data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - ha_peer_result.stdout is defined
          - ha_peer_result.stdout | length > 0
        fail_msg: "Data integrity check failed: HA peer output is empty or undefined."
        success_msg: "HA peer data successfully captured and validated."

    - name: Display formatted HA Peer status
      # Documentation: Providing a human-readable output for auditing and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= HA PEER STATUS =======================
          {{ ha_peer_result.stdout }}