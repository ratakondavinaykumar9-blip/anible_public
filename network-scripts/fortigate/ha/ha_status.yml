---
# ==============================================================================
# Playbook: FortiGate HA Status Monitoring
# ==============================================================================
# Description: Monitor FortiGate High Availability cluster status with peer
#              health validation and idempotent report generation.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
# ==============================================================================

- name: Get FortiGate HA Status
  hosts: fortigate
  gather_facts: false
  connection: httpapi

  vars:
    vdom: "root"
    check_sync: true
    alert_threshold: 3
    output_dir: "/tmp/ha_reports"

  tasks:
    - name: Ensure the local report directory exists
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      # Idempotency: file module ensures directory existence without redundant changes.

    - name: Execute HA Status Collection Block
      block:
        - name: Collect HA status from device
          ansible.netcommon.cli_command:
            command: "get system ha status"
          register: ha_status
          changed_when: false
          # Observability: register output for fact extraction and validation.

        - name: Collect HA configuration details
          ansible.netcommon.cli_command:
            command: "show system ha"
          register: ha_config
          changed_when: false
          failed_when: false
          # Error Handling: Prevent failure if specific config subtrees are restricted.

        - name: Collect management-plane peer status
          ansible.netcommon.cli_command:
            command: "diagnose sys ha management-peer status"
          register: ha_peers
          changed_when: false
          failed_when: false

        - name: Collect synchronization checksums
          ansible.netcommon.cli_command:
            command: "diagnose sys ha checksum status"
          register: sync_status
          when: check_sync | bool
          changed_when: false
          failed_when: false

        - name: Parse HA state attributes
          ansible.builtin.set_fact:
            ha_mode: "{{ ha_status.stdout | regex_search('Mode:\\s+(\\S+)', '\\1') | first | default('Unknown') }}"
            ha_group: "{{ ha_status.stdout | regex_search('Group:\\s+(\\d+)', '\\1') | first | default('N/A') }}"
            is_master: "{{ 'Master' in ha_status.stdout or 'Primary' in ha_status.stdout }}"
          # Documentation: Normalize CLI string output into structured variables for assertions.

        - name: Validate cluster operational health
          ansible.builtin.assert:
            that:
              - ha_mode in ['a-p', 'a-a']
              - "ha_status.stdout | regex_findall('Slave|Secondary|Primary|Master') | length >= 2"
            fail_msg: "CRITICAL: HA cluster on {{ inventory_hostname }} has insufficient members or invalid mode!"
            success_msg: "HA cluster health verified for {{ inventory_hostname }}."
            quiet: true
          # Observability: Automated verification of minimum cluster requirements.

      rescue:
        - name: Log HA collection failure
          ansible.builtin.debug:
            msg: "WARNING: Unable to retrieve HA status for {{ inventory_hostname }}. Device may be in Standalone mode."

        - name: Set facts for standalone state
          ansible.builtin.set_fact:
            ha_mode: "Standalone"
            ha_group: "N/A"
            is_master: false
          # Error Handling: Graceful degradation for non-HA environments.

      always:
        - name: Display HA summary to console
          ansible.builtin.debug:
            msg: |
              ========================================
              Host: {{ inventory_hostname }}
              Mode: {{ ha_mode }}
              Role: {{ 'Master/Primary' if is_master else 'Secondary/Slave' }}
              Group: {{ ha_group }}
              ========================================

    - name: Generate and archive HA health report
      ansible.builtin.copy:
        content: |
          # FortiGate HA Status Report
          # Host: {{ inventory_hostname }}
          # Timestamp: {{ lookup('pipe', 'date +%Y-%m-%dT%H:%M:%S') }}
          
          ## Summary
          HA Mode: {{ ha_mode }}
          HA Role: {{ 'Master/Primary' if is_master else 'Secondary/Slave' }}
          
          ## Peer Health Status
          {{ ha_peers.stdout | default('N/A') }}
          
          ## Checksum Synchronization
          {{ sync_status.stdout | default('Not Checked') }}
          
          ## Raw System HA Status
          {{ ha_status.stdout | default('N/A') }}
        dest: "{{ output_dir }}/{{ inventory_hostname }}_ha_report.txt"
        mode: '0640'
      delegate_to: localhost
      # Idempotency: copy module only updates files if content differs from destination.
```