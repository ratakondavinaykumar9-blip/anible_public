---
# FortiGate HA Configuration Audit
# Purpose: Retrieves and validates the High Availability (HA) status of FortiGate units.
# This playbook ensures operational consistency and follows NetLearner Architect standards.
- name: Get HA Config
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system HA configuration via CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      # Documentation: 'get system ha' provides the configuration block for the HA subsystem.
      ansible.netcommon.cli_command:
        command: get system ha
      register: ha_config
      # Idempotency: Mark as 'changed: false' because this is a read-only operation.
      changed_when: false
      # Error Handling: Ensure the command output is captured and valid.
      failed_when: 
        - ha_config.stdout is not defined or ha_config.stdout == ""
      ignore_errors: false

    - name: Validate HA configuration state
      # Observability: Assert that the HA configuration contains critical keywords (e.g., 'mode').
      # This ensures we didn't just receive an empty shell or an error message.
      ansible.builtin.assert:
        that:
          - "'set mode' in ha_config.stdout"
        fail_msg: "HA configuration is incomplete or missing on {{ inventory_hostname }}."
        success_msg: "HA configuration successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display formatted HA configuration summary
      # Observability: Provide a structured view for NOC/Engineering review.
      ansible.builtin.debug:
        msg: |
          ======================= HA CONFIG: {{ inventory_hostname }} =======================
          {{ ha_config.stdout }}
      tags:
        - debug
        - audit