---
# This playbook retrieves real-time IPSec VPN tunnel statistics from FortiGate devices.
# It provides critical observability into tunnel health, phase 2 selectors, and traffic counters.
- name: Retrieve FortiGate IPSec VPN Traffic Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute diagnose command to retrieve VPN tunnel list
      # Using FQCN (Fully Qualified Collection Name) for consistent, collection-based execution
      ansible.netcommon.cli_command:
        command: diagnose vpn tunnel list
      register: vpn_traffic_raw
      # Error Handling: Explicitly identify device-level command failures
      failed_when:
        - vpn_traffic_raw.rc | default(0) != 0
        - "'Command fail' in vpn_traffic_raw.stdout"

    - name: Validate that VPN traffic output was captured
      # Observability: Use assertions to verify the device returned a valid response structure
      ansible.builtin.assert:
        that:
          - vpn_traffic_raw.stdout is defined
        fail_msg: "The diagnose command returned no output or failed to register correctly."
        success_msg: "VPN tunnel data successfully registered for analysis."

    - name: Display formatted IPSec VPN traffic information
      # Documentation via debug: Providing a structured and readable view for operational verification
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC VPN TRAFFIC REPORT =======================
          HOST: {{ inventory_hostname }}
          COMMAND: diagnose vpn tunnel list
          -----------------------------------------------------------------------
          {{ vpn_traffic_raw.stdout }}
