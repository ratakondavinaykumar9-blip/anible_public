---
# Playbook: Monitor FortiGate IPSec Traffic
# Purpose: Retrieves real-time VPN tunnel statistics to verify connectivity and traffic flow.
# This operation is read-only and inherently idempotent.
- name: Monitor FortiGate IPSec Traffic
  hosts: fortigate
  gather_facts: false # Performance: Skip fact gathering as we only require CLI access

  tasks:
    - name: Execute FortiOS diagnose command to list VPN tunnels
      # Using FQCN for cross-platform compatibility and reliability
      ansible.netcommon.cli_command:
        command: "diagnose vpn tunnel list"
      register: ipsec_traffic_output
      # Error Handling: Identify common CLI failure strings that don't trigger a non-zero exit code
      failed_when: 
        - ipsec_traffic_output.failed or "'Unknown action' in ipsec_traffic_output.stdout"
        - "'Command fail' in ipsec_traffic_output.stdout"

    - name: Validate IPSec traffic data integrity
      # Observability: Ensure the command returned data before proceeding
      ansible.builtin.assert:
        that:
          - "ipsec_traffic_output.stdout is defined"
          - "ipsec_traffic_output.stdout | length > 0"
        fail_msg: "IPSec tunnel list is empty or could not be retrieved. Check VPN configuration."
        success_msg: "IPSec tunnel data successfully captured."

    - name: Display Formatted IPSec Traffic Statistics
      # Documentation: Providing a clear visual header for logs and auditing
      ansible.builtin.debug:
        msg: |
          =============================================================
          IPSEC VPN TUNNEL STATUS & TRAFFIC SUMMARY
          =============================================================
          {{ ipsec_traffic_output.stdout }}