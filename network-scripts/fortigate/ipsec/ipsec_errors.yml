# NetLearner Architect Standardized Playbook
# Purpose: Retrieve and validate FortiGate IPSec/IKE diagnostic logs for troubleshooting.
# Idempotency: This playbook uses read-only diagnostic commands, making it safe for repeated execution.
- name: Get IPSec Errors
  hosts: fortigate
  gather_facts: false # Optimization: Disabling fact gathering as metadata is not required for diagnostic commands.

  tasks:
    - name: Execute IKE diagnostic command
      # Using Fully Qualified Collection Name (FQCN) for consistency and portability.
      ansible.netcommon.cli_command:
        command: diagnose vpn ike log
      register: ike_errors
      # Error Handling: Explicitly define failure conditions to catch OS-level parse errors.
      failed_when: 
        - ike_errors.rc is defined and ike_errors.rc != 0
        - "'command parse error' in ike_errors.stdout"

    - name: Validate diagnostic output observability
      # Observability: Assert that data was actually returned to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - ike_errors.stdout is defined
          - ike_errors.stdout | length > 0
        fail_msg: "No diagnostic logs were returned from {{ inventory_hostname }}. Verify VPN state."
        success_msg: "Successfully captured IPSec logs from {{ inventory_hostname }}."

    - name: Display formatted IPSec error report
      # Observability: Providing a clean, structured view of the retrieved logs for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC ERRORS: {{ inventory_hostname }} =======================
          {{ ike_errors.stdout }}
---