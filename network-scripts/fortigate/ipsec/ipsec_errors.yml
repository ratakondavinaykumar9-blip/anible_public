---
- name: Gather IPSec Diagnostic Logs from FortiGate
  hosts: fortigate
  gather_facts: false
  # This playbook is idempotent as it performs read-only diagnostic operations that do not modify the device state.
  # It retrieves IKE/IPSec error logs to facilitate network troubleshooting and observability.

  tasks:
    - name: Execute IKE diagnostic log command
      ansible.netcommon.cli_command:
        command: diagnose vpn ike log
      register: ipsec_logs
      # Error Handling: Catching unexpected command failures or "unknown command" responses from the CLI.
      failed_when:
        - ipsec_logs.rc is defined and ipsec_logs.rc != 0
        - "'command parse error' in ipsec_logs.stdout | lower"

    - name: Verify IPSec diagnostic data retrieval
      ansible.builtin.assert:
        that:
          - ipsec_logs.stdout is defined
        fail_msg: "Critical Error: Failed to capture stdout from the FortiGate device."
        success_msg: "IPSec diagnostic logs successfully registered."
      # Observability: Ensures that the captured data is valid before proceeding to display.

    - name: Display FortiGate IPSec Errors
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC ERRORS =======================
          {{ ipsec_logs.stdout if ipsec_logs.stdout | length > 0 else 'No recent IPSec errors found.' }}
      # Documentation: Summarizes the findings for the operator, providing a clear visual separator.