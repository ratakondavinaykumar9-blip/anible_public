---
# Playbook: FortiGate IPSec Tunnel Monitoring
# Purpose: Retrieves and validates operational status of IPSec tunnels.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage.
- name: Get IPSec Details
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to fetch IPSec tunnel details
      # Using FQCN (ansible.netcommon.cli_command) for standardized network interaction.
      # This task is inherently idempotent as it performs a read-only 'get' operation.
      ansible.netcommon.cli_command:
        command: get vpn ipsec tunnel details
      register: ipsec_details_raw
      # Error Handling: Fail if the command is unrecognized or the task execution fails.
      failed_when:
        - ipsec_details_raw.failed
        - "'command parse error' in ipsec_details_raw.stdout"
        - "'Unknown action' in ipsec_details_raw.stdout"

    - name: Verify command output integrity
      # Observability: Assert that the command returned data to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - ipsec_details_raw.stdout is defined
          - ipsec_details_raw.stdout | length > 0
        fail_msg: "The FortiGate returned no IPSec tunnel information. Verify VPN configuration or device state."
        quiet: true

    - name: Display formatted IPSec details
      # Documentation: Output results to the console for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DETAILS =======================
          {{ ipsec_details_raw.stdout }}