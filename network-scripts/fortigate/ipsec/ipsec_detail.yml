---
# FortiGate IPSec Details - Standard:
# This playbook retrieves IPSec tunnel status. Reading state is inherently idempotent.
- name: Get IPSec Details
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec tunnel details via CLI
      # Use FQCN for consistency and future-proofing across environments
      ansible.netcommon.cli_command:
        command: get vpn ipsec tunnel details
      register: ipsec_details
      # Error Handling: Explicitly fail if the command returns an error string or empty output
      failed_when: 
        - ipsec_details.failed == true
        - "ipsec_details.stdout == ''"
        - "'Command fail' in ipsec_details.stdout"

    - name: Validate retrieval of IPSec information
      # Observability: Confirm the registered variable contains expected data before proceeding
      ansible.builtin.assert:
        that:
          - ipsec_details.stdout is defined
          - ipsec_details.stdout | length > 0
        fail_msg: "No IPSec tunnel details were returned from the host."
        success_msg: "Successfully captured IPSec tunnel state."

    - name: Display IPSec Operational Status
      # Documentation: Provide clear visibility into the operational state for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DETAILS =======================
          {{ ipsec_details.stdout }}