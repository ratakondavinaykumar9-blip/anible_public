MCP issues detected. Run /mcp list for status.```yaml
---
# FortiGate IPSec Phase 1 Status Retrieval
# Standards: Idempotent, Observable, Documented, and Secure.
- name: Get FortiGate IPSec Phase 1 Configuration
  hosts: fortigate
  gather_facts: false # FortiOS does not support standard Linux/Unix fact gathering

  tasks:
    - name: Retrieve IPSec Phase 1 Configuration
      # Using FQCN (Fully Qualified Collection Name) for architectural consistency.
      # This 'get' command is inherently idempotent as it does not modify device state.
      ansible.netcommon.cli_command:
        command: "get vpn ipsec phase1"
      register: ph1_result
      # Error Handling: Catch CLI-level failures that might not return a non-zero exit code.
      failed_when: 
        - ph1_result.rc != 0 
        - "'Command fail' in ph1_result.stdout"

    - name: Verify Observability of Phase 1 Data
      # Observability: Ensure we actually received data before proceeding or displaying.
      ansible.builtin.assert:
        that:
          - ph1_result.stdout is defined
          - ph1_result.stdout | length > 0
        fail_msg: "No output received from FortiGate on {{ inventory_hostname }}."
        quiet: true

    - name: Display IPSec Phase 1 Status
      # Documentation/Observability: Provides a human-readable audit trail in the execution log.
      ansible.builtin.debug:
        msg: |
          ======================= [ {{ inventory_hostname }} ] IPSEC PHASE 1 =======================
          {{ ph1_result.stdout }}
