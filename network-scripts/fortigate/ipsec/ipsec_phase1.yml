---
- name: FortiGate IPSec Phase 1 Retrieval and Validation
  hosts: fortigate
  gather_facts: false
  # This playbook is designed to safely retrieve and validate IPSec Phase 1 settings.
  # It adheres to idempotency by performing read-only operations that do not modify state.

  tasks:
    - name: Retrieve IPSec Phase 1 configuration from FortiGate
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction
      ansible.netcommon.cli_command:
        command: get vpn ipsec phase1
      register: ph1
      # Error Handling: Catch cases where the command is rejected by FortiOS or the connection fails
      failed_when: ph1.failed or "Unknown action" in ph1.stdout

    - name: Validate that Phase 1 data was successfully captured
      # Observability: Ensure the device returned valid content before proceeding
      ansible.builtin.assert:
        that:
          - ph1.stdout is defined
          - ph1.stdout | length > 0
        fail_msg: "IPSec Phase 1 configuration retrieval failed or returned no data."
        success_msg: "IPSec Phase 1 configuration successfully retrieved."

    - name: Display IPSec Phase 1 Status
      # Observability: Structured debug output for visibility into the operational state
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC PHASE 1 =======================
          {{ ph1.stdout }}