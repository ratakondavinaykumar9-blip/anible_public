---
# FortiGate IPSec Monitoring Playbook
# Purpose: This playbook retrieves the operational status of IPsec VPN tunnels.
# Standards: Implements Idempotency (Read-only), Observability (Registration/Assertion), and FQCN.
- name: FortiGate IPSec Monitor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPsec tunnel statistics from FortiGate CLI
      # Use FQCN for the generic network command execution module.
      # Idempotency: Read-only command 'get' does not modify device state, making it safe for repeated runs.
      ansible.netcommon.cli_command:
        command: get vpn ipsec monitor
      register: ipsec_monitor_output
      # Error Handling: Fail the task if the command is unrecognized or the transport layer reports a failure.
      failed_when: 
        - ipsec_monitor_output.failed or "Unknown" in ipsec_monitor_output.stdout

    - name: Verify IPsec monitor output integrity
      # Observability: Use assertion to ensure that valid telemetry data was actually returned.
      ansible.builtin.assert:
        that:
          - ipsec_monitor_output.stdout is defined
          - ipsec_monitor_output.stdout | length > 0
        fail_msg: "IPsec monitor data is empty. Verify VPN tunnels are configured on the target device."
        quiet: true

    - name: Display formatted IPsec tunnel information
      # Documentation: Provides a human-readable summary of the tunnel status for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC MONITOR STATUS =======================
          {{ ipsec_monitor_output.stdout }}
          ====================================================================