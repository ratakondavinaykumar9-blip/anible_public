# FortiGate IPSec Phase 2 Status Retrieval
# This playbook retrieves and validates the IPSec Phase 2 configuration from FortiGate devices.
# Standards followed: Idempotency (Read-only), Observability (Assert), Documentation (Why), FQCN.
- name: FortiGate IPSec Phase 2 Validation
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec Phase 2 configuration via CLI
      # Use FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: get vpn ipsec phase2
      register: ph2_output
      # Ensure the task fails if the command returns a "command parse error" or "entry not found"
      failed_when: 
        - ph2_output.failed
        - "'Unknown' in ph2_output.stdout or 'error' in ph2_output.stdout"

    - name: Validate phase 2 data integrity
      # Observability: Assert that we received a non-empty response to ensure connectivity and command success
      ansible.builtin.assert:
        that:
          - ph2_output.stdout is defined
          - ph2_output.stdout | length > 0
        fail_msg: "IPSec Phase 2 data retrieval failed or returned empty results."
        success_msg: "Successfully retrieved IPSec Phase 2 configuration."

    - name: Display IPSec Phase 2 details
      # Present the raw output for manual verification/logging
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC PHASE 2 REPORT =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ---
          {{ ph2_output.stdout }}