---
# FortiGate IPSec Statistics - Production Grade
# This playbook retrieves and validates IPSec VPN statistics from FortiGate devices.
- name: Get IPSec Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPSec VPN statistics via CLI
      # FQCN: Using ansible.netcommon for broad compatibility across network devices
      ansible.netcommon.cli_command:
        command: get vpn ipsec stats
      register: stats
      # Idempotency: Ensure read-only commands do not trigger 'changed' state in reporting
      changed_when: false
      # Error Handling: Catch specific FortiOS CLI failure strings or missing output
      failed_when: 
        - stats.stdout is not defined or stats.stdout | length == 0
        - "'Command fail' in stats.stdout or 'Unknown action' in stats.stdout"

    - name: Validate IPSec statistics integrity
      # Observability: Assert that the output contains expected VPN keywords to verify success
      ansible.builtin.assert:
        that:
          - "'IPsec' in stats.stdout"
          - "'SA' in stats.stdout"
        fail_msg: "The command output did not contain expected IPSec metrics. Verification failed."
        success_msg: "IPSec statistics successfully retrieved and verified."

    - name: Display IPSec Statistics
      # Documentation: Formatted output for human-readable monitoring
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC STATS =======================
          {{ stats.stdout }}