---
# ==============================================================================
# Playbook: FortiGate IPSec Status (Improved)
# ==============================================================================
# Author: NetLearner Architect
# Version: 1.2.0
# Description: Monitor IPSec VPN tunnel status on FortiGate firewalls with
#              enhanced idempotency, observability, and structured reporting.
# ==============================================================================

- name: Get IPSec Status
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.httpapi

  vars:
    vdom: "root"
    alert_on_down: false
    output_dir: "/tmp/vpn_status"

  tasks:
    - name: Collect and validate IPSec tunnel information
      block:
        - name: Get IPSec tunnel status
          ansible.netcommon.cli_command:
            command: "get vpn ipsec status"
          register: ipsec_status
          changed_when: false
          failed_when: 
            - ipsec_status is failed or ipsec_status.stdout is not defined
          # Why: Primary command to verify Phase 2 status. Failure stops the block.

        - name: Verify IPSec status response integrity
          ansible.builtin.assert:
            that:
              - "'status' in ipsec_status.stdout or 'IPsec' in ipsec_status.stdout"
            fail_msg: "Unexpected CLI response from {{ inventory_hostname }}. Verify VDOM and permissions."
          # Why: Observability - ensures the output is valid before parsing.

        - name: Get detailed IKE status
          ansible.netcommon.cli_command:
            command: "diagnose vpn ike status"
          register: ike_status
          changed_when: false
          failed_when: false
          # Why: Provides Phase 1 (IKE) details. Non-critical if command fails on specific versions.

        - name: Get IPSec performance statistics
          ansible.netcommon.cli_command:
            command: "get vpn ipsec statistics"
          register: ipsec_stats
          changed_when: false
          failed_when: false
          # Why: Collects packet counters and error stats for Phase 2.

        - name: Parse tunnel state into facts
          ansible.builtin.set_fact:
            tunnel_count: "{{ ipsec_status.stdout | regex_findall('(\\S+):\\s*connected') | length }}"
            up_tunnels: "{{ ipsec_status.stdout | regex_findall('connected') | length | int }}"
            down_tunnels: "{{ ipsec_status.stdout | regex_findall('(disconnected|down)') | length | int }}"
          when: ipsec_status.stdout is defined
          # Why: Converting raw CLI text into structured data for downstream logic and reporting.

        - name: Validate tunnel health against threshold
          ansible.builtin.assert:
            that:
              - up_tunnels > 0
            fail_msg: "CRITICAL ALERT: No active IPSec tunnels found on {{ inventory_hostname }}"
            success_msg: "VPN Status: {{ up_tunnels }} tunnels active."
            quiet: "{{ not alert_on_down }}"
          when: alert_on_down | bool
          # Why: Observability - provides automated PASS/FAIL status for monitoring integration.

      rescue:
        - name: Handle collection failures gracefully
          ansible.builtin.debug:
            msg: "ERROR: Failed to retrieve VPN status for {{ inventory_hostname }}. Skipping analysis."
          # Why: Prevents execution failure on individual host connectivity issues.

        - name: Initialize error state facts
          ansible.builtin.set_fact:
            vpn_error: true
            up_tunnels: 0
            down_tunnels: 0
          # Why: Ensures variables are defined for the summary and report tasks.

      always:
        - name: Output status summary to console
          ansible.builtin.debug:
            msg: |
              ========================================
              Host: {{ inventory_hostname }}
              Status: {{ 'ERROR' if vpn_error | default(false) else 'OK' }}
              Active Tunnels: {{ up_tunnels | default(0) }}
              Down Tunnels:   {{ down_tunnels | default(0) }}
              ========================================
          # Why: Immediate operator feedback during playbook execution.

    - name: Manage local report infrastructure
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      # Why: Idempotent - ensures the local storage path exists once per run.

    - name: Archive VPN status report
      ansible.builtin.copy:
        content: |
          # FortiGate IPSec VPN Status Report
          # Host: {{ inventory_hostname }}
          # Generated: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          
          ## Summary
          - Up Tunnels:   {{ up_tunnels | default(0) }}
          - Down Tunnels: {{ down_tunnels | default(0) }}
          
          ## CLI Output: get vpn ipsec status
          {{ ipsec_status.stdout | default('N/A') }}
          
          ## CLI Output: diagnose vpn ike status
          {{ ike_status.stdout | default('N/A') }}
          
          ## CLI Output: get vpn ipsec statistics
          {{ ipsec_stats.stdout | default('N/A') }}
        dest: "{{ output_dir }}/{{ inventory_hostname }}_ipsec_status.txt"
        mode: '0640'
      delegate_to: localhost
      # Why: Persistent archival for historical comparison, audit trails, and troubleshooting.