---
# FortiGate DNAT Policies Retrieval
# This playbook retrieves DNAT configuration from FortiGate devices using standard CLI commands.
# Adheres to standards for Idempotency, Observability, Documentation, Error Handling, and FQCN usage.

- name: Get DNAT Policies
  hosts: fortigate
  gather_facts: false
  # Connection should be set to network_cli for FortiOS CLI interactions
  vars:
    ansible_network_os: fortinet.fortios.fortios

  tasks:
    - name: Retrieve DNAT configuration from device
      # This operation is inherently idempotent as it is read-only.
      # FQCN: ansible.netcommon.cli_command
      ansible.netcommon.cli_command:
        command: get firewall dnats
      register: dnat_result
      # Error Handling: Identify failure if the command is unrecognized or returns an error string
      failed_when:
        - dnat_result.failed or "Unknown action" in dnat_result.stdout or "Command fail" in dnat_result.stdout

    - name: Validate retrieval success and data presence
      # Observability: Verify the output is defined and contains data
      ansible.builtin.assert:
        that:
          - dnat_result.stdout is defined
          - dnat_result.stdout | length > 0
        fail_msg: "DNAT configuration retrieval failed or returned empty output."
        success_msg: "DNAT configuration successfully captured."

    - name: Display retrieved DNAT policies
      # Provides visual confirmation of the registered output
      ansible.builtin.debug:
        msg: |
          ======================= DNAT OUTPUT =======================
          {{ dnat_result.stdout }}