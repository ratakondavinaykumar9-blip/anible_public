---
# FortiGate NAT Sessions Analysis
# This playbook retrieves operational data from FortiGate devices using best practices.
# It is designed to be safe, observable, and maintainable.

- name: Get FortiGate NAT Sessions
  hosts: fortigate
  gather_facts: false # Operational tasks do not require host facts; disabled for efficiency

  tasks:
    - name: Retrieve NAT session list via CLI
      # Use Fully Qualified Collection Names (FQCN) for all tasks to ensure consistency
      ansible.netcommon.cli_command:
        command: "get system session list | grep NAT"
      register: nat_sess
      # Idempotency: This is a read-only 'get' operation, inherently safe for repeated execution
      # Error Handling: Use ignore_errors because grep returns a non-zero exit code if no matches are found
      ignore_errors: true

    - name: Verify successful execution
      # Observability: Ensure that the task produced a valid stdout response despite ignore_errors
      ansible.builtin.assert:
        that:
          - "nat_sess.stdout is defined"
        fail_msg: "Could not retrieve sessions. Verify device connectivity, SSH status, and permissions."
        quiet: true

    - name: Display NAT session information
      # Result visualization: Provides formatted output and handles empty tables gracefully
      ansible.builtin.debug:
        msg: |
          ======================= NAT SESSIONS =======================
          {{ nat_sess.stdout if nat_sess.stdout | length > 0 else 'No active NAT sessions found.' }}