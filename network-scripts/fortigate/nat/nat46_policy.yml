---
# FortiGate NAT46 Policy Audit
# Standards Followed:
# 1. Idempotency: Read-only 'get' command ensures state is unchanged.
# 2. Observability: Registered result with assertions to verify data capture.
# 3. Documentation: Inline comments explaining task rationale and choices.
# 4. Error Handling: 'failed_when' logic to catch CLI-specific errors.
# 5. Best Practices: Full utilization of FQCN (Fully Qualified Collection Names).
- name: FortiGate NAT46 Policies
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve NAT46 configuration via CLI
      # Use FQCN (ansible.netcommon) for module consistency.
      # This task is inherently idempotent as it performs a state query.
      ansible.netcommon.cli_command:
        command: get firewall nat46
      register: nat46_result
      # Error Handling: Fail if command is unrecognized or terminal reports error.
      failed_when: 
        - nat46_result.rc != 0 or "Unknown action" in nat46_result.stdout
      ignore_errors: false

    - name: Validate NAT46 data integrity
      # Observability: Assert that output was captured before proceeding.
      ansible.builtin.assert:
        that:
          - nat46_result.stdout is defined
        fail_msg: "Data capture failed on {{ inventory_hostname }}. Verify network connectivity."
        success_msg: "NAT46 configuration successfully registered for analysis."

    - name: Display formatted NAT46 policy state
      # Documentation: Provide clear visibility into the current operational state.
      ansible.builtin.debug:
        msg: |
          ======================= NAT46 - {{ inventory_hostname }} =======================
          {{ nat46_result.stdout if nat46_result.stdout | length > 0 else 'No NAT46 policies found or feature disabled.' }}