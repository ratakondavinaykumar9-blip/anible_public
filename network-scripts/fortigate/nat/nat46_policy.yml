# FortiGate NAT46 Policy Audit
# Purpose: Idempotently retrieve and validate NAT46 policies to ensure network compliance and observability.
- name: Get NAT46 Policies
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for direct CLI-based retrieval

  tasks:
    - name: Retrieve NAT46 configuration via CLI
      # Use FQCN for standardized network-agnostic CLI command execution
      ansible.netcommon.cli_command:
        command: get firewall nat46
      register: nat46_data
      # Error Handling: Fail explicitly if the command is unsupported or the device returns a failure string
      failed_when:
        - nat46_data.rc != 0
        - "'Command fail' in nat46_data.stdout"
        - "'unknown command' in nat46_data.stdout"

    - name: Verify NAT46 response integrity
      # Observability: Assert that the command output is populated to prevent processing empty results
      ansible.builtin.assert:
        that:
          - nat46_data.stdout is defined
          - nat46_data.stdout | length > 0
        fail_msg: "The NAT46 configuration could not be retrieved or the table is empty."
        success_msg: "NAT46 configuration successfully captured and verified for audit."

    - name: Display captured NAT46 policies
      # Observability: Output the operational state to the console for real-time verification
      ansible.builtin.debug:
        msg: |
          ======================= NAT46 CONFIGURATION =======================
          {{ nat46_data.stdout }}