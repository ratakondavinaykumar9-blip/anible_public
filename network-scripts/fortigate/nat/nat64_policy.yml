---
# Playbook: FortiGate NAT64 Policy Verification
# Purpose: Safely retrieves and validates NAT64 policy state from FortiGate devices.
# Standards Applied: Idempotency (Read-only), Observability (Register/Assert), FQCN, and Robust Error Handling.

- name: Retrieve and Verify FortiGate NAT64 Policies
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch NAT64 operational configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for explicit module referencing.
      # 'get' is used over 'show' to retrieve the current running state and operational parameters.
      ansible.netcommon.cli_command:
        command: "get firewall nat64"
      register: nat64_result
      # Error Handling: Ensure the task fails if FortiOS returns a command error or unknown action,
      # as CLI modules may not always interpret device-specific error strings as failures.
      failed_when:
        - "nat64_result.failed == true"
        - "'Unknown action' in nat64_result.stdout"
        - "'Command fail' in nat64_result.stdout"

    - name: Validate NAT64 configuration retrieval
      # Observability: Assert that the command returned a valid response object.
      # This ensures the playbook doesn't proceed with undefined data in complex workflows.
      ansible.builtin.assert:
        that:
          - "nat64_result.stdout is defined"
        fail_msg: "The NAT64 configuration could not be retrieved from the device."
        success_msg: "NAT64 configuration successfully registered."

    - name: Display NAT64 Policy Information
      # Documentation/Observability: Output the results in a formatted block for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= NAT64 CONFIGURATION =======================
          {{ nat64_result.stdout | default('No NAT64 configuration found.') }}

    - name: Check for existence of NAT64 policies
      # Observability: Register whether policies actually exist to facilitate conditional logic in parent playbooks.
      ansible.builtin.set_fact:
        nat64_exists: "{{ 'edit' in nat64_result.stdout or 'policyid' in nat64_result.stdout }}"
      run_once: false