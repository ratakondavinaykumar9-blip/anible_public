# FortiGate NAT64 Configuration Audit
# Purpose: Retrieves and validates NAT64 translation policies to ensure IPv6/IPv4 interoperability.
# Standards: Idempotent (Read-only), Observability (Assert), Best Practices (FQCN).
- name: Audit FortiGate NAT64 Policies
  hosts: fortigate
  gather_facts: false
  vars:
    ansible_connection: ansible.netcommon.network_cli

  tasks:
    - name: Get NAT64 operational status from firewall
      # Idempotency: 'get' commands are read-only and safe for repeated execution.
      # Best Practice: Using FQCN for portable and reliable module resolution.
      ansible.netcommon.cli_command:
        command: get firewall nat64
      register: nat64_result
      # Error Handling: Fail if the command returns a non-zero exit code or specific FortiOS failure strings.
      failed_when: 
        - nat64_result.rc != 0
        - "'Command fail' in nat64_result.stdout"

    - name: Validate NAT64 output integrity
      # Observability: Ensure the retrieved data is present and does not indicate an unsupported feature.
      ansible.builtin.assert:
        that:
          - "nat64_result.stdout is defined"
          - "nat64_result.stdout | length > 0"
          - "'Unknown action' not in nat64_result.stdout"
        fail_msg: "Validation Failed: NAT64 data is empty or command is unsupported on this firmware."
        success_msg: "Validation Passed: NAT64 data successfully retrieved."

    - name: Display NAT64 Policy Details
      # Documentation: Providing structured visibility for network architects and audit logs.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          FORTIGATE NAT64 OPERATIONAL DATA
          ===========================================================
          {{ nat64_result.stdout }}
