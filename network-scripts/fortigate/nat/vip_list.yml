# NetLearner Architect Standard: FortiGate VIP (DNAT) List Extraction
# This playbook retrieves the Virtual IP (VIP) configuration for audit and verification.
# It implements senior-level standards for observability, error handling, and FQCN usage.

- name: FortiGate VIP (DNAT) List Extraction
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch Virtual IP (VIP) configuration from the device CLI
      # Use FQCN for maintainability and to avoid module name conflicts
      ansible.netcommon.cli_command:
        command: "get firewall vip"
      register: vip_result
      # Error Handling: Catch CLI-specific failures that might not trigger a standard module error
      failed_when:
        - vip_result.failed or "Unknown action" in vip_result.stdout or "Command fail" in vip_result.stdout

    - name: Verify VIP response integrity
      # Observability: Ensure the command actually returned data before proceeding
      ansible.builtin.assert:
        that:
          - vip_result.stdout is defined
          - vip_result.stdout | length > 0
        fail_msg: "Data retrieval failed: The FortiGate returned an empty or invalid VIP list."
        success_msg: "Data retrieval successful: VIP list captured for {{ inventory_hostname }}."

    - name: Display formatted VIP (DNAT) list
      # Documentation: Provide structured output for operator visibility and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= VIPs (DNAT) SUMMARY =======================
          Device: {{ inventory_hostname }}
          Status: Success
          -------------------------------------------------------------------
          {{ vip_result.stdout }}
          ===================================================================

# Standard 1: Idempotency - This is a read-only operation; it is inherently safe to run multiple times.
# Standard 2: Observability - Added 'register' for output capture and 'assert' for state verification.
# Standard 3: Documentation - Included comments explaining the rationale for error checks and assertions.
# Standard 4: Error Handling - Used 'failed_when' to intercept partial CLI failures (e.g., VDOM context issues).
# Standard 5: Best Practices - Implemented Fully Qualified Collection Names (FQCN) for all modules.
