---
# ==============================================================================
# Playbook: FortiGate SSL VPN Configuration Retrieval
# Standards: Idempotency, Observability, FQCN, and Error Handling
# ==============================================================================
- name: Retrieve and Validate FortiGate SSL VPN Settings
  hosts: fortigate
  gather_facts: false
  vars:
    # Define expected patterns to ensure we are receiving valid data
    expected_pattern: "SSL VPN"

  tasks:
    - name: Get SSL VPN operational settings from FortiGate
      # Using FQCN for network common CLI execution
      ansible.netcommon.cli_command:
        command: get sslvpn settings
      register: ssl_vpn_config
      # Error Handling: Fail if the command returns a typical FortiOS error string
      failed_when: 
        - ssl_vpn_config.failed or "Command fail" in ssl_vpn_config.stdout
      # Idempotency: 'get' commands are inherently read-only and idempotent

    - name: Validate SSL VPN configuration integrity
      # Observability: Assert that the output is not empty and contains expected keywords
      ansible.builtin.assert:
        that:
          - ssl_vpn_config.stdout is defined
          - ssl_vpn_config.stdout | length > 0
          - expected_pattern in ssl_vpn_config.stdout
        fail_msg: "The SSL VPN configuration output was empty or invalid."
        success_msg: "SSL VPN configuration successfully retrieved and validated."

    - name: Display SSL VPN configuration details
      # Documentation: Providing a clean, formatted view for audit/visibility
      ansible.builtin.debug:
        msg: |
          ===========================================================
          SSL VPN SETTINGS REPORT
          ===========================================================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          -----------------------------------------------------------
          {{ ssl_vpn_config.stdout }}
          ===========================================================