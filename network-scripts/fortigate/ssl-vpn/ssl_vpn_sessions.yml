---
# FortiGate SSL VPN Session Monitoring
# Purpose: Retrieves and validates active SSL VPN sessions for auditing and troubleshooting.
# Standards: Idempotency (Read-only), Observability (Assert), Error Handling (Failed_when), FQCN Usage.
- name: Get FortiGate SSL VPN Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve active SSL VPN sessions via CLI
      # This task is idempotent as it performs a read-only 'get' operation without altering state.
      ansible.netcommon.cli_command:
        command: get sslvpn session
      register: sessions_output
      # Error Handling: Fail explicitly if the command is unsupported or returns a FortiOS 'Command fail' string.
      failed_when: >
        sessions_output.failed or 
        "Command fail" in sessions_output.stdout or 
        "Unknown action" in sessions_output.stdout

    - name: Verify session data observability
      # Observability: Assert that the output contains data to ensure the monitoring task is effective.
      ansible.builtin.assert:
        that:
          - sessions_output.stdout is defined
          - sessions_output.stdout | length > 0
        fail_msg: "SSL VPN session retrieval failed or returned empty output."
        success_msg: "SSL VPN session data successfully captured and validated."

    - name: Display formatted SSL VPN sessions
      # Documentation: Use clear headers to improve log readability during automated analysis.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSIONS START =======================
          {{ sessions_output.stdout }}
          ======================= SSL VPN SESSIONS END =========================
