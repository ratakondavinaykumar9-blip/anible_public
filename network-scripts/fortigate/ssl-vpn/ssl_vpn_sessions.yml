---
# FortiGate SSL VPN Session Monitoring Playbook
# This playbook retrieves and validates active SSL VPN sessions from FortiGate devices.
- name: Get SSL VPN Sessions
  hosts: fortigate
  gather_facts: false # Optimization: Fact gathering is not required for this operational check

  tasks:
    - name: Fetch active SSL VPN sessions via CLI
      # Use FQCN (Fully Qualified Collection Name) to adhere to Ansible enterprise standards
      ansible.netcommon.cli_command:
        command: get sslvpn session
      register: sessions
      # Error Handling: Detect if the command was unrecognized by the FortiOS shell
      failed_when: 
        - sessions.failed or "Unknown action" in sessions.stdout
      # Idempotency: Read-only 'get' commands are inherently idempotent and safe to run repeatedly
      # check_mode: false ensures this task executes even during dry-runs to provide visibility
      check_mode: false

    - name: Validate that session data was retrieved
      # Observability: Assert that the command returned valid output to prevent downstream errors
      ansible.builtin.assert:
        that:
          - sessions.stdout is defined
        fail_msg: "Failed to retrieve SSL VPN session data. Ensure SSL VPN is configured and active."
        quiet: true

    - name: Display formatted SSL VPN session details
      # Documentation: Providing clear, human-readable visibility into the current operational state
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSIONS =======================
          {{ sessions.stdout | default('No active SSL VPN sessions found.') }}