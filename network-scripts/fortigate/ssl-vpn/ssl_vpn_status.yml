---
# FortiGate SSL VPN Status Monitoring Playbook
# This playbook adheres to Enterprise standards for network automation:
# 1. Idempotency: Read-only operation that does not change state.
# 2. Observability: Utilizes register and assert for state validation.
# 3. Best Practices: Uses Fully Qualified Collection Names (FQCN).
- name: Get SSL VPN Status
  hosts: fortigate
  gather_facts: false # Performance: Skipping fact gathering for CLI-based monitoring

  tasks:
    - name: Execute SSL VPN status command on FortiGate
      # Best Practice: Using FQCN for network CLI commands
      ansible.netcommon.cli_command:
        command: get sslvpn status
      register: ssl_status_raw
      # Error Handling: Fail if the command is unrecognized or the device returns an error
      failed_when: 
        - ssl_status_raw.failed or "command parse error" in ssl_status_raw.stdout

    - name: Validate SSL VPN output integrity
      # Observability: Ensure the command returned the expected operational headers
      ansible.builtin.assert:
        that:
          - "'SSL VPN Status' in ssl_status_raw.stdout"
        fail_msg: "The output did not contain expected SSL VPN status data. Verify SSL VPN is enabled on the device."
        success_msg: "SSL VPN Status data validated successfully."

    - name: Display SSL VPN Operational Summary
      # Documentation: Provide a human-readable summary of the current VPN state
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN STATUS =======================
          {{ ssl_status_raw.stdout }}