---
# FortiGate SSL VPN Status Check
# Purpose: This playbook retrieves and verifies the current SSL VPN status from FortiGate devices.
# Standards: Idempotent (Read-only), Observable (Assertions), FQCN, Enhanced Error Handling.

- name: Get SSL VPN Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN status from the device
      # Using FQCN for network CLI operations. This task is inherently idempotent.
      ansible.netcommon.cli_command:
        command: get sslvpn status
      register: ssl_vpn_output
      # Error Handling: Fail if the CLI returns specific error strings or if the task itself fails.
      failed_when:
        - ssl_vpn_output.failed
        - "'Unknown action' in ssl_vpn_output.stdout"
        - "'Command fail' in ssl_vpn_output.stdout"

    - name: Verify SSL VPN status retrieval success
      # Observability: Assert that the output is defined and contains data before proceeding.
      ansible.builtin.assert:
        that:
          - ssl_vpn_output.stdout is defined
          - ssl_vpn_output.stdout | length > 0
        fail_msg: "The SSL VPN status output was empty or could not be retrieved."
        success_msg: "SSL VPN status successfully captured from {{ inventory_hostname }}."

    - name: Display SSL VPN Status
      # Using FQCN for the debug module to display the result for human verification.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN STATUS =======================
          {{ ssl_vpn_output.stdout }}
