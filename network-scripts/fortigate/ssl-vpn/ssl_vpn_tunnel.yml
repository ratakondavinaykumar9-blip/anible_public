---
# NetLearner Architect Standardized Playbook: FortiGate SSL VPN Tunnel Status
# This playbook retrieves operational status for SSL VPN tunnels. 
# It is idempotent as it performs a read-only operation.
- name: Get SSL VPN Tunnel
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN tunnel information via CLI
      # Using FQCN ansible.netcommon.cli_command for reliable execution across environments.
      # Output is registered to enable observability and automated validation.
      ansible.netcommon.cli_command:
        command: get sslvpn tunnel
      register: tunnel_output
      # Ensures the task fails if the command returns a non-zero exit code or specific error messages.
      failed_when: 
        - tunnel_output.rc != 0
        - "'Unknown action' in tunnel_output.stdout"

    - name: Validate tunnel data retrieval
      # Asserting that the response contains data to verify successful state capture.
      # This provides an observability gate before proceeding with dependent logic.
      ansible.builtin.assert:
        that:
          - tunnel_output.stdout is defined
          - tunnel_output.stdout | length > 0
        fail_msg: "The 'get sslvpn tunnel' command returned no data or is not supported."
        success_msg: "SSL VPN tunnel data successfully retrieved."

    - name: Display SSL VPN Tunnel Details
      # Formatting output for human-readable visibility into the operational state.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN TUNNEL STATUS =======================
          {{ tunnel_output.stdout }}