---
# Standard:ized FortiGate Playbook
# Purpose: Retrieve and verify SSL VPN tunnel status on FortiGate devices.
# Standards: FQCN, Observability, Error Handling, and Idempotency.

- name: FortiGate SSL VPN Tunnel Monitoring
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SSL VPN tunnel status from FortiGate CLI
      # Use FQCN for network CLI operations.
      # This 'get' command is a monitor operation and is inherently idempotent.
      ansible.netcommon.cli_command:
        command: get sslvpn tunnel
      register: tunnel_output
      # Error Handling: Catch FortiOS-specific command errors that might not trigger a non-zero exit code.
      failed_when:
        - tunnel_output.stdout is not defined
        - "'Unknown action' in tunnel_output.stdout"
        - "'Command fail' in tunnel_output.stdout"

    - name: Verify successful retrieval of tunnel data
      # Observability: Ensure that the command returned data to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - tunnel_output.stdout | length > 0
        fail_msg: "The FortiGate returned an empty response for the SSL VPN tunnel status."
        success_msg: "SSL VPN tunnel status successfully captured."

    - name: Display formatted SSL VPN tunnel status
      # Observability: Provide a clear summary for human operators.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN TUNNEL REPORT =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          
          {{ tunnel_output.stdout }}
          =====================================================================