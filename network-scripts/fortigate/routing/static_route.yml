---
# FortiGate Static Routes Retrieval
# Purpose: This playbook performs a read-only retrieval of the static routing table
# to ensure visibility into the network state. As a "get" operation, it is 
# inherently idempotent as it does not modify device configuration.
- name: Audit FortiGate Static Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute CLI command to retrieve static routes
      # Use FQCN for consistent cross-platform execution and compliance with modern standards.
      ansible.netcommon.cli_command:
        command: "get router static"
      register: static_result
      # Error Handling: Define explicit failure conditions based on CLI error messages
      # and the module's execution status to prevent silent failures.
      failed_when:
        - static_result.failed or "error" in static_result.stdout | lower
        - "'command parse error' in static_result.stdout | lower"

    - name: Verify static route data observability
      # Observability: Assert that the command returned non-empty data.
      # This ensures the playbook fails early if the device returns an unexpected null response.
      ansible.builtin.assert:
        that:
          - "static_result.stdout is defined"
          - "static_result.stdout | length > 0"
        fail_msg: "Static route retrieval returned empty or undefined data from {{ inventory_hostname }}."
        success_msg: "Static route data successfully captured and validated for {{ inventory_hostname }}."

    - name: Display formatted static routes
      # Documentation/Observability: Output the results in a structured format for easy review.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE STATIC ROUTES =======================
          DEVICE: {{ inventory_hostname }}
          -----------------------------------------------------------------------
          {{ static_result.stdout }}