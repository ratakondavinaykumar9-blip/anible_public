---
# Network Automation Framework Architect: FortiGate Static Route Retrieval
# This playbook retrieves operational static route data from FortiGate units.
# It ensures idempotency, observability, and adheres to FQCN standards.

- name: Get FortiGate Static Routes
  hosts: fortigate
  gather_facts: false # Optimization: Facts are not required for read-only CLI operations.

  tasks:
    - name: Retrieve static routes via CLI
      # FQCN: Utilizing the netcommon collection for standardized network CLI execution.
      ansible.netcommon.cli_command:
        command: get router static
      register: static_output
      # Idempotency: Mark as 'changed: false' to ensure multiple runs do not falsely report state changes.
      changed_when: false
      # Error Handling: Validate that the command was recognized and executed without error.
      failed_when: 
        - static_output.failed or "unknown command" in static_output.stdout | lower

    - name: Verify data observability
      # Observability: Assert that the command returned content to ensure monitoring visibility.
      ansible.builtin.assert:
        that:
          - static_output.stdout is defined
          - (static_output.stdout | length) > 0
        fail_msg: "Observability Error: No static route data was retrieved from the device."
        success_msg: "Observability Success: Static route data successfully captured."

    - name: Display static route report
      # Documentation: Providing a clear, human-readable summary of the current operational state.
      ansible.builtin.debug:
        msg: |
          ======================= [ FORTIGATE STATIC ROUTES ] =======================
          {{ static_output.stdout }}