---
# FortiGate Static Routes Audit Playbook
# Purpose: Retrieves, validates, and displays static route configuration.
- name: Audit FortiGate Static Routing
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve static route configuration from device
      # Why: Querying 'get router static' provides the operational state of configured routes.
      # This is a read-only operation and is inherently idempotent.
      ansible.netcommon.cli_command:
        command: get router static
      register: static_routes_result
      # Error Handling: Ensure the command executed successfully without shell or connection errors.
      failed_when: 
        - static_routes_result.rc is defined 
        - static_routes_result.rc != 0

    - name: Verify static route data integrity
      # Observability: Use assertion to confirm that data was actually returned.
      # Why: Prevents silent failures where an empty buffer might be mistaken for a valid empty table.
      ansible.builtin.assert:
        that:
          - static_routes_result.stdout is defined
          - "static_routes_result.stdout | length > 0"
        fail_msg: "Static route retrieval failed or returned no data for {{ inventory_hostname }}."
        success_msg: "Successfully retrieved routing data for {{ inventory_hostname }}."

    - name: Display formatted static routing table
      # Why: Provides the NetLearner Architect with a clear, observable view of the routing state.
      ansible.builtin.debug:
        msg: |
          ======================= STATIC ROUTES [{{ inventory_hostname }}] =======================
          {{ static_routes_result.stdout }}
