---
# FortiGate Multicast Routes - Architect:Improved Version
# This playbook retrieves and verifies multicast routing information from FortiGate devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, Best Practices.

- name: FortiGate Multicast Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get multicast routing table
      # Use FQCN for network command execution
      # This operation is inherently idempotent as it is a read-only 'get' command.
      ansible.netcommon.cli_command:
        command: get router info routing-table multicast
      register: mc_output
      # Error Handling: Ensure the command didn't return an error message in stdout
      failed_when: 
        - mc_output.failed or "Command fail" in mc_output.stdout

    - name: Validate multicast route data
      # Observability: Assert that data was actually returned to ensure visibility into the network state.
      ansible.builtin.assert:
        that:
          - mc_output.stdout is defined
          - mc_output.stdout | length > 0
        fail_msg: "Multicast routing table could not be retrieved or is empty."
        success_msg: "Multicast routing table successfully captured."

    - name: Display Multicast Routes
      # Documentation: Formatted output for operator observability.
      ansible.builtin.debug:
        msg: |
          ======================= MULTICAST ROUTES =======================
          {{ mc_output.stdout }}