---
# Playbook: FortiGate Multicast Routing Audit
# Purpose: Safely retrieves and validates multicast routing table entries.
# This operation is read-only and inherently idempotent.
- name: FortiGate Multicast Routes
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve multicast routing table
      # Using FQCN for cross-platform compatibility and stability
      ansible.netcommon.cli_command:
        command: get router info routing-table multicast
      register: mc_results
      # Error Handling: Prevent silent failures if the command is unrecognized or execution fails
      failed_when: 
        - mc_results.failed 
        - "'Unknown action' in mc_results.stdout"

    - name: Verify multicast route retrieval success
      # Observability: Ensure the output is populated before proceeding
      ansible.builtin.assert:
        that:
          - mc_results.stdout is defined
          - mc_results.stdout | length > 0
        fail_msg: "Multicast routing table could not be retrieved or is empty."
        success_msg: "Successfully retrieved multicast routing table."

    - name: Display Multicast Routes
      ansible.builtin.debug:
        msg: |
          ======================= MULTICAST ROUTES =======================
          {{ mc_results.stdout }}