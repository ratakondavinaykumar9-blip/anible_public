---
# FortiGate OSPF Status Audit
# Purpose: Gathers and validates OSPF operational state to ensure routing convergence.
# This playbook is idempotent as it only executes read-only monitor commands.
- name: Get OSPF Status
  hosts: fortigate
  gather_facts: false # Skip facts gathering to improve performance on network devices

  tasks:
    - name: Get OSPF neighbors
      # Using FQCN (Fully Qualified Collection Name) for portability and clarity
      ansible.netcommon.cli_command:
        command: get router info ospf neighbor
      register: ospf_neighbor_output
      # Prevent playbook termination if OSPF is not yet initialized or the command is unsupported
      ignore_errors: true

    - name: Validate OSPF neighbor retrieval
      # Observability: Ensure the command was successfully executed and returned data
      ansible.builtin.assert:
        that:
          - ospf_neighbor_output.stdout is defined
        fail_msg: "Communication error or command failure on {{ inventory_hostname }} while fetching neighbors."
        quiet: true

    - name: Get OSPF database
      ansible.netcommon.cli_command:
        command: get router info ospf database
      register: ospf_db_output
      ignore_errors: true

    - name: Validate OSPF database retrieval
      # Observability: Confirm the database state was captured for audit
      ansible.builtin.assert:
        that:
          - ospf_db_output.stdout is defined
        fail_msg: "Communication error or command failure on {{ inventory_hostname }} while fetching OSPF database."
        quiet: true

    - name: Display OSPF Summary
      # Provides observability into the current operational state of the OSPF process
      ansible.builtin.debug:
        msg: |
          ======================= OSPF NEIGHBORS =======================
          {{ ospf_neighbor_output.stdout | default('Command failed or no output') }}

          ======================= OSPF DATABASE ========================
          {{ ospf_db_output.stdout | default('Command failed or no output') }}