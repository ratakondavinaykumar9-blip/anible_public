---
- name: Audit FortiGate Kernel Routing Table
  hosts: fortigate
  gather_facts: false
  # This playbook is idempotent as it performs a non-intrusive read-only operation on the device.

  tasks:
    - name: Retrieve kernel routing table details
      # Using Fully Qualified Collection Names (FQCN) for best practices and portability.
      ansible.netcommon.cli_command:
        command: get router info routing-table kernel
      register: kernel_routes_raw
      # Error Handling: Explicitly check for CLI-level failures or specific FortiOS error strings.
      failed_when: 
        - kernel_routes_raw.failed or "Command fail" in kernel_routes_raw.stdout

    - name: Validate successful routing data ingestion
      # Observability: Assert that the command returned valid, non-empty routing entries.
      ansible.builtin.assert:
        that:
          - "kernel_routes_raw.stdout is defined"
          - "kernel_routes_raw.stdout | length > 0"
        fail_msg: "Kernel routing table is empty or could not be retrieved from the device."
        success_msg: "Kernel routing table successfully retrieved and validated."

    - name: Display Kernel Routing Table
      # Documentation: Providing operational visibility for engineers during playbook execution.
      ansible.builtin.debug:
        msg: |
          ======================= KERNEL ROUTES =======================
          {{ kernel_routes_raw.stdout }}