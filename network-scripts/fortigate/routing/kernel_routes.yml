---
# Playbook: FortiGate Kernel Routing Analysis
# Purpose: Retrieves and validates kernel routing table entries from FortiGate devices.
# Standards: FQCN usage, Observability (assert), and robust Error Handling.

- name: FortiGate - Kernel Route Retrieval
  hosts: fortigate
  gather_facts: false
  # Why: Ensures the session uses the correct network_cli plugin for FortiOS interaction.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve kernel routing table from FortiGate
      # Why: Using FQCN cli_command for operational data retrieval; inherently idempotent as it is read-only.
      ansible.netcommon.cli_command:
        command: get router info routing-table kernel
      register: kernel_output
      # Error Handling: Fail if the command is unrecognized or execution is interrupted.
      failed_when:
        - kernel_output.failed | default(false)
        - "'Command fail' in kernel_output.stdout"

    - name: Validate kernel route data integrity
      # Observability: Ensure the command returned non-empty output to confirm visibility into the routing stack.
      ansible.builtin.assert:
        that:
          - kernel_output.stdout is defined
          - kernel_output.stdout | length > 0
        fail_msg: "Failed to retrieve kernel routes or the routing table is empty."
        success_msg: "Successfully retrieved and validated kernel routing table."

    - name: Display formatted kernel routing information
      # Observability: Provide a structured view for the operator during execution.
      ansible.builtin.debug:
        msg: |
          ======================= KERNEL ROUTES =======================
          {{ kernel_output.stdout }}