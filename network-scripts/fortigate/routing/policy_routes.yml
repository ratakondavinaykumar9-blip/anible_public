---
# FortiGate Policy Routes - Improved Production Version
# This playbook retrieves and validates policy routing table information from FortiGate devices.
- name: Get Policy Routes
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for CLI-based network operations

  tasks:
    - name: Retrieve policy routes from the device
      # Using FQCN for better portability and clarity across Ansible versions
      ansible.netcommon.cli_command:
        command: get router policy
      register: policy_output
      # Idempotency: Read-only operations must never report a 'changed' state
      changed_when: false
      # Error Handling: Fail if the device returns an error message or the command execution fails
      failed_when:
        - policy_output.failed
        - "'Command fail' in policy_output.stdout"

    - name: Validate retrieval of policy route data
      # Observability: Assert that the stdout is not empty to ensure the device is responding with data
      ansible.builtin.assert:
        that:
          - "policy_output.stdout | length > 0"
        fail_msg: "Failed to retrieve policy route data or the table is empty."
        success_msg: "Policy route data successfully captured."

    - name: Display policy route information
      # Documentation: Formats the output for clear visibility during playbook execution
      ansible.builtin.debug:
        msg: |
          ======================= POLICY ROUTES =======================
          {{ policy_output.stdout }}