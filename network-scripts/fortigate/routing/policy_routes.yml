---
# FortiGate Policy Route Verification
# Purpose: This playbook retrieves the current policy routing table for operational visibility and audit.
# It ensures data integrity through assertion and specific error pattern matching.
- name: Get Policy Routes
  hosts: fortigate
  gather_facts: false # Performance: Fact gathering is unnecessary for this CLI-based operation

  tasks:
    - name: Fetch policy routes from FortiGate CLI
      # FQCN (Fully Qualified Collection Name) used for consistency and better maintainability
      ansible.netcommon.cli_command:
        command: get router policy
      register: policy_result
      # Error Handling: Catches execution failures and explicit FortiOS CLI error strings
      failed_when: >
        policy_result.failed or 
        "Command fail" in policy_result.stdout or 
        "Unknown action" in policy_result.stdout

    - name: Assert that policy route data was successfully retrieved
      # Observability: Verifies that the command returned content to ensure the output is valid
      ansible.builtin.assert:
        that:
          - policy_result.stdout is defined
          - policy_result.stdout | length > 0
        fail_msg: "Policy route output is empty or undefined. Verify device configuration and permissions."
        success_msg: "Policy route data captured successfully."

    - name: Display Policy Routes
      # Idempotency: Read-only operations are inherently safe to run multiple times.
      # This task provides the final observability for the network architect.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE POLICY ROUTES =======================
          {{ policy_result.stdout }}
          ========================================================================
