---
# Playbook: FortiGate BGP Status Monitoring
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get BGP Status and Verify Routing State
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve BGP summary from FortiGate
      # Why: Directly query the routing engine for peer status and prefix counts.
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction.
      ansible.netcommon.cli_command:
        command: get router info bgp summary
      register: bgp_output
      # Error Handling: Fail if the command is unrecognized or the BGP process is not active.
      failed_when:
        - bgp_output.failed
        - "'command parse error' in bgp_output.stdout"
        - "'BGP is not enabled' in bgp_output.stdout"

    - name: Validate BGP summary response
      # Observability: Assert that the command returned data to prevent downstream processing errors.
      ansible.builtin.assert:
        that:
          - bgp_output.stdout is defined
          - bgp_output.stdout | length > 0
        fail_msg: "BGP summary output was empty. Verify if BGP is configured on the target device."
        success_msg: "BGP summary successfully retrieved for {{ inventory_hostname }}."

    - name: Display formatted BGP status
      # Why: Provide a clean, readable overview of BGP neighbor states for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS: {{ inventory_hostname }} =======================
          {{ bgp_output.stdout }}
          ======================= END BGP STATUS =======================