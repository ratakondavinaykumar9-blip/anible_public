MCP issues detected. Run /mcp list for status.```yaml
---
- name: FortiGate BGP Operational Status Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch BGP summary using CLI command
      # Why: Directly querying the routing daemon via CLI provides the most accurate real-time neighbor state.
      # Idempotency: This is a read-only operation; it does not modify device state regardless of execution count.
      ansible.netcommon.cli_command:
        command: "get router info bgp summary"
      register: bgp_result
      # Error Handling: Explicitly fail if the output indicates a FortiOS-specific execution error or command failure.
      failed_when: >
        bgp_result.rc != 0 or
        "Command fail" in bgp_result.stdout or
        "Unknown action" in bgp_result.stdout

    - name: Verify BGP operational data structure
      # Observability: Ensure the retrieved output contains the expected routing table header components.
      # This prevents false positives where an empty or malformed string is returned.
      ansible.builtin.assert:
        that:
          - "'BGP neighbor' in bgp_result.stdout"
          - "'State/PfxRcd' in bgp_result.stdout"
        fail_msg: "BGP summary table headers not found. Verify BGP is enabled and configured on {{ inventory_hostname }}."
        success_msg: "BGP operational data successfully validated for {{ inventory_hostname }}."
        quiet: true

    - name: Display BGP Summary
      # Observability: Provides a clear, delimited visualization of the BGP table in the automation logs.
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS: {{ inventory_hostname }} =======================
          {{ bgp_result.stdout }}
          ====================================================================================
