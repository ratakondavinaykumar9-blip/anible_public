---
# FortiGate OSPF Interface Retrieval and Validation
# This playbook retrieves OSPF interface status to verify routing protocol health.
# It adheres to NetLearner Staging standards for idempotency, observability, and FQCN usage.

- name: Get OSPF Interface
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve OSPF interface status from FortiGate
      # Read-only 'get' commands are inherently idempotent as they do not alter system state.
      # Using FQCN: ansible.netcommon.cli_command for standardized command execution.
      ansible.netcommon.cli_command:
        command: get router info ospf interface
      register: ospf_intf_result
      # Error Handling: Catch CLI-specific errors that may not trigger a non-zero exit code.
      failed_when: 
        - ospf_intf_result.failed or "Unknown action" in ospf_intf_result.stdout or "entry not found" in ospf_intf_result.stdout

    - name: Verify observability of OSPF interface data
      # Observability: Assert that valid data was returned to ensure the network state is visible.
      ansible.builtin.assert:
        that:
          - ospf_intf_result.stdout is defined
          - ospf_intf_result.stdout | length > 0
        fail_msg: "Failed to retrieve OSPF interface information or device returned empty output."
        success_msg: "OSPF interface information successfully retrieved and validated."

    - name: Display OSPF Interface Details
      # Documentation: Structured output display for operational audit and verification.
      ansible.builtin.debug:
        msg: |
          ======================= OSPF INTERFACE DETAILS =======================
          {{ ospf_intf_result.stdout }}
          ======================================================================
