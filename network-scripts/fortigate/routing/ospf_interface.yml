---
# Playbook: FortiGate OSPF Interface Status Retrieval
# Purpose: Fetches and validates OSPF interface operational data using FortiOS CLI.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
- name: Get OSPF Interface Details
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve OSPF interface status via CLI command
      # This task is idempotent as it performs a read-only operation.
      # Using ansible.netcommon.cli_command to fetch operational state.
      ansible.netcommon.cli_command:
        command: get router info ospf interface
      register: ospf_intf_output
      # Error Handling: Catch device-side parsing errors or transport failures.
      failed_when: 
        - ospf_intf_output.failed or "command parse error" in ospf_intf_output.stdout | lower
      # Ensure the task reports 'ok' instead of 'changed' for read operations.
      changed_when: false

    - name: Verify OSPF interface data retrieval
      # Observability: Assert that the output contains expected OSPF keywords.
      # This ensures the playbook fails early if OSPF is not configured.
      ansible.builtin.assert:
        that:
          - ospf_intf_output.stdout | length > 0
          - "'OSPF' in ospf_intf_output.stdout or 'Area' in ospf_intf_output.stdout"
        fail_msg: "Failed to retrieve valid OSPF interface information. Verify OSPF is running."
        success_msg: "OSPF interface information successfully captured."

    - name: Display OSPF Interface Information
      # Provide formatted output for human-readable visibility in the console.
      ansible.builtin.debug:
        msg: |
          ======================= OSPF INTERFACE =======================
          {{ ospf_intf_output.stdout }}