---
# Playbook: FortiGate OSPF Interface Verification
# Purpose: Retrieves and validates OSPF interface operational state from FortiGate devices.
# Standards: Idempotency (Read-only operation), Observability (Register/Assert), FQCN usage.
- name: Verify FortiGate OSPF Interface Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve OSPF interface information via CLI
      # Use FQCN for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: get router info ospf interface
      register: ospf_intf_output
      # Error Handling: Ensure the command executed successfully at the shell/OS level
      failed_when: ospf_intf_output.rc != 0

    - name: Validate OSPF operational state
      # Observability: Use assert to verify that OSPF is actually active and returning data
      ansible.builtin.assert:
        that:
          - ospf_intf_output.stdout is defined
          - ospf_intf_output.stdout | length > 0
          - "'OSPF is not enabled' not in ospf_intf_output.stdout"
        fail_msg: "OSPF verification failed on {{ inventory_hostname }}. OSPF may not be enabled or configured."
        success_msg: "OSPF interface data successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display OSPF interface details
      # Documentation: Provide structured visibility into the command output for auditing
      ansible.builtin.debug:
        msg: |
          ==============================================================
          DEVICE: {{ inventory_hostname }}
          COMMAND: get router info ospf interface
          ======================= OSPF INTERFACE =======================
          {{ ospf_intf_output.stdout }}