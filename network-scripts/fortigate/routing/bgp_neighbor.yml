---
# Playbook: FortiGate BGP Neighbor Verification
# Purpose: Retrieves and validates BGP neighbor status for operational observability.
# Compliance: NetLearner Architect Standards (Idempotency, Observability, FQCN)
- name: Verify FortiGate BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve BGP neighbor status from FortiGate
      # FQCN: Using ansible.netcommon.cli_command for standardized network execution
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: bgp_neighbors_raw
      # Error Handling: Define failure conditions specific to FortiOS BGP state
      failed_when: 
        - bgp_neighbors_raw.failed
        - "'BGP is not enabled' in bgp_neighbors_raw.stdout"
      # Idempotency: Read-only commands must not report a 'changed' state
      changed_when: false

    - name: Validate BGP data integrity
      # Observability: Ensure the output is not empty and contains expected routing headers
      ansible.builtin.assert:
        that:
          - bgp_neighbors_raw.stdout is defined
          - "bgp_neighbors_raw.stdout | length > 0"
        fail_msg: "BGP neighbor data is missing or BGP process is inactive."
        success_msg: "BGP neighbor data successfully retrieved and validated."

    - name: Display Operational BGP State
      # Documentation: Formatted output for human-readable audit logs
      ansible.builtin.debug:
        msg: |
          ========================= BGP NEIGHBOR REPORT =========================
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          -----------------------------------------------------------------------
          {{ bgp_neighbors_raw.stdout }}
          =======================================================================
