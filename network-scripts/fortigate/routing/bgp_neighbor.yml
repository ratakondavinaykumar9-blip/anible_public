---
# Playbook: FortiGate BGP Neighbor Verification
# Purpose: Retrieves and validates BGP neighbor status from FortiGate devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve BGP neighbor information via CLI
      # Using FQCN for cross-platform network command execution.
      # Idempotency: Retrieval commands do not modify state and are safe for repeated execution.
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors_result
      # Error Handling: Catch specific failure strings or command execution errors.
      failed_when:
        - neighbors_result.failed or "error" in neighbors_result.stdout | lower
        - "'BGP is not enabled' in neighbors_result.stdout"

    - name: Validate BGP neighbor data retrieval
      # Observability: Ensure the command returned data before proceeding.
      ansible.builtin.assert:
        that:
          - neighbors_result.stdout is defined
          - neighbors_result.stdout | length > 0
        fail_msg: "BGP neighbor information is empty or could not be retrieved."
        success_msg: "BGP neighbor information successfully captured."

    - name: Display BGP Neighbor Status
      # Documentation: Provide clear visibility into the operational state of BGP neighbors.
      ansible.builtin.debug:
        msg: |
          ======================= BGP NEIGHBORS =======================
          {{ neighbors_result.stdout }}