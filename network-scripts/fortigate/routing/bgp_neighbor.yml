---
# FortiGate BGP Neighbors Verification
# This playbook retrieves and validates the current BGP neighbor status from FortiGate devices.
# Standards: Idempotency (read-only), Observability (asserts), Documentation (comments), 
# Error Handling (failed_when), and Best Practices (FQCN).

- name: Get BGP Neighbors
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve BGP neighbor status via CLI
      # Idempotency: Read-only operation that does not modify device state.
      # Best Practice: Using Fully Qualified Collection Name (FQCN).
      ansible.netcommon.cli_command:
        command: get router info bgp neighbors
      register: neighbors_result
      # Error Handling: Fail if the output contains common error patterns or if the task itself fails.
      failed_when:
        - neighbors_result.failed or "Command fail" in neighbors_result.stdout or "Unknown action" in neighbors_result.stdout

    - name: Validate BGP neighbors retrieval
      # Observability: Ensure the command actually returned data before proceeding.
      ansible.builtin.assert:
        that:
          - neighbors_result.stdout is defined
          - neighbors_result.stdout | length > 0
        fail_msg: "BGP neighbor status could not be retrieved or command returned empty output."
        success_msg: "Successfully captured BGP neighbor status."

    - name: Display BGP Neighbors
      # Documentation: Providing clear visibility into the operational state.
      ansible.builtin.debug:
        msg: |
          ======================= BGP NEIGHBORS =======================
          {{ neighbors_result.stdout }}