---
# FortiGate RIP Status - Network Automation Improvement
# Purpose: Retrieve and verify RIP status from FortiGate firewalls.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: FortiGate RIP Status
  hosts: fortigate
  gather_facts: false
  # Connection: Using network_cli for standardized CLI access to FortiOS.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve RIP information from router
      # FQCN: Using ansible.netcommon.cli_command for direct command execution.
      # Idempotency: Read-only 'get' command ensures the playbook is safe for repeated runs.
      ansible.netcommon.cli_command:
        command: get router info rip
      register: rip_status
      # Error Handling: Fail if output indicates a command failure or an unrecognized operation.
      failed_when:
        - rip_status.failed or "Unknown action" in rip_status.stdout or "Command fail" in rip_status.stdout

    - name: Verify RIP status retrieval integrity
      # Observability: Assert that the command returned a valid, non-empty response.
      ansible.builtin.assert:
        that:
          - rip_status.stdout is defined
          - rip_status.stdout | length > 0
        fail_msg: "CRITICAL: RIP status output is empty or the command failed to execute."
        success_msg: "SUCCESS: RIP routing information captured successfully."

    - name: Display RIP Status
      # Documentation: Formatted output for network operator visibility and logging.
      ansible.builtin.debug:
        msg: |
          ======================= RIP STATUS =======================
          {{ rip_status.stdout }}