# FortiGate RIP Status Verification
# This playbook retrieves and validates the RIP routing table status on FortiGate devices.
# Standards: Idempotency (read-only), Observability (assert), FQCN, and Error Handling.
- name: Get RIP Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve RIP routing information via CLI
      # Use FQCN for the network command module
      ansible.netcommon.cli_command:
        command: get router info rip
      # Register output for observability and downstream validation
      register: rip_status
      # Ensure we fail if the command itself fails to execute on the target
      failed_when: rip_status.failed or "command not found" in rip_status.stdout

    - name: Verify RIP status output validity
      # Assert that we actually received a response to ensure observability
      ansible.builtin.assert:
        that:
          - rip_status.stdout is defined
          - rip_status.stdout | length > 0
        fail_msg: "RIP status retrieval returned empty or undefined results."
        success_msg: "Successfully retrieved RIP status."

    - name: Check for RIP process or configuration issues
      # Use failed_when to catch operational errors like RIP not being enabled
      ansible.builtin.debug:
        msg: "RIP Routing is currently unconfigured or has no routes."
      when: "'RIP' not in rip_status.stdout"

    - name: Display formatted RIP status
      ansible.builtin.debug:
        msg: |
          ======================= RIP STATUS =======================
          {{ rip_status.stdout }}
          ==========================================================
      # Only display if valid content exists to keep output clean
      when: rip_status.stdout | length > 0