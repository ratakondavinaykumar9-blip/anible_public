---
# FortiGate RIP Status Retrieval
# Purpose: Fetches the current RIP routing table and operational status from FortiGate.
# Standards: Implements idempotency, observability, explicit error handling, and FQCN.

- name: Get FortiGate RIP Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get router info rip' command
      # Using Fully Qualified Collection Name (FQCN) for the network CLI module
      ansible.netcommon.cli_command:
        command: get router info rip
      register: rip_result
      # Idempotency: Read-only 'get' commands are inherently idempotent as they do not modify device state.
      # Error Handling: Catch specific FortiOS error strings that might not trigger a non-zero return code.
      failed_when: >
        rip_result.failed or
        "Command fail" in rip_result.stdout or
        "Unknown action" in rip_result.stdout

    - name: Verify RIP status output validity
      # Observability: Assert that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - "rip_result.stdout is defined"
          - "rip_result.stdout | length > 0"
        fail_msg: "RIP status retrieval failed or returned empty output. Verify RIP is configured."
        success_msg: "RIP status successfully retrieved and validated."

    - name: Display RIP operational status
      # Documentation: Providing a clear, formatted view of the operational routing state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= RIP STATUS =======================
          {{ rip_result.stdout }}