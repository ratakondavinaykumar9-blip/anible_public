---
# FortiGate Firmware Information Audit
# This playbook retrieves and validates the current firmware version of FortiGate devices.
- name: Get FortiGate Firmware Status
  hosts: fortigate
  gather_facts: false # FortiOS does not support standard Linux fact gathering

  tasks:
    - name: Retrieve firmware status via CLI
      # FQCN: Using fully qualified collection names for portability and clarity
      ansible.netcommon.cli_command:
        command: get system firmware
      register: fw_result
      # Error Handling: Fail if the command returns empty output
      failed_when: fw_result.stdout | length == 0
      # Idempotency: Read-only command is inherently safe to run multiple times

    - name: Verify firmware data integrity
      # Observability: Assert that the output contains expected FortiOS versioning strings
      ansible.builtin.assert:
        that:
          - "'Version' in fw_result.stdout"
        fail_msg: "Retrieved data does not appear to be valid FortiGate firmware information."
        success_msg: "Firmware information successfully validated."

    - name: Display formatted firmware details
      # Observability: Structured output for operational visibility
      ansible.builtin.debug:
        msg: |
          ======================= FIRMWARE AUDIT =======================
          {{ fw_result.stdout }}
          ==============================================================
