---
- name: Retrieve FortiGate Firmware Details
  hosts: fortigate
  gather_facts: false
  # Purpose: This playbook retrieves firmware version and build information for audit and compliance.
  # Idempotency: Read-only operations are inherently idempotent and safe for repeated execution.

  tasks:
    - name: Fetch firmware information using CLI
      # Why: Uses the network common CLI module to capture the raw output of the firmware status.
      # Standard: Best Practices - Using FQCN (ansible.netcommon.cli_command).
      ansible.netcommon.cli_command:
        command: get system firmware
      register: fw_info
      # Standard: Error Handling - Ensures the task fails if the output is empty or the command is unsupported.
      failed_when: 
        - fw_info.stdout | length == 0
        - "'command parse error' in fw_info.stdout"

    - name: Validate firmware output content
      # Why: Confirms the output contains the 'Version' string to verify the command returned valid data.
      # Standard: Observability - Using assert to verify the integrity of the captured data.
      ansible.builtin.assert:
        that:
          - "'Version' in fw_info.stdout"
        fail_msg: "Retrieved output does not contain expected firmware version data."

    - name: Display firmware information summary
      # Why: Provides a formatted, human-readable report in the execution logs.
      ansible.builtin.debug:
        msg: |
          ======================= FIRMWARE REPORT =======================
          {{ fw_info.stdout }}