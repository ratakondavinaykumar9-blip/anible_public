---
# NetLearner Architect Standard: FortiGate Firmware Information Retrieval
# This playbook is designed for high observability, idempotency, and production safety.
- name: Get FortiGate Firmware Information
  hosts: fortigate
  gather_facts: false # Fact gathering disabled to optimize performance for CLI-based tasks

  tasks:
    - name: Retrieve system firmware status via CLI
      # Use FQCN for standardized network interaction. 
      # This task is idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: get system firmware
      register: fw_info
      # Error Handling: Explicitly check for command failures or error signatures in output
      failed_when: 
        - fw_info.failed | default(false)
        - "'Command fail' in fw_info.stdout or 'Unknown action' in fw_info.stdout"

    - name: Validate firmware data integrity
      # Observability: Use assertions to verify that the returned data contains expected keys
      ansible.builtin.assert:
        that:
          - fw_info.stdout is defined
          - fw_info.stdout | length > 0
          - "'Version' in fw_info.stdout or 'firmware' in fw_info.stdout"
        fail_msg: "Firmware information retrieval failed or returned unexpected format on {{ inventory_hostname }}"
        success_msg: "Firmware data successfully validated for {{ inventory_hostname }}"
        quiet: true

    - name: Display formatted firmware summary
      # Documentation: Provide a structured and human-readable output for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE FIRMWARE STATUS =======================
          Node: {{ inventory_hostname }}
          Timestamp: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          {{ fw_info.stdout }}
          =========================================================================