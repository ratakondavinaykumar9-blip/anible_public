---
# FortiGate FortiCloud Connectivity and Service Status Audit
# Purpose: This playbook verifies the FortiCloud service status to ensure the device is correctly
# registered and communicating with Fortinet's cloud infrastructure for updates and logging.
- name: Audit FortiCloud Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve fmupdate service status
      # Using ansible.netcommon.cli_command for direct CLI interaction.
      # Read-only operations are inherently idempotent and safe for repeated execution.
      ansible.netcommon.cli_command:
        command: get fmupdate service
      register: cloud_status_raw
      # Error Handling: Fail if the command returns a non-zero exit code or a parsing error string.
      failed_when:
        - cloud_status_raw.rc | default(0) != 0
        - "'command parse error' in cloud_status_raw.stdout"

    - name: Validate service status response integrity
      # Observability: Assert that the command returned meaningful FortiCloud information.
      ansible.builtin.assert:
        that:
          - "'Service' in cloud_status_raw.stdout"
          - cloud_status_raw.stdout_lines | length > 0
        fail_msg: "Unexpected output format or empty response from FortiGate."
        success_msg: "FortiCloud service data successfully retrieved."

    - name: Display formatted FortiCloud status
      # Observability: Output the status for immediate visibility and logging during execution.
      ansible.builtin.debug:
        msg: |
          ======================= FORTICLOUD AUDIT =======================
          {{ cloud_status_raw.stdout }}

    - name: Verify FortiCloud is enabled
      # Best Practice: Automate the verification of the desired state (Service Enabled).
      ansible.builtin.assert:
        that:
          - "'Status: Enable' in cloud_status_raw.stdout"
        fail_msg: "FortiCloud is currently DISABLED or not registered. Please check connectivity."
        quiet: true
