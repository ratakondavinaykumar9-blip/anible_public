---
# Playbook: Get FortiCloud Status
# Purpose: Retrieves and validates the FortiCloud service status from FortiGate devices.
# This playbook is idempotent as it performs a read-only operation that does not modify device state.
- name: Get FortiCloud Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute command to retrieve FortiCloud service status
      # Use FQCN (ansible.netcommon.cli_command) for portability and best practices.
      ansible.netcommon.cli_command:
        command: get fmupdate service
      register: cloud_result
      # Error Handling: Explicitly fail if the command returns a non-zero exit code or contains failure keywords.
      failed_when: 
        - "cloud_result.rc != 0"
        - "'error' in cloud_result.stdout | lower"

    - name: Validate that the status output is present and contains expected data
      # Observability: Assert ensures the retrieved data meets requirements before proceeding.
      ansible.builtin.assert:
        that:
          - "cloud_result.stdout is defined"
          - "cloud_result.stdout | length > 0"
        fail_msg: "The command returned an empty or invalid response for FortiCloud status."
        success_msg: "FortiCloud status successfully retrieved and validated."

    - name: Display the formatted FortiCloud status
      # Documentation: Provide clear, human-readable output for operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= FORTICLOUD STATUS =======================
          {{ cloud_result.stdout }}