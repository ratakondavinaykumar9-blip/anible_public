# FortiGate ARP Table Retrieval and Validation
# This playbook retrieves the current ARP table and validates the command execution for operational monitoring.
# Standards: Idempotency, Observability, Documentation, Error Handling, Best Practices
- name: Retrieve and Validate FortiGate ARP Table
  hosts: fortigate
  gather_facts: false # Performance: Network devices do not support standard Linux/Setup fact gathering

  tasks:
    - name: Fetch ARP table from device CLI
      # This operation is inherently idempotent as it is a read-only 'get' command.
      # Using Fully Qualified Collection Names (FQCN) for architectural consistency.
      ansible.netcommon.cli_command:
        command: get system arp
      register: arp_output
      # Error Handling: Explicitly fail if the device returns CLI-level error strings or if the connection fails.
      failed_when: >
        arp_output.failed or 
        'Unknown action' in arp_output.stdout or 
        'Command fail' in arp_output.stdout

    - name: Validate ARP table data observability
      # Observability: Asserting that the retrieved data is present and non-empty ensures monitoring integrity.
      ansible.builtin.assert:
        that:
          - arp_output.stdout is defined
          - arp_output.stdout | length > 0
        fail_msg: "The ARP table retrieval failed or returned an empty response on {{ inventory_hostname }}."
        success_msg: "ARP table successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display ARP table output
      # Providing a formatted view in the task log for human operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE: {{ inventory_hostname }} =======================
          {{ arp_output.stdout }}