---
# FortiGate SNMP Community Retrieval
# This playbook retrieves the SNMP community configuration from FortiGate devices.
# It adheres to standards for observability, error handling, and FQCN usage.
- name: Get SNMP Community Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve SNMP community settings via CLI
      # Use FQCN for netcommon collection to ensure portability and clarity
      ansible.netcommon.cli_command:
        command: get system snmp community
      register: snmp_result
      # Error Handling: Ensure the task fails if the command returns a CLI-specific error message
      failed_when:
        - snmp_result.failed or "Command fail" in snmp_result.stdout
      # Idempotency: 'get' commands are read-only and inherently idempotent

    - name: Validate SNMP configuration output
      # Observability: Use assert to verify that the command returned meaningful data
      ansible.builtin.assert:
        that:
          - snmp_result.stdout is defined
          - snmp_result.stdout | length > 0
        fail_msg: "SNMP configuration retrieval returned empty or invalid data."
        success_msg: "SNMP configuration successfully captured."

    - name: Display SNMP Configuration
      # Documentation: Provide a formatted view of the captured state for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= SNMP CONFIGURATION START =======================
          {{ snmp_result.stdout }}
          =======================  SNMP CONFIGURATION END  =======================