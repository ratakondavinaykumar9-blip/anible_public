---
# Standard: Playbook
# Purpose: Safely retrieve and validate IPv6 session information from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation, FQCN.

- name: Get FortiGate IPv6 Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPv6 session list via CLI
      # Standard: Use FQCN for portable and predictable execution
      # Standard: Idempotent as this is a non-state-changing 'get' operation
      ansible.netcommon.cli_command:
        command: "get system session6 list"
      register: sess_result
      # Standard: Error handling to catch device-specific command failures
      failed_when:
        - sess_result.failed | default(false)
        - "'Command fail' in sess_result.stdout"

    - name: Validate session data retrieval
      # Standard: Observability via assertion to ensure data integrity before proceeding
      ansible.builtin.assert:
        that:
          - sess_result.stdout is defined
          - sess_result.stdout | length > 0
        fail_msg: "No IPv6 session data retrieved or command returned empty."
        success_msg: "IPv6 session data successfully captured."

    - name: Display IPv6 session information
      # Standard: Observability for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= IPv6 SESSIONS =======================
          {{ sess_result.stdout }}