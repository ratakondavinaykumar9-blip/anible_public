---
# Playbook: FortiGate IPv6 Sessions
# Purpose: Securely retrieves and validates active IPv6 sessions from FortiGate firewalls.
# Idempotency: This is a read-only monitoring task and is safe for repeated execution (no state changes).
- name: Get IPv6 Sessions
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPv6 session list from device
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get system session6 list
      register: sess
      # Error Handling: Fail if the command is unrecognized or the execution environment reports a failure
      failed_when: 
        - sess.failed or "Unknown action" in sess.stdout or "Command fail" in sess.stdout
      ignore_errors: false

    - name: Verify session retrieval success
      # Observability: Assert that the command returned a valid, defined response
      ansible.builtin.assert:
        that:
          - sess.stdout is defined
          - sess.stdout | length >= 0
        fail_msg: "Data retrieval failed or returned empty for {{ inventory_hostname }}"
        success_msg: "IPv6 sessions successfully captured from {{ inventory_hostname }}"

    - name: Display session details
      # Documentation: Provides formatted output for visibility and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= IPv6 SESSIONS: {{ inventory_hostname }} =======================
          {{ sess.stdout }}