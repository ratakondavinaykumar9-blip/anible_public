MCP issues detected. Run /mcp list for status.```yaml
---
- name: FortiGate Resource Usage Monitoring
  # Target FortiGate group; gather_facts is disabled as CLI commands don't require Python-style fact collection.
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute diagnose command to fetch system resource usage
      # WHY: Real-time telemetry is critical for ensuring the device has sufficient headroom for automated changes.
      # This task is inherently idempotent as it performs a read-only operation on the device control plane.
      ansible.netcommon.cli_command:
        command: diagnose system resource usage
      register: resource_result
      # ERROR HANDLING: Ensure the command was recognized and returned data.
      failed_when:
        - resource_result.stdout | length == 0
        - "'command parse error' in resource_result.stdout"

    - name: Verify telemetry integrity
      # OBSERVABILITY: Confirm the output contains expected performance metrics (CPU/Memory) to ensure a valid scrape.
      ansible.builtin.assert:
        that:
          - "'CPU' in resource_result.stdout"
          - "'Memory' in resource_result.stdout"
        fail_msg: "The command output is missing critical resource metrics (CPU/Memory)."
        quiet: true

    - name: Display formatted resource usage report
      # OBSERVABILITY: Provide a structured, human-readable view of the current system load for log visibility.
      ansible.builtin.debug:
        msg: |
          ======================= RESOURCE USAGE: {{ inventory_hostname }} =======================
          {{ resource_result.stdout }}
