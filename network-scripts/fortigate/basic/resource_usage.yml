---
# Playbook: FortiGate Resource Usage Monitoring
# Purpose: Retrieves and validates system resource usage (CPU, Memory) from FortiGate devices.
# Standards: Idempotent (Read-only), Observable (Assertions), Documented (Comments), FQCN.

- name: Monitor FortiGate System Resources
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch system resource usage via CLI
      # Using FQCN for the netcommon collection to ensure portability
      ansible.netcommon.cli_command:
        command: diagnose system resource usage
      register: resource_output
      # Idempotency: Read-only commands must explicitly set changed_when to false
      changed_when: false
      # Error Handling: Detect if the command was rejected by the FortiOS parser
      failed_when: 
        - resource_output.rc | default(0) != 0
        - "'Unknown command' in resource_output.stdout"

    - name: Validate resource data retrieval
      # Observability: Assert that the command returned non-empty diagnostic data
      ansible.builtin.assert:
        that:
          - resource_output.stdout is defined
          - resource_output.stdout | length > 0
        fail_msg: "Resource diagnostic command returned empty or invalid results."
        success_msg: "Successfully captured FortiGate resource usage data."

    - name: Display Resource Usage Report
      # Formatting the output for better visibility in automation logs and reports
      ansible.builtin.debug:
        msg: |