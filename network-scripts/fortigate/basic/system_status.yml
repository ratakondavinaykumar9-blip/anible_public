---
# ==============================================================================
# Playbook: FortiGate System Status
# ==============================================================================
# Author: Analyst (OpenClaw) | Improved by Architect:# Version: 1.2.0
# Last Updated: 2026-03-08
# Description: Retrieve comprehensive system status from FortiGate firewalls.
#              Hardened for idempotency, observability, and error handling.
#
# Standards:
#   1. Idempotency: All tasks are read-only or use idempotent file operations.
#   2. Observability: Added assertions to verify data integrity and response validity.
#   3. Documentation: Inline comments explain logic and error handling choices.
#   4. Error Handling: Block/Rescue pattern used for graceful degradation.
#   5. Best Practices: Full FQCN used for all modules and collections.
# ==============================================================================

- name: Get FortiGate System Status
  hosts: fortigate
  gather_facts: false # Manually gathering required facts for precision
  connection: ansible.netcommon.httpapi

  vars:
    vdom: "root"
    check_ha: true
    check_fabric: true
    output_file: "/tmp/fortigate_status_{{ inventory_hostname }}.json"

  tasks:
    - name: Gather time facts for the report
      ansible.builtin.setup:
        gather_subset:
          - 'date_time'
      delegate_to: localhost
      run_once: true # Prevents redundant calls for the same reporting timestamp

    - name: System Data Retrieval Logic
      block:
        - name: Retrieve CLI system status
          ansible.netcommon.cli_command:
            command: get system status
          register: cli_status
          changed_when: false # Information gathering is inherently idempotent
          # Ensure the response is not empty before proceeding
          failed_when: cli_status.stdout | length == 0

        - name: Verify CLI response integrity
          ansible.builtin.assert:
            that:
              - "'Hostname' in cli_status.stdout"
              - "'Serial-Number' in cli_status.stdout"
            fail_msg: "CLI output is missing critical system markers. Check connectivity."

        - name: Retrieve HA status
          ansible.netcommon.cli_command:
            command: get system ha status
          register: ha_status
          when: check_ha | bool
          changed_when: false
          # Standalone units return an error for HA commands; ignore to prevent play failure
          ignore_errors: true

        - name: Retrieve Security Fabric status
          ansible.netcommon.cli_command:
            command: diagnose test application bc 1
          register: fabric_status
          when: check_fabric | bool
          changed_when: false
          # Diagnostic commands may not be available on all firmware versions
          ignore_errors: true

        - name: Parse system facts using regex
          ansible.builtin.set_fact:
            system_info:
              hostname: "{{ cli_status.stdout | regex_search('Hostname:\\s+(\\S+)', '\\1') | first | default('unknown') }}"
              serial: "{{ cli_status.stdout | regex_search('Serial-Number:\\s+(\\S+)', '\\1') | first | default('unknown') }}"
              version: "{{ cli_status.stdout | regex_search('Version:\\s+(.+?)\\n', '\\1') | first | default('unknown') }}"
              vdom_mode: "{{ cli_status.stdout | regex_search('Virtual Domains:\\s+(\\d+)', '\\1') | first | default('1') }}"
              ha_mode: "{{ cli_status.stdout | regex_search('HA-Cluster-mode:\\s+(\\S+)', '\\1') | first | default('Standalone') }}"
          when: cli_status.stdout is defined

        - name: Assert successful data extraction
          ansible.builtin.assert:
            that:
              - system_info.hostname != 'unknown'
              - system_info.serial != 'unknown'
            fail_msg: "Regex parsing failed to extract required identity facts."

      rescue:
        - name: Log retrieval failure
          ansible.builtin.debug:
            msg: "ERROR: Failed to retrieve or parse status from {{ inventory_hostname }}. check logs."

        - name: Set failure state
          ansible.builtin.set_fact:
            system_error: true

      always:
        - name: Display human-readable summary
          ansible.builtin.debug:
            msg: |
              ========================================
              FortiGate Summary: {{ inventory_hostname }}
              ========================================
              Hostname: {{ system_info.hostname | default('N/A') }}
              Serial: {{ system_info.serial | default('N/A') }}
              Version: {{ system_info.version | default('N/A') }}
              HA Mode: {{ system_info.ha_mode | default('Standalone') }}
              VDOM Mode: {{ system_info.vdom_mode | default('1') }}
              
              HA Health: {{ 'OK' if (ha_status is success and check_ha) else 'N/A' }}
              Fabric Health: {{ 'OK' if (fabric_status is success and check_fabric) else 'N/A' }}
              ========================================
          when: system_error is not defined

    - name: Status Archiving and Reporting
      block:
        - name: Ensure destination directory exists
          ansible.builtin.file:
            path: "{{ output_file | dirname }}"
            state: directory
            mode: '0755'
          delegate_to: localhost

        - name: Save status report to JSON
          ansible.builtin.copy:
            content: "{{ {
              'hostname': system_info.hostname | default('N/A'),
              'serial': system_info.serial | default('N/A'),
              'version': system_info.version | default('N/A'),
              'ha_mode': system_info.ha_mode | default('Standalone'),
              'vdom_mode': system_info.vdom_mode | default('1'),
              'cli_status_raw': cli_status.stdout | default(''),
              'timestamp': ansible_date_time.iso8601 | default('N/A'),
              'collection_status': 'success'
            } | to_nice_json }}"
            dest: "{{ output_file }}"
            mode: '0640'
          delegate_to: localhost
          changed_when: true # Report generation is a state change for the local filesystem
      when: system_error is not defined