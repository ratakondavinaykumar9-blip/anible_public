---
- name: FortiGate Session List Retrieval
  hosts: fortigate
  gather_facts: false
  # Why: Disabling fact gathering optimizes execution time as FortiOS does not support standard Ansible facts.

  tasks:
    - name: Retrieve active session list from FortiGate
      # Why: Obtaining the session table is essential for monitoring traffic flows and troubleshooting connectivity.
      # Idempotency: This is a read-only "get" operation, ensuring it is inherently safe to run multiple times.
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions_result
      failed_when:
        - sessions_result.failed or "Unknown command" in sessions_result.stdout

    - name: Validate session data observability
      # Why: Assertions verify that the device returned valid data, ensuring the automation is reliable.
      ansible.builtin.assert:
        that:
          - sessions_result.stdout is defined
          - sessions_result.stdout | length > 0
        fail_msg: "The session list retrieval returned no data or failed unexpectedly."
        success_msg: "Session list successfully retrieved and validated."

    - name: Display formatted session list
      # Why: Provides immediate visibility to the administrator during playbook execution.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE SESSIONS =======================
          {{ sessions_result.stdout }}
