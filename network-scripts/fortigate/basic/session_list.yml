---
# FortiGate Session List - NetLearner Architect Optimized
# This playbook retrieves and validates the current session table from a FortiGate device.
# Standards: Idempotency (Read-only), Observability (Asserts), FQCN usage, Error Handling.

- name: Get Session List
  hosts: fortigate
  gather_facts: false # Performance: Facts not required for CLI execution.

  tasks:
    - name: Retrieve session table from FortiGate
      # FQCN: ansible.netcommon.cli_command is used for direct CLI execution.
      # Idempotency: Read-only command is explicitly set to changed_when: false.
      ansible.netcommon.cli_command:
        command: get system session list
      register: sessions
      # Error Handling: Ensure the command was successful and returned data.
      failed_when: 
        - sessions.stdout is not defined or sessions.stdout == ""
      changed_when: false 

    - name: Validate session data observability
      # Observability: Assert that the response contains data to verify connectivity/auth.
      ansible.builtin.assert:
        that:
          - sessions.stdout | length > 0
        fail_msg: "Failed to retrieve session list: Output is empty or undefined."
        success_msg: "Session list successfully captured from {{ inventory_hostname }}."

    - name: Display formatted session report
      # Documentation: Provides human-readable output of the session table.
      ansible.builtin.debug:
        msg: |
          ======================= SESSIONS =======================
          HOST: {{ inventory_hostname }}
          
          {{ sessions.stdout }}