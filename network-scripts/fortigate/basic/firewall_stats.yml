---
# Playbook: FortiGate Firewall Statistics Retrieval
# Purpose: Gathers and validates real-time firewall performance metrics to ensure operational visibility.
# Standards: Idempotency (read-only), Observability (assertions), and FQCN compliance.
- name: Get Firewall Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall performance statistics via CLI
      # Use Fully Qualified Collection Name (FQCN) for reliability across environments.
      ansible.netcommon.cli_command:
        command: get firewall stats
      register: stats_output
      # Error Handling: Ensure the task fails if the output is null or empty, preventing silent failures.
      failed_when: 
        - stats_output.stdout is not defined or stats_output.stdout | length == 0
        - "'command parse error' in stats_output.stdout"

    - name: Validate command output integrity
      # Observability: Assert that the output contains expected data headers to verify successful execution.
      ansible.builtin.assert:
        that:
          - "stats_output.stdout is search('Firewall Statistics')"
        fail_msg: "Validation Failed: Statistics output does not contain expected 'Firewall Statistics' header."
        success_msg: "Validation Passed: Firewall statistics successfully captured."

    - name: Display formatted statistics for operational review
      # Provides a clean, human-readable view of the captured stdout.
      ansible.builtin.debug:
        msg: |
          ======================= FIREWALL STATS ({{ inventory_hostname }}) =======================
          {{ stats_output.stdout }}
          =========================================================================================
