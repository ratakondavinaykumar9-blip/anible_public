---
# Playbook: FortiGate Firewall Statistics Collection
# Description: Retrieves and validates operational telemetry from FortiGate firewalls.
# Standards: Idempotent (Read-only), Observable (Assertions), Documented (Inline Comments).
- name: Get Firewall Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall statistics via CLI command
      # FQCN used for module consistency and compatibility
      ansible.netcommon.cli_command:
        command: "get firewall stats"
      register: stats_result
      # Idempotency: Read-only operations must report 'changed: false'
      changed_when: false
      # Error Handling: Ensure we fail if the command is unrecognized or execution fails
      failed_when: 
        - stats_result.failed
        - "'Unknown' in stats_result.stdout or 'Command fail' in stats_result.stdout"

    - name: Validate statistics data integrity
      # Observability: Assert that the output is populated and valid
      ansible.builtin.assert:
        that:
          - stats_result.stdout is defined
          - stats_result.stdout | length > 0
        fail_msg: "Telemetry failure: Statistics output is empty or undefined for {{ inventory_hostname }}."
        success_msg: "Successfully validated telemetry for {{ inventory_hostname }}."
        quiet: true

    - name: Display Firewall Statistics
      # Formatted output for human-readable audit logs
      ansible.builtin.debug:
        msg: |
          ======================= FIREWALL STATS: {{ inventory_hostname }} =======================
          {{ stats_result.stdout }}