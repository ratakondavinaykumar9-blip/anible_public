---
# Playbook: FortiGate Performance Monitoring
# Description: Retrieves and validates system performance metrics (CPU, Memory, Sessions).
# This playbook adheres to standards for Idempotency, Observability, and Error Handling.

- name: Get Performance Status
  hosts: fortigate
  gather_facts: false # Performance metrics are gathered via CLI; standard facts are not required.

  tasks:
    - name: Retrieve System Performance Metrics via CLI
      # Use FQCN (ansible.netcommon.cli_command) for robust network command execution.
      ansible.netcommon.cli_command:
        command: get system performance status
      register: perf_output
      # Error Handling: Ensure the task fails if the command returns an error or lacks key metrics.
      failed_when: 
        - perf_output.failed
        - "'CPU usage' not in perf_output.stdout"

    - name: Validate Performance Data Integrity
      # Observability: Assert that the retrieved data contains critical performance indicators.
      ansible.builtin.assert:
        that:
          - perf_output.stdout is defined
          - "'CPU usage' in perf_output.stdout"
          - "'Memory usage' in perf_output.stdout"
        fail_msg: "Performance data from {{ inventory_hostname }} is incomplete or invalid."
        success_msg: "Successfully validated performance metrics for {{ inventory_hostname }}."

    - name: Display Performance Status
      # Documentation: Output the performance details for auditability and real-time monitoring.
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE: {{ inventory_hostname }} =======================
          {{ perf_output.stdout }}
          ======================================================================================