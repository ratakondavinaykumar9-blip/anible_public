---
# FortiGate Performance Monitoring Playbook
# Purpose: Retrieves and validates real-time performance metrics from FortiGate devices.
# Standards: Idempotent (Read-only), Observable (Assert), Documented, FQCN usage.

- name: Get FortiGate Performance Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system performance status from FortiGate
      # FQCN: ansible.netcommon.cli_command is used for standardized CLI interaction.
      # Idempotency: This operation is read-only and safe for repeated execution.
      ansible.netcommon.cli_command:
        command: get system performance status
      register: fortigate_perf_raw
      # Error Handling: Fail if the response is empty or missing expected headers.
      failed_when: 
        - fortigate_perf_raw.stdout is not defined 
        - fortigate_perf_raw.stdout | length == 0

    - name: Validate performance data integrity
      # Observability: Verify that the command returned standard FortiOS performance counters.
      ansible.builtin.assert:
        that:
          - "'CPU' in fortigate_perf_raw.stdout"
          - "'Memory' in fortigate_perf_raw.stdout"
        fail_msg: "Performance data retrieval failed or returned an unexpected format."
        success_msg: "Successfully validated FortiGate performance metrics."

    - name: Display formatted performance metrics
      # Observability: Present the retrieved status for operator review.
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE STATUS: {{ inventory_hostname }} =======================
          {{ fortigate_perf_raw.stdout }}