---
# ==============================================================================
# Playbook: FortiGate Performance Monitoring
# Description: Retrieves and validates the system performance status of FortiGate
#              firewalls using CLI commands.
# ==============================================================================
- name: Get FortiGate Performance Status
  hosts: fortigate
  gather_facts: false # Performance data is retrieved via CLI, skipping expensive setup facts

  tasks:
    - name: Retrieve System Performance Status
      # Using FQCN for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: get system performance status
      register: perf
      # Ensure the task fails if the device returns an error string despite a 0 exit code
      failed_when: 
        - perf.stdout is not defined
        - "'Command fail' in perf.stdout"
      changed_when: false # This is a 'get' operation and does not modify system state

    - name: Validate Performance Data Integrity
      # Observability: Assert that the output contains critical performance metrics
      ansible.builtin.assert:
        that:
          - "'CPU' in perf.stdout"
          - "'Memory' in perf.stdout"
          - "'Uptime' in perf.stdout"
        fail_msg: "The performance output was incomplete or malformed."
        success_msg: "Performance data successfully validated."

    - name: Display Performance Report
      # Documentation: Providing a structured visual output for administrative review
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE REPORT =======================
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 | default('N/A') }}
          ------------------------------------------------------------------
          {{ perf.stdout }}
          ==================================================================
```