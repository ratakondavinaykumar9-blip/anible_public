---
- name: Retrieve and Verify FortiGate License Status
  hosts: fortigate
  gather_facts: false
  # Documentation: gather_facts is disabled as we are executing direct CLI commands 
  # and do not require standard Linux/Unix system facts for this network operation.

  tasks:
    - name: Execute FortiOS license status command
      # Best Practices: Use Fully Qualified Collection Name (FQCN)
      # Idempotency: This 'diagnose' command is read-only and safe for repeated execution.
      ansible.netcommon.cli_command:
        command: diagnose system license status
      register: license_output
      # Error Handling: Ensure the playbook fails if the command is unrecognized or returns an error.
      failed_when:
        - license_output.rc != 0
        - "'Command fail' in license_output.stdout"

    - name: Validate license output integrity
      # Observability: Assert that the output contains expected keywords to confirm valid data retrieval.
      ansible.builtin.assert:
        that:
          - "'Status' in license_output.stdout"
          - "'Expiration' in license_output.stdout or 'Permanent' in license_output.stdout"
        fail_msg: "License data is missing or returned in an unrecognized format."
        success_msg: "License data successfully retrieved and verified."

    - name: Display formatted license information
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE LICENSE STATUS =======================
          {{ license_output.stdout }}