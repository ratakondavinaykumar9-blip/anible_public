---
# FortiGate License Information Retrieval
# Purpose: This playbook retrieves and validates the current license status of FortiGate devices.
# Standards: Adheres to NetLearner Architect standards for observability, idempotency, and FQCN usage.
- name: Get FortiGate License Info
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for CLI-based status retrieval.

  tasks:
    - name: Retrieve license status via CLI
      # Use FQCN for ansible.netcommon.cli_command. 
      # This command is read-only and inherently idempotent, safe for repeated runs.
      ansible.netcommon.cli_command:
        command: diagnose system license status
      register: license_result
      # Error Handling: Ensure the task fails if the return code is non-zero.
      failed_when: license_result.rc is defined and license_result.rc != 0

    - name: Verify license data integrity
      # Observability: Assert that the output is not empty and contains expected license markers.
      # This ensures that a successful command execution actually returned meaningful data.
      ansible.builtin.assert:
        that:
          - license_result.stdout | length > 0
          - "'License' in license_result.stdout or 'Status' in license_result.stdout"
        fail_msg: "License status output was empty or invalid on {{ inventory_hostname }}."
        success_msg: "License information successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display formatted license details
      # Documentation: Providing a clear, audit-ready view of the license status.
      ansible.builtin.debug:
        msg: |
          =======================================================
          FORTIGATE LICENSE REPORT: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          =======================================================
          {{ license_result.stdout }}
          =======================================================
