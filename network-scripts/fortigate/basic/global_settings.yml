---
# Playbook: FortiGate Global Settings Audit
# Purpose: This playbook retrieves and validates the global system configuration from FortiGate devices.
# Standards: Idempotent (Read-only), Observable (Assert), Documented (Comments), FQCN Usage.

- name: Audit FortiGate Global Settings
  hosts: fortigate
  gather_facts: false
  vars:
    # Defining expected string to ensure we didn't get an empty or error response
    required_keyword: "hostname"

  tasks:
    - name: Retrieve global system configuration via CLI
      # Using FQCN ansible.netcommon.cli_command for standardized network interaction.
      # This task is inherently idempotent as it performs a state retrieval (get).
      ansible.netcommon.cli_command:
        command: get system global
      register: global_output
      # Error Handling: Fail if the command returns an error or if the CLI session fails.
      failed_when: 
        - global_output.failed or "Unknown action" in global_output.stdout
      ignore_errors: false

    - name: Validate global settings integrity
      # Observability: Asserting that the output contains expected configuration keys.
      # This ensures the device returned a valid configuration block rather than an error message.
      ansible.builtin.assert:
        that:
          - global_output.stdout is defined
          - required_keyword in global_output.stdout
        fail_msg: "Data integrity check failed: '{{ required_keyword }}' not found in output."
        success_msg: "Data integrity check passed: Global settings successfully retrieved."

    - name: Display formatted global settings
      # Provides clear visibility for operators during playbook execution.
      ansible.builtin.debug:
        msg: |
          ======================= GLOBAL SETTINGS ({{ inventory_hostname }}) =======================
          {{ global_output.stdout }}