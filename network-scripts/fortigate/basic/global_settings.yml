# Playbook: fortigate_global_settings.yml
# Purpose: Retrieves and validates the global system configuration of a FortiGate device.
# This operation is read-only and idempotent by design.
- name: Get and Validate FortiGate Global Settings
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute command to retrieve global system settings
      # FQCN: Using ansible.netcommon.cli_command for consistent network CLI interaction.
      # Idempotency: Read-only commands must set changed_when to false to ensure safe re-runs.
      ansible.netcommon.cli_command:
        command: get system global
      register: global_result
      changed_when: false
      # Error Handling: Fail explicitly if the output is empty or contains known error patterns.
      failed_when:
        - global_result.stdout | length == 0
        - "'command fail' in global_result.stdout | lower"

    - name: Verify global configuration integrity
      # Observability: Assert that the output contains expected system keys like 'hostname'.
      ansible.builtin.assert:
        that:
          - "'hostname' in global_result.stdout"
        fail_msg: "Global configuration data is incomplete or the device returned an invalid response."
        success_msg: "Global configuration successfully validated."

    - name: Display formatted global settings for observability
      # Documentation: Ensuring critical system state is visible in the automation logs.
      ansible.builtin.debug:
        msg: |
          ======================= GLOBAL SETTINGS =======================
          {{ global_result.stdout }}