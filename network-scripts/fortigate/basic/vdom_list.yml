---
# FortiGate VDOM List - Improved for Production Standards
# This playbook retrieves the list of Virtual Domains (VDOMs) from a FortiGate device.
- name: Get FortiGate VDOM List
  hosts: fortigate
  gather_facts: false # Facts are not required for this CLI-based operation

  tasks:
    - name: Retrieve VDOM configuration via CLI
      # Use Fully Qualified Collection Name (FQCN) for reliability
      ansible.netcommon.cli_command:
        command: get system vdom
      register: vdom_output
      # Error Handling: Catch common FortiOS CLI error strings that might not trigger a non-zero exit code
      failed_when: 
        - vdom_output.rc | default(0) != 0
        - "'Command fail' in vdom_output.stdout"
        - "'Unknown action' in vdom_output.stdout"

    - name: Validate VDOM retrieval integrity
      # Observability: Assert that the output is not empty and contains expected VDOM keywords
      ansible.builtin.assert:
        that:
          - vdom_output.stdout | length > 0
          - "'vdom' in vdom_output.stdout or 'root' in vdom_output.stdout"
        fail_msg: "The VDOM list could not be retrieved or the output was unexpected."
        success_msg: "VDOM list successfully retrieved and validated."

    - name: Display VDOM list for operator visibility
      # This task is idempotent as it only performs a read/display operation
      ansible.builtin.debug:
        msg: |
          ======================= VDOMs =======================
          {{ vdom_output.stdout }}