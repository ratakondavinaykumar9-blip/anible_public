---
# NetLearner Architect Standard: FortiGate VDOM Retrieval
# Purpose: Safely retrieve and verify the list of Virtual Domains (VDOMs) from a FortiGate appliance.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN Usage, Error Handling.

- name: FortiGate VDOM Inventory Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "CLI: Execute 'get system vdom' to retrieve VDOM list"
      # Using Fully Qualified Collection Name (FQCN) for network automation
      ansible.netcommon.cli_command:
        command: "get system vdom"
      register: vdom_result
      # Idempotency: This is a read-only operational command; ensure it never reports 'changed'
      changed_when: false
      # Error Handling: Fail if the output does not contain the expected 'vdom' keyword
      failed_when: 
        - vdom_result.failed | default(false)
        - "'vdom' not in vdom_result.stdout | lower"

    - name: "OBSERVABILITY: Validate VDOM command output"
      # Use assert to programmatically verify that the output is non-empty and well-formed
      ansible.builtin.assert:
        that:
          - "vdom_result.stdout is defined"
          - "vdom_result.stdout | length > 0"
        fail_msg: "The VDOM list retrieval failed or returned an empty response."
        success_msg: "VDOM list successfully retrieved and validated."

    - name: "DISPLAY: Render VDOM Inventory"
      # Clear documentation of results in the console for operator observability
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE VDOM INVENTORY =======================
          Node: {{ inventory_hostname }}
          Status: Success
          ------------------------------------------------------------------------
          {{ vdom_result.stdout }}
          ========================================================================
