# Playbook: FortiGate System Information Retrieval
# Purpose: Securely fetches and validates core system metadata for FortiGate appliances.
# Standards: Ensures idempotency through read-only operations and provides high observability.
- name: Get System Info
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch system information via CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      # Documentation: Executing raw CLI command for comprehensive system dump
      ansible.netcommon.cli_command:
        command: get system info
      register: fortigate_info_raw
      # Error Handling: Fail if return code is non-zero or output indicates an unknown command
      failed_when: 
        - fortigate_info_raw.rc | default(0) != 0
        - "'Unknown command' in fortigate_info_raw.stdout"

    - name: Validate system information integrity
      # Observability: Verify that the output contains critical data fields
      ansible.builtin.assert:
        that:
          - "'Hostname' in fortigate_info_raw.stdout"
          - "'Version' in fortigate_info_raw.stdout"
          - "'Serial-Number' in fortigate_info_raw.stdout"
        fail_msg: "System information retrieval failed validation: Missing key fields."
        success_msg: "System information successfully validated."

    - name: Display formatted system information
      # Documentation: Outputs the gathered data for audit logging/visibility
      ansible.builtin.debug:
        msg: |
          ======================= SYSTEM INFO =======================
          {{ fortigate_info_raw.stdout }}
---