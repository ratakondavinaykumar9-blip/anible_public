---
# FortiGate System Information Retrieval
# Purpose: Gathers and validates device-specific system metadata for audit and inventory.
# Compliance: Adheres to Idempotency, Observability, and FQCN standards.

- name: Get System Info
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system status via CLI
      # Use FQCN for cross-version compatibility and stability
      ansible.netcommon.cli_command:
        command: get system info
      register: info_output
      # Idempotency: Mark as unchanged as this is a read-only telemetry operation
      changed_when: false
      # Error Handling: Fail if the command is unrecognized or returns a non-zero exit code
      failed_when:
        - info_output.rc is defined and info_output.rc != 0
        - "'command parse error' in info_output.stdout"
        - "'Unknown action' in info_output.stdout"

    - name: Validate system information integrity
      # Observability: Assert that the device returned a valid schema with key identifiers
      ansible.builtin.assert:
        that:
          - info_output.stdout is defined
          - "'Hostname' in info_output.stdout"
          - "'Version' in info_output.stdout"
          - "'Serial-Number' in info_output.stdout"
        fail_msg: "Critical system attributes are missing from the FortiGate response."
        quiet: true

    - name: Display formatted system information
      # Provide structured output for administrative visibility and logging
      ansible.builtin.debug:
        msg: |
          ======================= SYSTEM INFO =======================
          {{ info_output.stdout }}