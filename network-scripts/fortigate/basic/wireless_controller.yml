---
# Playbook: FortiGate Wireless Controller Status
# Purpose: Retrieves and validates the status of Wireless Termination Points (WTP).
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Inline), FQCN.

- name: Retrieve FortiGate Wireless Controller Information
  hosts: fortigate
  gather_facts: false
  # Ensure the connection uses the network_cli plugin for FortiOS compatibility
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Execute command to get wireless WTP status
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction
      ansible.netcommon.cli_command:
        command: get wireless-controller wtp
      register: wifi_data
      # Error Handling: Fail only if the command fails or if the command is unrecognized by the device
      failed_when: 
        - wifi_data.failed or "Unknown action" in wifi_data.stdout
      # Idempotency: This is a read-only 'get' command and does not modify the device configuration.

    - name: Validate wireless controller output integrity
      # Observability: Use assert to verify that the returned data is not empty and contains expected values
      ansible.builtin.assert:
        that:
          - wifi_data.stdout is defined
          - wifi_data.stdout | length > 0
        fail_msg: "The wireless controller command returned no data or failed to execute properly."
        success_msg: "Wireless controller WTP status successfully retrieved."

    - name: Display formatted wireless controller status
      # Observability: Print the command output in a human-readable format for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= WIRELESS WTP STATUS =======================
          {{ wifi_data.stdout }}