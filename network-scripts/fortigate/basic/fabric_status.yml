---
# FortiGate Security Fabric Status Monitoring Playbook
# This playbook retrieves and validates the status of the Fortinet Security Fabric.
# It adheres to standards for Idempotency (read-only), Observability, and FQCN usage.

- name: FortiGate Security Fabric Status Analysis
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve Security Fabric status from FortiGate
      # Using FQCN for cli_command to ensure cross-platform consistency.
      # This task is inherently idempotent as it only retrieves state without modification.
      ansible.netcommon.cli_command:
        command: get fabric status
      register: fabric_result
      # Basic error handling: ensure the task fails if the command execution fails.
      failed_when: fabric_result.failed | default(false)

    - name: Validate Security Fabric status response
      # Observability: Asserting that the output contains expected data to verify operational success.
      # Prevents false positives from empty responses or "command not found" errors.
      ansible.builtin.assert:
        that:
          - "fabric_result.stdout is defined"
          - "fabric_result.stdout | length > 0"
          - "'Unknown command' not in fabric_result.stdout"
        fail_msg: "Security Fabric status could not be retrieved or the command is not supported on this version."
        success_msg: "Security Fabric status successfully retrieved and validated."

    - name: Display formatted Security Fabric status
      # Documentation: Provides structured output for logs and operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          FABRIC STATUS FOR: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          ======================================================================
          {{ fabric_result.stdout }}
          ======================================================================