---
# FortiGate Fabric Status Retrieval - NetLearner Standard
# Purpose: Retrieves and validates the Security Fabric operational status.
# Standards: Idempotent (Read-only), Observability (Assert), Documentation (Why), 
# Error Handling (Failed_when), Best Practices (FQCN).

- name: FortiGate Fabric Status Check
  hosts: fortigate
  gather_facts: false # Optimization: Device-specific facts are not required for this operational check.

  tasks:
    - name: Execute CLI command to get fabric status
      # Use FQCN for consistency and future-proofing against collection shadowing.
      ansible.netcommon.cli_command:
        command: get fabric status
      register: fabric_status_raw
      # Error Handling: Fail if the output indicates a command execution failure on the device.
      failed_when: 
        - "'Command fail' in fabric_status_raw.stdout"
        - "'Unknown action' in fabric_status_raw.stdout"

    - name: Validate operational telemetry
      # Observability: Ensure the device returned valid fabric data before proceeding with display.
      ansible.builtin.assert:
        that:
          - fabric_status_raw.stdout is defined
          - fabric_status_raw.stdout | length > 0
          - "'Fabric' in fabric_status_raw.stdout"
        fail_msg: "Telemetry validation failed: The device did not return a valid fabric status response."
        success_msg: "Telemetry validation passed: Fabric status is intact."
        quiet: true # Reduces verbosity in successful runs.

    - name: Display formatted Security Fabric status
      # Observability: Provide a clean, human-readable view of the operational state for the architect.
      ansible.builtin.debug:
        msg: |
          ======================= FABRIC STATUS =======================
          {{ fabric_status_raw.stdout }}
