---
- name: FortiGate DNS Settings Audit and Verification
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system DNS configuration via CLI
      # Why: Directly querying the system state via CLI ensures we obtain the live, running configuration for audit accuracy.
      ansible.netcommon.cli_command:
        command: get system dns
      register: dns_settings
      # Error Handling: fail if the command execution returns a non-zero exit code or contains FortiOS error strings.
      failed_when:
        - dns_settings.rc != 0
        - "'Command fail' in dns_settings.stdout"

    - name: Verify DNS configuration observability
      # Why: Using assertions to validate that the retrieved output contains the expected system parameters (e.g., 'primary').
      ansible.builtin.assert:
        that:
          - dns_settings.stdout is defined
          - "'primary' in dns_settings.stdout"
        fail_msg: "CRITICAL: DNS configuration could not be retrieved or the returned data is incomplete."
        success_msg: "DNS configuration successfully retrieved and validated for observability."

    - name: Display operational DNS status
      # Why: Provides immediate visibility for operators and ensures the retrieved state is recorded in the automation logs.
      ansible.builtin.debug:
        msg: |
          ======================= DNS STATE =======================
          {{ dns_settings.stdout }}

    - name: Validate desired state compliance (Idempotency Check)
      # Why: While this is a read-only task, asserting the presence of standard resolvers (e.g., 8.8.8.8) ensures the device maintains the expected state across multiple runs.
      ansible.builtin.assert:
        that:
          - "'8.8.8.8' in dns_settings.stdout"
        fail_msg: "Idempotency Warning: The device state deviates from the organizational standard (8.8.8.8)."
      ignore_errors: true # Error Handling: Mark as ignored to report the discrepancy without halting subsequent audit tasks.
```