---
# FortiGate Clock and NTP Verification Playbook
# Purpose: Retrieves and validates system time and NTP status from FortiGate devices.
# Standards: Idempotent (read-only), FQCN compliant, includes observability and robust error handling.

- name: Get Clock and NTP Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve current system time
      # Uses FQCN to fetch the system time; idempotent as it performs no state changes
      ansible.netcommon.cli_command:
        command: "get system time"
      register: time_output
      # Error Handling: Fail if output is empty or contains known error strings
      failed_when: >
        time_output.stdout == "" or 
        "Command fail" in time_output.stdout

    - name: Validate system time retrieval
      # Observability: Assertion to ensure data integrity before proceeding
      ansible.builtin.assert:
        that:
          - "time_output.stdout is defined"
          - "time_output.stdout | length > 0"
        fail_msg: "Critical: Failed to retrieve system time from {{ inventory_hostname }}."
        success_msg: "System time successfully retrieved from {{ inventory_hostname }}."

    - name: Retrieve NTP configuration and synchronization status
      # Fetches NTP daemon state to ensure network time synchronization is healthy
      ansible.netcommon.cli_command:
        command: "get system ntp"
      register: ntp_output
      # Error Handling: Identify failure conditions in the CLI response
      failed_when: >
        ntp_output.stdout == "" or 
        "error" in ntp_output.stdout | lower

    - name: Validate NTP status retrieval
      # Observability: Confirms the presence of NTP-related keywords in the response
      ansible.builtin.assert:
        that:
          - "ntp_output.stdout is defined"
          - "'ntpsync' in ntp_output.stdout or 'server' in ntp_output.stdout"
        fail_msg: "Critical: NTP status check failed or returned incomplete data for {{ inventory_hostname }}."
        success_msg: "NTP status successfully retrieved for {{ inventory_hostname }}."

    - name: Display formatted Clock and NTP telemetry
      # Provides a consolidated view of the registered variables for operational visibility
      ansible.builtin.debug:
        msg: 
          - "--- [ {{ inventory_hostname }} ] ---"
          - "System Clock: {{ time_output.stdout | trim }}"
          - "NTP Status:   {{ ntp_output.stdout | trim }}"