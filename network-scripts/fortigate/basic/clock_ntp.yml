---
# FortiGate Clock and NTP Verification Playbook
# Standard 1: This playbook is idempotent as it performs read-only operations.
# Standard 3: Verifying system time is critical for log correlation, SSL certificate validity, and security audits.
- name: Verify FortiGate Clock and NTP Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve current system time
      # Standard 3: Accurate timestamps are required for incident response and forensic analysis.
      # Standard 5: Using Fully Qualified Collection Name (FQCN) for the command module.
      ansible.netcommon.cli_command:
        command: get system time
      register: system_time_raw
      # Standard 4: Error Handling - Fail if the command is not recognized or returns an empty result.
      failed_when: 
        - system_time_raw.failed or "Unknown action" in system_time_raw.stdout
        - system_time_raw.stdout | length == 0

    - name: Retrieve NTP synchronization status
      # Standard 3: Monitoring NTP status ensures the device clock does not drift from the network authority.
      ansible.netcommon.cli_command:
        command: get system ntp
      register: system_ntp_raw
      # Standard 4: Error Handling
      failed_when: 
        - system_ntp_raw.failed or "Unknown action" in system_ntp_raw.stdout
        - system_ntp_raw.stdout | length == 0

    - name: Validate retrieval of Clock and NTP information
      # Standard 2: Observability - Assert that the device returned valid data containing expected keywords.
      ansible.builtin.assert:
        that:
          - "'date:' in system_time_raw.stdout"
          - "'ntpsync:' in system_ntp_raw.stdout"
        fail_msg: "Validation Error: The FortiGate output did not contain the expected 'date' or 'ntpsync' markers."
        success_msg: "Validation Success: System clock and NTP data successfully retrieved."

    - name: Display formatted Clock and NTP diagnostics
      # Standard 2: Observability - Present results clearly in the execution output.
      ansible.builtin.debug:
        msg:
          - "System Clock: {{ system_time_raw.stdout }}"
          - "NTP Status: {{ system_ntp_raw.stdout }}"
