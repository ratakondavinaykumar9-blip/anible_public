---
# Playbook: Retrieve FortiGate IPAM (IP Address Management) Status
# This playbook retrieves the current IPAM status from FortiGate devices.
# Standards followed: Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: FortiGate IPAM Status Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system ipam' command
      # Idempotency: Command is a read-only operation and does not modify system state.
      # FQCN: Using fully qualified collection name for the network common module.
      ansible.netcommon.cli_command:
        command: get system ipam
      register: ipam_output
      # Error Handling: Explicitly check for command failure or "Unknown" command responses.
      failed_when:
        - ipam_output.failed or "Unknown action" in ipam_output.stdout or "Command fail" in ipam_output.stdout

    - name: Verify IPAM status data integrity
      # Observability: Assert that the output is not empty and contains valid data.
      ansible.builtin.assert:
        that:
          - ipam_output.stdout is defined
          - ipam_output.stdout | length > 0
        fail_msg: "The IPAM status output was empty or could not be retrieved."
        success_msg: "IPAM status successfully captured."

    - name: Display formatted IPAM information
      # Documentation: Clear header and formatted output for improved operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE IPAM STATUS =======================
          {{ ipam_output.stdout }}