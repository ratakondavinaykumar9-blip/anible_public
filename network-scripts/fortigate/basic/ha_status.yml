# Playbook: FortiGate HA Status Audit
# Purpose: Retrieves and validates the High Availability (HA) synchronization state.
# Idempotency: This playbook is read-only and safe for repeated execution without state mutation.
- name: Get FortiGate HA Status
  hosts: fortigate
  gather_facts: false # Network devices use specific modules instead of standard fact gathering

  tasks:
    - name: Retrieve HA status via CLI command
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get system ha status
      register: ha_result
      # Error Handling: Fail if the command returns an error code or is unrecognized by the device
      failed_when:
        - ha_result.rc != 0
        - "'Unknown' in ha_result.stdout"
        - "'Command fail' in ha_result.stdout"

    - name: Validate HA status response integrity
      # Observability: Use assert to verify that the output contains expected HA metadata
      ansible.builtin.assert:
        that:
          - ha_result.stdout is defined
          - ha_result.stdout | length > 0
          - "'Mode:' in ha_result.stdout"
        fail_msg: "HA status retrieval failed or returned invalid data for {{ inventory_hostname }}."
        quiet: true

    - name: Display formatted HA status summary
      # Observability: Print the registered output for manual verification and logging
      ansible.builtin.debug:
        msg: |
          ======================= HA STATUS: {{ inventory_hostname }} =======================
          {{ ha_result.stdout }}