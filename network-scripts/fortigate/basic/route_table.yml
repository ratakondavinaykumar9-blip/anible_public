# FortiGate Route Table Verification Playbook
# This playbook retrieves the routing table to ensure network visibility.
# It adheres to NetLearner standards for idempotency, observability, and error handling.
- name: FortiGate Route Table Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve the active routing table from FortiOS
      # Using FQCN for consistent network CLI interaction across FortiOS versions.
      ansible.netcommon.cli_command:
        command: "get router info routing-table all"
      register: routes_result
      # IDEMPOTENCY: Read-only commands must explicitly report no changes (changed_when: false).
      changed_when: false
      # ERROR HANDLING: Guard against empty responses or CLI execution failures.
      failed_when: 
        - routes_result.stdout | length == 0
        - "'Command fail' in routes_result.stdout"

    - name: Validate captured routing data integrity
      # OBSERVABILITY: Assert ensures that the output contains expected routing headers (Codes:).
      ansible.builtin.assert:
        that:
          - "'Codes:' in routes_result.stdout"
        fail_msg: "Failed to retrieve a valid routing table. Expected 'Codes:' header is missing."
        success_msg: "Routing table successfully retrieved and validated."

    - name: Display the formatted routing table
      # DOCUMENTATION: Outputting the results for operator review and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ROUTE TABLE =======================
          {{ routes_result.stdout }}