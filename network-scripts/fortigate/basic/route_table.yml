---
- name: FortiGate Route Table Retrieval
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve full routing table from FortiGate CLI
      # Why: Fetches the current Routing Information Base (RIB) for operational visibility.
      # Idempotency: This is a read-only command and is inherently safe for multiple executions.
      ansible.netcommon.cli_command:
        command: get router info routing-table all
      register: fortigate_route_output
      # Error Handling: Fails if the command is unrecognized or the device returns a failure message.
      failed_when:
        - fortigate_route_output.failed
        - "'Unknown action' in fortigate_route_output.stdout or 'Command fail' in fortigate_route_output.stdout"

    - name: Validate routing table data integrity
      # Observability: Ensures the output is not empty and contains standard FortiOS routing headers.
      ansible.builtin.assert:
        that:
          - fortigate_route_output.stdout is defined
          - fortigate_route_output.stdout | length > 0
          - "'Codes:' in fortigate_route_output.stdout"
        fail_msg: "The routing table output is empty or the command returned an invalid response."
        quiet: true

    - name: Display formatted routing table
      # Observability: Provides a clear, human-readable summary of the routing state.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ROUTE TABLE =======================
          {{ fortigate_route_output.stdout }}