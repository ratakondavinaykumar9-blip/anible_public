# FortiGate Admin List - Expert Automation Baseline
# Standards: Idempotency, Observability, and FQCN Compliance
- name: Get Admin List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve system administrator configuration from FortiGate
      # Using FQCN (Fully Qualified Collection Name) for architectural consistency
      ansible.netcommon.cli_command:
        command: get system admin
      register: admin_output
      # Idempotency: Read-only commands must never report a "changed" status
      changed_when: false
      # Error Handling: Explicitly fail if the output is null or contains error strings
      failed_when: 
        - admin_output.stdout is not defined
        - admin_output.stdout | length == 0
        - "'error' in admin_output.stdout | lower"

    - name: Verify integrity of retrieved administrator data
      # Observability: Assertions ensure downstream tasks don't process garbage data
      ansible.builtin.assert:
        that:
          - "'admin' in admin_output.stdout"
          - "'access' in admin_output.stdout"
        fail_msg: "The retrieved output does not appear to be a valid admin list."
        success_msg: "Administrator list successfully validated."

    - name: Display formatted administrator details for audit
      # Observability: Human-readable output for real-time verification
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ADMINS =======================
          {{ admin_output.stdout }}
          ======================= END OF LIST ============================
---