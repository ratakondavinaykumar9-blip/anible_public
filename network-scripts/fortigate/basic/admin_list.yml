---
# Playbook: FortiGate Admin Retrieval
# Purpose: Securely retrieves and validates the list of administrators from FortiGate devices.
# This playbook is designed to be read-only (idempotent) and provides verification for automation pipelines.

- name: Get FortiGate Administrator List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system admin' command
      # Using FQCN for netcommon to ensure portability across different Ansible environments.
      ansible.netcommon.cli_command:
        command: "get system admin"
      register: admin_output
      # Idempotency: This is a read-only operation; ensure it never reports a 'changed' status.
      changed_when: false
      # Error Handling: Fail if the device returns common CLI error strings that might not trigger a non-zero exit code.
      failed_when: 
        - "'command parse error' in admin_output.stdout | lower"
        - "'unknown action' in admin_output.stdout | lower"

    - name: Verify administrator output integrity
      # Observability: Assert that the command returned data to prevent silent failures in downstream tasks.
      ansible.builtin.assert:
        that:
          - admin_output.stdout is defined
          - admin_output.stdout | length > 0
        fail_msg: "The command 'get system admin' returned no data or failed to execute properly."
        success_msg: "Administrator list successfully retrieved and validated."

    - name: Display formatted administrator list
      # Documentation: Providing a clear, formatted view for human operators in logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ADMINS =======================
          {{ admin_output.stdout }}
          ===============================================================