---
# FortiGate FDS License Retrieval and Verification
# This playbook retrieves the FortiGuard Distribution Service (FDS) license status.
# Monitoring FDS is critical to ensure the device receives timely security updates and signature database refreshes.
- name: Get FortiGate FDS License Status
  hosts: fortigate
  gather_facts: false  # Optimized: Standard system facts are not required for specific CLI queries

  tasks:
    - name: Retrieve FDS information via CLI
      # Use Fully Qualified Collection Name (FQCN) for reliability and best practices
      ansible.netcommon.cli_command:
        command: get system fds
      register: fds_result
      # Error Handling: Prevent execution from continuing if the command fails or is unsupported
      failed_when:
        - fds_result.rc != 0 or "Unknown action" in fds_result.stdout
      changed_when: false  # Idempotency: Retrieval of state does not modify the device configuration

    - name: Verify FDS data integrity
      # Observability: Ensure that the command returned meaningful content before proceeding
      ansible.builtin.assert:
        that:
          - fds_result.stdout is defined
          - fds_result.stdout | length > 0
        fail_msg: "FDS license data could not be retrieved or the output is empty."
        success_msg: "FDS license data successfully captured."

    - name: Display FDS License Summary
      # Provides clear visibility for operators during playbook execution and in job logs
      ansible.builtin.debug:
        msg: |
          ======================= FDS LICENSE STATUS =======================
          {{ fds_result.stdout }}

    - name: Evaluate License Validity
      # Observability: Check for presence of active service indicators in the output
      ansible.builtin.set_fact:
        has_active_license: "{{ 'Contract' in fds_result.stdout or 'Service' in fds_result.stdout }}"

    - name: Report License Warning
      # Best Practices: Surface potential issues (missing contracts) without necessarily breaking the automation flow
      ansible.builtin.debug:
        msg: "WARNING: Active service contract or license string not detected in FDS output. Manual verification recommended."
      when: not has_active_license