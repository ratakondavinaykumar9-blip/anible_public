---
# FortiGate FDS License Verification
# This playbook retrieves and validates the FortiGuard Distribution Service (FDS) license status.
# It adheres to NetLearner Architect standards for idempotency, observability, and robust error handling.
- name: Verify FortiGate FDS License Status
  hosts: fortigate
  gather_facts: false # Optimization: Disabling fact gathering as only CLI access is required

  tasks:
    - name: Retrieve FDS license information via CLI
      # Use Fully Qualified Collection Name (FQCN) for consistency and portability
      ansible.netcommon.cli_command:
        command: get system fds
      register: fds_output
      # Idempotency: Operational 'get' commands must never report a 'changed' state
      changed_when: false
      # Error Handling: Ensure the task fails if the command is unrecognized or returns an error string
      failed_when: 
        - fds_output.failed or "Unknown action" in fds_output.stdout
        - "'error' in fds_output.stdout | lower"

    - name: Validate the integrity of the FDS license data
      # Observability: Assert that the response is not empty and contains expected status keywords
      ansible.builtin.assert:
        that:
          - fds_output.stdout is defined
          - fds_output.stdout | length > 0
          - "'fds' in fds_output.stdout | lower"
        fail_msg: "FDS License data is missing or the command returned an invalid response."
        success_msg: "FDS License data successfully retrieved and verified."

    - name: Display formatted FDS License details
      # Observability: Providing structured output for auditing and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE FDS LICENSE =======================
          {{ fds_output.stdout }}
          =====================================================================
