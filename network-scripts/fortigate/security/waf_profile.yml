---
# FortiGate WAF Profile Audit Playbook
# This playbook retrieves and validates WAF profiles following NetLearner automation standards.
- name: Retrieve and Validate WAF Profiles
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve WAF profiles via CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN) for the network command module.
      # Idempotency: 'get' is a read-only operation and safe to execute repeatedly without state change.
      ansible.netcommon.cli_command:
        command: get firewall waf-profile
      register: waf_raw_data
      # Error Handling: Validate return code and ensure the command was understood by the device.
      failed_when:
        - waf_raw_data.rc != 0
        - "'command parse error' in waf_raw_data.stdout"

    - name: Verify WAF profile data integrity
      # Observability: Assert that the device returned valid data to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - waf_raw_data.stdout is defined
          - waf_raw_data.stdout | length > 0
          - "'waf-profile' in waf_raw_data.stdout"
        fail_msg: "Data Integrity Error: WAF profile output is empty or contains unexpected content."
        success_msg: "Data Integrity Verified: WAF profiles successfully retrieved."

    - name: Display WAF Profile Report
      # Documentation: Providing structured output for administrative review and audit trails.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          FORTIGATE WAF PROFILE AUDIT
          ===========================================================
          {{ waf_raw_data.stdout }}
          ===========================================================