---
# FortiGate WAF Profile Retrieval & Validation
# Author: NetLearner Architect
# Standards: Idempotent, Observable, Documented, Error-Handled, FQCN
- name: FortiGate WAF Profile Inspection
  hosts: fortigate
  gather_facts: false
  # Best Practice: Ensure play fails fast to prevent inconsistent audit results across the fleet
  any_errors_fatal: true

  tasks:
    - name: Retrieve WAF profile configuration via CLI
      # Documentation: Using 'get' to fetch operational state. 
      # Retrieval (read-only) operations are inherently idempotent.
      ansible.netcommon.cli_command:
        command: get firewall waf-profile
      register: waf_result
      # Error Handling: Catch CLI-level errors that don't trigger a non-zero exit code
      failed_when: >
        waf_result.failed or 
        "command parse error" in (waf_result.stdout | lower) or 
        "unknown command" in (waf_result.stdout | lower)

    - name: Validate WAF profile data observability
      # Observability: Assert that data integrity is maintained and content is non-empty
      ansible.builtin.assert:
        that:
          - waf_result.stdout is defined
          - waf_result.stdout | length > 0
        fail_msg: "CRITICAL: WAF Profile configuration could not be retrieved or is empty."
        success_msg: "OBSERVABILITY: WAF Profile data successfully validated."

    - name: Display WAF profile state for audit
      # Documentation: Formatting output for clear visibility in the automation log for security review
      ansible.builtin.debug:
        msg: |
          ======================= WAF PROFILE START =======================
          {{ waf_result.stdout }}
          ======================== WAF PROFILE END ========================
