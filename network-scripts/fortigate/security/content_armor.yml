---
# Architect: FortiGate Content Armor Configuration Audit
# Purpose: Retrieves the 'firewall profile-group' to audit security profiles applied to traffic.
# This playbook is idempotent as it performs read-only (GET) operations without changing state.

- name: Retrieve and Validate FortiGate Content Armor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch firewall profile-group configuration
      # Use Fully Qualified Collection Name (FQCN) for consistent module resolution
      ansible.netcommon.cli_command:
        command: get firewall profile-group
      register: armor_output
      # Error Handling: FortiOS may return a successful exit code even if the command sub-path is invalid.
      # We explicitly fail if the output contains common Fortinet error strings.
      failed_when:
        - armor_output.failed 
        - "Unknown action" in armor_output.stdout or "item not found" in armor_output.stdout

    - name: Assert configuration data integrity
      # Observability: Verify that the command returned meaningful data before finishing.
      # This ensures downstream automation or auditors aren't processing empty results.
      ansible.builtin.assert:
        that:
          - armor_output.stdout is defined
          - armor_output.stdout | length > 0
        fail_msg: "The 'firewall profile-group' configuration is empty or could not be retrieved."
        success_msg: "Content Armor configuration successfully validated."

    - name: Display Content Armor Audit Report
      # Observability: Format the output for better readability in logging and CI/CD consoles.
      ansible.builtin.debug:
        msg: |
          ======================= CONTENT ARMOR =======================
          {{ armor_output.stdout }}