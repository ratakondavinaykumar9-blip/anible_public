# FortiGate Content Armor Audit
# Purpose: Retrieves and validates the firewall profile-group configuration.
# This playbook is idempotent as it performs read-only operations.
- name: Get Content Armor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall profile-group configuration
      # Use FQCN for standard compliance and portability
      ansible.netcommon.cli_command:
        command: get firewall profile-group
      register: armor_output
      # Error Handling: Explicitly fail if the command is unrecognized or returns an error string
      failed_when:
        - armor_output.failed
        - "'Unknown' in armor_output.stdout or 'error' in armor_output.stdout.lower()"
      # Optimization: Ensure this runs even in check mode to provide meaningful feedback
      check_mode: false

    - name: Verify configuration integrity
      # Observability: Ensure the returned data contains expected profile-group markers
      ansible.builtin.assert:
        that:
          - "armor_output.stdout | length > 0"
          - "'profile-group' in armor_output.stdout"
        fail_msg: "Content Armor configuration data is missing or invalid."
        success_msg: "Content Armor configuration successfully validated."

    - name: Display formatted Content Armor status
      ansible.builtin.debug:
        msg: |
          ======================= CONTENT ARMOR =======================
          {{ armor_output.stdout }}