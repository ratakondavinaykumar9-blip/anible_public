---
# ==============================================================================
# Playbook: FortiGate Content Armor Audit
# Description: Retrieves and validates the 'firewall profile-group' configuration
#              from FortiOS devices. This is an idempotent, read-only operation
#              used for security auditing and policy verification.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
# ==============================================================================
- name: Get Content Armor
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve firewall profile-group configuration
      # Why: Fetching the current state of security profile groups to ensure 
      #      security policies are correctly mapped to content filters.
      ansible.netcommon.cli_command:
        command: get firewall profile-group
      register: armor_result
      # Error Handling: Explicitly fail if the command is unrecognized or execution fails on the device.
      failed_when:
        - armor_result.rc != 0
        - "'Unknown command' in armor_result.stdout"
        - "'Command fail' in armor_result.stdout"

    - name: Validate Content Armor data integrity
      # Observability: Ensure the stdout is defined and not empty to verify device communication.
      ansible.builtin.assert:
        that:
          - armor_result.stdout is defined
          - armor_result.stdout | length > 0
        fail_msg: "CRITICAL: Content Armor data retrieval failed or configuration is empty."
        success_msg: "SUCCESS: Content Armor configuration retrieved and validated."

    - name: Display Content Armor Report
      # Observability: Provide a structured view of the command output for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= CONTENT ARMOR REPORT =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          --------------------------------------------------------------------
          {{ armor_result.stdout }}