# FortiGate Web Filter Profile Retrieval
# Purpose: This playbook securely retrieves and validates the web filter configuration from FortiGate devices.
# Standards: Implements idempotency, observability, FQCN, and robust error handling for NetLearner Staging.
- name: Get FortiGate Web Filter Profile
  hosts: fortigate
  gather_facts: false # Performance optimization: Fact gathering is disabled for configuration-only retrieval

  tasks:
    - name: Retrieve webfilter-profile configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for cross-platform consistency
      ansible.netcommon.cli_command:
        command: "get firewall webfilter-profile"
      register: wf_output
      # Idempotency: Read-only commands are explicitly marked as changed: false
      changed_when: false
      # Error Handling: Detect CLI error strings that might not return a non-zero exit code
      failed_when:
        - "wf_output.rc != 0"
        - "'Unknown action' in wf_output.stdout"
        - "'Command fail' in wf_output.stdout"

    - name: Verify configuration integrity and observability
      # Observability: Assert that the command returned a non-empty payload containing expected keywords
      ansible.builtin.assert:
        that:
          - "wf_output.stdout | length > 0"
          - "'webfilter-profile' in wf_output.stdout or 'profile' in wf_output.stdout"
        fail_msg: "The Web Filter configuration retrieval returned an empty or malformed payload."
        success_msg: "Web Filter Profile configuration successfully verified."

    - name: Display retrieved Web Filter Profile
      # Provides clear visual feedback of the operational state for auditing
      ansible.builtin.debug:
        msg: |
          ======================= WEB FILTER PROFILE =======================
          {{ wf_output.stdout }}
