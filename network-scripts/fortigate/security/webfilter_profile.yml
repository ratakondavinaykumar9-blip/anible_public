---
# FortiGate Web Filter Profile Audit
# Standard: Idempotency is maintained as this is a read-only "get" operation.
- name: Retrieve Web Filter Profile
  hosts: fortigate
  gather_facts: false # Performance: Fact gathering is disabled for direct CLI interaction.

  tasks:
    - name: Get Web Filter Profile using CLI
      # Best Practices: Using Fully Qualified Collection Name (FQCN) for reliability.
      ansible.netcommon.cli_command:
        command: "get firewall webfilter-profile"
      register: wf_result
      # Error Handling: Catching common FortiOS CLI errors or empty responses to prevent false positives.
      failed_when:
        - "wf_result.stdout == ''"
        - "'Unknown command' in wf_result.stdout"
        - "'Command fail' in wf_result.stdout"

    - name: Assert that the profile was successfully retrieved
      # Observability: Verifying that the output contains actual configuration data.
      ansible.builtin.assert:
        that:
          - wf_result.stdout is defined
          - wf_result.stdout | length > 0
        fail_msg: "Audit Failed: No Web Filter Profile data was returned from the device."
        success_msg: "Audit Success: Web Filter Profile data successfully registered."

    - name: Display Web Filter Profile for manual review
      # Documentation: Providing a clear, formatted output for the user's log stream.
      ansible.builtin.debug:
        msg: |
          ======================= WEB FILTER PROFILE CONFIGURATION =======================
          {{ wf_result.stdout }}
          ================================================================================