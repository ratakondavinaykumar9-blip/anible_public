---
# NetLearner Staging: FortiGate IPS Profile Audit
# This playbook retrieves and validates the IPS profile configuration from a FortiGate device.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage.

- name: Audit FortiGate IPS Profiles
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve IPS profile configuration
      # Using FQCN for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: get firewall ipsprofile
      register: ips_output
      # Error Handling: Fail if the command returns a parser error or common failure string
      failed_when: 
        - ips_output.failed or "command parse error" in ips_output.stdout | lower
        - "unknown command" in ips_output.stdout | lower

    - name: Validate IPS configuration response
      # Observability: Ensure the output is not empty and contains expected profile headers
      ansible.builtin.assert:
        that:
          - ips_output.stdout is defined
          - ips_output.stdout | length > 0
          - "'name'" in ips_output.stdout
        fail_msg: "IPS Profile data was empty or malformed. Verification failed."
        success_msg: "IPS Profile data successfully retrieved and validated."

    - name: Display formatted IPS profile data
      # Observability: Provide clear visibility into the current security posture
      ansible.builtin.debug:
        msg: |
          ======================= IPS PROFILE STATE =======================
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          OUTPUT:
          {{ ips_output.stdout }}
