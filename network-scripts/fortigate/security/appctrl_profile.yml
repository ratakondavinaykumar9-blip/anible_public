# FortiGate Application Control Profile Status Audit
# Purpose: Retrieves the current configuration state of Application Control profiles.
# This ensures visibility into the security posture without modifying the device state (Idempotent).
- name: Audit FortiGate Application Control
  hosts: fortigate
  gather_facts: false # Facts disabled for performance; connection is verified via cli_command

  tasks:
    - name: Retrieve application control configuration via CLI
      # Using FQCN for cross-platform network automation standards
      ansible.netcommon.cli_command:
        command: get firewall appctrl
      register: app_result
      # Error Handling: Ensure the task fails if the device returns an error string or fails to respond
      failed_when: 
        - app_result.failed or "Unknown action" in app_result.stdout
      ignore_errors: false

    - name: Validate data observability and integrity
      # Observability: Verify that the device returned a non-empty configuration set
      ansible.builtin.assert:
        that:
          - app_result.stdout is defined
          - app_result.stdout | length > 0
        fail_msg: "Failed to retrieve valid Application Control data from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved Application Control data from {{ inventory_hostname }}."

    - name: Log Application Control state for architectural review
      # Documentation: Providing a clear, formatted output of the current security state
      ansible.builtin.debug:
        msg: |
          ======================= APP CONTROL AUDIT =======================
          Device: {{ inventory_hostname }}
          Status: Success
          Config Output:
          {{ app_result.stdout }}