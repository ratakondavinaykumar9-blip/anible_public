---
# FortiGate Application Control Profile Audit
# Purpose: This playbook retrieves and validates the Application Control profiles 
# from the FortiGate firewall to ensure configuration visibility and state audit.
- name: Get App Control Profile
  hosts: fortigate
  gather_facts: false # Optimization: Disabling fact gathering as it is not required for CLI command execution.

  tasks:
    - name: Retrieve application control profiles via CLI
      # FQCN: Using the fully qualified collection name for clarity and consistency.
      # Idempotency: This task is read-only; running it multiple times will not change the device state.
      ansible.netcommon.cli_command:
        command: "get firewall appctrl-list"
      register: app_control_res
      # Error Handling: Explicitly check for non-zero return codes or common failure strings.
      failed_when:
        - app_control_res.rc != 0
        - "'Unknown command' in app_control_res.stdout"
        - "'Command fail' in app_control_res.stdout"

    - name: Validate application control data integrity
      # Observability: Using assertions to verify that the retrieved output is not empty.
      ansible.builtin.assert:
        that:
          - app_control_res.stdout is defined
          - app_control_res.stdout | length > 0
        fail_msg: "Failed to retrieve application control profiles or the configuration is empty."
        success_msg: "Successfully retrieved and validated application control configuration."

    - name: Display Application Control Profiles
      # Documentation: Providing a clean, formatted view of the retrieved operational state.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE APP CONTROL =======================
          {{ app_control_res.stdout }}