---
# Playbook: FortiGate Email Filter Configuration Retrieval
# Purpose: Safely fetches the email filter profile for state verification and auditing.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, and Robust Error Handling.

- name: Retrieve and Validate FortiGate Email Filter
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch email filter profile configuration via CLI
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for consistency
      ansible.netcommon.cli_command:
        command: get firewall emailfilter-profile
      register: email_output
      # Idempotency: This is a read-only command and does not modify device state.
      # Error Handling: Fail explicitly if the CLI returns an error or unknown command message.
      failed_when: 
        - email_output.failed | default(false)
        - "'unknown' in email_output.stdout | lower or 'error' in email_output.stdout | lower"

    - name: Validate successful retrieval of configuration
      # Observability: Use assertions to verify that the response contains valid data.
      ansible.builtin.assert:
        that:
          - "email_output.stdout is defined"
          - "email_output.stdout | length > 0"
        fail_msg: "The email filter profile could not be retrieved or the output is empty."
        success_msg: "Email filter profile successfully retrieved and validated."

    - name: Display formatted Email Filter Details
      # Documentation: Provide a clear, human-readable view of the retrieved state.
      ansible.builtin.debug:
        msg: |
          ======================= EMAIL FILTER PROFILE =======================
          {{ email_output.stdout }}