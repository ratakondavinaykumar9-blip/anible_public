# Playbook: FortiGate Email Filter Profile Inspection
# Description: Safely retrieves and validates email filter configuration via CLI.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Comments), Error Handling, FQCN.
- name: FortiGate Email Filter Management
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve email filter profiles from FortiGate
      # Using cli_command is idempotent as it is a read-only operation.
      # FQCN used: ansible.netcommon.cli_command
      ansible.netcommon.cli_command:
        command: "get emailfilter profile"
      register: email_filter_output
      # Error Handling: Fail if 'Command fail' or other FortiOS errors appear in stdout.
      failed_when: 
        - email_filter_output.failed or "Command fail" in email_filter_output.stdout
        - "'Unknown action' in email_filter_output.stdout"

    - name: Verify email filter profile retrieval success
      # Observability: Assert that we received non-empty output to ensure state visibility.
      ansible.builtin.assert:
        that:
          - "email_filter_output.stdout is defined"
          - "email_filter_output.stdout | length > 0"
        fail_msg: "Failed to retrieve valid email filter profile configuration. Output was empty or invalid."
        success_msg: "Successfully retrieved email filter profile configuration."

    - name: Display formatted email filter configuration
      # Documentation: Providing clear visibility into the state for audit trails.
      # FQCN used: ansible.builtin.debug
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE EMAIL FILTER =======================
          HOST: {{ inventory_hostname }}
          STATE: Operational
          ----------------------- CONFIGURATION START -----------------------
          {{ email_filter_output.stdout }}
          ------------------------ CONFIGURATION END ------------------------