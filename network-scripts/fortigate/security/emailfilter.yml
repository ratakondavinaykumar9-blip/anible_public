---
- name: FortiGate Email Filter Profile Retrieval
  hosts: fortigate
  gather_facts: false
  # This playbook retrieves the firewall email filter profile configuration.
  # It is designed to be idempotent (read-only) and includes validation checks.

  tasks:
    - name: Retrieve email filter profile configuration via CLI
      # Use FQCN (Fully Qualified Collection Name) for the cli_command module.
      # This task captures the current state without modification, ensuring idempotency.
      ansible.netcommon.cli_command:
        command: "get firewall emailfilter-profile"
      register: email_profile_output
      # Error Handling: Ensure the command was accepted and did not return a CLI error.
      failed_when:
        - email_profile_output.failed or "Command fail" in email_profile_output.stdout
        - "'Unknown action' in email_profile_output.stdout"

    - name: Validate configuration retrieval success
      # Observability: Verify that the output is populated and contains expected data.
      ansible.builtin.assert:
        that:
          - email_profile_output.stdout is defined
          - email_profile_output.stdout | length > 0
        fail_msg: "Failed to retrieve the email filter profile or the output was empty."
        success_msg: "Successfully retrieved and validated the email filter profile configuration."

    - name: Display email filter configuration
      # Documentation: Output the results for audit and visibility purposes.
      ansible.builtin.debug:
        msg: |
          ======================= EMAIL FILTER PROFILE =======================
          {{ email_profile_output.stdout }}