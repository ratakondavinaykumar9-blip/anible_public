---
# FortiGate IPS Global Configuration Retrieval
# Standards: Idempotent (Read-only), Observable (Assertions), Documented
- name: Retrieve and Verify FortiGate IPS Global State
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch IPS global settings from FortiGate
      # Using FQCN (Fully Qualified Collection Name) for consistency and portability
      ansible.netcommon.cli_command:
        command: get global firewall ipsglobal
      register: ips_global_raw
      # Error Handling: Catch FortiOS-specific command execution failures that return 0 but indicate error in stdout
      failed_when:
        - ips_global_raw.failed
        - "'Unknown action' in ips_global_raw.stdout"
        - "'Command fail' in ips_global_raw.stdout"
      # Idempotency: Explicitly mark read-only commands as 'changed: false'
      changed_when: false

    - name: Validate retrieval of IPS configuration
      # Observability: Assert that the command returned data to ensure state visibility
      ansible.builtin.assert:
        that:
          - ips_global_raw.stdout is defined
          - ips_global_raw.stdout | length > 0
        fail_msg: "IPS Global configuration could not be retrieved or the output is empty."
        success_msg: "Successfully validated IPS Global configuration retrieval."

    - name: Display retrieved IPS Global configuration
      # Documentation: Format output for clear operational audit and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= IPS GLOBAL STATE =======================
          {{ ips_global_raw.stdout }}