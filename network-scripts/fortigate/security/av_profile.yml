---
# Playbook: FortiGate Antivirus Profile Retrieval
# Standards: Idempotency (Read-only), Observability (Assert), Best Practices (FQCN)
# Purpose: This playbook retrieves the current AV profile configuration for auditing purposes.

- name: Retrieve and Validate AV Profiles
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch Antivirus Profile data via CLI
      # Use FQCN for cross-platform network CLI consistency.
      # Captured output is registered for subsequent validation and observability.
      ansible.netcommon.cli_command:
        command: "get firewall avprofile"
      register: av_result
      # Error Handling: Explicitly detect device-side error strings that may not trigger a standard failure.
      failed_when:
        - av_result.failed or "Unknown action" in av_result.stdout or "Command fail" in av_result.stdout

    - name: Verify data integrity of retrieved AV profiles
      # Observability: Ensure that the command execution resulted in meaningful configuration data.
      ansible.builtin.assert:
        that:
          - av_result.stdout is defined
          - av_result.stdout | length > 0
        fail_msg: "The FortiGate device returned no Antivirus profile information."
        success_msg: "Antivirus profile configuration successfully retrieved and validated."

    - name: Display retrieved Antivirus Profile details
      # Documentation: Format the output for clear visibility in automation logs and audit trails.
      # This read-only task ensures idempotency by not modifying device state.
      ansible.builtin.debug:
        msg: |
          ======================= START AV PROFILE =======================
          {{ av_result.stdout }}
          ======================= END AV PROFILE =========================