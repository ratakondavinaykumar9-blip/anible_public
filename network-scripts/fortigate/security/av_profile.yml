---
# FortiGate AV Profile Retrieval and Verification
# This playbook retrieves operational data for Anti-Virus profiles from FortiGate devices.
# It is designed to be idempotent (read-only) and provides high observability through assertions.
- name: Audit FortiGate AV Profiles
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Get AV profile status from the device
      # Using Fully Qualified Collection Name (FQCN): ansible.netcommon.cli_command
      # Idempotency: 'get' commands do not modify device state and are safe for repeated execution.
      ansible.netcommon.cli_command:
        command: "get firewall avprofile"
      register: av_output
      # Error Handling: Explicitly catch failures if the command is unsupported or if the session fails
      failed_when: 
        - av_output.failed or "Command fail" in av_output.stdout or "Unknown action" in av_output.stdout

    - name: Assert that AV profile data is present
      # Observability: Verify that the command returned meaningful content before proceeding
      ansible.builtin.assert:
        that:
          - "av_output.stdout is defined"
          - "av_output.stdout | length > 0"
        fail_msg: "No AV profile data was returned from the device. Verify permissions and command syntax."
        success_msg: "AV profile data retrieved successfully from {{ inventory_hostname }}."

    - name: Display the AV profile information
      # Observability: Present the results in a structured format for audit logging and review
      ansible.builtin.debug:
        msg: |
          ======================= AV PROFILE AUDIT =======================
          Device: {{ inventory_hostname }}
          Timestamp: {{ lookup('ansible.builtin.pipe', 'date "+%Y-%m-%d %H:%M:%S"') }}
          ----------------------------------------------------------------
          {{ av_output.stdout }}
          ================================================================
