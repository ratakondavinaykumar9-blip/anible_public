---
# Playbook: FortiGate IPS Signatures Retrieval
# Purpose: Fetches and displays IPS signature diagnostic data from FortiGate devices.
# Standards: Implements idempotency (read-only), observability via assertions, and FQCN usage.
- name: Get IPS Signatures
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Run IPS signature diagnostic command
      # Use FQCN for the network CLI module to ensure consistency across environments
      ansible.netcommon.cli_command:
        command: diagnose ips signature
      register: sig_output
      # Idempotency: Diagnostic commands are read-only; mark changed_when: false to prevent false positives in reporting
      changed_when: false
      # Error Handling: Fail explicitly if the command is unrecognized or returns no data
      failed_when:
        - sig_output.stdout == ""
        - "'Unknown command' in sig_output.stdout"
        - "'Command fail' in sig_output.stdout"

    - name: Verify signature data integrity
      # Observability: Assert that the captured output contains data before proceeding
      ansible.builtin.assert:
        that:
          - sig_output.stdout is defined
          - sig_output.stdout | length > 0
        fail_msg: "Observability Error: The IPS signature command returned no output or is undefined."
        success_msg: "Observability Success: IPS signature data successfully captured."

    - name: Display IPS signature details
      # Documentation: Formatted output for operator clarity
      ansible.builtin.debug:
        msg: |
          ======================= IPS SIGNATURES =======================
          {{ sig_output.stdout }}