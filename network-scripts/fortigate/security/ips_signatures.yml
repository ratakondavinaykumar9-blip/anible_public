---
# FortiGate IPS Signatures - Standard:
# This playbook retrieves and validates IPS signature status from FortiGate devices.
# Adheres to high-availability and observability standards for network automation.
- name: FortiGate IPS Signature Management
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve IPS signature diagnostic data
      # FQCN: Using ansible.netcommon.cli_command for cross-platform compatibility
      # Idempotency: diagnose commands are read-only and safe for repeated execution
      ansible.netcommon.cli_command:
        command: diagnose ips signature
      register: ips_sig_output
      # Error Handling: Catch internal FortiOS failures that may return a status 0 but contain error text
      failed_when: 
        - ips_sig_output.failed or "Command fail" in ips_sig_output.stdout or "Unknown action" in ips_sig_output.stdout

    - name: Validate IPS signature data integrity
      # Observability: Ensure the command returned meaningful content to prevent silent failures
      ansible.builtin.assert:
        that:
          - ips_sig_output.stdout is defined
          - ips_sig_output.stdout | length > 0
        fail_msg: "IPS signature data could not be retrieved or the output is empty."
        success_msg: "IPS signature data successfully captured and validated."

    - name: Display formatted IPS signature report
      # Documentation: Providing clear, structured visibility into the device state
      ansible.builtin.debug:
        msg: |
          ======================= IPS SIGNATURE REPORT =======================
          Host: {{ inventory_hostname }}
          Timestamp: {{ lookup('pipe', 'date +%Y-%m-%d\ %H:%M:%S') }}
          ====================================================================
          {{ ips_sig_output.stdout }}