# FortiGate IPS Signature Audit
# Purpose: Retrieves current IPS signature status to verify security engine health and signature synchronization.
- name: Get IPS Signatures
  hosts: fortigate
  gather_facts: false # Performance: FortiOS devices do not support standard Linux fact gathering.

  tasks:
    - name: Retrieve IPS signature status via CLI
      # Use FQCN (ansible.netcommon) for standardized network command execution.
      ansible.netcommon.cli_command:
        command: diagnose ips signature list
      register: sig_output
      # Idempotency: Diagnostic commands are read-only and must never trigger a 'changed' state.
      changed_when: false
      # Error Handling: Fail explicitly if the command is unrecognized or returns an error string.
      failed_when: 
        - sig_output.failed or "Command fail" in sig_output.stdout

    - name: Validate IPS signature data integrity
      # Observability: Assert that the command returned non-empty content to ensure audit validity.
      ansible.builtin.assert:
        that:
          - sig_output.stdout is defined
          - sig_output.stdout | length > 0
        fail_msg: "IPS signature data could not be retrieved or the buffer is empty."
        success_msg: "IPS signature data successfully validated for processing."

    - name: Display formatted IPS signature report
      # Observability: Provide a structured view of the output for the job logs.
      ansible.builtin.debug:
        msg: |
          ======================= IPS SIGNATURES =======================
          {{ sig_output.stdout }}
---