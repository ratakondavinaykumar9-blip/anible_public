---
- name: Audit and Verify FortiGate DNS Filter Profiles
  hosts: fortigate
  gather_facts: false
  # Connection should be established via network_cli for FortiOS CLI interactions
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve current DNS filter profile configuration
      # Using FQCN for modularity and following Ansible best practices.
      # This task is idempotent as it only retrieves (GET) the current state without modification.
      ansible.netcommon.cli_command:
        command: get firewall dnsfilter-profile
      register: dns_profile_raw
      # Error Handling: We verify the return code and check for common FortiOS CLI error strings.
      # This prevents the playbook from continuing if the command is unrecognized or the feature is disabled.
      failed_when: 
        - dns_profile_raw.rc != 0
        - "'unknown' in dns_profile_raw.stdout or 'error' in dns_profile_raw.stdout"

    - name: Validate observability of DNS filter data
      # Observability: Using assertions to ensure the registered variable contains valid data.
      # This ensures that we aren't processing empty strings in downstream automation.
      ansible.builtin.assert:
        that:
          - dns_profile_raw.stdout is defined
          - dns_profile_raw.stdout | length > 0
        fail_msg: "The DNS Filter Profile could not be retrieved or the output is unexpectedly empty."
        success_msg: "DNS Filter Profile successfully captured and verified."

    - name: Display formatted DNS Filter Profile for auditing
      # Documentation: Providing a structured view of the output for audit logs and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ==================================================================
          FORTIGATE DNS FILTER PROFILE REPORT
          ==================================================================
          Target Host: {{ inventory_hostname }}
          Capture Time: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          ------------------------------------------------------------------
          {{ dns_profile_raw.stdout }}
          ==================================================================