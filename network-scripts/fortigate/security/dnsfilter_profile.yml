---
# NetLearner Architect Standardized Playbook
# Objective: Retrieve and validate FortiGate DNS Filter Profiles
# Note: This retrieval operation is read-only and inherently idempotent.

- name: FortiGate DNS Filter Profile Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve DNS filter profile configuration
      # Best Practice: Use FQCN for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: get firewall dnsfilter-profile
      register: dns_result
      # Error Handling: Fail if the output indicates a syntax error or missing entry
      failed_when: 
        - dns_result.failed or "Unknown action" in dns_result.stdout or "Command fail" in dns_result.stdout

    - name: Validate DNS profile data integrity
      # Observability: Assert that the output contains expected configuration keys
      ansible.builtin.assert:
        that:
          - dns_result.stdout is defined
          - dns_result.stdout | length > 0
          - "'dnsfilter-profile' in dns_result.stdout"
        fail_msg: "DNS Filter profile retrieval failed or returned unexpected data."
        success_msg: "DNS Filter profile successfully retrieved and validated."

    - name: Display DNS Filter Profile Details
      # Documentation: Provide a clear view of the operational state for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= DNS FILTER PROFILE =======================
          {{ dns_result.stdout }}
