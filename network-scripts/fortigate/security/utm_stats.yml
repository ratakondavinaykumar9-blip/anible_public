---
# FortiGate UTM Statistics Gathering
# This playbook retrieves and displays UTM statistics from FortiGate devices.
# Standards: Idempotency (read-only), Observability (asserts), and FQCN usage.

- name: FortiGate UTM Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve UTM statistics from the device
      # FQCN: Using the network common collection for standardized CLI interactions.
      ansible.netcommon.cli_command:
        command: get system siteresult
      register: utm_stats
      # Idempotency: Setting changed_when to false as this is a non-mutating "get" operation.
      changed_when: false
      # Error Handling: Fail if the module reports failure or if the output contains error strings.
      failed_when: >
        utm_stats.failed or 
        "Unknown command" in utm_stats.stdout or 
        "Command fail" in utm_stats.stdout

    - name: Validate UTM response integrity
      # Observability: Ensure the captured output is defined and contains data before proceeding.
      ansible.builtin.assert:
        that:
          - utm_stats.stdout is defined
          - utm_stats.stdout | length > 0
        fail_msg: "Data validation failed: UTM statistics output is empty or undefined."
        success_msg: "Data validation passed: UTM statistics output is populated."

    - name: Display captured UTM statistics
      # Observability: Providing a clear, formatted view of the command output.
      ansible.builtin.debug:
        msg: |
          ======================= UTM STATS =======================
          {{ utm_stats.stdout }}