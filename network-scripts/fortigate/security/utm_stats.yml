---
# Playbook: FortiGate UTM Statistics Collection
# Purpose: Safely retrieves and validates UTM (Unified Threat Management) site results from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN (Fully Qualified Collection Names).
- name: Get UTM Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve UTM statistics from FortiGate CLI
      # This operation is inherently idempotent as it retrieves operational data without modifying device state.
      ansible.netcommon.cli_command:
        command: get system siteresult
      register: utm_result
      # Error Handling: Ensure we fail if the command is unrecognized or if the session lacks permissions.
      failed_when:
        - utm_result.failed or "Command fail" in utm_result.stdout or "Unknown action" in utm_result.stdout

    - name: Validate UTM statistics response integrity
      # Observability: Verify that the output is defined and contains data before reporting.
      ansible.builtin.assert:
        that:
          - utm_result.stdout is defined
          - utm_result.stdout | length > 0
        fail_msg: "UTM statistics retrieval failed: The device returned an empty or invalid response."
        success_msg: "UTM statistics successfully captured and verified."

    - name: Display formatted UTM Statistics
      # Provides a clean observability interface for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= UTM STATS =======================
          {{ utm_result.stdout }}