# FortiGate UTM Statistics Collection and Verification
# Purpose: Retrieves site categorization and UTM performance metrics for network auditing.
- name: Get UTM Stats
  hosts: fortigate
  gather_facts: false # Best Practice: Disabling fact gathering for specialized network CLI tasks

  tasks:
    - name: Execute 'get system siteresult' command via CLI
      # Standard: Best Practices - Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: get system siteresult
      register: utm_output
      # Standard: Error Handling - Explicitly catching FortiOS-specific CLI execution errors
      failed_when:
        - utm_output.failed or "Command fail" in utm_output.stdout or "Unknown action" in utm_output.stdout
      # Standard: Idempotency - Ensuring 'get' operations never report a 'changed' state
      changed_when: false

    - name: Verify integrity of retrieved UTM data
      # Standard: Observability - Using assertions to ensure the output is populated and valid
      ansible.builtin.assert:
        that:
          - utm_output.stdout is defined
          - utm_output.stdout | length > 0
        fail_msg: "Critical Failure: The UTM statistics command returned an empty or invalid response."
        success_msg: "Observability Check: UTM statistics successfully retrieved and validated."

    - name: Display formatted UTM performance statistics
      # Standard: Documentation - Clear, formatted output for human readability in monitoring logs
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE UTM PERFORMANCE =======================
          {{ utm_output.stdout }}
          ======================= END OF STATISTICS ===============================