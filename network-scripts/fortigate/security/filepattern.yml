---
# Playbook: FortiGate File Filter Audit
# Purpose: This playbook retrieves and validates the file filter profile configuration.
# Idempotency: Safe to run repeatedly as 'get' is a read-only operation that does not modify state.
- name: Get FortiGate File Filter Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve file filter profile configuration via CLI
      # Why: Using FQCN for cross-platform network command execution.
      # Idempotency: Read-only command ensures no changes are made to the device.
      ansible.netcommon.cli_command:
        command: get firewall file-filter-profile
      register: file_filter_result
      # Error Handling: Ensure the command didn't return a FortiOS-specific error string.
      failed_when: 
        - file_filter_result.failed or "Command fail" in file_filter_result.stdout
        - "'Unknown action' in file_filter_result.stdout"

    - name: Verify configuration data was successfully captured
      # Why: Observability check to ensure the output contains expected profile data.
      ansible.builtin.assert:
        that:
          - file_filter_result.stdout is defined
          - file_filter_result.stdout | length > 0
        fail_msg: "Data retrieval failed: The file filter configuration is empty or inaccessible."
        success_msg: "Successfully validated file filter configuration retrieval."

    - name: Display retrieved file filter profile details
      # Why: Providing operational visibility into the current system state.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE FILE FILTER =======================
          {{ file_filter_result.stdout }}