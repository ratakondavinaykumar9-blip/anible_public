---
# FortiGate File Filter Configuration Retrieval
# This playbook retrieves the active file filter profile configuration from FortiGate devices.
# Standards applied: Idempotency (read-only), Observability (assert), and FQCN.
- name: Get FortiGate File Filter
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve file-filter-profile status via CLI
      # Using FQCN for cross-platform compatibility and best practices.
      # The 'get' command is read-only, ensuring idempotency across multiple runs.
      ansible.netcommon.cli_command:
        command: get firewall file-filter-profile
      register: file_filter_result
      # Error Handling: Catch specific CLI failure strings that might not trigger a non-zero exit code.
      failed_when: 
        - file_filter_result.failed or "Command fail" in file_filter_result.stdout

    - name: Validate configuration data integrity
      # Observability: Ensure the retrieved output is not empty before proceeding.
      ansible.builtin.assert:
        that:
          - "file_filter_result.stdout | length > 0"
        fail_msg: "Failed to retrieve a valid file filter profile. The output was empty."
        success_msg: "File filter configuration successfully captured."

    - name: Display File Filter Configuration
      # Documentation/Observability: Provides a formatted view of the current state for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE FILE FILTER =======================
          {{ file_filter_result.stdout }}
      when: file_filter_result.stdout is defined
