# FortiGate Interface List Management
# This playbook retrieves and validates the system interface status from a FortiGate device.
- name: Get FortiGate Interface List
  hosts: fortigate
  gather_facts: false # Performance: FortiOS devices do not support standard Ansible fact gathering

  tasks:
    - name: Retrieve interface status via CLI
      # Best Practice: Use Fully Qualified Collection Names (FQCN)
      # Idempotency: Operation is read-only; 'changed_when: false' ensures the task remains neutral
      ansible.netcommon.cli_command:
        command: get system interface
      register: intf_result
      changed_when: false
      # Error Handling: Validate return code and check for common CLI execution errors
      failed_when:
        - intf_result.rc != 0
        - "'command fail' in intf_result.stdout | lower"

    - name: Validate interface data integrity
      # Observability: Ensure the output is not empty and contains expected structural keywords
      ansible.builtin.assert:
        that:
          - intf_result.stdout is defined
          - intf_result.stdout | length > 0
          - "'interface' in intf_result.stdout | lower or 'type' in intf_result.stdout | lower"
        fail_msg: "Interface data retrieval failed or returned unexpected content."
        success_msg: "Interface data successfully validated."

    - name: Display formatted interface summary
      # Observability: Provide a clear, human-readable view of the operational state
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACES [{{ inventory_hostname }}] =======================
          {{ intf_result.stdout }}