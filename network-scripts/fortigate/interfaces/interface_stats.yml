---
# FortiGate Interface Statistics - Production Grade
# This playbook retrieves low-level netlink interface statistics from FortiGate devices.
# It is designed to be idempotent (read-only), observable, and follows FQCN standards.

- name: Get Interface Stats
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve netlink interface list statistics
      # FQCN used: ansible.netcommon.cli_command.
      # This operation is read-only and thus inherently idempotent.
      ansible.netcommon.cli_command:
        command: diagnose netlink interface list
      register: stats
      # Error Handling: Fail if the command returns an error string or fails to execute.
      failed_when: 
        - stats.failed
        - "'unknown command' in stats.stdout.lower()"

    - name: Validate statistics retrieval
      # Observability: Ensure the output contains expected keywords and is not empty.
      ansible.builtin.assert:
        that:
          - "stats.stdout is defined"
          - "stats.stdout | length > 0"
          - "'ifname=' in stats.stdout"
        fail_msg: "The 'diagnose' command failed to return valid interface statistics."
        success_msg: "Interface statistics successfully retrieved and validated."

    - name: Display formatted interface statistics
      # Providing a structured view for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE STATS =======================
          {{ stats.stdout }}
          ===============================================================