# FortiGate Operational Monitoring: Interface Statistics Retrieval
# Purpose: This playbook captures low-level kernel interface (netlink) statistics.
# It is used for deep-dive interface troubleshooting where standard stats are insufficient.
- name: Get FortiGate Interface Statistics
  hosts: fortigate
  gather_facts: false # Optimization: Standard facts are not required for this diagnostic task

  tasks:
    - name: Retrieve netlink interface list and statistics
      # FQCN used: ansible.netcommon.cli_command is idempotent for read-only operations
      ansible.netcommon.cli_command:
        command: diagnose netlink interface list
      register: stats
      # Error Handling: Ensure we catch cases where the command might be unsupported or fail silently
      failed_when:
        - stats.stdout == ""
        - "'Command fail' in stats.stdout"
        - "'Unknown command' in stats.stdout"

    - name: Validate diagnostic data observability
      # Observability: Verify that the command returned meaningful network stack data
      ansible.builtin.assert:
        that:
          - stats.stdout is defined
          - "'ifindex' in stats.stdout" # Reliable marker for valid netlink data structure
        fail_msg: "Incomplete data retrieved from {{ inventory_hostname }}. Statistics may be unavailable."
        success_msg: "Verified: Diagnostic statistics successfully captured for {{ inventory_hostname }}."

    - name: Display formatted interface statistics
      # Best Practice: Use debug to output data to the console for human verification
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE INTERFACE STATS =======================
          DEVICE: {{ inventory_hostname }}
          {{ stats.stdout }}