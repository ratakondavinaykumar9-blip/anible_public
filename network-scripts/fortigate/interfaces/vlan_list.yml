---
- name: Get FortiGate VLAN List
  hosts: fortigate
  gather_facts: false
  # Using gather_facts: false to speed up execution since we only need CLI access.

  tasks:
    - name: Execute 'get system vlan' on FortiGate
      # ansible.netcommon.cli_command is used for generic CLI interaction.
      # This operation is inherently idempotent as it is read-only.
      ansible.netcommon.cli_command:
        command: get system vlan
      register: vlan_result
      # Error Handling: Explicitly fail if the output contains common FortiOS error strings.
      failed_when: 
        - vlan_result.failed or "Command fail" in vlan_result.stdout
        - "'Unknown action' in vlan_result.stdout"

    - name: Validate VLAN output integrity
      # Observability: Ensure the command returned meaningful data before attempting to display it.
      ansible.builtin.assert:
        that:
          - vlan_result.stdout is defined
          - vlan_result.stdout | length > 0
        fail_msg: "The VLAN list returned was empty or undefined."
        success_msg: "VLAN list successfully retrieved and validated."

    - name: Display formatted VLAN information
      # Providing clear visibility into the operational state of the network device.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE VLAN LIST =======================
          {{ vlan_result.stdout }}