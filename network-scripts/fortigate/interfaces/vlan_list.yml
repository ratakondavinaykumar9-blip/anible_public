---
# FortiGate VLAN Retrieval and Validation
# This playbook provides a safe, idempotent method to audit VLAN interfaces.
# It includes health checks to verify the management session is valid and returns data.
- name: Get FortiGate VLAN List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute VLAN retrieval command
      # Retrieves operational state of VLAN interfaces using FQCN.
      # 'get system vlan' provides the operational summary in FortiOS.
      ansible.netcommon.cli_command:
        command: "get system vlan"
      register: vlan_result
      # Read-only operations are inherently idempotent.
      # 'failed_when' ensures the task stops if the command returns an error or unknown response.
      failed_when:
        - vlan_result.rc != 0
        - "'Unknown' in vlan_result.stdout"

    - name: Validate VLAN data observability
      # Verification step to ensure the result is actionable before display.
      ansible.builtin.assert:
        that:
          - "vlan_result.stdout is defined"
          - "vlan_result.stdout | length > 0"
        fail_msg: "VLAN retrieval failed: CLI response was empty or invalid."
        quiet: true

    - name: Display VLAN Inventory
      # Formats raw CLI output for NetLearner audit logs and observability.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE VLANS =======================
          Host: {{ inventory_hostname }}
          Status: Success
          ===============================================================
          {{ vlan_result.stdout }}
