---
# FortiGate Loopback Interface Audit and Verification
# Purpose: Retrieves loopback interface configuration with enhanced observability and error handling.
- name: Audit Loopback Interfaces
  hosts: fortigate
  gather_facts: false # Performance: Disable standard fact gathering as we are performing a targeted CLI audit.

  tasks:
    - name: Retrieve loopback configuration from FortiGate CLI
      # Using FQCN (Fully Qualified Collection Name) for network common commands.
      # Idempotency: This is a read-only command and safe to run repeatedly without changing state.
      ansible.netcommon.cli_command:
        command: get system loopback
      register: lb_data
      # Error Handling: Explicitly fail if the command is unrecognized or if the connection is lost.
      failed_when: 
        - lb_data.failed or "Unknown action" in lb_data.stdout

    - name: Verify data observability and integrity
      # Observability: Assert that the 'register' variable contains the expected stdout structure.
      ansible.builtin.assert:
        that:
          - "lb_data.stdout is defined"
          - "lb_data.stdout is string"
        fail_msg: "Audit failed: CLI output was not captured correctly or returned an invalid format."
        success_msg: "Audit success: Loopback interface data successfully buffered for inspection."

    - name: Display formatted loopback interface details
      # Documentation: Provides human-readable output for network operations visibility.
      ansible.builtin.debug:
        msg: |
          ======================= LOOPBACKS =======================
          {{ lb_data.stdout | default('No loopback interfaces configured on this device.') }}
