---
- name: FortiGate Loopback Interface Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch loopback interface status via FortiOS CLI
      # Why: Directly querying the CLI ensures we get the real-time operational state.
      # Using FQCN (ansible.netcommon.cli_command) to ensure predictable module resolution.
      # This task is inherently idempotent as it only retrieves information without modifying state.
      ansible.netcommon.cli_command:
        command: "get system loopback"
      register: lb_result
      # Error Handling: Explicitly check for CLI-specific error strings to catch failures 
      # that might not trigger a non-zero exit code.
      failed_when: 
        - lb_result.failed | default(false)
        - "'Unknown command' in lb_result.stdout or 'Command fail' in lb_result.stdout"

    - name: Validate loopback information retrieval
      # Observability: Using assertions to verify that the registered variable contains 
      # meaningful data before proceeding or finishing.
      ansible.builtin.assert:
        that:
          - "lb_result.stdout is defined"
          - "lb_result.stdout | length > 0"
        fail_msg: "The 'get system loopback' command returned no data. Check connectivity or device configuration."
        success_msg: "Successfully retrieved loopback configuration data."

    - name: Output loopback interface details
      # Why: Provides a formatted, human-readable summary of the retrieved data for operators.
      ansible.builtin.debug:
        msg: |
          ======================= LOOPBACKS =======================
          {{ lb_result.stdout }}