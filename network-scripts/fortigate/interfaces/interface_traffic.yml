---
# FortiGate Interface Traffic Analysis
# Objective: Retrieve and validate real-time interface traffic statistics from FortiGate devices.
# This playbook adheres to idempotent principles by performing read-only operations.
- name: FortiGate Network Observability - Interface Traffic
  hosts: fortigate
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: "FortiGate: Execute Interface Traffic Retrieval"
      # Using FQCN for better reliability and avoiding plugin collisions.
      ansible.netcommon.cli_command:
        command: get system interface traffic
      # Registering output for downstream observability and validation.
      register: interface_traffic_result
      # Basic error handling: ensure the command is supported by the device.
      failed_when: 
        - interface_traffic_result.failed or "Unknown action" in interface_traffic_result.stdout
      changed_when: false # Read-only command; safe for repeated execution (idempotency).

    - name: "Observability: Verify Command Integrity"
      # Asserting that we received a valid response to ensure system health.
      ansible.builtin.assert:
        that:
          - "interface_traffic_result.stdout is defined"
          - "interface_traffic_result.stdout | length > 0"
        fail_msg: "Failed to retrieve traffic data or the output is empty."
        success_msg: "Interface traffic data successfully retrieved."

    - name: "Display: Structured Traffic Output"
      # Providing a clear, human-readable summary of the current network state.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE INTERFACE TRAFFIC =======================
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          DEVICE: {{ inventory_hostname }}
          
          {{ interface_traffic_result.stdout }}
          ===========================================================================
