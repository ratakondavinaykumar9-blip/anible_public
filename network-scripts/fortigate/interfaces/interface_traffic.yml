---
- name: FortiGate Interface Traffic Analysis
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: "FortiGate: Retrieve interface traffic statistics"
      # Idempotency: Read-only 'get' command ensures no state changes occur regardless of execution count.
      # FQCN: Using fully qualified collection name for portability and clarity.
      ansible.netcommon.cli_command:
        command: get system interface traffic
      register: interface_traffic
      # Error Handling: Explicitly fail if the command execution fails or returns an empty string.
      failed_when: 
        - interface_traffic.failed or (interface_traffic.stdout | length == 0)
      # Ensure the data gathering task runs even when the playbook is executed in --check mode.
      check_mode: false

    - name: "Observability: Validate retrieved traffic data"
      # Observability: Assert that the output contains expected structural elements to verify operational success.
      ansible.builtin.assert:
        that:
          - "'Interface' in interface_traffic.stdout"
        fail_msg: "Validation failed: The output from {{ inventory_hostname }} does not contain the expected 'Interface' header."
        success_msg: "Traffic data successfully retrieved and validated for {{ inventory_hostname }}."

    - name: "Output: Display interface traffic report"
      # Documentation: Providing a clear, formatted view of the results for human operators.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE TRAFFIC =======================
          Device: {{ inventory_hostname }}
          {{ interface_traffic.stdout }}