---
# Standard:ized Playbook
# Purpose: This playbook retrieves and validates the operational status of FortiGate aggregate (LAG) interfaces.
# It ensures observability and data integrity through explicit response validation and error handling.

- name: FortiGate Aggregate Interface Monitoring
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve aggregate interface status from device
      # Standard: Best Practices - Using Fully Qualified Collection Names (FQCN)
      ansible.netcommon.cli_command:
        command: get system aggregate
      # Standard: Observability - Capture the raw output for downstream validation
      register: agg_status
      # Standard: Idempotency - Explicitly set changed_when to false as "get" is a read-only operation
      changed_when: false
      # Standard: Error Handling - Detect failures using both return status and known error strings
      failed_when: >
        agg_status.failed or 
        "Command fail" in agg_status.stdout or 
        "Unknown action" in agg_status.stdout

    - name: Validate that aggregate data was received
      # Standard: Observability - Use assertions to verify that the response is not empty or malformed
      ansible.builtin.assert:
        that:
          - agg_status.stdout is defined
          - agg_status.stdout | length > 0
        fail_msg: "Data Integrity Error: No aggregate interface data was returned from the device."
        success_msg: "Data Integrity Verified: Aggregate interface status successfully retrieved."

    - name: Display formatted aggregate interface status
      # Standard: Documentation - Provide clear visual markers for auditing and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE AGGREGATE STATUS =======================
          {{ agg_status.stdout }}