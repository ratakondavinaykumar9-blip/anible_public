# FortiGate Aggregate Interface Status Inspection
# Purpose: Retrieves and validates the status of Link Aggregation Groups (LAG)
# Standards: Idempotent, Observable, and Error-Aware
- name: Inspect FortiGate Aggregate Interfaces
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Fetch system aggregate interface status via CLI
      # Use Fully Qualified Collection Name (FQCN) for network operations
      ansible.netcommon.cli_command:
        command: get system aggregate
      register: agg_result
      # Read-only operations must not trigger a 'changed' state to maintain idempotency
      changed_when: false
      # Explicitly fail if FortiOS returns a command error string
      failed_when: 
        - agg_result.failed or "Command fail" in agg_result.stdout

    - name: Validate aggregate telemetry retrieval
      # Observability: Assert that the command returned data and is properly registered
      ansible.builtin.assert:
        that:
          - "agg_result.stdout is defined"
          - "agg_result.stdout | length > 0"
        fail_msg: "Operational telemetry retrieval failed: Output is empty or undefined."
        success_msg: "Aggregate interface telemetry successfully captured."

    - name: Display aggregate interface details
      # Provide formatted output for human operators during execution
      ansible.builtin.debug:
        msg: |
          ======================= AGGREGATE INTERFACE STATUS =======================
          {{ agg_result.stdout }}