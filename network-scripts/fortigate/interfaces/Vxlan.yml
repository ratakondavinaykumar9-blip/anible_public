---
# Playbook: FortiGate VXLAN Status Retrieval
# Description: This playbook securely fetches and validates VXLAN configuration from FortiGate devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN Usage, Robust Error Handling.

- name: Retrieve FortiGate VXLAN Configuration
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Execute 'get system vxlan' command
      # Use FQCN for the netcommon cli_command module to ensure portability and clarity.
      # This task is idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: get system vxlan
      register: vxlan_output
      # Error Handling: Catch FortiOS-specific CLI errors that might not trigger a non-zero exit code.
      failed_when: >
        vxlan_output.failed or 
        "command parse error" in vxlan_output.stdout | lower or
        "unknown command" in vxlan_output.stdout | lower

    - name: Verify VXLAN command execution success
      # Observability: Use assert to programmatically verify that the expected data was returned.
      ansible.builtin.assert:
        that:
          - vxlan_output.stdout is defined
        fail_msg: "Failed to retrieve VXLAN configuration from {{ inventory_hostname }}."
        success_msg: "Successfully captured VXLAN configuration for {{ inventory_hostname }}."

    - name: Display VXLAN Configuration
      # Use FQCN for the debug module to output the retrieved status.
      ansible.builtin.debug:
        msg: |
          ======================= VXLAN STATUS: {{ inventory_hostname }} =======================
          {{ vxlan_output.stdout }}
      # Avoid displaying empty blocks if no VXLAN interfaces are configured.
      when: vxlan_output.stdout | length > 0