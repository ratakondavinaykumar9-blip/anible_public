---
# FortiGate GRE Tunnels Audit
# Purpose: This playbook retrieves the operational status of GRE (Generic Routing Encapsulation) 
# tunnels. It adheres to NetLearner standards for idempotency, observability, and FQCN usage.

- name: FortiGate GRE Tunnel Operational Audit
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve GRE tunnel status from FortiOS CLI
      # Use Fully Qualified Collection Name (FQCN) for predictable module resolution.
      ansible.netcommon.cli_command:
        command: get system gre
      register: gre_result
      # Idempotency: Read-only 'get' operations must always report 'changed: false'.
      changed_when: false
      # Error Handling: Fail if return code is non-zero or if the CLI returns an 'unknown' error.
      failed_when:
        - gre_result.rc != 0
        - "'Unknown action' in gre_result.stdout"

    - name: Verify GRE tunnel data integrity
      # Observability: Assert that the command returned meaningful output.
      ansible.builtin.assert:
        that:
          - gre_result.stdout is defined
          - gre_result.stdout | length > 0
        fail_msg: "Operational data retrieval failed or the GRE table is empty."
        success_msg: "GRE tunnel data successfully validated for {{ inventory_hostname }}."
        quiet: true

    - name: Display GRE tunnel operational status
      # Documentation/Visibility: Provide a structured view for human-in-the-loop review.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          DEVICE: {{ inventory_hostname }}
          SERVICE: GRE TUNNELS
          ===========================================================
          {{ gre_result.stdout }}
