---
- name: Audit FortiGate GRE Tunnel Configuration
  hosts: fortigate
  gather_facts: false
  # This playbook performs a read-only audit of GRE tunnels to ensure operational visibility
  # without modifying device state, satisfying idempotency requirements for repeated runs.

  tasks:
    - name: Retrieve GRE operational state from FortiGate
      # Use FQCN for portability and to align with Ansible Galaxy standards
      ansible.netcommon.cli_command:
        command: get system gre
      register: gre_data
      # Error Handling: Catch specific FortiOS CLI execution errors or connection timeouts
      failed_when: 
        - gre_data.rc != 0
        - "'Command fail' in gre_data.stdout"

    - name: Validate GRE data retrieval success
      # Observability: Verify the task returned a valid stdout object before proceeding
      ansible.builtin.assert:
        that:
          - gre_data.stdout is defined
        fail_msg: "GRE tunnel data collection failed on {{ inventory_hostname }}"
        success_msg: "GRE tunnel data successfully captured for {{ inventory_hostname }}"

    - name: Display GRE Tunnel Statistics
      # Observability: Provide formatted, human-readable output for the automation operator
      ansible.builtin.debug:
        msg: |
          ======================= GRE TUNNELS: {{ inventory_hostname }} =======================
          {{ gre_data.stdout | default('No operational GRE tunnels found on this device.', true) }}