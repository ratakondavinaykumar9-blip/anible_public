---
# FortiGate Interface Status Retrieval
# Purpose: Gathers hardware-level NIC information for diagnostic purposes.
# Idempotency: Safe to run multiple times as it is a read-only operation.
# Standards: FQCN usage, Observability, and Error Handling.

- name: Get FortiGate Interface Status
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve hardware NIC information via CLI
      # FQCN: Using ansible.netcommon for standardized network CLI communication
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: status_result
      # Error Handling: Identify failure if the command is unrecognized or output is null
      failed_when: 
        - status_result.failed or status_result.stdout | length == 0
        - "'Command fail' in status_result.stdout"

    - name: Validate status retrieval success
      # Observability: Explicitly assert that data was captured correctly
      ansible.builtin.assert:
        that:
          - status_result.stdout is defined
          - status_result.stdout != ""
        fail_msg: "Failed to retrieve NIC information from {{ inventory_hostname }}."
        success_msg: "NIC hardware information successfully retrieved."

    - name: Display Interface Status Report
      # Documentation: Provide a formatted view of the captured output
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE STATUS =======================
          HOST: {{ inventory_hostname }}
          ----------------------------------------------------------------
          {{ status_result.stdout }}
          ================================================================