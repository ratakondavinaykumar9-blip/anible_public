# NetLearner Staging - FortiGate Interface Status Verification
# This playbook retrieves and validates the hardware status of NICs on FortiGate devices.
# Standards: Idempotency (read-only), Observability (assert), Documentation (comments), FQCN usage.
- name: Get Interface Status
  hosts: fortigate
  gather_facts: false # Performance: Facts gathering is disabled as it is not required for diagnostic commands.

  tasks:
    - name: Retrieve hardware NIC information
      # FQCN: Using the ansible.netcommon collection for reliable network CLI interaction.
      ansible.netcommon.cli_command:
        command: "diagnose hardware deviceinfo nic"
      register: nics_status
      # Idempotency: Marking as 'changed: false' because this diagnostic command does not modify device state.
      changed_when: false
      # Error Handling: Fail if the module reports a failure or if the device returns a "Command fail" string.
      failed_when: 
        - nics_status.failed or "Command fail" in nics_status.stdout

    - name: Assert interface data integrity
      # Observability: Verify that we actually received data to prevent silent failures in automation pipelines.
      ansible.builtin.assert:
        that:
          - "nics_status.stdout is defined"
          - "nics_status.stdout | length > 0"
        fail_msg: "The FortiGate device returned an empty or invalid response for NIC diagnostics."
        success_msg: "NIC status data successfully captured and validated."

    - name: Display formatted interface status
      # Documentation: Providing a clear, structured output block for human operators and logging systems.
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE NIC STATUS =======================
          {{ nics_status.stdout }}