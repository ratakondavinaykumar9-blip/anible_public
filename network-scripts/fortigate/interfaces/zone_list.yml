# NetLearner Architect Standard: FortiGate Zone List
# This playbook retrieves the security zone configuration from a FortiGate device.
# It ensures idempotency by executing a read-only command that does not alter device state.

- name: Get FortiGate Zone List
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve security zone configuration via CLI
      # FQCN: ansible.netcommon.cli_command
      # Why: Obtains a comprehensive list of security zones and their member interfaces.
      ansible.netcommon.cli_command:
        command: "get system zone"
      register: zone_output
      # Error Handling: Fail if the output is undefined, empty, or contains FortiOS error strings.
      failed_when: >
        zone_output.stdout is not defined or 
        zone_output.stdout == "" or 
        "Command fail" in zone_output.stdout or
        "Unknown action" in zone_output.stdout

    - name: Validate zone configuration data integrity
      # Observability: Assertions verify the output contains valid zone definition syntax.
      # Why: Ensures the automation can reliably process the retrieved configuration data.
      ansible.builtin.assert:
        that:
          - "'name' in zone_output.stdout"
          - "'interface' in zone_output.stdout"
        fail_msg: "The retrieved zone configuration appears incomplete or improperly formatted."
        quiet: true

    - name: Display formatted security zone report
      # FQCN: ansible.builtin.debug
      # Why: Provides operator visibility into configured security domains and interface mapping.
      ansible.builtin.debug:
        msg: |
          ======================= SECURITY ZONES =======================
          DEVICE: {{ inventory_hostname }}
          {{ zone_output.stdout }}
          ==============================================================