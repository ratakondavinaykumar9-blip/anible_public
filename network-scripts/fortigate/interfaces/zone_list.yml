---
# FortiGate Zone List
# Improved by Architect:for Idempotency, Observability, and Best Practices
- name: Get Zone List
  hosts: fortigate
  gather_facts: false # Performance: Facts are not required for CLI-based configuration retrieval

  tasks:
    - name: Retrieve system zone configuration via CLI
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      # Idempotency: Read-only CLI commands are inherently idempotent
      ansible.netcommon.cli_command:
        command: get system zone
      register: zone_output
      # Error Handling: Catch non-zero return codes and FortiOS-specific error messages in stdout
      failed_when: 
        - zone_output.rc != 0
        - "'Command fail' in zone_output.stdout"

    - name: Validate that zone information was successfully retrieved
      # Observability: Ensure that the captured output contains data before proceeding
      ansible.builtin.assert:
        that:
          - zone_output.stdout is defined
          - zone_output.stdout | length > 0
        fail_msg: "Data retrieval error: Zone output is empty or undefined."
        success_msg: "Zone configuration successfully captured and validated."

    - name: Display formatted zone list for operator visibility
      # Documentation: Providing clear, structured output headers for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= FORTIGATE ZONES =======================
          {{ zone_output.stdout }}
          ===============================================================