---
# FortiGate Hardware Interface Error Analysis
# This playbook collects low-level hardware statistics to detect CRC, drops, and collisions.
- name: FortiGate Interface Diagnostics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve low-level NIC hardware information
      # FQCN: Using ansible.netcommon.cli_command for raw diagnostic execution.
      # This is a read-only operation, ensuring idempotency across multiple runs.
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: nic_diagnostic_output
      # Error Handling: Identify failure if the command is not supported or execution fails.
      failed_when: 
        - nic_diagnostic_output.failed or "Command fail" in nic_diagnostic_output.stdout

    - name: Verify diagnostic data observability
      # Observability: Assert that we received a valid response from the hardware layer.
      ansible.builtin.assert:
        that:
          - nic_diagnostic_output.stdout is defined
          - nic_diagnostic_output.stdout | length > 0
        fail_msg: "No hardware diagnostic data was returned from the device."
        success_msg: "Successfully retrieved hardware NIC statistics."
        quiet: true

    - name: Output hardware interface error details
      # Presenting the diagnostic results with a clear visual separator for log observability.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS =======================
          {{ nic_diagnostic_output.stdout }}
          ================================================================
