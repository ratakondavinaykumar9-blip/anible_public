---
- name: FortiGate Interface Error Diagnostics
  hosts: fortigate
  gather_facts: false
  # Purpose: This playbook retrieves hardware-level NIC statistics to diagnose 
  # potential physical layer issues, CRC errors, or drops on FortiGate interfaces.

  tasks:
    - name: Execute hardware NIC diagnostic command
      # Standard 5: Using Fully Qualified Collection Names (FQCN)
      # Standard 1: This is a read-only command, ensuring idempotency via changed_when: false
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      # Standard 2: Register output for observability and downstream validation
      register: nic_stats
      # Standard 4: Custom error handling to catch command parsing issues on older/newer firmware
      failed_when: 
        - nic_stats.failed or "command parse error" in nic_stats.stdout | lower
      changed_when: false

    - name: Validate diagnostic output integrity
      # Standard 2: Observability - Asserting that the command returned meaningful data
      ansible.builtin.assert:
        that:
          - nic_stats.stdout is defined
          - nic_stats.stdout | length > 0
        fail_msg: "Diagnostic command failed to return data. Ensure the device supports 'diagnose hardware deviceinfo nic'."
        success_msg: "Interface hardware statistics successfully retrieved."

    - name: Display Interface Errors and Statistics
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE DIAGNOSTICS =======================
          {{ nic_stats.stdout }}