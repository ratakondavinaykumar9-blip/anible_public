---
# Playbook to retrieve and verify FortiGate NIC hardware errors.
# This diagnostic check is idempotent as it performs a read-only operation on the device.
- name: Get FortiGate Interface Hardware Statistics
  hosts: fortigate
  gather_facts: false

  tasks:
    - name: Retrieve NIC hardware statistics via CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability.
      # 'diagnose' commands are used to access low-level hardware counters not available via standard API.
      ansible.netcommon.cli_command:
        command: diagnose hardware deviceinfo nic
      register: nic_errors
      # Error Handling: Ensure the task fails explicitly if the network CLI command fails.
      failed_when: nic_errors is failed

    - name: Validate that statistics were successfully captured
      # Observability: Confirm the output is valid and not empty before proceeding.
      ansible.builtin.assert:
        that:
          - nic_errors.stdout is defined
          - nic_errors.stdout | length > 0
        fail_msg: "The diagnostic command returned no data. Verify connectivity or permissions."
        success_msg: "Interface hardware statistics successfully retrieved."

    - name: Display formatted interface error report
      # Provides a clear human-readable view of the captured diagnostic data for logging.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE HARDWARE ERRORS =======================
          {{ nic_errors.stdout }}