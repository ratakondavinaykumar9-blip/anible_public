# Enterprise Monitoring Deployment: Node Exporter & SNMP Exporter
# Targets: Linux Fleet (RHEL/Ubuntu) & Network Management Pollers
# This playbook implements production-grade monitoring with systemd hardening and validation.

- name: Deploy Prometheus Exporters (Node & SNMP)
  hosts: all
  become: true
  vars:
    # --- Global Configuration ---
    prometheus_user: "prometheus"
    prometheus_group: "prometheus"
    prometheus_bin_dir: "/usr/local/bin"
    prometheus_config_dir: "/etc/prometheus"
    
    # --- Node Exporter Configuration ---
    # Version pinned to verified stable (2024-2026) for reproducible builds
    node_exporter_version: "1.8.1"
    node_exporter_port: 9100
    node_exporter_arch: "amd64"
    node_exporter_dist: "linux"
    node_exporter_binary_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_dist }}-{{ node_exporter_arch }}.tar.gz"
    
    # Collectors enabled for Data Center visibility (ASA/Nexus/FGT contexts often need netdev/systemd)
    node_exporter_enabled_collectors:
      - systemd
      - filesystem
      - netdev
      - cpu
      - meminfo
      - loadavg
    
    # --- SNMP Exporter Configuration (Poller Nodes) ---
    # Used for scraping Cisco ASA, FTD, FortiGate, and Nexus devices
    snmp_exporter_version: "0.26.0"
    snmp_exporter_port: 9116
    snmp_exporter_binary_url: "https://github.com/prometheus/snmp_exporter/releases/download/v{{ snmp_exporter_version }}/snmp_exporter-{{ snmp_exporter_version }}.linux-amd64.tar.gz"
    # Source path for the snmp.yml generated from MIBs (ASA/FGT/Nexus)
    snmp_config_src: "files/network_monitoring/snmp.yml"
    
    # --- Security & Networking ---
    # Zero-Trust: Restrict scrape access to Prometheus Infrastructure
    monitoring_network_cidr: "10.0.0.0/8"

  tasks:
    - name: "Prerequisites: User and Directory Management"
      block:
        - name: Create Prometheus system group
          ansible.builtin.group:
            name: "{{ prometheus_group }}"
            system: true
            state: present
          register: group_creation

        - name: Create Prometheus system user
          ansible.builtin.user:
            name: "{{ prometheus_user }}"
            group: "{{ prometheus_group }}"
            system: true
            shell: /usr/sbin/nologin
            create_home: false
            state: present
          register: user_creation

        - name: Create configuration and binary directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ prometheus_user }}"
            group: "{{ prometheus_group }}"
            mode: '0755'
          loop:
            - "{{ prometheus_config_dir }}"
            - "{{ prometheus_bin_dir }}"
          register: dir_creation

        - name: Verify Prerequisites State
          ansible.builtin.assert:
            that:
              - group_creation is not failed
              - user_creation is not failed
              - dir_creation is not failed
            msg: "Core system requirements for Prometheus exporters were not met."

      rescue:
        - name: Signal failure in prerequisite setup
          ansible.builtin.fail:
            msg: "Failed to initialize user or directories. Check filesystem permissions or LDAP/AD integration."

    - name: "Deployment: Node Exporter"
      block:
        - name: Download and Unarchive Node Exporter
          # Idempotency: 'creates' ensures we don't re-download/extract if the binary is present
          ansible.builtin.unarchive:
            src: "{{ node_exporter_binary_url }}"
            dest: "/tmp"
            remote_src: true
            extra_opts: [--strip-components=1]
            creates: "/tmp/node_exporter"
          register: node_download

        - name: Install Node Exporter Binary
          # Idempotency: Only copies if the source differs from destination
          ansible.builtin.copy:
            src: "/tmp/node_exporter"
            dest: "{{ prometheus_bin_dir }}/node_exporter"
            mode: '0755'
            owner: root
            group: root
            remote_src: true
          notify: Restart Node Exporter

        - name: Configure Node Exporter Systemd Service
          # Hardening: Using Systemd directives to isolate the process
          ansible.builtin.template:
            dest: "/etc/systemd/system/node_exporter.service"
            mode: '0644'
            content: |
              [Unit]
              Description=Prometheus Node Exporter
              Wants=network-online.target
              After=network-online.target

              [Service]
              User={{ prometheus_user }}
              Group={{ prometheus_group }}
              Type=simple
              ExecStart={{ prometheus_bin_dir }}/node_exporter \
                {% for collector in node_exporter_enabled_collectors %}
                --collector.{{ collector }} \
                {% endfor %}
                --web.listen-address=:{{ node_exporter_port }}
              
              # Hardening (Zero-Trust/Mission Critical)
              ProtectSystem=full
              PrivateTmp=true
              NoNewPrivileges=true
              MemoryDenyWriteExecute=true

              [Install]
              WantedBy=multi-user.target
          notify: Restart Node Exporter
          register: node_service_config

        - name: Ensure Node Exporter is enabled and started
          ansible.builtin.systemd:
            name: node_exporter
            enabled: true
            state: started
            daemon_reload: true
          register: node_service_state

        - name: Validate Node Exporter Metrics Endpoint
          # Observability: Verify the service is actually serving metrics
          ansible.builtin.uri:
            url: "http://localhost:{{ node_exporter_port }}/metrics"
            method: GET
            status_code: 200
          register: node_check
          until: node_check.status == 200
          retries: 5
          delay: 2

        - name: Assert Node Exporter functional success
          ansible.builtin.assert:
            that:
              - node_service_state.status.ActiveState == "active"
              - node_check.status == 200
            msg: "Node Exporter is not running or metrics endpoint is unreachable."

      rescue:
        - name: Node Exporter Recovery Logic
          # Error Handling: Diagnose port conflicts if the service failed to start
          ansible.builtin.shell: "ss -tulpn | grep :{{ node_exporter_port }}"
          register: port_conflict
          changed_when: false
          failed_when: false

        - ansible.builtin.fail:
            msg: "Node Exporter deployment failed. Possible port conflict: {{ port_conflict.stdout | default('None') }}"

    - name: "Deployment: SNMP Exporter (Network Poller Roles)"
      # Role-Based Condition: Only deploy on designated network pollers
      when: "'network_pollers' in group_names"
      block:
        - name: Download and Install SNMP Exporter
          ansible.builtin.unarchive:
            src: "{{ snmp_exporter_binary_url }}"
            dest: "/tmp"
            remote_src: true
            extra_opts: [--strip-components=1]
            creates: "/tmp/snmp_exporter"
          register: snmp_download

        - name: Install SNMP Exporter Binary
          ansible.builtin.copy:
            src: "/tmp/snmp_exporter"
            dest: "{{ prometheus_bin_dir }}/snmp_exporter"
            mode: '0755'
            owner: root
            group: root
            remote_src: true
          notify: Restart SNMP Exporter

        - name: Deploy SNMP Configuration (ASA/FGT/Nexus/SRX)
          # Security: SNMP config may contain read-only community strings; restrict permissions
          ansible.builtin.copy:
            src: "{{ snmp_config_src }}"
            dest: "{{ prometheus_config_dir }}/snmp.yml"
            owner: "{{ prometheus_user }}"
            group: "{{ prometheus_group }}"
            mode: '0640'
          notify: Restart SNMP Exporter
          register: snmp_config_deploy

        - name: Configure SNMP Exporter Systemd Service
          ansible.builtin.template:
            dest: "/etc/systemd/system/snmp_exporter.service"
            mode: '0644'
            content: |
              [Unit]
              Description=Prometheus SNMP Exporter
              Wants=network-online.target
              After=network-online.target

              [Service]
              User={{ prometheus_user }}
              Group={{ prometheus_group }}
              Type=simple
              ExecStart={{ prometheus_bin_dir }}/snmp_exporter \
                --config.file={{ prometheus_config_dir }}/snmp.yml \
                --web.listen-address=:{{ snmp_exporter_port }}
              
              ProtectSystem=full
              PrivateTmp=true

              [Install]
              WantedBy=multi-user.target
          notify: Restart SNMP Exporter
          register: snmp_service_config

        - name: Ensure SNMP Exporter is enabled and started
          ansible.builtin.systemd:
            name: snmp_exporter
            enabled: true
            state: started
            daemon_reload: true
          register: snmp_service_state

        - name: Validate SNMP Exporter Healthy Endpoint
          ansible.builtin.uri:
            url: "http://localhost:{{ snmp_exporter_port }}/-/healthy"
            method: GET
            status_code: 200
          register: snmp_check
          until: snmp_check.status == 200
          retries: 3
          delay: 5

        - name: Assert SNMP Exporter functional success
          ansible.builtin.assert:
            that:
              - snmp_service_state.status.ActiveState == "active"
              - snmp_check.status == 200
            msg: "SNMP Exporter failed health check after deployment."

      rescue:
        - name: SNMP Exporter Error Analysis
          ansible.builtin.debug:
            msg: "SNMP Exporter failed. Verify that {{ snmp_config_src }} is valid for your Cisco/Fortinet/Juniper MIBs."

        - ansible.builtin.fail:
            msg: "SNMP Exporter deployment aborted due to critical error."

  handlers:
    - name: Restart Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted

    - name: Restart SNMP Exporter
      ansible.builtin.systemd:
        name: snmp_exporter
        state: restarted