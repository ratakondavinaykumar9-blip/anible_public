---
- name: Deploy Enterprise Logstash and Filebeat Forwarder (ELK 8.x/9.x)
  hosts: all
  become: true
  vars:
    # --- Versioning & Repository ---
    elastic_version: "8.15.0"
    elastic_gpg_key: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"
    elastic_repo_url: "" # Leave empty for auto-generation based on OS family

    # --- Logstash Specifics (Aggregator/Processor) ---
    install_logstash: true
    logstash_heap_size: "2g"
    logstash_beats_port: 5044
    logstash_api_port: 9600
    logstash_queue_type: "persisted"
    logstash_queue_max_bytes: "4gb"
    
    # --- Filebeat Specifics (Edge Forwarder) ---
    install_filebeat: true
    logstash_hosts: ["10.0.1.50:5044", "10.0.1.51:5044"] # HA Cluster list
    
    # --- Zero-Trust Security (SSL/TLS) ---
    ssl_enabled: true
    ssl_dir: "/etc/pki/elk"
    ssl_ca_cert_path: "/etc/pki/elk/ca.crt"
    ssl_cert_path: "/etc/pki/elk/node.crt"
    ssl_key_path: "/etc/pki/elk/node.key"
    local_ca_cert: "" 
    local_node_cert: ""
    local_node_key: ""

    # --- Mission-Critical Inputs ---
    filebeat_inputs:
      - type: filestream
        id: "cisco-asa-logs"
        paths: ["/var/log/network/cisco_asa/*.log"]
        fields: { device_type: "cisco_asa", sector: "edge_firewall" }
      - type: filestream
        id: "fortigate-traffic"
        paths: ["/var/log/network/fortigate/*.log"]
        fields: { device_type: "fortigate", sector: "dc_segment" }
      - type: syslog
        id: "nexus-core"
        protocol.udp:
          host: "0.0.0.0:514"
        fields: { device_type: "cisco_nexus", role: "dc_core" }

  pre_tasks:
    - name: "OS_CHECK: Validate Operating System Compatibility"
      ansible.builtin.assert:
        that:
          - ansible_os_family in ['Debian', 'RedHat']
        fail_msg: "This playbook only supports RHEL/CentOS or Debian/Ubuntu distributions."
        success_msg: "OS Family {{ ansible_os_family }} is supported."

  tasks:
    - name: "INFRA_SETUP: Prepare Repositories and Install Packages"
      block:
        - name: Install Prerequisite Packages
          ansible.builtin.package:
            name:
              - gnupg2
              - wget
              - apt-transport-https
              - ca-certificates
              - openjdk-17-jre-headless
            state: present
          register: prereq_install

        - name: "REPO_CONFIG: Debian Family"
          when: ansible_os_family == "Debian"
          block:
            - name: Add Elastic GPG Key (Idempotent via local keyring)
              ansible.builtin.apt_key:
                url: "{{ elastic_gpg_key }}"
                state: present
              register: apt_key_status

            - name: Add Elastic 8.x Repository
              ansible.builtin.apt_repository:
                repo: "deb https://artifacts.elastic.co/packages/8.x/apt stable main"
                state: present
                filename: elastic-8.x
              register: apt_repo_status

        - name: "REPO_CONFIG: RedHat Family"
          ansible.builtin.yum_repository:
            name: elastic-8.x
            description: Elastic repository for 8.x packages
            baseurl: "https://artifacts.elastic.co/packages/8.x/yum"
            gpgcheck: yes
            gpgkey: "{{ elastic_gpg_key }}"
            enabled: yes
          when: ansible_os_family == "RedHat"
          register: yum_repo_status

        - name: "SECURITY: Initialize SSL Directory Structure"
          ansible.builtin.file:
            path: "{{ ssl_dir }}"
            state: directory
            mode: '0755'
            owner: root
            group: root
          when: ssl_enabled

        - name: "SECURITY: Distribute SSL Artifacts"
          ansible.builtin.copy:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
            mode: "{{ item.mode }}"
            owner: root
            group: root
          loop:
            - { src: "{{ local_ca_cert }}", dest: "{{ ssl_ca_cert_path }}", mode: '0644' }
            - { src: "{{ local_node_cert }}", dest: "{{ ssl_cert_path }}", mode: '0644' }
            - { src: "{{ local_node_key }}", dest: "{{ ssl_key_path }}", mode: '0600' }
          when: 
            - ssl_enabled 
            - local_ca_cert != ""
          register: ssl_copy

        - name: "INSTALL: Logstash & Filebeat Binary Deployment"
          ansible.builtin.package:
            name:
              - "logstash={{ elastic_version }}"
              - "filebeat={{ elastic_version }}"
            state: present
          register: pkg_install
          # Ensure packages are installed before proceeding to config
          failed_when: pkg_install is failed

      rescue:
        - name: "ERROR_HANDLER: Repository or Installation Failure"
          ansible.builtin.fail:
            msg: "Failed to configure repositories or install packages. Network check: artifacts.elastic.co"

    - name: "LOGSTASH_CONFIG: JVM and Pipeline Definition"
      when: install_logstash
      block:
        - name: "LOGSTASH_JVM: Optimize Heap Memory"
          ansible.builtin.lineinfile:
            path: /etc/logstash/jvm.options
            regexp: '^-Xm[sx]'
            line: "-Xmx{{ logstash_heap_size }}\n-Xms{{ logstash_heap_size }}"
          notify: Restart Logstash
          register: jvm_change

        - name: "LOGSTASH_CORE: Deploy Main Configuration"
          ansible.builtin.template:
            src: logstash.yml.j2
            dest: /etc/logstash/logstash.yml
            owner: root
            group: logstash
            mode: '0644'
          notify: Restart Logstash
          register: logstash_yml_change

        - name: "LOGSTASH_PIPELINE: Deploy Network Processing Pipeline"
          ansible.builtin.copy:
            dest: /etc/logstash/conf.d/01-beats-input.conf
            content: |
              input {
                beats {
                  port => {{ logstash_beats_port }}
                  ssl  => {{ ssl_enabled | lower }}
                  ssl_certificate_authorities => ["{{ ssl_ca_cert_path }}"]
                  ssl_certificate => "{{ ssl_cert_path }}"
                  ssl_key => "{{ ssl_key_path }}"
                  ssl_verify_mode => "force_peer"
                }
              }
              filter {
                # Logic for Cisco/Fortinet/Juniper processing goes here
              }
              output {
                elasticsearch {
                  hosts => ["https://localhost:9200"]
                  cacert => "{{ ssl_ca_cert_path }}"
                }
              }
            owner: root
            group: logstash
            mode: '0640'
          notify: Restart Logstash
          register: pipeline_change

      rescue:
        - name: "ERROR_HANDLER: Logstash Configuration Rollback Notification"
          ansible.builtin.debug:
            msg: "Validation failed for Logstash. Inspecting /var/log/logstash/logstash-plain.log"

    - name: "FILEBEAT_CONFIG: Edge Collection Definition"
      when: install_filebeat
      block:
        - name: "FILEBEAT_CORE: Deploy Validated Configuration"
          ansible.builtin.template:
            src: filebeat.yml.j2
            dest: /etc/filebeat/filebeat.yml
            owner: root
            group: root
            mode: '0600'
            # Validation ensures no service disruption on syntax error
            validate: "/usr/share/filebeat/bin/filebeat test config -c %s"
          notify: Restart Filebeat
          register: filebeat_yml_change

        - name: "FILEBEAT_MODULES: Enable OS Auditing"
          ansible.builtin.command: "filebeat modules enable system auditd"
          args:
            creates: /etc/filebeat/modules.d/system.yml
          register: module_status
          changed_when: "'Enabled system' in module_status.stdout or 'Enabled auditd' in module_status.stdout"

      rescue:
        - name: "ERROR_HANDLER: Filebeat YAML Validation Failure"
          ansible.builtin.fail:
            msg: "Filebeat config validation failed for ELK {{ elastic_version }}."

    - name: "SERVICE_MGMT: Lifecycle Control and Health Validation"
      block:
        - name: "SERVICE_START: Enable and Start Logstash/Filebeat"
          ansible.builtin.service:
            name: "{{ item }}"
            state: started
            enabled: yes
          loop:
            - logstash
            - filebeat
          register: service_status

        - name: "OBSERVABILITY: Verify Logstash API Availability"
          ansible.builtin.uri:
            url: "http://localhost:{{ logstash_api_port }}/_node/stats"
            method: GET
          register: logstash_health
          until: logstash_health.status == 200
          retries: 12
          delay: 10
          when: install_logstash
          # Fails after 120 seconds if API doesn't respond
          failed_when: logstash_health.status != 200

      rescue:
        - name: "DIAGNOSTICS: Collect Service Crash Logs"
          ansible.builtin.shell: "journalctl -u {{ item }} --no-pager | tail -n 25"
          loop:
            - logstash
            - filebeat
          register: crash_logs
          changed_when: false
          ignore_errors: true
        
        - name: "FINAL_FAIL: Service Stabilization Failure"
          ansible.builtin.fail:
            msg: "ELK stack failed to stabilize. Diagnostic logs: {{ crash_logs.results | map(attribute='stdout') | list }}"

  handlers:
    - name: Restart Logstash
      ansible.builtin.service:
        name: logstash
        state: restarted
      listen: "restart_services"

    - name: Restart Filebeat
      ansible.builtin.service:
        name: filebeat
        state: restarted
      listen: "restart_services"

  always:
    - name: "CLEANUP: Remove Ephemeral Artifacts"
      ansible.builtin.file:
        path: /tmp/elk_config_test
        state: absent