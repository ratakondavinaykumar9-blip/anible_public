MCP issues detected. Run /mcp list for status.---
- name: Deploy Enterprise Logstash and Filebeat Forwarder (ELK 8.x/9.x)
  hosts: all
  become: true
  vars:
    # --- Versioning & Repository ---
    elastic_version: "8.15.0"
    elastic_gpg_key: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"
    elastic_repo_url: "" # Auto-generated based on OS family

    # --- Logstash Specifics (Aggregator/Processor) ---
    install_logstash: true
    logstash_heap_size: "2g"
    logstash_beats_port: 5044
    logstash_api_port: 9600
    logstash_queue_type: "persisted"
    logstash_queue_max_bytes: "4gb"
    
    # --- Filebeat Specifics (Edge Forwarder) ---
    install_filebeat: true
    logstash_hosts: ["10.0.1.50:5044", "10.0.1.51:5044"]
    
    # --- Zero-Trust Security (SSL/TLS) ---
    ssl_enabled: true
    ssl_dir: "/etc/pki/elk"
    ssl_ca_cert_path: "/etc/pki/elk/ca.crt"
    ssl_cert_path: "/etc/pki/elk/node.crt"
    ssl_key_path: "/etc/pki/elk/node.key"
    local_ca_cert: "" 
    local_node_cert: ""
    local_node_key: ""

    # --- Mission-Critical Inputs ---
    filebeat_inputs:
      - type: filestream
        id: "cisco-asa-logs"
        paths: ["/var/log/network/cisco_asa/*.log"]
        fields: { device_type: "cisco_asa", sector: "edge_firewall" }
      - type: filestream
        id: "fortigate-traffic"
        paths: ["/var/log/network/fortigate/*.log"]
        fields: { device_type: "fortigate", sector: "dc_segment" }
      - type: syslog
        id: "nexus-core"
        protocol.udp:
          host: "0.0.0.0:514"
        fields: { device_type: "cisco_nexus", role: "dc_core" }

  pre_tasks:
    - name: Validate Operating System Compatibility
      ansible.builtin.assert:
        that:
          - ansible_os_family in ['Debian', 'RedHat']
        fail_msg: "This playbook only supports RHEL/CentOS or Debian/Ubuntu distributions."
        quiet: true

  tasks:
    - name: Infrastructure Setup Block
      block:
        - name: Install Prerequisite Packages
          ansible.builtin.package:
            name:
              - gnupg2
              - wget
              - apt-transport-https
              - ca-certificates
              - openjdk-17-jre-headless
            state: present

        - name: Configure Elastic Repository (Debian Family)
          when: ansible_os_family == "Debian"
          block:
            - name: Add Elastic GPG Key
              ansible.builtin.apt_key:
                url: "{{ elastic_gpg_key }}"
                state: present
              register: apt_key_result

            - name: Verify APT Key Addition
              ansible.builtin.assert:
                that: "apt_key_result is success"
                fail_msg: "Failed to import Elastic GPG key for Debian-based system."

            - name: Add Elastic 8.x Repository
              ansible.builtin.apt_repository:
                repo: "deb https://artifacts.elastic.co/packages/8.x/apt stable main"
                state: present
                filename: elastic-8.x
              register: apt_repo_result

        - name: Configure Elastic Repository (RedHat Family)
          when: ansible_os_family == "RedHat"
          ansible.builtin.yum_repository:
            name: elastic-8.x
            description: Elastic repository for 8.x packages
            baseurl: "https://artifacts.elastic.co/packages/8.x/yum"
            gpgcheck: true
            gpgkey: "{{ elastic_gpg_key }}"
            enabled: true
          register: yum_repo_result

        - name: Distribute Security Certificates
          when: ssl_enabled
          ansible.builtin.file:
            path: "{{ ssl_dir }}"
            state: directory
            mode: '0755'
            owner: root
            group: root

        - name: Copy SSL Artifacts to Node
          when: 
            - ssl_enabled
            - local_ca_cert != ""
          ansible.builtin.copy:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
            mode: "{{ item.mode }}"
            owner: root
            group: root
          loop:
            - { src: "{{ local_ca_cert }}", dest: "{{ ssl_ca_cert_path }}", mode: '0644' }
            - { src: "{{ local_node_cert }}", dest: "{{ ssl_cert_path }}", mode: '0644' }
            - { src: "{{ local_node_key }}", dest: "{{ ssl_key_path }}", mode: '0600' }
          register: cert_copy_result

        - name: Install Logstash & Filebeat Packages
          ansible.builtin.package:
            name:
              - "logstash={{ elastic_version }}"
              - "filebeat={{ elastic_version }}"
            state: present
          register: pkg_install
          # Note: failed_when can be used here if specific version mismatches are non-fatal
          failed_when: pkg_install is failed and 'No package matching' not in pkg_install.msg

        - name: Verify Package Installation
          ansible.builtin.assert:
            that: "pkg_install is success"
            fail_msg: "Logstash and Filebeat installation failed. Check repository configuration."

      rescue:
        - name: Report Repository or Installation Failure
          ansible.builtin.fail:
            msg: "Failed to configure repositories or install packages. Check network connectivity to artifacts.elastic.co or package version availability."

    - name: Logstash Configuration Block
      when: install_logstash
      block:
        - name: Optimize Logstash JVM Heap
          # Proper heap allocation prevents OOM during heavy network telemetry processing
          ansible.builtin.lineinfile:
            path: /etc/logstash/jvm.options
            regexp: '^-Xm[sx]'
            line: "-Xmx{{ logstash_heap_size }}\n-Xms{{ logstash_heap_size }}"
          register: heap_update
          notify: Restart Logstash

        - name: Deploy Logstash Main Config (Idempotent)
          ansible.builtin.template:
            src: logstash.yml.j2
            dest: /etc/logstash/logstash.yml
            owner: root
            group: logstash
            mode: '0644'
          vars:
            config_content:
              node.name: "{{ ansible_hostname }}"
              path.data: /var/lib/logstash
              queue.type: "{{ logstash_queue_type }}"
              queue.max_bytes: "{{ logstash_queue_max_bytes }}"
              api.http.host: "127.0.0.1"
              api.http.port: "{{ logstash_api_port }}"
          register: logstash_yml
          notify: Restart Logstash

        - name: Deploy Mission-Critical Pipeline
          # This file defines the beats input with mandatory SSL for zero-trust compliance
          ansible.builtin.copy:
            dest: /etc/logstash/conf.d/01-beats-input.conf
            content: |
              input {
                beats {
                  port => {{ logstash_beats_port }}
                  ssl  => {{ ssl_enabled | lower }}
                  ssl_certificate_authorities => ["{{ ssl_ca_cert_path }}"]
                  ssl_certificate => "{{ ssl_cert_path }}"
                  ssl_key => "{{ ssl_key_path }}"
                  ssl_verify_mode => "force_peer"
                }
              }
              filter {
                # Device-specific grok patterns maintained in NetLearner patterns library
              }
              output {
                elasticsearch {
                  hosts => ["https://localhost:9200"]
                  cacert => "{{ ssl_ca_cert_path }}"
                }
              }
            owner: root
            group: logstash
            mode: '0640'
          register: pipeline_config
          notify: Restart Logstash

      rescue:
        - name: Handle Logstash Config Errors
          ansible.builtin.debug:
            msg: "Logstash configuration failed. Verification of /etc/logstash/logstash.yml suggested."

    - name: Filebeat Configuration Block
      when: install_filebeat
      block:
        - name: Deploy Filebeat YAML Configuration
          ansible.builtin.template:
            src: filebeat.yml.j2
            dest: /etc/filebeat/filebeat.yml
            owner: root
            group: root
            mode: '0600'
            # Prevent service restart loop by validating config syntax before deployment
            validate: "/usr/share/filebeat/bin/filebeat test config -c %s"
          register: filebeat_yml
          notify: Restart Filebeat

        - name: Enable Filebeat Modules (System/Auditd)
          ansible.builtin.command: "filebeat modules enable system auditd"
          args:
            creates: /etc/filebeat/modules.d/system.yml
          register: module_enable
          changed_when: "'Already enabled' not in module_enable.stdout"

      rescue:
        - name: Handle Filebeat Validation Errors
          ansible.builtin.fail:
            msg: "Filebeat configuration validation failed. check 'filebeat test config' output for ELK {{ elastic_version }} compatibility."

    - name: Service Management Block
      block:
        - name: Ensure Services are Enabled and Started
          ansible.builtin.service:
            name: "{{ item }}"
            state: started
            enabled: true
          loop:
            - logstash
            - filebeat
          register: service_startup

        - name: Verify Logstash API Health (Post-Startup)
          # Poll the local API to ensure Logstash is fully initialized before completing the play
          ansible.builtin.uri:
            url: "http://localhost:{{ logstash_api_port }}/_node/stats"
            method: GET
          register: logstash_health
          until: logstash_health.status == 200
          retries: 15
          delay: 10
          when: install_logstash
          failed_when: logstash_health.status != 200

      rescue:
        - name: Inspect Service Logs on Failure
          ansible.builtin.shell: "journalctl -u {{ item }} --no-pager | tail -n 20"
          loop:
            - logstash
            - filebeat
          register: crash_logs
          changed_when: false
        
        - name: Fail with Diagnostic Data
          ansible.builtin.fail:
            msg: "Service failed to stabilize. Review logs: {{ crash_logs.results | map(attribute='stdout') | list }}"

  handlers:
    - name: Restart Logstash
      ansible.builtin.service:
        name: logstash
        state: restarted
      listen: "restart_services"

    - name: Restart Filebeat
      ansible.builtin.service:
        name: filebeat
        state: restarted
      listen: "restart_services"

  always:
    - name: Cleanup Temporary Validation Files
      ansible.builtin.file:
        path: /tmp/elk_config_test
        state: absent