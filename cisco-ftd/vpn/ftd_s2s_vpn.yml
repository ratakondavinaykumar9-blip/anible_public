---
- name: "Enterprise FTD Site-to-Site VPN via FMC API"
  hosts: all
  connection: local
  gather_facts: true  # Required for ansible_date_time and system facts

  vars:
    # FMC Connection Details (Should be stored in Ansible Vault)
    fmc_host: "fmc.enterprise.local"
    fmc_user: "api_admin"
    fmc_password: "SecurePassword123"
    
    # VPN Topology Metadata
    vpn_topology_name: "S2S-VPN-DC01-TO-BRANCH01"
    topology_type: "POINT_TO_POINT"
    ike_version: "2"
    
    # Local Peer (Data Center FTD)
    local_device_name: "DC01-FTD-HA"
    local_interface_name: "Outside"
    local_protected_networks: ["Internal-Server-Subnet", "DMZ-Subnet"]
    
    # Remote Peer (Branch FTD or Generic Device)
    remote_device_name: "BR01-FTD"
    remote_interface_name: "Outside"
    remote_protected_networks: ["Branch01-Users"]
    
    # Security Parameters
    ike_policy_name: "AES256-SHA512-G21"
    ipsec_proposal_name: "AES256-GCM-ESP"
    preshared_key: "VaultedKeyVariable"
    
    # Deployment Settings
    wait_for_deployment: true
    deployment_timeout: 600

  tasks:
    - name: "VPN CONFIGURATION BLOCK"
      block:
        # STEP 1: RESOLVE UUIDS FOR OBJECTS AND DEVICES
        # FMC API requires UUIDs for configuration. Fetching them dynamically ensure portability across environments.
        - name: "Fetch UUIDs for Peer Devices"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDevice"
            query_params:
              filter: "name:{{ item }}"
          loop:
            - "{{ local_device_name }}"
            - "{{ remote_device_name }}"
          register: device_facts

        - name: "Verify Device UUIDs were retrieved"
          ansible.builtin.assert:
            that:
              - "device_facts.results[0].response.id is defined"
              - "device_facts.results[1].response.id is defined"
            fail_msg: "One or both peer devices ('{{ local_device_name }}' or '{{ remote_device_name }}') could not be found in FMC."

        - name: "Extract Device UUIDs"
          ansible.builtin.set_fact:
            local_device_uuid: "{{ device_facts.results[0].response.id }}"
            remote_device_uuid: "{{ device_facts.results[1].response.id }}"

        - name: "Fetch Network Object UUIDs"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getNetworkObject"
            query_params:
              filter: "name:{{ item }}"
          loop: "{{ local_protected_networks + remote_protected_networks }}"
          register: network_facts

        - name: "Verify all Network Objects exist"
          ansible.builtin.assert:
            that: "item.response.id is defined"
            fail_msg: "Network object '{{ item.item }}' was not found in FMC. Please verify object names."
          loop: "{{ network_facts.results }}"

        - name: "Map Network Names to FMC-formatted UUID Lists"
          # Transforms a list of IDs into the list of objects (dictionaries) required by the FMC API
          ansible.builtin.set_fact:
            local_net_list: "{{ network_facts.results | selectattr('item', 'in', local_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"
            remote_net_list: "{{ network_facts.results | selectattr('item', 'in', remote_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"

        # STEP 2: CONFIGURE VPN TOPOLOGY
        # 'upsertFTDS2SVpnModel' is natively idempotent: it creates the topology if missing or updates if existing.
        - name: "Create or Update FTD Site-to-Site VPN Topology"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "upsertFTDS2SVpnModel"
            data:
              name: "{{ vpn_topology_name }}"
              topologyType: "{{ topology_type }}"
              ikeV2Settings:
                ikeV2Policy: { "name": "{{ ike_policy_name }}" }
              ipsecSettings:
                ipsecProposal: [{ "name": "{{ ipsec_proposal_name }}" }]
                perfectForwardSecrecy: { "modulus": "21" }
              endpoints:
                - device: { "id": "{{ local_device_uuid }}" }
                  interface: { "name": "{{ local_interface_name }}" }
                  networks: "{{ local_net_list }}"
                  connectionType: "BIDIRECTIONAL"
                - device: { "id": "{{ remote_device_uuid }}" }
                  interface: { "name": "{{ remote_interface_name }}" }
                  networks: "{{ remote_net_list }}"
                  connectionType: "BIDIRECTIONAL"
              sharedKey: "{{ preshared_key }}"
          register: vpn_config_result

        - name: "Verify VPN Topology Configuration Success"
          ansible.builtin.assert:
            that: "vpn_config_result.status in [200, 201, 204]"
            fail_msg: "VPN Topology configuration failed. FMC Status: {{ vpn_config_result.status }}. Error: {{ vpn_config_result.msg | default('N/A') }}"

        # STEP 3: TRIGGER POLICY DEPLOYMENT
        - name: "Initiate Policy Deployment to FTD Sensors"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "createDeploymentRequest"
            data:
              version: "{{ ansible_date_time.iso8601_micro }}"
              devices: 
                - { "id": "{{ local_device_uuid }}" }
                - { "id": "{{ remote_device_uuid }}" }
              forceDeploy: false
          register: deployment_job
          when: vpn_config_result.changed
          failed_when: 
            - "deployment_job.status != 201"
            - "'Job already in progress' not in (deployment_job.msg | default(''))"

        # STEP 4: MONITOR DEPLOYMENT STATUS
        - name: "Wait for Deployment Completion"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDeploymentDetail"
            path_params:
              objId: "{{ deployment_job.response.id }}"
          register: deploy_status
          until: "deploy_status.response.status == 'DEPLOYED'"
          retries: "{{ (deployment_timeout / 20) | int }}"
          delay: 20
          when: 
            - "wait_for_deployment"
            - "deployment_job.changed"
            - "deployment_job.response.id is defined"

        - name: "Verify Deployment Final State"
          ansible.builtin.assert:
            that: "deploy_status.response.status == 'DEPLOYED'"
            fail_msg: "FMC Deployment did not reach 'DEPLOYED' state. Current status: {{ deploy_status.response.status | default('Unknown') }}"
          when: "wait_for_deployment and deployment_job.changed"

      rescue:
        - name: "Handle Configuration Failures"
          ansible.builtin.debug:
            msg: |
              CRITICAL ERROR: Failed during task: {{ ansible_failed_task.name }}
              FMC Return Message: {{ ansible_failed_result.msg | default('Check FMC audit logs for details.') }}
          
        - name: "Force Playbook Failure"
          ansible.builtin.fail:
            msg: "Terminating playbook due to VPN configuration or deployment errors."

      always:
        - name: "Final Summary of Execution"
          ansible.builtin.debug:
            msg:
              topology: "{{ vpn_topology_name }}"
              configuration_applied: "{{ vpn_config_result.changed | default(false) }}"
              deployment_triggered: "{{ deployment_job.changed | default(false) }}"
              outcome: "{{ 'SUCCESS' if not ansible_failed_any else 'FAILED' }}"