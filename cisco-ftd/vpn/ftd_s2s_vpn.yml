---
- name: "Enterprise FTD Site-to-Site VPN via FMC API"
  hosts: all
  connection: local
  gather_facts: false

  vars:
    # FMC Connection Details (Should be stored in Ansible Vault)
    fmc_host: "fmc.enterprise.local"
    fmc_user: "api_admin"
    fmc_password: "SecurePassword123"
    
    # VPN Topology Metadata
    vpn_topology_name: "S2S-VPN-DC01-TO-BRANCH01"
    topology_type: "POINT_TO_POINT" # HUB_AND_SPOKE also supported
    ike_version: "2"
    
    # Local Peer (Data Center FTD)
    local_device_name: "DC01-FTD-HA"
    local_interface_name: "Outside"
    local_protected_networks: ["Internal-Server-Subnet", "DMZ-Subnet"]
    
    # Remote Peer (Branch FTD or Generic Device)
    remote_device_name: "BR01-FTD"
    remote_interface_name: "Outside"
    remote_protected_networks: ["Branch01-Users"]
    
    # Security Parameters
    ike_policy_name: "AES256-SHA512-G21"
    ipsec_proposal_name: "AES256-GCM-ESP"
    preshared_key: "VaultedKeyVariable"
    
    # Deployment Settings
    wait_for_deployment: true
    deployment_timeout: 600

  tasks:
    - name: "VPN CONFIGURATION BLOCK"
      block:
        # STEP 1: RESOLVE UUIDS FOR OBJECTS AND DEVICES
        # FMC API requires UUIDs for most operations. We fetch them via names to maintain playbook readability.
        - name: "Fetch UUIDs for Local and Remote Devices"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDevice"
            query_params:
              filter: "name:{{ item }}"
          loop:
            - "{{ local_device_name }}"
            - "{{ remote_device_name }}"
          register: device_facts
          # Ensure the API returned valid data for both devices
          failed_when: 
            - device_facts is failed 
            - device_facts.results | selectattr('response.id', 'defined') | list | length != 2

        - name: "Assert Device UUIDs were successfully retrieved"
          ansible.builtin.assert:
            that:
              - "device_facts.results[0].response.id is defined"
              - "device_facts.results[1].response.id is defined"
            fail_msg: "Could not resolve UUIDs for provided device names. Check FMC inventory."

        - name: "Extract Device UUIDs"
          ansible.builtin.set_fact:
            local_device_uuid: "{{ device_facts.results[0].response.id }}"
            remote_device_uuid: "{{ device_facts.results[1].response.id }}"

        - name: "Fetch Network Object UUIDs"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getNetworkObject"
            query_params:
              filter: "name:{{ item }}"
          loop: "{{ local_protected_networks + remote_protected_networks }}"
          register: network_facts
          # Verify all network objects requested exist in FMC
          failed_when: 
            - network_facts is failed 
            - network_facts.results | selectattr('response.id', 'defined') | list | length != (local_protected_networks + remote_protected_networks) | length

        - name: "Map Network Names to UUIDs and format for API"
          ansible.builtin.set_fact:
            local_net_payload: "{{ network_facts.results | selectattr('item', 'in', local_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"
            remote_net_payload: "{{ network_facts.results | selectattr('item', 'in', remote_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"

        # STEP 2: CONFIGURE VPN TOPOLOGY
        # 'upsertFTDS2SVpnModel' ensures idempotency by updating an existing topology or creating a new one.
        - name: "Create or Update FTD Site-to-Site VPN Topology"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "upsertFTDS2SVpnModel"
            data:
              name: "{{ vpn_topology_name }}"
              topologyType: "{{ topology_type }}"
              ikeV2Settings:
                ikeV2Policy: { "name": "{{ ike_policy_name }}" }
              ipsecSettings:
                ipsecProposal: [{ "name": "{{ ipsec_proposal_name }}" }]
                perfectForwardSecrecy: { "modulus": "21" }
              endpoints:
                - device: { "id": "{{ local_device_uuid }}" }
                  interface: { "name": "{{ local_interface_name }}" }
                  networks: "{{ local_net_payload }}"
                  connectionType: "BIDIRECTIONAL"
                - device: { "id": "{{ remote_device_uuid }}" }
                  interface: { "name": "{{ remote_interface_name }}" }
                  networks: "{{ remote_net_payload }}"
                  connectionType: "BIDIRECTIONAL"
              sharedKey: "{{ preshared_key }}"
          register: vpn_config_result
          # Capture API level errors even if HTTP status is 200
          failed_when: "vpn_config_result is failed or (vpn_config_result.response is defined and vpn_config_result.response.error is defined)"

        - name: "Verify VPN Topology Configuration"
          ansible.builtin.assert:
            that:
              - "vpn_config_result.response.id is defined"
            fail_msg: "FMC failed to return a UUID for the VPN topology."

        # STEP 3: TRIGGER POLICY DEPLOYMENT
        # Only trigger deployment if changes were detected to minimize impact.
        - name: "Initiate Policy Deployment to FTD Sensors"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "createDeploymentRequest"
            data:
              version: "{{ ansible_date_time.iso8601_micro }}"
              devices: 
                - { "id": "{{ local_device_uuid }}" }
                - { "id": "{{ remote_device_uuid }}" }
              forceDeploy: false
          register: deployment_job
          when: vpn_config_result.changed
          failed_when: "deployment_job is failed or (deployment_job.response.id is not defined)"

        # STEP 4: MONITOR DEPLOYMENT STATUS
        # Wait for actual sensor synchronization to ensure the VPN is live.
        - name: "Wait for Deployment Completion"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDeploymentDetail"
            path_params:
              objId: "{{ deployment_job.response.id }}"
          register: deploy_status
          until: deploy_status.response.status == "DEPLOYED"
          retries: "{{ (deployment_timeout / 20) | int }}"
          delay: 20
          when: wait_for_deployment and deployment_job is defined and deployment_job.changed
          # Fail if deployment enters an error state
          failed_when: "deploy_status.response.status in ['FAILED', 'CANCELLED']"

      rescue:
        - name: "Failure Diagnostics"
          ansible.builtin.debug:
            msg: |
              CRITICAL: VPN deployment failed at task: {{ ansible_failed_task.name }}
              Reason: {{ ansible_failed_result.msg | default('Check FMC Task Monitor for overlapping subnets or license issues.') }}
          
        - name: "Stop Execution on Failure"
          ansible.builtin.fail:
            msg: "Playbook halted due to FTD configuration failure. Manual intervention required."

      always:
        - name: "Operational Summary"
          ansible.builtin.debug:
            msg:
              topology_name: "{{ vpn_topology_name }}"
              config_status: "{{ 'CHANGED' if vpn_config_result.changed else 'NO_CHANGE_REQUIRED' }}"
              deployment_status: "{{ deploy_status.response.status | default('SKIPPED') }}"
              deployment_job_id: "{{ deployment_job.response.id | default('N/A') }}"
---