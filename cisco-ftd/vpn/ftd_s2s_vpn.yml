---
- name: "Enterprise FTD Site-to-Site VPN Deployment"
  hosts: localhost
  connection: local
  gather_facts: true # Required for ansible_date_time used in deployment versioning
  
  vars:
    # FMC Connection Details (Sensitive data should be encrypted via ansible-vault)
    fmc_host: "fmc.enterprise.local"
    fmc_user: "api_admin"
    fmc_password: "SecurePassword123"
    
    # VPN Topology Metadata
    vpn_topology_name: "S2S-VPN-DC01-TO-BRANCH01"
    topology_type: "POINT_TO_POINT"
    ike_version: "2"
    
    # Peer Configuration
    local_device_name: "DC01-FTD-HA"
    local_interface_name: "Outside"
    local_protected_networks: ["Internal-Server-Subnet", "DMZ-Subnet"]
    
    remote_device_name: "BR01-FTD"
    remote_interface_name: "Outside"
    remote_protected_networks: ["Branch01-Users"]
    
    # Crypto Policy Names (Must pre-exist on FMC)
    ike_policy_name: "AES256-SHA512-G21"
    ipsec_proposal_name: "AES256-GCM-ESP"
    preshared_key: "VaultedKeyVariable"
    
    # Automation Control
    wait_for_deployment: true
    deployment_timeout: 900 # Seconds

  tasks:
    - name: "VPN CONFIGURATION PIPELINE"
      block:
        # ----------------------------------------------------------------------
        # STEP 1: OBJECT RESOLUTION (NAME TO UUID)
        # FMC API operations require UUIDs. We resolve them dynamically to 
        # allow the use of human-readable names in variables.
        # ----------------------------------------------------------------------
        - name: "Fetch Device UUIDs from FMC"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDevice"
            query_params:
              filter: "name:{{ item }}"
          loop:
            - "{{ local_device_name }}"
            - "{{ remote_device_name }}"
          register: device_facts
          failed_when: "device_facts.results | map(attribute='response.id') | list | length != 2"

        - name: "Register Device UUID Facts"
          ansible.builtin.set_fact:
            local_device_uuid: "{{ (device_facts.results | selectattr('item', 'equalto', local_device_name) | first).response.id }}"
            remote_device_uuid: "{{ (device_facts.results | selectattr('item', 'equalto', remote_device_name) | first).response.id }}"

        - name: "Fetch Network Object UUIDs"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getNetworkObject"
            query_params:
              filter: "name:{{ item }}"
          loop: "{{ local_protected_networks + remote_protected_networks }}"
          register: network_facts

        - name: "Validate All Network Objects Exist"
          ansible.builtin.assert:
            that: "network_facts.results | map(attribute='response.id') | list | length == (local_protected_networks | length + remote_protected_networks | length)"
            fail_msg: "One or more network objects could not be found on FMC."

        - name: "Map Network Names to UUID Dictionaries"
          ansible.builtin.set_fact:
            local_net_objs: "{{ network_facts.results | selectattr('item', 'in', local_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"
            remote_net_objs: "{{ network_facts.results | selectattr('item', 'in', remote_protected_networks) | map(attribute='response.id') | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"

        # ----------------------------------------------------------------------
        # STEP 2: VPN TOPOLOGY DEFINITION
        # 'upsert' ensures idempotency by checking for existing topology by name.
        # ----------------------------------------------------------------------
        - name: "Synchronize FTD Site-to-Site VPN Topology"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "upsertFTDS2SVpnModel"
            data:
              name: "{{ vpn_topology_name }}"
              topologyType: "{{ topology_type }}"
              ikeV2Settings:
                ikeV2Policy: { "name": "{{ ike_policy_name }}" }
              ipsecSettings:
                ipsecProposal: [{ "name": "{{ ipsec_proposal_name }}" }]
                perfectForwardSecrecy: { "modulus": "21" }
              endpoints:
                - device: { "id": "{{ local_device_uuid }}" }
                  interface: { "name": "{{ local_interface_name }}" }
                  networks: "{{ local_net_objs }}"
                  connectionType: "BIDIRECTIONAL"
                - device: { "id": "{{ remote_device_uuid }}" }
                  interface: { "name": "{{ remote_interface_name }}" }
                  networks: "{{ remote_net_objs }}"
                  connectionType: "BIDIRECTIONAL"
              sharedKey: "{{ preshared_key }}"
          register: vpn_config_result

        - name: "Verify VPN Configuration Success"
          ansible.builtin.assert:
            that: "vpn_config_result.response is defined"
            fail_msg: "FMC failed to return a valid response for VPN configuration."

        # ----------------------------------------------------------------------
        # STEP 3: DEPLOYMENT (DATABASE TO SENSOR)
        # Changes are staged in FMC DB until a deployment request is created.
        # ----------------------------------------------------------------------
        - name: "Trigger Policy Deployment to Devices"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "createDeploymentRequest"
            data:
              version: "{{ ansible_date_time.iso8601_micro }}"
              devices: 
                - { "id": "{{ local_device_uuid }}" }
                - { "id": "{{ remote_device_uuid }}" }
              forceDeploy: false
          register: deployment_job
          when: vpn_config_result.changed
          failed_when: "deployment_job.response.id is not defined"

        # ----------------------------------------------------------------------
        # STEP 4: POST-CHANGE VERIFICATION
        # Monitor the asynchronous deployment task until completion or timeout.
        # ----------------------------------------------------------------------
        - name: "Monitor Deployment Progress"
          cisco.fmcansible.fmc_configuration:
            fmc_host: "{{ fmc_host }}"
            fmc_user: "{{ fmc_user }}"
            fmc_password: "{{ fmc_password }}"
            operation: "getDeploymentDetail"
            path_params:
              objId: "{{ deployment_job.response.id }}"
          register: deploy_status
          until: "deploy_status.response.status in ['DEPLOYED', 'FAILED']"
          retries: "{{ (deployment_timeout / 30) | int }}"
          delay: 30
          when: 
            - wait_for_deployment 
            - deployment_job is not skipped
          failed_when: "deploy_status.response.status != 'DEPLOYED'"

      rescue:
        - name: "Error Diagnostics"
          ansible.builtin.debug:
            msg: |
              VPN CONFIGURATION FAILED.
              Reason: {{ ansible_failed_result.msg | default('API Error') }}
              Check FMC 'Task Status' or 'Policy Analysis' for detailed validation errors.

        - name: "Terminate Playbook with Failure State"
          ansible.builtin.fail:
            msg: "Mission-critical VPN deployment failed verification."

      always:
        - name: "Execution Summary"
          ansible.builtin.debug:
            msg:
              topology: "{{ vpn_topology_name }}"
              configuration_changed: "{{ vpn_config_result.changed | default(false) }}"
              deployment_triggered: "{{ not deployment_job.skipped | default(false) }}"
              deployment_id: "{{ deployment_job.response.id | default('N/A') }}"
              final_status: "{{ 'SUCCESS' if not ansible_failed_any else 'FAILURE' }}"
