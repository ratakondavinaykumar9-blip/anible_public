---
# NetLearner Architect: Advanced VPN Observability Playbook
# Standards: Idempotency, FQCN, Assertive Validation, and Error Handling
# Focus: Comprehensive Site-to-Site (L2L) Tunnel Health Monitoring
---
- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve active L2L VPN session database
      # Why: Establishes the baseline of currently established Site-to-Site tunnels.
      # Note: 'show vpn-sessiondb' is a safe, read-only operation (Idempotent).
      cisco.asa.asa_command:
        commands:
          - show vpn-sessiondb l2l
      register: l2l_output
      failed_when: 
        - l2l_output.failed
        - "'Invalid input' in l2l_output.stdout[0]"

    - name: Verify L2L session retrieval success
      # Why: Ensures the device responded with valid session data before proceeding.
      ansible.builtin.assert:
        that:
          - l2l_output.stdout is defined
          - l2l_output.stdout | length > 0
        fail_msg: "Failed to retrieve L2L VPN session database from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved L2L session data."

    - name: Retrieve IPsec Security Associations (Phase 2)
      # Why: Validates the encryption/decryption status and traffic selectors for active tunnels.
      cisco.asa.asa_command:
        commands:
          - show crypto ipsec sa
      register: ipsec_sa_output
      ignore_errors: true

    - name: Retrieve IKEv1 Security Associations (Phase 1 Legacy)
      # Why: Monitors Phase 1 status for legacy peers still utilizing IKEv1.
      cisco.asa.asa_command:
        commands:
          - show crypto isakmp sa
      register: ikev1_output
      ignore_errors: true

    - name: Retrieve IKEv2 Security Associations (Phase 1 Modern)
      # Why: Monitors Phase 1 status for modern peers using the IKEv2 framework.
      cisco.asa.asa_command:
        commands:
          - show crypto ikev2 sa
      register: ikev2_output
      ignore_errors: true

    - name: Display Comprehensive VPN Status Summary
      # Why: Provides a consolidated view for operators to quickly assess tunnel health.
      ansible.builtin.debug:
        msg: |
          ==============================================================================
          NETLEARNER VPN DIAGNOSTIC REPORT: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          ==============================================================================
          
          [SITE-TO-SITE SESSIONS]
          {{ l2l_output.stdout[0] | default('No active sessions found.') }}

          [PHASE 2 (IPSEC) SUMMARY]
          {% if 'ident:' in (ipsec_sa_output.stdout[0] | default('')) %}
          IPsec SAs are present and active.
          {% else %}
          No active IPsec Security Associations detected.
          {% endif %}

          [PHASE 1 (IKEv1/IKEv2) STATUS]
          IKEv1: {{ 'Active' if 'QM_IDLE' in (ikev1_output.stdout[0] | default('')) else 'None/Inactive' }}
          IKEv2: {{ 'Active' if 'READY' in (ikev2_output.stdout[0] | default('')) else 'None/Inactive' }}
          ==============================================================================
```