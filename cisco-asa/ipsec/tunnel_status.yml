---
# IPSec Tunnel Status Overview
# This playbook retrieves the current status of IPSec VPN tunnels on Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observed (Asserts), Documented, Error Handled, FQCN.

- name: Get IPSec Tunnel Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get L2L VPN sessions
      # Why: To identify active Site-to-Site sessions and overall connection counts.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb l2l
      register: l2l_result
      changed_when: false
      failed_when: 
        - l2l_result.stdout == ""
        - "'Invalid' in l2l_result.stdout"

    - name: Verify L2L session command success
      # Why: Ensure the control plane responded correctly before providing output.
      ansible.builtin.assert:
        that:
          - "l2l_result.stdout is defined"
        fail_msg: "Critical: Command 'show vpn-sessiondb l2l' failed on {{ inventory_hostname }}"
        quiet: true

    - name: Get IPsec SA details
      # Why: To check Phase 2 Security Association (SA) status, encap/decap counters, and SPIs.
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa
      register: ipsec_sa_result
      changed_when: false
      failed_when: "'Invalid' in ipsec_sa_result.stdout"

    - name: Get IKEv1 (ISAKMP) SA status
      # Why: To verify Phase 1 status for legacy IKEv1 tunnels.
      # ignore_errors is used as some environments or FTD versions may prioritize IKEv2 only.
      ansible.netcommon.cli_command:
        command: show crypto isakmp sa
      register: ikev1_result
      changed_when: false
      ignore_errors: true

    - name: Get IKEv2 SA status
      # Why: To verify Phase 1 status for modern IKEv2 tunnels.
      # ignore_errors is used as some legacy environments may not have IKEv2 configured.
      ansible.netcommon.cli_command:
        command: show crypto ikev2 sa
      register: ikev2_result
      changed_when: false
      ignore_errors: true

    - name: Output IPSec Status Summary
      # Why: Provide a human-readable consolidated report for the network operator.
      ansible.builtin.debug:
        msg: |
          ============================================================
          IPSec Status Report for: {{ inventory_hostname }}
          ============================================================
          [L2L SESSIONS]
          {{ l2l_result.stdout }}

          [IPSEC SA DETAILS (Truncated)]
          {{ ipsec_sa_result.stdout | truncate(1000) }}

          [IKEv1 STATUS]
          {{ ikev1_result.stdout | default('No IKEv1 SAs or command not supported.') }}

          [IKEv2 STATUS]
          {{ ikev2_result.stdout | default('No IKEv2 SAs or command not supported.') }}