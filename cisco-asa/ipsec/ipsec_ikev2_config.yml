---
# IKEv2 and IPsec Profile Configuration Retrieval
# Improved by: NetLearner Architect
# Purpose: This playbook gathers and validates security configurations for audit and troubleshooting.
# Idempotency: Read-only operations are inherently idempotent and safe for repeated execution.

- name: Get IKEv2 Configuration
  hosts: asa_firepower
  gather_facts: false # Performance: Facts are not required for simple CLI command execution

  tasks:
    - name: Retrieve IKEv2 running configuration
      # Using Fully Qualified Collection Name (FQCN) for cross-version compatibility
      ansible.netcommon.cli_command:
        command: show running-config crypto ikev2
      register: ikev2_output
      # Error Handling: Ensure the command is recognized and didn't result in a parser error
      failed_when: 
        - ikev2_output.failed or "Invalid input" in ikev2_output.stdout

    - name: Verify IKEv2 configuration retrieval
      # Observability: Assert that the command produced an output string
      ansible.builtin.assert:
        that:
          - ikev2_output.stdout is defined
        fail_msg: "Failed to capture IKEv2 configuration from the device."
        quiet: true

    - name: Retrieve crypto ipsec profile configuration
      ansible.netcommon.cli_command:
        command: show running-config crypto ipsec profile
      register: ipsec_profile_output
      failed_when: 
        - ipsec_profile_output.failed or "Invalid input" in ipsec_profile_output.stdout

    - name: Verify IPsec profile configuration retrieval
      ansible.builtin.assert:
        that:
          - ipsec_profile_output.stdout is defined
        fail_msg: "Failed to capture IPsec profile configuration from the device."
        quiet: true

    - name: Display Configuration Summary
      # Documentation: Provide a formatted view for administrative review
      ansible.builtin.debug:
        msg: |
          ======================= IKEv2 CONFIG =======================
          {{ ikev2_output.stdout | default('No IKEv2 configuration found') }}

          ==================== IPSEC PROFILE CONFIG ==================
          {{ ipsec_profile_output.stdout | default('No IPsec profile configuration found') }}