---
# Crypto Drops
# Auto-improved: 2026-03-08
# Author: Architect:#
# Description: Retrieves and validates crypto protocol drop statistics on Cisco ASA.
# 1. Idempotency: Read-only command execution; safe for multiple runs.
# 2. Observability: Uses 'register' and 'assert' to verify data retrieval.
# 3. Error Handling: 'failed_when' catches command failures or invalid syntax.
# 4. Best Practices: Uses Fully Qualified Collection Names (FQCN).
---
- name: Crypto Drops Monitoring
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get crypto protocol drop statistics
      # FQCN: Using ansible.netcommon.cli_command for platform-agnostic CLI execution
      ansible.netcommon.cli_command:
        command: show crypto protocol drop
      register: drops_output
      # Error Handling: Fail if the command explicitly fails or returns "Invalid input"
      failed_when:
        - drops_output.failed or "Invalid input" in drops_output.stdout

    - name: Verify command output integrity
      # Observability: Assert that the output contains data to ensure valid response
      ansible.builtin.assert:
        that:
          - "drops_output.stdout | length > 0"
        fail_msg: "The command 'show crypto protocol drop' returned an empty result on {{ inventory_hostname }}."
        success_msg: "Successfully captured crypto drop data."

    - name: Display formatted crypto drop results
      # Documentation: Providing a clear view of the retrieved statistics for operators
      ansible.builtin.debug:
        msg: |
          ======================= CRYPTO DROPS: {{ inventory_hostname }} =======================
          {{ drops_output.stdout }}