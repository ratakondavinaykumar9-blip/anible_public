---
# NetLearner Architect: Crypto Drop Monitoring
# Purpose: Audit IPsec/Crypto drop counters for network health monitoring and troubleshooting.
# Idempotency: This operation is read-only and safe to execute repeatedly without altering device state.
- name: Crypto Protocol Drop Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve crypto protocol drop statistics
      # Use Fully Qualified Collection Name (FQCN) for consistent module resolution.
      # The 'register' keyword captures command output for validation and reporting.
      ansible.netcommon.cli_command:
        command: show crypto protocol drop
      register: drops
      # Error Handling: Fail explicitly if the command is unrecognized or execution fails.
      failed_when: 
        - drops.failed | default(false)
        - "'Invalid input' in drops.stdout"

    - name: Validate telemetry integrity
      # Observability: Assert that the device returned valid data.
      # This prevents the playbook from silently succeeding with empty or malformed data.
      ansible.builtin.assert:
        that:
          - drops.stdout is defined
          - drops.stdout | length > 0
        fail_msg: "The crypto drop statistics for {{ inventory_hostname }} are unavailable or malformed."
        success_msg: "Crypto telemetry successfully captured and validated."

    - name: Display Crypto Drop Report
      # Documentation: Provide a structured, human-readable view of the operational state.
      ansible.builtin.debug:
        msg: |
          ============================================================
          CRYPTO DROP STATISTICS - {{ inventory_hostname }}
          ============================================================
          {{ drops.stdout }}
          ============================================================
