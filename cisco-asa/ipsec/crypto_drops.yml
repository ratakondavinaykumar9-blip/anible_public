---
# Crypto Drops
# Improved by NetLearner Architect: 2026-03-15
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Crypto Drops Monitoring
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve crypto protocol drop statistics from the device
      # Why: Essential for troubleshooting IPsec/SSL VPN decryption or negotiation failures.
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI access.
      ansible.netcommon.cli_command:
        command: show crypto protocol drop
      register: drops_result
      # Error Handling: Ensure the command is valid for the target device and execution was successful.
      failed_when: 
        - drops_result.failed or "Invalid input" in drops_result.stdout

    - name: Validate successful retrieval of crypto drop data
      # Observability: Using assert to ensure the playbook provides a clear failure if data is missing.
      ansible.builtin.assert:
        that:
          - drops_result.stdout is defined
          - drops_result.stdout | length > 0
        fail_msg: "The command 'show crypto protocol drop' returned no data or failed."
        success_msg: "Crypto drop statistics successfully captured."

    - name: Display formatted Crypto Drops report
      # Observability: Provide clear, human-readable output in the Ansible log for operators.
      ansible.builtin.debug:
        msg: |
          ======================= CRYPTO DROPS SUMMARY =======================
          {{ drops_result.stdout }}