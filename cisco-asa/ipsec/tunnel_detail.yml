---
# Detailed IPSec Tunnel Information
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get Detailed IPSec Tunnel Info
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Variable to filter by a specific peer IP; defaults to empty for all tunnels
    tunnel_peer: ""

  tasks:
    - name: Retrieve VPN session database details
      # Fetches active LAN-to-LAN tunnel statistics and operational state
      # Using FQCN for the generic CLI command module
      ansible.netcommon.cli_command:
        command: "{{ 'show vpn-sessiondb l2l filter-ipaddress=' + tunnel_peer if tunnel_peer else 'show vpn-sessiondb l2l' }}"
      register: tunnel_detail
      # Ignore errors to prevent playbook termination if no tunnels are active
      ignore_errors: true

    - name: Validate tunnel detail command execution
      # Observability: Assert that the command was attempted and result was captured
      ansible.builtin.assert:
        that:
          - tunnel_detail is defined
        fail_msg: "Data collection failed for tunnel_detail on {{ inventory_hostname }}"

    - name: Retrieve Crypto IPsec Security Association details
      # Captures Phase 2 information including encryption/hashing and traffic selectors
      ansible.netcommon.cli_command:
        command: "{{ 'show crypto ipsec sa peer ' + tunnel_peer if tunnel_peer else 'show crypto ipsec sa' }}"
      register: crypto_sa
      ignore_errors: true

    - name: Retrieve IKEv1 (ISAKMP) details
      # Gathers Phase 1 information for legacy IKEv1 tunnels
      ansible.netcommon.cli_command:
        command: show crypto isakmp sa detail
      register: ikev1_detail
      ignore_errors: true

    - name: Retrieve IKEv2 details
      # Gathers Phase 1 information for modern IKEv2 tunnels
      ansible.netcommon.cli_command:
        command: show crypto ikev2 sa detail
      register: ikev2_detail
      ignore_errors: true

    - name: Display Consolidated IPSec Report
      # Aggregates all collected data into a single structured output for the operator
      ansible.builtin.debug: