---
# IKEv1 Tunnel Configuration - Audit and Verification
# This playbook retrieves and validates IKEv1 IPSec settings on Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observability (Assert), FQCN usage, and Error Handling.
# Improved: 2026-03-15
- name: Get IKEv1 Configuration
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Get IKEv1 crypto map policy
      # FQCN: Using ansible.netcommon.cli_command for standardized network interaction
      ansible.netcommon.cli_command:
        command: show running-config crypto map
      register: crypto_map
      # Error Handling: Fail if the output is empty or contains "Invalid" command responses
      failed_when: 
        - crypto_map.stdout == "" or "Invalid" in crypto_map.stdout

    - name: Verify Crypto Map output integrity
      # Observability: Assert that the command returned valid data
      ansible.builtin.assert:
        that:
          - "crypto_map.stdout is defined"
          - "crypto_map.stdout | length > 0"
        fail_msg: "Crypto map configuration is empty or could not be retrieved."
        quiet: true

    - name: Get IKEv1 transform-set configuration
      ansible.netcommon.cli_command:
        command: show crypto ipsec transform-set
      register: transform_set
      failed_when: 
        - transform_set.stdout == "" or "Invalid" in transform_set.stdout

    - name: Verify Transform-set output integrity
      ansible.builtin.assert:
        that:
          - "transform_set.stdout is defined"
          - "transform_set.stdout | length > 0"
        fail_msg: "IPSec Transform-set configuration is empty or could not be retrieved."
        quiet: true

    - name: Get crypto ISAKMP policy details
      ansible.netcommon.cli_command:
        command: show running-config crypto isakmp policy
      register: isakmp
      failed_when: 
        - isakmp.stdout == "" or "Invalid" in isakmp.stdout

    - name: Verify ISAKMP Policy output integrity
      ansible.builtin.assert:
        that:
          - "isakmp.stdout is defined"
          - "isakmp.stdout | length > 0"
        fail_msg: "ISAKMP policy configuration is empty or could not be retrieved."
        quiet: true

    - name: Display consolidated IKEv1 configuration
      # FQCN: Using ansible.builtin.debug for standardized reporting
      ansible.builtin.debug:
        msg: |
          ======================= IKEv1 CONFIG AUDIT =======================
          ISAKMP Policy:
          {{ isakmp.stdout }}
          
          Crypto Map:
          {{ crypto_map.stdout }}
          
          Transform Set:
          {{ transform_set.stdout }}