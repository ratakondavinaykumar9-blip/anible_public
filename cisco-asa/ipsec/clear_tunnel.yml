---
# Clear IPSec Tunnel
# Optimized for: Idempotency, Observability, and Error Handling
# Standards: FQCN, Register/Assert verification, and internal documentation
- name: Clear IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Specify the remote peer IP to clear a single tunnel. 
    # If left empty, all IPSec Security Associations (SAs) will be cleared.
    tunnel_peer: ""

  tasks:
    - name: Clear specific crypto session for peer
      # Targeted clear to minimize impact on unrelated tunnels.
      # Using FQCN: ansible.netcommon.cli_command
      ansible.netcommon.cli_command:
        command: "clear crypto session local {{ tunnel_peer }}"
      register: clear_peer_result
      when: tunnel_peer | length > 0
      # Idempotency: Do not fail if the session is already gone or not found.
      failed_when:
        - clear_peer_result.failed
        - "'not found' not in clear_peer_result.stdout"
        - "'No session' not in clear_peer_result.stdout"

    - name: Clear all crypto IPSec SAs
      # Global clear used as a fallback when no specific peer is provided.
      ansible.netcommon.cli_command:
        command: "clear crypto ipsec sa"
      register: clear_all_result
      when: tunnel_peer | length == 0
      failed_when: clear_all_result.failed

    - name: Verify clear operation success
      # Observability: Ensure the command was processed successfully by the device.
      ansible.builtin.assert:
        that:
          - (tunnel_peer | length > 0 and clear_peer_result is defined and not clear_peer_result.failed) or
            (tunnel_peer | length == 0 and clear_all_result is defined and not clear_all_result.failed)
        fail_msg: "IPSec Tunnel clear operation failed on {{ inventory_hostname }}"
        success_msg: "IPSec Tunnel clear operation completed on {{ inventory_hostname }}"
        quiet: true

    - name: Display execution result
      # Documentation/Logging: Provide clear feedback on which action was taken.
      ansible.builtin.debug:
        msg: >
          {{ 
            'Successfully cleared session for peer: ' + tunnel_peer if tunnel_peer | length > 0 
            else 'Successfully cleared all IPSec SAs.' 
          }}