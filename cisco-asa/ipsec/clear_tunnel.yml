# NetLearner Standard: Clear IPSec Tunnel
# Purpose: Administratively reset crypto sessions or SAs on Cisco ASA/Firepower
# Standards compliance: Idempotent (safe re-run), Observable (Assert), FQCN
# Author: NetLearner Architect (AI)
---
- name: Clear IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    tunnel_peer: ""

  tasks:
    - name: "VERIFY | Ensure required variables are present"
      ansible.builtin.assert:
        that:
          - tunnel_peer is defined
        fail_msg: "Variable 'tunnel_peer' must be defined. Use empty string for a global clear."

    - name: "CLEAR | Remove crypto sessions for specific peer"
      # Executes only if tunnel_peer is specified. Idempotent as clearing a missing session is a no-op.
      ansible.netcommon.cli_command:
        command: "clear crypto session local {{ tunnel_peer }}"
      register: clear_peer_result
      when: tunnel_peer | length > 0
      # Cisco ASA returns empty string on success. Filter for CLI syntax or execution errors.
      failed_when: 
        - clear_peer_result.stdout | length > 0
        - "'Invalid' in clear_peer_result.stdout or 'Error' in clear_peer_result.stdout"

    - name: "CLEAR | Remove all crypto Security Associations (Global)"
      # Executes only if tunnel_peer is empty. Safe to run multiple times.
      ansible.netcommon.cli_command:
        command: "clear crypto ipsec sa"
      register: clear_global_result
      when: tunnel_peer | length == 0
      failed_when:
        - clear_global_result.stdout | length > 0
        - "'Invalid' in clear_global_result.stdout or 'Error' in clear_global_result.stdout"

    - name: "OBSERVE | Validate successful execution of clear commands"
      # Verification step to ensure the device processed the command without error.
      ansible.builtin.assert:
        that:
          - clear_peer_result is skipped or (clear_peer_result.failed == false)
          - clear_global_result is skipped or (clear_global_result.failed == false)
        quiet: true

    - name: "DEBUG | Final execution summary"
      ansible.builtin.debug:
        msg: 
          - "Tunnel Peer: {{ tunnel_peer if tunnel_peer | length > 0 else 'ALL (Global)' }}"
          - "Status: Command accepted by the device."
          - "Output: {{ clear_peer_result.stdout | default(clear_global_result.stdout | default('Success (No output)')) }}"