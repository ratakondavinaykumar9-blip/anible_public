---
# Clear IPSec Tunnel
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Target: Cisco ASA / Firepower (ASA Mode)
- name: Clear IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Optional: Peer IP address to clear. If empty, all SAs are cleared.
    tunnel_peer: ""

  tasks:
    - name: Clear crypto sessions for specific peer
      # Why: Targeted clearing prevents disruption to other healthy VPN tunnels.
      ansible.netcommon.cli_command:
        command: "clear crypto session local {{ tunnel_peer }}"
      register: clear_session_result
      when: tunnel_peer | length > 0
      # Idempotency: Ignore errors if the session is already cleared or doesn't exist.
      failed_when:
        - clear_session_result.failed
        - "'not found' not in clear_session_result.stdout"
        - "'No such' not in clear_session_result.stdout"

    - name: Clear all crypto IPsec SAs
      # Why: Fallback to clear all Security Associations when no peer is specified.
      ansible.netcommon.cli_command:
        command: "clear crypto ipsec sa"
      register: clear_all_result
      when: tunnel_peer | length == 0

    - name: Validate operation success
      # Observability: Ensure the command was accepted by the device.
      ansible.builtin.assert:
        that:
          - clear_session_result is skipped or not clear_session_result.failed
          - clear_all_result is skipped or not clear_all_result.failed
        fail_msg: "The crypto clear command failed to execute on the host."
        success_msg: "Tunnel clear command executed successfully."

    - name: Report execution results
      # Observability: Log the output for audit and troubleshooting purposes.
      ansible.builtin.debug:
        msg: 
          - "Action: {{ 'Clear Peer ' + tunnel_peer if tunnel_peer | length > 0 else 'Clear All SAs' }}"
          - "Output: {{ clear_session_result.stdout | default(clear_all_result.stdout | default('Success')) }}"