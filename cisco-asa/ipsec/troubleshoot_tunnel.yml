---
# ==============================================================================
# IPSec Tunnel Troubleshooting Playbook
# Purpose: Diagnostic tool to identify failures in Phase 1 (IKE) or Phase 2 (IPsec)
# Target: Cisco ASA / Firepower (ASA Engine)
# Author: NetLearner Architect
# ==============================================================================
- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    tunnel_peer: ""

  tasks:
    - name: "VALIDATION: Ensure tunnel_peer is provided and valid"
      # Why: Preventing command failures by validating input before execution
      ansible.builtin.assert:
        that:
          - tunnel_peer | length > 0
        fail_msg: "CRITICAL: tunnel_peer variable is required. Example: -e 'tunnel_peer=1.2.3.4'"
        success_msg: "Validated input for peer: {{ tunnel_peer }}"

    - name: "DIAGNOSTIC: Check IKEv1 Security Associations"
      # Why: Verifies if Phase 1 negotiation completed using legacy IKEv1 protocol
      cisco.asa.asa_command:
        commands:
          - "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1
      ignore_errors: true

    - name: "DIAGNOSTIC: Check IKEv2 Security Associations"
      # Why: Verifies if Phase 1 negotiation completed using modern IKEv2 protocol
      cisco.asa.asa_command:
        commands:
          - "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2
      ignore_errors: true

    - name: "DIAGNOSTIC: Check IPsec (Phase 2) Security Associations"
      # Why: Confirms if Data Plane (ESP) tunnels are established and passing traffic
      cisco.asa.asa_command:
        commands:
          - "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec
      ignore_errors: true

    - name: "DIAGNOSTIC: Check VPN Session Database"
      # Why: Provides a consolidated view of the L2L session lifetime and data counters
      cisco.asa.asa_command:
        commands:
          - "show vpn-sessiondb l2l filter ipaddress {{ tunnel_peer }}"
      register: session
      ignore_errors: true

    - name: "LOGGING: Capture recent relevant syslog errors"
      # Why: Captures specific failure reasons (e.g., authentication failure, proxy-id mismatch)
      cisco.asa.asa_command:
        commands:
          - "show logging | include {{ tunnel_peer }}|error | last 20"
      register: logs
      ignore_errors: true

    - name: "OBSERVABILITY: Analyze Tunnel Health Facts"
      # Why: Converts raw CLI output into actionable boolean logic for the summary
      ansible.builtin.set_fact:
        is_p1_up: >-
          {{ 'AM_ACTIVE' in ikev1.stdout[0] or 
             'READY' in ikev2.stdout[0] or 
             'UP-ACTIVE' in ikev2.stdout[0] }}
        is_p2_up: "{{ 'caps:' in ipsec.stdout[0] }}"

    - name: "SUMMARY: Final Diagnostic Report"
      # Why: Provides a human-readable dashboard of the troubleshooting results
      ansible.builtin.debug:
        msg: |
          ======================= TUNNEL DIAGNOSTICS =======================
          PEER ADDRESS    : {{ tunnel_peer }}
          IKE PHASE 1     : {{ '✅ UP' if is_p1_up else '❌ DOWN' }}
          IPSEC PHASE 2   : {{ '✅ UP' if is_p2_up else '❌ DOWN' }}
          ======================= DETAILED OUTPUT ==========================
          [IKEv1]
          {{ ikev1.stdout[0] | default('No IKEv1 SA found') }}

          [IKEv2]
          {{ ikev2.stdout[0] | default('No IKEv2 SA found') }}

          [IPsec/Phase 2]
          {{ ipsec.stdout[0] | default('No IPsec SA found') }}

          [Session Stats]
          {{ session.stdout[0] | default('No active session found') }}

          [Relevant Logs]
          {{ logs.stdout[0] | default('No matching log entries found') }}
...
