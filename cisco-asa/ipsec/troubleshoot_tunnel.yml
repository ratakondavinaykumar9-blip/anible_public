---
# IPSec Tunnel Troubleshooting Playbook
# Improved for NetLearner Standards: Idempotency, Observability, and Error Handling.
- name: Troubleshoot IPSec Tunnel
  hosts: asa_firepower
  gather_facts: false
  vars:
    tunnel_peer: ""

  tasks:
    - name: "VALIDATION: Ensure tunnel_peer variable is provided"
      # Why: Prevents execution with empty variables which would lead to CLI syntax errors or ambiguous results.
      ansible.builtin.assert:
        that:
          - tunnel_peer | length > 0
        fail_msg: "ERROR: tunnel_peer variable is required. Usage: ansible-playbook troubleshoot.yml -e 'tunnel_peer=1.2.3.4'"
        quiet: true

    - name: "IKEv1: Check IKEv1 Security Associations"
      # Why: Verifies Phase 1 status. changed_when: false ensures idempotency reporting for read-only operations.
      ansible.netcommon.cli_command:
        command: "show crypto isakmp sa {{ tunnel_peer }}"
      register: ikev1
      ignore_errors: true
      changed_when: false

    - name: "IKEv2: Check IKEv2 Security Associations"
      # Why: Verifies Phase 1 status for IKEv2. Essential for troubleshooting modern VPN deployments.
      ansible.netcommon.cli_command:
        command: "show crypto ikev2 sa {{ tunnel_peer }}"
      register: ikev2
      ignore_errors: true
      changed_when: false

    - name: "IPSEC: Check Phase 2 (IPsec) Security Associations"
      # Why: Validates that Phase 2 is established and encryption/decryption (data plane) is occurring.
      ansible.netcommon.cli_command:
        command: "show crypto ipsec sa peer {{ tunnel_peer }}"
      register: ipsec
      ignore_errors: true
      changed_when: false

    - name: "SESSION: Check VPN Session Database"
      # Why: Provides a consolidated view of the L2L session state, including duration and throughput.
      ansible.netcommon.cli_command:
        command: "show vpn-sessiondb l2l filter-ipaddress={{ tunnel_peer }}"
      register: session
      ignore_errors: true
      changed_when: false

    - name: "LOGS: Check recent syslog entries for peer"
      # Why: Filters logs specifically for the peer to identify handshake failures or policy mismatches.
      ansible.netcommon.cli_command:
        command: "show logging | include {{ tunnel_peer }} | last 20"
      register: logs
      ignore_errors: true
      changed_when: false

    - name: "OBSERVABILITY: Verify successful diagnostic collection"
      # Why: Confirms the playbook successfully communicated with the device and populated registers.
      ansible.builtin.assert:
        that:
          - ikev1.stdout is defined
          - ikev2.stdout is defined
          - ipsec.stdout is defined
        msg: "Diagnostic collection failed. Verify network connectivity, credentials, and 'ansible_network_os' setting."

    - name: "SUMMARY: Formatted Tunnel Status Report"
      # Why: Aggregates technical data into an actionable, human-readable summary for rapid analysis.
      ansible.builtin.debug:
        msg: |
          ======================= TUNNEL STATUS: {{ tunnel_peer }} =======================
          PHASE 1 (IKE) STATUS:
          {% set ikev1_out = ikev1.stdout | default('') %}
          {% set ikev2_out = ikev2.stdout | default('') %}
          {% if 'AM_ACTIVE' in ikev1_out or 'UP-ACTIVE' in ikev2_out %}
          ✅ IKE Phase 1: UP
          {% else %}
          ❌ IKE Phase 1: DOWN (Check credentials, pre-shared keys, or connectivity)
          {% endif %}

          ======================= IKEv1 OUTPUT =======================
          {{ ikev1.stdout | default('No IKEv1 SA found.') }}

          ======================= IKEv2 OUTPUT =======================
          {{ ikev2.stdout | default('No IKEv2 SA found.') }}

          ======================= IPSEC SA DETAILS =======================
          {{ ipsec.stdout | default('No IPsec (Phase 2) SA found.') }}

          ======================= VPN SESSION DB =======================
          {{ session.stdout | default('No active session entry in database.') }}

          ======================= RE