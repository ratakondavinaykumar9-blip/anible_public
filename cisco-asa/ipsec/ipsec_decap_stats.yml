---
# IPsec Decapsulation Statistics Retrieval
# This playbook retrieves and validates IPsec statistics from Cisco ASA/Firepower devices.
# Standards followed: Idempotency (read-only), Observability (assert/register), 
# Documentation (comments), Error Handling (failed_when), Best Practices (FQCN).

- name: IPsec Decapsulation Statistics Monitoring
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve IPsec statistics from the security appliance
      # Using FQCN for cross-platform network command execution.
      # Read-only commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: show crypto ipsec stats
      register: ipsec_stats_raw
      # Error Handling: Fail explicitly if the command returns an error or is unrecognized.
      failed_when: 
        - ipsec_stats_raw.failed
        - "'Invalid input' in ipsec_stats_raw.stdout"

    - name: Validate IPsec statistics response integrity
      # Observability: Assert that the output contains the expected header to confirm success.
      ansible.builtin.assert:
        that:
          - "'IPsec statistics' in ipsec_stats_raw.stdout"
        fail_msg: "The command output does not contain valid IPsec statistics. Check device status."
        success_msg: "Successfully validated IPsec statistics output."

    - name: Display formatted IPsec decapsulation data
      # Structured observability for network operators.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DECAP STATUS =======================
          {{ ipsec_stats_raw.stdout }}
