---
# IPsec Decap Statistics Extraction
# Auto-improved: 2026-03-15
# Author: NetLearner Architect
#
- name: "ASA/Firepower: Extract IPsec Decapsulation Stats"
  hosts: asa_firepower
  gather_facts: false
  # Documentation: This playbook retrieves real-time IPsec decapsulation counters.
  # It ensures observability through explicit validation of the CLI output.
  # Idempotency: 'show' commands are read-only and safe to execute repeatedly without state change.

  tasks:
    - name: "Execute show crypto ipsec stats"
      # Best Practices: Use Fully Qualified Collection Name (FQCN) for network command execution
      ansible.netcommon.cli_command:
        command: "show crypto ipsec stats"
      # Observability: Capture output for verification and reporting
      register: r_ipsec_stats
      # Error Handling: Explicitly identify failure if the command is unrecognized or returns an error
      failed_when: 
        - r_ipsec_stats.failed or "Invalid input" in r_ipsec_stats.stdout
      # Ensure command runs even in check_mode
      check_mode: false

    - name: "Verify IPsec statistics integrity"
      # Observability: Use assert to ensure the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - "r_ipsec_stats.stdout is defined"
          - "r_ipsec_stats.stdout | length > 0"
          - "'IPsec' in r_ipsec_stats.stdout"
        fail_msg: "The IPsec statistics output is empty or invalid. Check crypto engine status."
        success_msg: "IPsec statistics successfully retrieved and validated."

    - name: "Display formatted IPsec metrics"
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC DECAP REPORT =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          ------------------------------------------------------------------
          {{ r_ipsec_stats.stdout }}
          ==================================================================