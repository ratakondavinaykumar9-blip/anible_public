---
# Ipsec Stats - NetLearner Architect Improved
# Purpose: Comprehensive monitoring of IPSec and ISAKMP counters for ASA/Firepower.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get IPSec Statistics
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch detailed IPsec Security Association (SA) data
      # Why: Essential for verifying active tunnel SPIs and monitoring encryption/decryption flow.
      ansible.netcommon.cli_command:
        command: show crypto ipsec sa detail
      register: sa_detail
      failed_when: 
        - sa_detail.failed | default(false)
        - "'Invalid input' in sa_detail.stdout"

    - name: Verify IPsec SA data availability
      # Why: Ensures observability by confirming meaningful output was returned from the device.
      ansible.builtin.assert:
        that:
          - sa_detail.stdout is defined
          - sa_detail.stdout | length > 0
        fail_msg: "IPsec SA data is empty or command failed."

    - name: Collect global IPsec packet statistics
      # Why: Used to identify global drops, anti-replay errors, and policy mismatches.
      ansible.netcommon.cli_command:
        command: show crypto ipsec stats
      register: stats
      failed_when:
        - stats.failed | default(false)
        - "'Invalid input' in stats.stdout"

    - name: Verify global statistics retrieval
      # Why: Confirms performance metrics are accessible for health monitoring.
      ansible.builtin.assert:
        that:
          - stats.stdout is defined
        fail_msg: "Global IPsec statistics could not be retrieved."

    - name: Retrieve IKEv1 (ISAKMP) negotiation statistics
      # Why: Critical for diagnosing Phase 1 failures and IKE negotiation issues.
      ansible.netcommon.cli_command:
        command: show crypto isakmp stats
      register: ike_stats
      # Error Handling: Gracefully handle cases where IKEv1 is disabled or command varies by version.
      ignore_errors: true

    - name: Output Consolidated IPSec Telemetry
      # Why: Provides the operator with a high-visibility report of current tunnel status.
      ansible.builtin.debug:
        msg: |
          ======================= IPSEC HEALTH REPORT =======================
          
          --- [ IPSEC SA DETAIL ] ---
          {{ sa_detail.stdout }}

          --- [ GLOBAL IPSEC STATS ] ---
          {{ stats.stdout }}

          --- [ IKEV1 ISAKMP STATS ] ---
          {{ ike_stats.stdout | default('N/A - IKEv1 may be disabled or command failed') }}
```