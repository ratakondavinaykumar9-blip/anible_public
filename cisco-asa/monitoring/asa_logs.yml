---
# Asa Logs - Improved Version
# This playbook retrieves the most recent log entries from Cisco ASA devices.
# Improved according to NetLearner standards for Network Automation.

- name: Get Recent Logs from Cisco ASA
  hosts: asa_firepower
  gather_facts: false
  vars:
    # log_count defines the number of lines to retrieve from the logging buffer.
    log_count: 50

  tasks:
    - name: Retrieve logs from the ASA buffer
      # FQCN: Using the platform-specific ASA command module for better reliability
      cisco.asa.asa_command:
        commands:
          - "show logging | last {{ log_count }}"
      register: logs_raw
      # Error Handling: Fail if the module reports failure or if the output contains ASA error strings
      failed_when: 
        - logs_raw.failed or "% Invalid" in logs_raw.stdout[0]
      # Idempotency: Read-only 'show' commands are inherently idempotent as they do not modify device state.

    - name: Validate that log data was returned
      # Observability: Verify that the command returned actual data to ensure the buffer is not empty
      ansible.builtin.assert:
        that:
          - "logs_raw.stdout is defined"
          - "logs_raw.stdout[0] | length > 0"
        fail_msg: "No logs found or retrieval failed for {{ inventory_hostname }}. The logging buffer may be empty."
        success_msg: "Log retrieval successful for {{ inventory_hostname }}."

    - name: Display retrieved logs to console
      # Observability: Formatted debug output for human operators with clear separation
      ansible.builtin.debug:
        msg: |
          ======================= RECENT LOGS ({{ inventory_hostname }}) =======================
          {{ logs_raw.stdout[0] }}
          =====================================================================================
      when: logs_raw.stdout[0] | length > 0