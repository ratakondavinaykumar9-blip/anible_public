# Asa Logs
# Improved: 2026-04-12
# Author: NetLearner Architect
# Purpose: Retrieves and validates the most recent log entries from Cisco ASA devices.
# Idempotency: Safe to run multiple times; no state changes are performed.

- name: Get Recent Logs
  hosts: asa_firepower
  gather_facts: false
  vars:
    log_count: 50

  tasks:
    - name: Execute 'show logging' command on target device
      # Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: "show logging | last {{ log_count }}"
      register: logs_result
      # Error Handling: Ensure we fail on invalid command strings or execution errors
      failed_when: >
        logs_result.failed or
        'Invalid input' in logs_result.stdout or
        'Incomplete command' in logs_result.stdout

    - name: Verify that logs were successfully retrieved
      # Observability: Confirm the stdout is not empty using an assertion
      ansible.builtin.assert:
        that:
          - logs_result.stdout is defined
          - logs_result.stdout | length > 0
        fail_msg: "Log retrieval failed: Output is empty or undefined. Verify logging is enabled on the ASA."
        success_msg: "Logs successfully retrieved from the buffer."

    - name: Display the recent log entries
      # Best Practices: Use clear formatting for the debug message
      ansible.builtin.debug:
        msg: |
          ======================= RECENT LOGS (LAST {{ log_count }} LINES) =======================
          {{ logs_result.stdout }}