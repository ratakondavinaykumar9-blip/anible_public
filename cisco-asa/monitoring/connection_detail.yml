---
# Playbook: Connection Detail Retrieval
# Purpose: Gathers and displays detailed stateful connection information from Cisco ASA/Firepower devices.
# This playbook is idempotent as it exclusively uses 'show' commands which do not modify device state.
- name: Connection Detail
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show conn detail' on the target device
      # Using Fully Qualified Collection Name (FQCN) for reliability across environments.
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_result
      # Error Handling: Explicitly fail if the device returns common error strings or the task fails.
      failed_when:
        - conn_result.failed or 'Invalid input' in conn_result.stdout or 'ERROR' in conn_result.stdout

    - name: Verify connection data retrieval
      # Observability: Ensure that the command actually returned data before proceeding.
      ansible.builtin.assert:
        that:
          - conn_result.stdout | length > 0
        fail_msg: "No connection data was returned. Check device status or session activity."
        quiet: true

    - name: Display retrieved connection details
      # Provides formatted visibility into the current session table.
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTION DETAIL =======================
          {{ conn_result.stdout }}