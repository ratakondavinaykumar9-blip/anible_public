---
# Memory Detail Analysis for Cisco ASA/Firepower
# Purpose: Gathers granular memory usage data to monitor system stability and performance.
# Idempotency: This is a read-only operation and does not alter device state.
- name: Cisco ASA/Firepower Memory Detail Analysis
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show memory detail' command
      # FQCN: Using ansible.netcommon.cli_command to retrieve raw CLI output.
      ansible.netcommon.cli_command:
        command: show memory detail
      register: mem_output
      # Error Handling: Prevent silent failures if the command is unrecognized by the device.
      failed_when:
        - mem_output.failed
        - "'Invalid' in mem_output.stdout or 'Usage' in mem_output.stdout"

    - name: Verify memory output integrity
      # Observability: Ensure the device returned actionable memory statistics.
      ansible.builtin.assert:
        that:
          - mem_output.stdout is defined
          - mem_output.stdout | length > 0
          - "'Free memory' in mem_output.stdout or 'Total' in mem_output.stdout"
        fail_msg: "The 'show memory detail' command returned an empty or unexpected response."
        success_msg: "Memory details successfully retrieved and validated."

    - name: Output memory statistics for audit logs
      # Documentation/Observability: Displaying the output for visibility in automation logs.
      ansible.builtin.debug:
        msg: |
          ======================= MEMORY DETAIL =======================
          {{ mem_output.stdout }}