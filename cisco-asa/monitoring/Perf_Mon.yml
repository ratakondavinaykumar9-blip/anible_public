---
# Performance Monitoring and Health Check
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# This playbook retrieves critical performance and traffic metrics from ASA/Firepower devices.
# It ensures observability through registration and assertions, implements error handling 
# for CLI execution, and uses FQCN for long-term compatibility.

- name: Performance Monitoring
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Collect CPU and Memory Performance Metrics
      # FQCN: Using netcommon for platform-agnostic CLI interaction
      ansible.netcommon.cli_command:
        command: show perfmon
      register: perf
      # Error Handling: Detect command failure or unsupported command syntax
      failed_when: 
        - perf.failed or "Invalid input" in perf.stdout
      
    - name: Validate Performance Data Integrity
      # Observability: Assert that the command returned meaningful performance data
      ansible.builtin.assert:
        that:
          - "perf.stdout is defined"
          - "perf.stdout | length > 0"
          - "'CPU' in perf.stdout or 'Memory' in perf.stdout"
        fail_msg: "Performance data collection failed or returned incomplete results on {{ inventory_hostname }}."
        quiet: true

    - name: Collect Interface Traffic Statistics
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic
      failed_when: 
        - traffic.failed or "Invalid input" in traffic.stdout

    - name: Validate Traffic Data Integrity
      # Observability: Ensure traffic counters were successfully retrieved
      ansible.builtin.assert:
        that:
          - "traffic.stdout is defined"
          - "traffic.stdout | length > 0"
        fail_msg: "Traffic statistics collection failed on {{ inventory_hostname }}."
        quiet: true

    - name: Display Performance and Traffic Report
      # Documentation: Provide a structured view of the collected metrics for operators
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE PERFORMANCE REPORT =======================
          DEVICE: {{ inventory_hostname }}
          COLLECTED: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          --- [ PERFORMANCE METRICS ] ---
          {{ perf.stdout }}
          
          --- [ TRAFFIC STATISTICS ] ---
          {{ traffic.stdout