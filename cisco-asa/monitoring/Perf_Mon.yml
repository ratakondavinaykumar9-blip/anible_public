---
# Network Automation Framework Architect: Performance Monitoring Enhancement
# This playbook retrieves and validates ASA/Firepower performance metrics.
# Standards applied: FQCN usage, detailed assertions, and granular error detection.

- name: Performance Monitoring
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Performance Monitor Statistics
      # Why: 'show perfmon' provides granular CPU and connection utilization data.
      # It is idempotent as it performs a read-only operation on the device state.
      ansible.netcommon.cli_command:
        command: show perfmon
      register: perf_mon_result
      # Error Handling: Fail if the command is unrecognized by the OS or execution fails.
      failed_when: 
        - perf_mon_result.failed or "Invalid input" in perf_mon_result.stdout

    - name: Retrieve Interface Traffic Statistics
      # Why: 'show traffic' identifies bandwidth saturation and interface-level throughput.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      # Error Handling: Ensures we catch partial failures or command syntax issues.
      failed_when: 
        - traffic_result.failed or "Invalid input" in traffic_result.stdout

    - name: Validate Collected Performance Data
      # Observability: Verification task to ensure captured stdout is not empty before display.
      ansible.builtin.assert:
        that:
          - "perf_mon_result.stdout | length > 0"
          - "traffic_result.stdout | length > 0"
        fail_msg: "Telemetry collection failed: Received empty output from the device."
        quiet: true

    - name: Display Performance Analysis Summary
      # Purpose: Aggregates and outputs the collected telemetry for audit/logging.
      ansible.builtin.debug:
        msg: |
          ======================= PERFORMANCE TELEMETRY =======================
          DEVICE: {{ inventory_hostname }}
          
          [PERFMON DATA]
          {{ perf_mon_result.stdout }}

          [TRAFFIC DATA]
          {{ traffic_result.stdout }}
          =====================================================================