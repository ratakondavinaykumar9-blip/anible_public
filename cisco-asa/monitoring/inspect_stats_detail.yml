---
# NetLearner Architect Improved Playbook
# Purpose: Retrieve and validate service-policy inspection statistics from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assertions), Documentation, Error Handling, FQCN.

- name: Inspection Stats Detail
  hosts: asa_firepower
  gather_facts: false # Facts are not required for read-only CLI statistics collection.

  tasks:
    - name: Retrieve service-policy inspection statistics
      # Using Fully Qualified Collection Name (FQCN) for consistency and portability.
      ansible.netcommon.cli_command:
        command: show service-policy inspect
      register: inspect_stats
      # Idempotency: 'show' commands are read-only and inherently safe to run multiple times.
      # Error Handling: Ensure the task fails if the device returns an error message.
      failed_when:
        - inspect_stats.failed | default(false)
        - "'Invalid input' in inspect_stats.stdout or 'Usage' in inspect_stats.stdout"

    - name: Validate the integrity of retrieved data
      # Observability: Assert that the command returned a valid response containing expected keywords.
      ansible.builtin.assert:
        that:
          - "inspect_stats.stdout is defined"
          - "inspect_stats.stdout | length > 0"
          - "'Service-policy' in inspect_stats.stdout"
        fail_msg: "Data Integrity Error: The device did not return valid service-policy inspection data."
        success_msg: "Data Integrity Verified: Inspection statistics successfully captured and validated."

    - name: Display formatted inspection results
      # Documentation: Clear visual output for administrative review and audit trails.
      ansible.builtin.debug:
        msg: |
          ================================================================
          DEVICE: {{ inventory_hostname }}
          ======================= INSPECTION STATS =======================
          {{ inspect_stats.stdout }}
          ================================================================