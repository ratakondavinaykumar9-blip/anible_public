---
# NetLearner Architect Standardized Playbook
# Purpose: Retrieves and validates deep inspection statistics from Cisco ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (assertions), FQCN (best practices).
# Updated: 2026-04-12
---
- name: Inspection Stats Detail Recovery
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service-policy inspection statistics
      # Using FQCN for cross-platform compatibility and maintainability.
      ansible.netcommon.cli_command:
        command: show service-policy inspect
      register: inspect_output
      # Setting changed_when to false ensures the task is idempotent as it is a read-only operation.
      changed_when: false
      # Error handling: Fail if the device returns common error patterns for unsupported commands or syntax errors.
      failed_when:
        - inspect_output.stdout is not defined
        - "'% Invalid input' in inspect_output.stdout"
        - "'ERROR:' in inspect_output.stdout"

    - name: Validate inspection data integrity
      # Observability: Assert that the output contains expected headers to ensure the service-policy is actually configured.
      ansible.builtin.assert:
        that:
          - "inspect_output.stdout | length > 0"
          - "'Service-policy' in inspect_output.stdout or 'Inspect' in inspect_output.stdout"
        fail_msg: "Inspection stats returned empty or invalid data. Verify service-policy configuration on the target."
        success_msg: "Inspection statistics successfully retrieved and validated."

    - name: Display formatted inspection telemetry
      # Provide clean visibility for NOC/SOC operators using the debug module.
      ansible.builtin.debug:
        msg: 
          - "======================= INSPECTION STATS ======================="
          - "{{ inspect_output.stdout }}"
          - "================================================================"
