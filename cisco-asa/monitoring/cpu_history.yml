---
# ASA/Firepower CPU Performance History Audit
# Improved by: NetLearner Architect
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
#
# Purpose: This playbook retrieves historical CPU metrics from Cisco ASA/Firepower 
# devices to identify performance trends. It is designed to be safe for repeated 
# execution and provides explicit verification of the gathered data.

- name: ASA/Firepower CPU Performance History Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve CPU utilization history from security appliance
      # FQCN: Using the fully qualified collection name for portability.
      # Idempotency: This is a read-only operation and is safe to run repeatedly.
      ansible.netcommon.cli_command:
        command: show cpu history
      register: cpu_history_output
      # Error Handling: Explicitly fail if the command is unrecognized or the module reports failure.
      failed_when: >
        cpu_history_output.failed or 
        "Invalid input" in cpu_history_output.stdout or
        "ERROR:" in cpu_history_output.stdout

    - name: Validate telemetry data integrity and observability
      # Observability: Using assertions to verify that meaningful data was returned.
      # This prevents the playbook from silently passing if the output is malformed or empty.
      ansible.builtin.assert:
        that:
          - cpu_history_output.stdout is defined
          - cpu_history_output.stdout | length > 0
          - "'CPU' in cpu_history_output.stdout"
        fail_msg: "Data Integrity Check Failed: No valid CPU telemetry returned from {{ inventory_hostname }}."
        success_msg: "Data Integrity Check Passed: CPU telemetry successfully validated."

    - name: Display formatted CPU performance trends
      # Documentation: Providing a clear, structured view for audit logging and manual review.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          DEVICE: {{ inventory_hostname }}
          AUDIT: CPU PERFORMANCE HISTORY TRENDS
          ======================================================================
          {{ cpu_history_output.stdout }}
          ======================================================================
```