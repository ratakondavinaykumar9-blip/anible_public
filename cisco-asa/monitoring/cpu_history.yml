---
# CPU History Monitoring Playbook
# Purpose: Retrieves and validates CPU usage history from Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), uses FQCN, includes validation and error handling.
- name: Retrieve Cisco ASA/Firepower CPU History
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get CPU history from device
      # Using FQCN ansible.netcommon.cli_command for standardized network interaction.
      # This task is idempotent as it does not modify device configuration.
      ansible.netcommon.cli_command:
        command: show cpu history
      register: cpu_result
      # Error Handling: Fail if the device returns common Cisco error indicators.
      failed_when: 
        - '"Invalid input" in cpu_result.stdout'
        - '"%" in cpu_result.stdout'

    - name: Validate CPU data observability
      # Observability: Ensure that the command returned meaningful content.
      ansible.builtin.assert:
        that:
          - cpu_result.stdout is defined
          - cpu_result.stdout | length > 0
        fail_msg: "CPU history retrieval failed: Received empty output from {{ inventory_hostname }}."
        success_msg: "CPU history data successfully captured from {{ inventory_hostname }}."

    - name: Display formatted CPU history
      # Documentation: Provides a clear, structured view of the retrieved data.
      ansible.builtin.debug:
        msg: |
          ======================= {{ inventory_hostname }} CPU HISTORY =======================
          {{ cpu_result.stdout }}
          ========================================================================