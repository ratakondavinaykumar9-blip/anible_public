# Connection Table Retrieval and Validation
# Improved by NetLearner Architect: 2026-04-12
# Purpose: Safely retrieves and validates ASA/Firepower connection tables for network forensics.
#
- name: Get Connection Table
  hosts: asa_firepower
  gather_facts: false # Efficiency: Device facts are not required for simple CLI command execution

  tasks:
    - name: Retrieve summary connection table
      # Using FQCN (ansible.netcommon) for compatibility across different Ansible versions
      ansible.netcommon.cli_command:
        command: show conn
      register: conn_summary
      # Idempotency & Error Handling: Read-only commands should never report 'changed'
      # and must fail if the output contains common Cisco/Firepower error strings.
      changed_when: false
      failed_when:
        - conn_summary.failed
        - "'Invalid input' in conn_summary.stdout or 'syntax error' in conn_summary.stdout"

    - name: Verify connection summary availability
      # Observability: Ensure we actually received data before proceeding to display or process.
      ansible.builtin.assert:
        that:
          - conn_summary.stdout | length > 0
        fail_msg: "The connection table summary is empty. Verify device state and traffic flow."
        success_msg: "Connection summary retrieved successfully."

    - name: Retrieve detailed connection table
      # Why: Detailed view is critical for identifying TCP flags and idle timeout issues.
      ansible.netcommon.cli_command:
        command: show conn detail
      register: conn_detail
      changed_when: false
      failed_when:
        - conn_detail.failed
        - "'Invalid input' in conn_detail.stdout"

    - name: Verify detailed connection output integrity
      # Observability: Check for the presence of the 'Total' summary line to ensure full capture.
      ansible.builtin.assert:
        that:
          - "'Total' in conn_detail.stdout"
        fail_msg: "Detailed connection output appears truncated or malformed."
        success_msg: "Detailed connection data validated."

    - name: Display connection information
      # Why: Provides the operator with immediate actionable intelligence during the run.
      ansible.builtin.debug:
        msg: |
          ======================= SUMMARY =======================
          {{ conn_summary.stdout }}

          ======================= DETAILS =======================
          {{ conn_detail.stdout }}