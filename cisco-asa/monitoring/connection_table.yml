---
# Connection Table Retrieval Playbook
# Purpose: Retrieves and validates stateful connection information from Cisco ASA/Firepower devices.
# Idempotency: This playbook is read-only and safe to run repeatedly without modifying device state.
# Improved by: NetLearner Architect (2026-03-15)
---
- name: Get Connection Table
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve summary connection table
      # Why: 'show conn' provides a high-level snapshot of all active sessions and protocol distributions.
      # FQCN: Using cisco.asa for device-specific command execution.
      cisco.asa.asa_command:
        commands:
          - show conn
      register: conn_summary
      # Error Handling: Catch common CLI failures or command-not-found scenarios.
      failed_when:
        - conn_summary.failed or "Invalid input" in conn_summary.stdout[0]

    - name: Verify connection summary retrieval
      # Why: Observability - Ensure the device returned valid telemetry before proceeding.
      ansible.builtin.assert:
        that:
          - conn_summary.stdout is defined
          - conn_summary.stdout[0] | length > 0
        fail_msg: "Connection summary data is empty or unreachable on {{ inventory_hostname }}"
        quiet: true

    - name: Retrieve detailed connection information
      # Why: 'detail' output includes essential flags (U, O, B) and byte counts for deep-dive troubleshooting.
      cisco.asa.asa_command:
        commands:
          - show conn detail
      register: conn_detail
      failed_when:
        - conn_detail.failed or "Invalid input" in conn_detail.stdout[0]

    - name: Verify detailed connection retrieval
      # Why: Observability - Confirm detailed troubleshooting data was successfully registered.
      ansible.builtin.assert:
        that:
          - conn_detail.stdout is defined
          - conn_detail.stdout[0] | length > 0
        fail_msg: "Detailed connection metrics could not be retrieved from {{ inventory_hostname }}"
        quiet: true

    - name: Display formatted connection state
      # Why: Provides immediate, human-readable visibility into the firewall's stateful inspection table.
      ansible.builtin.debug:
        msg: |
          ======================= CONNECTIONS SUMMARY =======================
          {{ conn_summary.stdout[0] }}

          ======================= CONNECTIONS DETAIL =======================
          {{ conn_detail.stdout[0] }}