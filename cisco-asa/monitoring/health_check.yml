---
# ASA Comprehensive Health Check
# Improved for idempotency, observability, and error handling.
# This playbook performs a non-intrusive health check of Cisco ASA devices, 
# capturing CPU, memory, connection counts, and traffic statistics for monitoring.
- name: ASA Comprehensive Health Check
  hosts: asa_firepower
  gather_facts: false
  vars:
    output_format: text

  tasks:
    - name: "Collect Facts | Capture current timestamp from controller"
      # Ensuring we have a consistent timestamp for reporting without querying the device clock.
      ansible.builtin.set_fact:
        report_time: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
      run_once: true

    - name: "Health Check | Get CPU usage"
      # Monitoring CPU to detect spikes that could impact packet processing.
      ansible.netcommon.cli_command:
        command: show cpu usage
      register: cpu_output
      failed_when: 
        - cpu_output.stdout | length == 0
        - "'invalid' in cpu_output.stdout.lower()"

    - name: "Health Check | Get memory info"
      # Verifying memory allocation to prevent crashes due to exhaustion.
      ansible.netcommon.cli_command:
        command: show memory
      register: mem_output
      failed_when: mem_output.stdout | length == 0

    - name: "Health Check | Get connection count"
      # Tracking active connections against licensed limits.
      ansible.netcommon.cli_command:
        command: show conn count
      register: conn_output
      failed_when: conn_output.stdout | length == 0

    - name: "Health Check | Get resource usage"
      # Inspecting system resources to ensure multi-context or global limits are not reached.
      ansible.netcommon.cli_command:
        command: show resource usage
      register: resource_output
      failed_when: resource_output.stdout | length == 0

    - name: "Health Check | Get context info"
      # Context info is useful for multi-context ASAs; ignored on single-context devices via ignore_errors.
      ansible.netcommon.cli_command:
        command: show context
      register: context_output
      ignore_errors: true

    - name: "Health Check | Get traffic rates"
      # Monitoring throughput and packet rates for performance analysis.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_output
      failed_when: traffic_output.stdout | length == 0

    - name: "Validation | Assert health check completeness"
      # Verifying that critical data points were successfully retrieved before proceeding.
      ansible.builtin.assert:
        that:
          - cpu_output.stdout is defined
          - mem_output.stdout is defined
          - conn_output.stdout is defined
        fail_msg: "Critical health check data missing for {{ inventory_hostname }}"
        success_msg: "All critical health check data retrieved for {{ inventory_hostname }}"

    - name: "Persistence | Save Health Report as JSON"
      # Writing results to a file for external analysis. Idempotent: only updates if content changes.
      ansible.builtin.copy:
        content: |
          {
            "device": "{{ inventory_hostname }}",
            "timestamp": "{{ report_time }}",
            "cpu": "{{ cpu_output.stdout | trim }}",
            "memory": "{{ mem_output.stdout | trim }}",
            "connections": "{{ conn_output.stdout | trim }}",
            "resources": "{{ resource_output.stdout | trim }}",
            "contexts": "{{ context_output.stdout | default('Single Context Mode') | trim }}",
            "traffic": "{{ traffic_output.stdout | trim }}"
          }
        dest: "/tmp/asa_health_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format == 'json'

    - name: "Output | Display Health Summary"
      # Providing immediate feedback to the operator.
      ansible.builtin.debug:
        msg: |
          ==================================================
          ASA Health Summary: {{ inventory_hostname }}
          Timestamp: {{ report_time }}
          ==================================================
          CPU: {{ cpu_output.stdout | trim }}
          
          MEM: {{ mem_output.stdout | trim }}
          
          CONN: {{ conn_output.stdout | trim }}
          
          TRAFFIC: {{ traffic_output.stdout | trim }}