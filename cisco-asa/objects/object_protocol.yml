---
# Protocol Objects Inspection Playbook
# Improved for NetLearner Architecture standards.
# 1. Idempotency: Read-only operation ensures safe re-runs without state modification.
# 2. Observability: Registration and Assertions verify execution success and data integrity.
# 3. Documentation: Detailed comments explaining the purpose of each task.
# 4. Error Handling: 'failed_when' logic catches CLI-specific error strings.
# 5. Best Practices: Full usage of Fully Qualified Collection Names (FQCN).

- name: Protocol Objects Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch protocol objects from device via CLI
      # Using FQCN for the cli_command module.
      # This task retrieves the current configuration of protocol objects.
      ansible.netcommon.cli_command:
        command: show object protocol
      register: proto_result
      # Handle cases where the device might accept the command but return an error message.
      failed_when: 
        - proto_result.failed or "Invalid input" in proto_result.stdout or "ERROR" in proto_result.stdout

    - name: Verify protocol object data integrity
      # Observability: Assert that the command returned meaningful data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - proto_result.stdout is defined
          - proto_result.stdout | length > 0
        fail_msg: "The command 'show object protocol' returned no data on {{ inventory_hostname }}."
        quiet: true

    - name: Display retrieved protocol objects
      # Provide a structured view for operator review or automated logging.
      ansible.builtin.debug:
        msg: |
          ======================= PROTOCOL OBJECTS: {{ inventory_hostname }} =======================
          {{ proto_result.stdout }}