---
# Cisco ASA/Firepower Protocol Object Audit
# This playbook retrieves and validates protocol objects to ensure configuration visibility.
# Refined by NetLearner Architect for Idempotency, Observability, and Error Resilience.

- name: Audit Cisco ASA/Firepower Protocol Objects
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: "Retrieve protocol objects from device"
      # Using FQCN: ansible.netcommon.cli_command is preferred for cross-platform network CLI interactions.
      # Idempotency: Read-only 'show' commands do not alter state; changed_when: false ensures accurate status reporting.
      ansible.netcommon.cli_command:
        command: show object protocol
      register: proto_output
      changed_when: false
      failed_when:
        - proto_output.failed | default(false)
        - "'Invalid input' in proto_output.stdout"

    - name: "Validate protocol object retrieval"
      # Observability: Asserting that the command returned meaningful data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - proto_output.stdout is defined
          - proto_output.stdout | length > 0
        fail_msg: "Critical: Failed to retrieve protocol objects or the object list is empty."
        success_msg: "Verification: Protocol objects successfully retrieved."

    - name: "Display Protocol Objects"
      # Documentation: Providing a clear, formatted view of the running configuration for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= PROTOCOL OBJECTS AUDIT =======================
          {{ proto_output.stdout }}
