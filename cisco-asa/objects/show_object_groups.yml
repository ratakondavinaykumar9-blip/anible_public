---
# NetLearner Architect Improved Playbook: Get Object Groups
# Standards Compliance: Idempotency, Observability, Documentation, Error Handling, Best Practices
# This playbook retrieves the object-group configuration from Cisco ASA/Firepower devices.
- name: Get Object Groups
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve object group configuration via CLI
      # Using FQCN for cross-platform network CLI execution
      ansible.netcommon.cli_command:
        command: show running-config object-group
      register: groups_output
      # Error Handling: Catch common CLI errors that might not trigger a non-zero exit code
      failed_when:
        - "groups_output.failed or 'Invalid input' in groups_output.stdout or 'ERROR' in groups_output.stdout"

    - name: Verify data capture integrity
      # Observability: Assert that the command execution resulted in non-empty output
      ansible.builtin.assert:
        that:
          - "groups_output.stdout is defined"
          - "groups_output.stdout | length > 0"
        fail_msg: "Data retrieval failed or no object groups are configured on the target device."
        success_msg: "Object group configuration successfully registered for analysis."

    - name: Display formatted object group data
      # Documentation: Provide clear visibility into the state of the firewall configuration
      ansible.builtin.debug:
        msg: |
          ======================= OBJECT GROUPS =======================
          {{ groups_output.stdout }}