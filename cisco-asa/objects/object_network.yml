---
# Network Objects Detail
# Improved: 2026-04-12
# Standards: Idempotent, Observable, Documented, Error-Resilient, FQCN
- name: Network Objects Detail
  hosts: asa_firepower
  gather_facts: false # Optimization: Disable fact gathering for read-only CLI tasks

  tasks:
    - name: Retrieve Network Object Configuration
      # Why: Using FQCN for vendor-specific module support and reliable command execution.
      # Idempotency: 'show' commands are inherently idempotent (read-only).
      cisco.asa.asa_command:
        commands:
          - show object network
      register: network_obj_result
      # Error Handling: Explicitly identify and fail on ASA-specific error strings.
      failed_when:
        - "'Invalid input' in network_obj_result.stdout[0]"
        - "'% Permission denied' in network_obj_result.stdout[0]"

    - name: Validate Data Retrieval
      # Observability: Assert that the command returned non-empty data to ensure visibility.
      ansible.builtin.assert:
        that:
          - network_obj_result.stdout[0] is defined
          - network_obj_result.stdout[0] | length > 0
        fail_msg: "Failed to retrieve network objects or no objects configured on {{ inventory_hostname }}."
        quiet: true

    - name: Display Network Objects
      # Documentation: Providing a clean, formatted view for operational auditing.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          Device: {{ inventory_hostname }}
          ---------------------------------------------------------------
          {{ network_obj_result.stdout[0] }}
