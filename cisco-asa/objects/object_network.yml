---
# Network Objects Detail
# Improved for: Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: Network Objects Detail
  hosts: asa_firepower
  gather_facts: false # Facts are disabled to speed up execution as they are not required for this task.

  tasks:
    - name: Retrieve network objects from the security appliance
      # Use FQCN for consistency and to avoid module resolution ambiguities.
      # This task is idempotent as 'show' commands do not modify the device state.
      ansible.netcommon.cli_command:
        command: show object network
      register: network_objects_output
      # Error Handling: Ensure the task fails if the command is unrecognized or returns an error.
      failed_when: 
        - network_objects_output.failed
        - "'Invalid input' in network_objects_output.stdout or 'Usage' in network_objects_output.stdout"

    - name: Validate that network objects were successfully retrieved
      # Observability: Assert that the command returned data to prevent silent failures in downstream automation.
      ansible.builtin.assert:
        that:
          - network_objects_output.stdout is defined
          - network_objects_output.stdout | length > 0
        fail_msg: "The 'show object network' command returned no data or failed."
        success_msg: "Network objects successfully retrieved and verified."

    - name: Display retrieved network objects
      # Documentation: Providing a clean visual output for logs and terminal feedback.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          {{ network_objects_output.stdout }}