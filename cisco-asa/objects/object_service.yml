---
# Object Service - Enhanced for NetLearner Architecture
# Improved: 2026-03-15
# Description: Securely retrieves and validates service object configurations from ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Error Handling (failed_when), FQCN.

- name: Service Objects Detail
  hosts: asa_firepower
  gather_facts: false # Optimization: System facts are not required for CLI command execution

  tasks:
    - name: Retrieve service objects from security appliance
      # FQCN: Using fully qualified collection name for portability and precision
      ansible.netcommon.cli_command:
        command: show object service
      register: svc
      # Error Handling: Catch specific CLI execution failures or invalid command syntax
      failed_when: 
        - svc.failed | default(false)
        - "'Invalid input' in svc.stdout"

    - name: Validate service object data integrity
      # Observability: Verify that the response contains data and is not undefined
      # This prevents silent failures in automated audit pipelines
      ansible.builtin.assert:
        that:
          - svc.stdout is defined
          - svc.stdout | length > 0
        fail_msg: "Data retrieval failure: Output is empty or the command was not recognized."
        success_msg: "Service object data successfully captured."

    - name: Display service object configuration
      # Documentation: Formatted output for human-readable audit logs
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ svc.stdout }}