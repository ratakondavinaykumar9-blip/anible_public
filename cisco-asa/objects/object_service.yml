---
# NetLearner Architect: Improved Service Object Retrieval
# Optimized for Idempotency, Observability, and Enterprise Standards.
# This playbook retrieves and validates service object configurations on Cisco ASA/Firepower.
---
- name: Service Objects Detail
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service object configuration from device
      # Using FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: show object service
      register: svc_output
      # Ensure we fail if the command returns a known error string despite exit code 0
      failed_when:
        - "svc_output.stdout is not defined"
        - "'Invalid input' in svc_output.stdout"
        - "'ERROR' in svc_output.stdout"

    - name: Validate service object output integrity
      # Observability: Assert that the output contains expected header data or isn't empty
      ansible.builtin.assert:
        that:
          - svc_output.stdout | length > 0
          - "'object service' in svc_output.stdout or 'No service objects' in svc_output.stdout"
        fail_msg: "The 'show object service' command returned unexpected or empty results."
        success_msg: "Service object configuration successfully retrieved and validated."

    - name: Display formatted service object details
      # Documentation: Providing a clear visual separation for log observability
      ansible.builtin.debug:
        msg: |
          ===============================================================
          NETLEARNER ARCHITECT - SERVICE OBJECT REPORT
          Timestamp: {{ ansible_date_time.iso8601 | default('N/A') }}
          ===============================================================
          {{ svc_output.stdout }}
          ===============================================================
