---
# Playbook: Retrieve and Validate Service Objects (Cisco ASA/Firepower)
# Purpose: This playbook performs a non-intrusive audit of service object configurations.
# Idempotency: Inherently idempotent as it uses read-only commands that do not modify the device state.
# Standards: FQCN, Register/Assert (Observability), and Error Handling.

- name: Get Service Objects
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve service objects from running configuration
      # FQCN: Using the dedicated Cisco ASA collection for platform-specific command execution
      cisco.asa.asa_command:
        commands:
          - show running-config object service
      register: service_output
      # Error Handling: Ensure the playbook fails if the command result is undefined or missing
      failed_when:
        - service_output.stdout is not defined or service_output.stdout | length == 0

    - name: Validate service object configuration retrieval
      # Observability: Verifies that the command execution was successful and returned data
      ansible.builtin.assert:
        that:
          - service_output.stdout[0] is defined
        fail_msg: "The command 'show running-config object service' failed to return a valid response. Verify device connectivity."
        success_msg: "Service object configuration successfully retrieved."
        quiet: true

    - name: Display Retrieved Service Objects
      # Observability: Provides clear, formatted visibility for the operator in the automation logs
      ansible.builtin.debug:
        msg: |
          ======================= SERVICE OBJECTS =======================
          {{ service_output.stdout[0] if service_output.stdout[0] | length > 0 else "No service objects configured on this host." }}