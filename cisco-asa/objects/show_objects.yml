---
# NetLearner Architect Improved: Show Network Objects
# Purpose: Retrieves and validates network object configurations from Cisco ASA/Firepower.
# Idempotency: This is a read-only operation; it does not modify the device state.

- name: Get Network Objects
  hosts: asa_firepower
  gather_facts: false # Disabled to minimize overhead as device facts are not required for this query.

  tasks:
    - name: Retrieve network object configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability and best practices.
      ansible.netcommon.cli_command:
        command: show running-config object network
      register: objects_result
      # Error Handling: Ensure the task fails on common Cisco CLI error patterns.
      failed_when:
        - objects_result.failed or "Invalid input" in objects_result.stdout

    - name: Validate retrieval of network object data
      # Observability: Assert that the output is not empty to ensure the device returned data.
      ansible.builtin.assert:
        that:
          - objects_result.stdout | length > 0
        fail_msg: "The command returned an empty configuration. Check object existence on the device."
        success_msg: "Network object configuration successfully captured."

    - name: Display formatted network objects
      # Observability: Provides a human-readable summary of the current operational state.
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          {{ objects_result.stdout }}
