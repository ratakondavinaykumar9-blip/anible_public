---
# NetLearner Architect Improved Playbook
# Purpose: Retrieve and verify Network Object configurations from Cisco ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Network Objects
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve network object configuration
      # Best Practices: Using Fully Qualified Collection Name (FQCN) for network commands
      ansible.netcommon.cli_command:
        command: show running-config object network
      register: objects_result
      # Idempotency: Ensure the task is marked as 'ok' and not 'changed' for read-only operations
      changed_when: false
      # Error Handling: Fail if the command returns a CLI error or the execution fails
      failed_when:
        - objects_result.failed
        - "'Invalid input' in objects_result.stdout"

    - name: Validate retrieval success
      # Observability: Assert that the command output was correctly captured
      ansible.builtin.assert:
        that:
          - objects_result.stdout is defined
        fail_msg: "Data retrieval failed: The 'show' command returned an undefined result."
        quiet: true

    - name: Display Network Object state
      # Documentation: Provide structured feedback of the current device state
      ansible.builtin.debug:
        msg: |
          ======================= NETWORK OBJECTS =======================
          {{ objects_result.stdout if objects_result.stdout | length > 0 else "No network objects configured." }}