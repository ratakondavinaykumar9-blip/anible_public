---
# Optimized Port Channel Audit Playbook
# Purpose: Validates EtherChannel/Port-Channel status on Cisco ASA/Firepower devices.
# Standards: NetLearner Infrastructure Hardening Framework v2.0
- name: Audit Cisco ASA Port-Channel Status
  hosts: asa_firepower
  gather_facts: false
  tasks:
    - name: "EXECUTE: Retrieve port-channel status from device"
      # Using Fully Qualified Collection Name (FQCN) for reliability and collection-based execution
      ansible.netcommon.cli_command:
        command: show port-channel
      register: portch
      # Error Handling: Explicitly fail if the CLI returns a syntax error or permission issue
      failed_when: 
        - "'Invalid input' in portch.stdout or 'Permission denied' in portch.stdout"

    - name: "OBSERVE: Verify telemetry data integrity"
      # Observability: Assert that the control plane returned a non-empty response to prevent silent audit failures
      ansible.builtin.assert:
        that:
          - portch.stdout is defined
          - portch.stdout | length > 0
        fail_msg: "Audit Failure: The device returned empty port-channel information on {{ inventory_hostname }}."
        quiet: true

    - name: "REPORT: Render formatted port-channel state"
      # Documentation/Visibility: Providing clear, structured output for logs and manual verification
      ansible.builtin.debug:
        msg: |
          ======================= PORT CHANNEL TELEMETRY =======================
          DEVICE: {{ inventory_hostname }}
          STATUS: AUDIT COMPLETE
          TIMESTAMP: {{ lookup('pipe', 'date') }}
          ======================= RAW OUTPUT ===================================
          {{ portch.stdout }}
