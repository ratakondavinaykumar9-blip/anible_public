---
# Port Channel Status Retrieval
# Purpose: Retrieves and validates port-channel information from Cisco ASA/Firepower.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Port Channel Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show port-channel' command on device
      # Standard: Best Practices - Using Fully Qualified Collection Name (FQCN)
      # Standard: Idempotency - 'show' commands are read-only and safe for multiple runs
      ansible.netcommon.cli_command:
        command: show port-channel
      register: portch_res
      # Standard: Error Handling - Catching device-level errors or invalid command strings
      failed_when: >
        portch_res.failed or 
        'Invalid input' in portch_res.stdout or 
        'ERROR:' in portch_res.stdout

    - name: Validate command response integrity
      # Standard: Observability - Ensure the output contains valid data before proceeding
      ansible.builtin.assert:
        that:
          - portch_res.stdout is defined
          - portch_res.stdout | length > 0
        fail_msg: "Failed to retrieve port-channel output or the command returned empty results."
        success_msg: "Port-channel information successfully captured and verified."

    - name: Display Formatted Port Channel Details
      # Standard: Documentation - Providing clear visual separation for operational results
      ansible.builtin.debug:
        msg: |
          ======================= PORT CHANNEL SUMMARY =======================
          {{ portch_res.stdout }}