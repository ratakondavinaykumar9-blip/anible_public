---
# Architect:Improved Playbook
# Standard: Idempotency, Observability, Documentation, Error Handling, Best Practices
# Purpose: Securely retrieve and verify MAC addresses from Cisco ASA/Firepower interfaces.

- name: Interface MAC Addresses Retrieval
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show command to retrieve MAC addresses
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction
      ansible.netcommon.cli_command:
        command: "show interface | include (address|MAC)"
      register: mac_result
      # IDEMPOTENCY: Read-only 'show' commands must never report a 'changed' status
      changed_when: false
      # ERROR HANDLING: Ensure the task fails if the device returns an error or command fails
      failed_when: 
        - mac_result.failed | default(false)
        - "'Invalid input' in mac_result.stdout"

    - name: Verify capture of interface data
      # OBSERVABILITY: Assert that the command returned meaningful output to ensure data integrity
      ansible.builtin.assert:
        that:
          - mac_result.stdout is defined
          - mac_result.stdout | length > 0
        fail_msg: "Interface MAC address information was not found or is empty."
        success_msg: "Interface MAC address information successfully retrieved."

    - name: Display Interface MAC Report
      # DOCUMENTATION: Formatted debug output for human-readable audit trails and observability
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE MAC REPORT =======================
          {{ mac_result.stdout }}