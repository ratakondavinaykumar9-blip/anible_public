---
# Improved Interface MAC Retrieval Playbook
# Standardized by NetLearner Architect
#
- name: Retrieve and Verify Interface MAC Addresses
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get interface MAC details using CLI command
      # Using FQCN (Best Practice) and capturing output for validation (Observability)
      # Documentation: Captures both hardware MAC and burned-in addresses (BIA) for auditing and inventory.
      ansible.netcommon.cli_command:
        command: "show interface | include (address|MAC)"
      register: mac_output
      # Error Handling: Explicitly fail if the command is unrecognized or returns no data
      failed_when: 
        - mac_output.failed
        - "mac_output.stdout | length == 0"
      # Idempotency: Mark as 'changed: false' since this is a read-only state inspection
      changed_when: false

    - name: Validate that MAC address information is present in the output
      # Observability: Assert that the device returned the expected data patterns
      ansible.builtin.assert:
        that:
          - "'address' in mac_output.stdout or 'MAC' in mac_output.stdout"
        fail_msg: "The command output did not contain expected MAC address information."
        quiet: true

    - name: Display formatted MAC address output
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE MAC REPORT =======================
          {{ mac_output.stdout }}