---
# Traffic Rate Intf
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Get Interface Traffic Rates
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Interface Traffic Statistics
      # Why: 'show traffic' retrieves real-time throughput data per interface. 
      # This operation is inherently idempotent as it performs a read-only state query.
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      # Error Handling: Fail if the execution fails or if the command is unrecognized by the device OS.
      failed_when: 
        - traffic_result.failed or "Invalid input" in traffic_result.stdout

    - name: Validate Captured Traffic Data
      # Observability: Verification task to ensure telemetry was successfully captured before display.
      ansible.builtin.assert:
        that:
          - "traffic_result.stdout | length > 0"
        fail_msg: "Telemetry collection failure: Device returned empty traffic statistics."
        quiet: true

    - name: Display Traffic Rate Analysis Summary
      # Documentation: Outputs the collected telemetry for audit logging and operational visibility.
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC RATES =======================
          DEVICE: {{ inventory_hostname }}
          
          {{ traffic_result.