---
# Traffic Rate Intf - Improved by Architect:# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Safely retrieve and validate per-interface traffic rates from ASA/Firepower devices

- name: Get Interface Traffic Rates
  hosts: asa_firepower
  gather_facts: false # Optimization: System facts are not required for CLI command execution

  tasks:
    - name: Retrieve traffic statistics from device
      # FQCN ensures the correct module is invoked regardless of collection search paths
      ansible.netcommon.cli_command:
        command: show traffic
      register: traffic_result
      # Error Handling: Explicitly fail if the device returns common error strings or if the task fails
      failed_when: 
        - traffic_result.failed
        - "'Invalid' in traffic_result.stdout or 'Error' in traffic_result.stdout"

    - name: Validate that traffic statistics were returned
      # Observability: Asserting that output length > 0 verifies the command produced actual data
      ansible.builtin.assert:
        that:
          - "traffic_result.stdout | length > 0"
        fail_msg: "No traffic data was returned from the device."
        success_msg: "Traffic data successfully captured."

    - name: Output traffic rates to console
      # Idempotency: This task is read-only and does not modify device state, making it safe for repeated runs
      ansible.builtin.debug:
        msg: |
          ======================= TRAFFIC RATES =======================
          {{ traffic_result.stdout }}