---
# NetLearner Architect - Optimized Interface Reporter
# Purpose: Gathers and validates Cisco ASA interface configuration and operational state.
# Standards Compliance: Idempotency, Observability, FQCN, and Robust Error Handling.

- name: Get Interface Status and Details
  hosts: asa_firepower
  gather_facts: false # Disabled default fact gathering for performance; specific facts collected via modules.

  tasks:
    - name: Gather structured interface configuration
      # Using 'state: gathered' ensures the task is read-only and idempotent.
      # Fully Qualified Collection Name (FQCN) used to ensure reliability across environments.
      cisco.asa.asa_interfaces:
        state: gathered
      register: interfaces_output

    - name: Verify interface configuration was retrieved
      # Observability: Using assertions to catch data retrieval issues early in the play.
      ansible.builtin.assert:
        that:
          - interfaces_output.gathered is defined
        fail_msg: "Failed to gather interface facts from {{ inventory_hostname }}. Verify credentials and connectivity."

    - name: Get operational IP address summary
      # Gathering operational state directly from the CLI for non-config data points (e.g., dynamic IPs).
      ansible.netcommon.cli_command:
        command: show ip address
      register: ip_addr_output
      # Error Handling: Ensure the command returned data; otherwise, treat as a failure to prevent silent errors.
      failed_when: ip_addr_output.stdout | length == 0

    - name: Get detailed interface operational statistics
      # Capturing raw interface counters and physical link details for troubleshooting.
      ansible.netcommon.cli_command:
        command: show interface
      register: interface_stats
      failed_when: interface_stats.stdout | length == 0

    - name: Display summarized interface results
      # Logic: Iterate through gathered interface facts to present a clean, human-readable summary.
      # Defaults and Jinja2 filters ensure the report renders even if specific attributes are missing.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          INTERFACE REPORT: {{ inventory_hostname }}
          ======================================================================
          {% for iface in interfaces_output.gathered %}
          {{ iface.name | d('Unknown') }}:
            Admin Status: {{ 'ENABLED' if iface.enabled | default(false) else 'DISABLED' }}
            IPv4 Address: {{ iface.ipv4[0].address | d('Unassigned') if (iface.ipv4 is defined and iface.ipv4 | length > 0) else 'Unassigned' }}
            Description:  {{ iface.description | d('None') }}
          ----------------------------------------------------------------------
          {% endfor %}
