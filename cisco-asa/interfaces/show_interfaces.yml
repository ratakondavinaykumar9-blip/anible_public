---
# Improved Cisco ASA Interface Audit Playbook
# Standards: FQCN, Idempotency, Observability, Error Handling
- name: Audit Interface Status and IP Addressing
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Gather structured interface configuration facts
      # Using 'state: gathered' ensures idempotency by only reading current device state.
      # FQCN used to ensure the correct collection version is invoked.
      cisco.asa.asa_interfaces:
        state: gathered
      register: interfaces_output

    - name: Verify interface data retrieval success
      # Observability: Assert that the module successfully returned structured data.
      ansible.builtin.assert:
        that:
          - "interfaces_output.gathered is defined"
        fail_msg: "Interface facts could not be retrieved from {{ inventory_hostname }}. Check network_cli connectivity."

    - name: Execute 'show ip address' for summary verification
      # cisco.asa.asa_command is preferred over netcommon for ASA-specific parsing.
      cisco.asa.asa_command:
        commands:
          - show ip address
      register: ip_addr_output
      # Error Handling: Fail if the output indicates a syntax error or is empty.
      failed_when: 
        - ip_addr_output.failed or ip_addr_output.stdout | length == 0
        - "'Invalid' in ip_addr_output.stdout[0]"

    - name: Execute 'show interface' for hardware statistics
      # Captures interface-level counters and physical layer status.
      cisco.asa.asa_command:
        commands:
          - show interface
      register: interface_stats
      failed_when: "interface_stats.stdout is not defined"

    - name: Validate command responses are non-empty
      # Observability: Ensure that critical operational commands returned data.
      ansible.builtin.assert:
        that:
          - "ip_addr_output.stdout[0] | length > 0"
          - "interface_stats.stdout[0] | length > 0"
        fail_msg: "CLI command execution returned empty results on {{ inventory_hostname }}."

    - name: Display structured interface facts
      # Providing visibility into the object model for troubleshooting (enabled at -v level).
      ansible.builtin.debug:
        var: interfaces_output.gathered
        verbosity: 1

    - name: Generate formatted interface summary report
      # Documentation: This summary provides a human-readable audit trail of the interface state.