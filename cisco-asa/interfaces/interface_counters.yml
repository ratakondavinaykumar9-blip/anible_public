# NetLearner Architect - Interface Counter Analysis
# Standards: Idempotency, Observability, FQCN, Error Handling
# Purpose: Retrieve and validate interface statistics for Cisco ASA/Firepower devices.

- name: Get Interface Counters
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Retrieve interface counters from CLI"
      # Using FQCN for best practices. Read-only 'show' commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: "show interface | include (OK|input packets|output packets)"
      register: counters
      # Error Handling: Fail if the command is unrecognized or the output is empty.
      failed_when: 
        - "counters.stdout == ''"
        - "'Invalid' in counters.stdout"

    - name: "Verify command response integrity"
      # Observability: Asserting that the device returned valid data to prevent silent automation failures.
      ansible.builtin.assert:
        that:
          - "counters.stdout | length > 0"
          - "'input packets' in counters.stdout"
        fail_msg: "Data retrieval failed or returned unexpected format from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved and validated interface counters for {{ inventory_hostname }}."

    - name: "Display formatted interface counters"
      # Documentation/Observability: Outputting stdout_lines for human-readable log analysis.
      ansible.builtin.debug:
        msg: "{{ counters.stdout_lines }}"