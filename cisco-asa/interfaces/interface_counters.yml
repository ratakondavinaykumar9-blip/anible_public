---
# Playbook: Get Interface Counters
# Description: This playbook retrieves and verifies interface packet counters from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Comments), Error Handling (failed_when), FQCN.
# Author: NetLearner Architect

- name: Get Interface Counters
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show interface command
      # Using FQCN for network CLI operations. Read-only 'show' commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: "show interface | include (OK|input packets|output packets)"
      register: counters_result
      # Error Handling: Explicitly fail if the command returns typical Cisco error strings or if the module fails.
      failed_when:
        - counters_result.failed or "Invalid input" in counters_result.stdout or "incomplete command" in counters_result.stdout

    - name: Validate counter retrieval
      # Observability: Use assertions to verify that the output is not empty and contains expected data.
      ansible.builtin.assert:
        that:
          - counters_result.stdout is defined
          - counters_result.stdout | length > 0
        fail_msg: "The command returned no data. Check device connectivity or interface status."
        success_msg: "Interface counters successfully captured."

    - name: Display interface counters
      # Observability: Print the output in a readable format for the operator.
      ansible.builtin.debug:
        msg: "{{ counters_result.stdout_lines }}"