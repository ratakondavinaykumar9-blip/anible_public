---
# Interface Vlan Audit
# Auto-improved: 2026-04-12
# Author: NetLearner Architect
# Standards: Idempotency, Observability, FQCN, Error Handling
---
- name: Get and Validate VLAN Interfaces
  hosts: asa_firepower
  gather_facts: false # Optimization: Standard facts are not required for this audit.

  tasks:
    - name: Retrieve VLAN interface configuration
      # FQCN: Using ansible.netcommon.cli_command for consistent behavior across network modules.
      # Idempotency: This is a read-only 'show' command and is inherently safe to run multiple times.
      ansible.netcommon.cli_command:
        command: show interface VLAN
      register: vlan_audit
      # Error Handling: Ensure the task fails if the device returns a logical error string (e.g., unrecognized command).
      failed_when:
        - vlan_audit.stdout is not defined
        - "'Invalid input' in vlan_audit.stdout or 'Usage' in vlan_audit.stdout"

    - name: Verify observability of VLAN data
      # Observability: Assert that the command returned meaningful data before proceeding.
      # This prevents successful runs that produce empty or useless results.
      ansible.builtin.assert:
        that:
          - vlan_audit.stdout | length > 0
          - "'Interface' in vlan_audit.stdout"
        fail_msg: "VLAN audit failed: No data returned from device or command unrecognized."
        quiet: true

    - name: Display VLAN interface status
      # Documentation: Provides human-readable visibility into the automation state for logging and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= VLAN INTERFACES =======================
          DEVICE: {{ inventory_hostname }}
          AUDIT STATUS: VERIFIED
          ---------------------------------------------------------------
          {{ vlan_audit.stdout }}
          ===============================================================
