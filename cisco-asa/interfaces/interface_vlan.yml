---
# VLAN Interfaces - Enhanced NetLearner Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# 
# Purpose: Safely retrieves and validates VLAN interface information from Cisco ASA/Firepower devices.
# Idempotency: This is a read-only (GET) operation and is inherently safe for repeated execution.

- name: Retrieve and Validate VLAN Interfaces
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Query device for VLAN interface details
      # FQCN: Using cisco.asa.asa_command for Cisco-specific command execution
      cisco.asa.asa_command:
        commands:
          - show interface VLAN
      register: vlan_output
      # Error Handling: Capture cases where the CLI returns an error message without a non-zero exit code
      failed_when: 
        - vlan_output.failed or "Invalid input" in vlan_output.stdout[0] or "ERROR:" in vlan_output.stdout[0]

    - name: Assert VLAN data integrity
      # Observability: Verify the device returned data to prevent silent collection failures
      ansible.builtin.assert:
        that:
          - vlan_output.stdout is defined
          - vlan_output.stdout[0] | length > 0
        fail_msg: "The 'show interface VLAN' command returned no data. Ensure VLANs are configured and accessible."
        success_msg: "VLAN interface data successfully retrieved and validated."

    - name: Display VLAN Interface Information
      # Observability: Provide clear, formatted output for the network operator
      ansible.builtin.debug:
        msg: |
          ======================= VLAN INTERFACES =======================
          {{ vlan_output.stdout[0] }}