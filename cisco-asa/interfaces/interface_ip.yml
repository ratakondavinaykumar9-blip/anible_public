---
# NetLearner Architect - Standardized IP Verification Playbook
# Purpose: Idempotent retrieval and verification of Interface IP assignments.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
# WHY: This playbook provides consistent visibility into the operational state 
# of network interfaces without modifying configuration (ensuring idempotency).

- name: Interface IP Configuration Audit
  hosts: asa_firepower
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Retrieve current interface IP address table
      # FQCN: Using ansible.netcommon for cross-platform network CLI compatibility
      # IDEMPOTENCY: "show" commands are read-only and inherently safe for repeat execution
      ansible.netcommon.cli_command:
        command: show ip address
      register: ip_telemetry
      # ERROR HANDLING: Catch cases where the CLI returns an error string despite a successful connection
      failed_when:
        - ip_telemetry.stdout is not defined or
          'Invalid input' in ip_telemetry.stdout or
          '% Invalid' in ip_telemetry.stdout

    - name: Validate telemetry integrity for {{ inventory_hostname }}
      # OBSERVABILITY: Ensure a valid, non-empty response was captured before proceeding
      ansible.builtin.assert:
        that:
          - ip_telemetry.stdout is defined
          - ip_telemetry.stdout | length > 0
        fail_msg: "CRITICAL: No IP configuration data retrieved from {{ inventory_hostname }}."
        success_msg: "TELEMETRY: Successfully captured IP configuration data."

    - name: Output formatted interface IP data
      # OBSERVABILITY: Log structured results for human audit and system logging
      ansible.builtin.debug:
        msg: |
          ======================================================================
          HOST: {{ inventory_hostname }}
          STATUS: Telemetry Captured Successfully
          ======================= INTERFACE IP =================================
          {{ ip_telemetry.stdout }}
          ======================================================================
