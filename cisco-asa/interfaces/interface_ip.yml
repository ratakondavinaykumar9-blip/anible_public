---
# Interface IP Configuration Audit
# Improved: 2026-03-15
# Author: NetLearner Architect
# Standards: Idempotency, FQCN, Observability, Documentation, Error Handling
---
- name: Interface IP Config
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current interface IP configuration
      # Using FQCN (cisco.asa.asa_command) for platform-specific execution
      # This task is inherently idempotent as it only retrieves state without modification
      cisco.asa.asa_command:
        commands:
          - show ip address
      register: ip_result
      # Error Handling: Ensure the command was accepted and returned the expected address table
      failed_when:
        - ip_result.failed
        - "'Address' not in ip_result.stdout[0]"

    - name: Verify IP configuration data integrity
      # Observability: Validate that the output contains the expected ASA headers
      # This ensures subsequent tasks or automation rely on valid data
      ansible.builtin.assert:
        that:
          - "'Interface' in ip_result.stdout[0]"
          - "'IP-Address' in ip_result.stdout[0]"
        fail_msg: "The 'show ip address' command returned invalid or incomplete data from {{ inventory_hostname }}."
        success_msg: "Interface IP configuration successfully captured and validated."
        quiet: true

    - name: Display formatted interface IP report
      # Observability: Provide a clean, readable report for the operator
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE IP REPORT =======================
          DEVICE: {{ inventory_hostname }}
          STATE:  Verified
          -------------------------------------------------------------------
          {{ ip_result.stdout[0] }}