---
# Playbook: Interface Errors Audit
# Purpose: Identify physical layer or transmission issues on Cisco ASA/Firepower interfaces.
# Standards applied: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Interface Errors
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Query ASA for interface errors, CRCs, and collisions
      # Why: These metrics are key indicators of cable issues, duplex mismatches, or hardware failure.
      # FQCN: cisco.asa.asa_command is preferred for ASA-specific execution and reliability.
      cisco.asa.asa_command:
        commands:
          - "show interface | include (error|CRC|collision)"
      register: interface_errors_query
      # Idempotency: 'show' commands are read-only and naturally idempotent as they do not change state.
      # Error Handling: Ensure the playbook fails if the connection or command execution itself fails.
      failed_when: interface_errors_query.failed | default(false)

    - name: Validate that the diagnostic data was correctly captured
      # Observability: Explicitly checking the registered variable to ensure data integrity before processing.
      ansible.builtin.assert:
        that:
          - interface_errors_query.stdout is defined
        fail_msg: "The network device did not return the expected output format or the connection was lost."
        quiet: true

    - name: Display Interface Health Report
      # Documentation: Presenting findings in a human-readable format for immediate operational troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS =======================
          {{ interface_errors_query.stdout[0] if (interface_errors_query.stdout[0] | trim | length > 0) else 'STATUS: No errors, CRCs, or collisions detected on any active interface.' }}