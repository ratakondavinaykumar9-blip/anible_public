---
# NetLearner Architect Improved Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Proactively detect physical and data-link layer issues (CRC, collisions) on Cisco ASA/Firepower appliances.

- name: Cisco ASA/Firepower Interface Error Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch interface error statistics
      # Why: Monitoring CRC, collisions, and input/output errors identifies bad cabling and duplex mismatches.
      ansible.netcommon.cli_command:
        command: "show interface | include (error|CRC|collision)"
      register: interface_errors
      # Idempotency: Reading device state is a non-mutating operation and must not report 'changed'.
      changed_when: false
      # Error Handling: Ensure the task fails explicitly if the CLI execution encounters a transport or syntax error.
      failed_when: 
        - interface_errors.rc is defined
        - interface_errors.rc != 0

    - name: Validate diagnostic output integrity
      # Observability: Use assertions to verify that the telemetry gathered is in the expected format.
      ansible.builtin.assert:
        that:
          - interface_errors.stdout is defined
          - interface_errors.stdout is string
        fail_msg: "Failed to retrieve valid interface telemetry from {{ inventory_hostname }}."
        quiet: true

    - name: Display Interface Health Report
      # Documentation: Clear, human-readable output for network operations and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS: {{ inventory_hostname }} =======================
          {{ interface_errors.stdout | default('No matching error patterns detected in the current interface statistics.') }}
      # Observability: Only execute display if the data fetch was successful to prevent noisy failures.
      when: interface_errors.stdout is defined
