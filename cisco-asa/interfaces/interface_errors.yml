---
# NetLearner Architect Improved Playbook
# Purpose: Monitor Cisco ASA/Firepower interface health by auditing for errors, CRCs, and collisions.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN (Fully Qualified Collection Names).

- name: Get Interface Errors
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute command to retrieve interface error statistics
      # Use FQCN for the specific Cisco ASA command module
      cisco.asa.asa_command:
        commands:
          - "show interface | include (error|CRC|collision)"
      register: interface_errors
      # Task is idempotent as it performs no configuration changes.
      # Error Handling: Ensure the task fails if the connection is dropped or command syntax is rejected.
      failed_when: interface_errors.failed | default(false)

    - name: Validate successful command execution and output
      # Observability: Assert that we received a valid response structure from the device
      ansible.builtin.assert:
        that:
          - "interface_errors.stdout is defined"
          - "interface_errors.stdout | length > 0"
        fail_msg: "Error: No valid response received from the device for interface statistics."
        success_msg: "Successfully retrieved interface health data."

    - name: Display Interface Error Report
      # Documentation: Provide operational visibility with a formatted report
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE ERRORS =======================
          {% if interface_errors.stdout[0] | length > 0 %}
          {{ interface_errors.stdout[0] }}
          {% else %}
          Status: No interface errors, CRCs, or collisions detected.
          {% endif %}