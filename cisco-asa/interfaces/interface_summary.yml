---
# Playbook: Interface Summary for Cisco ASA/Firepower
# Purpose: Retrieves and validates the interface status summary to ensure network connectivity and operational status.
# Standards: Idempotency (Read-only), Observability (Assert/Register), FQCN, Error Handling.

- name: Interface Summary
  hosts: asa_firepower
  gather_facts: false
  # Connection method usually defined in inventory, but explicitly noted here for clarity
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve interface summary from the security appliance
      # Using FQCN for the generic CLI command module
      ansible.netcommon.cli_command:
        command: show interface summary
      register: summary_output
      # Error Handling: Ensure the command didn't return an empty string or fail silently
      failed_when: 
        - summary_output.stdout is not defined
        - "summary_output.stdout | length == 0"

    - name: Validate interface summary data integrity
      # Observability: Assert that the output contains expected headers (e.g., 'Interface')
      # This ensures we didn't just get an error message or blank screen
      ansible.builtin.assert:
        that:
          - "'Interface' in summary_output.stdout"
        fail_msg: "The command output did not contain expected interface summary headers."
        success_msg: "Interface summary successfully retrieved and validated."

    - name: Display formatted interface summary for operator visibility
      # Documentation: Provides a clean, observable log of the interface state
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE SUMMARY =======================
          HOST: {{ inventory_hostname }}
          DATE: {{ lookup('ansible.builtin.pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          -----------------------------------------------------------------
          {{ summary_output.stdout }}
