---
# Interface Summary Playbook
# This playbook retrieves and validates the interface summary from Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable (Assert), Documented (Why), Error-handled (failed_when).

- name: Interface Summary
  hosts: asa_firepower
  gather_facts: false # Fact gathering is disabled to optimize execution for operational tasks

  tasks:
    - name: Retrieve interface summary from device
      # Use FQCN to ensure compatibility and adhere to Ansible best practices
      ansible.netcommon.cli_command:
        command: show interface summary
      register: interface_summary_raw
      # Error Handling: Catch device-specific CLI errors that might not trigger a standard module failure
      failed_when: 
        - interface_summary_raw.failed or "Invalid input" in interface_summary_raw.stdout

    - name: Verify operational data integrity
      # Observability: Assert that the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - interface_summary_raw.stdout is defined
          - interface_summary_raw.stdout | length > 0
          - "'Interface' in interface_summary_raw.stdout"
        fail_msg: "Interface summary output is invalid or empty. Verify device state and credentials."
        success_msg: "Interface summary successfully retrieved and validated."

    - name: Output formatted summary
      # Provide clear, formatted output for the network operator
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE SUMMARY =======================
          {{ interface_summary_raw.stdout }}