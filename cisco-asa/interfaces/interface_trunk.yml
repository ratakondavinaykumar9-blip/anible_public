---
# Interface Trunk Management
# Improved: 2026-03-15
# Description: This playbook retrieves and validates trunk interface information from ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
---
- name: Trunk Interfaces Investigation
  hosts: asa_firepower
  gather_facts: false
  # connection: network_cli is implied for these modules in this context

  tasks:
    - name: Retrieve trunk interface status
      # Use FQCN for network common commands.
      # Read-only 'show' commands are inherently idempotent as they do not change state.
      ansible.netcommon.cli_command:
        command: show trunk
      register: trunk_result
      # Error Handling: Fail if the command is unrecognized by the device or returns an error string.
      failed_when:
        - trunk_result.failed | default(false)
        - "'Invalid input' in trunk_result.stdout or 'description error' in trunk_result.stdout"

    - name: Verify trunk data integrity
      # Observability: Ensure that the command returned a valid, non-empty response.
      ansible.builtin.assert:
        that:
          - trunk_result.stdout is defined
          - trunk_result.stdout | length > 0
        fail_msg: "Trunk data retrieval failed or returned empty output."
        success_msg: "Trunk information successfully captured."

    - name: Display Trunk Status
      # Provide clear, formatted observability into the retrieved data.
      ansible.builtin.debug:
        msg: |
          ======================= TRUNK INTERFACE REPORT =======================
          Device: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 | default('N/A') }}
          Output:
          {{ trunk_result.stdout }}