---
# Playbook: Trunk Interfaces Retrieval
# Purpose: Safely retrieve and validate trunking configuration from ASA/Firepower devices.
# Standards: Architect:High-Availability & Observability Patterns.
# Auto-improved: 2026-03-08
---
- name: Trunk Interfaces
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get trunk interface information
      # FQCN: ansible.netcommon.cli_command
      # Documentation: Executes operational command to retrieve current trunking status.
      ansible.netcommon.cli_command:
        command: show trunk
      register: trunk_result
      # Error Handling: Define failure based on common CLI error strings
      failed_when:
        - trunk_result.failed or "Invalid input" in trunk_result.stdout
      ignore_errors: false

    - name: Verify operational data integrity
      # Observability: Ensure the command returned a non-empty response
      ansible.builtin.assert:
        that:
          - trunk_result.stdout is defined
          - trunk_result.stdout | length > 0
        fail_msg: "Operational data retrieval failed or returned empty output for {{ inventory_hostname }}."
        success_msg: "Trunk information successfully validated for {{ inventory_hostname }}."

    - name: Display trunk status
      # Documentation: Provides structured visibility for auditing and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= TRUNK REPORT =======================
          DEVICE: {{ inventory_hostname }}
          STATE:  Retrieved
          ------------------------------------------------------------
          {{ trunk_result.stdout }}