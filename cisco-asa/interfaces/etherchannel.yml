---
# Etherchannel Verification Playbook
# This playbook retrieves and audits EtherChannel (LACP/Static) status on Cisco ASA/Firepower devices.
# Regular audits ensure that port-channel interfaces are correctly bundled, maintaining network redundancy.

- name: Retrieve and Validate EtherChannel Info
  hosts: asa_firepower
  gather_facts: false  # Disabling fact gathering reduces overhead for simple operational checks.

  tasks:
    - name: Get EtherChannel status from device
      # Using FQCN (Fully Qualified Collection Name) to ensure compatibility and standard adherence.
      # This operation is read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: show etherchannel
      register: ec_result
      # Error Handling: Ensure the task fails if the command is unrecognized or returns an error string.
      failed_when: 
        - ec_result.failed or "Invalid input" in ec_result.stdout

    - name: Validate that EtherChannel data was received
      # Observability: Assert that the output contains data to verify the command execution was meaningful.
      ansible.builtin.assert:
        that:
          - "ec_result.stdout | length > 0"
        fail_msg: "No EtherChannel information returned. Check if any port-channels are configured on the target."
        success_msg: "EtherChannel data retrieved successfully."
        quiet: true

    - name: Display formatted EtherChannel details
      # Providing a structured view of the output for improved observability during execution.
      ansible.builtin.debug:
        msg: |
          ======================= ETHERCHANNEL STATUS =======================
          {{ ec_result.stdout }}
      when: ec_result.stdout is defined
