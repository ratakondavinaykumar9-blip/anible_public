---
# Architect:Improved Playbook
# Purpose: Retrieves and validates interface descriptions for Cisco ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.

- name: Get Interface Descriptions
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve interface descriptions from the device
      # Standard: Use Fully Qualified Collection Names (FQCN).
      # Why: This command fetches the operational state and descriptions of all interfaces.
      ansible.netcommon.cli_command:
        command: show interface description
      register: interface_output
      # Standard: Idempotency.
      # Why: Explicitly marking as not changed since this is a read-only "show" operation.
      changed_when: false
      # Standard: Error Handling.
      # Why: Fail the task if the device returns an error message or the execution fails.
      failed_when: 
        - interface_output.failed or "Invalid input" in interface_output.stdout

    - name: Verify command execution success and output presence
      # Standard: Observability (assert).
      # Why: Ensures the playbook validates that meaningful data was returned.
      ansible.builtin.assert:
        that:
          - interface_output.stdout is defined
          - interface_output.stdout | length > 0
        fail_msg: "Interface description output is empty or undefined."
        success_msg: "Successfully retrieved interface descriptions."

    - name: Display Interface Descriptions
      # Standard: Observability (debug).
      # Why: Provides a clear, formatted view of the system state for the operator.