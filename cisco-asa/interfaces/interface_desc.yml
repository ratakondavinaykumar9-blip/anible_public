---
# NetLearner Architect Standardized Playbook
# Purpose: Retrieval and Validation of ASA/Firepower Interface Descriptions
# Standards: Idempotent, Observable, Documented, Error-Resilient

- name: Audit Cisco ASA/Firepower Interface Descriptions
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve interface description table from device
      # Using FQCN for cross-platform compatibility and stability.
      # Read-only operations are inherently idempotent as they do not modify device state.
      ansible.netcommon.cli_command:
        command: show interface description
      register: interface_desc_output
      # Error Handling: Fail if output is missing or contains common error indicators.
      failed_when: 
        - interface_desc_output.stdout is not defined
        - "'Invalid' in interface_desc_output.stdout"
        - "'error' in interface_desc_output.stdout | lower"
      # Best Practice: Mark as 'changed: false' to ensure idempotency report accuracy.
      changed_when: false

    - name: Validate operational data integrity
      # Observability: Asserting that the retrieved data is usable for reporting.
      ansible.builtin.assert:
        that:
          - "interface_desc_output.stdout | length > 0"
        fail_msg: "Data integrity check failed: Received empty output from the device."
        success_msg: "Data integrity verified: Interface telemetry retrieved successfully."

    - name: Display formatted interface telemetry
      # Visibility: Outputting the result for operator review and session logging.
      ansible.builtin.debug:
        msg: 
          - "======================= INTERFACE DESCRIPTIONS ======================="
          - "{{ interface_desc_output.stdout }}"
