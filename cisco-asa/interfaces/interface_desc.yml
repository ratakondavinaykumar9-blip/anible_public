---
# Playbook: Get Interface Descriptions
# Author: NetLearner Architect
# Purpose: Retrieves and validates interface descriptions from Cisco ASA/Firepower devices.
# Idempotency: Inherently idempotent as it performs a read-only state inspection.
- name: Get Interface Descriptions
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve interface descriptions from device
      # Use FQCN for better maintainability and to avoid module name conflicts
      ansible.netcommon.cli_command:
        command: show interface description
      register: desc_result
      # Error Handling: Ensure we fail if the command is not recognized or permitted
      failed_when:
        - desc_result.failed | default(false)
        - "'Invalid input' in desc_result.stdout"

    - name: Verify data integrity and observability
      # Observability: Confirm the output contains the expected 'Interface' header
      ansible.builtin.assert:
        that:
          - desc_result.stdout is defined
          - desc_result.stdout | length > 0
          - "'Interface' in desc_result.stdout"
        fail_msg: "Failed to retrieve valid interface description data or output was empty."
        success_msg: "Interface descriptions successfully retrieved and validated."

    - name: Display formatted interface descriptions
      # Documentation: Clear visual separation for operator visibility in logs
      ansible.builtin.debug:
        msg: |
          ======================= INTERFACE DESCRIPTIONS =======================
          {{ desc_result.stdout }}