---
# Bridge Virtual Interface Retrieval
# Optimized for NetLearner Standards: Idempotency, Observability, Documentation, Error Handling, and FQCN.
- name: Get BVI Interface Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve BVI interface configuration via CLI
      # FQCN: Use fully qualified collection names for consistent execution across environments.
      # Idempotency: Marked changed_when: false as this is a read-only state retrieval operation.
      ansible.netcommon.cli_command:
        command: show interface BVI
      register: bvi_output
      changed_when: false
      # Error Handling: Treat 'Invalid input' as a known state (BVI not configured) rather than a failure.
      failed_when:
        - bvi_output.failed
        - "'Invalid input' not in bvi_output.stdout"

    - name: Verify command execution success
      # Observability: Ensure the command returned a valid response structure before proceeding.
      ansible.builtin.assert:
        that:
          - bvi_output.stdout is defined
        fail_msg: "The network device failed to return a valid response for the BVI query."
        success_msg: "Successfully communicated with the device and received BVI status."

    - name: Display BVI Interface Details
      # Documentation: Provide clear, formatted output of the interface state for audit visibility.
      ansible.builtin.debug:
        msg: |
          ======================= BVI INTERFACE INFO =======================
          {{ bvi_output.stdout }}
      # Condition: Only execute if the BVI interface actually exists on the target device.
      when: "'Invalid input' not in bvi_output.stdout"

    - name: Report missing BVI configuration
      # Observability: Explicitly document the absence of a BVI interface for reporting.
      ansible.builtin.debug:
        msg: "BVI interface is not configured or recognized on this host."
      when: "'Invalid input' in bvi_output.stdout"