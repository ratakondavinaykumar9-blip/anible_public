---
- name: Site-to-Site IKEv2 IPsec Tunnel (Cisco ASA)
  hosts: all
  gather_facts: false
  vars:
    # --- Peer & Interface Connectivity ---
    vpn_peer_ip: ""           # Public IP of the remote peer (e.g., "203.0.113.10")
    vpn_interface: "outside"  # ASA interface name facing the peer
    preshared_key: ""         # VPN Tunnel Secret (CRITICAL: Store in Ansible Vault for production)

    # --- Traffic Definitions (CIDR Format) ---
    local_networks: []        # e.g., ["10.10.10.0/24", "10.10.20.0/24"]
    remote_networks: []       # e.g., ["192.168.1.0/24"]

    # --- Object Group & ACL Naming ---
    local_og_name: "OG-VPN-LOCAL-INTERNAL"
    remote_og_name: "OG-VPN-REMOTE-PEER"
    vpn_acl_name: "ACL-VPN-S2S-INTERESTING"

    # --- Phase 1: IKEv2 Security Policy ---
    ikev2_policy_id: 10
    ikev2_encryption: "aes-256"
    ikev2_integrity: "sha256"
    ikev2_prf: "sha256"
    ikev2_dh_group: 14

    # --- Phase 2: IPsec Proposal ---
    ipsec_prop_name: "IPSEC-PROP-PRODUCTION"
    ipsec_encryption: "aes-256"
    ipsec_integrity: "sha-256"

    # --- Crypto Map Settings ---
    crypto_map_name: "OUTSIDE_CRYPTO_MAP"
    crypto_map_seq: 10

  tasks:
    - name: Pre-Deployment Variable Validation
      ansible.builtin.assert:
        that:
          - vpn_peer_ip | length > 0
          - preshared_key | length > 0
          - local_networks | length > 0
          - remote_networks | length > 0
        fail_msg: "Required variables (vpn_peer_ip, preshared_key, networks) are missing or empty."

    - name: Deployment Block for IKEv2 VPN
      block:
        # 1. Define Network Object Groups
        # Why: Groups networks for easier management in ACLs and NAT rules.
        - name: Define Network Object Groups for Encryption Domain
          cisco.asa.asa_ogs:
            config:
              - name: "{{ local_og_name }}"
                description: "Local networks for VPN Tunnel"
                protocol: ip
                network_objects:
                  - "{% for net in local_networks %}subnet {{ net | ipaddr('network') }} {{ net | ipaddr('netmask') }}{% if not loop.last %}\n{% endif %}{% endfor %}"
              - name: "{{ remote_og_name }}"
                description: "Remote peer networks for VPN Tunnel"
                protocol: ip
                network_objects:
                  - "{% for net in remote_networks %}subnet {{ net | ipaddr('network') }} {{ net | ipaddr('netmask') }}{% if not loop.last %}\n{% endif %}{% endfor %}"
            state: merged
          register: og_result

        - name: Verify Object Group Configuration Success
          ansible.builtin.assert:
            that: "not og_result.failed"
            msg: "Failed to configure Network Object Groups."

        # 2. Configure Crypto Access List
        # Why: Defines 'interesting traffic' that triggers tunnel establishment.
        - name: Configure Crypto Access List
          cisco.asa.asa_acls:
            config:
              - name: "{{ vpn_acl_name }}"
                acl_type: extended
                rules:
                  - action: permit
                    source:
                      object_group: "{{ local_og_name }}"
                    destination:
                      object_group: "{{ remote_og_name }}"
            state: merged
          register: acl_result

        # 3. NAT Exemption (Identity NAT)
        # Why: Prevents global NAT/PAT from translating traffic meant for the VPN tunnel.
        - name: Configure Identity NAT (NAT Exemption)
          cisco.asa.asa_config:
            lines:
              - "nat (inside,{{ vpn_interface }}) source static {{ local_og_name }} {{ local_og_name }} destination static {{ remote_og_name }} {{ remote_og_name }} no-proxy-arp route-lookup"
          register: nat_result

        # 4. Phase 1 Policy & Enablement
        # Why: Negotiates the management tunnel security parameters.
        - name: Configure IKEv2 Phase 1 Policy
          cisco.asa.asa_config:
            lines:
              - "crypto ikev2 policy {{ ikev2_policy_id }}"
              - " encryption {{ ikev2_encryption }}"
              - " integrity {{ ikev2_integrity }}"
              - " prf {{ ikev2_prf }}"
              - " group {{ ikev2_dh_group }}"
              - "exit"
              - "crypto ikev2 enable {{ vpn_interface }}"
          register: ike_result

        # 5. IPsec Phase 2 Proposal
        # Why: Secures the actual user data payload.
        - name: Configure IPsec Phase 2 Proposal
          cisco.asa.asa_config:
            lines:
              - "crypto ipsec ikev2 ipsec-proposal {{ ipsec_prop_name }}"
              - " protocol esp encryption {{ ipsec_encryption }}"
              - " protocol esp integrity {{ ipsec_integrity }}"
          register: ipsec_result

        # 6. Tunnel Group Authentication
        # Why: Defines the Pre-Shared Key for the specific remote peer.
        - name: Configure Tunnel Group for Authentication
          cisco.asa.asa_config:
            lines:
              - "tunnel-group {{ vpn_peer_ip }} type ipsec-l2l"
              - "tunnel-group {{ vpn_peer_ip }} ipsec-attributes"
              - " ikev2 remote-authentication pre-shared-key {{ preshared_key }}"
              - " ikev2 local-authentication pre-shared-key {{ preshared_key }}"
          no_log: true  # Protect sensitive Pre-Shared Key from logs
          register: tg_result

        # 7. Crypto Map Assembly
        # Why: Final binding of ACL, Peer, and Proposal to the interface.
        - name: Assemble and Enable Crypto Map
          cisco.asa.asa_config:
            lines:
              - "crypto map {{ crypto_map_name }} {{ crypto_map_seq }} match address {{ vpn_acl_name }}"
              - "crypto map {{ crypto_map_name }} {{ crypto_map_seq }} set peer {{ vpn_peer_ip }}"
              - "crypto map {{ crypto_map_name }} {{ crypto_map_seq }} set ikev2 ipsec-proposal {{ ipsec_prop_name }}"
              - "crypto map {{ crypto_map_name }} interface {{ vpn_interface }}"
          register: cmap_result

      rescue:
        - name: Deployment Failure Diagnostics
          ansible.builtin.fail:
            msg: >
              VPN Configuration failed for {{ inventory_hostname }}. 
              Check peer IP {{ vpn_peer_ip }} connectivity and interface {{ vpn_interface }} status.

      always:
        - name: Capture VPN Operational State
          cisco.asa.asa_command:
            commands:
              - "show crypto ikev2 sa"
              - "show crypto ipsec sa"
          register: vpn_status
          ignore_errors: true

        - name: Persist Configuration to Startup-Config
          cisco.asa.asa_command:
            commands: ["write memory"]
          when:
            - not ansible_check_mode
            - og_result.changed or acl_result.changed or nat_result.changed or ike_result.changed or ipsec_result.changed or tg_result.changed or cmap_result.changed

        - name: Display Verification Report
          ansible.builtin.debug:
            var: vpn_status.stdout_lines
            label: "VPN_OPERATIONAL_REPORT"