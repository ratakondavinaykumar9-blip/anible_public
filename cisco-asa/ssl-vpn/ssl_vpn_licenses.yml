---
# SSL VPN License Verification Playbook
# Purpose: Retrieves and validates SSL VPN license status on Cisco ASA/Firepower devices.
# This playbook is idempotent as it performs read-only operations.
# Standards: Idempotency, Observability, FQCN, Error Handling.

- name: SSL VPN Licenses
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get SSL VPN licenses from device
      # Using FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: show sslvpn-license
      register: license
      # Error Handling: Explicitly fail if the command is not supported or returns an error
      failed_when: 
        - license.failed or "Invalid input" in license.stdout
      ignore_errors: false

    - name: Validate license output integrity
      # Observability: Assert that the command returned data to ensure visibility into device state
      ansible.builtin.assert:
        that:
          - license.stdout is defined
          - license.stdout | length > 0
        fail_msg: "SSL VPN license output is empty. The feature might not be enabled or configured."
        success_msg: "SSL VPN license data retrieved successfully."

    - name: Display SSL VPN License Information
      # Documentation: Provide clear, formatted output for administrative review
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN LICENSE =======================
          {{ license.stdout }}
          ===============================================================