---
# SSL VPN Status Retrieval
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Retrieves active SSL VPN sessions and global SSL statistics from ASA/Firepower devices.
#
- name: Get SSL VPN Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get active SSL VPN sessions
      # Read-only 'show' commands are inherently idempotent.
      # Using ansible.netcommon.cli_command for broad compatibility across network OS versions.
      ansible.netcommon.cli_command:
        command: show vpn-sessiondb ssl
      register: ssl_sessions_output
      # Error Handling: Explicitly fail if the command returns an empty string or CLI error.
      failed_when: >
        ssl_sessions_output.stdout == "" or 
        "Invalid input" in ssl_sessions_output.stdout

    - name: Verify SSL VPN session data retrieval
      # Observability: Ensure the command output is registered and available.
      ansible.builtin.assert:
        that:
          - ssl_sessions_output.stdout is defined
        fail_msg: "Failed to retrieve SSL VPN session information from the device."
        quiet: true

    - name: Get global SSL protocol statistics
      ansible.netcommon.cli_command:
        command: show ssl
      register: ssl_stats_output
      failed_when: >
        ssl_stats_output.stdout == "" or 
        "Invalid input" in ssl_stats_output.stdout

    - name: Verify SSL statistics data retrieval
      # Observability: Validate that the statistics were captured successfully.
      ansible.builtin.assert:
        that:
          - ssl_stats_output.stdout is defined
        fail_msg: "Failed to retrieve SSL protocol statistics from the device."
        quiet: true

    - name: Display SSL VPN status summary
      # Documentation: Presenting gathered data in a formatted block for administrative review.
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN SESSIONS =======================
          {{ ssl_sessions_output.stdout }}

          ======================= SSL STATISTICS =========================
          {{ ssl_stats_output.stdout }}