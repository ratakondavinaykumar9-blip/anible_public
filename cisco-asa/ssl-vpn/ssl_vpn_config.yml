---
# SSL VPN Configuration Retrieval Playbook
# Auto-improved: 2026-03-15
# Author: Arjun (OpenClaw) / NetLearner Architect
#
# Standards:
# 1. Idempotency: Use changed_when: false for read-only operations.
# 2. Observability: Registered variables and assertions to verify data retrieval.
# 3. Documentation: Detailed comments explaining task purpose and command selection.
# 4. Error Handling: failed_when used to catch device-specific errors like 'Invalid input'.
# 5. Best Practices: Use of Fully Qualified Collection Names (FQCN).
---
- name: Get SSL VPN Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve WebVPN running configuration
      # Using FQCN for network command execution
      # Documentation: 'show run webvpn' captures global SSL VPN settings and portal configurations
      ansible.netcommon.cli_command:
        command: show run webvpn
      register: webvpn_output
      # Error Handling: Identify failure if the command is unrecognized or connection fails
      failed_when:
        - webvpn_output.failed or "Invalid input" in webvpn_output.stdout
      # Idempotency: Read-only 'show' commands must not trigger a 'changed' status
      changed_when: false

    - name: Validate WebVPN configuration retrieval
      # Observability: Ensure the output is defined to prevent downstream failures
      ansible.builtin.assert:
        that:
          - webvpn_output.stdout is defined
        fail_msg: "Failed to retrieve WebVPN configuration from {{ inventory_hostname }}"
        success_msg: "WebVPN configuration successfully captured."

    - name: Retrieve Tunnel-Group configuration
      # Documentation: Tunnel-groups define the connection profiles and AAA attributes for VPN sessions
      ansible.netcommon.cli_command:
        command: show run tunnel-group
      register: tunnel_group_output
      failed_when:
        - tunnel_group_output.failed or "Invalid input" in tunnel_group_output.stdout
      changed_when: false

    - name: Validate Tunnel-Group configuration retrieval
      # Observability: Confirm the command returned data
      ansible.builtin.assert:
        that:
          - tunnel_group_output.stdout is defined
        fail_msg: "Failed to retrieve Tunnel-Group configuration from {{ inventory_hostname }}"
        success_msg: "Tunnel-Group configuration successfully captured."

    - name: Display Captured SSL VPN Configuration
      # Documentation: Formatted output for visibility and logging purposes
      ansible.builtin.debug:
        msg: |
          ======================= SSL VPN CONFIG: {{ inventory_hostname }} =======================
          
          --- WEBVPN SETTINGS ---
          {{ webvpn_output.stdout }}

          --- TUNNEL-GROUP SETTINGS ---
          {{ tunnel_group_output.stdout }}