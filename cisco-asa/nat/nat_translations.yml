---
# NAT Translation Visibility Playbook
# Purpose: Retrieves and validates active NAT translations (xlate) from Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable, Documented, Robust Error Handling.

- name: Audit Active NAT Translations
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve summary of NAT translation table (xlate)
      # Using FQCN for consistency and future-proofing across automation environments.
      # This task fetches active translation entries to monitor NAT session health and capacity.
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate_summary
      # failed_when ensures we catch command syntax errors, authorization failures, or connection drops.
      failed_when: 
        - xlate_summary.rc is defined and xlate_summary.rc != 0
        - "'Invalid input' in xlate_summary.stderr"

    - name: Validate NAT translation summary data integrity
      # Observability: Assert ensures that the output contains actual data before proceeding.
      # This prevents "empty success" scenarios where the device returns a blank table.
      ansible.builtin.assert:
        that:
          - xlate_summary.stdout is defined
          - xlate_summary.stdout | length > 0
        fail_msg: "Critical: NAT translation table is empty or could not be read on {{ inventory_hostname }}."
        success_msg: "Successfully validated NAT translation summary data."

    - name: Retrieve detailed NAT translation metadata
      # 'show xlate detail' provides granular connection timings and flags required for deep forensics.
      ansible.netcommon.cli_command:
        command: show xlate detail
      register: xlate_detail
      # ignore_errors is used here because 'detail' support can vary by firmware version; 
      # we prioritize continuing the playbook over failing for a diagnostic sub-command.
      ignore_errors: true

    - name: Verify detailed metadata availability
      # Observability: Check if detailed output was successfully captured for the final report.
      ansible.builtin.assert:
        that:
          - xlate_detail is not failed
        fail_msg: "Warning: Detailed NAT metadata retrieval is unsupported or failed on this device."
        quiet: true

    - name: Display NAT Audit Report
      # Formatted debug output provides clear visibility for operators and log aggregators.
      ansible.builtin.debug:
        msg: |
          ================================================================
          NETLEARNER NAT AUDIT REPORT - {{ inventory_hostname }}
          ================================================================
          
          ACTIVE TRANSLATION SUMMARY:
          {{ xlate_summary.stdout }}
          
          DETAILED ANALYSIS STATUS:
          {{ 'Retrieved successfully' if (xlate_detail.stdout | default('') | length > 0) else 'No detailed data available' }}
          ================================================================
```