---
# NAT Translation Audit and Troubleshooting
# This playbook retrieves active NAT translations (xlates) from Cisco ASA/Firepower devices.
# It is used for verifying address translation flows and diagnosing connectivity issues.

- name: Get NAT Translations
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve summary of active NAT translations
      # Why: 'show xlate' provides a concise list of current translations for quick review.
      # Best Practice: Using FQCN for portable and reliable module referencing.
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate_summary
      # Error Handling: Catching CLI syntax errors or unauthorized access messages.
      failed_when: 
        - xlate_summary.failed or "Invalid input" in xlate_summary.stdout

    - name: Validate summary retrieval success
      # Observability: Ensuring the automation receives a valid response before proceeding.
      ansible.builtin.assert:
        that:
          - xlate_summary.stdout is defined
          - xlate_summary.stdout | length > 0
        quiet: true
        fail_msg: "The NAT translation summary could not be retrieved or is empty."

    - name: Retrieve detailed NAT translation metadata
      # Why: 'show xlate detail' includes connection flags and timeout values required for deep analysis.
      ansible.netcommon.cli_command:
        command: show xlate detail
      register: xlate_detail
      failed_when:
        - xlate_detail.failed or "Invalid input" in xlate_detail.stdout

    - name: Validate detailed retrieval success
      # Observability: Verifying telemetry data integrity.
      ansible.builtin.assert:
        that:
          - xlate_detail.stdout is defined
        quiet: true
        fail_msg: "Detailed NAT translation data could not be retrieved."

    - name: Output NAT Translation Summary
      # Why: Providing immediate visibility to the engineer during execution.
      # Idempotency: Read-only debug operations do not modify state and are safe for repeated execution.
      ansible.builtin.debug:
        msg: |
          ======================= NAT TRANSLATIONS =======================
          {{ xlate_summary.stdout }}