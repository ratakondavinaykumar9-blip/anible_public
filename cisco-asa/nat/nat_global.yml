---
# NAT Global Configuration Audit and Verification
# Optimized for NetLearner Staging environments to ensure architectural consistency.
# This playbook is safe for repeated execution (idempotent) and provides detailed validation.
# Author: NetLearner Architect
# Refined: 2026-04-12

- name: NAT Global Verification
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve global NAT configuration
      # Best Practice: Use Fully Qualified Collection Names (FQCN) for reliability.
      ansible.netcommon.cli_command:
        command: show running-config global | include nat
      register: nat_output
      # Error Handling: Fail explicitly if the command is unrecognized or execution fails.
      failed_when: 
        - nat_output.failed
        - "'Invalid input' in nat_output.stdout"
      # Idempotency: Read-only tasks must not report 'changed' status to ensure 
      # accurate reporting during audit cycles.
      changed_when: false

    - name: Assert NAT configuration state capture
      # Observability: Verify that the device returned a valid response object.
      ansible.builtin.assert:
        that:
          - nat_output.stdout is defined
        fail_msg: "Critical Failure: Could not capture NAT global state on {{ inventory_hostname }}."
        success_msg: "Successfully captured NAT global state for {{ inventory_hostname }}."

    - name: Display formatted NAT Global configuration
      # Documentation: Provides structured feedback for network operators and audit trails.
      ansible.builtin.debug:
        msg: |
          ======================= NAT GLOBAL CONFIG =======================
          DEVICE: {{ inventory_hostname }}
          RESULT:
          {{ nat_output.stdout | default('NO GLOBAL NAT SETTINGS CONFIGURED') }}
          =================================================================
