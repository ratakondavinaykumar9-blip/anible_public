---
# NAT Fragmentation Audit
# Improved: 2026-03-15
# Description: This playbook retrieves and audits NAT fragmentation settings on ASA devices.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.

- name: NAT Fragmentation Audit
  hosts: asa_firepower
  gather_facts: false # Optimization: Fact gathering is disabled for performance as no host-level facts are required.

  tasks:
    - name: Retrieve NAT fragmentation configuration from running-config
      # Why: NAT fragmentation settings impact how the firewall handles oversized packets. 
      # Capturing this state is essential for verifying compliance with MTU policies.
      ansible.netcommon.cli_command:
        command: show running-config nat | include fragment
      register: nat_frag_config
      # Error Handling: Use ignore_errors to prevent a single device failure from stopping the audit across the fleet.
      ignore_errors: true

    - name: Verify NAT fragmentation command execution
      # Why: Observability standard. Confirms the device responded successfully before attempting to parse output.
      ansible.builtin.assert:
        that:
          - nat_frag_config is defined
          - nat_frag_config.stdout is defined
        fail_msg: "CRITICAL: Failed to retrieve NAT fragmentation data from {{ inventory_hostname }}."
        success_msg: "SUCCESS: NAT fragmentation data successfully retrieved for {{ inventory_hostname }}."

    - name: Display NAT fragmentation settings
      # Why: Provides an immediate, human-readable summary of the current device state for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= NAT FRAGMENTATION REPORT =======================
          DEVICE: {{ inventory_hostname }}
          STATUS: {{ 'CONFIGURED' if 'fragment' in nat_frag_config.stdout else 'NOT DEFINED' }}
          ------------------------------------------------------------------------
          {{ nat_frag_config.stdout if nat_frag_config.stdout | trim | length > 0 else 'No specific NAT fragmentation rules are present in the running configuration.' }}
          ========================================================================

    - name: Register fragmentation state for downstream logic
      # Why: Persists the audit result as a fact, allowing subsequent plays to perform conditional remediation if needed.
      # Idempotency: This task simply records state and is safe to execute repeatedly.
      ansible.builtin.set_fact:
        nat_fragmentation_active: "{{ 'fragment' in nat_frag_config.stdout }}"