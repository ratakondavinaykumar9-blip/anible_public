---
# NAT Control Status Audit
# Purpose: Verifies the legacy NAT control configuration on Cisco ASA/Firepower devices.
# This playbook ensures the device state is observable and matches expectations.
- name: NAT Control
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT control configuration status
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show nat-control
      register: control
      # Error Handling: Fail explicitly if the command is unrecognized or the device returns an error string
      failed_when: 
        - control.failed or "Invalid input" in control.stdout
      ignore_errors: false

    - name: Validate NAT control response
      # Observability: Ensure we received a valid and parsable string from the device
      ansible.builtin.assert:
        that:
          - control.stdout is defined
          - "'nat-control is' in control.stdout"
        fail_msg: "Device {{ inventory_hostname }} returned an unexpected response format: {{ control.stdout | default('NULL') }}"
        success_msg: "Successfully retrieved NAT control status for {{ inventory_hostname }}"

    - name: Display NAT control status
      # Documentation: Providing clear visibility into the current operational state
      ansible.builtin.debug:
        msg: 
          - "Device: {{ inventory_hostname }}"
          - "Status: {{ control.stdout }}"

    - name: Ensure NAT control state is deterministic
      # Idempotency/Observability: Verify the state is explicitly 'enabled' or 'disabled' 
      # to prevent misinterpretation of partial output.
      ansible.builtin.assert:
        that:
          - control.stdout is search('nat-control is (enabled|disabled)')
        fail_msg: "The NAT control state on {{ inventory_hostname }} is in an indeterminate state."
        quiet: true