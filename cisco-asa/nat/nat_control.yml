# ASA/Firepower NAT Control Audit
# This playbook retrieves and validates the NAT control configuration on Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Register & Assert), FQCN (Ansible Collections).

- name: NAT Control Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT control configuration status
      # Use FQCN for consistent network operations across different sites.
      # This task fetches the status of the legacy 'nat-control' feature.
      ansible.netcommon.cli_command:
        command: show nat-control
      register: nat_control_raw
      # Error Handling: Fail if the command is unrecognized or if the connection fails.
      failed_when:
        - nat_control_raw.failed or "Invalid input" in nat_control_raw.stdout
      # Idempotency: Read-only 'show' commands must not report a 'changed' status.
      changed_when: false

    - name: Verify capture of NAT control output
      # Observability: Assert that the command returned a valid response to ensure visibility.
      # This confirms the device responded with content rather than an empty buffer.
      ansible.builtin.assert:
        that:
          - nat_control_raw.stdout is defined
          - nat_control_raw.stdout | length > 0
        fail_msg: "Critical: Failed to retrieve valid NAT control status from {{ inventory_hostname }}."
        success_msg: "Observability Check: Successfully captured NAT control output from the device."

    - name: Display NAT control status for administrative review
      # Observability: Human-readable output for the NetLearner Staging audit logs.
      # This provides the current state for manual verification and record-keeping.
      ansible.builtin.debug:
        msg: |
          ==================================================
          NAT Control Status for {{ inventory_hostname }}
          Timestamp: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          ==================================================
          Status:
          {{ nat_control_raw.stdout }}