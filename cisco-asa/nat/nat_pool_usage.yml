---
# NAT Pool Usage Monitoring
# Improved: 2026-03-15
# Author: NetLearner Architect
# Purpose: Retrieves and validates NAT pool utilization for Cisco ASA/Firepower.
# Standards: Idempotent, Observable, Documented, Error-Resilient, FQCN-compliant.

- name: Get NAT Pool Usage
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT pool configuration and status
      # FQCN: Using the netcommon collection for standardized CLI interaction.
      # Idempotency: 'show' commands are read-only and inherently safe to run multiple times.
      ansible.netcommon.cli_command:
        command: show ip nat pool
      register: pool
      # Error Handling: Explicitly fail if the command is not supported by the current firmware.
      failed_when:
        - pool.failed
        - "'Invalid input' in pool.stdout"

    - name: Retrieve granular translation statistics for pools
      # Capturing specific pool usage data from the global NAT table for capacity planning.
      ansible.netcommon.cli_command:
        command: show nat | include pool
      register: nat_stats
      # Error Handling: Use ignore_errors because 'include' may return non-zero if no pools are active.
      ignore_errors: true

    - name: Validate data observability
      # Observability: Using assertions to ensure that the required data structures were returned.
      ansible.builtin.assert:
        that:
          - pool.stdout is defined
          - nat_stats.stdout is defined
        fail_msg: "Required NAT utilization data could not be retrieved from the host."
        quiet: true

    - name: Display consolidated NAT utilization report
      # Documentation: Providing a formatted summary for operator visibility and troubleshooting.
      ansible.builtin.debug:
        msg: |
          ======================= NAT POOL DEFINITIONS ======================
          {{ pool.stdout | default('No pool configuration retrieved.') }}

          ======================= ACTIVE POOL STATISTICS ====================
          {{ nat_stats.stdout | default('No active translations found for configured pools.') }}