# NAT by Interface
# Improved: 2026-04-12
# Standards: Idempotency, Observability, FQCN, Error Handling
#
# WHY: This playbook retrieves the NAT configuration mapped to interfaces on Cisco ASA/Firepower.
# It is critical for validating that translation rules are correctly applied to the logical 
# interface security zones (nameif).
---
- name: Get NAT by Interface
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve NAT table details from CLI
      # Using FQCN for network-agnostic CLI execution
      ansible.netcommon.cli_command:
        command: show nat interface
      register: nat_intf
      # Error Handling: Fail if output contains common Cisco error strings or is undefined
      failed_when:
        - nat_intf.stdout is not defined
        - "'Invalid input' in nat_intf.stdout"
        - "'ERROR:' in nat_intf.stdout"
      tags:
        - fetch
        - nat

    - name: Verify NAT output integrity
      # Observability: Assert that we received meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - nat_intf.stdout | length > 0
        fail_msg: "No NAT configuration found or command failed to return data."
        success_msg: "NAT interface mapping successfully captured."
      tags:
        - validate
        - nat

    - name: Display NAT interface mapping
      # Observability: Clean output formatting for human review
      ansible.builtin.debug:
        msg: |
          ======================= NAT BY INTERFACE =======================
          {{ nat_intf.stdout }}
      tags:
        - debug
        - nat