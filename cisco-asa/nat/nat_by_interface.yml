---
# NAT by Interface
# industry standards: Improved for reliability, observability, and compliance.
# This playbook performs a read-only operation to fetch NAT mapping per interface.
# Idempotency: Read-only 'show' commands are inherently idempotent.

- name: Get NAT by Interface
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch NAT interface details from device
      # Best Practices: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show nat interface
      register: nat_intf
      # Error Handling: Fail if the command is unrecognized or returns an error string
      failed_when: 
        - nat_intf.stdout is not defined or nat_intf.stdout | length == 0
        - "'Invalid input' in nat_intf.stdout or 'ERROR:' in nat_intf.stdout"

    - name: Validate NAT information retrieval
      # Observability: Asserting that data was captured to ensure downstream reliability
      ansible.builtin.assert:
        that:
          - nat_intf.stdout is defined
          - nat_intf.stdout | length > 0
        fail_msg: "The 'show nat interface' command returned no data or failed to execute."
        success_msg: "NAT interface data successfully captured."

    - name: Display NAT Configuration Report
      # Documentation: Providing a formatted view of the current state for audit trails
      ansible.builtin.debug:
        msg: |
          ======================= NAT BY INTERFACE =======================
          {{ nat_intf.stdout }}