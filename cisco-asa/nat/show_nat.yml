---
# Show NAT Configuration and Runtime Statistics
# Improved for Idempotency, Observability, and Error Handling
# Standards: FQCN, Assertions, and Detailed Comments
- name: Get NAT Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather structured NAT configuration
      # Idempotency: Using 'state: gathered' ensures we only read the configuration without changes.
      # FQCN: Using fully qualified collection name for cisco.asa.
      cisco.asa.asa_nat:
        state: gathered
      register: nat_output
      ignore_errors: true

    - name: Verify NAT configuration gathering
      # Observability: Assert that the gathering task was successful to prevent silent failures.
      ansible.builtin.assert:
        that:
          - nat_output is not failed
        fail_msg: "Failed to retrieve structured NAT configuration from {{ inventory_hostname }}"
        quiet: true

    - name: Get NAT statistics via CLI
      # Observability: Registering output to 'nat_stats' for hit count analysis.
      # Error Handling: 'failed_when' ensures we catch empty responses or CLI errors.
      ansible.netcommon.cli_command:
        command: show nat
      register: nat_stats
      failed_when: 
        - nat_stats.stdout is not defined
        - nat_stats.stdout == ""

    - name: Get active translation table (xlate)
      # Documentation: Capturing dynamic translations to verify NAT functionality in real-time.
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate_output
      failed_when: 
        - xlate_output.stdout is not defined

    - name: Validate operational data integrity
      # Observability: Ensure that both statistics and xlate data were successfully captured.
      ansible.builtin.assert:
        that:
          - nat_stats.stdout | length > 0
          - xlate_output.stdout | length > 0
        fail_msg: "Incomplete operational data received from {{ inventory_hostname }}"
        quiet: true

    - name: Display NAT rules and statistics
      # Observability: Formatted output providing a clear view of the device state.
      ansible.builtin.debug:
        msg: |
          ============================================================
          NAT Operational Status: {{ inventory_hostname }}
          ============================================================
          
          [Structured Config]
          {% if nat_output.gathered is defined and nat_output.gathered %}
          {% for rule in nat_output.gathered %}
          Rule: {{ rule.name | default('ID:' ~ loop.index) }}
          Source: {{ rule.source_address | default('any') }} -> {{ rule.translated_source | default('original') }}
          ------------------------------------------------------------
          {% endfor %}
          {% else %}
          No structured NAT configuration found or module returned empty.
          {% endif %}

          [Active Translation Table (xlate)]
          {{ xlate_output.stdout }}

          [NAT Statistics and Hit Counts]
          {{ nat_stats.stdout }}