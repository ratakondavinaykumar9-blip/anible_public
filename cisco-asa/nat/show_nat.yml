---
# NAT Configuration Visibility and Validation
# Purpose: Retrieves NAT rules, translation statistics, and the xlate table from ASA devices.
# Standards: Idempotent (read-only), Observable (register/assert), Documented, Error Handled, and FQCN.
- name: Get NAT Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather structured NAT configuration
      # FQCN: Using the cisco.asa collection to retrieve structured NAT state.
      # Idempotency: 'state: gathered' ensures the operation is strictly read-only.
      cisco.asa.asa_nat:
        state: gathered
      register: nat_output
      # Error Handling: Ignore failures to allow the playbook to continue with CLI fallbacks if structured gathering is unsupported.
      ignore_errors: true

    - name: Get NAT operational statistics via CLI
      # Observability: Capturing raw command output for real-time operational monitoring.
      ansible.netcommon.cli_command:
        command: show nat
      register: nat_stats
      # Error Handling: Define failure criteria based on command response patterns to catch invalid commands.
      failed_when:
        - nat_stats.stdout is not defined
        - "'Invalid' in nat_stats.stdout"

    - name: Get active translation (xlate) table
      # Observability: The xlate table is critical for verifying real-time NAT session states.
      ansible.netcommon.cli_command:
        command: show xlate
      register: xlate_output
      failed_when:
        - xlate_output.stdout is not defined
        - "'error' in xlate_output.stdout|lower"

    - name: Validate data collection integrity
      # Observability: Assert that critical operational data was successfully retrieved to ensure meaningful results.
      ansible.builtin.assert:
        that:
          - nat_stats.stdout | length > 0
          - xlate_output.stdout | length > 0
        fail_msg: "Data collection failed for {{ inventory_hostname }}. Statistics or translation table is empty."
        quiet: true

    - name: Display NAT configuration and operational state
      # Documentation: Consolidates both structured facts and raw CLI statistics for administrator review.
      ansible.builtin.debug:
        msg: |
          ==============================================================================
          NAT OPERATIONAL STATUS: {{ inventory_hostname }}
          ==============================================================================
          
          STRUCTURED NAT RULES:
          {% if nat_output.gathered is defined and nat_output.gathered %}
          {% for rule in nat_output.gathered %}
          - ID: {{ rule.rule_id | default('N/A') }} | Source: {{ rule.source_address | default('any') }} -> {{ rule.translated_source | default('N/A') }}
          {% endfor %}
          {% elif nat_output.ansible_facts is defined and nat_output.ansible_facts.asa_nat is defined %}
          {% for rule in nat_output.ansible_facts.asa_nat %}
          - ID: {{ rule.rule_id | default('N/A') }} | Source: {{ rule.source_address | default('any') }} -> {{ rule.translated_source | default('N/A') }}
          {% endfor %}
          {% else %}
          No structured NAT rules configured or retrieved via module.
          {% endif %}
          
          ACTIVE TRANSLATIONS (xlate):
          {{ xlate_output.stdout }}
          
          NAT STATISTICS:
          {{ nat_stats.stdout }}
