---
# DHCP Lease Retrieval Playbook
# Standardized for Idempotency, Observability, and Best Practices
---
- name: DHCP Lease Management
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve DHCP lease information from device
      # FQCN: Utilizing ansible.netcommon.cli_command for direct CLI interaction
      # Idempotency: changed_when: false indicates this 'show' command does not modify state
      ansible.netcommon.cli_command:
        command: show dhcpd lease
      register: lease_output
      changed_when: false
      # Observability: Ensure task runs in check_mode to validate connectivity without impact
      check_mode: false
      # Error Handling: Fail explicitly if the command is unrecognized or execution fails
      failed_when:
        - lease_output.failed or "Invalid input" in lease_output.stdout

    - name: Validate DHCP lease data retrieval
      # Observability: Assert that the command execution returned stdout data
      ansible.builtin.assert:
        that:
          - lease_output.stdout is defined
        fail_msg: "The 'show dhcpd lease' command failed to return any data."
        quiet: true

    - name: Display formatted DHCP leases
      # Documentation: Debug module presents the current lease state for operator visibility
      ansible.builtin.debug:
        msg: |
          ======================= DHCP LEASES =======================
          {{ lease_output.stdout }}