# DHCP Lease Retrieval Playbook
# Purpose: Fetches and validates current DHCP leases from ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability, and FQCN compliance.
- name: Retrieve and Display DHCP Leases
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show dhcpd lease' on the target security appliance
      # Using Fully Qualified Collection Name (FQCN) for cross-platform reliability
      ansible.netcommon.cli_command:
        command: show dhcpd lease
      register: dhcp_lease_data
      # Ensure the task captures failure if the command returns an error
      failed_when: dhcp_lease_data.failed | default(false)

    - name: Validate DHCP lease data integrity
      # Observability: Assert that the command returned non-empty output
      ansible.builtin.assert:
        that:
          - dhcp_lease_data.stdout is defined
          - dhcp_lease_data.stdout | length > 0
        fail_msg: "The security appliance returned empty DHCP lease data. Verify DHCP is configured."
        success_msg: "DHCP lease data successfully retrieved."

    - name: Display formatted DHCP lease information
      # Provides operator visibility with structured output formatting
      ansible.builtin.debug:
        msg: |
          ======================= DHCP LEASES =======================
          {{ dhcp_lease_data.stdout }}