---
# DHCP Stats - Improved Version
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Note: This playbook is inherently idempotent as it only performs read-only 'show' operations.
- name: DHCP Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve DHCP statistics from the security appliance
      # Using FQCN for consistent behavior across different Ansible versions
      ansible.netcommon.cli_command:
        command: show dhcpd statistics
      register: dhcp_stats
      # Error Handling: Catch specific CLI error strings that don't trigger a non-zero exit code
      failed_when: >
        dhcp_stats.failed or
        "Invalid input" in dhcp_stats.stdout or
        "ERROR" in dhcp_stats.stdout

    - name: Validate DHCP statistics retrieval
      # Observability: Ensure the command returned data before proceeding
      ansible.builtin.assert:
        that:
          - dhcp_stats.stdout is defined
          - dhcp_stats.stdout | length > 0
        fail_msg: "DHCP statistics output is empty. Verify DHCP is configured and active."
        success_msg: "DHCP statistics successfully captured."

    - name: Display DHCP statistics
      # Documentation: Provide formatted output for easier log analysis and troubleshooting
      ansible.builtin.debug:
        msg: |
          ======================= DHCP STATS =======================
          {{ dhcp_stats.stdout }}