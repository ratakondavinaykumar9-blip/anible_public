---
# DHCP Pool Configuration & Verification
# This playbook retrieves and validates the DHCP pool configuration on Cisco ASA/Firepower devices.
# Standards: Idempotent (Read-only), Observable, Documented, and Secure Error Handling.

- name: DHCP Pool Configuration Verification
  hosts: asa_firepower
  gather_facts: false
  # Ensure the connection type is specified for network modules
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve current DHCP pool configuration
      # Use FQCN for platform-specific command execution
      cisco.asa.asa_command:
        commands:
          - show running-config dhcpd pool
      register: dhcp_pool_output
      # Error Handling: Fail explicitly if the command returns an error or is unrecognized
      failed_when: 
        - dhcp_pool_output.failed
        - "'Invalid input' in dhcp_pool_output.stdout[0]"
      ignore_errors: false

    - name: Validate command response integrity
      # Observability: Assert that the device returned a valid list structure
      ansible.builtin.assert:
        that:
          - dhcp_pool_output.stdout is defined
          - dhcp_pool_output.stdout | length > 0
        fail_msg: "No response received from {{ inventory_hostname }} for DHCP pool query."
        success_msg: "