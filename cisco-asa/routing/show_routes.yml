---
# Show Routes
# Improved: 2026-03-15 (NetLearner Architect)
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Get Routing Table
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Retrieve the operational routing table
      # Documentation: Captures the active RIB entries. Read-only commands are inherently idempotent.
      ansible.netcommon.cli_command:
        command: show route
      register: routes
      # Error Handling: Fail if the command is unrecognized or returns no data
      failed_when: 
        - routes.stdout is not defined or routes.stdout | length == 0
        - "'Invalid input' in routes.stdout"

    - name: Retrieve the internal routing database
      # Documentation: Provides detailed RIB information including protocol metrics.
      ansible.netcommon.cli_command:
        command: show route database
      register: route_db
      failed_when: 
        - route_db.stdout is not defined or route_db.stdout | length == 0
        - "'Invalid input' in route_db.stdout"

    - name: Verify routing data integrity
      # Observability: Assert that we received valid routing headers from the device
      ansible.builtin.assert:
        that:
          - "'Codes:' in routes.stdout"
          - "'Gateway of last resort' in routes.stdout or 'no gateway' in routes.stdout"
        fail_msg: "Routing table format on {{ inventory_hostname }} is unexpected or incomplete."
        success_msg: "Successfully validated routing table for {{ inventory_hostname }}."

    - name: Display routes