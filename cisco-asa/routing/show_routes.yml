---
# Show Routes - Improved Version
# Retrieves the routing table and routing database from Cisco ASA/Firepower devices.
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Get Routing Table Information
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Fetch active routing table
      # Using Fully Qualified Collection Name (FQCN) for reliability.
      # This command is inherently idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: show route
      register: routes
      # Error Handling: Ensure we fail if the command execution itself fails.
      failed_when: routes.failed or "Invalid input" in routes.stdout

    - name: Verify routing table retrieval
      # Observability: Assert that the command returned data to prevent silent failures.
      ansible.builtin.assert:
        that:
          - routes.stdout is defined
          - routes.stdout | length > 0
        fail_msg: "Routing table output is empty or undefined for {{ inventory_hostname }}"
        success_msg: "Routing table successfully captured for {{ inventory_hostname }}"
        quiet: true

    - name: Fetch underlying routing database
      # Some ASA/Firepower versions or contexts may not support the 'database' keyword.
      # Error Handling: Using ignore_errors to allow the playbook to continue if this specific command is unsupported.
      ansible.netcommon.cli_command:
        command: show route database
      register: route_db
      ignore_errors: yes

    - name: Display gathered routing details
      # Observability: Providing a structured and formatted output of the collected data.
      ansible.builtin.debug:
        msg: |
          ============================================================
          Active Routing Table: {{ inventory_hostname }}
          ============================================================
          {{ routes.stdout }}
          
          {% if route_db.stdout is defined and not route_db.failed %}
          ============================================================
          Routing Database:
          ============================================================
          {{ route_db.stdout }}
          {% else %}
          Note: Routing database command was skipped or is not supported on this device.
          {% endif %}