---
# Routing Table V4 - Improved for Enterprise Standards
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Standards: Idempotency (read-only), Observability (assert), Documentation,
# Error Handling (failed_when), and FQCN usage.

- name: IPv4 Routing Table Audit
  hosts: asa_firepower
  gather_facts: false # Performance: Facts are not required for this operational check

  tasks:
    - name: Retrieve IPv4 Routing Table
      # FQCN: Using ansible.netcommon.cli_command for cross-platform network CLI support.
      # Idempotency: Read-only 'show' command is safe to execute repeatedly.
      ansible.netcommon.cli_command:
        command: show route ipv4
      register: v4_route_output
      # Error Handling: Fail the task if the command fails or returns no output.
      failed_when: 
        - v4_route_output.failed | default(false)
        - v4_route_output.stdout | length == 0

    - name: Validate Routing Table Integrity
      # Observability: Assert that the output contains standard routing table signatures.
      # This ensures the device returned a valid table rather than an error message.
      ansible.builtin.assert:
        that:
          - "'Codes:' in v4_route_output.stdout"
          - "'Gateway of last resort' in v4_route_output.stdout"
        fail_msg: "The routing table output is invalid or incomplete."
        success_msg: "IPv4 routing table successfully retrieved and validated."

    - name: Display IPv4 Routing Table
      # Observability: Providing a clean, formatted view for manual verification.
      ansible.builtin.debug:
        msg: |
          ======================= IPv4 ROUTES =======================
          {{ v4_route_output.stdout }}