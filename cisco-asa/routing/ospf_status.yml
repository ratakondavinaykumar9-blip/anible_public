---
# OSPF Status Monitoring Playbook
# This playbook retrieves and validates OSPF neighbor states and database information
# to ensure routing adjacency and topology visibility on Cisco ASA/Firepower devices.
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN.
# Updated: 2026-03-15
# Author: NetLearner Architect

- name: Get OSPF Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve OSPF neighbor status
      # Utilizing FQCN for cross-platform network command execution
      ansible.netcommon.cli_command:
        command: show ospf neighbor
      register: ospf_neighbor_result
      # Error Handling: Catch cases where the command is unsupported or fails
      failed_when: 
        - ospf_neighbor_result.stdout is not defined
        - "'Invalid' in ospf_neighbor_result.stdout"
      
    - name: Verify OSPF neighbor connectivity
      # Observability: Assert that the command returned data, indicating OSPF is active
      ansible.builtin.assert:
        that:
          - ospf_neighbor_result.stdout | length > 0
        fail_msg: "OSPF neighbor output is empty. Verify OSPF process configuration."
        success_msg: "OSPF neighbor data successfully retrieved."

    - name: Retrieve OSPF database information
      ansible.netcommon.cli_command:
        command: show ospf database
      register: ospf_db_result
      failed_when:
        - ospf_db_result.stdout is not defined
        - "'Invalid' in ospf_db_result.stdout"

    - name: Verify OSPF database integrity
      ansible.builtin.assert:
        that:
          - ospf_db_result.stdout | length > 0
        fail_msg: "OSPF database output is empty."
        success_msg: "OSPF database data successfully retrieved."

    - name: Display OSPF Operational Status
      # Documentation: Formatted output for human-readable operational verification
      ansible.builtin.debug:
        msg: |
          ======================= OSPF NEIGHBOR STATUS =======================
          {{ ospf_neighbor_result.stdout }}

          ======================= OSPF DATABASE SUMMARY ======================
          {{ ospf_db_result.stdout }}