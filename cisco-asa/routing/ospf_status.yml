# OSPF Operational State Verification
# This playbook retrieves and validates OSPF neighbor and database information
# from Cisco ASA/Firepower devices. It is designed for observability and
# automated verification of routing protocol health.

- name: Get OSPF Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve OSPF neighbor status
      # Fetches the current adjacency table. Idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: show ospf neighbor
      register: ospf_neighbor_output
      # Ensure the command execution was successful at the transport layer
      # and that the device didn't return a CLI syntax error.
      failed_when: 
        - ospf_neighbor_output.failed or "Invalid input" in ospf_neighbor_output.stdout

    - name: Retrieve OSPF database information
      # Fetches the Link State Database (LSDB) to verify topology synchronization.
      ansible.netcommon.cli_command:
        command: show ospf database
      register: ospf_db_output
      failed_when: 
        - ospf_db_output.failed or "Invalid input" in ospf_db_output.stdout

    - name: Verify OSPF operational data integrity
      # Validates that the output contains expected OSPF headers, 
      # ensuring the process is active and returning data.
      ansible.builtin.assert:
        that:
          - "'Neighbor ID' in ospf_neighbor_output.stdout"
          - "'OSPF Router with ID' in ospf_db_output.stdout"
        fail_msg: "OSPF validation failed: Neighbor table or Database output is missing expected headers."
        success_msg: "OSPF operational state successfully verified."

    - name: Display OSPF status summary
      # Aggregates retrieved data into a single visibility task for auditing.
      ansible.builtin.debug:
        msg: |
          ======================= OSPF OPERATIONAL STATUS =======================
          DEVICE: {{ inventory_hostname }}
          
          [ NEIGHBOR ADJACENCIES ]
          {{ ospf_neighbor_output.stdout }}
          
          [ LINK STATE DATABASE ]
          {{ ospf_db_output.stdout }}