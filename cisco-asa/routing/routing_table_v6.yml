# NetLearner Staging: IPv6 Routing Table Verification
# Author: NetLearner Architect (Refined from Arjun/OpenClaw)
# Purpose: Retrieves and validates the IPv6 routing table on ASA/Firepower devices.
# This operational check ensures IPv6 control plane visibility and reachability 
# within the automated infrastructure.

- name: IPv6 Routing Table Analysis
  hosts: asa_firepower
  gather_facts: false # Performance optimization: Device-level facts are not required for this check

  tasks:
    - name: "Execute show route ipv6 command"
      # Best Practice: Using FQCN for cross-platform network module compatibility
      ansible.netcommon.cli_command:
        command: show route ipv6
      register: v6_route_data
      # Error Handling: Explicit failure if the command returns an error or is unsupported
      failed_when: 
        - v6_route_data.failed
        - "'invalid input' in v6_route_data.stdout | lower"

    - name: "Validate routing table response"
      # Observability: Assert that the command returned meaningful content
      ansible.builtin.assert:
        that:
          - v6_route_data.stdout is defined
          - v6_route_data.stdout | length > 0
          - "'IPv6' in v6_route_data.stdout"
        fail_msg: "Critical: IPv6 routing table is empty or could not be parsed."
        success_msg: "IPv6 routing table integrity verified."

    - name: "Display IPv6 Routing Table"
      # Observability: Structured debug output for operator visibility
      ansible.builtin.debug:
        msg: |
          ===========================================================
          SITE/DEVICE: {{ inventory_hostname }}
          TIMESTAMP  : {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S"') }}
          ======================= IPv6 ROUTES =======================
          {{ v6_route_data.stdout }}
          ===========================================================
