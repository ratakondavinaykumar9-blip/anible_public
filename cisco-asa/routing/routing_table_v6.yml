---
# Routing Table V6
# Improved: 2026-03-15
# Author: NetLearner Architect
#
# Purpose: This playbook retrieves and validates the IPv6 routing table from ASA/Firepower
# devices. It follows enterprise standards for observability and error handling.
#
- name: IPv6 Routing Table Verification
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve IPv6 routing table from the security appliance
      # Use FQCN for consistency; changed_when: false ensures idempotency reporting
      ansible.netcommon.cli_command:
        command: show route ipv6
      register: v6_routes_output
      # Error Handling: Fail if the command is unsupported or the device returns an error string
      failed_when:
        - v6_routes_output.failed or "Invalid input" in v6_routes_output.stdout
      changed_when: false

    - name: Validate that IPv6 routing data was successfully captured
      # Observability: Assert ensures that the playbook stops if critical data is missing
      ansible.builtin.assert:
        that:
          - v6_routes_output.stdout is defined
          - v6_routes_output.stdout | length > 0
        fail_msg: "Failed to retrieve IPv6 routes. The output was empty or undefined."
        success_msg: "IPv6 routing table captured successfully."

    - name: Display formatted IPv6 routing information
      # Documentation: Provide visibility for operators during playbook execution
      ansible.builtin.debug:
        msg: |
          ======================= IPv6 ROUTES =======================
          {{ v6_routes_output.stdout }}