---
# NetLearner Architect - Optimized EIGRP Status Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Validates EIGRP neighbor adjacency and operational status on ASA/Firepower.
- name: EIGRP Status Check
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "FETCH | Retrieve EIGRP neighbors"
      # FQCN: Using ansible.netcommon.cli_command for standardized CLI interaction.
      ansible.netcommon.cli_command:
        command: show eigrp neighbors
      register: eigrp_raw
      # Error Handling: failed_when: false ensures we can run asserts even if the command itself has issues.
      failed_when: false
      # Idempotency: 'show' commands are non-modifying and safe to run repeatedly.

    - name: "ASSERT | Verify command execution success"
      # Observability: Ensure the device responded and no transport errors occurred.
      ansible.builtin.assert:
        that:
          - eigrp_raw.failed is false
          - eigrp_raw.stdout is defined
        fail_msg: "CRITICAL: Could not retrieve EIGRP data from {{ inventory_hostname }}."
        success_msg: "INFO: Successfully connected and executed query on {{ inventory_hostname }}."

    - name: "ASSERT | Verify EIGRP process is active"
      # Observability: Validate that the EIGRP process is actually enabled by checking for output headers.
      ansible.builtin.assert:
        that:
          - "'Address' in eigrp_raw.stdout or 'H' in eigrp_raw.stdout"
        fail_msg: "WARNING: EIGRP is not enabled or has no configured neighbors on {{ inventory_hostname }}."
        quiet: true

    - name: "DEBUG | Display EIGRP Neighbors"
      # Documentation: Visual representation of the EIGRP neighbor table for operator review.
      ansible.builtin.debug:
        msg: |
          ================