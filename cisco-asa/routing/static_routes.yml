---
# Static Routes
# Improved: 2026-04-12
# Architect: NetLearner (Autonomous)
# Original Author: Arjun (OpenClaw)
#
# PURPOSE:
# This playbook retrieves the static routing table from Cisco ASA/Firepower devices.
# It adheres to NetLearner Staging standards for idempotency, observability, and error handling.
---
- name: Get Static Routes
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve static route configuration from device
      # Use FQCN (Fully Qualified Collection Name) for predictable module resolution
      ansible.netcommon.cli_command:
        command: show route static
      register: static_routes_output
      # Idempotency: Set changed_when to false as this is a read-only 'show' command
      changed_when: false
      # Error Handling: Fail explicitly if 'Invalid input' is detected or output is undefined
      failed_when:
        - "static_routes_output.stdout is not defined"
        - "'Invalid input' in static_routes_output.stdout"

    - name: Observability - Verify routing table capture
      # Assertion ensures the playbook is observable and provides clear failure messages
      ansible.builtin.assert:
        that:
          - "static_routes_output.stdout | length > 0"
        fail_msg: "No static routes found or device returned empty output."
        success_msg: "Static routes successfully retrieved for {{ inventory_hostname }}."

    - name: Display formatted static routes for audit
      # Documentation: Provides a clear, formatted view for log files and terminals
      ansible.builtin.debug:
        msg: |
          ======================= STATIC ROUTES: {{ inventory_hostname }} =======================
          {{ static_routes_output.stdout }}
          ========================================================================================
