---
# Static Routes - Improved by Architect:# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Safely retrieve and verify the static routing table on ASA/Firepower devices.

- name: Get Static Routes
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Get static routes from CLI
      # Best Practice: Using Fully Qualified Collection Name (FQCN) for network commands.
      # Idempotency: This is a read-only operation and does not modify device state.
      ansible.netcommon.cli_command:
        command: show route static
      register: static_result
      # Error Handling: Fail the task if the device returns an error message (e.g., % Invalid command).
      failed_when: 
        - static_result.failed 
        - '"% "' in static_result.stdout

    - name: Assert static route retrieval was successful
      # Observability: Verify the stdout is defined to ensure the command executed successfully.
      ansible.builtin.assert:
        that:
          - "static_result.stdout is defined"
        fail_msg: "The command 'show route static' failed to return data on {{ inventory_hostname }}."
        success_msg: "Static routes successfully retrieved from {{ inventory_hostname }}."

    - name: Display static routes
      # Documentation: Providing a clear, formatted view of the routing table for the operator.
      ansible.builtin.debug:
        msg: |
          ======================= STATIC ROUTES =======================
          Device: {{ inventory_hostname }}
          =============================================================
          {{ static_result.stdout }}