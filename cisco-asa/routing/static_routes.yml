---
# Static Routes Analysis
# Enhanced for Idempotency, Observability, and Best Practices
# Date: 2026-03-15
# Author: NetLearner Architect (AI)

- name: Retrieve and Validate Static Routes
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get static routes via CLI
      # Use Fully Qualified Collection Name (FQCN) for portability and best practices.
      # This operation is inherently idempotent as it is a read-only 'show' command.
      ansible.netcommon.cli_command:
        command: show route static
      register: static_routes_result
      # Error Handling: Fail if the command fails or returns an error string common to Cisco ASA/FTD.
      failed_when:
        - static_routes_result.failed or "Invalid input" in static_routes_result.stdout

    - name: Verify successful route retrieval
      # Observability: Assert that the result contains stdout to verify communication success.
      ansible.builtin.assert:
        that:
          - "static_routes_result.stdout is defined"
        fail_msg: "The 'show route static' command failed to return a valid output."
        success_msg: "Static routes successfully retrieved from the device."

    - name: Display formatted static route information
      # Documentation: Providing clear visibility into the current routing state of the device.
      ansible.builtin.debug:
        msg: |
          ======================= STATIC ROUTES =======================
          {{ static_routes_result.stdout }}