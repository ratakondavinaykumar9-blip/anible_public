---
# BGP Status - High Reliability Version
# Auto-improved: 2026-03-15 00:00
# Author: NetLearner Architect
#
# This playbook retrieves the BGP summary from Cisco ASA/Firepower devices.
# It follows NetLearner standards for idempotency, observability, and robust error handling.
---
- name: Get BGP Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve BGP summary via CLI
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show bgp summary
      register: bgp_output
      # Idempotency: Explicitly mark as not changed since this is a read-only operation
      changed_when: false
      # Error Handling: Fail if the device returns an error indicating BGP is unconfigured
      failed_when:
        - "'Invalid input' in bgp_output.stdout"
        - "'BGP not enabled' in bgp_output.stdout"

    - name: Validate BGP operational status
      # Observability: Assert that the command returned meaningful BGP data
      ansible.builtin.assert:
        that:
          - "bgp_output.stdout != ''"
          - "'BGP router identifier' in bgp_output.stdout or 'Neighbor' in bgp_output.stdout"
        fail_msg: "BGP status check failed: Output is empty or BGP is not configured on {{ inventory_hostname }}."
        success_msg: "BGP status successfully verified for {{ inventory_hostname }}."

    - name: Display BGP Status Summary
      # Documentation: Providing clear, formatted output for operational visibility
      ansible.builtin.debug:
        msg: |
          ======================= BGP STATUS: {{ inventory_hostname }} =======================
          {{ bgp_output.stdout }}