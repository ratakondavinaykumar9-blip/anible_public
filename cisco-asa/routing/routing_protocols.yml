---
# Routing Protocols Configuration Audit
# Purpose: This playbook retrieves and validates the routing protocol configuration on Cisco ASA/Firepower devices.
# It ensures operational visibility into active routing processes (OSPF, EIGRP, BGP, etc.) without altering state.

- name: Analyze Routing Protocols
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Retrieve current routing protocol configuration
      # Using FQCN for standardized command execution.
      # This is a read-only operation, ensuring idempotency (safe to run repeatedly).
      ansible.netcommon.cli_command:
        command: show running-config | include router
      register: protocols_result
      # Error Handling: Fail only if the command execution fails or returns an "Invalid" response.
      failed_when:
        - protocols_result.failed or "Invalid" in protocols_result.stderr

    - name: Verify data retrieval success (Observability)
      # Assert that the device responded with a valid stdout object.
      ansible.builtin.assert:
        that:
          - protocols_result.stdout is defined
        fail_msg: "Failed to capture routing configuration from {{ inventory_hostname }}"
        success_msg: "Successfully retrieved routing data from {{ inventory_hostname }}"

    - name: Display routing protocol summary
      # Observability: Formatted output for audit and troubleshooting purposes.
      # Documentation: Identifies if no routing protocols are configured to avoid confusion.
      ansible.builtin.debug:
        msg: |
          ======================= ROUTING PROTOCOLS: {{ inventory_hostname }} =======================
          {{ protocols_result.stdout if protocols_result.stdout | length > 0 else 'NOTICE: No routing processes (router keyword) are currently configured.' }}