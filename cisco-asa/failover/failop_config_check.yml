---
# Failover Configuration and Health Verification Playbook
# Purpose: Validates High-Availability (HA) status on Cisco ASA/Firepower security appliances.
# Standards: Idempotent (Read-only), Observability (Assertions), FQCN usage.
- name: Cisco ASA/Firepower Failover Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Failover state from device
      # Best Practice: Using FQCN. This operation is idempotent as it is a read-only command.
      ansible.netcommon.cli_command:
        command: show failover
      register: fo_result
      # Error Handling: Ensure the task fails if the command cannot be executed.
      failed_when: fo_result.failed | default(false)

    - name: Assert Failover is Active and Enabled
      # Observability: Programmatic verification of the expected operational state.
      ansible.builtin.assert:
        that:
          - "'Failover On' in fo_result.stdout"
        fail_msg: "CRITICAL: Failover is NOT enabled on {{ inventory_hostname }}."
        success_msg: "HEALTH CHECK PASSED: Failover is enabled on {{ inventory_hostname }}."

    - name: Output Detailed Failover Report
      # Documentation: Provide structured visibility into the current HA state for audit logs.
      ansible.builtin.debug:
        msg: |
          ===========================================================
          FAILOVER AUDIT REPORT: {{ inventory_hostname }}
          ===========================================================
          Current Status: {{ 'ENABLED/ACTIVE' if 'Failover On' in fo_result.stdout else 'DISABLED/INACTIVE' }}
          
          Device Output:
          {{ fo_result.stdout }}