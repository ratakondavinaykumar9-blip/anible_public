---
# ==============================================================================
# Playbook: Get Failover Status and Statistics
# Purpose: Gathers comprehensive failover state, stats, and history from Cisco ASA.
# Standards: Idempotency (Read-only), Observability (Asserts), FQCN compliance.
# Author: NetLearner Architect
# ==============================================================================
- name: Get Failover Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "FAILOVER STATUS: Retrieve current state and role"
      # Using FQCN cisco.asa.asa_command to ensure platform-specific execution
      cisco.asa.asa_command:
        commands:
          - show failover
      register: failover_output
      # Verify command execution succeeded to prevent cascading failures
      failed_when: failover_output.failed

    - name: "OBSERVABILITY: Validate failover is operational"
      # Assertions provide a clear 'pass/fail' metric for automation pipelines
      ansible.builtin.assert:
        that:
          - "'failover on' in failover_output.stdout[0] | lower"
        fail_msg: "CRITICAL: Failover is NOT active on {{ inventory_hostname }}."
        success_msg: "CONFIRMED: Failover is active on {{ inventory_hostname }}."

    - name: "FAILOVER STATISTICS: Capture sync and packet counters"
      # Statistics help identify sync issues or interface flaps between peers
      cisco.asa.asa_command:
        commands:
          - show failover statistics
      register: failover_stats
      # Handle cases where statistics might not be initialized or accessible
      failed_when: failover_stats.failed
      ignore_errors: true

    - name: "FAILOVER HISTORY: Retrieve state transition logs"
      # History provides the 'why' behind recent Active/Standby transitions
      cisco.asa.asa_command:
        commands:
          - show failover history
      register: failover_history
      failed_when: failover_history.failed

    - name: "SUMMARY: Present Consolidated Health Report"
      # Utilizing ansible.builtin.debug for observability and human-readable feedback
      ansible.builtin.debug:
        msg: |
          ====================================================================
          FAILOVER REPORT: {{ inventory_hostname }}
          ====================================================================
          
          CURRENT STATUS:
          {{ failover_output.stdout[0] | default('No status found') }}
          
          STATISTICS:
          {{ failover_stats.stdout[0] if (failover_stats.stdout is defined and failover_stats.stdout | length > 0) else 'Statistics unavailable' }}
          
          HISTORY:
          {{ failover_history.stdout[0] | default('History unavailable') }}
          ====================================================================
```