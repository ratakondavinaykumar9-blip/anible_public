---
# Get Failover Status and Statistics
# Improved by Architect:for Idempotency, Observability, and Error Handling.
# This playbook retrieves operational state without modifying device configuration.
- name: Get Failover Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve core failover status
      # FQCN: Using cisco.asa.asa_command for vendor-specific status retrieval.
      # Idempotency: Read-only 'show' commands are inherently idempotent.
      cisco.asa.asa_command:
        commands:
          - show failover
      register: failover_output
      # Error Handling: Gracefully ignore errors if the command is unsupported or device is in a state that prevents execution.
      ignore_errors: true

    - name: Verify failover data availability
      # Observability: Ensure the device returned valid data before proceeding with dependent tasks.
      ansible.builtin.assert:
        that:
          - failover_output.stdout is defined
          - failover_output.stdout | length > 0
        fail_msg: "Failed to retrieve failover status from {{ inventory_hostname }}. Verify connectivity."
        quiet: true

    - name: Get failover statistics
      # Documentation: Statistics are only relevant if failover is actively configured and enabled.
      ansible.netcommon.cli_command:
        command: show failover statistics
      register: failover_stats
      when: 
        - failover_output.stdout is defined
        - "'Failover On' in failover_output.stdout[0]"
      ignore_errors: true

    - name: Get failover history
      # Documentation: History provides visibility into recent state transitions (Active/Standby/Failed).
      ansible.netcommon.cli_command:
        command: show failover history
      register: failover_history
      when: 
        - failover_output.stdout is defined
        - "'Failover On' in failover_output.stdout