---
# Failover Interface Status Audit
# This playbook retrieves and validates the status of failover interfaces on Cisco ASA/Firepower devices.
# It is designed to be idempotent (read-only) and provides high observability for network operations.
- name: Get Failover Interfaces
  hosts: asa_firepower
  gather_facts: false # Facts are not required for command execution, reducing execution time

  tasks:
    - name: Retrieve failover interface status from device
      # Use FQCN for specific ASA command module to ensure compatibility and leverage ASA-specific parsing
      cisco.asa.asa_command:
        commands:
          - show failover interface
      register: failover_status
      # Error Handling: Fail explicitly if the command is unrecognized or the device returns an error
      failed_when: 
        - failover_status.failed or "Invalid input" in failover_status.stdout[0]

    - name: Validate retrieval of failover data
      # Observability: Assert that the command returned data and contains expected failover context
      ansible.builtin.assert:
        that:
          - failover_status.stdout[0] | length > 0
          - "'failover' in failover_status.stdout[0].lower()"
        fail_msg: "Failover information was not found or the command output was empty."
        success_msg: "Failover interface status successfully retrieved and verified."

    - name: Display Failover Interface Status
      # Documentation: Providing a clean, formatted output for human operators
      ansible.builtin.debug:
        msg: |
          ======================= FAILOVER INTERFACES =======================
          {{ failover_status.stdout[0] }}