---
# Failover Configuration Audit
# Purpose: Retrieves and validates the running-config failover for Cisco ASA/Firepower devices.
# Standards: Idempotency (read-only), Observability (asserts), FQCN usage, and Error Handling.

- name: Get Failover Configuration
  hosts: asa_firepower
  gather_facts: false # Facts are not required for simple CLI command execution

  tasks:
    - name: Retrieve failover configuration via CLI
      # Using Fully Qualified Collection Name (FQCN) for reliability
      # Registering output for observability and verification steps
      ansible.netcommon.cli_command:
        command: show running-config failover
      register: failover_output
      # Error Handling: Ensure the task fails if the command returns an error or invalid syntax
      failed_when: 
        - failover_output.failed or "Invalid input" in failover_output.stdout

    - name: Validate failover configuration response
      # Observability: Assert that we received a valid, non-empty response from the device
      # This ensures the playbook doesn't silently pass if the command returns nothing
      ansible.builtin.assert:
        that:
          - failover_output.stdout is defined
          - failover_output.stdout | length > 0
          - "'failover' in failover_output.stdout or 'no failover' in failover_output.stdout"
        fail_msg: "Failover configuration is empty or the command did not return expected data."
        success_msg: "Failover configuration successfully retrieved and validated for {{ inventory_hostname }}."

    - name: Display Failover Configuration
      # Provides visibility into the current state of the device
      ansible.builtin.debug:
        msg: |
          ======================================================================
          FAILOVER CONFIGURATION: {{ inventory_hostname }}
          ======================================================================
          {{ failover_output.stdout }}