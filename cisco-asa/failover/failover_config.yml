---
# Failover Configuration Audit
# Improved: 2026-03-15 (Standardized for NetLearner)
# Purpose: Retrieve ASA/Firepower failover configuration with idempotency and validation.
#
- name: Get Failover Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve failover configuration via CLI
      # Use FQCN (Fully Qualified Collection Name) for consistent module resolution
      ansible.netcommon.cli_command:
        command: show running-config failover
      register: failover_result
      # Read-only operations must be marked with changed_when: false to ensure idempotency
      # and accurate reporting in automation pipelines.
      changed_when: false
      # Explicit error handling to catch device-level errors that might not trigger a module failure
      failed_when: 
        - failover_result.stdout == ""
        - "'ERROR:' in failover_result.stdout"
        - "'Invalid' in failover_result.stdout"

    - name: Assert failover configuration presence
      # Observability: verify that the captured output contains expected failover parameters
      # This ensures that 'failover' is actually configured on the device.
      ansible.builtin.assert:
        that:
          - "'failover' in failover_result.stdout"
        fail_msg: "Failover configuration is missing or could not be retrieved from {{ inventory_hostname }}."
        quiet: true

    - name: Display Failover Configuration
      # Provide clear visibility of the device state for logs and operators
      ansible.builtin.debug:
        msg: |
          ======================= FAILOVER CONFIG =======================
          DEVICE: {{ inventory_hostname }}
          {{ failover_result.stdout }}