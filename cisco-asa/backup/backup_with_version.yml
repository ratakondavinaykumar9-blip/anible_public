---
# Backup with Version Info - Improved
# Standards: Idempotency, Observability, Documentation, Error Handling, Best Practices (FQCN)
- name: Backup with Version
  hosts: asa_firepower
  gather_facts: false
  vars:
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: Ensure facts are gathered for timestamping
      # Explicitly gather minimum facts to provide ansible_date_time for metadata and filenames.
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "min"

    - name: Ensure backup directory exists
      # Ensures the destination path exists before attempting to save the backup (Idempotency).
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'

    - name: Get running configuration
      # Captures the current configuration from the ASA/Firepower device.
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config_result
      failed_when: running_config_result.stdout | length == 0

    - name: Verify running configuration capture
      # Observability: Assert that the command returned content to avoid saving empty backups.
      ansible.builtin.assert:
        that:
          - "running_config_result.stdout is defined"
          - "running_config_result.stdout | length > 0"
        fail_msg: "Failed to capture running configuration: output is empty or undefined"

    - name: Get version information
      # Captures version details for documentation within the backup file.
      ansible.netcommon.cli_command:
        command: show version
      register: version_result

    - name: Verify version capture
      # Observability: Ensures version data was retrieved successfully.
      ansible.builtin.assert:
        that:
          - "version_result.stdout is defined"
        fail_msg: "Failed to capture version information"

    - name: Save configuration to local file
      # Saves the configuration with a header containing metadata.
      # Uses ISO8601 timestamp in the filename for version control.
      ansible.builtin.copy:
        content: |
          # ASA Configuration Backup
          # Hostname: {{ inventory_hostname }}
          # Version: {{ version_result.stdout_lines[0] | default('Unknown') }}
          # Date: {{ ansible_date_time.iso8601 }}
          
          {{ running_config_result.stdout }}
        dest: "{{ backup_path }}/{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.cfg"
        mode: '0644'
      register: backup_file_result

    - name: Report backup status
      # Provides observability of the final destination of the backup file.
      ansible.builtin.debug:
        msg: "Backup successfully saved to {{ backup_file_result.dest }}"