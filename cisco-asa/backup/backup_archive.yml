---
# Archive Backup - Production Ready
# Purpose: Capture and archive Cisco ASA/Firepower configuration and version details.
# Standards: Idempotency, Observability, FQCN, Error Handling.
- name: Archive Backup
  hosts: asa_firepower
  gather_facts: false
  vars:
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: "Initialization | Gather system clock for timestamping"
      # Documentation: Collects date/time facts from the control node for consistent filenames.
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost

    - name: "Environment | Ensure local backup directory exists"
      # Idempotency: Ensures the destination directory exists before attempting to write files.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: "Retrieval | Fetch running configuration"
      # Observability: Registering output and checking for common failure indicators.
      ansible.netcommon.cli_command:
        command: show running-config
      register: config_res
      failed_when: 
        - config_res.stdout == "" 
        - "'Invalid' in config_res.stdout"

    - name: "Retrieval | Fetch version details"
      ansible.netcommon.cli_command:
        command: show version
      register: version_res
      failed_when: version_res.stdout == ""

    - name: "Validation | Verify data integrity"
      # Observability: Asserting that retrieved data meets minimum size requirements to avoid empty backups.
      ansible.builtin.assert:
        that:
          - config_res.stdout | length > 100
          - version_res.stdout | length > 10
        fail_msg: "Configuration or Version data retrieved from {{ inventory_hostname }} is insufficient or empty."

    - name: "Persistence | Save archive file"
      # Documentation: Consolidates version and config into a single timestamped file on the controller.
      ansible.builtin.copy:
        content: |
          # Backup Date: {{ ansible_date_time.iso8601 }}
          # Device: {{ inventory_hostname }}
          
          # VERSION
          {{ version_res.stdout }}
          
          # CONFIG
          {{ config_res.stdout }}
        dest: "{{ backup_path }}/archive_{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.txt"
        mode: '0600'
      delegate_to: localhost
      register: backup_save

    - name: "Finalization | Confirm backup success"
      # Observability: Final verification that the file was successfully written to the filesystem.
      ansible.builtin.assert:
        that:
          - backup_save.dest is defined
        success_msg: "Archive backup complete for {{ inventory_hostname }}. File: {{ backup_save.dest }}"