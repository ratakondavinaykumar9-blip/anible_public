# Archive Network Configuration
# NetLearner Architect Standard v1.2
# Optimized for idempotency, observability, and robust error handling.
# 
- name: Archive Backup
  hosts: asa_firepower
  gather_facts: yes  # Required to populate ansible_date_time for file naming
  vars:
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: Ensure local backup directory exists
      # Idempotency: Ensures the directory exists on the controller regardless of how many times run.
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Retrieve running configuration
      # FQCN: Using Fully Qualified Collection Names for cross-platform consistency.
      ansible.netcommon.cli_command:
        command: show running-config
      register: config_output
      # Error Handling: Explicitly fail if the device returns an error string or empty output.
      failed_when: 
        - config_output.stdout is not defined or config_output.stdout | length == 0
        - "'Invalid input' in config_output.stdout"

    - name: Retrieve system version
      ansible.netcommon.cli_command:
        command: show version
      register: version_output
      failed_when: 
        - version_output.stdout is not defined or version_output.stdout | length == 0
        - "'Invalid input' in version_output.stdout"

    - name: Validate data integrity
      # Observability: Assert that we have captured meaningful content before proceeding to file write.
      ansible.builtin.assert:
        that:
          - config_output.stdout | length > 100
          - version_output.stdout | length > 10
        fail_msg: "Data integrity check failed for {{ inventory_hostname }}. Captured output is too small."
        quiet: true

    - name: Save configuration archive to controller
      # Best Practice: Use delegate_to: localhost to ensure backups are stored on the management node.
      ansible.builtin.copy:
        content: |
          # Backup Date: {{ ansible_date_time.iso8601 }}
          # Device: {{ inventory_hostname }}
          
          # VERSION INFORMATION
          {{ version_output.stdout }}
          
          # RUNNING CONFIGURATION
          {{ config_output.stdout }}
        dest: "{{ backup_path }}/archive_{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}.txt"
        mode: '0644'
      delegate_to: localhost

    - name: Log backup completion
      ansible.builtin.debug:
        msg: "Archive backup for {{ inventory_hostname }} successfully persisted to {{ backup_path }}"