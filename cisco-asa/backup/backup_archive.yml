---
# Improved Backup Archive Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Archive Backup
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Directory on the Ansible control node where backups will be stored
    backup_path: "/tmp/asa_backups"

  tasks:
    - name: Ensure local backup directory exists
      # Idempotency: Ensures the directory exists without error if it already exists
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Retrieve running configuration from device
      # Use FQCN for network command execution
      ansible.netcommon.cli_command:
        command: show running-config
      register: config_output
      # Error Handling: Fail explicitly if the command returns no data
      failed_when: config_output.stdout is not defined or config_output.stdout | length == 0

    - name: Validate configuration capture
      # Observability: Assert that the configuration is non-empty
      ansible.builtin.assert:
        that:
          - "config_output.stdout | length > 0"
        fail_msg: "The running configuration captured from {{ inventory_hostname }} is empty."
        success_msg: "Successfully captured running configuration from {{ inventory_hostname }}."

    - name: Retrieve version information from device
      ansible.netcommon.cli_command:
        command: show version
      register: version_output
      failed_when: version_output.stdout is not defined or version_output.stdout | length == 0

    - name: Validate version capture
      # Observability: Assert that version data was received
      ansible.builtin.assert:
        that:
          - "version_output.stdout | length > 0"
        fail_msg: "The version information captured from {{ inventory_hostname }} is empty."
        success_msg: "Successfully captured version information from {{ inventory_hostname }}."

    - name: Save consolidated backup file to control node
      # Content is delegated to localhost to ensure files are saved on the Ansible controller
      ansible.builtin.copy:
        content: |
          # Backup Date: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          # Device: {{ inventory_hostname }}
          
          # VERSION
          {{ version_output.stdout }}
          
          # CONFIG
          {{ config_output.stdout }}
        dest: "{{ backup_path }}/archive_{{ inventory_hostname }}_{{ now(fmt='%Y-%m-%d_%H-%M-%S') }}.txt"
        mode: '0644'
      delegate_to: localhost
      register: backup_file_status

    - name: Verify backup file creation and integrity
      # Observability: Final check to ensure the file exists on the filesystem
      ansible.builtin.assert:
        that:
          - backup_file_status.dest is defined
          - backup_file_status.state == 'file'
        fail_msg: "Archive backup file was not successfully created for {{ inventory_hostname }}."
        success_msg: "Archive backup complete: {{ backup_file_status.dest }}"