---
# Backup ASA Configuration
# NetLearner Architect Improved Version
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Backup ASA Configuration
  hosts: asa_firepower
  gather_facts: no
  vars:
    # Define the local directory on the Ansible controller for centralized storage
    backup_root: "/tmp/asa_backups"

  tasks:
    - name: Collect timestamp facts from controller
      # Why: Populate ansible_date_time for unique backup filenames using controller time
      ansible.builtin.setup:
        filter: "ansible_date_time"
      delegate_to: localhost

    - name: Set backup filename variables
      # Why: Consolidate naming logic after facts are gathered to ensure variable availability
      ansible.builtin.set_fact:
        backup_name: "{{ inventory_hostname }}_{{ ansible_date_time.iso8601 | regex_replace(':', '-') }}"

    - name: Ensure backup directory exists on controller
      # Why: Idempotent task ensuring the destination path is available before writing
      ansible.builtin.file:
        path: "{{ backup_root }}"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost
      register: dir_creation

    - name: Verify backup directory accessibility
      # Why: Observability - Ensure the playbook doesn't proceed if it cannot write to the destination
      ansible.builtin.assert:
        that:
          - dir_creation is success
        fail_msg: "Cannot access or create backup directory: {{ backup_root }}"

    - name: Capture running configuration from ASA
      # Why: Retrieve the current active device configuration via CLI
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_config
      # Why: Error Handling - Fail if output is empty or command is unrecognized
      failed_when:
        - "running_config.stdout | length == 0"
        - "'Invalid input' in running_config.stdout"

    - name: Capture startup configuration from ASA
      # Why: Retrieve the configuration stored in NVRAM
      ansible.netcommon.cli_command:
        command: show startup-config
      register: startup_config
      failed_when:
        - "startup_config.stdout | length == 0"
        - "'Invalid input' in startup_config.stdout"

    - name: Save running configuration to controller
      # Why: Persist device config to local storage; delegated to controller
      ansible.builtin.copy:
        content: "{{ running_config.stdout }}"
        dest: "{{ backup_root }}/{{ backup_name }}_running.cfg"
        mode: '0600'
      delegate_to: localhost
      register: running_save

    - name: Save startup configuration to controller
      # Why: Ensure persistent storage of device startup config
      ansible.builtin.copy:
        content: "{{ startup_config.stdout }}"
        dest: "{{ backup_root }}/{{ backup_name }}_startup.cfg"
        mode: '0600'
      delegate_to: localhost
      register: startup_save

    - name: Validate backup file persistence
      # Why: Observability - Assert that both files were written successfully to disk
      ansible.builtin.assert:
        that:
          - running_save.dest is exists
          - startup_save.dest is exists
        fail_msg: "One or more backup files failed to write to {{ backup_root }}."

    - name: Display backup summary
      # Why: Provide feedback to the operator upon successful completion
      ansible.builtin.debug:
        msg: "Backup for {{ inventory_hostname }} completed: {{ backup_root }}/{{ backup_name }}_*.cfg"
