---
# Backup ASA Configuration
# Improved for: Idempotency, Observability, and Error Handling
# Standards: FQCN usage, Assertions, and Contextual Documentation
- name: Backup Cisco ASA Configuration
  hosts: asa_firepower
  gather_facts: no
  vars:
    # Defined directory for local backup storage on the control node
    backup_path: "/tmp/asa_backups"
    # ISO8601 timestamp for unique file naming across multiple runs
    timestamp: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    backup_name: "{{ inventory_hostname }}_{{ timestamp }}"

  tasks:
    - name: "FACTS: Generate timestamp if not provided"
      ansible.builtin.set_fact:
        run_timestamp: "{{ timestamp }}"
      run_once: true

    - name: "DIR: Ensure backup directory exists on control node"
      ansible.builtin.file:
        path: "{{ backup_path }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: "ASA: Retrieve running-config from device"
      ansible.netcommon.cli_command:
        command: show running-config
      register: running_output
      failed_when: 
        - running_output.stdout is not defined
        - "'Invalid' in running_output.stdout"

    - name: "OBSERVE: Verify running-config content is valid"
      ansible.builtin.assert:
        that:
          - "running_output.stdout | length > 0"
          - "': Saved' in running_output.stdout or 'description' in running_output.stdout"
        fail_msg: "Running configuration retrieved from {{ inventory_hostname }} is empty or invalid."

    - name: "ASA: Retrieve startup-config from device"
      ansible.netcommon.cli_command:
        command: show startup-config
      register: startup_output
      # Use ignore_errors if startup-config might not exist, but here we expect it
      ignore_errors: yes

    - name: "SAVE: Write running-config to local filesystem"
      ansible.builtin.copy:
        content: "{{ running_output.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_running.cfg"
        mode: '0644'
      delegate_to: localhost
      register: save_running

    - name: "SAVE: Write startup-config to local filesystem"
      ansible.builtin.copy:
        content: "{{ startup_output.stdout }}"
        dest: "{{ backup_path }}/{{ backup_name }}_startup.cfg"
        mode: '0644'
      delegate_to: localhost
      when: startup_output.stdout is defined and startup_output.stdout | length > 0
      register: save_startup

    - name: "VERIFY: Ensure backup files were successfully created"
      ansible.builtin.assert:
        that:
          - save_running.changed or save_running.dest is defined
        fail_msg: "Failed to persist the running configuration for {{ inventory_hostname }}."

    - name: "SUMMARY: Display backup location"
      ansible.builtin.debug:
        msg: 
          - "Backup operation completed for {{ inventory_hostname }}"
          - "Running: {{ save_running.dest | default('FAILED') }}"
          - "Startup: {{ save_startup.dest | default('SKIPPED/FAILED') }}"