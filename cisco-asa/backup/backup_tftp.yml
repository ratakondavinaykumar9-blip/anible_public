---
# Backup Cisco ASA/Firepower Configuration to TFTP
# Improved by NetLearner Architect for Enterprise Standards
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Backup to TFTP
  hosts: asa_firepower
  gather_facts: false
  vars:
    tftp_server: "10.0.0.1"
    # Using a variable for the filename allows for better file management on the TFTP server
    backup_filename: "{{ inventory_hostname }}_running_config.cfg"

  tasks:
    - name: Copy running-config to TFTP server
      # Why: Using /noconfirm avoids interactive prompts on Cisco ASA, ensuring automation flow.
      # FQCN used: ansible.netcommon.cli_command
      ansible.netcommon.cli_command:
        command: "copy /noconfirm running-config tftp://{{ tftp_server }}/{{ backup_filename }}"
      register: tftp_result
      # Error Handling: Identify failure strings in the CLI output to trigger task failure
      failed_when:
        - "'Error' in tftp_result.stdout"
        - "'Invalid' in tftp_result.stdout"
        - "'Failed' in tftp_result.stdout"
        - "'timeout' in tftp_result.stdout.lower()"

    - name: Verify backup operation success
      # Observability: Assert that the device confirmed the byte transfer
      ansible.builtin.assert:
        that:
          - "'bytes copied' in tftp_result.stdout or 'OK' in tftp_result.stdout"
        fail_msg: "TFTP transfer failed for {{ inventory_hostname }}. CLI Output: {{ tftp_result.stdout }}"
        success_msg: "TFTP transfer verified for {{ inventory_hostname }}."

    - name: Display backup status
      # Why: Provides visibility into the specific destination used during the run
      ansible.builtin.debug:
        msg: "Backup of {{ inventory_hostname }} successfully uploaded to {{ tftp_server }} as {{ backup_filename }}"