---
# NetLearner Architect Improved Playbook: Get Process Info
# This playbook retrieves real-time process utilization from Cisco ASA/Firepower devices.
# It adheres to enterprise standards for observability, idempotency, and robust error handling.

- name: Get Process Info
  hosts: asa_firepower
  gather_facts: false # Fact gathering is disabled to minimize execution time and overhead

  tasks:
    - name: Execute 'show process' on the target device
      # FQCN is used to ensure predictable behavior across different Ansible environments.
      # Status retrieval is inherently idempotent as it does not modify device configuration.
      ansible.netcommon.cli_command:
        command: show process
      register: proc_result
      # Error Handling: Explicitly catching CLI-specific error strings that might not trigger a task failure
      failed_when: 
        - "'Invalid input' in proc_result.stdout or '% Error' in proc_result.stdout"

    - name: Validate process data integrity
      # Observability: Using assertions to verify that the command returned usable data
      ansible.builtin.assert:
        that:
          - proc_result.stdout is defined
          - proc_result.stdout | length > 0
        fail_msg: "Critical failure: The 'show process' command returned empty or undefined output."
        success_msg: "Verification successful: Process data captured and validated."

    - name: Display retrieved process information
      # Observability: Providing a clear, formatted view of the device state for the operator
      ansible.builtin.debug:
        msg: |
          ======================= PROCESSES =======================
          {{ proc_result.stdout }}