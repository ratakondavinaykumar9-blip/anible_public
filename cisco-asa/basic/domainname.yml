---
# Name: Improve Cisco ASA/FTD Domain and DNS observability
# Description: Retrieves and validates the configured domain-name on Cisco devices using FQCN.
# Standards: Idempotency, Observability, Documentation, Best Practices.
# Updated: 2026-03-15
# Author: NetLearner Architect

- name: Get Domain and DNS Configuration
  hosts: asa_firepower
  gather_facts: false
  # Using FQCN for collections is a best practice for clarity and future-proofing.
  collections:
    - ansible.netcommon
    - cisco.asa
    - ansible.builtin

  tasks:
    - name: Retrieve running-config domain-name
      # ansible.netcommon.cli_command is idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: show running-config domain-name
      register: domain_output
      # Ensure we don't fail the whole play if a single device is unreachable or command fails,
      # but we will handle the validation in the next step.
      ignore_errors: false

    - name: Validate domain-name retrieval
      # Observability: Assert that the command returned successfully and contains expected data.
      ansible.builtin.assert:
        that:
          - domain_output.stdout is defined
          - '"domain-name" in domain_output.stdout or domain_output.stdout == ""'
        fail_msg: "Failed to retrieve domain-name configuration or unexpected output format."
        success_msg: "Successfully retrieved domain-name configuration."

    - name: Display configured domain-name
      # Providing clear feedback for human operators.
      ansible.builtin.debug:
        msg: "Configured Domain: {{ domain_output.stdout | default('None') }}"