# Cisco ASA Domain Name Audit - NetLearner Architect Improved
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Author: NetLearner Architect (Improved from original by Arjun)
- name: Audit Cisco ASA Domain Name Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current domain-name configuration via CLI
      # Using FQCN for cross-platform network command execution.
      # This operation is read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: show running-config domain-name
      register: domain_result
      # Idempotency: Read-only 'show' commands must never report a 'changed' status.
      changed_when: false
      # Error Handling: Ensure the command was recognized and executed successfully.
      # Catches Cisco-specific error patterns and non-zero return codes.
      failed_when: >
        domain_result.failed or 
        domain_result.rc != 0 or
        "Invalid input" in domain_result.stdout or
        "ERROR" in domain_result.stdout

    - name: Verify domain name retrieval and configuration state
      # Observability: Assert ensures the device returned a valid configuration string.
      # Verifies success by checking for the 'domain-name' keyword in the registered output.
      ansible.builtin.assert:
        that:
          - domain_result.stdout is defined
          - domain_result.stdout | length > 0
          - "'domain-name' in domain_result.stdout"
        fail_msg: "Domain name is not configured or could not be retrieved from {{ inventory_hostname }}."
        success_msg: "Successfully validated domain name configuration for {{ inventory_hostname }}."
        quiet: true

    - name: Display retrieved domain name configuration
      # Observability: Provides clear visibility into the results for administrative audit.
      ansible.builtin.debug:
        msg: "The configured domain name on {{ inventory_hostname }} is: {{ domain_result.stdout | trim }}"