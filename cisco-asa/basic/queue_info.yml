# NetLearner Staging: Queue Information Gathering
# This playbook retrieves interface queue statistics from Cisco ASA/Firepower devices.
# Visibility into queue depths is critical for identifying congestion and packet drops.

- name: Retrieve and Validate Queue Information
  hosts: asa_firepower
  gather_facts: false
  # Using network_cli connection for optimized performance with network modules.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Execute 'show queue' command
      # Why: Monitoring hardware/software queue depth is essential for diagnostic telemetry.
      # This task is inherently idempotent as it only retrieves state without modification.
      ansible.netcommon.cli_command:
        command: show queue
      register: queue_output
      # Error Handling: Ensure the task fails if the output contains typical error indicators.
      failed_when:
        - queue_output.stdout is not defined
        - "'Invalid input' in queue_output.stdout"
        - "'% Permission denied' in queue_output.stdout"

    - name: Assert queue data integrity
      # Observability: Verify that the command returned meaningful data before proceeding.
      ansible.builtin.assert:
        that:
          - "queue_output.stdout | length > 0"
          - "'Interface' in queue_output.stdout"
        fail_msg: "Data Integrity Failure: The 'show queue' command returned empty or invalid results."
        success_msg: "Data Integrity Verified: Queue statistics successfully retrieved."

    - name: Display formatted queue statistics
      # Observability: Provide a clear, human-readable summary of the current queue state.
      ansible.builtin.debug:
        msg: |
          ======================= QUEUE TELEMETRY =======================
          Hostname: {{ inventory_hostname }}
          Execution Time: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          
          {{ queue_output.stdout }}