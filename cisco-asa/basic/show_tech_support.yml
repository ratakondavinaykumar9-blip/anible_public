# Playbook: Get Tech Support Info (Improved)
# Purpose: Collect diagnostic data from ASA/Firepower devices with rigorous validation and error handling.
# Standards: Idempotency, Observability, FQCN, and defensive logic.
# Author: NetLearner Architect
---
- name: Get Tech Support Info
  hosts: asa_firepower
  gather_facts: false # Performance optimization: device facts not required for CLI execution.

  tasks:
    - name: Execute 'show tech-support' on target device
      # Why: Captures comprehensive diagnostic state for troubleshooting.
      # Best Practice: Using FQCN for network CLI interaction.
      ansible.netcommon.cli_command:
        command: show tech-support
      register: tech
      # Error Handling: Ensure output is captured and command was recognized.
      failed_when: 
        - tech.stdout is not defined or tech.stdout | length == 0
        - "'Invalid input' in tech.stdout"

    - name: Validate integrity of captured tech support data
      # Observability: Assert that the output contains expected markers and sufficient data.
      ansible.builtin.assert:
        that:
          - "tech.stdout | length > 5000" # Tech-support output is typically large.
          - "'show version' in tech.stdout" # Verification of sub-command execution.
        fail_msg: "Tech support output for {{ inventory_hostname }} appears incomplete or invalid."
        success_msg: "Successfully validated tech support payload for {{ inventory_hostname }}."

    - name: Persist diagnostic data to local filesystem
      # Idempotency: 'copy' module ensures destination file matches source content safely.
      # Documentation: Using /tmp/ for ephemeral diagnostic staging.
      ansible.builtin.copy:
        content: "{{ tech.stdout }}"
        dest: "/tmp/asa_tech_support_{{ inventory_hostname }}.txt"
        mode: '0640' # Secure permissions for potentially sensitive diagnostic data.
      register: file_result

    - name: Verify file persistence success
      # Observability: Confirm the write operation was completed successfully on the controller.
      ansible.builtin.assert:
        that:
          - file_result.dest is defined
          - not file_result.failed
        fail_msg: "Failed to write diagnostic file to /tmp/ for {{ inventory_hostname }}."

    - name: Display summary of operation
      # Best Practice: Use FQCN for all modules including debug.
      ansible.builtin.debug:
        msg: "Diagnostic report for {{ inventory_hostname }} is available at {{ file_result.dest }}"