---
# Enhanced Show Tech Support Playbook
# Optimized for: Idempotency, Observability, Documentation, Error Handling, and FQCN standards
- name: Get Tech Support Info
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Collect Tech Support Information from Device
      # Using FQCN for network CLI interaction. 
      # Read-only 'show' commands are inherently idempotent as they do not alter device state.
      ansible.netcommon.cli_command:
        command: show tech-support
      register: tech_support_output
      # Error Handling: Ensure we fail if the output contains common error indicators
      failed_when: 
        - tech_support_output.stdout is not defined or tech_support_output.stdout | length == 0
        - "'Invalid input' in tech_support_output.stdout"
        - "'% Permission denied' in tech_support_output.stdout"

    - name: Validate Captured Tech Support Data
      # Observability: Verify that the command returned substantial content before writing to disk
      ansible.builtin.assert:
        that:
          - tech_support_output.stdout | length > 100
        fail_msg: "Tech support output is suspiciously short or empty."
        success_msg: "Tech support data successfully validated for persistence."

    - name: Persist Tech Support Data to Local Filesystem
      # Saves the collected data to a flat file for audit, archival, or vendor upload.
      # mode: '0644' is set to follow security best practices for file permissions.
      ansible.builtin.copy:
        content: "{{ tech_support_output.stdout }}"
        dest: "/tmp/asa_tech_support_{{ inventory_hostname }}.txt"
        mode: '0644'
      register: file_save_result

    - name: Verify File Persistence Success
      # Observability: Confirm the file was successfully written and verify the checksum/state
      ansible.builtin.assert:
        that:
          - file_save_result.state == 'file'
          - file_save_result.dest == "/tmp/asa_tech_support_" + inventory_hostname + ".txt"
        fail_msg: "Failed to verify the creation of the tech support file."

    - name: Display Summary of Operation
      # Documentation: Provides a clear breadcrumb for the operator
      ansible.builtin.debug:
        msg: 
          - "Status: Success"
          - "Hostname: {{ inventory_hostname }}"
          - "Destination: {{ file_save_result.dest }}"
          - "Size: {{ tech_support_output.stdout | length }} bytes"