---
# AAA Servers Configuration Audit
# Purpose: This playbook retrieves and validates the AAA server configuration on Cisco ASA/Firepower devices.
# It ensures that administrators have visibility into authentication, authorization, and accounting settings
# for security compliance and troubleshooting.

- name: AAA Servers Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve AAA Server Configuration
      # Idempotency: This is a read-only operation and is safe for repeated execution without state change.
      # FQCN: Using fully qualified collection names to ensure plugin resolution and stability.
      ansible.netcommon.cli_command:
        command: show running-config aaa-server
      register: aaa_result
      # Error Handling: Fail explicitly if the command is unrecognized by the device (e.g., wrong context/mode).
      failed_when: 
        - aaa_result.failed or "Invalid input" in aaa_result.stdout

    - name: Validate Configuration Retrieval
      # Observability: Using assert to verify that the device returned configuration data.
      # This prevents silent failures where the command succeeds but returns an empty set.
      ansible.builtin.assert:
        that:
          - aaa_result.stdout is defined
          - aaa_result.stdout | length > 0
        fail_msg: "AAA configuration retrieval returned no data. Verify AAA is configured on the target."
        success_msg: "AAA server configuration successfully retrieved and validated."

    - name: Display AAA Server Configuration
      # Documentation: Provides a formatted view of the current AAA settings for audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= AAA SERVERS =======================
          {{ aaa_result.stdout }}