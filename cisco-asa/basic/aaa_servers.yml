---
# AAA Servers Configuration Audit
# This playbook retrieves and validates AAA server configurations on Cisco ASA/Firepower devices.
# Implements best practices for observability, error handling, and FQCN usage.

- name: AAA Servers Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve AAA server running configuration
      # Using FQCN: ansible.netcommon.cli_command
      # Read-only operation ensures idempotency
      ansible.netcommon.cli_command:
        command: show running-config aaa-server
      register: aaa_config
      # Error Handling: Ensure the task fails if specific error markers are present in stdout
      failed_when: 
        - aaa_config.failed or 'Invalid input detected' in aaa_config.stdout

    - name: Verify AAA configuration retrieval
      # Observability: Use assert to verify that configuration data was returned
      ansible.builtin.assert:
        that:
          - aaa_config.stdout is defined
          - aaa_config.stdout | length > 0
        fail_msg: "Failed to retrieve AAA configuration or output is empty."
        success_msg: "Successfully retrieved AAA configuration."

    - name: Display AAA Server Configuration
      # Documentation: Providing a clear summary of the retrieved configuration
      ansible.builtin.debug:
        msg: |
          ======================= AAA SERVERS =======================
          {{ aaa_config.stdout }}