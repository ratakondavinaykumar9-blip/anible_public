# AAA Servers Configuration Audit
# This playbook retrieves and validates the AAA server configuration on Cisco ASA/Firepower devices.
# It ensures that centralized authentication settings are visible and conform to operational standards.
- name: AAA Servers Configuration Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve AAA Server running-configuration
      # Using FQCN for cross-platform network command execution.
      # This task is inherently idempotent as it only performs a read operation.
      ansible.netcommon.cli_command:
        command: show running-config aaa-server
      register: aaa_config_output
      # Ensure the task fails if the device returns an error message like 'invalid input'.
      failed_when: 
        - aaa_config_output.failed or "Invalid input" in aaa_config_output.stdout

    - name: Validate AAA Configuration Observability
      # Assertions verify that the command returned data, ensuring the audit is meaningful.
      ansible.builtin.assert:
        that:
          - aaa_config_output.stdout is defined
          - aaa_config_output.stdout | length > 0
        fail_msg: "AAA configuration retrieval failed or returned empty output."
        success_msg: "AAA configuration successfully captured for analysis."

    - name: Display AAA Server Configuration
      # Informational output for human operators during manual execution or logging.
      ansible.builtin.debug:
        msg: |
          ======================= AAA SERVERS AUDIT =======================
          DEVICE: {{ inventory_hostname }}
          TIMESTAMP: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          ----------------------- CONFIGURATION -----------------------
          {{ aaa_config_output.stdout }}