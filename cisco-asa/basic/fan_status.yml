---
# NetLearner Hardware Monitoring: Fan Status
# This playbook retrieves and validates cooling fan status on Cisco ASA/Firepower devices.
# Adheres to standards for Idempotency, Observability, Documentation, and FQCN usage.

- name: Retrieve and Verify Fan Status
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show fan' command
      # Use FQCN for the cli_command module for better maintainability and portability.
      # This task is inherently idempotent as it performs a read-only hardware status query.
      ansible.netcommon.cli_command:
        command: show fan
      register: fan_data
      # Error Handling: Use failed_when to catch empty buffers or "Invalid input" errors 
      # which might occur if the command is not supported on a specific firmware version.
      failed_when: >
        (fan_data.stdout is not defined) or 
        (fan_data.stdout | length == 0) or 
        ("Invalid input" in fan_data.stdout)

    - name: Validate fan status observability
      # Observability: Programmatic verification that the hardware status is captured correctly.
      # This allows automated monitoring pipelines to fail early if telemetry is missing.
      ansible.builtin.assert:
        that:
          - "'Fan' in fan_data.stdout"
        fail_msg: "The fan status output from {{ inventory_hostname }} is malformed or missing expected keywords."
        success_msg: "Fan status successfully retrieved and verified for {{ inventory_hostname }}."

    - name: Display formatted fan status report
      # Observability: Clean, structured debug output for human operators.
      ansible.builtin.debug:
        msg: |
          ======================= FAN STATUS REPORT =======================
          Device: {{ inventory_hostname }}
          Capture Time: {{ lookup('pipe', 'date +%Y-%m-%d %H:%M:%S') }}
          -----------------------------------------------------------------
          {{ fan_data.stdout }}
          =================================================================
