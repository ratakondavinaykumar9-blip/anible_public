---
# NetLearner Architect - Improved HTTP Server Status Playbook
# This playbook retrieves and validates the HTTP server configuration on Cisco ASA/Firepower devices.
# It follows enterprise standards for idempotency (read-only), observability, and error handling.

- name: Retrieve and Validate HTTP Server Status
  hosts: asa_firepower
  gather_facts: false # Facts are not required for simple CLI command execution, reducing overhead.

  tasks:
    - name: Execute 'show http server' command
      # Using FQCN (Fully Qualified Collection Name) for cross-platform reliability.
      ansible.netcommon.cli_command:
        command: show http server
      register: http_server_output
      # Error Handling: Identify failure if output is missing or indicates an invalid command.
      failed_when: 
        - http_server_output.stdout is not defined
        - "'Invalid' in http_server_output.stdout or 'Error' in http_server_output.stdout"

    - name: Assert HTTP Server status retrieval was successful
      # Observability: Programmatic verification that the command returned expected data.
      ansible.builtin.assert:
        that:
          - "http_server_output.stdout | length > 0"
          - "'http server' in http_server_output.stdout"
        fail_msg: "Failed to retrieve a valid HTTP server status response from {{ inventory_hostname }}."
        success_msg: "Successfully retrieved and validated HTTP server status for {{ inventory_hostname }}."

    - name: Display Formatted HTTP Server Status
      # Documentation/Visibility: Providing structured output for operational logs.
      ansible.builtin.debug:
        msg: |
          ======================= HTTP SERVER STATUS [{{ inventory_hostname }}] =======================
          {{ http_server_output.stdout }}