---
# Improved ARP Table Retrieval Playbook
# This playbook retrieves the ARP table from Cisco ASA/Firepower devices with enhanced observability and error handling.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation (Comments), Error Handling (Failed_when), FQCN.

- name: Get ARP Table
  hosts: asa_firepower
  gather_facts: false  # Facts are not required for this operation, improving execution speed.

  tasks:
    - name: Retrieve ARP table via CLI
      # Using Fully Qualified Collection Name (FQCN) for the network CLI module.
      ansible.netcommon.cli_command:
        command: show arp
      register: arp_result
      # Error Handling: Catch cases where the command execution fails or the device rejects the input.
      failed_when: 
        - arp_result.failed or "Invalid input" in arp_result.stdout

    - name: Verify ARP table content
      # Observability: Assert that the output is not empty to ensure data was actually captured.
      ansible.builtin.assert:
        that:
          - arp_result.stdout is defined
          - arp_result.stdout | length > 0
        fail_msg: "ARP table data is missing or empty."
        success_msg: "Successfully captured ARP table data."

    - name: Display ARP Table
      # Formatted debug output for operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE =======================
          {{ arp_result.stdout }}
          =========================================================