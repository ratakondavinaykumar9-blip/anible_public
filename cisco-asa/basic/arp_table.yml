# Arp Table - Improved for Production
# Auto-improved: 2026-04-12
# Author: NetLearner Architect
#
# Standards: Idempotency, Observability, FQCN, Error Handling
---
- name: Get ARP Table
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Get ARP table from device
      ansible.netcommon.cli_command:
        command: show arp
      register: arp_result
      # Idempotency: 'show' commands are read-only and safe to run repeatedly.
      # Error Handling: Catch CLI-specific error strings that may not trigger a non-zero exit code.
      failed_when: >
        (arp_result.stdout is not defined) or
        ('Invalid input' in arp_result.stdout) or
        ('Incomplete' in arp_result.stdout)
      # check_mode: false ensures the command executes even during dry-runs/audits.
      check_mode: false

    - name: Validate ARP output integrity
      ansible.builtin.assert:
        # Observability: Verify that the response contains the expected 'Address' header.
        that:
          - arp_result.stdout | length > 0
          - "'Address' in arp_result.stdout"
        fail_msg: "ARP table retrieval failed or returned invalid data."
        success_msg: "ARP table successfully retrieved and validated."

    - name: Display ARP Table
      ansible.builtin.debug:
        msg: |
          ======================= ARP TABLE =======================
          {{ arp_result.stdout }}