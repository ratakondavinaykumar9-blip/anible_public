# NetLearner Architect - ASA/Firepower Temperature Monitoring
# Version: 2.0 (Improved for Staging)
# Standards: Idempotency, Observability, FQCN, Error Handling
---
- name: Monitor System Temperature Sensors
  hosts: asa_firepower
  gather_facts: false
  tasks:
    - name: Retrieve hardware temperature status
      # Using FQCN for cross-platform compatibility and clear plugin sourcing
      ansible.netcommon.cli_command:
        command: show temperature
      register: temp_output
      # Ensure we don't fail silently if the command returns an error string without a non-zero exit code
      failed_when: 
        - temp_output.stdout is not defined
        - "'Invalid input' in temp_output.stdout"
      # This task is inherently idempotent as it performs a read-only operation (GET)
      changed_when: false

    - name: Verify temperature data integrity
      # Observability: Asserting that we received valid output before attempting to process/display
      ansible.builtin.assert:
        that:
          - temp_output.stdout | length > 0
          - "'Temperature' in temp_output.stdout or 'Celsius' in temp_output.stdout"
        fail_msg: "Failed to retrieve valid temperature data from the device."
        success_msg: "Temperature data successfully retrieved and validated."

    - name: Display environmental metrics
      # Formatting output for operator visibility in the automation logs
      ansible.builtin.debug:
        msg: 
          - "======================= TEMPERATURE REPORT ======================="
          - "Host: {{ inventory_hostname }}"
          - "Status: Data validated"
          - "Output:"
          - "{{ temp_output.stdout }}"

    - name: Check for Critical Overheating (Optional/Safety)
      # Proactive error handling: Flagging potential hardware risks
      ansible.builtin.set_fact:
        overheating_detected: "{{ 'Critical' in temp_output.stdout or 'Warning' in temp_output.stdout }}"

    - name: Alert on High Temperature
      ansible.builtin.debug:
        msg: "WARNING: High temperature detected on {{ inventory_hostname }}!"
      when: overheating_detected | bool