---
# Temperature Monitoring Playbook for Cisco ASA/Firepower
# Purpose: Retrieve and validate temperature sensor data to ensure hardware environmental health.
# Standards: Idempotency (Read-only), Observability (Assert), Best Practices (FQCN).

- name: Monitor Device Temperature
  hosts: asa_firepower
  gather_facts: false # Facts not required for specific CLI command execution

  tasks:
    - name: Retrieve temperature data via CLI
      # Using FQCN for cross-environment consistency and reliable module resolution.
      # This task is inherently idempotent as it performs a read-only state inspection.
      ansible.netcommon.cli_command:
        command: show temperature
      register: temp_result
      # Error Handling: Fail if the command is unrecognized or if the transport layer fails.
      failed_when: 
        - temp_result.failed or "Invalid input" in temp_result.stdout

    - name: Verify temperature output integrity
      # Observability: Assert that the command returned valid sensor data.
      # This prevents silent failures where the command succeeds but returns unexpected content.
      ansible.builtin.assert:
        that:
          - "'Temperature' in temp_result.stdout"
        fail_msg: "Temperature data not found in command output. Check device hardware status."
        success_msg: "Temperature data successfully captured and validated for {{ inventory_hostname }}."

    - name: Display Temperature Report
      # Formatted output for enhanced visibility during manual or automated runs.
      ansible.builtin.debug:
        msg: |
          ======================= TEMPERATURE STATUS =======================
          Host: {{ inventory_hostname }}
          Reported Data:
          {{ temp_result.stdout }}
          ==================================================================