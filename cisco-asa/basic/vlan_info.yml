---
# Playbook: Retrieve and Validate VLAN Configuration
# Purpose: Fetches VLAN information from Cisco ASA/Firepower for auditing and state verification.
# Standards: Idempotency (read-only), Observability (assert), FQCN usage.
- name: Get VLAN Info
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show vlan' command on the device
      # Use FQCN for maintainability and to ensure the correct network plugin is utilized.
      # This task is inherently idempotent as it performs a read-only operation.
      ansible.netcommon.cli_command:
        command: show vlan
      register: vlan_result
      # Error Handling: Catch execution failures or command syntax errors specifically.
      failed_when: 
        - vlan_result.failed 
        - "'Invalid input' in vlan_result.stdout"

    - name: Verify VLAN information integrity
      # Observability: Confirm the output contains data to ensure the session returned meaningful state.
      ansible.builtin.assert:
        that:
          - vlan_result.stdout is defined
          - vlan_result.stdout | length > 0
        fail_msg: "VLAN data retrieval failed or returned an empty response. Check device connectivity."
        success_msg: "VLAN data successfully captured and validated."

    - name: Display Formatted VLAN Information
      # Documentation: Output provided for operator visibility and audit logging.
      ansible.builtin.debug:
        msg: |
          ======================= VLAN STATUS REPORT =======================
          Device: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          Output:
          {{ vlan_result.stdout }}