---
# NetLearner Architect - Improved Cisco ASA Inspection Statistics
# Purpose: Retrieves and validates service-policy inspection hit counts for monitoring.
# Standards: Idempotency (read-only), Observability (assertions), Documentation (inline comments).
- name: Get Inspection Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "ASA-01: Retrieve service-policy inspection statistics"
      # FQCN: Using ansible.netcommon.cli_command for cross-platform network CLI compatibility
      ansible.netcommon.cli_command:
        command: "show service-policy | include inspect"
      register: inspect_raw
      # Error Handling: Fail if output is undefined or contains Cisco ASA error keywords
      failed_when: >
        inspect_raw.stdout is not defined or
        "Invalid" in inspect_raw.stdout or
        "unrecognized" in inspect_raw.stdout
      # Idempotency: Explicitly marked as unchanged because this is a read-only telemetry task
      changed_when: false

    - name: "ASA-02: Verify data observability"
      # Observability: Use assert to ensure we didn't get an empty response before displaying
      ansible.builtin.assert:
        that:
          - "inspect_raw.stdout | length > 0"
        fail_msg: "No inspection data returned. Check if service-policies are configured."
        success_msg: "Inspection statistics successfully retrieved and validated."
        quiet: true

    - name: "ASA-03: Display formatted inspection results"
      # Documentation: Provides a clean, human-readable view of the inspection hits in the console
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          Device: {{ inventory_hostname }}
          Status: Operational
          ----------------------------------------------------------------
          {{ inspect_raw.stdout }}
          ================================================================
