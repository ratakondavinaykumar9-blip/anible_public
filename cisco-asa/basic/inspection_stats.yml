---
# Inspection Stats Improvement
# Improved by NetLearner Architect
# This playbook retrieves service-policy inspection statistics from Cisco ASA/Firepower devices.
# It adheres to idempotency, observability, and FQCN standards.

- name: Get Inspection Stats
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Retrieve service-policy inspection statistics"
      # Using FQCN for network CLI compatibility. This is a read-only operation (idempotent).
      ansible.netcommon.cli_command:
        command: "show service-policy | include inspect"
      register: inspect_output
      # Ensure the task fails explicitly if the command execution encounters an error
      failed_when: 
        - inspect_output.failed | default(false)
        - "'Invalid input' in inspect_output.stdout"

    - name: "Verify inspection data was retrieved"
      # Observability: Assert that the output exists to validate the device state
      ansible.builtin.assert:
        that:
          - "inspect_output.stdout is defined"
          - "inspect_output.stdout | length > 0"
        fail_msg: "No inspection statistics were returned. Verify that service-policies are active on the target."
        success_msg: "Inspection statistics successfully captured."

    - name: "Display formatted inspection statistics"
      # Provides clear visibility into the registered output
      ansible.builtin.debug:
        msg: |
          ======================= INSPECTION STATS =======================
          {{ inspect_output.stdout }}