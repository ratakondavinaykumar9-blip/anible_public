# Logging Configuration Audit
# Purpose: Safely retrieve and validate logging state on ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Error Handling (Failed_when), FQCN.
- name: Retrieve and Validate Logging Configuration
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: "Retrieve current logging configuration"
      # Why: Fetches active logging setup to ensure operational visibility and compliance.
      # Using FQCN for consistency and future-proofing.
      ansible.netcommon.cli_command:
        command: show logging
      register: logging_config
      # Error Handling: Ensure we fail if the output is undefined or contains error markers.
      failed_when:
        - logging_config.stdout is not defined
        - "'invalid' in logging_config.stdout | lower"

    - name: "Verify logging data integrity"
      # Observability: Assert ensures the captured output is not empty and contains valid data.
      # This provides a guardrail against processing empty buffers in downstream automation.
      ansible.builtin.assert:
        that:
          - "logging_config.stdout | length > 0"
          - "'logging' in logging_config.stdout"
        fail_msg: "Logging configuration for {{ inventory_hostname }} could not be retrieved or is empty."
        success_msg: "Logging configuration for {{ inventory_hostname }} successfully validated."

    - name: "Display logging configuration for audit"
      # Why: Provides human-readable observability for the NetLearner Architect review.
      ansible.builtin.debug:
        msg: |
          ======================= LOGGING AUDIT: {{ inventory_hostname }} =======================
          {{ logging_config.stdout }}