---
# Logging Configuration Audit
# Purpose: Retrieves and validates the current logging status from Cisco ASA/Firepower devices.
# Idempotency: Read-only operation; safe for repeated execution without state change.
# Standards: FQCN usage, observability via assertions, and explicit error handling.

- name: Get Logging Config
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show logging' on target device
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: show logging
      register: log_output
      # Error Handling: Explicitly fail if the command returns an error or is empty
      failed_when: 
        - log_output.failed
        - "log_output.stdout | length == 0"

    - name: Validate logging output integrity
      # Observability: Ensure the retrieved data contains expected Cisco ASA logging signatures
      ansible.builtin.assert:
        that:
          - "log_output.stdout is defined"
          - "'Syslog logging:' in log_output.stdout"
        fail_msg: "Validation Failed: 'show logging' output does not contain expected configuration markers."
        success_msg: "Validation Passed: Logging configuration successfully retrieved."

    - name: Display current logging buffer
      ansible.builtin.debug:
        msg: |
          ======================= LOGGING CONFIGURATION =======================
          {{ log_output.stdout }}