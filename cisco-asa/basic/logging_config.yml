---
# Logging Configuration Audit
# Purpose: Retrieves and verifies the logging status on ASA/Firepower devices.
# This operation is inherently idempotent as it performs no state changes.

- name: Get Logging Config
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show logging' command on the target device
      # Using FQCN for consistent cross-platform execution.
      ansible.netcommon.cli_command:
        command: show logging
      register: logging_result
      # Error Handling: Define failure conditions to prevent silent failures on empty or invalid returns.
      failed_when:
        - logging_result.stdout == ""
        - "'Invalid input' in logging_result.stdout"

    - name: Verify logging output integrity
      # Observability: Assert that the output contains expected markers to ensure the command returned actual data.
      ansible.builtin.assert:
        that:
          - "logging_result.stdout is defined"
          - "'logging' in logging_result.stdout.lower()"
        fail_msg: "Retrieved logging configuration appears invalid or incomplete for {{ inventory_hostname }}."
        success_msg: "Logging configuration verified for {{ inventory_hostname }}."

    - name: Display retrieved logging configuration
      # Observability: Provide formatted output for auditing and manual verification.
      ansible.builtin.debug:
        msg: |
          ======================= LOGGING CONFIGURATION: {{ inventory_hostname }} =======================
          {{ logging_result.stdout }}