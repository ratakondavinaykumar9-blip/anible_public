---
# Software Version Detail - Enhanced Edition
# This playbook retrieves and validates the software version from Cisco ASA/Firepower devices.
# Adheres to Standard:s: Idempotency, Observability, Documentation, Error Handling, FQCN.
#
- name: Get Detailed Version
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve version information via CLI
      # Use FQCN (Fully Qualified Collection Name) for consistency and portability
      ansible.netcommon.cli_command:
        command: show version
      register: ver
      # Error Handling: Ensure we catch cases where the command returns no data
      failed_when: 
        - ver.stdout is not defined or ver.stdout | length == 0

    - name: Validate output observability
      # Observability: Assert that the returned output contains expected Cisco ASA identity strings
      ansible.builtin.assert:
        that:
          - "'Cisco' in ver.stdout"
          - "'Adaptive Security Appliance' in ver.stdout"
        fail_msg: "Version output validation failed. Output does not match expected ASA format."
        success_msg: "Version output validated successfully. Device identity confirmed."

    - name: Display formatted software version
      # Documentation: Present the results in a readable format for the operator
      ansible.builtin.debug:
        msg: |
          ======================= DETAILED VERSION =======================
          {{ ver.stdout }}
---