---
# Software Version Detail
# Improved according to NetLearner Standards: 2026-03-15
#
# Standards Applied:
# 1. Idempotency: Read-only 'show' command is inherently idempotent.
# 2. Observability: Registered 'ver_result' and added 'assert' for content verification.
# 3. Documentation: Clear comments explaining the purpose of each step.
# 4. Error Handling: 'failed_when' logic to catch CLI-specific errors like "Invalid input".
# 5. Best Practices: Used Fully Qualified Collection Names (FQCN) throughout.

- name: Get Detailed Software Version
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve software version from device
      # Using FQCN for reliability across different Ansible environments
      ansible.netcommon.cli_command:
        command: show version
      register: ver_result
      # Error handling: Catch common Cisco CLI errors that might not trigger a task failure
      failed_when:
        - ver_result.failed or "Invalid input" in ver_result.stdout
        - "'Error' in ver_result.stdout"

    - name: Verify software version output integrity
      # Observability: Ensure the output contains expected Cisco identifying strings
      ansible.builtin.assert:
        that:
          - "'Cisco' in ver_result.stdout"
          - "'Software' in ver_result.stdout"
        fail_msg: "Retrieved output does not appear to be a valid Cisco software version string."
        success_msg: "Successfully validated Cisco software version output."

    - name: Display formatted software version details
      ansible.builtin.debug:
        msg: |
          ======================= DETAILED VERSION =======================
          {{ ver_result.stdout }}