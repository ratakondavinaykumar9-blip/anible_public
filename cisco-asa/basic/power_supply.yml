---
# Power Supply Status Audit
# Purpose: This playbook performs a health check on the power supply units of ASA/Firepower devices.
# Idempotency: The 'show power' command is read-only and safe to run repeatedly without altering system state.
- name: ASA/Firepower Power Supply Status Audit
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Power Supply Status
      # Best Practice: Use Fully Qualified Collection Name (FQCN)
      # Documentation: Executes the platform-specific command to check hardware power status.
      ansible.netcommon.cli_command:
        command: show power
      register: power_output
      # Error Handling: Fail explicitly if the command returns no data or encounters an execution error.
      failed_when: 
        - power_output.failed or power_output.stdout | length == 0

    - name: Validate Power Supply Information
      # Observability: Assert ensures the output contains expected hardware keywords before proceeding.
      ansible.builtin.assert:
        that:
          - "'Power' in power_output.stdout"
        fail_msg: "Power supply details were not found in the command output. Verify device compatibility."
        success_msg: "Power supply status successfully retrieved and verified."

    - name: Display Power Supply Report
      # Documentation: Provides human-readable visibility into the raw hardware status for audit logs.
      ansible.builtin.debug:
        msg: |
          ======================= POWER SUPPLY STATUS =======================
          {{ power_output.stdout }}