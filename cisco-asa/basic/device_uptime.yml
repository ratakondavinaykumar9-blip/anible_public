---
# NetLearner Architect - Standardized Uptime Retrieval
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Get Network Device Uptime
  hosts: asa_firepower
  gather_facts: false # Why: Facts are not required for this task; disabling improves execution speed.

  tasks:
    - name: Retrieve system uptime via CLI
      # Why: FQCN used to ensure explicit module resolution and future-proofing.
      ansible.netcommon.cli_command:
        command: "show version | include (uptime|Uptime)"
      register: uptime_result
      # Why: Error Handling - Verify command execution returned data to prevent silent failures.
      failed_when:
        - uptime_result.stdout | length == 0
        - "'Invalid' in uptime_result.stdout"

    - name: Validate uptime response
      # Why: Observability - Asserting the presence of 'uptime' keyword to confirm valid output retrieval.
      ansible.builtin.assert:
        that:
          - "'uptime' in uptime_result.stdout or 'Uptime' in uptime_result.stdout"
        fail_msg: "Device {{ inventory_hostname }} did not return valid uptime information."
        quiet: true

    - name: Display device uptime
      # Why: Documentation - Presenting the final validated state to the automation operator.
      ansible.builtin.debug:
        msg: "Uptime for {{ inventory_hostname }} is: {{ uptime_result.stdout | trim }}"
