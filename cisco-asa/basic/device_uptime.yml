---
# Playbook: Cisco ASA/Firepower Uptime Audit
# This playbook retrieves the current system uptime for network devices. 
# It is inherently idempotent as it performs read-only operations.
# Standards: FQCN, Observability, and Robust Error Handling.

- name: Retrieve and Validate Device Uptime
  hosts: asa_firepower
  gather_facts: false  # Facts are not required for CLI-based retrieval, improving performance.

  tasks:
    - name: Retrieve uptime information from the device
      # Using Fully Qualified Collection Name (FQCN) for reliability.
      ansible.netcommon.cli_command:
        command: "show version | include (uptime|Uptime)"
      register: uptime_raw
      # Error Handling: Explicitly fail if the command execution fails or returns empty output.
      failed_when: 
        - uptime_raw.failed or uptime_raw.stdout | length == 0

    - name: Validate uptime output format
      # Observability: Ensure the registered output contains expected uptime keywords.
      ansible.builtin.assert:
        that:
          - "uptime_raw.stdout is search('uptime', ignorecase=true)"
        fail_msg: "Unexpected output format. Uptime string not found in 'show version'."
        success_msg: "Uptime information successfully validated."

    - name: Display the system uptime
      # Final reporting of the captured and validated data.
      ansible.builtin.debug:
        msg: "Uptime: {{ uptime_raw.stdout | trim }}"