---
# ASA Flash Information Retrieval
# Improved by Architect: 2026-03-15
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Get Flash Info
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve flash file system information
      # Why: Capture current storage state to identify available space and firmware images.
      # This operation is inherently idempotent as it only reads device state without modification.
      ansible.netcommon.cli_command:
        command: show flash
      register: flash_result
      # Error Handling: Ensure the command execution succeeded and returned valid data.
      failed_when: 
        - flash_result.failed or flash_result.stdout | length == 0 or "bytes" not in flash_result.stdout

    - name: Validate flash information retrieval
      # Observability: Assert that the output contains expected flash indicators for verification.
      ansible.builtin.assert:
        that:
          - flash_result.stdout is defined
          - "'bytes' in flash_result.stdout or 'Directory' in flash_result.stdout"
        fail_msg: "Flash information retrieval failed or returned unexpected data for {{ inventory_hostname }}."
        success_msg: "Flash information successfully captured for {{ inventory_hostname }}."

    - name: Display flash information summary
      # Why: Provide immediate visibility into flash contents during playbook execution for operational auditing.
      ansible.builtin.debug:
        msg: |
          ======================= FLASH: {{ inventory_hostname }} =======================
          {{ flash_result.stdout }}