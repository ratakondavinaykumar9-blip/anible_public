---
# Show ASA Version and System Information
# Improved by NetLearner Architect for Idempotency, Observability, and Best Practices.
- name: Get ASA Version Information
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Default output format to 'text'. Can be overridden at runtime via -e "output_format=json"
    output_format: "text"

  tasks:
    - name: Retrieve version and hardware details from ASA
      # Why: This is the primary data collection step for inventory management and compliance audits.
      # Using FQCN (cisco.asa) ensures the correct collection module is invoked.
      cisco.asa.asa_version:
      register: version_output
      # Error Handling: Ensure the playbook stops if the data cannot be retrieved.
      failed_when: version_output is failed

    - name: Validate that version facts were successfully gathered
      # Observability: Assert ensures that the expected data structure exists before further processing.
      ansible.builtin.assert:
        that:
          - version_output.ansible_facts.asa_version is defined
          - version_output.ansible_facts.asa_version.version is defined
        fail_msg: "Failed to retrieve ASA version facts for {{ inventory_hostname }}. Check connectivity."
        quiet: true

    - name: Display raw version output for troubleshooting
      # Observability: Providing visibility into the raw response when verbosity is increased.
      ansible.builtin.debug:
        var: version_output
        verbosity: 1

    - name: Persist version data as JSON for downstream processing
      # Idempotency: ansible.builtin.copy only updates the file if the content changes.
      # Why: Enables integration with external reporting or configuration management databases (CMDB).
      ansible.builtin.copy:
        content: "{{ version_output.ansible_facts | to_nice_json }}"
        dest: "/tmp/asa_version_{{ inventory_hostname }}.json"
        mode: '0644'
      when: output_format ==