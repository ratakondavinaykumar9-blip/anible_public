---
# Cisco ASA/Firepower Group Policy Audit
# Purpose: Retrieves and validates the current group-policy configuration.
# Idempotency: Read-only operations are inherently idempotent and safe for repeated execution.
- name: Audit Group Policies
  hosts: asa_firepower
  gather_facts: false # Facts are not required for CLI command execution

  tasks:
    - name: Retrieve group-policy configuration from device
      # FQCN: Using fully qualified collection name for portability and best practices
      ansible.netcommon.cli_command:
        command: show running-config group-policy
      register: policies_result
      # Error Handling: Fail if command is rejected or returns common ASA error patterns
      failed_when:
        - policies_result.failed or "'Invalid input' in policies_result.stdout"
        - "'ERROR:' in policies_result.stdout"

    - name: Validate configuration capture
      # Observability: Assert that the command returned valid data before proceeding
      ansible.builtin.assert:
        that:
          - "policies_result.stdout is defined"
          - "policies_result.stdout | length > 0"
        fail_msg: "Data retrieval failed or group-policy configuration is empty."
        quiet: true

    - name: Display formatted Group Policy configuration
      # Documentation: Provides structured visibility for audit logs and operators
      ansible.builtin.debug:
        msg: |
          ======================= START GROUP POLICIES =======================
          {{ policies_result.stdout }}
          ======================== END GROUP POLICIES ========================

    - name: Check for Default Group Policy existence
      # Observability: Verify standard configuration markers are present in the output
      ansible.builtin.set_fact:
        has_default_policy: "{{ 'group-policy DfltGrpPolicy' in policies_result.stdout }}"

    - name: Report Configuration Integrity
      ansible.builtin.debug:
        msg: "Default Group Policy (DfltGrpPolicy) is present: {{ has_default_policy }}"