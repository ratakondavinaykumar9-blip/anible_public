---
# Group Policies Management Playbook
# This playbook retrieves and validates Cisco ASA/Firepower group policy configurations.
# Standards: Idempotency, Observability, FQCN, and Robust Error Handling.
# Date: 2026-04-12
# Author: NetLearner Architect

- name: Audit and Observe Group Policies
  hosts: asa_firepower
  gather_facts: false
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Retrieve running-config group-policy
      # Using FQCN for consistent collection mapping.
      # This task is inherently idempotent as it is a read-only operation.
      ansible.netcommon.cli_command:
        command: show running-config group-policy
      register: group_policy_output
      # Ensure we fail gracefully if the command is unrecognized or the session times out.
      failed_when: 
        - group_policy_output.rc != 0
        - "'Invalid input' in group_policy_output.stdout"

    - name: Verify policy retrieval success
      # Observability: Assert that the output is not null and contains expected configuration headers.
      # This ensures the rest of the automation has a valid state to work with.
      ansible.builtin.assert:
        that:
          - group_policy_output.stdout is defined
          - group_policy_output.stdout | length > 0
        fail_msg: "Failed to retrieve Group Policy configuration or the configuration is empty."
        success_msg: "Group Policy configuration successfully captured for {{ inventory_hostname }}."

    - name: Log group policy details
      # Enhanced Observability: Providing structured feedback for audit trails.
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Status: Configuration Captured"
          - "Output Summary: {{ group_policy_output.stdout_lines | length }} lines retrieved"
          - "Full Configuration:"
          - "{{ group_policy_output.stdout }}"

    - name: Check for existence of 'DfltGrpPolicy'
      # Example of specific state verification to ensure critical default objects exist.
      ansible.builtin.set_fact:
        default_policy_exists: "{{ 'group-policy DfltGrpPolicy' in group_policy_output.stdout }}"

    - name: Assert critical policy presence
      # Strict validation: Ensure the firewall has not been wiped of its default group policy.
      ansible.builtin.assert:
        that:
          - default_policy_exists
        fail_msg: "CRITICAL: DfltGrpPolicy is missing from the running configuration!"
        quiet: true
