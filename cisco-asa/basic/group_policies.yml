---
# Group Policies Configuration Audit
# Improved: 2026-03-15
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
#
- name: Audit Cisco ASA Group Policies
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve group-policy configuration from running-config
      # Using FQCN for ansible.netcommon.cli_command.
      # This task is read-only and inherently idempotent.
      ansible.netcommon.cli_command:
        command: show running-config group-policy
      register: policies_result
      # Error Handling: Catch ASA-specific error strings that may not trigger a CLI return code failure.
      failed_when: 
        - policies_result.failed or "% Invalid input" in policies_result.stdout or "ERROR:" in policies_result.stdout
      # Idempotency: Ensure this read-only task does not report a 'changed' status in the play recap.
      changed_when: false

    - name: Validate that group policy configuration was retrieved successfully
      # Observability: Assert that the command returned content to ensure device state is accessible.
      ansible.builtin.assert:
        that:
          - policies_result.stdout is defined
          - policies_result.stdout | length > 0
        fail_msg: "Failed to retrieve Group Policies or no Group Policies are configured on {{ inventory_hostname }}."
        success_msg: "Group Policy configuration successfully retrieved."

    - name: Display Group Policy configuration for audit purposes
      # Documentation: Providing a structured output for human review and logging.
      ansible.builtin.debug:
        msg: |
          ======================= GROUP POLICIES: {{ inventory_hostname }} =======================
          {{ policies_result.stdout }}