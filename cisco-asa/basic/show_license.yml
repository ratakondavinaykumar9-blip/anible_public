# NetLearner Architect Improved Playbook
# Purpose: Retrieve and validate license/version information for ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Register/Assert), FQCN usage.

- name: Get License Details
  hosts: asa_firepower
  gather_facts: false
  # Standardize on network_cli for predictable behavior across Cisco platforms.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: "CLI: Retrieve version and license status"
      # Using FQCN (Fully Qualified Collection Name) for modern maintainability.
      # This task is inherently idempotent as it only performs read operations.
      ansible.netcommon.cli_command:
        command: show version
      register: r_version
      # Error Handling: Catch CLI-level failures or unexpected empty/invalid responses.
      failed_when:
        - r_version.stdout is not defined
        - r_version.stdout | length == 0
        - "'Invalid' in r_version.stdout"
        - "'Error' in r_version.stdout"

    - name: "Observe: Validate device identity and output integrity"
      # Observability: Asserting that the device is indeed a Cisco appliance.
      # This prevents the playbook from succeeding if the output is malformed or incorrect.
      ansible.builtin.assert:
        that:
          - "'Cisco' in r_version.stdout"
        fail_msg: "Data Integrity Error: Received output does not contain expected 'Cisco' identifier."
        success_msg: "Data Integrity Verified: Valid Cisco version output received."
        quiet: true

    - name: "Display: Technical summary of the retrieved information"
      # Formatted debugging output for human operator visibility.
      ansible.builtin.debug:
        msg: |
          ======================= LICENSE =======================
          Node: {{ inventory_hostname }}
          Status: SUCCESS
          -------------------------------------------------------
          {{ r_version.stdout }}