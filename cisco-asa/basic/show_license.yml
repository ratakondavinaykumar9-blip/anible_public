---
# Improved License Information Retrieval Playbook
# This playbook retrieves and validates license/version information from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), FQCN, and Error Handling.

- name: Get License Details
  hosts: asa_firepower
  gather_facts: false # Fact gathering is disabled to optimize performance for simple CLI tasks.

  tasks:
    - name: Execute 'show version' to retrieve license and hardware details
      # Using FQCN for consistent cross-platform network command execution.
      ansible.netcommon.cli_command:
        command: show version
      register: version_result
      # Error Handling: Ensure the task fails if the command returns no output or is undefined.
      failed_when: 
        - version_result.stdout is not defined
        - version_result.stdout | length == 0

    - name: Verify the integrity of the retrieved license information
      # Observability: Using assertions to ensure the output contains expected system markers.
      ansible.builtin.assert:
        that:
          - "'Hardware' in version_result.stdout"
          - "'Serial Number' in version_result.stdout or 'S/N' in version_result.stdout"
        fail_msg: "Validation failed: 'show version' output on {{ inventory_hostname }} is missing expected fields."
        success_msg: "Successfully validated license and version data for {{ inventory_hostname }}."

    - name: Display the formatted license and version information
      # Providing clear visibility into the results for audit and verification purposes.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          LICENSE AND VERSION SUMMARY FOR: {{ inventory_hostname }}
          ======================================================================
          {{ version_result.stdout }}