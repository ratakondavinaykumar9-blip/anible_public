---
# Hardware Model Information Retrieval
# This playbook retrieves hardware model details from Cisco ASA/Firepower devices.
# It ensures idempotency, provides observability via assertions, and follows FQCN standards.

- name: Get Hardware Model Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show version command to capture model info
      # Best Practice: Using Fully Qualified Collection Name (FQCN)
      ansible.netcommon.cli_command:
        command: "show version | include (Hardware|Model)"
      register: model_output
      # Idempotency: This is a read-only operation; it should never report a 'changed' status
      changed_when: false
      # Error Handling: Mark as failed if the output is empty or the command is unrecognized
      failed_when:
        - model_output.stdout | length == 0
        - "'Invalid' in model_output.stdout"

    - name: Validate hardware model capture
      # Observability: Assert that the model information was correctly registered
      ansible.builtin.assert:
        that:
          - "model_output.stdout is defined"
          - "model_output.stdout | length > 0"
        fail_msg: "Hardware model information could not be retrieved. Please check device connectivity."
        success_msg: "Hardware model information successfully retrieved."

    - name: Display hardware model details
      # Observability: Output the results for manual verification
      ansible.builtin.debug:
        msg: "{{ model_output.stdout_lines }}"