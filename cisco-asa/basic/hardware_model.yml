# NetLearner Staging: Hardware Model Inventory Verification
# This playbook retrieves hardware model information from ASA/Firepower devices.
# Idempotency: Read-only operation ensures the playbook is safe to run multiple times without state changes.

- name: Get Hardware Model Information
  hosts: asa_firepower
  gather_facts: false
  # Best Practice: Explicitly define the connection type for network device interaction.
  connection: ansible.netcommon.network_cli

  tasks:
    - name: Execute show version command to extract hardware and model details
      # Why: Captured hardware details are essential for compliance auditing and asset management.
      ansible.netcommon.cli_command:
        command: "show version | include (Hardware|Model)"
      register: model_output
      # Error Handling: Fail if the output is empty or if the device returns a syntax error.
      failed_when: 
        - model_output.stdout | length == 0
        - "'Invalid input' in model_output.stdout"

    - name: Validate that hardware information was correctly captured
      # Observability: Use assertions to verify the integrity of the collected data.
      ansible.builtin.assert:
        that:
          - "model_output.stdout is defined"
          - "model_output.stdout != ''"
        fail_msg: "The hardware model information could not be retrieved from the device output."
        success_msg: "Hardware model data successfully retrieved and validated."

    - name: Display captured hardware details for audit visibility
      # Observability: Provides immediate feedback in logs for verification.
      ansible.builtin.debug:
        msg: "Retrieved Hardware Info: {{ model_output.stdout }}"