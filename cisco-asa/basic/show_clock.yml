---
# Improved Show Clock and NTP Status Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
- name: Get Clock and NTP Information
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve current system clock
      # FQCN: Using ansible.netcommon for standardized CLI command execution
      ansible.netcommon.cli_command:
        command: show clock
      register: clock_result
      # Error Handling: Ensure the command returned data before proceeding
      failed_when: clock_result.stdout | length == 0

    - name: Validate clock data capture
      # Observability: Explicitly asserting that the registered variable contains expected data
      ansible.builtin.assert:
        that:
          - clock_result is defined
          - clock_result.stdout is defined
        fail_msg: "System clock information could not be retrieved from the device."
        quiet: true

    - name: Retrieve NTP synchronization status
      # Error Handling: 'ignore_errors' used because NTP might not be configured on all devices
      ansible.netcommon.cli_command:
        command: show ntp status
      register: ntp_result
      ignore_errors: true

    - name: Verify NTP response reliability
      # Observability: Checking if the NTP command returned any output
      ansible.builtin.assert:
        that:
          - ntp_result.stdout is defined
        fail_msg: "NTP status query did not return valid output."
        quiet: true

    - name: Display synchronized time information
      # Documentation: Providing a clean, human-readable summary of the gathered facts
      ansible.builtin.debug:
        msg: |
          DEVICE: {{ inventory_hostname }}
          ---------------------------------------
          CLOCK: {{ clock_result.stdout | trim }}
          NTP STATUS: {{ ntp_result.stdout | default('NTP not configured or unreachable') | trim }}
          ---------------------------------------

    - name: Final observability check for NTP synchronization
      # Observability: Specifically check if the clock is 'synchronized'
      ansible.builtin.assert:
        that:
          - "'synchronized' in ntp_result.stdout"
        fail_msg: "NTP is NOT synchronized on {{ inventory_hostname }}."
        success_msg: "NTP is successfully synchronized on {{ inventory_hostname }}."
      when: ntp_result.stdout is defined and ntp_result.stdout != ""
      ignore_errors: true # Do not fail the playbook if the device is just unsynchronized