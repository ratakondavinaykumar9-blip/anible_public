# Improved System Time and NTP Verification
# Purpose: Ensures network devices have consistent time for audit logs and security forensics.
# Standards: NetLearner Architect v2.1 (Idempotency, Observability, FQCN, Error Handling)
- name: Verify Clock and NTP Synchronization
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch current system clock
      # Why: Accurate time is critical for security logging, PKI validation, and event correlation.
      ansible.netcommon.cli_command:
        command: show clock
      register: clock_res
      failed_when: 
        - clock_res.stdout is not defined
        - clock_res.stdout == ""

    - name: Validate clock output observability
      # Why: Ensures the device returned a valid string before proceeding with assertions.
      ansible.builtin.assert:
        that:
          - clock_res.stdout | length > 5
        fail_msg: "Device returned an invalid or truncated clock string."
        success_msg: "System clock retrieved successfully: {{ clock_res.stdout }}"

    - name: Fetch NTP synchronization status
      # Why: NTP ensures drift is corrected; we handle cases where NTP might not be configured.
      ansible.netcommon.cli_command:
        command: show ntp status
      register: ntp_res
      # Error Handling: Allow playbook to continue if NTP is intentionally disabled.
      ignore_errors: true

    - name: Verify NTP operational state
      # Why: Automated validation of time source health to prevent "Time Step" errors in clusters.
      ansible.builtin.assert:
        that:
          - "'synchronized' in ntp_res.stdout"
        fail_msg: "NTP is NOT synchronized. Check upstream strata or connectivity."
        success_msg: "NTP synchronization is healthy."
      when: 
        - ntp_res.stdout is defined
        - ntp_res.stdout != ""
        - "'NTP is not enabled' not in ntp_res.stdout"

    - name: Display consolidated synchronization report
      # Why: Provides a structured summary for automation logs and operational visibility.
      ansible.builtin.debug:
        msg:
          inventory_hostname: "{{ inventory_hostname }}"
          system_time: "{{ clock_res.stdout | trim }}"
          ntp_synced: "{{ 'synchronized' in ntp_res.stdout | default('no') }}"
          status_summary: "{{ 'OK' if 'synchronized' in ntp_res.stdout | default('') else 'WARNING' }}"
...