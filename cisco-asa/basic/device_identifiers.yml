---
# Architect:Improved Playbook
# Objective: Retrieve and validate unique hardware identifiers (Serial, UUID, and MAC addresses).
# Standards: Idempotency (Read-only), Observability (Assert), FQCN usage, and Structured Documentation.

- name: Retrieve and Validate Device Hardware Identifiers
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Serial and UUID information
      # FQCN: Using ansible.netcommon.cli_command for platform-agnostic command execution
      # Why: This provides raw hardware markers for inventory reconciliation.
      ansible.netcommon.cli_command:
        command: "show version | include (Serial|UUID)"
      register: serial_output
      # Error Handling: Fail if the command returns no data, ensuring the device is responsive.
      failed_when: serial_output.stdout | length == 0

    - name: Validate Serial/UUID retrieval
      # Observability: Assert that the output contains expected hardware keywords.
      ansible.builtin.assert:
        that:
          - "('Serial' in serial_output.stdout) or ('UUID' in serial_output.stdout)"
        fail_msg: "Validation Failed: Serial or UUID information could not be found in the output."
        success_msg: "Validation Passed: Hardware identifiers successfully retrieved."

    - name: Retrieve MAC address information
      # Why: MAC addresses are required for Layer 2 mapping and DHCP reservation auditing.
      ansible.netcommon.cli_command:
        command: "show version | include MAC"
      register: mac_output
      failed_when: mac_output.stdout | length == 0

    - name: Validate MAC address retrieval
      # Observability: Verify that MAC address strings are present in the response.
      ansible.builtin.assert:
        that:
          - "'MAC' in mac_output.stdout"
        fail_msg: "Validation Failed: MAC address information was not returned by the device."
        success_msg: "Validation Passed: MAC address information successfully retrieved."

    - name: Display