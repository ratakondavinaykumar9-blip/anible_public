---
# ==============================================================================
# Playbook: Device Identity Audit
# Why: Retrieves unique hardware identifiers (Serial, UUID, MAC) for CMDB 
#      synchronization, licensing validation, and inventory accuracy.
# Standards: Idempotency (read-only), Observability (assertions), FQCN.
# ==============================================================================
- name: Retrieve and Verify Device Identifiers
  hosts: asa_firepower
  gather_facts: false
  # connection: network_cli is implied for these modules

  tasks:
    - name: Fetch Serial Number and UUID
      # FQCN: Using cisco.asa collection for platform-specific command execution
      cisco.asa.asa_command:
        commands:
          - show version | include (Serial|UUID)
      register: serial_output
      # Idempotency: Read-only commands should never report 'changed'
      changed_when: false
      # Error Handling: Fail if output is empty or command execution fails
      failed_when: 
        - serial_output.stdout is not defined or serial_output.stdout[0] == ""

    - name: Verify Serial Information Observability
      # Observability: Assert that the command returned expected hardware data
      ansible.builtin.assert:
        that:
          - "'Serial' in serial_output.stdout[0] or 'UUID' in serial_output.stdout[0]"
        fail_msg: "Hardware identifiers (Serial/UUID) could not be retrieved from {{ inventory_hostname }}"
        success_msg: "Hardware identifiers successfully captured for {{ inventory_hostname }}"

    - name: Fetch MAC Address Assignments
      # Documentation: MAC addresses are required for Layer 2 topology mapping
      cisco.asa.asa_command:
        commands:
          - show version | include MAC
      register: mac_output
      changed_when: false
      failed_when: 
        - mac_output.stdout is not defined or mac_output.stdout[0] == ""

    - name: Verify MAC Address Observability
      ansible.builtin.assert:
        that:
          - "'MAC' in mac_output.stdout[0]"
        fail_msg: "MAC address data is missing or malformed on {{ inventory_hostname }}"
        success_msg: "MAC address data successfully captured for {{ inventory_hostname }}"

    - name: Display Formatted Device Identity Report
      # Documentation: Providing human-readable output for audit trails
      ansible.builtin.debug:
        msg: |
          ================================================================================
          DEVICE IDENTITY REPORT: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 if ansible_date_time is defined else 'N/A' }}
          ================================================================================
          IDENTIFIERS:
          {{ serial_output.stdout[0] | trim }}

          INTERFACE MAC ADDRESSES:
          {{ mac_output.stdout[0] | trim }}
          ================================================================================