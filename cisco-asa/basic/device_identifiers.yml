---
# NetLearner Architect Improved Playbook
# Purpose: Securely retrieve and verify hardware identity markers for ASA/Firepower devices.
# Idempotency: Read-only CLI operations do not modify state, making this playbook safe for repeated execution.
---
- name: Get Device Identifiers
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve Serial Number and UUID
      # Fetches unique hardware identifiers required for inventory management and license auditing.
      ansible.netcommon.cli_command:
        command: "show version | include (Serial|UUID)"
      register: serial_output
      # Error Handling: Ensures the command actually returned data before proceeding.
      failed_when: 
        - serial_output.stdout is not defined
        - serial_output.stdout | length == 0

    - name: Verify Serial/UUID data integrity
      # Observability: Asserts that the retrieved output contains the expected identity markers.
      ansible.builtin.assert:
        that:
          - "'Serial' in serial_output.stdout or 'UUID' in serial_output.stdout"
        fail_msg: "The 'show version' command failed to return Serial or UUID information. Check credentials/permissions."
        success_msg: "Successfully verified device serial/UUID identity markers."

    - name: Retrieve MAC address information
      # Captures Layer 2 identifiers used for interface mapping and DHCP reservation verification.
      ansible.netcommon.cli_command:
        command: "show version | include MAC"
      register: mac_output
      # Error Handling: Allow failure here as certain virtual or legacy ASA versions may not display MACs in 'show version'.
      failed_when: false

    - name: Verify MAC address task registration
      # Observability: Ensures the task registered a response object for consistent debugging.
      ansible.builtin.assert:
        that:
          - mac_output is defined
        quiet: true

    - name: Display Formatted Identity Report
      # Documentation: Provides a structured, audit-ready summary of the hardware identifiers.
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE IDs =======================
          TARGET HOST: {{ inventory_hostname }}
          TIMESTAMP: {{ ansible_date_time.iso8601 | default('N/A') }}
          
          SERIAL/UUID INFORMATION:
          {{ serial_output.stdout | trim }}
          
          MAC ADDRESS INFORMATION:
          {{ mac_output.stdout | default('N/A - Information not found in show version') | trim }}
          ==========================================================
