---
# Playbook: Audit User Database
# Purpose: Retrieves and validates local username configuration for security auditing and compliance.
# Standard: Idempotent (Read-only), Observable, Documented, and FQCN-compliant.
- name: Audit Local User Database
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve local username configuration
      # FQCN: Using cisco.asa collection for platform-specific reliability
      cisco.asa.asa_command:
        commands:
          - show running-config username
      register: users_output
      # Error Handling: Ensure the command was accepted and executed without platform errors
      failed_when:
        - users_output.failed or "Invalid input" in users_output.stdout[0]

    - name: Validate retrieval of user data
      # Observability: Assert that data was actually returned to prevent silent failures in pipelines
      ansible.builtin.assert:
        that:
          - users_output.stdout[0] is defined
          - users_output.stdout[0] | length > 0
        fail_msg: "The user database retrieval failed or the database is empty."
        success_msg: "Successfully retrieved local user configuration."

    - name: Display User Database Report
      # Documentation: Provides human-readable output for manual verification or logging
      ansible.builtin.debug:
        msg: |
          ======================= USER DATABASE =======================
          {{ users_output.stdout[0] }}