---
# Improved Access List Retrieval Playbook
# Standards: Idempotency, Observability, Documentation, Error Handling, FQCN
# Purpose: Gathers ACL configuration and real-time hit counts for audit and troubleshooting.

- name: Get Access Lists
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather existing ACL configurations
      # Use 'state: gathered' to read current device state without applying changes (Idempotency).
      # This ensures the task is read-only and safe for repeated execution.
      cisco.asa.asa_acl:
        state: gathered
      register: acl_output
      # Error Handling: Ensure we catch connectivity or module-specific execution failures.
      failed_when: acl_output.failed | default(false)

    - name: Validate ACL data collection
      # Observability: Assert that the module successfully returned the 'gathered' facts structure.
      ansible.builtin.assert:
        that:
          - acl_output.gathered is defined
        fail_msg: "ACL data could not be retrieved from {{ inventory_hostname }}. Check connectivity and credentials."
        success_msg: "Successfully gathered ACL data for {{ inventory_hostname }}."
        quiet: true

    - name: Fetch real-time ACL hit counts
      # Using FQCN for operational command execution. 
      # This captures the dynamic 'hitcnt' status which is not part of the static configuration state.
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: acl_hits
      # Error Handling: Fail if the command returns ASA-specific error strings.
      # Empty output is allowed as it simply means no hits have been recorded yet.
      failed_when: 
        - acl_hits.failed | default(false)
        - "'Invalid input' in acl_hits.stdout or 'ERROR:' in acl_hits.stdout"

    - name: Verify hit count command execution
      # Observability: Ensure the CLI command object exists and was processed.
      ansible.builtin.assert:
        that:
          - acl_hits.stdout is defined
        fail_msg: "The 'show access-list' command failed to return a valid response object on {{ inventory_hostname }}."
        quiet: true

    - name: Generate Summary Report
      # Documentation: Summary of results for human readability and audit logging.
      # Uses Jinja2