---
# NetLearner Architect Improved Playbook
# Standard: Network Automation Professional Audit
# Improvements: Idempotency (state: gathered), Observability (asserts), 
# Error Handling (failed_when), FQCN (cisco.asa.asa_acls)
---
- name: Audit Cisco ASA Access Control Lists
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather structured ACL configuration state
      # Why: Using 'state: gathered' with resource modules ensures idempotency by 
      # strictly reading configuration without attempting changes.
      # FQCN: Using cisco.asa.asa_acls (plural) is the standard for Resource Modules.
      cisco.asa.asa_acls:
        state: gathered
      register: acl_output

    - name: Verify structured data gathering success
      # Why: Observability check to ensure the module returned expected data structures.
      ansible.builtin.assert:
        that:
          - acl_output.gathered is defined
        fail_msg: "Data Integrity Failure: Could not retrieve structured ACLs from {{ inventory_hostname }}."
        quiet: true

    - name: Retrieve operational hitcount statistics via CLI
      # Why: Captures dynamic traffic metrics that are not part of the static configuration model.
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: acl_hits
      # Why: Error Handling to catch command execution failures or invalid context.
      failed_when: 
        - acl_hits.stdout is not defined
        - "'Invalid' in acl_hits.stdout"
      ignore_errors: false

    - name: Validate operational output consistency
      # Why: Ensures the result object is populated before attempting to display.
      ansible.builtin.assert:
        that:
          - acl_hits.stdout is defined
        fail_msg: "Operational Capture Failure: 'show access-list' failed on {{ inventory_hostname }}."
        quiet: true

    - name: Summarize ACL security posture and traffic hits
      # Why: Generates a human-readable audit report summarizing state and statistics.
      ansible.builtin.debug:
        msg: |
          ======================================================================
          NETLEARNER ARCHITECT AUDIT REPORT: {{ inventory_hostname }}
          ======================================================================
          
          CONFIGURED POLICIES (Structured):
          {% if acl_output.gathered %}
          {% for acl in acl_output.gathered %}
          - {{ acl.name }}: {{ acl.acl_entries | default([]) | length }} entries
          {% endfor %}
          {% else %}
          [NOTICE] No access lists were identified in the current configuration.
          {% endif %}
          
          OPERATIONAL TRAFFIC STATISTICS (Hit Counts):
          {{ acl_hits.stdout | default('[NOTICE] No traffic hit counters were captured.') }}
