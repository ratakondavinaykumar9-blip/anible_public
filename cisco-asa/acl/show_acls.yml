---
# Name: Get Access Lists
# Description: Gathers structured ACL configuration and real-time hit counts from Cisco ASA/Firepower.
# Improved: 2026-03-08
# Standards: Idempotency (read-only), FQCN, Observability (assert/register), Error Handling.
- name: Get Access Lists
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Gather current ACL configuration (Idempotent read-only)
      cisco.asa.asa_acls:
        state: gathered
      register: acl_output
      # Resource modules with 'state: gathered' are idempotent as they do not modify the device state.

    - name: Verify ACL data was retrieved successfully
      ansible.builtin.assert:
        that:
          - acl_output.gathered is defined
        fail_msg: "Failed to gather structured ACL facts from {{ inventory_hostname }}. Check connectivity and permissions."
        quiet: true

    - name: Get ACL hits via CLI command (Observability)
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: acl_hits
      # Some versions may not return hitcnt if no traffic has passed; handle gracefully.
      failed_when: 
        - acl_hits.rc is defined 
        - acl_hits.rc != 0
      ignore_errors: true

    - name: Verify CLI command execution
      ansible.builtin.assert:
        that:
          - acl_hits.stdout is defined
        fail_msg: "CLI command 'show access-list' failed to execute on {{ inventory_hostname }}."
        quiet: true

    - name: Summary of ACL Configuration and Usage
      ansible.builtin.debug:
        msg: |
          ============================================================
          ACL INVENTORY: {{ inventory_hostname }}
          ============================================================
          {% if acl_output.gathered is defined and acl_output.gathered | length > 0 %}
          {% for acl in acl_output.gathered %}
          {{ acl.name }}: {{ acl.aces | default([]) | length }} entries configured.
          {% endfor %}
          {% else %}
          No structured ACL data found or no ACLs configured.
          {% endif %}

          HIT COUNT ANALYSIS:
          {% if acl_hits.stdout is defined and acl_hits.stdout != "" %}
          {{ acl_hits.stdout }}
          {% else %}
          No active hit counts detected or command returned empty result.
          {% endif %}