---
# ACL Logging Retrieval Playbook
#
# This playbook retrieves ACL-specific log entries from Cisco ASA/Firepower devices.
# It adheres to enterprise standards for observability, error handling, and FQCN usage.
#
# Standards:
# 1. Idempotency: This is a read-only operation; safe for repeated execution without state change.
# 2. Observability: Uses 'register' to capture output and 'assert' to verify data integrity.
# 3. Documentation: Clear task descriptions and comments explaining the purpose of each step.
# 4. Error Handling: Explicitly checks for failure states in the command execution.
# 5. Best Practices: Employs Fully Qualified Collection Names (FQCN) for all modules.

- name: Retrieve ACL Logs
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show logging' command filtered for ACL entries
      # FQCN: Using ansible.netcommon.cli_command for standardized network CLI interaction
      ansible.netcommon.cli_command:
        command: show logging | include ACL
      register: acl_log_output
      # Error Handling: Prevent silent failures by explicitly checking the result object
      failed_when: acl_log_output.failed | default(false)

    - name: Verify log retrieval integrity
      # Observability: Ensure the output variable is defined before proceeding to display
      ansible.builtin.assert:
        that:
          - acl_log_output.stdout is defined
        fail_msg: "Log retrieval failed or returned an invalid structure. Verify device connectivity."
        quiet: true

    - name: Present formatted ACL logs to the operator
      # Observability: Provide a structured view of the logs with a fallback for empty buffers
      ansible.builtin.debug:
        msg: |
          ======================= DEVICE: {{ inventory_hostname }} =======================
          {{ acl_log_output.stdout | default('No ACL logs found in the current logging buffer.') }}
          ================================================================================