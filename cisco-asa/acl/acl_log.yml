---
# ACL Log Retrieval and Verification
# Improved for enterprise-grade automation standards.
# Purpose: To securely fetch and audit ACL hits on Cisco ASA/FTD platforms.

- name: Get ACL Logs
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve filtered ACL logging entries from the device
      # Use Fully Qualified Collection Names (FQCN) for consistency and predictability.
      # This task fetches specific log lines containing "ACL" to monitor security policy hits.
      ansible.netcommon.cli_command:
        command: "show logging | include ACL"
      register: acl_log_data
      # Error Handling: Ensure the playbook fails on actual execution errors or invalid syntax.
      failed_when: 
        - "acl_log_data.failed == true"
        - "'Invalid' in acl_log_data.stdout"

    - name: Assert log retrieval success and data presence
      # Observability: Verify that the output structure is valid and defined.
      ansible.builtin.assert:
        that:
          - "acl_log_data.stdout is defined"
        fail_msg: "Critical Error: Failed to fetch log data from {{ inventory_hostname }}."
        success_msg: "Successfully verified log buffer availability."
        quiet: true

    - name: Display ACL logs with formatted output
      # Provide clear visibility into the firewall log buffer for auditing.
      # Logic handles cases where the buffer might be empty gracefully.
      ansible.builtin.debug:
        msg: |
          ======================= ACL LOGS: {{ inventory_hostname }} =======================
          {{ acl_log_data.stdout if acl_log_data.stdout | length > 0 else 'NOTICE: No ACL log entries found in the current buffer.' }}