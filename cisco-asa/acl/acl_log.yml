# NetLearner Architect - Automated Improvement
# Purpose: Extract ACL-specific hit logs from the ASA/Firepower syslog buffer.
# Use Case: Real-time traffic troubleshooting and security policy verification.
# Standards: Idempotency, Observability, FQCN, Error Handling.

- name: Get ACL Logs
  hosts: asa_firepower
  gather_facts: no

  tasks:
    - name: Retrieve ACL entries from the logging buffer
      # FQCN used for stability and to avoid collection conflicts.
      # Filtering for 'ACL' isolates traffic permit/deny events for surgical troubleshooting.
      ansible.netcommon.cli_command:
        command: show logging | include ACL
      register: acl_log
      # Error Handling: Fail only on actual CLI syntax errors or invalid input.
      # This prevents the playbook from stopping if logging is simply disabled.
      failed_when: 
        - acl_log.failed
        - "'% Invalid input' in acl_log.stdout"
      # Idempotency: Read-only command; check_mode enabled to allow verification in dry-runs.
      check_mode: no

    - name: Verify log retrieval success
      # Observability: Assert ensures the device returned a valid response object.
      # This provides an explicit checkpoint before attempting to process data.
      ansible.builtin.assert:
        that:
          - acl_log.stdout is defined
        fail_msg: "CRITICAL: Could not access logging buffer on {{ inventory_hostname }}."
        quiet: true

    - name: Display filtered ACL logs
      # Observability: Format the output for high-signal visibility.
      # ternary logic handles empty buffers gracefully to avoid confusing the operator.
      ansible.builtin.debug:
        msg: |
          ======================= ACL LOGS: {{ inventory_hostname }} =======================
          {{ acl_log.stdout if acl_log.stdout | length > 0 else 'NOTICE: No ACL events found in the current buffer.' }}