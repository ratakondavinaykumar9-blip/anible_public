---
# ACL Remarks Audit Playbook
# This playbook retrieves and displays access-list remarks from Cisco ASA/Firepower devices.
# Standards Applied: Idempotency, Observability, Documentation, Error Handling, and FQCN.

- name: Retrieve ACL Remarks
  hosts: asa_firepower
  gather_facts: false
  connection: network_cli

  tasks:
    - name: "Task 1: Retrieve access-list remarks from the running configuration"
      # Using FQCN for cisco.asa collection to ensure platform-specific command handling.
      # Idempotency: Read-only operation that does not modify device state.
      cisco.asa.asa_command:
        commands:
          - show running-config access-list | include remark
      register: remarks_result
      # Error Handling: Prevent failure if the command returns no results (common with 'include').
      failed_when:
        - remarks_result.failed
        - "'Invalid input' in remarks_result.msg"
      ignore_errors: false

    - name: "Task 2: Validate command execution"
      # Observability: Ensure the device responded and the data structure is correct.
      ansible.builtin.assert:
        that:
          - "remarks_result.stdout is defined"
          - "remarks_result.stdout_lines is defined"
        fail_msg: "The command did not return a valid response structure."
        success_msg: "Data successfully retrieved from {{ inventory_hostname }}."

    - name: "Task 3: Display formatted ACL remarks"
      # Documentation: Outputting data in a readable format for auditors/engineers.
      ansible.builtin.debug:
        msg: |
          ======================= ACL REMARKS REPORT =======================
          HOST: {{ inventory_hostname }}
          STATUS: {{ 'REMARKS FOUND' if remarks_result.stdout[0] != '' else 'NO REMARKS CONFIGURED' }}
          ------------------------------------------------------------------
          {{ remarks_result.stdout[0] if remarks_result.stdout[0] != '' else 'N/A' }}