---
# Playbook: Retrieve and Validate Compiled ACL Configuration
# This playbook fetches the compiled ACL state from Cisco ASA/Firepower devices.
# Standards: Idempotency (Read-only), Observability (Assert), Documentation, FQCN.

- name: Cisco ASA - ACL Compilation Report
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute 'show compile-cfg' to fetch compiled ACL data
      # Using FQCN for cross-platform CLI interaction
      ansible.netcommon.cli_command:
        command: show compile-cfg
      register: compiled_output
      # Error Handling: Identify if the command is unrecognized or execution failed
      failed_when: 
        - compiled_output.failed 
        - '"Invalid input" in compiled_output.stdout'
      # Idempotency: Explicitly marking as unchanged since this is a read-only operation
      changed_when: false

    - name: Verify successful data retrieval
      # Observability: Ensuring the output is populated and valid
      ansible.builtin.assert:
        that:
          - "compiled_output.stdout | length > 0"
          - "'compile-cfg' in compiled_output.stdout or compiled_output.stdout_lines | length > 0"
        fail_msg: "The 'show compile-cfg' command returned no data or was rejected by the device."
        success_msg: "Compiled ACL configuration successfully captured."

    - name: Display Compiled ACL Details
      # Documentation/Observability: Outputting formatted results for audit logs
      ansible.builtin.debug:
        msg: |
          ======================= COMPILED ACL REPORT =======================
          Host: {{ inventory_hostname }}
          Status: Success
          -------------------------------------------------------------------
          {{ compiled_output.stdout }}