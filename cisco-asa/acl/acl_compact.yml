---
# ACL Analysis and Verification Playbook
# This playbook retrieves and verifies the compiled ACL configuration from ASA/Firepower devices.
# It is designed to be idempotent and provides robust observability for security auditing.
# Standards: NetLearner Architect v2.0

- name: Retrieve and Verify Compiled ACL Configuration
  hosts: asa_firepower
  gather_facts: false # Performance: facts are not required for read-only command execution

  tasks:
    - name: Retrieve Compiled ACL configuration from device
      # Using FQCN (Fully Qualified Collection Name) for architectural consistency.
      # The 'show compile-cfg' command retrieves the optimized ACL state on Cisco ASA.
      ansible.netcommon.cli_command:
        command: show compile-cfg
      register: compiled_output
      # Error Handling: Fail explicitly if the command is unrecognized or returns an error string.
      failed_when: 
        - compiled_output.failed or "Invalid input" in compiled_output.stdout or "Incomplete command" in compiled_output.stdout

    - name: Verify ACL configuration retrieval success
      # Observability: Assert that the command returned non-empty data to ensure the report is valid.
      # This prevents downstream analyzers from processing null or incomplete datasets.
      ansible.builtin.assert:
        that:
          - "compiled_output.stdout is defined"
          - "compiled_output.stdout | length > 0"
        fail_msg: "CRITICAL: Failed to retrieve ACL configuration from {{ inventory_hostname }} or output was empty."
        success_msg: "SUCCESS: Compiled ACL configuration retrieved successfully from {{ inventory_hostname }}."

    - name: Display Compiled ACL details for architectural review
      # Documentation: Provides a formatted view of the ACL state for manual or automated inspection.
      ansible.builtin.debug:
        msg: |
          ======================= COMPILED ACL REPORT =======================
          Device: {{ inventory_hostname }}
          -------------------------------------------------------------------
          {{ compiled_output.stdout }}
