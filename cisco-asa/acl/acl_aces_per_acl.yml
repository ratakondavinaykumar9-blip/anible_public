---
# ACL ACE Count Analysis
# This playbook retrieves the number of Access Control Entries (ACEs) per Access Control List (ACL)
# on Cisco ASA/Firepower devices. It is designed for idempotency, observability, and robust error handling.

- name: Get ACL ACE Count
  hosts: asa_firepower
  gather_facts: false  # Facts are not required for this operational data gathering task, reducing overhead.

  tasks:
    - name: Fetch ACL information from the device
      # Using Fully Qualified Collection Name (FQCN) for the platform-specific module.
      # The command filters for lines containing 'access-list' or 'entries' to provide a concise summary.
      cisco.asa.asa_command:
        commands:
          - show access-list | include (access-list|entries)
      register: acl_info
      # Error Handling: Explicitly check for CLI-specific error strings to ensure the task fails correctly.
      failed_when: 
        - acl_info.failed or "Invalid input" in acl_info.stdout[0]

    - name: Validate that ACL data was successfully captured
      # Observability: Assert that the command returned non-empty output to verify device response.
      ansible.builtin.assert:
        that:
          - acl_info.stdout[0] | length > 0
        fail_msg: "Failed to retrieve ACL information or no ACLs are configured on the device."
        success_msg: "Successfully retrieved ACL ACE counts."

    - name: Display ACL ACE counts
      # Documentation: Provides a human-readable summary of the operational state.
      ansible.builtin.debug:
        msg: |
          ======================= ACL ACE COUNT =======================
          {{ acl_info.stdout[0] }}