# Acl Aces Per Acl - Infrastructure Integrity Audit
# Purpose: Retrieves the count of Access Control Entries (ACEs) to monitor firewall complexity.
# Standards: FQCN usage, Idempotency (Read-only), and explicit error handling/assertions.
# Author: NetLearner Architect
- name: Get ACL ACE Count
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Retrieve ACL ACE statistics from the device CLI
      # FQCN: Using ansible.netcommon for standardized CLI interaction
      ansible.netcommon.cli_command:
        command: "show access-list | include (access-list|entries)"
      register: acl_info
      # Error Handling: Catch device-specific CLI errors and task execution failures
      failed_when: 
        - acl_info.failed
        - "'Invalid' in acl_info.stdout"
        - "'%' in acl_info.stdout"

    - name: Verify that the audit returned valid ACL data
      # Observability: Assert that the output is populated to prevent silent failures
      ansible.builtin.assert:
        that:
          - acl_info.stdout is defined
          - acl_info.stdout | length > 0
        fail_msg: "Audit Failure: No ACL data was retrieved. Verify the device has configured ACLs."
        success_msg: "Audit Success: ACL information captured successfully."

    - name: Display the ACL ACE Count Report
      # Observability: Formatted debug output for human-readable audit trail
      ansible.builtin.debug:
        msg: |
          ======================= ACL ACE COUNT REPORT =======================
          Host: {{ inventory_hostname }}
          Report Details:
          {{ acl_info.stdout }}