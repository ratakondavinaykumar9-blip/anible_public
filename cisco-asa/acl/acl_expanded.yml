---
# Playbook: Get Expanded Access-List Configuration
# Purpose: Retrieve the expanded view of ACLs to resolve object-groups into literal IP addresses/ports.
# Why: Standard 'show access-list' does not resolve groups, making troubleshooting and audits difficult.
# Idempotency: This is a read-only operation; changed_when is set to false to ensure it is safe for repeated runs.

- name: Get Expanded ACL
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Optional variable to filter by a specific ACL name. If empty, all expanded ACLs are retrieved.
    acl_name: ""

  tasks:
    - name: Execute show access-list expanded command
      # Use Fully Qualified Collection Name (FQCN) for cross-platform network CLI compatibility.
      ansible.netcommon.cli_command:
        command: "{{ 'show access-list ' + acl_name + ' expanded' if acl_name | length > 0 else 'show access-list expanded' }}"
      register: expanded_acl_res
      # Error Handling: Cisco ASA/Firepower CLI may return a success code even if the command fails (e.g., ACL not found).
      # We check the stdout for common error strings to ensure the task fails appropriately.
      failed_when:
        - expanded_acl_res.failed or "ERROR" in expanded_acl_res.stdout or "Invalid input" in expanded_acl_res.stdout
      # Best Practice: Show commands are non-mutating and should not report 'changed' status in a report.
      changed_when: false

    - name: Verify ACL data was retrieved
      # Observability: Assert that we actually captured output from the device to prevent silent failures.
      ansible.builtin.assert:
        that:
          - expanded_acl_res.stdout | length > 0
        fail_msg: "No ACL data was returned. Check if the ACL '{{ acl_name }}' exists or if the device has configured ACLs."
        quiet: true

    - name: Display the expanded ACL entries
      # Displaying stdout_lines provides better readability in the Ansible console than a single block of text.
      ansible.builtin.debug:
        msg: "{{ expanded_acl_res.stdout_lines }}"