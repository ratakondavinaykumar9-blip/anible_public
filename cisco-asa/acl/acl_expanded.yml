---
# NetLearner Staging: Advanced ACL Expansion & Validation
# Purpose: Retrieves the expanded state of Cisco ASA/Firepower Access Control Lists.
# Standards: Idempotency (Read-only), FQCN Usage, Observability, and Error Handling.

- name: Get Expanded Access-List State
  hosts: asa_firepower
  gather_facts: false
  vars:
    # Define a specific ACL name to filter results, or leave empty to retrieve all expanded ACLs.
    acl_name: ""

  tasks:
    - name: "Retrieve expanded ACL data for: {{ acl_name | default('ALL', true) }}"
      # FQCN: Using the standard network common command module for cross-platform consistency.
      ansible.netcommon.cli_command:
        command: "{{ 'show access-list ' + acl_name + ' expanded' if acl_name else 'show access-list expanded' }}"
      register: acl_data
      # Error Handling: Identify failure if the ASA returns syntax errors or missing object warnings.
      failed_when:
        - acl_data.failed
        - "'Invalid' in acl_data.stdout or 'not found' in acl_data.stdout"
      # Idempotency: Explicitly mark as non-changing for audit-friendly execution.
      changed_when: false

    - name: Validate ACL output observability
      # Observability: Assert that the command returned meaningful content before proceeding.
      ansible.builtin.assert:
        that:
          - acl_data.stdout is defined
          - acl_data.stdout | length > 0
        fail_msg: "Data retrieval failed or ACL '{{ acl_name }}' does not contain expanded entries."
        success_msg: "Expanded ACL data successfully captured and validated."

    - name: Display expanded ACL details
      # Documentation: Providing structured output for operator visibility.
      ansible.builtin.debug:
        msg:
          - "Device: {{ inventory_hostname }}"
          - "Target ACL: {{ acl_name | default('GLOBAL_EXPANDED', true) }}"
          - "Content:"
          - "{{ acl_data.stdout_lines }}"
      when: acl_data.stdout is defined
