---
# Improved ACL Hit Count Retrieval
# This playbook retrieves hit counts for Access Control Lists on Cisco ASA/Firepower devices.
# It adheres to enterprise standards for idempotency, observability, and error handling.

- name: Get ACL Hit Counts
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Execute show command to fetch hit counts
      # Best Practice: Using FQCN (Fully Qualified Collection Name)
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: hits
      # Idempotency: Show commands are read-only and should not report changes
      changed_when: false
      # Error Handling: Ensure the task fails if the CLI returns an error message
      failed_when:
        - hits.failed or "Invalid input" in hits.stdout or "Incomplete command" in hits.stdout

    - name: Verify data integrity
      # Observability: Assert that the command returned meaningful data before proceeding
      ansible.builtin.assert:
        that:
          - hits.stdout is defined
          - hits.stdout | length > 0
        fail_msg: "ACL hit count data is empty or could not be retrieved from the device."
        success_msg: "ACL hit count data successfully captured."

    - name: Display ACL Hit Counts
      # Observability: Provide clear, formatted output for the operator
      ansible.builtin.debug:
        msg: |
          ======================= ACL HIT COUNTS =======================
          {{ hits.stdout }}