---
# ACL Hit Count Telemetry
# Purpose: Retrieve and audit ACL hit counts for traffic analysis on Cisco ASA/Firepower.
# Standards: Idempotency (read-only), Observability (assert), FQCN usage, Error Handling.
# 
- name: Get ACL Hit Counts
  hosts: asa_firepower
  gather_facts: false

  tasks:
    - name: Fetch ACL hit counts from the device
      # Why: Executes a filtered show command to extract lines containing 'hitcnt'.
      # Idempotency: This is a read-only operation; changed_when is set to false to ensure clean multi-runs.
      ansible.netcommon.cli_command:
        command: show access-list | include hitcnt
      register: hits
      # Error Handling: Fails if the underlying CLI connection or command execution fails.
      failed_when: hits.failed
      changed_when: false

    - name: Verify telemetry data integrity
      # Observability: Ensures the hits register contains a valid stdout structure before processing.
      ansible.builtin.assert:
        that:
          - hits.stdout is defined
        fail_msg: "Critical Error: Failed to retrieve a valid response object from {{ inventory_hostname }}."
        success_msg: "ACL telemetry successfully registered for {{ inventory_hostname }}."

    - name: Display ACL Hit Statistics
      # Why: Provides formatted output for operational visibility and debugging.
      ansible.builtin.debug:
        msg: |
          ======================= ACL HIT COUNTS =======================
          DEVICE: {{ inventory_hostname }}
          RESULT: {{ 'DATA_FOUND' if hits.stdout | length > 0 else 'NO_HITS_DETECTED' }}
          --------------------------------------------------------------
          {{ hits.stdout if hits.stdout | length > 0 else 'No access-list entries with hit counts were found.' }}
          ==============================================================
